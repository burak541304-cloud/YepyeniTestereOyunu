name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Setup and Force Java 17
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "YepyeniTestere" "com.burak.testere" --web-dir dist
          npx cap add android
          
          # BUTUN JAVA 21 YAZILARINI 17 ILE DEGISTIR (KESIN COZUM)
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +
          find android -name "build.gradle" -exec sed -i "s/jvmTarget = '21'/jvmTarget = '17'/g" {} +
          
          # GRADLE AYARINI SABITLE
          echo "org.gradle.java.home=/usr/lib/jvm/temurin-17-jdk-amd64" >> android/gradle.properties
          
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-apk-dosyasi
          path: android/app/build/outputs/apk/debug/app-debug.apk
