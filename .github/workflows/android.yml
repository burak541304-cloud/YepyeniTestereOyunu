name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Node Install
        run: npm install

      - name: Web Build
        run: npm run build

      - name: Capacitor Init and Fix
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "YepyeniTestere" "com.burak.testere" --web-dir dist
          npx cap add android
          # Java 21 zorlamasini tum dosyalarda guncelle
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' {} +
          npx cap sync android

      - name: Build APK File
        run: |
          cd android
          chmod +x gradlew
          yes | ./gradlew assembleDebug --no-daemon

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk-file
          path: android/app/build/outputs/apk/debug/app-debug.apk
