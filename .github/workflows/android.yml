name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Setup & Fix Java 21 Error
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "YepyeniTestere" "com.burak.testere" --web-dir dist
          npx cap add android
          # BURASI KRİTİK: Dosya oluşur oluşmaz içindeki '21' yazan yerleri '17' ile değiştiriyoruz
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "s/jvmTarget = '21'/jvmTarget = '17'/g" android/app/build.gradle
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-apk-dosyasi
          path: android/app/build/outputs/apk/debug/app-debug.apk
