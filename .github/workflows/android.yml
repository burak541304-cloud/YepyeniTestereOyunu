name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node Modules
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Testere" "com.burak.testere" --web-dir dist
          npx cap add android
          
          # 1. ÇAKIŞMA ÇÖZÜCÜ: Duplicate class hatasını engeller
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> android/gradle.properties

          # 2. SÜRÜM ÇÖZÜCÜ: Java 21 uyumluluğu sağlar
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' {} +
          
          npx cap sync android

      - name: Build APK File
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-apk-dosyasi
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-apk-dosyasi
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
