name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Android Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "YepyeniTestere" "com.burak.testere" --web-dir dist
          npx cap add android
          # Java 21 hatasını kökten çözen sihirli komutlar:
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "s/jvmTarget = '21'/jvmTarget = '17'/g" android/app/build.gradle
          # Gradle sürümünü Java 17'ye uyumlu hale getiriyoruz
          sed -i 's/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-8.2-bin.zip/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-8.0-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-apk-dosyasi
          path: android/app/build/outputs/apk/debug/app-debug.apk
