name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Node Install
        run: npm install

      - name: Web Build
        run: npm run build

      - name: Capacitor Setup & Duplicate Fix
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Testere" "com.burak.testere" --web-dir dist
          npx cap add android
          
          # 1. ÇAKIŞAN PAKETLERİ DIŞLA (Critiсal Fix)
          # Android projesindeki tum build.gradle dosyalarına çakışmayı önleyen konfigürasyonu ekler
          sed -i '/dependencies {/a \    configurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22" } }' android/app/build.gradle
          
          # 2. GRADLE AYARLARI
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> android/gradle.properties

          # 3. JAVA 21 ZORLAMASI
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' {} +
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_21/g' {} +
          
          npx cap sync android

      - name: Build APK File
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-apk-dosyasi
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
