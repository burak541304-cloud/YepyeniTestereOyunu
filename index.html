// === UTILITY FUNCTIONS ===
function rnd(a,b){ return a + Math.random()*(b-a); }
function rndInt(a,b){ return Math.floor(rnd(a,b+1)); }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
function angle(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
function lerpColor(c1,c2,t){
  const p=(s)=>parseInt(s,16);
  const r1=p(c1.slice(1,3)),g1=p(c1.slice(3,5)),b1=p(c1.slice(5,7));
  const r2=p(c2.slice(1,3)),g2=p(c2.slice(3,5)),b2=p(c2.slice(5,7));
  return '#'+[r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}
function drawRoundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}
}
function worldToScreen(wx,wy,cam){
  return { x: wx - cam.x + W/2, y: wy - cam.y + H/2 };
}
function isOnScreen(wx, wy, cam, margin = 100) {
  const s = worldToScreen(wx, wy, cam);
  return s.x > -margin && s.x < W + margin && s.y > -margin && s.y < H + margin;
}

// === CAMERA ===
class Camera {
  constructor(){ 
    this.x = 500; 
    this.y = 500; 
    this.zoom = 1.0;        // 🔁 Yeni: zoom seviyesi (1.0 = normal)
    this.minZoom = 0.6;     // En fazla uzaklaşma
    this.maxZoom = 1.8;     // En fazla yakınlaşma
  }
  
  follow(target, dt){
    const spd = 8;
    this.x += (target.x - this.x) * spd * dt;
    this.y += (target.y - this.y) * spd * dt;
    this.x = clamp(this.x, W/2, WORLD_W - W/2);
    this.y = clamp(this.y, H/2, WORLD_H - H/2);
  }
  
  // 🔁 Zoom değiştirme metodu
  adjustZoom(delta){
    this.zoom = clamp(this.zoom + delta, this.minZoom, this.maxZoom);
  }
}

// === UTILITY FUNCTIONS ===
// 🔁 worldToScreen zoom'u hesaba katacak şekilde güncellendi
function worldToScreen(wx, wy, cam){
  const screenX = (wx - cam.x) * cam.zoom + W/2;
  const screenY = (wy - cam.y) * cam.zoom + H/2;
  return { x: screenX, y: screenY };
}

// isOnScreen de zoom'a göre marjı ayarlayalım
function isOnScreen(wx, wy, cam, margin = 100) {
  const s = worldToScreen(wx, wy, cam);
  return s.x > -margin && s.x < W + margin && s.y > -margin && s.y < H + margin;
}

// === ITEM ===
class Item {
  constructor(id, enhance=0, forcedRarity=null, count=1){
    this.id = id;
    this.enhance = enhance;
    this.count = count || 1;
    const def = ITEM_DEFS[id];
    if(!def) { this.valid=false; return; }
    this.valid = true;
    Object.assign(this, def);
    
    if(forcedRarity) {
      this.rarity = forcedRarity;
    } else {
      let roll = Math.random() * 100;
      let sum = 0;
      for(const r in RARITIES) {
        sum += RARITIES[r].weight;
        if(roll <= sum) { this.rarity = r; break; }
      }
    }
    if(!this.rarity) this.rarity = 'COMMON';

    this.extraStats = { str:0, dex:0, int:0, hp:0, atkSpd:0, lifeSteal:0 };
    if(this.rarity !== 'COMMON') {
      this.generateExtraStats();
    }
  }

  generateExtraStats() {
    const tier = RARITIES[this.rarity].mult;
    const statKeys = Object.keys(this.extraStats);
    const numStats = this.rarity === 'RARE' ? 1 : (this.rarity === 'EPIC' ? 2 : 3);
    for(let i=0; i<numStats; i++) {
      const key = statKeys[Math.floor(Math.random()*statKeys.length)];
      const val = Math.floor(rnd(1, 5) * tier);
      this.extraStats[key] += val;
    }
  }

  getDisplayName(){
    const rColor = RARITIES[this.rarity].color;
    const rarityName = RARITIES[this.rarity].name;
    let name = `${rarityName} ${this.name}`;
    if(this.enhance>0) name += ' +'+this.enhance;
    if(this.count > 1) name += ` (${this.count})`;
    return name;
  }

  getEnhancedAtk(){ return (this.atk||0) * RARITIES[this.rarity].mult + this.enhance*3 + (this.extraStats.str * 2); }
  getEnhancedDef(){ return (this.def||0) * RARITIES[this.rarity].mult + this.enhance*2 + (this.extraStats.str * 0.5); }
  getEnhancedHp(){ return (this.hp||0) * RARITIES[this.rarity].mult + this.enhance*5 + (this.extraStats.hp * 10); }

  getGlowColor(){
    if(this.enhance >= 10) return null;
    if(this.enhance >= 7) return '#f80'; 
    return RARITIES[this.rarity].color;
  }

  serialize(){ 
    return { 
      id:this.id, enhance:this.enhance, rarity:this.rarity, extraStats:this.extraStats,
      count: this.count
    }; 
  }
  
  static deserialize(d){ 
    if(!d) return null;
    const it = new Item(d.id, d.enhance||0, d.rarity, d.count||1);
    if(d.extraStats) it.extraStats = d.extraStats;
    return it; 
  }
}

// === INVENTORY ===
class Inventory {
  constructor(){
    this.slots = new Array(42).fill(null);
    this.equipment = { weapon:null, head:null, chest:null, legs:null, boots:null };
    this.noah = 0;
    this.markedForSale = new Set();
    this.autoSellMaterials = false;
  }

  sortItems() {
    const gear = [];
    this.slots.forEach((item, idx) => {
      if(item && ['weapon','head','chest','legs','boots'].includes(item.type)) {
        gear.push(item);
        this.slots[idx] = null;
      }
    });
    gear.sort((a, b) => (b.getEnhancedAtk() + b.getEnhancedDef()) - (a.getEnhancedAtk() + a.getEnhancedDef()));
    gear.forEach((item, idx) => {
      this.slots[idx] = item;
    });
  }

  addItem(item){
    if(this.autoSellMaterials && item && item.type === 'material' && item.value){
      this.noah += item.value * item.count;
      if(typeof G !== 'undefined' && G && G.particles && G.player){
        G.particles.spawn('noah', G.player.x, G.player.y-20, `+${item.value * item.count} (auto-sell ${item.name})`);
      }
      return true;
    }

    const stackable = item.type === 'potion' || item.type === 'material' || item.type === 'currency';
    
    if(stackable){
      for(let i=0; i<this.slots.length; i++){
        const slot = this.slots[i];
        if(slot && slot.id === item.id && slot.enhance === item.enhance){
          slot.count += item.count;
          return true;
        }
      }
    }
    
    for(let i=0; i<this.slots.length; i++){
      if(!this.slots[i]){ 
        this.slots[i] = item; 
        return true; 
      }
    }
    return false;
  }

  removeItem(idx){ 
    const item = this.slots[idx];
    if(item && item.count > 1){
      item.count--;
      if(item.count <= 0) this.slots[idx] = null;
    } else {
      this.slots[idx] = null;
    }
  }

  equip(idx, player){
    const item = this.slots[idx];
    if(!item) return;
    const equipTypes = ['weapon','head','chest','legs','boots'];
    if(!equipTypes.includes(item.type)) return;
    const slot = item.type;
    const old = this.equipment[slot];
    this.equipment[slot] = item;
    this.slots[idx] = old;
    player.recalcStats();
  }

  unequip(slot, player){
    const item = this.equipment[slot];
    if(!item) return;
    if(this.addItem(item)){ 
      this.equipment[slot] = null; 
      player.recalcStats(); 
    }
  }

  usePotion(idx, player){
    const item = this.slots[idx];
    if(!item) return false;
    if(item.type === 'potion'){
      if(item.heal){ 
        player.hp = Math.min(player.maxHp, player.hp + item.heal); 
        G.particles.spawn('heal',player.x,player.y,'+'+item.heal); 
      }
      if(item.mp){ 
        player.mp = Math.min(player.maxMp, player.mp + item.mp); 
        G.particles.spawn('heal',player.x,player.y,'+'+item.mp+' MP'); 
      }
      if(item.atk_buff){ 
        player.atkBuff = item.atk_buff; 
        player.atkBuffTimer = 30; 
      }
      item.count--;
      if(item.count <= 0) this.slots[idx] = null;
      return true;
    }
    if(item.type === 'currency'){
      this.noah += (item.value||0) * item.count;
      this.slots[idx] = null;
      return true;
    }
    return false;
  }

  getEquipBonus(){
    let atk=0,def=0,hp=0;
    for(const slot in this.equipment){
      const it = this.equipment[slot];
      if(it){ atk+=it.getEnhancedAtk(); def+=it.getEnhancedDef(); hp+=it.getEnhancedHp(); }
    }
    return {atk,def,hp};
  }

  serialize(){
    return {
      slots: this.slots.map(s=>s?s.serialize():null),
      equipment: Object.fromEntries(Object.entries(this.equipment).map(([k,v])=>[k,v?v.serialize():null])),
      noah: this.noah,
      autoSellMaterials: this.autoSellMaterials
    };
  }

  static deserialize(d){
    const inv = new Inventory();
    if(!d) return inv;
    if(d.slots) inv.slots = d.slots.map(s=>s?Item.deserialize(s):null);
    if(d.equipment) for(const k in d.equipment) inv.equipment[k] = d.equipment[k]?Item.deserialize(d.equipment[k]):null;
    inv.noah = d.noah||0;
    if(d.autoSellMaterials !== undefined) inv.autoSellMaterials = d.autoSellMaterials;
    return inv;
  }
}
// === PLAYER ===
class Player {
  constructor(){
    this.x = 500; this.y = 500;
    this.level = 1; this.exp = 0; this.expNext = 100;
    this.str = 10; this.dex = 10; this.int = 5;
    this.statPoints = 0; this.skillPoints = 0;
    this.bonusHp = 0;
    this.bonusMp = 0;
    this.atkBuff = 0; this.atkBuffTimer = 0;
    this.inventory = new Inventory();
    this.inventory.addItem(new Item('rusty_sword'));
    this.inventory.addItem(new Item('hp_potion_s', 0, null, 5)); // 5 adet küçük can potu
    this.inventory.addItem(new Item('mp_potion_s', 0, null, 3)); // 3 adet küçük mana potu
    this.recalcStats();
    this.hp = this.maxHp; this.mp = this.maxMp;
    this.moveTarget = null;
    this.dx = 0; this.dy = 0;
    this.attackTimer = 0;
    this.attackSpeed = 0.05;
    this.facingAngle = 0;
    this.stunTimer = 0;
    this.chargeTimer = 0;
    this.chargeVx = 0; this.chargeVy = 0;
    this.warCryTimer = 0; this.warCryAtk = 0; this.warCryDef = 0;
    this.animFrame = 0;
    this.swingAnim = 0;
  }
  recalcStats(){
    const bonus = this.inventory.getEquipBonus();
    this.maxHp = 200 + this.str*10 + bonus.hp + this.bonusHp;
    this.maxMp = 100 + this.int*8 + this.bonusMp;
    this.baseAtk = 10 + this.str*2 + bonus.atk;
    this.baseDef = 5 + this.str*0.5 + bonus.def;
    this.critChance = 0.05 + this.dex*0.002;
    this.speed = 180;
    if(this.hp !== undefined) this.hp = Math.min(this.hp, this.maxHp);
    if(this.mp !== undefined) this.mp = Math.min(this.mp, this.maxMp);
  }
  getAtk(){
    let a = this.baseAtk;
    if(this.atkBuff>0) a *= (1+this.atkBuff);
    return a;
  }
  getDef(){ return this.baseDef + (this.warCryDef||0); }
  expNeeded(lv){ return Math.floor(100 * Math.pow(1.4, lv-1)); }
  gainExp(amount){
    this.exp += amount;
    G.particles.spawn('exp', this.x, this.y-30, '+'+amount+' EXP');
    while(this.exp >= this.expNext){
      this.exp -= this.expNext;
      this.level++;
      this.expNext = this.expNeeded(this.level);
      this.statPoints += 5;
      this.skillPoints += 1;
      this.recalcStats();
      this.hp = Math.min(this.hp + 50, this.maxHp);
      this.mp = Math.min(this.mp + 30, this.maxMp);
      G.particles.spawn('levelup', this.x, this.y, 'LEVEL UP!');
      // 🔁 OTOMATİK STAT EKRANI AÇILMASI İPTAL EDİLDİ
      // if(G.state==='playing') G.pendingStatScreen = true;
    }
  }
  update(dt, keys, mobs){
    this.animFrame += dt;
    if(this.stunTimer>0){ this.stunTimer-=dt; return; }
    if(this.atkBuffTimer>0){ this.atkBuffTimer-=dt; if(this.atkBuffTimer<=0){this.atkBuff=0;} }
    if(this.warCryTimer>0){ this.warCryTimer-=dt; if(this.warCryTimer<=0){this.warCryAtk=0;this.warCryDef=0;} }

    if(this.chargeTimer>0){
      this.chargeTimer -= dt;
      this.x = clamp(this.x + this.chargeVx*dt, 0, WORLD_W);
      this.y = clamp(this.y + this.chargeVy*dt, 0, WORLD_H);
      return;
    }

    let vx=0,vy=0;
    if(G.joystick && G.joystick.active){
      vx = G.joystick.nx; vy = G.joystick.ny;
    }
    if(keys['KeyW']||keys['ArrowUp']) vy=-1;
    if(keys['KeyS']||keys['ArrowDown']) vy=1;
    if(keys['KeyA']||keys['ArrowLeft']) vx=-1;
    if(keys['KeyD']||keys['ArrowRight']) vx=1;

    if(vx!==0||vy!==0){
      const len=Math.hypot(vx,vy)||1;
      vx/=len; vy/=len;
      this.moveTarget=null;
    }

    if(this.moveTarget){
      const d=dist(this,this.moveTarget);
      if(d<8){ this.moveTarget=null; }
      else {
        const ang=angle(this,this.moveTarget);
        vx=Math.cos(ang); vy=Math.sin(ang);
      }
    }

    if(vx!==0||vy!==0){
      this.facingAngle = Math.atan2(vy,vx);
      this.x = clamp(this.x + vx*this.speed*dt, 0, WORLD_W);
      this.y = clamp(this.y + vy*this.speed*dt, 0, WORLD_H);
    }

    this.attackTimer -= dt;
    if(this.attackTimer<=0 || G.forceAttack){
      if(G.forceAttack){ G.forceAttack=false; this.attackTimer=Math.max(0,this.attackTimer); }
      let nearest=null, nearestDist=Infinity;
      for(const mob of mobs){
        if(mob.dead) continue;
        const d=dist(this,mob);
        if(d<200 && d<nearestDist){ nearestDist=d; nearest=mob; }
      }
      if(nearest){
        this.attackTimer = this.attackSpeed;
        this.swingAnim = 0.3;
        this.facingAngle = angle(this, nearest);
        const dmg = this.calcDamage(nearest);
        nearest.takeDamage(dmg.dmg, dmg.crit);
        G.particles.spawn('slash', this.x, this.y, '', this.facingAngle);
      }
    }
    if(this.swingAnim>0) this.swingAnim -= dt*3;
  }
  calcDamage(target){
    let atk = this.getAtk();
    const crit = Math.random()<this.critChance;
    if(crit) atk *= 2;
    const dmg = Math.max(1, Math.floor(atk - (target.def||0)*0.4 + rnd(-3,3)));
    return {dmg, crit};
  }
  takeDamage(amount){
    const def = this.getDef();
    const reduced = Math.max(1, Math.floor(amount - def*0.5));
    this.hp -= reduced;
    G.particles.spawn('damage', this.x, this.y-20, '-'+reduced);
    G.particles.spawn('hit', this.x, this.y, '');
    if(this.hp<=0){ this.hp=0; G.changeState('dead'); }
    return reduced;
  }
  draw(cam){
    const s = worldToScreen(this.x, this.y, cam);
    const sx=s.x, sy=s.y;
    if(sx<-50||sx>W+50||sy<-50||sy>H+50) return;
    ctx.save();
    ctx.translate(sx,sy);
    const facing = this.facingAngle;
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0,16,12,5,0,0,Math.PI*2);
    ctx.fill();
    const legAnim = Math.sin(this.animFrame*8)*4;
    ctx.fillStyle='#335';
    ctx.fillRect(-6,8,5,14+legAnim);
    ctx.fillRect(1,8,5,14-legAnim);
    ctx.fillStyle='#357';
    ctx.fillRect(-8,-10,16,22);
    ctx.fillStyle='rgba(100,150,255,0.3)';
    ctx.fillRect(-6,-8,12,10);
    const swingOff = this.swingAnim * 60;
    ctx.save();
    ctx.rotate(facing + swingOff);
    ctx.fillStyle='#ccc';
    ctx.fillRect(8,-2,22,4);
    ctx.fillStyle='#a84';
    ctx.fillRect(8,-5,4,10);
    ctx.restore();
    ctx.fillStyle='#d4a';
    ctx.beginPath();
    ctx.arc(0,-18,10,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#46a';
    ctx.beginPath();
    ctx.arc(0,-20,11,Math.PI,0);
    ctx.fill();
    ctx.fillRect(-11,-20,22,5);
    ctx.fillStyle='#0ff';
    ctx.fillRect(-4,-19,3,2);
    ctx.fillRect(1,-19,3,2);
    ctx.restore();
  }
}

// === MOB CLASS ===
class Mob {
  constructor(type, x, y){
    this.type = type;
    const def = MOB_DEFS[type];
    Object.assign(this, def);
    this.x = x; this.y = y;
    this.spawnX = x; this.spawnY = y;
    this.hp = def.hp; this.maxHp = def.hp;
    this.state = 'idle';
    this.wanderTimer = rnd(1,4);
    this.wanderX = x; this.wanderY = y;
    this.attackTimer = 0;
    this.dead = false;
    this.deadTimer = 0;
    this.respawnTimer = 0;
    this.damaged = false;
    this.stunTimer = 0;
    this.knockbackVx = 0; this.knockbackVy = 0; this.knockbackTimer = 0;
    this.animTimer = 0;
    this.lootDropped = false;
  }
  update(dt, player){
    this.animTimer += dt;
    if(this.knockbackTimer>0){
      this.knockbackTimer-=dt;
      this.x = clamp(this.x+this.knockbackVx*dt,0,WORLD_W);
      this.y = clamp(this.y+this.knockbackVy*dt,0,WORLD_H);
    }
    if(this.stunTimer>0){ this.stunTimer-=dt; return; }
    if(this.dead) return;
    const dp = dist(this, player);
    const dSpawn = dist(this, {x:this.spawnX,y:this.spawnY});

    if(this.state==='idle'){
      this.wanderTimer -= dt;
      if(this.wanderTimer<=0){
        this.wanderTimer = rnd(2,5);
        this.wanderX = this.spawnX + rnd(-150,150);
        this.wanderY = this.spawnY + rnd(-150,150);
      }
      const dw=dist(this,{x:this.wanderX,y:this.wanderY});
      if(dw>10){
        const ang=Math.atan2(this.wanderY-this.y,this.wanderX-this.x);
        this.x=clamp(this.x+Math.cos(ang)*this.speed*0.4*dt,0,WORLD_W);
        this.y=clamp(this.y+Math.sin(ang)*this.speed*0.4*dt,0,WORLD_H);
      }
      if(dp<this.aggroRange) this.state='aggro';
    } else if(this.state==='aggro'){
      if(dp<this.attackRange){ this.state='attack'; }
      else if(dSpawn>600){ this.state='return'; }
      else {
        const ang=Math.atan2(player.y-this.y,player.x-this.x);
        this.x=clamp(this.x+Math.cos(ang)*this.speed*dt,0,WORLD_W);
        this.y=clamp(this.y+Math.sin(ang)*this.speed*dt,0,WORLD_H);
      }
    } else if(this.state==='attack'){
      if(dp>this.attackRange*1.3){ this.state='aggro'; }
      else {
        this.attackTimer -= dt;
        if(this.attackTimer<=0){
          this.attackTimer = this.attackSpeed;
          const dmg = Math.max(1, Math.floor(this.atk + rnd(-3,3)));
          player.takeDamage(dmg);
        }
      }
      if(dSpawn>600) this.state='return';
    } else if(this.state==='return'){
      const ang=Math.atan2(this.spawnY-this.y,this.spawnX-this.x);
      this.x=clamp(this.x+Math.cos(ang)*this.speed*1.2*dt,0,WORLD_W);
      this.y=clamp(this.y+Math.sin(ang)*this.speed*1.2*dt,0,WORLD_H);
      if(dSpawn<20){
        this.state='idle';
        this.hp = this.maxHp;
      }
      if(dp<this.aggroRange) this.state='aggro';
    }
  }
  takeDamage(amount, crit){
    if(this.dead) return;
    const reduced = Math.max(1, Math.floor(amount - this.def*0.4));
    this.hp -= reduced;
    this.damaged = true;
    this.state = 'aggro';
    if(crit) G.particles.spawn('crit', this.x, this.y-30, 'CRIT! '+reduced);
    else G.particles.spawn('damage', this.x, this.y-30, '-'+reduced);
    G.particles.spawn('blood', this.x, this.y, '');
    if(this.hp<=0){ this.hp=0; this.die(); }
  }
  die(){
    this.dead = true;
    this.deadTimer = 1.5;
    if(!this.lootDropped){
      this.lootDropped = true;
      for(const l of this.loot){
        if(Math.random()<l.chance){
          G.groundItems.push({x:this.x+rnd(-20,20),y:this.y+rnd(-20,20),item:new Item(l.id),glowTimer:0});
        }
      }
      const noahAmt = rndInt(Math.floor(this.noah*0.7), Math.floor(this.noah*1.3));
      G.particles.spawn('noah', this.x, this.y-40, '+'+noahAmt+' Noah');
      G.player.inventory.noah += noahAmt;
      G.player.gainExp(this.exp);
      G.quests.onKill(this.type);
      G.particles.spawn('blood',this.x,this.y,'');
      G.particles.spawn('spark', this.x, this.y, '');
    }
    this.respawnTimer = 30;
  }
  respawn(){
    this.x = this.spawnX; this.y = this.spawnY;
    this.hp = this.maxHp;
    this.dead = false;
    this.deadTimer = 0;
    this.lootDropped = false;
    this.state = 'idle';
    this.wanderTimer = rnd(1,3);
    this.damaged = false;
    this.stunTimer = 0;
    this.knockbackTimer = 0;
  }
  drawWorm(sx,sy){
    const t = this.animTimer;
    const colors = ['#3a3','#4b4','#3a3'];
    const sizes = [8,10,8];
    for(let i=0;i<3;i++){

      const oy = Math.sin(t*3 + i*1.2)*6;
      ctx.fillStyle = colors[i];
      ctx.beginPath();
      ctx.arc(sx+ox, sy+oy, sizes[i], 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#2a2';
      ctx.lineWidth=1;
      ctx.stroke();
    }
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx+14-2,sy-4,2,0,Math.PI*2); ctx.fill();

  drawTroll(sx,sy){

    const armSwing = Math.sin(t*3)*10;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(sx,sy+34,30,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a2';
    ctx.beginPath();
    ctx.ellipse(sx,sy,27,35,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#4b3';
    ctx.beginPath();
    ctx.ellipse(sx,sy+5,18,22,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#3a2';
    ctx.beginPath();
    ctx.arc(sx,sy-42,22,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#f40';
    ctx.shadowColor='#f40'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(sx-7,sy-44,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+7,sy-44,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(sx-7,sy-44,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+7,sy-44,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#eee';
    ctx.fillRect(sx-8,sy-36,4,6);
    ctx.fillRect(sx+4,sy-36,4,6);
    ctx.fillStyle='#3a2';
    ctx.fillRect(sx-42,sy-28+armSwing,14,40);
    ctx.fillRect(sx+28,sy-28-armSwing,14,40);
    ctx.fillStyle='#864';
    ctx.fillRect(sx+40,sy-32-armSwing,8,40);
    ctx.fillRect(sx+36,sy-40-armSwing,16,12);
    ctx.fillStyle='#2a1';
    ctx.fillRect(sx-18,sy+28,14,20);
    ctx.fillRect(sx+4,sy+28,14,20);
  }
  drawOrc(sx, sy) {
    ctx.fillStyle = '#482';
    ctx.fillRect(sx-12, sy-20, 24, 30);
    ctx.fillStyle = '#261';
    ctx.fillRect(sx-15, sy-10, 8, 20);
    ctx.fillRect(sx+7, sy-10, 8, 20);
    ctx.fillStyle = '#593';
    ctx.beginPath(); ctx.arc(sx, sy-25, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00';
    ctx.fillRect(sx-4, sy-27, 3, 3); ctx.fillRect(sx+1, sy-27, 3, 3);
  }
  drawMage(sx, sy) {
    ctx.fillStyle = '#406';
    ctx.beginPath(); ctx.moveTo(sx, sy-30); ctx.lineTo(sx-15, sy+10); ctx.lineTo(sx+15, sy+10); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#a0f';
    ctx.fillRect(sx+12, sy-25, 4, 35);
    ctx.beginPath(); ctx.arc(sx+14, sy-25, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe';
    ctx.beginPath(); ctx.arc(sx, sy-25, 8, 0, Math.PI*2); ctx.fill();
  }
  drawGiant(sx, sy) {
    ctx.fillStyle = '#aef';
    ctx.fillRect(sx-25, sy-40, 50, 60);
    ctx.fillStyle = '#def';
    ctx.beginPath(); ctx.arc(sx, sy-50, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx-30, sy+20, 15, 30); ctx.fillRect(sx+15, sy+20, 15, 30);
  }
  drawDragon(sx, sy) {
    ctx.fillStyle = 'rgba(255,0,0,0.3)';
    ctx.beginPath(); ctx.arc(sx, sy, 80, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.ellipse(sx, sy, 60, 40, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a00';
    ctx.fillRect(sx+40, sy-30, 20, 40);
    ctx.beginPath(); ctx.arc(sx+50, sy-30, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(sx+60, sy-35, 5, 0, Math.PI*2); ctx.fill();
  }
  draw(cam){
    if(!isOnScreen(this.x, this.y, cam, 100)) return;
    const s = worldToScreen(this.x, this.y, cam);
    const sx=s.x, sy=s.y;
    if(this.dead && this.deadTimer<=0) return;
    ctx.save();
    if(this.dead){ ctx.globalAlpha = Math.max(0, this.deadTimer/1.5); }
    switch(this.type){
      case 'worm':     this.drawWorm(sx,sy); break;
      case 'wolf':     this.drawWolf(sx,sy); break;
      case 'skeleton': this.drawSkeleton(sx,sy); break;
      case 'golem':    this.drawGolem(sx,sy); break;
      case 'harpy':    this.drawHarpy(sx,sy); break;
      case 'troll':    this.drawTroll(sx,sy); break;
      case 'orc_warrior': this.drawOrc(sx,sy); break;
      case 'dark_mage':    this.drawMage(sx,sy); break;
      case 'frost_giant':  this.drawGiant(sx,sy); break;
      case 'ancient_dragon': this.drawDragon(sx,sy); break;
    }
    if(!this.dead && this.damaged){
      const bw=50, bh=6, bx=sx-bw/2, by=sy-55;
      ctx.fillStyle='#300';
      ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#f22';
      ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
      ctx.strokeStyle='#600'; ctx.lineWidth=1;
      ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle='#fff'; ctx.font='10px Arial'; ctx.textAlign='center';
      ctx.fillText(this.name+' Lv'+this.level,sx,by-2);
    }
    ctx.restore();
    if(this.dead){ this.deadTimer -= 1/60; }
  }
}

// === PARTICLE SYSTEM ===
class ParticleSystem {
  constructor(){ this.particles = []; }
  
  spawn(type, x, y, text, angle = 0){
    switch(type){
      case 'hit':
        for(let i=0;i<6;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(50, 130);
          this.particles.push({
            type:'hit', x, y, 
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 20,
            life: 0.5, maxLife: 0.5, color: '#f80', size: 3
          });
        }
        break;
        
      case 'crit':
        this.particles.push({type:'text', x, y: y-40, vy:-60, life:1.5, maxLife:1.5, text: text||'CRIT!', color:'#ff0', size:24});
        for(let i=0;i<12;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(100, 200);
          this.particles.push({
            type:'spark', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 60,
            life: 0.9, maxLife: 0.9, color: '#ff0', size: 4
          });
        }
        break;
        
      case 'slash':
        for(let i=0;i<8;i++){
          const offsetAng = angle + rnd(-0.4, 0.4);
          const dist = rnd(30, 70);
          const vx = Math.cos(angle)*rnd(80, 150);
          const vy = Math.sin(angle)*rnd(80, 150);
          this.particles.push({
            type:'slash', 
            x: x + Math.cos(offsetAng)*dist, 
            y: y + Math.sin(offsetAng)*dist,
            vx: vx, vy: vy,
            life: 0.35, maxLife: 0.35,
            color: `hsl(${rnd(40, 60)}, 100%, ${rnd(60, 80)}%)`,
            size: rnd(4, 8)
          });
        }
        break;
        
      case 'damage':
        this.particles.push({type:'text', x, y: y-30, vy:-50, life:1.0, maxLife:1.0, text, color:'#f44', size: isMobile?16:18});
        break;
        
      case 'heal':
        this.particles.push({type:'text', x, y: y-30, vy:-50, life:1.2, maxLife:1.2, text, color:'#4f4', size: isMobile?16:18});
        for(let i=0;i<5;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(30, 80);
          this.particles.push({
            type:'healRing', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 30,
            life: 0.8, maxLife: 0.8, color: '#8f8', size: 6
          });
        }
        break;
        
      case 'exp':
        this.particles.push({type:'text', x, y: y-40, vy:-60, life:1.4, maxLife:1.4, text, color:'#fd0', size: 14});
        break;
        
      case 'noah':
        this.particles.push({type:'text', x, y: y-40, vy:-55, life:1.2, maxLife:1.2, text, color:'#ffa500', size: 14});
        break;
        
      case 'levelup':
        for(let i=0;i<60;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(80, 250);
          const hue = rnd(0, 360);
          this.particles.push({
            type:'firework', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 80,
            life: 1.5, maxLife: 1.5, color: `hsl(${hue},100%,60%)`, size: 5
          });
        }
        this.particles.push({type:'text', x, y: y-60, vy:-40, life:3.0, maxLife:3.0, text:'LEVEL UP!', color:'#fd0', size: 32});
        G.screenShake = 0.6;
        break;
        
      case 'blood':
        for(let i=0;i<12;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(60, 140);
          this.particles.push({
            type:'blood', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 50,
            life: 0.7, maxLife: 0.7, color: '#a00', r: rnd(3, 7)
          });
        }
        break;
        
      case 'spark':
        for(let i=0;i<15;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(80, 200);
          const c = Math.random()<0.5?'#ff0':'#f80';
          this.particles.push({
            type:'spark', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 70,
            life: 0.9, maxLife: 0.9, color: c, size: 3
          });
        }
        break;
        
      case 'burn':
        for(let i=0;i<18;i++){
          const ang = rnd(-Math.PI*0.8, -Math.PI*0.2);
          const spd = rnd(50, 140);
          const c = Math.random()<0.5?'#f60':'#222';
          this.particles.push({
            type:'burn', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
            life: 1.2, maxLife: 1.2, color: c, r: rnd(4, 12)
          });
        }
        break;
        
      case 'buff':
        for(let i=0;i<20;i++){
          const ang = rnd(0, Math.PI*2);
          const spd = rnd(30, 100);
          this.particles.push({
            type:'buffStar', x, y,
            vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 100,
            life: 1.2, maxLife: 1.2, color: '#ffa', size: 6
          });
        }
        break;
    }
  }
  
  update(dt){
    for(let i=this.particles.length-1; i>=0; i--){
      const p = this.particles[i];
      p.life -= dt;
      if(p.life <= 0){ this.particles.splice(i,1); continue; }
      
      if(p.vx !== undefined){
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        if(p.type === 'blood' || p.type === 'burn' || p.type === 'spark') p.vy += 200 * dt;
        if(p.type === 'firework') p.vy += 150 * dt;
        if(p.type === 'buffStar') p.vy -= 20 * dt;
      }
      
      if(p.type === 'slash'){
        p.size *= (1 - dt*2);
      }
    }
  }
  
  draw(cam){
    for(const p of this.particles){
      const s = worldToScreen(p.x, p.y, cam);
      const alpha = Math.min(1, p.life / p.maxLife * 1.5);
      ctx.globalAlpha = alpha;
      
      if(p.type === 'text' || p.type === 'crit'){
        ctx.fillStyle = p.color;
        ctx.font = `bold ${p.size || 14}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, s.x, s.y);
      } else if(p.type === 'hit' || p.type === 'spark'){
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(s.x, s.y, p.size || 3, 0, Math.PI*2); ctx.fill();
      } else if(p.type === 'blood' || p.type === 'burn'){
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(s.x, s.y, p.r || 5, 0, Math.PI*2); ctx.fill();
      } else if(p.type === 'firework' || p.type === 'buffStar' || p.type === 'healRing'){
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(s.x, s.y, p.size || 4, 0, Math.PI*2); ctx.fill();
      } else if(p.type === 'slash'){
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(Math.atan2(p.vy, p.vx));
        ctx.fillStyle = p.color;
        ctx.shadowColor = '#ff8';
        ctx.shadowBlur = 12 * alpha;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size*2, p.size*0.5, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;
  }
}

// === SKILL TREE ===
class SkillTree {
  constructor(){
    this.skills = {};
    this.cooldowns = {};
    for(const id of SKILL_ORDER){
      this.skills[id] = 0;
      this.cooldowns[id] = 0;
    }
  }
  upgrade(id, player){
    const def = SKILL_DEFS[id];
    if(!def) return;
    if(player.level < def.unlockLv) return;
    if(this.skills[id] >= def.maxLv) return;
    if(player.skillPoints <= 0) return;
    player.skillPoints--;
    this.skills[id]++;
  }
  canUse(id, player){
    const def = SKILL_DEFS[id];
    if(!def) return false;
    if(this.skills[id]<=0) return false;
    if(player.level < def.unlockLv) return false;
    if(this.cooldowns[id]>0) return false;
    if(player.mp < def.mp) return false;
    return true;
  }
  use(id, player, mobs){
    if(!this.canUse(id,player)) return false;
    const def = SKILL_DEFS[id];
    const lv = this.skills[id];
    player.mp -= def.mp;
    this.cooldowns[id] = def.cd;
    switch(id){
      case 'slash': this.doSlash(player,mobs,lv); break;
      case 'shield_bash': this.doShieldBash(player,mobs,lv); break;
      case 'charge': this.doCharge(player,mobs,lv); break;
      case 'whirlwind': this.doWhirlwind(player,mobs,lv); break;
      case 'war_cry': this.doWarCry(player,lv); break;
      case 'earthquake': this.doEarthquake(player,mobs,lv); break;
      case 'blade_storm': this.doBladeStorm(player,mobs,lv); break;
    }
    return true;
  }
  doSlash(player,mobs,lv){
    const mult = 1.5 + (lv-1)*0.375;
    const range = 80;
    const coneAngle = Math.PI/2;
    for(const mob of mobs){
      if(mob.dead) continue;
      const d=dist(player,mob);
      if(d>range) continue;
      const ang=Math.atan2(mob.y-player.y,mob.x-player.x);
      let diff = ang - player.facingAngle;
      while(diff>Math.PI) diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      if(Math.abs(diff)<coneAngle/2){
        const dmg = Math.floor(player.getAtk()*mult);
        mob.takeDamage(dmg, false);
      }
    }
    G.particles.spawn('spark',player.x,player.y,'');
    G.particles.spawn('slash', player.x, player.y, '', player.facingAngle);
  }
  doShieldBash(player,mobs,lv){
    const stunDur = 1 + (lv-1)*0.25;
    const range = 60;
    const dmg = Math.floor(player.getAtk()*0.8);
    for(const mob of mobs){
      if(mob.dead) continue;
      if(dist(player,mob)<range){
        mob.takeDamage(dmg,false);
        mob.stunTimer = stunDur;
      }
    }
    G.particles.spawn('spark',player.x,player.y,'');
  }
  doCharge(player,mobs,lv){
    const dist2 = 250 + lv*10;
    const spd = 800;
    player.chargeVx = Math.cos(player.facingAngle)*spd;
    player.chargeVy = Math.sin(player.facingAngle)*spd;
    player.chargeTimer = dist2/spd;
    const dmg = Math.floor(player.getAtk()*1.2);
    for(const mob of mobs){
      if(mob.dead) continue;
      const ang = Math.atan2(mob.y-player.y,mob.x-player.x);
      let diff=ang-player.facingAngle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      if(Math.abs(diff)<0.4 && dist(player,mob)<dist2){
        mob.takeDamage(dmg,false);
      }
    }
  }
  doWhirlwind(player,mobs,lv){
    const range = 100 + lv*5;
    const dmg = Math.floor(player.getAtk()*(1+lv*0.3));
    for(const mob of mobs){
      if(mob.dead) continue;
      if(dist(player,mob)<range) mob.takeDamage(dmg,false);
    }
    for(let i=0;i<20;i++){
      const ang=rnd(0,Math.PI*2);
      G.particles.spawn('spark',player.x+Math.cos(ang)*50,player.y+Math.sin(ang)*50,'');
    }
  }
  doWarCry(player,lv){
    const pct = 0.15 + (lv-1)*0.0625;
    const dur = 8 + (lv-1)*3;
    player.warCryAtk = player.getAtk()*pct;
    player.warCryDef = player.getDef()*pct;
    player.warCryTimer = dur;
    player.atkBuff = pct;
    player.atkBuffTimer = dur;
    G.particles.spawn('levelup',player.x,player.y,'WAR CRY!');
    G.particles.spawn('buff', player.x, player.y-30, '');
  }
  doEarthquake(player,mobs,lv){
    const range = 150 + lv*10;
    const dmg = Math.floor(player.getAtk()*(2+lv*0.5));
    const kbForce = 200 + lv*30;
    for(const mob of mobs){
      if(mob.dead) continue;
      const d=dist(player,mob);
      if(d<range){
        mob.takeDamage(dmg,false);
        const ang=Math.atan2(mob.y-player.y,mob.x-player.x);
        mob.knockbackVx=Math.cos(ang)*kbForce;
        mob.knockbackVy=Math.sin(ang)*kbForce;
        mob.knockbackTimer=0.4;
      }
    }
    G.screenShake = 0.5;
    for(let i=0;i<30;i++){
      const ang=rnd(0,Math.PI*2), r=rnd(20,150);
      G.particles.spawn('blood',player.x+Math.cos(ang)*r,player.y+Math.sin(ang)*r,'');
    }
  }
  doBladeStorm(player,mobs,lv){
    const range = 200 + lv*10;
    const mult = 4 + (lv-1)*1.5;
    const dmg = Math.floor(player.getAtk()*mult);
    for(const mob of mobs){
      if(mob.dead) continue;
      if(dist(player,mob)<range) mob.takeDamage(dmg,true);
    }
    for(let i=0;i<50;i++){
      const ang=rnd(0,Math.PI*2), r=rnd(20,200);
      G.particles.spawn('spark',player.x+Math.cos(ang)*r,player.y+Math.sin(ang)*r,'');
    }
  }
  update(dt){
    for(const id of SKILL_ORDER){
      if(this.cooldowns[id]>0) this.cooldowns[id]-=dt;
    }
  }
  serialize(){
    return Object.fromEntries(SKILL_ORDER.map(id=>[id,this.skills[id]]));
  }
  static deserialize(d){
    const st = new SkillTree();
    if(d) for(const id of SKILL_ORDER) if(d[id]!==undefined) st.skills[id]=d[id];
    return st;
  }
}

// === QUEST LOG ===
class QuestLog {
  constructor(){
    this.quests = {};
    for(const q of QUEST_DEFS){
      this.quests[q.id] = { status:'locked', progress:0 };
    }
  }
  update(player){
    for(const qd of QUEST_DEFS){
      const qs = this.quests[qd.id];
      if(qs.status==='locked' && player.level>=qd.unlockLv){ qs.status='available'; }
      if(qs.status==='active' && qd.collectNoah && player.inventory.noah>=qd.collectNoah){
        qs.progress = player.inventory.noah;
      }
    }
  }
  accept(id){
    const qs = this.quests[id];
    if(qs && qs.status==='available') qs.status='active';
  }
  abandon(id){
    const qs = this.quests[id];
    if(qs && qs.status==='active'){ qs.status='available'; qs.progress=0; }
  }
  onKill(mobType){
    for(const qd of QUEST_DEFS){
      if(!qd.killType) continue;
      const qs = this.quests[qd.id];
      if(qs.status!=='active') continue;
      if(qd.killType===mobType){
        qs.progress++;
        if(qs.progress>=qd.killCount) this.complete(qd.id);
      }
    }
  }
  checkNoah(noah){
    for(const qd of QUEST_DEFS){
      if(!qd.collectNoah) continue;
      const qs = this.quests[qd.id];
      if(qs.status!=='active') continue;
      qs.progress = noah;
      if(noah>=qd.collectNoah) this.complete(qd.id);
    }
  }
  complete(id){
    const qs = this.quests[id];
    const qd = QUEST_DEFS.find(q=>q.id===id);
    if(!qs||!qd||qs.status==='completed') return;
    qs.status='completed';
    G.player.gainExp(qd.rewards.exp);
    G.player.inventory.noah += qd.rewards.noah;
    for(const iid of (qd.rewards.items||[])){
      G.player.inventory.addItem(new Item(iid));
    }
    G.particles.spawn('levelup',G.player.x,G.player.y,'QUEST COMPLETE!');
  }
  getActive(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='active'); }
  getAvailable(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='available'); }
  getCompleted(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='completed'); }
  serialize(){
    return Object.fromEntries(Object.entries(this.quests).map(([k,v])=>[k,{status:v.status,progress:v.progress}]));
  }
  static deserialize(d){
    const ql = new QuestLog();
    if(d) for(const id in d){ if(ql.quests[id]) Object.assign(ql.quests[id],d[id]); }
    return ql;
  }
}
// === VIRTUAL JOYSTICK ===
class VirtualJoystick {
  constructor(){
    this.active=false;
    this.baseX=120; this.baseY=H-120;
    this.stickX=this.baseX; this.stickY=this.baseY;
    this.nx=0; this.ny=0;
    this.touchId=null;
  }
  resetBase(){
    if(!this.active){
      this.baseX=120; this.baseY=H-120;
      this.stickX=this.baseX; this.stickY=this.baseY;
    }
  }
  onTouchStart(t){
    if(t.clientX<W/2 && this.touchId===null){
      this.active=true;
      this.touchId=t.identifier;
      this.baseX=t.clientX; this.baseY=t.clientY;
      this.stickX=this.baseX; this.stickY=this.baseY;
    }
  }
  onTouchMove(t){
    if(t.identifier!==this.touchId) return;
    const dx=t.clientX-this.baseX, dy=t.clientY-this.baseY;
    const d=Math.hypot(dx,dy);
    const maxR=60;
    const r=Math.min(d,maxR);
    const ang=Math.atan2(dy,dx);
    this.stickX=this.baseX+Math.cos(ang)*r;
    this.stickY=this.baseY+Math.sin(ang)*r;
    this.nx=Math.cos(ang)*(r/maxR);
    this.ny=Math.sin(ang)*(r/maxR);
  }
  onTouchEnd(t){
    if(t.identifier===this.touchId){
      this.active=false; this.touchId=null;
      this.nx=0; this.ny=0;
      this.baseX=120; this.baseY=H-120;
      this.stickX=this.baseX; this.stickY=this.baseY;
    }
  }
  draw(){
    if(!this.active) return;
    ctx.globalAlpha=0.4;
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(this.baseX,this.baseY,60,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(this.baseX,this.baseY,60,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.7;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(this.stickX,this.stickY,25,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// === WORLD GENERATOR ===
class WorldGenerator {
  constructor(){
    this.decorations = [];
    this.patches     = [];
    this.waterSegs   = [];
    this.paths       = [];
    this.landmarks   = [];
    this.lavaCracks  = [];
    this.generate();
  }

  getZone(wx,wy){
    const hd = Math.hypot(wx - WORLD_W*0.72, wy - WORLD_H*0.72);
    if(hd < 1600) return 'dark';
    if(wx > 1400 || wy > 1400) return 'mid';
    return 'start';
  }

  generate(){
    const rng = (a,b)=>rnd(a,b);

    for(let i=0;i<200;i++){
      this.patches.push({ x:rng(50,2300), y:rng(50,2300),
        rx:rng(20,80), ry:rng(15,55), angle:rng(0,Math.PI),
        color:`rgba(${rndInt(30,55)},${rndInt(70,100)},${rndInt(20,40)},0.45)` });
    }
    for(let i=0;i<160;i++){
      this.patches.push({ x:rng(1200,4000), y:rng(1200,4000),
        rx:rng(25,90), ry:rng(20,60), angle:rng(0,Math.PI),
        color:`rgba(${rndInt(80,110)},${rndInt(60,80)},${rndInt(20,35)},0.38)` });
    }
    for(let i=0;i<140;i++){
      this.patches.push({ x:rng(2800,5000), y:rng(2800,5000),
        rx:rng(30,100), ry:rng(20,65), angle:rng(0,Math.PI),
        color:`rgba(${rndInt(15,35)},${rndInt(10,25)},${rndInt(10,20)},0.5)` });
    }

    for(let y=0; y<2400; y+=30){
      const ox = Math.sin(y*0.008)*60;
      this.waterSegs.push({ x:1390+ox, y, w:rng(28,52) });
    }
    this.waterSegs.push({ type:'lake', x:1600, y:1700, rx:140, ry:90, angle:0.4 });

    const road1 = [];
    let rx=500, ry=500;
    while(rx<4200 && ry<4200){
      road1.push({x:rx, y:ry});
      rx += rng(60,100); ry += rng(40,80);
    }
    this.paths.push({ pts:road1, w:18, color:'#4a3820' });
    const road2 = [];
    let rx2=800, ry2=1200;
    while(rx2<2700){ road2.push({x:rx2,y:ry2}); rx2+=rng(50,90); ry2+=rng(-20,60); }
    this.paths.push({ pts:road2, w:12, color:'#3a2e18' });

    for(let i=0;i<220;i++){
      const x=rng(0,2400), y=rng(0,2400);
      if(Math.hypot(x-500,y-500)<220) continue;
      if(Math.abs(x-1390)<65) continue;
      this.decorations.push({ type:'tree', x, y,
        r:rng(9,18), h:rng(22,42),
        leafCol: `hsl(${rndInt(100,130)},${rndInt(45,70)}%,${rndInt(22,36)}%)`,
        trunkCol:'#4a3018' });
    }
    for(let i=0;i<120;i++){
      const x=rng(1400,3900), y=rng(1400,3900);
      this.decorations.push({ type:'dead_tree', x, y, h:rng(18,38), r:rng(5,10) });
    }
    for(let i=0;i<100;i++){
      const x=rng(2900,5000), y=rng(2900,5000);
      this.decorations.push({ type:'dark_rock', x, y,
        rx:rng(12,28), ry:rng(9,20), angle:rng(0,Math.PI) });
    }
    for(let i=0;i<250;i++){
      const x=rng(0,WORLD_W), y=rng(0,WORLD_H);
      const z=this.getZone(x,y);
      const col = z==='dark'?'#3a3030': z==='mid'?'#6a5a40':'#556655';
      this.decorations.push({ type:'rock', x, y,
        rx:rng(6,18), ry:rng(5,13), angle:rng(0,Math.PI), color:col });
    }
    for(let i=0;i<30;i++){
      this.decorations.push({ type:'grave', x:rng(2300,2800), y:rng(1200,1800),
        h:rng(18,32), tilt:rng(-0.3,0.3) });
    }
    const campfirePositions = [
      {x:1100,y:600},{x:1600,y:900},{x:2200,y:1000},
      {x:2500,y:1500},{x:2700,y:2000},
      {x:3200,y:2800},{x:3600,y:2400},
      {x:4000,y:3500},{x:4400,y:4000},{x:4200,y:4500},
    ];
    for(const cf of campfirePositions){
      this.decorations.push({ type:'campfire', x:cf.x, y:cf.y });
    }
    for(let i=0;i<8;i++){
      const ang=i/8*Math.PI*2;
      this.decorations.push({ type:'ruin_wall', x:3900+Math.cos(ang)*180, y:3900+Math.sin(ang)*180,
        w:rng(30,70), h:rng(40,90), angle:ang });
    }
    const housePos=[{x:380,y:420},{x:620,y:380},{x:350,y:620},{x:650,y:600}];
    for(const hp of housePos){
      this.decorations.push({ type:'house', x:hp.x, y:hp.y });
    }

    for(let i=0;i<25;i++){
      const sx=rng(3000,4900), sy=rng(3000,4900);
      const pts=[{x:sx,y:sy}];
      let cx=sx, cy=sy;
      for(let j=0;j<rndInt(4,10);j++){
        cx+=rng(-80,80); cy+=rng(-80,80);
        cx=clamp(cx,2900,5000); cy=clamp(cy,2900,5000);
        pts.push({x:cx,y:cy});
      }
      this.lavaCracks.push(pts);
    }
    this.decorations.sort((a,b)=>a.y-b.y);
  }

  draw(cam){
    const t = Date.now()*0.001;

    const bA=worldToScreen(0,0,cam), bB=worldToScreen(WORLD_W,WORLD_H,cam);
    ctx.fillStyle='#3a2e1a';
    ctx.fillRect(bA.x,bA.y,bB.x-bA.x,bB.y-bA.y);

    const s1a=worldToScreen(0,0,cam), s1b=worldToScreen(2400,2400,cam);
    ctx.fillStyle='#1c2e16';
    ctx.fillRect(s1a.x,s1a.y,s1b.x-s1a.x,s1b.y-s1a.y);

    const s3a=worldToScreen(2900,2900,cam), s3b=worldToScreen(WORLD_W,WORLD_H,cam);
    ctx.fillStyle='#1a1518';
    ctx.fillRect(s3a.x,s3a.y,s3b.x-s3a.x,s3b.y-s3a.y);

    const grad1=ctx.createLinearGradient(
      worldToScreen(2100,0,cam).x,0, worldToScreen(2600,0,cam).x,0);
    grad1.addColorStop(0,'rgba(28,46,22,0.9)');
    grad1.addColorStop(1,'rgba(58,46,26,0.0)');
    const t1a=worldToScreen(2100,0,cam), t1b=worldToScreen(2600,WORLD_H,cam);
    ctx.fillStyle=grad1;
    ctx.fillRect(t1a.x,t1a.y,t1b.x-t1a.x,t1b.y-t1a.y);

    const grad2=ctx.createLinearGradient(
      worldToScreen(2800,0,cam).x,0, worldToScreen(3200,0,cam).x,0);
    grad2.addColorStop(0,'rgba(58,46,26,0.9)');
    grad2.addColorStop(1,'rgba(26,21,24,0.0)');
    const t2a=worldToScreen(2800,0,cam), t2b=worldToScreen(3200,WORLD_H,cam);
    ctx.fillStyle=grad2;
    ctx.fillRect(t2a.x,t2a.y,t2b.x-t2a.x,t2b.y-t2a.y);

    for(const p of this.patches){
      const ps=worldToScreen(p.x,p.y,cam);
      if(ps.x<-200||ps.x>W+200||ps.y<-200||ps.y>H+200) continue;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.ellipse(ps.x,ps.y,p.rx,p.ry,p.angle,0,Math.PI*2);
      ctx.fill();
    }

    ctx.save();
    for(const seg of this.waterSegs){
      if(seg.type==='lake'){
        const ls=worldToScreen(seg.x,seg.y,cam);
        if(ls.x<-300||ls.x>W+300||ls.y<-300||ls.y>H+300) continue;
        const wr=ctx.createRadialGradient(ls.x,ls.y,0,ls.x,ls.y,seg.rx);
        wr.addColorStop(0,'rgba(30,80,130,0.75)');
        wr.addColorStop(0.7,'rgba(20,60,110,0.7)');
        wr.addColorStop(1,'rgba(10,40,80,0.4)');
        ctx.fillStyle=wr;
        ctx.beginPath();
        ctx.ellipse(ls.x,ls.y,seg.rx,seg.ry,seg.angle,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle='rgba(100,180,255,0.08)';
        ctx.beginPath();
        ctx.ellipse(ls.x-seg.rx*0.2,ls.y-seg.ry*0.2,seg.rx*0.4,seg.ry*0.3,seg.angle,0,Math.PI*2);
        ctx.fill();
      } else {
        const ws=worldToScreen(seg.x,seg.y,cam);
        if(ws.x<-80||ws.x>W+80||ws.y<-10||ws.y>H+10) continue;
        const ww=seg.w;
        ctx.fillStyle='rgba(25,70,120,0.68)';
        ctx.fillRect(ws.x-ww/2, ws.y, ww, 32);
        const shine = (Math.sin(t*1.5+seg.y*0.005)*0.5+0.5)*0.12;
        ctx.fillStyle=`rgba(120,200,255,${shine})`;
        ctx.fillRect(ws.x-ww*0.2, ws.y, ww*0.4, 32);
      }
    }
    ctx.restore();

    for(const path of this.paths){
      if(path.pts.length<2) continue;
      ctx.save();
      ctx.strokeStyle=path.color;
      ctx.lineWidth=path.w;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.globalAlpha=0.7;
      ctx.beginPath();
      const p0=worldToScreen(path.pts[0].x,path.pts[0].y,cam);
      ctx.moveTo(p0.x,p0.y);
      for(let i=1;i<path.pts.length;i++){
        const pi=worldToScreen(path.pts[i].x,path.pts[i].y,cam);
        ctx.lineTo(pi.x,pi.y);
      }
      ctx.stroke();
      ctx.strokeStyle='rgba(80,60,30,0.35)';
      ctx.lineWidth=path.w+4;
      ctx.stroke();
      ctx.restore();
    }

    const lavGlow = Math.sin(t*2)*0.3+0.7;
    for(const crack of this.lavaCracks){
      if(crack.length<2) continue;
      const cs=worldToScreen(crack[0].x,crack[0].y,cam);
      if(cs.x<-200||cs.x>W+200||cs.y<-200||cs.y>H+200){
        const lastS=worldToScreen(crack[crack.length-1].x,crack[crack.length-1].y,cam);
        if(lastS.x<-200||lastS.x>W+200||lastS.y<-200||lastS.y>H+200) continue;
      }
      ctx.save();
      ctx.shadowColor=`rgba(255,120,0,${lavGlow*0.8})`;
      ctx.shadowBlur=8;
      ctx.strokeStyle=`rgba(255,${rndInt(80,130)},10,${lavGlow*0.9})`;
      ctx.lineWidth=3;
      ctx.lineCap='round';
      ctx.beginPath();
      const lp=worldToScreen(crack[0].x,crack[0].y,cam);
      ctx.moveTo(lp.x,lp.y);
      for(let i=1;i<crack.length;i++){
        const lpi=worldToScreen(crack[i].x,crack[i].y,cam);
        ctx.lineTo(lpi.x,lpi.y);
      }
      ctx.stroke();
      ctx.shadowBlur=0;
      ctx.restore();
    }

    for(const d of this.decorations){
      const s=worldToScreen(d.x,d.y,cam);
      if(s.x<-120||s.x>W+120||s.y<-120||s.y>H+120) continue;

      if(d.type==='tree'){
        ctx.fillStyle='rgba(0,0,0,0.18)';
        ctx.beginPath(); ctx.ellipse(s.x+6,s.y+4,d.r*0.9,d.r*0.35,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=d.trunkCol||'#4a3018';
        ctx.fillRect(s.x-3,s.y-d.h*0.38,6,d.h*0.4);
        ctx.fillStyle=d.leafCol||'#2a5a2a';
        ctx.beginPath(); ctx.arc(s.x,s.y-d.h*0.38,d.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(80,160,60,0.45)';
        ctx.beginPath(); ctx.arc(s.x-d.r*0.25,s.y-d.h*0.38-d.r*0.3,d.r*0.65,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(120,200,80,0.22)';
        ctx.beginPath(); ctx.arc(s.x+d.r*0.15,s.y-d.h*0.38-d.r*0.5,d.r*0.4,0,Math.PI*2); ctx.fill();
      } else if(d.type==='dead_tree'){
        ctx.strokeStyle='#3a2a18'; ctx.lineWidth=4; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x,s.y-d.h); ctx.stroke();
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(s.x,s.y-d.h*0.55); ctx.lineTo(s.x-d.r*2.2,s.y-d.h*0.78); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s.x,s.y-d.h*0.7);  ctx.lineTo(s.x+d.r*1.8,s.y-d.h*0.88); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s.x,s.y-d.h*0.85); ctx.lineTo(s.x-d.r*1.2,s.y-d.h*0.98); ctx.stroke();
      } else if(d.type==='rock'){
        ctx.fillStyle=d.color||'#665';
        ctx.beginPath(); ctx.ellipse(s.x,s.y,d.rx,d.ry,d.angle,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.beginPath(); ctx.ellipse(s.x-d.rx*0.2,s.y-d.ry*0.25,d.rx*0.45,d.ry*0.4,d.angle,0,Math.PI*2); ctx.fill();
      } else if(d.type==='dark_rock'){
        ctx.fillStyle='#282020';
        ctx.beginPath(); ctx.ellipse(s.x,s.y,d.rx,d.ry,d.angle,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#3a2828';
        ctx.beginPath(); ctx.ellipse(s.x,s.y,d.rx*0.6,d.ry*0.55,d.angle+0.5,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(200,50,0,0.15)'; ctx.lineWidth=1;
        ctx.stroke();
      } else if(d.type==='grave'){
        ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(d.tilt||0);
        ctx.fillStyle='#555';
        ctx.fillRect(-7,-d.h,14,d.h*0.75);
        ctx.beginPath(); ctx.arc(0,-d.h,7,Math.PI,0); ctx.fill();
        ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(0,-d.h*0.85); ctx.lineTo(0,-d.h*0.45); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-5,-d.h*0.68); ctx.lineTo(5,-d.h*0.68); ctx.stroke();
        ctx.fillStyle='#3a3020';
        ctx.beginPath(); ctx.ellipse(0,2,14,5,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      } else if(d.type==='campfire'){
        const flame = Math.sin(t*4+d.x*0.01)*0.4+0.6;
        ctx.fillStyle='#3a2010';
        ctx.fillRect(s.x-8,s.y-2,16,4);
        ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(1.1);
        ctx.fillRect(-8,-2,16,4); ctx.restore();
        ctx.save();
        ctx.shadowColor=`rgba(255,140,0,${flame*0.9})`; ctx.shadowBlur=20;
        ctx.fillStyle=`rgba(255,220,60,${flame*0.9})`;
        ctx.beginPath(); ctx.moveTo(s.x,s.y-16*flame); ctx.lineTo(s.x-6,s.y); ctx.lineTo(s.x+6,s.y); ctx.closePath(); ctx.fill();
        ctx.fillStyle=`rgba(255,80,0,${flame*0.7})`;
        ctx.beginPath(); ctx.moveTo(s.x+2,s.y-10*flame); ctx.lineTo(s.x-8,s.y); ctx.lineTo(s.x+8,s.y); ctx.closePath(); ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
        ctx.fillStyle=`rgba(255,140,0,${0.06*flame})`;
        ctx.beginPath(); ctx.arc(s.x,s.y,40,0,Math.PI*2); ctx.fill();
      } else if(d.type==='house'){
        ctx.fillStyle='#5a4030';
        ctx.fillRect(s.x-18,s.y-20,36,22);
        ctx.fillStyle='#7a4020';
        ctx.beginPath(); ctx.moveTo(s.x,s.y-38); ctx.lineTo(s.x-22,s.y-18); ctx.lineTo(s.x+22,s.y-18); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#3a2010';
        ctx.fillRect(s.x-6,s.y-10,12,12);
        ctx.fillStyle='rgba(255,220,100,0.4)';
        ctx.fillRect(s.x-16,s.y-16,8,7);
        ctx.fillRect(s.x+8,s.y-16,8,7);
      } else if(d.type==='ruin_wall'){
        ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(d.angle);
        ctx.fillStyle='#2a2020';
        ctx.fillRect(-d.w/2,-(d.h),d.w,d.h);
        ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(-d.w*0.2,-d.h*0.3); ctx.lineTo(d.w*0.1,-d.h*0.7);
        ctx.moveTo(d.w*0.2,-d.h*0.1); ctx.lineTo(-d.w*0.1,-d.h*0.5);
        ctx.stroke();
        ctx.restore();
      }
    }

    {
      const vs=worldToScreen(500,500,cam);
      if(vs.x>-200&&vs.x<W+200&&vs.y>-200&&vs.y<H+200){
        ctx.fillStyle='rgba(80,65,35,0.55)';
        ctx.beginPath(); ctx.arc(vs.x,vs.y,90,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#3a2a18';
        ctx.beginPath(); ctx.arc(vs.x,vs.y,14,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#6a5030'; ctx.lineWidth=4;
        ctx.stroke();
        ctx.fillStyle='rgba(20,40,80,0.8)';
        ctx.beginPath(); ctx.arc(vs.x,vs.y,10,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,220,100,0.5)'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
        ctx.fillText('⚜ KÖYBAŞI ⚜',vs.x,vs.y-100);
      }
    }

    ctx.globalAlpha=0.055; ctx.font='bold 52px Arial'; ctx.textAlign='center';
    const zones=[
      {wx:900, wy:900,  label:'ORMAN', col:'#4a8a4a'},
      {wx:2200,wy:2200, label:'ÇORAK ARAZİ', col:'#8a7040'},
      {wx:4000,wy:4000, label:'KARANLIK BÖLGE', col:'#8a3030'},
    ];
    for(const z of zones){
      const zs=worldToScreen(z.wx,z.wy,cam);
      if(zs.x>-300&&zs.x<W+300&&zs.y>-100&&zs.y<H+100){
        ctx.fillStyle=z.col; ctx.fillText(z.label,zs.x,zs.y);
      }
    }
    ctx.globalAlpha=1;

    const bA2=worldToScreen(0,0,cam), bB2=worldToScreen(WORLD_W,WORLD_H,cam);
    const brdGrad=ctx.createLinearGradient(bA2.x,0,bA2.x+30,0);
    brdGrad.addColorStop(0,'rgba(0,0,0,0.5)');
    brdGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=brdGrad; ctx.fillRect(bA2.x,bA2.y,30,bB2.y-bA2.y);
    ctx.strokeStyle='#6a5020'; ctx.lineWidth=6;
    ctx.strokeRect(bA2.x,bA2.y,bB2.x-bA2.x,bB2.y-bA2.y);
    ctx.strokeStyle='rgba(255,200,0,0.25)'; ctx.lineWidth=2;
    ctx.strokeRect(bA2.x+3,bA2.y+3,bB2.x-bA2.x-6,bB2.y-bA2.y-6);
  }
}

function initGame(fresh){
  G.player = new Player();
  G.camera = new Camera();
  G.particles = new ParticleSystem();
  G.world = new WorldGenerator();
  G.joystick = new VirtualJoystick();
  G.skills = new SkillTree();
  G.quests = new QuestLog();
  G.mobs = [];
  G.groundItems = [];
  G.screenShake = 0;
  G.pendingStatScreen = false;

  const SAFE_X=500, SAFE_Y=500, SAFE_R=320;

  function spawnCamp(type, campCenters, perCamp, scatter){
    for(const center of campCenters){
      const count = Math.floor(perCamp * (0.8 + Math.random()*0.4));
      for(let i=0;i<count;i++){
        let x,y,tries=0;
        do {
          x = center.x + rnd(-scatter, scatter);
          y = center.y + rnd(-scatter, scatter);
          x = clamp(x, 50, WORLD_W-50);
          y = clamp(y, 50, WORLD_H-50);
          tries++;
        } while(Math.hypot(x-SAFE_X, y-SAFE_Y) < SAFE_R && tries < 20);
        G.mobs.push(new Mob(type, x, y));
      }
    }
  }

  spawnCamp('worm', [

    {x: 2800, y: 3400},
  ], 4, 280);

  spawnCamp('golem', [
    {x: 3000, y: 2800},

    {x: 4000, y: 3700},

// === SAVE / LOAD ===
function saveGame(){
  const p = G.player;
  const data = {
    level: p.level, exp: p.exp, noah: p.inventory.noah,
    str: p.str, dex: p.dex, int: p.int,
    bonHp: p.bonusHp, bonMp: p.bonusMp,
    hp: p.hp, mp: p.mp,
    statPoints: p.statPoints, skillPoints: p.skillPoints,
    inventory: p.inventory.serialize(),
    skills: G.skills.serialize(),
    quests: G.quests.serialize(),
    pos: { x: p.x, y: p.y }
  };
  localStorage.setItem('knight_rpg_save', JSON.stringify(data));
}

function loadGame(){
  const raw = localStorage.getItem('knight_rpg_save');
  if(!raw) return;
  try {
    const d = JSON.parse(raw);
    const p = G.player;
    p.level = d.level||1;
    p.exp = d.exp||0;
    p.expNext = p.expNeeded(p.level);
    p.str = d.str||10; p.dex = d.dex||10; p.int = d.int||5;
    p.bonusHp = d.bonHp||0;
    p.bonusMp = d.bonMp||0;
    p.statPoints = d.statPoints||0; p.skillPoints = d.skillPoints||0;
    p.recalcStats();
    p.hp = Math.min(d.hp||p.maxHp, p.maxHp);
    p.mp = Math.min(d.mp||p.maxMp, p.maxMp);
    if(d.inventory) p.inventory = Inventory.deserialize(d.inventory);
    else { p.inventory = new Inventory(); }
    p.inventory.noah = d.noah||0;
    if(d.skills) G.skills = SkillTree.deserialize(d.skills);
    if(d.quests) G.quests = QuestLog.deserialize(d.quests);
    if(d.pos){ p.x=d.pos.x||500; p.y=d.pos.y||500; }
  } catch(e){ console.warn('Load failed',e); }
}

function hasSave(){ return !!localStorage.getItem('knight_rpg_save'); }

// === HUD DRAWING ===
function drawHUD(){
  const p = G.player;

  let shakeX=0, shakeY=0;
  if(G.screenShake>0){
    shakeX = rnd(-8,8)*G.screenShake;
    shakeY = rnd(-8,8)*G.screenShake;
    ctx.save();
    ctx.translate(shakeX,shakeY);
  }

  const scale  = Math.min(W, H) / 420;
  const barW   = Math.min(200, W * 0.28);
  const barH   = Math.max(12, Math.round(15 * scale));
  const fontSize = Math.max(9, Math.round(11 * scale));
  const barX   = 12, barY = 12;
  const barGap = barH + 5;

  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(barX-2,barY-2,barW+4,barH+4);
  ctx.fillStyle='#500'; ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle='#e22'; ctx.fillRect(barX,barY,barW*(p.hp/p.maxHp),barH);
  ctx.fillStyle='#fff'; ctx.font=`bold ${fontSize}px Arial`; ctx.textAlign='left';
  ctx.fillText(`HP ${Math.floor(p.hp)}/${p.maxHp}`,barX+4,barY+barH-3);

  const mpY = barY + barGap;
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(barX-2,mpY-2,barW+4,barH+4);
  ctx.fillStyle='#005'; ctx.fillRect(barX,mpY,barW,barH);
  ctx.fillStyle='#26e'; ctx.fillRect(barX,mpY,barW*(p.mp/p.maxMp),barH);
  ctx.fillStyle='#fff'; ctx.font=`bold ${fontSize}px Arial`;
  ctx.fillText(`MP ${Math.floor(p.mp)}/${p.maxMp}`,barX+4,mpY+barH-3);

  const expY = mpY + barGap;
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(barX-2,expY-2,barW+4,barH+4);
  ctx.fillStyle='#330'; ctx.fillRect(barX,expY,barW,barH);
  ctx.fillStyle='#da0';
  ctx.fillRect(barX,expY,barW*Math.min(p.exp/p.expNext,1),barH);
  ctx.fillStyle='#fff'; ctx.font=`bold ${fontSize}px Arial`;
  ctx.fillText(`EXP ${p.exp}/${p.expNext}`,barX+4,expY+barH-3);

  const infoY = expY + barGap + 4;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(barX-2,infoY-2,barW+4, Math.round(52*scale));
  ctx.fillStyle='#fd0'; ctx.font=`bold ${Math.round(13*scale)}px Arial`;
  ctx.fillText(`Lv.${p.level}  ⚜ ${p.inventory.noah}`,barX+4,infoY+Math.round(14*scale));
  ctx.fillStyle='#bbb'; ctx.font=`${Math.round(11*scale)}px Arial`;
  ctx.fillText(`STR:${p.str} DEX:${p.dex} INT:${p.int}`,barX+4,infoY+Math.round(28*scale));
  ctx.fillText(`ATK:${Math.floor(p.getAtk())} DEF:${Math.floor(p.getDef())}`,barX+4,infoY+Math.round(43*scale));

  if(p.statPoints>0){
    G.rainbowAngle += 0.04;
    const pulse = Math.sin(Date.now()*0.005)*0.3+0.7;
    ctx.globalAlpha=pulse;
    ctx.fillStyle=`hsl(${(G.rainbowAngle*60)%360},100%,60%)`;
    ctx.font=`bold ${Math.round(13*scale)}px Arial`; ctx.textAlign='left';
    ctx.fillText(`★ STAT POINTS (${p.statPoints}) [P]`,barX,infoY+Math.round(58*scale));
    ctx.globalAlpha=1;
  }
  if(p.skillPoints>0){
    ctx.fillStyle='#c0f';
    ctx.font=`bold ${Math.round(12*scale)}px Arial`;
    const spY2 = infoY + Math.round((p.statPoints>0?73:58)*scale);
    ctx.fillText(`★ SKILL POINTS (${p.skillPoints}) [K]`,barX,spY2);
  }
  if(p.atkBuffTimer>0){
    ctx.fillStyle='#f80'; ctx.font=`${Math.round(11*scale)}px Arial`;
    ctx.fillText(`⚡ ATK BUFF ${Math.ceil(p.atkBuffTimer)}s`,barX,infoY+Math.round(88*scale));
  }

  const active = G.quests.getActive();
  if(active.length>0){
    const q  = active[0];
    const qs = G.quests.quests[q.id];
    const tw = Math.min(220, W*0.30);
    const tx = W - tw - 10, ty = 10;
    const th = isMobile ? 46 : 60;
    drawRoundRect(ctx,tx,ty,tw,th,6,'rgba(0,0,0,0.72)','#a80');
    ctx.fillStyle='#fd0'; ctx.font=`bold ${Math.round(12*scale)}px Arial`; ctx.textAlign='left';
    ctx.fillText(q.name.slice(0,22),tx+7,ty+15);
    ctx.fillStyle='#ccc'; ctx.font=`${Math.round(10*scale)}px Arial`;
    const prog = q.killType ? `${Math.min(qs.progress,q.killCount)}/${q.killCount}` :
                 q.collectNoah ? `${qs.progress}/${q.collectNoah}N` : '';
    ctx.fillText(q.desc.slice(0,28)+' '+prog,tx+7,ty+29);
    const pct = q.killCount ? Math.min(qs.progress/q.killCount,1) :
                q.collectNoah ? Math.min(qs.progress/q.collectNoah,1) : 0;
    ctx.fillStyle='#333'; ctx.fillRect(tx+7,ty+33,tw-14,7);
    ctx.fillStyle='#4f4'; ctx.fillRect(tx+7,ty+33,(tw-14)*pct,7);
  }

  if(!isMobile){
    const sbW=7*56+8, sbX=W/2-sbW/2, sbY=H-70;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    drawRoundRect(ctx,sbX-4,sbY-4,sbW+8,62,8,'rgba(0,0,0,0.8)','#555');
    for(let i=0;i<SKILL_ORDER.length;i++){
      const id=SKILL_ORDER[i];
      const def=SKILL_DEFS[id];
      const lv=G.skills.skills[id];
      const cd=G.skills.cooldowns[id];
      const sx=sbX+i*56, sy2=sbY;
      const unlocked=lv>0&&p.level>=def.unlockLv;
      ctx.fillStyle=unlocked?'rgba(40,30,10,0.9)':'rgba(20,20,20,0.9)';
      drawRoundRect(ctx,sx,sy2,50,54,4,unlocked?'rgba(40,30,10,0.9)':'rgba(20,20,20,0.9)','#444');
      if(unlocked){
        ctx.fillStyle=def.color;
        ctx.beginPath(); ctx.arc(sx+25,sy2+18,16,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
        ctx.fillText(def.name.slice(0,3),sx+25,sy2+23);
        ctx.fillStyle='#aaa'; ctx.font='11px Arial'; ctx.fillText(''+(i+1),sx+25,sy2+40);
        ctx.fillStyle='#fd0'; ctx.font='10px Arial'; ctx.fillText('Lv'+lv,sx+25,sy2+52);
        if(cd>0){
          ctx.fillStyle='rgba(0,0,0,0.65)';
          drawRoundRect(ctx,sx,sy2,50,54,4,'rgba(0,0,0,0.65)',null);
          ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
          ctx.fillText(Math.ceil(cd)+'s',sx+25,sy2+32);
        }
      } else {
        ctx.fillStyle='#555'; ctx.font='10px Arial'; ctx.textAlign='center';
        ctx.fillText('Lv'+def.unlockLv,sx+25,sy2+28);
        ctx.fillStyle='#333'; ctx.font='10px Arial';
        ctx.fillText(def.name.slice(0,5),sx+25,sy2+40);
      }
    }
  }

  const mmS   = isMobile ? 90  : 120;
  const mmPad = isMobile ? 6   : 10;
  const mmBottomOff = isMobile ? Math.min(180, H*0.45) : 75;
  const mmX   = W - mmS - mmPad;
  const mmY   = H - mmS - mmBottomOff;
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(mmX-1,mmY-1,mmS+2,mmS+2);
  ctx.strokeStyle='#666'; ctx.lineWidth=1.5; ctx.strokeRect(mmX,mmY,mmS,mmS);
  const ms = mmS/WORLD_W;
  ctx.fillStyle='#1a2d1a'; ctx.fillRect(mmX, mmY, mmS*0.4, mmS*0.4);
  ctx.fillStyle='#3a2e1a'; ctx.fillRect(mmX, mmY, mmS, mmS);
  ctx.fillStyle='#1a2d1a'; ctx.fillRect(mmX, mmY, mmS*0.4, mmS*0.4);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(mmX+mmS*0.56, mmY+mmS*0.56, mmS*0.44, mmS*0.44);
  for(const mob of G.mobs){
    if(mob.dead) continue;
    ctx.fillStyle = mob.state==='aggro'||mob.state==='attack' ? '#f22' : '#a44';
    ctx.fillRect(mmX+mob.x*ms-1, mmY+mob.y*ms-1, 2, 2);
  }
  ctx.fillStyle='#fd0';
  ctx.beginPath(); ctx.arc(mmX+p.x*ms, mmY+p.y*ms, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='7px Arial'; ctx.textAlign='left';
  ctx.fillText('S',mmX+3,mmY+9);
  ctx.fillText('M',mmX+mmS*0.45,mmY+mmS*0.55);
  ctx.fillText('H',mmX+mmS*0.7,mmY+mmS*0.9);

  if(!isMobile){
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='10px Arial'; ctx.textAlign='right';
    ctx.fillText('I:Envanter  K:Yetenekler  J:Görevler  M:Market',W-8,H-12);
    ctx.fillText('U:Örs  P:Stats  F5:Kaydet  F9:Yükle',W-8,H-24);
  }

  if(G.screenShake>0){ ctx.restore(); G.screenShake-=1/60; }
}
// === PANEL: INVENTORY ===
function drawInventoryPanel(){
  const pw = isMobile ? Math.min(W - 10, 600) : 640;
  const ph = isMobile ? Math.min(H - 20, 480) : 460;
  const px = (W - pw) / 2;
  const py = (H - ph) / 2;
  
  ctx.fillStyle = 'rgba(5,2,10,0.97)';
  drawRoundRect(ctx, px, py, pw, ph, 8, 'rgba(5,2,10,0.97)', '#a80');
  ctx.lineWidth = 2;

  const titleFontSize = isMobile ? 16 : 18;
  const descFontSize = isMobile ? 10 : 12;
  ctx.fillStyle = '#fd0';
  ctx.font = `bold ${titleFontSize}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('INVENTORY', px + pw/2, py + (isMobile ? 24 : 28));
  ctx.fillStyle = '#aaa';
  ctx.font = `${descFontSize}px Arial`;
  ctx.fillText('Click: Use/Equip  Shift+Click: Drop  [I] Close', px + pw/2, py + (isMobile ? 36 : 44));

  const p = G.player;
  const slotSize = isMobile ? Math.min(45, Math.floor((pw - 50) / 6)) : 48;
  const slotPad = isMobile ? 2 : 4;
  const gridX = px + (isMobile ? 6 : 15);
  const gridY = py + (isMobile ? 44 : 55);
  const cols = 6;

  for(let i = 0; i < 42; i++){
    const col = i % cols;
    const row = Math.floor(i / cols);
    const sx = gridX + col * (slotSize + slotPad);
    const sy = gridY + row * (slotSize + slotPad);
    const item = p.inventory.slots[i];
    ctx.fillStyle = G.hoveredSlot === i ? 'rgba(80,60,20,0.8)' : 'rgba(30,20,10,0.8)';
    drawRoundRect(ctx, sx, sy, slotSize, slotSize, 3, G.hoveredSlot === i ? 'rgba(80,60,20,0.8)' : 'rgba(30,20,10,0.8)', '#444');
    if(item && item.valid){
      if(item.enhance >= 7){
        ctx.save();
        const gc = item.getGlowColor();
        if(gc){ ctx.shadowColor = gc; ctx.shadowBlur = 8; }
        else { ctx.shadowColor = `hsl(${(Date.now()*0.2)%360},100%,60%)`; ctx.shadowBlur = 10; }
      }
      ctx.fillStyle = item.color || '#888';
      ctx.beginPath();
      ctx.arc(sx + slotSize/2, sy + slotSize/2, slotSize * 0.3, 0, Math.PI*2);
      ctx.fill();
      if(item.enhance >= 7) ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${isMobile ? 10 : 16}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(item.symbol || '?', sx + slotSize/2, sy + slotSize/2 + (isMobile ? 3 : 6));
      if(item.enhance > 0 && !isMobile){
        ctx.fillStyle = '#fd0';
        ctx.font = 'bold 10px Arial';
        ctx.fillText('+' + item.enhance, sx + slotSize - 8, sy + 12);
      }
      if(item.count > 1){
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${isMobile ? 10 : 12}px Arial`;
        ctx.textAlign = 'right';
        ctx.fillText(item.count, sx + slotSize - 4, sy + slotSize - 4);
      }
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(sx, sy + slotSize - 10, slotSize, 10);
      ctx.fillStyle = '#ccc';
      ctx.font = `${isMobile ? 6 : 9}px Arial`;
      ctx.fillText(item.name.slice(0, isMobile ? 5 : 8), sx + slotSize/2, sy + slotSize - 2);
    }
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, slotSize, slotSize);
  }

  const eqX = px + (cols * (slotSize + slotPad)) + (isMobile ? 4 : 15);
  const eqY = gridY;
  ctx.fillStyle = '#fd0';
  ctx.font = `bold ${isMobile ? 11 : 14}px Arial`;
  ctx.textAlign = 'left';
  ctx.fillText('EQUIP', eqX, eqY + 14);

  const eqWidth = isMobile ? Math.min(130, pw - (eqX - px) - 8) : 270;
  const equipSlotHeight = isMobile ? 36 : 50;
  const equipSlots = [
    {key:'weapon', label:'W', y: eqY + 26},
    {key:'head',   label:'H', y: eqY + 26 + equipSlotHeight + (isMobile ? 2 : 4)},
    {key:'chest',  label:'C', y: eqY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 2},
    {key:'legs',   label:'L', y: eqY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 3},
    {key:'boots',  label:'B', y: eqY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 4},
  ];
  
  for(const es of equipSlots){
    const item = p.inventory.equipment[es.key];
    const hover = G.hoveredEquip === es.key;
    ctx.fillStyle = hover ? 'rgba(80,60,20,0.8)' : 'rgba(30,20,10,0.8)';
    drawRoundRect(ctx, eqX, es.y, eqWidth, equipSlotHeight, 3, hover ? 'rgba(80,60,20,0.8)' : 'rgba(30,20,10,0.8)', '#666');
    ctx.fillStyle = '#888';
    ctx.font = `${isMobile ? 8 : 11}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(es.label, eqX + 4, es.y + (isMobile ? 12 : 16));
    if(item && item.valid){
      if(item.enhance >= 7){
        ctx.save();
        const gc = item.getGlowColor();
        ctx.shadowColor = gc || `hsl(${(Date.now()*0.2)%360},100%,60%)`;
        ctx.shadowBlur = 6;
      }
      ctx.fillStyle = item.color || '#888';
      ctx.beginPath();
      ctx.arc(eqX + (isMobile ? 20 : 20), es.y + equipSlotHeight/2 + (isMobile ? 0 : 4), isMobile ? 8 : 10, 0, Math.PI*2);
      ctx.fill();
      if(item.enhance >= 7) ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${isMobile ? 9 : 13}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(item.symbol, eqX + (isMobile ? 20 : 20), es.y + equipSlotHeight/2 + (isMobile ? 2 : 8));
      if(!isMobile){
        ctx.fillStyle = '#eee';
        ctx.font = '12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(item.getDisplayName().slice(0, 12), eqX + 32, es.y + 18);
        const stats = [];
        if(item.getEnhancedAtk() > 0) stats.push('A+' + item.getEnhancedAtk());
        if(item.getEnhancedDef() > 0) stats.push('D+' + item.getEnhancedDef());
        ctx.fillStyle = '#aaa';
        ctx.font = '10px Arial';
        ctx.fillText(stats.join(' '), eqX + 32, es.y + equipSlotHeight - 4);
      }
    } else {
      ctx.fillStyle = '#444';
      ctx.font = `${isMobile ? 8 : 12}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('-', eqX + eqWidth/2 + (isMobile ? 0 : 10), es.y + equipSlotHeight/2 + (isMobile ? 2 : 6));
    }
  }

  const autoSellX = eqX;
  const autoSellY = isMobile ? py + ph - 36 : eqY + (equipSlotHeight + 4) * 5 + 120;
  const autoSellW = eqWidth;
  const autoSellH = isMobile ? 28 : 38;
  ctx.fillStyle = p.inventory.autoSellMaterials ? 'rgba(0,80,0,0.8)' : 'rgba(80,40,0,0.8)';
  drawRoundRect(ctx, autoSellX, autoSellY, autoSellW, autoSellH, 4, p.inventory.autoSellMaterials ? 'rgba(0,80,0,0.8)' : 'rgba(80,40,0,0.8)', '#fd0');
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${isMobile ? 8 : 12}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`Auto-sell: ${p.inventory.autoSellMaterials ? 'ON' : 'OFF'}`, autoSellX + autoSellW/2, autoSellY + autoSellH/2 + (isMobile ? 3 : 4));

  if(G.hoveredSlot >= 0 && G.hoveredSlot < 42){
    const item = p.inventory.slots[G.hoveredSlot];
    if(item && item.valid) drawItemTooltip(item, G.mouseX, G.mouseY);
  }
  if(G.hoveredEquip){
    const item = p.inventory.equipment[G.hoveredEquip];
    if(item && item.valid) drawItemTooltip(item, G.mouseX, G.mouseY);
  }
}

function drawItemTooltip(item, mx, my){
  const lines = [item.getDisplayName()];
  if(item.type) lines.push('Type: ' + item.type);
  if(item.atk || item.getEnhancedAtk() > 0) lines.push('ATK: +' + item.getEnhancedAtk());
  if(item.def || item.getEnhancedDef() > 0) lines.push('DEF: +' + item.getEnhancedDef());
  if(item.hp || item.getEnhancedHp() > 0) lines.push('HP: +' + item.getEnhancedHp());
  if(item.heal) lines.push('Heal: ' + item.heal + ' HP');
  if(item.mp) lines.push('MP: +' + item.mp);
  if(item.value) lines.push('Value: ' + item.value + ' Noah');
  if(item.enhance > 0) lines.push('Enhance: +' + item.enhance);
  
  const baseFont = isMobile ? 10 : 11;
  const titleFont = isMobile ? 11 : 12;
  const lineHeight = isMobile ? 14 : 16;
  const tw = isMobile ? 180 : 200;
  const th = 12 + lines.length * lineHeight + 8;
  
  let tx = mx + 15;
  let ty = my - th/2;
  if(tx + tw > W) tx = mx - tw - 5;
  if(ty < 0) ty = 5;
  if(ty + th > H) ty = H - th - 5;
  
  ctx.fillStyle = 'rgba(5,2,15,0.95)';
  drawRoundRect(ctx, tx, ty, tw, th, 4, 'rgba(5,2,15,0.95)', '#fd0');
  ctx.fillStyle = '#fd0';
  ctx.font = `bold ${titleFont}px Arial`;
  ctx.textAlign = 'left';
  ctx.fillText(lines[0], tx + 6, ty + 14);
  ctx.fillStyle = '#ccc';
  ctx.font = `${baseFont}px Arial`;
  for(let i = 1; i < lines.length; i++){
    ctx.fillText(lines[i], tx + 6, ty + 14 + i * lineHeight);
  }
}

// === PANEL: SKILLS ===
function drawSkillPanel(){
  const pw = isMobile ? W - 10 : 560;
  const ph = isMobile ? H - 20 : 500;
  const px = (W - pw) / 2;
  const py = (H - ph) / 2;
  
  ctx.fillStyle = 'rgba(5,2,10,0.97)';
  drawRoundRect(ctx, px, py, pw, ph, 8, 'rgba(5,2,10,0.97)', '#a0f');
  ctx.lineWidth = 2;
  
  ctx.fillStyle = '#a0f';
  ctx.font = `bold ${isMobile ? 16 : 18}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('SKILL TREE', px + pw/2, py + (isMobile ? 24 : 28));
  
  const p = G.player;
  ctx.fillStyle = '#fd0';
  ctx.font = `bold ${isMobile ? 12 : 14}px Arial`;
  ctx.fillText(`Skill Points: ${p.skillPoints}`, px + pw/2, py + (isMobile ? 40 : 46));

  const skillItemHeight = isMobile ? 52 : 58;
  const startY = py + (isMobile ? 56 : 65);
  const maxItems = Math.min(SKILL_ORDER.length, Math.floor((ph - startY - 15) / skillItemHeight));
  
  for(let i = 0; i < maxItems; i++){
    const id = SKILL_ORDER[i];
    const def = SKILL_DEFS[id];
    const lv = G.skills.skills[id];
    const unlocked = p.level >= def.unlockLv;
    const sy = startY + i * skillItemHeight;
    
    ctx.fillStyle = unlocked ? 'rgba(30,20,50,0.8)' : 'rgba(15,10,25,0.8)';
    drawRoundRect(ctx, px + 6, sy, pw - 12, skillItemHeight - 4, 4, unlocked ? 'rgba(30,20,50,0.8)' : 'rgba(15,10,25,0.8)', '#333');
    
    const iconSize = isMobile ? 18 : 20;
    ctx.fillStyle = unlocked ? def.color : '#444';
    ctx.beginPath();
    ctx.arc(px + 24, sy + (skillItemHeight - 4)/2, iconSize, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = unlocked ? def.color : '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${isMobile ? 9 : 10}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(def.name.slice(0, 3), px + 24, sy + (skillItemHeight - 4)/2 + 3);
    
    ctx.fillStyle = unlocked ? '#eee' : '#555';
    ctx.font = `bold ${isMobile ? 11 : 13}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`${i+1}. ${def.name}`, px + 48, sy + 14);
    
    ctx.fillStyle = unlocked ? '#aaa' : '#444';
    ctx.font = `${isMobile ? 8 : 11}px Arial`;
    const shortDesc = isMobile ? `${def.mp}MP ${def.cd}s` : `${def.desc.slice(0, 20)} | MP:${def.mp} CD:${def.cd}s`;
    ctx.fillText(shortDesc, px + 48, sy + 26);
    
    if(!unlocked){
      ctx.fillStyle = '#f44';
      ctx.font = `bold ${isMobile ? 8 : 11}px Arial`;
      ctx.fillText(`Req Lv ${def.unlockLv}`, px + 48, sy + 38);
    } else {
      ctx.fillStyle = '#fd0';
      ctx.font = `${isMobile ? 8 : 11}px Arial`;
      ctx.fillText(`Lv: ${lv}/${def.maxLv}`, px + 48, sy + 38);
    }
    
    const dotSpacing = isMobile ? 14 : 18;
    const startDotX = px + (isMobile ? 220 : 350);
    for(let s = 0; s < def.maxLv; s++){
      ctx.fillStyle = s < lv ? '#fd0' : '#333';
      ctx.beginPath();
      ctx.arc(startDotX + s * dotSpacing, sy + (skillItemHeight - 4)/2, 5, 0, Math.PI*2);
      ctx.fill();
    }
    
    const btnWidth = isMobile ? 45 : 50;
    const btnHeight = isMobile ? 24 : 28;
    if(unlocked && lv < def.maxLv && p.skillPoints > 0){
      ctx.fillStyle = '#4f4';
      drawRoundRect(ctx, px + pw - btnWidth - 8, sy + (skillItemHeight - btnHeight)/2, btnWidth, btnHeight, 4, '#4f4', '#2a2');
      ctx.fillStyle = '#000';
      ctx.font = `bold ${isMobile ? 10 : 14}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('+UP', px + pw - btnWidth/2 - 8, sy + (skillItemHeight - btnHeight)/2 + btnHeight/2 + 5);
    } else if(lv >= def.maxLv && unlocked){
      ctx.fillStyle = '#fd0';
      ctx.font = `bold ${isMobile ? 9 : 11}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('MAX', px + pw - 30, sy + (skillItemHeight - 4)/2 + 3);
    }
  }
}

// === PANEL: QUEST LOG ===
function drawQuestPanel(){

  const tabWidth = isMobile ? (pw - 24) / 3 : 170;
  const tabs = ['active', 'available', 'completed'];
  for(let i = 0; i < tabs.length; i++){
    const tx = px + 6 + i * (tabWidth + 3);
    const ty = py + (isMobile ? 36 : 38);
    const active = G.questTab === tabs[i];
    ctx.fillStyle = active ? 'rgba(100,70,0,0.9)' : 'rgba(30,20,10,0.8)';
    drawRoundRect(ctx, tx, ty, tabWidth, isMobile ? 22 : 24, 3, active ? 'rgba(100,70,0,0.9)' : 'rgba(30,20,10,0.8)', active ? '#fd0' : '#555');

    ctx.fillText(tabs[i].charAt(0).toUpperCase() + tabs[i].slice(1), tx + tabWidth/2, ty + (isMobile ? 14 : 16));
  }

  let quests;
  if(G.questTab === 'active') quests = G.quests.getActive();
  else if(G.questTab === 'available') quests = G.quests.getAvailable();
  else quests = G.quests.getCompleted();

  const listY = py + (isMobile ? 62 : 72);
  const maxItems = Math.floor((ph - listY - 15) / (isMobile ? 80 : 90));
  
  if(quests.length === 0){
    ctx.fillStyle = '#555';
    ctx.font = `${isMobile ? 12 : 14}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('No quests here.', px + pw/2, listY + 35);
  }

  for(let i = 0; i < Math.min(quests.length, maxItems); i++){
    const q = quests[i];
    const qs = G.quests.quests[q.id];
    const qy = listY + i * (isMobile ? 80 : 90);
    
    ctx.fillStyle = 'rgba(20,15,5,0.9)';
    drawRoundRect(ctx, px + 6, qy, pw - 12, isMobile ? 74 : 82, 4, 'rgba(20,15,5,0.9)', '#664');

    ctx.font = `bold ${isMobile ? 12 : 14}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(q.name, px + 12, qy + 16);
    
    ctx.fillStyle = '#ccc';
    ctx.font = `${isMobile ? 9 : 12}px Arial`;
    ctx.fillText(q.desc, px + 12, qy + 28);

    if(G.questTab === 'active'){
      const total = q.killCount || q.collectNoah;
      const prog = Math.min(qs.progress, total);

      ctx.fillStyle = '#333';
      ctx.fillRect(px + 12, qy + 36, pw - 60, 5);
      ctx.fillStyle = '#4f4';
      ctx.fillRect(px + 12, qy + 36, (pw - 60) * pct, 5);

      ctx.fillText(`${prog}/${total}`, px + 12, qy + 50);

    rewards.push(q.rewards.noah + 'N');

    ctx.font = `${isMobile ? 8 : 11}px Arial`;
