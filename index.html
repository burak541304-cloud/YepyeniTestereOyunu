            this._equipFromContainerSlot(container, i);
            break;
          }
        }
      }
    }
  }

  /**
   * Envanterdeki en iyi eşyaları otomatik olarak giyer.
   * Seviye uygunluğu ve slot eşleşmesi kontrol edilir.
   * Mevcut eşyadan daha yüksek puanlı olanı giyer.
   */
  autoEquipBestItems() {
    const scoreOf = (slot) => {
      const d = ITEMS[slot.id];
      if (!d) return 0;
      const up = getStackUpgradeLv(slot);
      const m = getEffectiveItemStatsMerged(d, up);
      const base = itemStatPowerScore(d);
      const ap = (m.advanced && m.advanced.attackPower) || 0;
      const rarity = rarityRank(d.rarity || "common");
      return base * 3 + ap * 0.35 + rarity * 8 + up * 10;
    };

    let equippedCount = 0;
    const doneSlots = new Set();

    for (const sk of EQ_SLOTS) {
      if (doneSlots.has(sk)) continue;

      let bestItem = null;
      let bestScore = this.equipped[sk] ? scoreOf(this.equipped[sk]) : 0;

      for (const container of [this.hotbar, this.slots]) {
        for (let i = 0; i < container.length; i++) {
          const s = container[i];
          if (!s) continue;
          const d = ITEMS[s.id];
          if (!d || !itemFitsEquipSlot(d, sk)) continue;
          const gate = canPlayerEquipItem(d, player);
          if (!gate.ok) continue;
          const targetSk = firstEquipSlotForItem(this, d);
          if (targetSk !== sk) continue;
          const sc = scoreOf(s);
          if (sc > bestScore) {
            bestScore = sc;
            bestItem = { container, idx: i };
          }
        }
      }

      if (bestItem) {
        const err = this.tryEquipFromContainerSlotReplace(bestItem.container, bestItem.idx);
        if (!err) {
          equippedCount++;
          doneSlots.add(sk);
        }
      }
    }

    if (equippedCount > 0) {
      pickupMsgText = equippedCount + " esya otomatik giyildi (O).";
      pickupMsgTimer = 1.5;
    } else {
      pickupMsgText = "Daha iyi esya yok veya seviye yetersiz.";
      pickupMsgTimer = 1.2;
    }
    return equippedCount;
  }

  _hitSamePressSlot(mx, my, canvasW, canvasH, p) {
    const layout = this._invLayout(canvasW, canvasH);
    if (p.container === this.slots) {
      const invIdx = this._hitTestSlots(mx, my, layout.slotsX, layout.slotsY, INV_PAGE_SLOTS, INV_COLS, layout.slotSize, layout.slotGap);
      const abs = invIdx >= 0 ? layout.invPageStart + invIdx : -1;
      return abs === p.idx;
    }
    if (p.container === this.hotbar) {
      const hbIdx = this._hitTestSlots(mx, my, layout.hbX, layout.hbY, HOTBAR_SLOTS, HOTBAR_SLOTS, layout.slotSize, layout.slotGap);
      return hbIdx === p.idx;
    }
    return false;
  }

  tryBeginEquipLongPress(mx, my, canvasW, canvasH, touchId) {
    if (inventorySlotInspect) return false;
    if (this.heldItem) return false;
    const layout = this._invLayout(canvasW, canvasH);
    const invIdx = this._hitTestSlots(mx, my, layout.slotsX, layout.slotsY, INV_PAGE_SLOTS, INV_COLS, layout.slotSize, layout.slotGap);
    const invAbsIdx = invIdx >= 0 ? layout.invPageStart + invIdx : -1;
    if (invIdx >= 0 && this.slots[invAbsIdx]) {
      const def = ITEMS[this.slots[invAbsIdx].id];
      if (def && def.equipSlot) {
        const targetSlot = firstEquipSlotForItem(this, def);
        const curE = targetSlot ? this.equipped[targetSlot] : null;
        if (!curE || curE.id !== this.slots[invAbsIdx].id) {
          this._slotPress = {
            container: this.slots, idx: invAbsIdx, t0: performance.now(), ox: mx, oy: my,
            touchId: touchId !== undefined ? touchId : null,
          };
          return true;
        }
      }
    }
    return false;
  }

  updateSlotLongPress(dt, mx, my, canvasW, canvasH) {
    if (inventorySlotInspect) return;
    if (!this._slotPress || !this.open) return;
    const p = this._slotPress;
    if (this.heldItem) { this._clearSlotPress(); return; }
    const slot = p.container[p.idx];
    if (!slot) { this._clearSlotPress(); return; }
    const def = ITEMS[slot.id];
    if (!def || !def.equipSlot) { this._clearSlotPress(); return; }
    const cand = equipSlotsForItemDef(def);
    const allFilledWithSame = cand.length > 0 && cand.every((sk) => {
      const w = this.equipped[sk];
      return w && w.id === slot.id;
    });
    if (allFilledWithSame) { this._clearSlotPress(); return; }

    const down = (p.touchId === null || p.touchId === undefined)
      ? canvasMouse0Down
      : (touchState.invSlotPressId === p.touchId);
    if (!down) return;

    if (Math.hypot(mx - p.ox, my - p.oy) > INV_PRESS_MOVE_CANCEL) {
      this._clearSlotPress();
      return;
    }
    if (performance.now() - p.t0 >= INV_LONG_PRESS_EQUIP_MS) {
      const err = this.tryEquipFromContainerSlotReplace(p.container, p.idx);
      if (err) {
        pickupMsgText = err;
        pickupMsgTimer = 1.5;
      }
      this._clearSlotPress();
    }
  }

  finishSlotPress(mx, my, canvasW, canvasH, rightClick) {
    if (!this._slotPress) return;
    const p = this._slotPress;
    const shortClick = performance.now() - p.t0 < INV_LONG_PRESS_EQUIP_MS;
    this._clearSlotPress();
    if (shortClick && this._hitSamePressSlot(mx, my, canvasW, canvasH, p)) {
      this._slotClick(p.container, p.idx, rightClick);
    }
  }

  cancelSlotPressIfMovedOff(mx, my, canvasW, canvasH) {
    if (!this._slotPress || !this.open) return;
    if (!this._hitSamePressSlot(mx, my, canvasW, canvasH, this._slotPress)) {
      this._clearSlotPress();
    }
  }

  handleClick(mx, my, canvasW, canvasH, rightClick = false) {
    if (!this.open) {
      return false;
    }

    const layout = this._invLayout(canvasW, canvasH);
    const inR = (r) => !!r && mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
    for (const tab of layout.invPageTabs) {
      if (inR(tab) && tab.page !== this.invPage) {
        this.invPage = tab.page;
        this.tooltipSlot = null;
        return true;
      }
    }
    if (inR(layout.invSortBtn)) {
      this.cycleInvSortMode();
      pickupMsgText = this.sortStrongFirst ? "Envanter: gucluden gucsuze" : "Envanter: gucsuzden gucluye";
      pickupMsgTimer = 1.2;
      return true;
    }
    const eqHit = this._hitTestEquipGrid(mx, my, layout);
    if (eqHit) { this._equipSlotClick(eqHit, rightClick); return true; }

    const invIdx = this._hitTestSlots(mx, my, layout.slotsX, layout.slotsY, INV_PAGE_SLOTS, INV_COLS, layout.slotSize, layout.slotGap);
    if (invIdx >= 0) { this._slotClick(this.slots, layout.invPageStart + invIdx, rightClick); return true; }

    return false;
  }

  _hitTestEquipGrid(mx, my, layout) {
    const cell = layout.eqCellSize, gap = layout.eqGridGap;
    const ox = layout.eqInnerX, oy = layout.eqInnerY;
    for (let r = 0; r < EQ_GRID_ROWS; r++) {
      for (let c = 0; c < EQ_GRID_COLS; c++) {
        const sx = ox + c * (cell + gap), sy = oy + r * (cell + gap);
        if (mx >= sx && mx < sx + cell && my >= sy && my < sy + cell) {
          const g = EQ_GRID[r][c];
          return g && g.key ? g.key : null;
        }
      }
    }
    return null;
  }

  _equipSlotClick(slotKey, rightClick) {
    if (inventorySlotInspect) closeInventorySlotInspect();
    const cur = this.equipped[slotKey];
    const packEq = (id, u, src) => {
      const o = { id, count: 1 };
      if ((u | 0) > 0) o.upgrade = u | 0;
      return copyStackMetaTo(o, src);
    };
    if (rightClick && cur && !this.heldItem) {
      this.heldItem = packEq(cur.id, getStackUpgradeLv(cur), cur);
      this.equipped[slotKey] = null;
      return;
    }
    if (this.heldItem) {
      const def = ITEMS[this.heldItem.id];
      if (!def || !def.equipSlot) return;
      if (!itemFitsEquipSlot(def, slotKey)) return;
      const heldMeta = this.heldItem;
      const oneId = this.heldItem.id;
      const uHeld = getStackUpgradeLv(this.heldItem);
      this.heldItem.count--;
      if (this.heldItem.count <= 0) this.heldItem = null;
      if (cur) {
        const left = this.addItem(cur.id, 1, getStackUpgradeLv(cur), cur);
        if (left > 0) {
          if (!this.heldItem) this.heldItem = packEq(oneId, uHeld, heldMeta);
          else this.heldItem.count++;
          return;
        }
      }
      this.equipped[slotKey] = packEq(oneId, uHeld, heldMeta);
      return;
    }
    if (cur && !this.heldItem) openInventorySlotInspect("eq", slotKey);
  }

  _slotClick(container, idx, rightClick) {
    const slot = container[idx];
    if (rightClick && tryOpenBossChestInContainer(this, container, idx)) {
      return;
    }
    if (rightClick) {
      const packOne = (src) => {
        const o = { id: src.id, count: 1 };
        const u = getStackUpgradeLv(src);
        if (u > 0) o.upgrade = u;
        return copyStackMetaTo(o, src);
      };
      if (this.heldItem && !slot) {
        container[idx] = packOne(this.heldItem);
        this.heldItem.count--;
        if (this.heldItem.count <= 0) this.heldItem = null;
      } else if (this.heldItem && slot && slot.id === this.heldItem.id && stackUpgradesMatch(slot, this.heldItem)) {
        const def = ITEMS[slot.id];
        if (slot.count < def.maxStack) { slot.count++; this.heldItem.count--; if (this.heldItem.count <= 0) this.heldItem = null; }
      } else if (!this.heldItem && slot && slot.count > 1) {
        const half = Math.ceil(slot.count / 2);
        const u = getStackUpgradeLv(slot);
        this.heldItem = { id: slot.id, count: half, ...(u > 0 ? { upgrade: u } : {}) };
        slot.count -= half;
        if (slot.count <= 0) container[idx] = null;
      } else {
        this._swapOrMerge(container, idx);
      }
    } else {
      if (this.heldItem && inventorySlotInspect) closeInventorySlotInspect();
      if (!this.heldItem && slot) {
        openInventorySlotInspect(container === this.slots ? "slots" : "hb", idx);
        return;
      }
      this._swapOrMerge(container, idx);
    }
  }

  _swapOrMerge(container, idx) {
    const slot = container[idx];
    if (!this.heldItem) {
      this.heldItem = slot;
      container[idx] = null;
    } else if (!slot) {
      container[idx] = this.heldItem;
      this.heldItem = null;
    } else if (slot.id === this.heldItem.id && ITEMS[slot.id].stackable && stackUpgradesMatch(slot, this.heldItem)) {
      const def = ITEMS[slot.id];
      const space = def.maxStack - slot.count;
      const add = Math.min(this.heldItem.count, space);
      slot.count += add;
      this.heldItem.count -= add;
      if (this.heldItem.count <= 0) this.heldItem = null;
    } else {
      const tmp = container[idx];
      container[idx] = this.heldItem;
      this.heldItem = tmp;
    }
  }

  handleMouseMove(mx, my, canvasW, canvasH) {
    this.tooltipSlot = null; this.tooltipSource = null;
    this.tooltipEquipKey = null;
    if (!this.open) return;
    const layout = this._invLayout(canvasW, canvasH);
    const ss = layout.slotSize, sg = layout.slotGap;
    const eqHit = this._hitTestEquipGrid(mx, my, layout);
    if (eqHit) {
      const es = this.equipped[eqHit];
      if (es) { this.tooltipSlot = es; this.tooltipSource = "eq"; this.tooltipEquipKey = eqHit; return; }
    }
    let idx = this._hitTestSlots(mx, my, layout.slotsX, layout.slotsY, INV_PAGE_SLOTS, INV_COLS, ss, sg);
    if (idx >= 0 && this.slots[layout.invPageStart + idx]) { this.tooltipSlot = this.slots[layout.invPageStart + idx]; this.tooltipSource = "inv"; return; }
    return;
  }

  _hitTestSlots(mx, my, startX, startY, count, cols, slotSz = SLOT_SIZE, slotGap = SLOT_GAP) {
    for (let i = 0; i < count; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const sx = startX + col * (slotSz + slotGap);
      const sy = startY + row * (slotSz + slotGap);
      if (mx >= sx && mx < sx + slotSz && my >= sy && my < sy + slotSz) return i;
    }
    return -1;
  }

  _invLayout(canvasW, canvasH) {
    const b = uiModalBounds(canvasW, canvasH);
    const eqFramePad = 10;
    const eqGridGap = 5;
    const mob = touchState.mobileUI;
    let ss = SLOT_SIZE;
    let sg = SLOT_GAP;
    let eqCellSize = mob ? 38 : 44;
    let previewW = mob ? 72 : 108;
    const previewGap = 10;

    const compute = () => {
      const eqInnerW = EQ_GRID_COLS * eqCellSize + (EQ_GRID_COLS - 1) * eqGridGap;
      const eqInnerH = EQ_GRID_ROWS * eqCellSize + (EQ_GRID_ROWS - 1) * eqGridGap;
      const eqGridW = eqInnerW + eqFramePad * 2;
      const eqGridH = eqInnerH + eqFramePad * 2;
      const leftColW = previewW + previewGap + eqGridW + 18;
      const panelW = leftColW + INV_COLS * (ss + sg) - sg + 32;
      const eqPanelH = eqGridH + 22;
      const invGridH = INV_ROWS * (ss + sg) - sg;
      const controlsH = 8 + 24 + 6 + 24 + 10;
      const hotbarH = ss;
      const gridH = 40 + invGridH + controlsH + hotbarH + 16;
      const panelH = Math.max(gridH, eqPanelH + (mob ? 72 : 88));
      return { leftColW, panelW, panelH, eqPanelH, gridH, eqGridW, eqGridH, eqInnerW, eqInnerH };
    };

    let { leftColW, panelW, panelH, eqGridW, eqGridH, eqInnerW, eqInnerH } = compute();
    while ((panelH > b.maxH || panelW > b.maxW) && ss > 20) {
      ss -= 2;
      sg = Math.max(2, sg - 1);
      eqCellSize = Math.max(24, Math.min(eqCellSize, Math.max(28, ss + 2)));
      if (panelW > b.maxW && previewW > 52) previewW -= 4;
      ({ leftColW, panelW, panelH, eqGridW, eqGridH, eqInnerW, eqInnerH } = compute());
    }

    if (mob) {
      while ((panelH > b.maxH || panelW > b.maxW) && ss > 18) {
        ss -= 1;
        sg = Math.max(2, sg - 1);
        eqCellSize = Math.max(22, eqCellSize - 1);
        if (panelW > b.maxW && previewW > 46) previewW -= 1;
        ({ leftColW, panelW, panelH, eqGridW, eqGridH, eqInnerW, eqInnerH } = compute());
      }
    }

    const px = Math.max(b.side, Math.floor((canvasW - panelW) / 2));
    const py = Math.max(b.top, Math.min(canvasH - panelH - b.bottom, Math.floor((canvasH - panelH) / 2)));
    const previewX = px + 12;
    const eqGridX = previewX + previewW + previewGap;
    const eqGridY = py + 52;
    const previewY = eqGridY;
    const previewH = eqGridH;
    const eqInnerX = eqGridX + eqFramePad;
    const eqInnerY = eqGridY + eqFramePad;
    const slotsX = px + leftColW + 8, slotsY = py + 40;
    const hbX = px + leftColW + 8;
    const invPageStart = this._invPageStart();
    const invPages = this._invPageCount();
    const invPageW = Math.max(180, INV_COLS * (ss + sg) - sg);
    const gridBottom = slotsY + INV_ROWS * (ss + sg) - sg;
    const pageY = gridBottom + 8;
    const tabGap = 6;
    const tabCount = Math.max(1, invPages);
    const tabW = Math.floor((invPageW - tabGap * (tabCount - 1)) / tabCount);
    const invPageTabs = [];
    for (let i = 0; i < tabCount; i++) {
      invPageTabs.push({ x: hbX + i * (tabW + tabGap), y: pageY, w: tabW, h: 24, page: i });
    }
    const invSortBtn = { x: hbX, y: pageY + 30, w: invPageW, h: 24 };
    const hbY = invSortBtn.y + invSortBtn.h + 10;
    return {
      px, py, panelW, panelH, slotsX, slotsY, hbX, hbY, eqColW: leftColW,
      previewX, previewY, previewW, previewH,
      eqGridX, eqGridY, eqGridW, eqGridH, eqInnerX, eqInnerY, eqCellSize, eqGridGap, eqFramePad,
      slotSize: ss, slotGap: sg,
      invPageStart, invPages, invPageTabs, invSortBtn,
    };
  }

  _hotbarLayout(canvasW, canvasH) {
    const mob = touchState.mobileUI;
    const slotSz = mob ? 34 : SLOT_SIZE;
    const slotGap = mob ? 3 : SLOT_GAP;
    const totalW = HOTBAR_SLOTS * (slotSz + slotGap) - slotGap;
    const hx = Math.floor((canvasW - totalW) / 2);
    const hy = canvasH - slotSz - (mob ? 20 : 28);
    return { x: hx, y: hy, slotSz, slotGap };
  }

  render(ctx, canvasW, canvasH, mouseX, mouseY) {
    if (this.open) this._renderFullInventory(ctx, canvasW, canvasH, mouseX, mouseY);
  }

  _renderHotbar(ctx, canvasW, canvasH) {
    return;
  }

  _renderFullInventory(ctx, canvasW, canvasH, mouseX, mouseY) {
    const layout = this._invLayout(canvasW, canvasH);
    const ss = layout.slotSize, sg = layout.slotGap;

    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvasW, canvasH);

    ctx.fillStyle = "rgba(15, 15, 40, 0.95)";
    ctx.strokeStyle = "#8080c0"; ctx.lineWidth = 2;
    roundRect(ctx, layout.px, layout.py, layout.panelW, layout.panelH, 10);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#d4a848"; ctx.font = "bold 17px monospace";
    ctx.textAlign = "center";
    ctx.fillText("Envanter", layout.px + layout.panelW / 2, layout.py + 26);
    ctx.textAlign = "start";

    ctx.fillStyle = "#888"; ctx.font = "11px monospace";
    ctx.fillText("[I] Kapat", layout.px + layout.panelW - 80, layout.py + 26);

    drawInventoryCharacterPreview(ctx, this, layout.previewX, layout.previewY, layout.previewW, layout.previewH);

    const statY = layout.previewY + layout.previewH + 6;
    ctx.fillStyle = "#b8c8e8"; ctx.font = "11px monospace";
    ctx.fillText("A\u011f\u0131rl\u0131k: " + inventoryTotalWeight(this) + " / " + PLAYER_MAX_CARRY_WEIGHT, layout.previewX, statY);
    ctx.fillStyle = "#ffd078"; ctx.font = "bold 12px monospace";
    ctx.fillText("Alt\u0131n: " + formatGold(this.gold), layout.previewX, statY + 16);
    ctx.fillStyle = "#6a6a88"; ctx.font = touchState.mobileUI ? "8px monospace" : "9px monospace";
    if (touchState.mobileUI) {
      ctx.fillText("Uygun e\u015fya otomatik giyilir. Uzun bas: bo\u015f slota giy.", layout.px + layout.eqColW + 4, layout.py + 44);
    } else {
      ctx.fillText("Bo\u015f ekipmana uygun toplanan e\u015fya otomatik giyilir.", layout.px + layout.eqColW + 4, layout.py + 40);
      ctx.fillText("Giyilebilir e\u015fyaya bas\u0131l\u0131 tut: bo\u015f slota an\u0131nda giydir.", layout.px + layout.eqColW + 4, layout.py + 52);
    }

    ctx.fillStyle = "#a0c0ff"; ctx.font = "bold 11px monospace";
    ctx.fillStyle = "#6a7090"; ctx.font = "9px monospace";
    ctx.fillText("3\u00d75 ekipman", layout.eqGridX + 2, layout.eqGridY - 16);
    ctx.fillStyle = "#a0c0ff"; ctx.font = "bold 11px monospace";
    ctx.fillText("Ekipman", layout.eqGridX + 2, layout.eqGridY - 4);

    ctx.strokeStyle = "#b01018";
    ctx.lineWidth = 4;
    roundRect(ctx, layout.eqGridX, layout.eqGridY, layout.eqGridW, layout.eqGridH, 8);
    ctx.stroke();
    ctx.fillStyle = "rgba(10, 12, 28, 0.96)";
    roundRect(ctx, layout.eqGridX + 3, layout.eqGridY + 3, layout.eqGridW - 6, layout.eqGridH - 6, 6);
    ctx.fill();
    ctx.strokeStyle = "#4a0808";
    ctx.lineWidth = 1;
    roundRect(ctx, layout.eqGridX + 3, layout.eqGridY + 3, layout.eqGridW - 6, layout.eqGridH - 6, 6);
    ctx.stroke();

    const cell = layout.eqCellSize, gap = layout.eqGridGap;
    const ox = layout.eqInnerX, oy = layout.eqInnerY;
    const tGlow = performance.now() / 420;
    for (let r = 0; r < EQ_GRID_ROWS; r++) {
      for (let c = 0; c < EQ_GRID_COLS; c++) {
        const g = EQ_GRID[r][c];
        const sx = ox + c * (cell + gap), sy = oy + r * (cell + gap);
        const active = !!(g && g.key);
        const locked = !!(g && g.locked);
        ctx.fillStyle = locked ? "rgba(22,26,42,0.98)" : active ? "rgba(26,32,52,0.98)" : "rgba(20,24,38,0.96)";
        roundRect(ctx, sx, sy, cell, cell, 4);
        ctx.fill();
        ctx.strokeStyle = locked ? "#3a4558" : "#6a9ed8";
        ctx.lineWidth = active && !locked ? 1.5 : 1;
        roundRect(ctx, sx + 0.5, sy + 0.5, cell - 1, cell - 1, 3);
        ctx.stroke();

        if (active && g.key) {
          const es = this.equipped[g.key];
          const padI = Math.max(3, Math.floor(cell * 0.1));
          if (es) {
            const def = ITEMS[es.id];
            const rr = def && def.rarity ? rarityRank(def.rarity) : 1;
            const pw = itemStatPowerScore(def || {});
            if (rr >= 4) {
              const pulse = 0.65 + 0.35 * Math.sin(tGlow + r + c * 0.7);
              ctx.strokeStyle = "rgba(255,210,90," + (0.45 + pulse * 0.35) + ")";
              ctx.lineWidth = 2.5 + pulse * 0.8;
              roundRect(ctx, sx - 1, sy - 1, cell + 2, cell + 2, 5);
              ctx.stroke();
            } else if (rr >= 3 || pw > 28) {
              ctx.strokeStyle = rr >= 3 ? "rgba(200,130,255,0.55)" : "rgba(140,190,255,0.45)";
              ctx.lineWidth = 2;
              roundRect(ctx, sx - 0.5, sy - 0.5, cell + 1, cell + 1, 4);
              ctx.stroke();
            }
            drawItemIconFancy(ctx, es.id, sx + padI, sy + padI, cell - padI * 2, { equipped: true });
            const ul = getStackUpgradeLv(es);
            if (ul > 0) {
              ctx.font = "bold " + Math.max(8, Math.floor(cell * 0.22)) + "px monospace";
              ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.fillStyle = "#ffd0a0";
              const ut = "+" + ul;
              ctx.strokeText(ut, sx + padI, sy + cell - padI - 1);
              ctx.fillText(ut, sx + padI, sy + cell - padI - 1);
            }
          } else {
            ctx.strokeStyle = "rgba(100,120,160,0.35)";
            ctx.setLineDash([3, 3]);
            ctx.strokeRect(sx + cell * 0.2, sy + cell * 0.2, cell * 0.6, cell * 0.55);
            ctx.setLineDash([]);
          }
        } else {
          ctx.fillStyle = "rgba(80,90,120,0.45)";
          ctx.font = (Math.max(9, cell * 0.26)) + "px monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(g.label || "\u00b7", sx + cell / 2, sy + cell * 0.38);
          if (g.sub) {
            ctx.fillStyle = "rgba(100,110,140,0.75)";
            ctx.font = (Math.max(6, cell * 0.16)) + "px monospace";
            ctx.fillText(g.sub, sx + cell / 2, sy + cell * 0.72);
          }
          ctx.textAlign = "start";
          ctx.textBaseline = "alphabetic";
        }

        if (g && g.label && active && !this.equipped[g.key]) {
          ctx.fillStyle = "rgba(140,155,190,0.95)";
          ctx.font = (Math.max(6, cell * 0.16)) + "px monospace";
          ctx.textAlign = "center";
          ctx.fillText(g.label, sx + cell / 2, sy + cell - 3);
          ctx.textAlign = "start";
        }
      }
    }

    for (let i = 0; i < INV_PAGE_SLOTS; i++) {
      const col = i % INV_COLS, row = Math.floor(i / INV_COLS);
      const sx = layout.slotsX + col * (ss + sg);
      const sy = layout.slotsY + row * (ss + sg);
      ctx.fillStyle = "rgba(40,40,60,0.6)"; ctx.strokeStyle = "#505070"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, ss, ss, 4); ctx.fill(); ctx.stroke();
      const absIdx = layout.invPageStart + i;
      if (this.slots[absIdx]) this._renderSlotContent(ctx, this.slots[absIdx], sx, sy, ss);
    }

    ctx.font = "10px monospace";
    for (const tab of layout.invPageTabs) {
      const active = tab.page === this.invPage;
      ctx.fillStyle = active ? "rgba(88, 64, 145, 0.95)" : "rgba(35,38,64,0.9)";
      ctx.strokeStyle = active ? "#b78cff" : "#5a6ca0";
      roundRect(ctx, tab.x, tab.y, tab.w, tab.h, 5);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = active ? "#f0e4ff" : "#d8e6ff";
      ctx.fillText("Sayfa " + (tab.page + 1), tab.x + 8, tab.y + 16);
    }

    ctx.fillStyle = "rgba(35,38,64,0.9)";
    ctx.strokeStyle = "#5a6ca0";
    roundRect(ctx, layout.invSortBtn.x, layout.invSortBtn.y, layout.invSortBtn.w, layout.invSortBtn.h, 5);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#d8e6ff";
    const sortTxt = this.sortStrongFirst ? "Gucluden gucsuze sirala" : "Gucsuzden gucluye sirala";
    ctx.fillText(sortTxt, layout.invSortBtn.x + 8, layout.invSortBtn.y + 16);

    if (this.tooltipSlot) {
      const def = ITEMS[this.tooltipSlot.id];
      if (def) {
        const mob = touchState.mobileUI;
        ctx.save();
        const layoutTt = buildItemTooltipLayout(ctx, def, this.tooltipSlot.id, canvasW, mob, { stackRef: this.tooltipSlot });
        const pos = placeTooltipPosition(mouseX, mouseY, layoutTt.tw, layoutTt.th, canvasW, canvasH);
        drawItemTooltipFromLayout(ctx, pos.tx, pos.ty, layoutTt, mob);
        ctx.restore();
      }
    }

    if (this.heldItem) {
      const ix = mouseX - ss / 2, iy = mouseY - ss / 2;
      ctx.globalAlpha = 0.88;
      drawItemIconFancy(ctx, this.heldItem.id, ix + 6, iy + 6, ss - 12, { drag: true });
      ctx.globalAlpha = 1;
      if (this.heldItem.count > 1) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 11px monospace";
        ctx.fillText(String(this.heldItem.count), ix + ss - 16, iy + ss - 4);
      }
    }
  }

  _renderSlotContent(ctx, slot, sx, sy, slotSz = SLOT_SIZE) {
    drawItemIconFancy(ctx, slot.id, sx, sy, slotSz, {});
    const ul = getStackUpgradeLv(slot);
    if (ul > 0) {
      ctx.font = "bold " + Math.max(9, Math.floor(slotSz * 0.2)) + "px monospace";
      ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.fillStyle = "#ffd0a0";
      const ut = "+" + ul;
      ctx.strokeText(ut, sx + 3, sy + slotSz - 4);
      ctx.fillText(ut, sx + 3, sy + slotSz - 4);
    }
    if (slot.count > 1) {
      ctx.fillStyle = "#000"; ctx.font = "bold 11px monospace";
      ctx.fillText(String(slot.count), sx + slotSz - 15, sy + slotSz - 5);
      ctx.fillStyle = "#fff";
      ctx.fillText(String(slot.count), sx + slotSz - 16, sy + slotSz - 6);
    }
  }
}

/* ── WorldItem (toplanabilir e\u015fyalar) ────────────────────── */

class WorldItem {
  constructor(col, row, itemId, count = 1, respawnable = true) {
    this.col = col;
    this.row = row;
    this.x = col * TILE_SIZE + TILE_SIZE / 2;
    this.y = row * TILE_SIZE + TILE_SIZE / 2;
    this.itemId = itemId;
    this.count = count;
    this.maxCount = count;
    this.upgrade = 0;
    this.alive = true;
    this.respawnable = respawnable;
    this.bobTimer = Math.random() * Math.PI * 2;
    this.respawnTime = 15 + Math.random() * 15;
    this.respawnTimer = 0;
  }

  update(dt) {
    if (this.alive) {
      this.bobTimer += dt * 3;
    } else if (this.respawnable) {
      this.respawnTimer += dt;
      if (this.respawnTimer >= this.respawnTime) {
        this.alive = true;
        this.count = this.maxCount;
        this.respawnTimer = 0;
        this.respawnTime = 15 + Math.random() * 15;
      }
    }
  }

  isNear(player, range = TILE_SIZE * 1.2) {
    const dx = this.x - player.centerX, dy = this.y - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  tryPickup(inventory) {
    if (!this.alive) return false;
    const before = Math.max(0, Math.floor(Number(this.count)) || 0);
    if (before <= 0) return false;
    const u = this.upgrade | 0;
    const left = inventory.addItem(this.itemId, before, u);
    const moved = before - left;
    if (moved <= 0) return false;
    this.count = left;
    if (this.count <= 0) this.alive = false;
    return true;
  }

  render(ctx) {
    if (!this.alive) return;
    const bob = Math.sin(this.bobTimer) * 3;
    const sz = 22;
    const dx = this.x - sz / 2, dy = this.y - sz / 2 + bob - 4;

    ctx.fillStyle = "rgba(255,255,200,0.12)";
    ctx.beginPath(); ctx.arc(this.x, this.y + bob - 2, 14, 0, Math.PI * 2); ctx.fill();

    drawItemIconFancy(ctx, this.itemId, dx, dy, sz, { floorDrop: true, timeMs: performance.now() });
  }
}

/* ── TileMap ─────────────────────────────────────────────── */

class TileMap {
  constructor(cols, rows, layers) {
    this.cols = cols;
    this.rows = rows;
    this.ground = layers.ground;
    this.detail = layers.detail || null;
    this.widthPx = cols * TILE_SIZE;
    this.heightPx = rows * TILE_SIZE;
  }

  getTile(col, row) {
    if (col < 0 || col >= this.cols || row < 0 || row >= this.rows) return TileType.WALL;
    return this.ground[row * this.cols + col];
  }

  getDetail(col, row) {
    if (!this.detail || col < 0 || col >= this.cols || row < 0 || row >= this.rows) return -1;
    return this.detail[row * this.cols + col];
  }

  setDetail(col, row, value) {
    if (!this.detail || col < 0 || col >= this.cols || row < 0 || row >= this.rows) return;
    this.detail[row * this.cols + col] = value;
  }

  setTile(col, row, value) {
    if (col < 0 || col >= this.cols || row < 0 || row >= this.rows) return;
    this.ground[row * this.cols + col] = value;
  }

  isSolid(col, row, boatMode) {
    const tile = this.getTile(col, row);
    const detail = this.getDetail(col, row);
    if (boatMode) {
      /** K\u0131y\u0131da kum-\u00e7imen s\u0131n\u0131r\u0131nda tekne hitbox'u \u00e7imene de\u011fince tak\u0131lmamas\u0131 i\u00e7in k\u0131y\u0131 zeminleri ge\u00e7ilebilir. */
      if (tile === TileType.WALL || tile === TileType.TREE) return true;
      /** A\u011fa\u00e7lar \u00e7o\u011funlukla \u00e7imen \u00fczerinde detail olarak; tekne modunda da engel olmal\u0131. */
      if (detail >= 0 && (detail === TileType.WALL || detail === TileType.TREE)) return true;
      return false;
    }
    if (SOLID_TILES.has(tile)) return true;
    if (detail >= 0 && SOLID_TILES.has(detail)) return true;
    return false;
  }

  isSolidPx(px, py, boatMode) {
    return this.isSolid(Math.floor(px / TILE_SIZE), Math.floor(py / TILE_SIZE), boatMode);
  }

  isWaterPx(px, py) {
    const col = Math.floor(px / TILE_SIZE), row = Math.floor(py / TILE_SIZE);
    return this.getTile(col, row) === TileType.WATER;
  }

  isNearWater(px, py, radius) {
    const col = Math.floor(px / TILE_SIZE), row = Math.floor(py / TILE_SIZE);
    for (let dr = -radius; dr <= radius; dr++) {
      for (let dc = -radius; dc <= radius; dc++) {
        if (this.getTile(col + dc, row + dr) === TileType.WATER) return true;
      }
    }
    return false;
  }

  /** Oyuncu ayaklar\u0131n\u0131n alt\u0131ndaki ana zemin karesini d\u00f6nd\u00fcr\u00fcr. */
  getGroundTileAtPx(px, py) {
    return this.getTile(Math.floor(px / TILE_SIZE), Math.floor(py / TILE_SIZE));
  }

  /**
   * Tekneye binme (B veya otomatik): ayaklar kum / su / k\u00f6pr\u00fcde olmal\u0131 ve yak\u0131nda su olmal\u0131.
   * \u00c7imen \u00fczerindeyken sadece suya yak\u0131n olmak yetmez; k\u0131y\u0131ya \u00e7\u0131k\u0131nca yanl\u0131\u015f tetiklenmez.
   */
  canBoardBoatAtPx(px, py) {
    const t = this.getGroundTileAtPx(px, py);
    if (t !== TileType.WATER && t !== TileType.SAND && t !== TileType.BRIDGE) return false;
    return this.isNearWater(px, py, 2);
  }

  render(ctx, camX, camY, camW, camH) {
    const startCol = Math.max(0, Math.floor(camX / TILE_SIZE));
    const startRow = Math.max(0, Math.floor(camY / TILE_SIZE));
    const endCol   = Math.min(this.cols, Math.ceil((camX + camW) / TILE_SIZE));
    const endRow   = Math.min(this.rows, Math.ceil((camY + camH) / TILE_SIZE));
    const waterT = performance.now() * 0.0011;

    for (let row = startRow; row < endRow; row++) {
      for (let col = startCol; col < endCol; col++) {
        const tile = this.getTile(col, row);
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;

        ctx.fillStyle = TILE_COLORS[tile] || "#ff00ff";
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        if (tile === TileType.GRASS || tile === TileType.DIRT || tile === TileType.SAND) {
          const n = (col * 11 + row * 17) % 5;
          ctx.fillStyle = "rgba(0,0,0," + (0.018 + n * 0.01) + ")";
          ctx.fillRect(x + 3 + (n % 3) * 4, y + 4 + (n % 2) * 3, 6, 5);
        }
        if (tile === TileType.WATER) {
          this._drawWaterShimmer(ctx, x, y, col, row, waterT);
        }
        this._drawTileDecoration(ctx, tile, x, y);

        const detail = this.getDetail(col, row);
        if (detail >= 0) this._drawDetailTile(ctx, detail, x, y);
      }
    }
  }

  _drawWaterShimmer(ctx, x, y, col, row, t) {
    const phase = col * 0.4 + row * 0.55;
    const w = 0.22 + 0.08 * Math.sin(t * 1.3 + phase);
    const g1 = Math.sin(t * 0.7 + phase) * 0.5 + 0.5;
    const g2 = Math.sin(t * 0.9 + phase * 1.1 + 0.4) * 0.5 + 0.5;
    ctx.save();
    ctx.globalAlpha = 0.32 + 0.18 * g1;
    const grd = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
    grd.addColorStop(0, "rgba(120, 200, 255, " + w + ")");
    grd.addColorStop(0.45, "rgba(40, 100, 180, 0.08)");
    grd.addColorStop(1, "rgba(180, 230, 255, " + (w * 0.85) + ")");
    ctx.fillStyle = grd;
    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
    ctx.globalAlpha = 0.15 + 0.1 * g2;
    ctx.fillStyle = "rgba(200, 240, 255, 0.35)";
    ctx.beginPath();
    ctx.ellipse(
      x + 10 + Math.sin(t * 1.2 + col) * 3,
      y + 12 + Math.cos(t * 0.9 + row) * 2,
      7,
      3,
      t * 0.15,
      0,
      Math.PI * 2
    );
    ctx.fill();
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.fillRect(x + 4, y + 4 + (col % 3) * 2, 10, 2);
    ctx.restore();
  }

  _drawTileDecoration(ctx, tile, x, y) {
    const seed = ((x * 73856093) ^ (y * 19349663)) >>> 0;
    const r01 = (n) => (((seed >> n) & 255) / 255);
    switch (tile) {
      case TileType.GRASS:
        ctx.fillStyle = "#4f9448";
        ctx.fillRect(x + 5, y + 9, 2, 7);
        ctx.fillRect(x + 20, y + 5, 2, 6);
        ctx.fillRect(x + 14, y + 20, 2, 6);
        if (r01(0) > 0.58) {
          ctx.fillStyle = "rgba(180, 210, 145, 0.28)";
          ctx.fillRect(x + 9, y + 12, 10, 2);
        }
        if (r01(8) > 0.72) {
          ctx.fillStyle = "#6f7b72";
          ctx.fillRect(x + 11, y + 16, 3, 2);
          if (r01(16) > 0.5) ctx.fillRect(x + 15, y + 18, 2, 2);
        }
        break;
      case TileType.WATER:
        ctx.fillStyle = "#4a8ed4";
        ctx.fillRect(x + 4, y + 10, 8, 2);
        ctx.fillRect(x + 18, y + 18, 8, 2);
        break;
      case TileType.SAND:
        ctx.fillStyle = "#c4ac5a";
        ctx.fillRect(x + 10, y + 14, 3, 2);
        ctx.fillRect(x + 22, y + 6, 2, 2);
        if (r01(4) > 0.66) {
          ctx.fillStyle = "#8f8770";
          ctx.fillRect(x + 7, y + 20, 2, 2);
        }
        break;
      case TileType.WALL:
        ctx.fillStyle = "#4a4a4a";
        ctx.strokeStyle = "#6a6a6a";
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
        ctx.fillRect(x + 2, y + 2, 12, 12);
        ctx.fillRect(x + 18, y + 18, 12, 12);
        break;
      case TileType.TALL_GRASS:
        ctx.fillStyle = "#308526";
        for (let i = 0; i < 5; i++) {
          const gx = x + 3 + i * 6;
          ctx.fillRect(gx, y + 4, 2, 10);
          ctx.fillRect(gx - 1, y + 3, 4, 2);
        }
        if (r01(12) > 0.64) {
          ctx.fillStyle = "#758268";
          ctx.fillRect(x + 23, y + 21, 2, 2);
          ctx.fillRect(x + 25, y + 20, 2, 2);
        }
        break;
      case TileType.BRIDGE:
        ctx.fillStyle = "#6a4c28";
        ctx.fillRect(x, y + 7, TILE_SIZE, 2);
        ctx.fillRect(x, y + 22, TILE_SIZE, 2);
        ctx.fillStyle = "#8a6c3a";
        ctx.fillRect(x, y, 2, TILE_SIZE);
        ctx.fillRect(x + TILE_SIZE - 2, y, 2, TILE_SIZE);
        break;
      case TileType.SNOW:
        ctx.fillStyle = "#b8d0e0";
        ctx.fillRect(x + 4, y + 6, 3, 2);
        ctx.fillRect(x + 18, y + 20, 4, 2);
        ctx.fillRect(x + 12, y + 14, 2, 3);
        break;
      case TileType.DIRT:
        ctx.fillStyle = "#8a6941";
        ctx.fillRect(x + 7, y + 10, 3, 2);
        ctx.fillRect(x + 20, y + 17, 2, 2);
        if (r01(20) > 0.6) {
          ctx.fillStyle = "#798070";
          ctx.fillRect(x + 12, y + 21, 3, 2);
        }
        break;
    }
  }

  _drawDetailTile(ctx, detail, x, y) {
    switch (detail) {
      case TileType.TREE: {
        const tCol = Math.floor((x + 16) / TILE_SIZE);
        const tRow = Math.floor((y + 16) / TILE_SIZE);
        const tHp = getTreeHp(tCol, tRow);
        const tDmgRatio = 1 - tHp / TREE_MAX_HP;
        ctx.fillStyle = "#5a3a1a";
        ctx.fillRect(x + 13, y + 18, 6, 14);
        const leafColor = tDmgRatio > 0.5 ? "#8a6a20" : tDmgRatio > 0.2 ? "#4a6a10" : "#1f5e10";
        ctx.fillStyle = leafColor;
        ctx.beginPath();
        ctx.arc(x + 16, y + 14, 11, 0, Math.PI * 2);
        ctx.fill();
        const innerColor = tDmgRatio > 0.5 ? "#6a5a18" : tDmgRatio > 0.2 ? "#3a7a14" : "#2a7a18";
        ctx.fillStyle = innerColor;
        ctx.beginPath();
        ctx.arc(x + 14, y + 12, 6, 0, Math.PI * 2);
        ctx.fill();
        if (tDmgRatio > 0) {
          ctx.fillStyle = "rgba(0,0,0,0.5)";
          ctx.fillRect(x + 4, y - 4, 24, 4);
          ctx.fillStyle = tDmgRatio < 0.5 ? "#64e87f" : tDmgRatio < 0.8 ? "#e8c447" : "#e85050";
          ctx.fillRect(x + 4, y - 4, 24 * (1 - tDmgRatio), 4);
        }
        break;
      }
      case TileType.FLOWER:
        {
          const seed = ((x * 92837111) ^ (y * 689287499)) >>> 0;
          const pick = seed % 20;
          let petal = "#e8e2dc";
          if (pick === 0) petal = "#ead07a"; // sarı artık çok daha seyrek
          else if (pick <= 4) petal = "#e9f3ff";
          else if (pick <= 8) petal = "#d9c7ff";
          else if (pick <= 12) petal = "#ffd3e8";
          else if (pick <= 15) petal = "#ffc89f";
          else if (pick <= 18) petal = "#d6ffd1";
          else petal = "#ff8f8f"; // kırmızı seyrek
          ctx.fillStyle = "#2d6e1e";
          ctx.fillRect(x + 15, y + 18, 2, 8);
          ctx.fillStyle = petal;
          ctx.beginPath();
          ctx.arc(x + 16, y + 16, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#c9b26a";
          ctx.beginPath();
          ctx.arc(x + 16, y + 16, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case TileType.BRIDGE:
        ctx.fillStyle = "#7a5c30";
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = "#6a4c20";
        ctx.fillRect(x, y, TILE_SIZE, 3);
        ctx.fillRect(x, y + TILE_SIZE - 3, TILE_SIZE, 3);
        ctx.fillRect(x + 14, y, 4, TILE_SIZE);
        break;
      case TileType.STONE_FLOOR:
        // Zemin üzerinde küçük dekoratif kaya parçası
        ctx.fillStyle = "#6a6c74";
        ctx.beginPath();
        ctx.ellipse(x + 16, y + 20, 5 + (x % 3), 3 + (y % 2), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#858790";
        ctx.beginPath();
        ctx.ellipse(x + 14, y + 18, 2.5, 1.8, -0.3, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

/* ── Camera ──────────────────────────────────────────────── */

class Camera {
  constructor(viewW, viewH) {
    this.x = 0; this.y = 0;
    this.shakeX = 0;
    this.shakeY = 0;
    this.viewW = viewW; this.viewH = viewH;
    this.smoothing = 0.08;
  }

  follow(target, worldW, worldH) {
    const targetX = target.x + target.w / 2 - this.viewW / 2;
    const targetY = target.y + target.h / 2 - this.viewH / 2;
    this.x += (targetX - this.x) * this.smoothing;
    this.y += (targetY - this.y) * this.smoothing;
    this.x = Math.max(0, Math.min(this.x, worldW - this.viewW));
    this.y = Math.max(0, Math.min(this.y, worldH - this.viewH));
  }

  resize(viewW, viewH) { this.viewW = viewW; this.viewH = viewH; }

  addShake(amt) {
    const a = Math.max(0, amt);
    this.shakeX = (this.shakeX || 0) + (Math.random() - 0.5) * 2 * a;
    this.shakeY = (this.shakeY || 0) + (Math.random() - 0.5) * 2 * a;
  }

  updateShake(dt) {
    if (!this.shakeX && !this.shakeY) return;
    const k = Math.pow(0.02, Math.min(1, dt * 9));
    this.shakeX *= k;
    this.shakeY *= k;
    if (Math.abs(this.shakeX) < 0.2) this.shakeX = 0;
    if (Math.abs(this.shakeY) < 0.2) this.shakeY = 0;
  }

  applyTransform(ctx) {
    const ox = (this.shakeX || 0), oy = (this.shakeY || 0);
    const z = Math.max(0.01, typeof worldZoom !== "undefined" ? worldZoom : 1);
    ctx.setTransform(z, 0, 0, z, -Math.round((this.x + ox) * z), -Math.round((this.y + oy) * z));
  }

  resetTransform(ctx) { ctx.setTransform(1, 0, 0, 1, 0, 0); }
}

const monsterSpells = [];
function addScreenShake(amt) {
  if (typeof camera !== "undefined" && camera && camera.addShake) camera.addShake(amt);
}

/* ── Player ──────────────────────────────────────────────── */

const DIR = { DOWN: 0, LEFT: 1, RIGHT: 2, UP: 3 };

class Player {
  constructor(col, row) {
    this.x = col * TILE_SIZE;
    this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.speed = 130;
    this.angle = Math.PI / 2;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0; this.moving = false;
    /** Sürekli yürüyüş / kanat çırpma fazı (dt ile büyür). */
    this.walkPhase = 0;
    this.shootCooldown = 0;
    this.shootAnim = 0;
    this.meleeCooldown = 0;
    this.swingAnim = 0;
    this.inBoat = false;
    this.hasBoat = false;
    this.boatWaveTimer = 0;
    /** Karadan B ile indikten sonra hemen yeniden otomatik binmeyi engeller (sn). */
    this.boatAutoBoardCooldown = 0;

    this.level = 1;
    this.xp = 0;
    this.xpToNext = 30;

    this.baseMaxHp = 100;
    this.baseMaxMana = 60;
    this.maxHp = 100;
    this.hp = 100;
    this.hpRegen = 0.5;

    this.maxMana = 60;
    this.mana = 60;
    this.manaRegen = 2.5;

    this.str = 5;
    this.agi = 5;
    this.wis = 3;
    this._eqStr = 0;
    this._eqAgi = 0;
    this._eqWis = 0;
    this._eqMeleeDmg = 0;
    this._eqRangedDmg = 0;
    this._eqDefense = 0;
    this._eqResFire = 0;
    this._eqResGlacier = 0;
    this._eqResLightning = 0;
    this._eqResMagic = 0;
    this._eqResPoison = 0;
    this._eqResCurse = 0;
    this._pendingFullHeal = false;

    this.manaCostShoot = 3;
    this.manaCostPower = 12;

    this.dmgFlashTimer = 0;
    this.levelUpTimer = 0;
    this.powerCharging = false;
    this.powerCharge = 0;
    /** 0\u20131: canavara her vuru\u015fta dolar; [G] ile t\u00fcketilir. */
    this.rageMeter = 0;
    /** >0 iken 3x hasar / max can&mana, g\u00f6rsel patlama. */
    this.rageBurstTimer = 0;

    this.statPoints = 0;
    this.levelDamageBonus = 0;
    this.skills = Object.create(null);
    this.poisonTimer = 0;
    this.activeSkillCd = [0, 0, 0, 0, 0, 0, 0, 0];
    this.skillAuraT = 0;
    this.archerComboCount = 0;
    this.archerComboTimer = 0;
    this.comboBlastTimer = 0;
    this.archerRapidFireTimer = 0;
    this.equipPowerToastTimer = 0;
    this.equipPowerToastText = "";
    this.equipPowerToastColor = "#ffffff";
    this._lastEquipSig = null;
    this._lastEquipTotalHit = null;
  }

  gainXP(amount) {
    this.xp += amount;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.xpToNext = Math.floor(30 * Math.pow(1.4, this.level - 1));
      this.baseMaxHp += 8;
      this.baseMaxMana += 5;
      this.manaRegen += 0.12;
      this.hpRegen += 0.08;
      this.statPoints += 3;
      this.levelDamageBonus += 1;
      this.levelUpTimer = 2.5;
      this._pendingFullHeal = true;
      gameAudio.playLevelUp();
    }
  }

  applyEquipmentBonus(inv) {
    const sum = sumEquipmentEffective(inv);
    const st = sum.stats;
    const adv = sum.advanced;
    this._eqStr = st.str || 0;
    this._eqAgi = st.agi || 0;
    this._eqWis = st.wis || 0;
    this._eqMeleeDmg = st.meleeDmg || 0;
    this._eqRangedDmg = st.rangedDmg || 0;
    this._eqDefense = adv.defense || 0;
    this._eqResFire = adv.resFire || 0;
    this._eqResGlacier = adv.resGlacier || 0;
    this._eqResLightning = adv.resLightning || 0;
    this._eqResMagic = adv.resMagic || 0;
    this._eqResPoison = adv.resPoison || 0;
    this._eqResCurse = adv.resCurse || 0;
    const pctStr = adv.pctStr || 0;
    const pctAgi = adv.pctAgi || 0;
    const pctWis = adv.pctWis || 0;
    if (pctStr) this._eqStr += Math.max(0, Math.floor(this.str * pctStr / 100));
    if (pctAgi) this._eqAgi += Math.max(0, Math.floor(this.agi * pctAgi / 100));
    if (pctWis) this._eqWis += Math.max(0, Math.floor(this.wis * pctWis / 100));
    const eqHp = st.maxHp || 0;
    const eqMana = st.maxMana || 0;
    let skHp = 0, skMana = 0;
    if (this.skills.vitality) skHp += 25;
    if (this.skills.arcane) skMana += 22;
    this.maxHp = this.baseMaxHp + eqHp + skHp;
    this.maxMana = this.baseMaxMana + eqMana + skMana;
    if (adv.pctHp) this.maxHp = Math.max(1, Math.floor(this.maxHp * (1 + adv.pctHp / 100)));
    if (adv.pctMana) this.maxMana = Math.max(1, Math.floor(this.maxMana * (1 + adv.pctMana / 100)));
    if (this.rageBurstTimer > 0) {
      this.maxHp = Math.floor(this.maxHp * 3);
      this.maxMana = Math.floor(this.maxMana * 3);
    }
    if (this._pendingFullHeal) {
      this.hp = this.maxHp;
      this.mana = this.maxMana;
      this._pendingFullHeal = false;
    } else {
      this.hp = Math.min(this.maxHp, this.hp);
      this.mana = Math.min(this.maxMana, this.mana);
    }
    const equipSig = this._equipSignature(inv);
    const totalHit = this._computeTotalHitForDisplay(inv);
    if (this._lastEquipSig != null && equipSig !== this._lastEquipSig && this._lastEquipTotalHit != null) {
      const delta = totalHit - this._lastEquipTotalHit;
      if (delta !== 0) {
        this.equipPowerToastColor = delta > 0 ? "#4cff79" : "#ff5a5a";
        const sign = delta > 0 ? "+" : "";
        this.equipPowerToastText = sign + delta + "  Total Vurus: " + totalHit;
        this.equipPowerToastTimer = 1.35;
      }
    }
    this._lastEquipSig = equipSig;
    this._lastEquipTotalHit = totalHit;
  }

  _equipSignature(inv) {
    if (!inv || !inv.equipped) return "";
    const parts = [];
    for (const sk of EQ_SLOTS) {
      const s = inv.equipped[sk];
      if (!s) continue;
      parts.push(sk + ":" + s.id + ":" + getStackUpgradeLv(s));
    }
    return parts.join("|");
  }

  _computeTotalHitForDisplay(inv) {
    const hasBow = !!(inv && inv.equipped && inv.equipped.bow && ITEMS[inv.equipped.bow.id]);
    const base = 8 + (this.str + this._eqStr) * 1.5 + Math.floor(this.level * 0.8) + (this.levelDamageBonus || 0);
    let ranged = hasBow
      ? Math.max(1, this._eqRangedDmg) + Math.floor((this.agi + this._eqAgi) * 0.05) + Math.floor((this.level - 1) * 0.35)
      : base + this._eqRangedDmg;
    if (this.skills.marksman) ranged *= 1.1;
    let melee = Math.floor(base * 1.2) + this._eqMeleeDmg;
    if (this.skills.brawler) melee += 4;
    return Math.max(1, Math.floor(Math.max(melee, ranged)));
  }

  takeDamage(amount, opts) {
    opts = opts || {};
    let a = amount;
    if (this.skills.ward) a *= 0.92;
    const kind = opts.kind || "physical";
    if (kind === "physical") {
      const defn = this._eqDefense || 0;
      a *= 1 - Math.min(0.72, defn / (defn + 95));
    } else if (kind === "fire" || kind === "meteor") {
      a *= 1 - Math.min(0.82, (this._eqResFire || 0) / 130);
    } else if (kind === "ice") {
      a *= 1 - Math.min(0.82, (this._eqResGlacier || 0) / 130);
    } else if (kind === "lightning") {
      a *= 1 - Math.min(0.82, (this._eqResLightning || 0) / 130);
    } else if (kind === "poison") {
      a *= 1 - Math.min(0.82, (this._eqResPoison || 0) / 130);
    } else if (kind === "magic") {
      a *= 1 - Math.min(0.82, (this._eqResMagic || 0) / 130);
    } else if (kind === "curse") {
      a *= 1 - Math.min(0.82, (this._eqResCurse || 0) / 130);
    }
    a = Math.max(0.35, a);
    const dealt = a;
    this.hp = Math.max(0, this.hp - a);
    this.dmgFlashTimer = 0.3;
    if (dealt > 0.3) {
      spawnDamageFloater(this.centerX, this.y - 8, Math.round(dealt), false, "#ff6a6a");
    }
    if (kind !== "poison") gameAudio.playHurt();
  }

  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
  }

  useMana(amount) {
    if (this.mana < amount) return false;
    this.mana -= amount;
    return true;
  }

  getDamage() {
    return 8 + (this.str + this._eqStr) * 1.5 + Math.floor(this.level * 0.8) + (this.levelDamageBonus || 0);
  }

  getRangedDamage() {
    const eqBow = (typeof inventory !== "undefined" && inventory && inventory.equipped) ? inventory.equipped.bow : null;
    let d;
    if (eqBow && ITEMS[eqBow.id]) {
      d = Math.max(1, this._eqRangedDmg) + Math.floor((this.agi + this._eqAgi) * 0.05) + Math.floor((this.level - 1) * 0.35);
    } else {
      d = this.getDamage() + this._eqRangedDmg;
    }
    if (this.skills.marksman) d *= 1.1;
    return d;
  }

  getPowerDamage() {
    const charge = Math.min(this.powerCharge, 1);
    return this.getRangedDamage() * (2 + charge * 2);
  }

  getMeleeDamage() {
    let d = Math.floor(this.getDamage() * 1.2) + this._eqMeleeDmg;
    if (this.skills.brawler) d += 4;
    return d;
  }

  aimAt(worldX, worldY) {
    this.angle = Math.atan2(worldY - this.centerY, worldX - this.centerX);
  }

  update(dt, map) {
    const { dx, dy } = getMovementVector();
    this.moving = dx !== 0 || dy !== 0;
    if (this.shootCooldown > 0) this.shootCooldown -= dt;
    if (this.shootAnim > 0) this.shootAnim -= dt;
    if (this.meleeCooldown > 0) this.meleeCooldown -= dt;
    if (this.swingAnim > 0) this.swingAnim -= dt;
    if (this.skillAuraT > 0) this.skillAuraT -= dt;
    for (let si = 0; si < this.activeSkillCd.length; si++) {
      if (this.activeSkillCd[si] > 0) this.activeSkillCd[si] -= dt;
    }
    if (this.dmgFlashTimer > 0) this.dmgFlashTimer -= dt;
    if (this.levelUpTimer > 0) this.levelUpTimer -= dt;
    if (this.inBoat) this.boatWaveTimer += dt;
    if (this.archerComboTimer > 0) this.archerComboTimer -= dt;
    if (this.archerComboTimer <= 0) this.archerComboCount = 0;
    if (this.comboBlastTimer > 0) this.comboBlastTimer -= dt;
    if (this.archerRapidFireTimer > 0) this.archerRapidFireTimer -= dt;
    if (this.equipPowerToastTimer > 0) this.equipPowerToastTimer -= dt;

    this.hp = Math.min(this.maxHp, this.hp + this.hpRegen * dt);
    this.mana = Math.min(this.maxMana, this.mana + this.manaRegen * dt);

    if (this.poisonTimer > 0) {
      this.poisonTimer -= dt;
      this.takeDamage(4.5 * dt, { kind: "poison" });
    }

    if (this.powerCharging) {
      this.powerCharge = Math.min(1, this.powerCharge + dt * 0.8);
    }

    if (!this.inBoat && this.boatAutoBoardCooldown > 0) {
      this.boatAutoBoardCooldown -= dt;
    }

    const agiBonus = 1 + (this.agi + this._eqAgi) * 0.008;
    const spd = (this.inBoat ? 160 : this.speed) * agiBonus;

    if (this.moving) {
      if (dy > 0) this.direction = DIR.DOWN;
      else if (dy < 0) this.direction = DIR.UP;
      if (dx < 0) this.direction = DIR.LEFT;
      else if (dx > 0) this.direction = DIR.RIGHT;

      this.animTimer += dt;
      if (this.animTimer >= 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }
      this.walkPhase += dt * 9.2;

      const newX = this.x + dx * spd * dt;
      const newY = this.y + dy * spd * dt;
      const margin = 3;
      if (!this._collides(newX, this.y, map, margin)) this.x = newX;
      if (!this._collides(this.x, newY, map, margin)) this.y = newY;
    } else {
      this.animFrame = 0; this.animTimer = 0;
      this.walkPhase += dt * 1.35;
    }

    /* Okçu gövdesi/kanadı nişan yönünü takip etsin. */
    const bowOn = !!(typeof inventory !== "undefined" && inventory && inventory.equipped && inventory.equipped.bow);
    if (bowOn) {
      const ax = Math.cos(this.angle), ay = Math.sin(this.angle);
      if (Math.abs(ax) > Math.abs(ay)) this.direction = ax >= 0 ? DIR.RIGHT : DIR.LEFT;
      else this.direction = ay >= 0 ? DIR.DOWN : DIR.UP;
    }
  }

  _collides(px, py, map, m) {
    return map.isSolidPx(px + m, py + m, this.inBoat) ||
           map.isSolidPx(px + this.w - m, py + m, this.inBoat) ||
           map.isSolidPx(px + m, py + this.h - m, this.inBoat) ||
           map.isSolidPx(px + this.w - m, py + this.h - m, this.inBoat);
  }

  getFacingTile() {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const tx = cx + Math.cos(this.angle) * TILE_SIZE;
    const ty = cy + Math.sin(this.angle) * TILE_SIZE;
    return { col: Math.floor(tx / TILE_SIZE), row: Math.floor(ty / TILE_SIZE) };
  }

  /** tryPlayerMeleeAttack ile aynı mesafe / ön konu (MELEE_RANGE / MELEE_CONE_HALF). */
  _anyMonsterInMeleeReach(monsters) {
    if (!monsters || !monsters.length) return false;
    const RANGE = 46;
    const CONE_HALF = Math.PI * 0.42;
    const px = this.centerX, py = this.centerY, pa = this.angle;
    for (const m of monsters) {
      if (!m.alive || m.state === "dying") continue;
      const dx = m.cx - px, dy = m.cy - py;
      const dist = Math.hypot(dx, dy);
      if (dist > RANGE) continue;
      const ta = Math.atan2(dy, dx);
      let ad = pa - ta;
      while (ad > Math.PI) ad -= Math.PI * 2;
      while (ad < -Math.PI) ad += Math.PI * 2;
      if (Math.abs(ad) <= CONE_HALF) return true;
    }
    return false;
  }

  _appearanceFromEquipment(inv) {
    const shirt = { main: "#ebe4dc", dark: "#d4c8bc", trim: "#c8b8a8", pants: "#b0a090", skin: "#e8d0a8" };
    let mx = 0;
    let armorMx = 0;
    let powerSum = 0;
    let armorPowerSum = 0;
    const ARMOR_SLOTS = ["head", "chest", "feet", "waist", "arms", "wings"];
    const bump = (d) => {
      if (d && d.rarity) mx = Math.max(mx, rarityRank(d.rarity));
    };
    if (inv && inv.equipped) {
      for (const sk of EQ_SLOTS) {
        const es = inv.equipped[sk];
        if (es && ITEMS[es.id]) {
          const d = ITEMS[es.id];
          bump(d);
          const ps = itemStatPowerScore(d);
          powerSum += ps;
          if (ARMOR_SLOTS.includes(sk)) {
            if (d.rarity) armorMx = Math.max(armorMx, rarityRank(d.rarity));
            armorPowerSum += ps;
          }
        }
      }
    }
    const hasChest = !!(inv?.equipped?.chest && ITEMS[inv.equipped.chest.id]);
    const hasHead = !!(inv?.equipped?.head && ITEMS[inv.equipped.head.id]);
    const hasFeet = !!(inv?.equipped?.feet && ITEMS[inv.equipped.feet.id]);
    const helmId = hasHead ? inv.equipped.head.id : null;
    const handsId = inv?.equipped?.arms ? inv.equipped.arms.id : null;
    const hasJewelry = !!(inv?.equipped?.ring1 || inv?.equipped?.ring2 || inv?.equipped?.amulet);
    const showFantasyBack = hasChest || hasHead;

    let aura = null;
    if (hasChest) {
      if (armorMx >= 4) {
        Object.assign(shirt, { main: "#2a2838", dark: "#14101c", trim: "#ffd080", pants: shirt.pants, skin: "#f0d8a8" });
        aura = "gold";
      } else if (armorMx >= 3) {
        Object.assign(shirt, { main: "#4a2068", dark: "#280838", trim: "#e8a8ff", pants: shirt.pants, skin: "#e8c8e8" });
        aura = "violet";
      } else if (armorMx >= 2) {
        Object.assign(shirt, { main: "#2e5880", dark: "#183858", trim: "#a0d8ff", pants: shirt.pants, skin: "#d8e8f0" });
        aura = "blue";
      }
    }
    const chest = hasChest ? ITEMS[inv.equipped.chest.id] : null;
    if (chest) {
      if (chest.id === "chest_leather") Object.assign(shirt, { main: "#5a5038", dark: "#3a3828", trim: "#c8a878" });
      else if (chest.id === "chest_steel") Object.assign(shirt, { main: "#3a4a60", dark: "#283040", trim: "#c0d0e8" });
      else if (chest.id === "chest_epic") Object.assign(shirt, { main: "#1a5028", dark: "#0e3018", trim: "#70ffa8" });
      else if (chest.id === "chest_legendary") Object.assign(shirt, { main: "#1a1830", dark: "#0a0818", trim: "#b8a0ff" });
    }

    // Miğfer ten rengi ve trim etkisi
    if (helmId === "helm_leather") { shirt.skin = "#dcc8a0"; shirt.trim = "#b09860"; }
    else if (helmId === "helm_iron") { shirt.skin = "#d8d0c8"; shirt.trim = "#8898a8"; }
    else if (helmId === "helm_epic") { shirt.skin = "#e8c8e8"; shirt.trim = "#c080ff"; }
    else if (helmId === "helm_legendary") { shirt.skin = "#f0d8a8"; shirt.trim = "#ffd080"; }

    // Ayak bileği (greave) ve pantolon renkleri
    let greaveColor = "#c4a035";
    const feet = hasFeet ? ITEMS[inv.equipped.feet.id] : null;
    if (feet) {
      if (feet.id === "boots_swift") { shirt.pants = "#284858"; greaveColor = "#284858"; }
      else if (feet.id === "boots_epic") { shirt.pants = "#203848"; greaveColor = "#305878"; }
      else if (feet.id === "boots_leather") { shirt.pants = "#6a5a3a"; greaveColor = "#6a5a3a"; }
    }

    // Eldiven rengi
    let handsColor = "#d0dce8";
    if (handsId === "gloves_archer") handsColor = "#6a8a5a";

    // Kemer etkisi
    const waist = inv?.equipped?.waist ? ITEMS[inv.equipped.waist.id] : null;
    if (waist && waist.id === "waist_cloth") { shirt.pants = "#9a8a70"; }

    // Zırh seti teması (2+ parça eşleşirse bütünleşik görünüm)
    let setTheme = null;
    const setPieces = { leather: 0, steel: 0, epic: 0, legendary: 0 };
    if (helmId === "helm_leather") setPieces.leather++;
    if (chest && chest.id === "chest_leather") setPieces.leather++;
    if (feet && feet.id === "boots_leather") setPieces.leather++;
    if (helmId === "helm_iron") setPieces.steel++;
    if (chest && chest.id === "chest_steel") setPieces.steel++;
    if (feet && feet.id === "boots_swift") setPieces.steel++;
    if (helmId === "helm_epic") setPieces.epic++;
    if (chest && chest.id === "chest_epic") setPieces.epic++;
    if (feet && feet.id === "boots_epic") setPieces.epic++;
    if (helmId === "helm_legendary") setPieces.legendary++;
    if (chest && chest.id === "chest_legendary") setPieces.legendary++;
    if (feet && feet.id === "boots_epic") setPieces.legendary++;
    const bestSet = Object.entries(setPieces).sort((a, b) => b[1] - a[1])[0];
    if (bestSet[1] >= 2) {
      setTheme = bestSet[0];
      if (setTheme === "leather") { shirt.pants = "#5a4a30"; greaveColor = "#5a4a30"; }
      else if (setTheme === "steel") { shirt.pants = "#2e3e50"; greaveColor = "#2e3e50"; }
      else if (setTheme === "epic") { shirt.pants = "#183028"; greaveColor = "#305848"; }
      else if (setTheme === "legendary") { shirt.pants = "#1a1830"; greaveColor = "#302850"; }
    }

    return {
      shirt, mx, armorMx, aura, helmId, handsId, hasJewelry, powerSum, armorPowerSum,
      hasChest, hasFeet, showFantasyBack, greaveColor, handsColor, setTheme,
    };
  }

  _drawHelmDecoration(ctx, helmId, d, bounce) {
    if (!helmId) return;
    if (helmId === "helm_leather") {
      ctx.fillStyle = "#6a4830";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-7, -15 - bounce, 14, 5);
      } else {
        ctx.fillRect(-9, -16 - bounce, 18, 5);
      }
      return;
    }
    if (helmId === "helm_iron") {
      ctx.fillStyle = "#8898a8";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-8, -16 - bounce, 16, 9);
        ctx.fillStyle = "#586878";
        ctx.fillRect(-6, -14 - bounce, 12, 3);
      } else {
        ctx.fillRect(-9, -17 - bounce, 18, 10);
        ctx.fillStyle = "#586878";
        ctx.fillRect(-7, -15 - bounce, 14, 4);
      }
      return;
    }
    if (helmId === "helm_epic") {
      ctx.fillStyle = "#6040a0";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-8, -16 - bounce, 16, 8);
      } else {
        ctx.fillRect(-9, -17 - bounce, 18, 9);
      }
      ctx.strokeStyle = "#ffd060";
      ctx.lineWidth = 1;
      ctx.strokeRect(-8, -16 - bounce, d === DIR.LEFT || d === DIR.RIGHT ? 16 : 18, d === DIR.LEFT || d === DIR.RIGHT ? 8 : 9);
      return;
    }
    if (helmId === "helm_legendary") {
      ctx.fillStyle = "#2a2010";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-8, -17 - bounce, 16, 10);
      } else {
        ctx.fillRect(-9, -18 - bounce, 18, 11);
      }
      ctx.fillStyle = "#ffd060";
      ctx.fillRect(-3, -20 - bounce, 2, 5);
      ctx.fillRect(1, -20 - bounce, 2, 5);
      ctx.strokeStyle = "#ffd080";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, -12 - bounce, 7, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
  }

  /**
   * MMORPG tarzı yarasaları kanatlar: pembe-turuncu zar, mor kemik, turkuaz damar.
   * Bakış yönüne göre "sırt" ekseninde açılır; yürüyünce çırpma genişler.
   */
  _drawFantasyWings(ctx, cx, cy, d, bounce) {
    const t = performance.now() * 0.0011;
    const flap = Math.sin(t) * 0.08;

    const drawOneWing = (side) => {
      ctx.save();
      ctx.rotate(side * 0.52 + flap);
      const gx = ctx.createLinearGradient(0, 0, side * 28, -18);
      gx.addColorStop(0, "rgba(255, 80, 150, 0.95)");
      gx.addColorStop(0.45, "rgba(255, 120, 72, 0.92)");
      gx.addColorStop(1, "rgba(255, 200, 96, 0.88)");
      ctx.fillStyle = gx;
      ctx.beginPath();
      ctx.moveTo(0, -3);
      ctx.quadraticCurveTo(side * 14, -12, side * 26, -20);
      ctx.lineTo(side * 29, 0);
      ctx.quadraticCurveTo(side * 16, 6, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "rgba(72, 220, 200, 0.5)";
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(0, -2);
      ctx.quadraticCurveTo(side * 13, -9, side * 22, -16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(side * 8, 0);
      ctx.quadraticCurveTo(side * 18, -6, side * 24, -12);
      ctx.stroke();
      ctx.strokeStyle = "#3d2060";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(side * 12, -10, side * 24, -18);
      ctx.stroke();
      ctx.fillStyle = "#f2ebe4";
      ctx.beginPath();
      ctx.moveTo(side * 26, -20);
      ctx.lineTo(side * 30, -24);
      ctx.lineTo(side * 27, -14);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    };

    ctx.save();
    ctx.translate(cx, cy - bounce * 0.35);
    if (d === DIR.UP) ctx.rotate(Math.PI);
    else if (d === DIR.LEFT) ctx.rotate(Math.PI / 2);
    else if (d === DIR.RIGHT) ctx.rotate(-Math.PI / 2);
    drawOneWing(-1);
    drawOneWing(1);
    ctx.restore();
  }

  /** Arkadaki pembe hale içinde minik peri silüeti. */
  _drawBackFairyOrb(ctx, cx, cy, d, bounce) {
    let ox = 0, oy = -6;
    if (d === DIR.DOWN) { ox = 0; oy = -14; }
    else if (d === DIR.UP) { ox = 0; oy = 6; }
    else if (d === DIR.LEFT) { ox = 10; oy = -6; }
    else if (d === DIR.RIGHT) { ox = -10; oy = -6; }
    const fx = cx + ox;
    const fy = cy + oy - bounce * 0.4;
    const pulse = 0.65 + 0.35 * Math.sin(performance.now() * 0.0035);
    const bob = Math.sin(performance.now() * 0.0019) * 0.65;
    ctx.save();
    ctx.globalAlpha = 0.42 * pulse;
    const rg = ctx.createRadialGradient(fx, fy + bob, 2, fx, fy + bob, 14);
    rg.addColorStop(0, "rgba(255, 140, 220, 0.9)");
    rg.addColorStop(0.55, "rgba(180, 80, 255, 0.35)");
    rg.addColorStop(1, "rgba(80, 40, 120, 0)");
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(fx, fy + bob, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.55 * pulse;
    ctx.fillStyle = "rgba(255, 200, 255, 0.75)";
    ctx.beginPath();
    ctx.ellipse(fx, fy + bob - 1, 2.2, 3.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(200, 160, 255, 0.9)";
    ctx.beginPath();
    ctx.moveTo(fx - 3, fy + bob);
    ctx.lineTo(fx - 7, fy + bob - 2);
    ctx.lineTo(fx - 5, fy + bob + 1);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(fx + 3, fy + bob);
    ctx.lineTo(fx + 7, fy + bob - 2);
    ctx.lineTo(fx + 5, fy + bob + 1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  _drawBareHair(ctx, d, bounce) {
    ctx.fillStyle = "#4a3220";
    if (d === DIR.DOWN || d === DIR.UP) {
      ctx.beginPath();
      ctx.arc(0, -11 - bounce, 8, Math.PI * 1.08, Math.PI * 1.92);
      ctx.fill();
      ctx.fillRect(-7, -14 - bounce, 14, 4);
    } else if (d === DIR.LEFT) {
      ctx.beginPath();
      ctx.ellipse(-5, -10 - bounce, 6, 8, -0.2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.ellipse(5, -10 - bounce, 6, 8, 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  _drawEquipmentAura(ctx, cx, cy, vis) {
    const pw = vis.armorPowerSum != null ? vis.armorPowerSum : 0;
    const tier = Math.min(1, pw / 130);
    const amx = vis.armorMx != null ? vis.armorMx : vis.mx;
    const showJewelGlow = vis.hasJewelry && amx < 2;
    if (!vis.aura && amx < 2 && !showJewelGlow && tier < 0.06) return;
    const tMs = performance.now();
    const t = tMs / 700;
    let col = "#90b8e0";
    if (vis.aura === "gold") col = "#ffd060";
    else if (vis.aura === "violet") col = "#c080ff";
    else if (vis.aura === "blue") col = "#80c0ff";
    else if (vis.hasJewelry) col = "#a8c8f0";
    const pulse = 0.72 + 0.28 * Math.sin(t);
    const rings = amx >= 4 ? 5 : amx >= 3 ? 4 : amx >= 2 ? 3 : (showJewelGlow ? 2 : 1 + Math.floor(tier * 3));
    const baseR = 13 + tier * 12 + (amx >= 4 ? 8 : amx >= 3 ? 5 : amx >= 2 ? 3 : 0);
    ctx.save();
    for (let i = 0; i < rings; i++) {
      const r = baseR + i * 6.5 + Math.sin(t * 1.35 + i * 0.55) * 2.2;
      const a = Math.min(0.52, (0.1 + tier * 0.22 + amx * 0.045) * pulse / (i * 0.32 + 1));
      ctx.globalAlpha = a;
      ctx.strokeStyle = col;
      ctx.lineWidth = amx >= 4 ? 2.4 : amx >= 3 ? 2 : 1.5;
      ctx.setLineDash(i === 0 && amx >= 3 ? [5, 5] : []);
      ctx.beginPath();
      ctx.arc(cx, cy - 4, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    const rg = ctx.createRadialGradient(cx, cy - 8, 0, cx, cy - 4, baseR + 24);
    rg.addColorStop(0, hexToRgba(col, 0.22 * pulse * (0.85 + tier * 0.35)));
    rg.addColorStop(0.45, hexToRgba(col, 0.08));
    rg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.globalAlpha = 1;
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(cx, cy - 4, baseR + 26, 0, Math.PI * 2);
    ctx.fill();
    if (amx >= 4 || tier > 0.5) {
      const sparkN = amx >= 4 ? 7 : 5;
      for (let k = 0; k < sparkN; k++) {
        const ang = tMs * 0.0019 + k * (Math.PI * 2 / sparkN);
        const pr = baseR + 6 + Math.sin(tMs * 0.0028 + k * 1.1) * 4;
        ctx.globalAlpha = 0.2 + tier * 0.35;
        ctx.fillStyle = amx >= 4 ? "#fff8c8" : "#e8e0ff";
        ctx.beginPath();
        ctx.arc(cx + Math.cos(ang) * pr, cy - 4 + Math.sin(ang) * pr, 1.2 + tier * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  _equippedEffectEntries(inv) {
    const out = [];
    if (!inv || !inv.equipped) return out;
    for (const sk of EQ_SLOTS) {
      const es = inv.equipped[sk];
      if (!es || !ITEMS[es.id]) continue;
      const def = ITEMS[es.id];
      const rk = rarityRank(def.rarity || "common");
      const pw = Math.max(0, itemStatPowerScore(def || {}));
      if (rk < 2 && pw < 6) continue;
      out.push({
        slot: sk,
        color: getItemRarityColor(def.id || ""),
        rk,
        pw,
      });
    }
    return out;
  }

  _drawEquippedItemEffects(ctx, cx, cy, inv) {
    const entries = this._equippedEffectEntries(inv);
    if (!entries.length) return;
    const tMs = performance.now();
    const t = tMs * 0.001;
    const baseR = 14;
    const jewelrySlots = { ring1: 1, ring2: 1, amulet: 1 };
    const armorSlots = { head: 1, chest: 1, feet: 1, waist: 1, arms: 1 };
    ctx.save();
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      const pulse = 0.62 + 0.38 * Math.sin(t * (1.8 + e.rk * 0.25) + i * 0.9);
      const pwrN = Math.min(1, e.pw / 44);
      if (e.slot === "blade" || e.slot === "bow") {
        const r = baseR + 9 + e.rk * 1.8 + pwrN * 8;
        ctx.globalAlpha = 0.16 + 0.22 * pulse + pwrN * 0.12;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 1 + e.rk * 0.25;
        ctx.beginPath();
        ctx.arc(cx, cy - 5, r, t * 0.65 + i, t * 0.65 + i + Math.PI * 0.95);
        ctx.stroke();
        continue;
      }
      if (e.slot === "wings") {
        const rr = 12 + e.rk * 2.5 + pwrN * 10;
        for (const s of [-1, 1]) {
          ctx.globalAlpha = 0.13 + pulse * 0.2;
          const gx = ctx.createRadialGradient(cx + s * (6 + rr * 0.35), cy - 8, 0, cx + s * (8 + rr * 0.42), cy - 8, rr);
          gx.addColorStop(0, hexToRgba(e.color, 0.46));
          gx.addColorStop(0.5, hexToRgba(e.color, 0.18));
          gx.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = gx;
          ctx.beginPath();
          ctx.ellipse(cx + s * (8 + rr * 0.4), cy - 8, rr * 0.8, rr * 0.45, s * 0.25, 0, Math.PI * 2);
          ctx.fill();
        }
        continue;
      }
      if (jewelrySlots[e.slot]) {
        const n = 2 + Math.min(4, e.rk);
        for (let k = 0; k < n; k++) {
          const a = t * (1.8 + e.rk * 0.2) + i * 0.7 + k * (Math.PI * 2 / n);
          const r = 7 + e.rk * 1.8 + pwrN * 5 + Math.sin(t * 2.3 + k) * 1.5;
          ctx.globalAlpha = 0.2 + 0.28 * pulse;
          ctx.fillStyle = e.rk >= 4 ? "#fff4c8" : e.color;
          ctx.beginPath();
          ctx.arc(cx + Math.cos(a) * r, cy - 12 + Math.sin(a) * r * 0.7, 0.9 + pwrN * 1.4, 0, Math.PI * 2);
          ctx.fill();
        }
        continue;
      }
      if (armorSlots[e.slot]) {
        const r = baseR + (i % 3) * 4 + e.rk * 1.5 + pwrN * 6;
        ctx.globalAlpha = 0.09 + pulse * 0.16;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 1.1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.arc(cx, cy - 4, r, t * 0.45 + i * 0.4, t * 0.45 + i * 0.4 + Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.restore();
  }

  render(ctx, inventory, monsters) {
    const inv = inventory || null;
    const vis = this._appearanceFromEquipment(inv);
    const bladeId = inv && inv.equipped && inv.equipped.blade ? inv.equipped.blade.id : null;
    const bowId = inv && inv.equipped && inv.equipped.bow ? inv.equipped.bow.id : null;
    const hasBladeEquipped = !!(bladeId && ITEMS[bladeId] && ITEMS[bladeId].equipSlot === "blade");
    const hasBowEquipped = !!(bowId && ITEMS[bowId] && ITEMS[bowId].equipSlot === "bow");
    const showBow = hasBowEquipped && this.shootAnim > 0;
    const showBladeVisual = hasBladeEquipped && (this.swingAnim > 0 || !hasBowEquipped) && this.shootAnim <= 0;

    const cx = Math.round(this.x + this.w / 2);
    const cy = Math.round(this.y + this.h / 2);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) * 2.2 : 0;
    const legDrive = this.moving ? 1 : 0;
    const walkCycle = this.walkPhase * 2;
    const lStride = Math.sin(walkCycle) * 3.4 * legDrive;
    const rStride = Math.sin(walkCycle + Math.PI) * 3.4 * legDrive;
    const armBob = Math.sin(walkCycle + Math.PI / 2) * 1.5 * legDrive;
    const shootT = this.shootAnim > 0 ? Math.min(1, this.shootAnim / 0.3) : 0;
    const pull = shootT > 0 ? Math.sin(shootT * Math.PI / 2) * 7.5 : 0;
    const d = this.direction;
    const a = this.angle;
    const bowInFront = this._isBowInFront(d, a);
    const S = vis.shirt;

    if (this.rageBurstTimer > 0) {
      const pu = 0.82 + 0.18 * Math.sin(performance.now() * 0.014);
      ctx.save();
      ctx.globalAlpha = 0.32 * pu;
      const rg = ctx.createRadialGradient(cx, cy - 4, 2, cx, cy, 40 + pu * 14);
      rg.addColorStop(0, "rgba(255,220,120,0.95)");
      rg.addColorStop(0.4, "rgba(255,90,40,0.5)");
      rg.addColorStop(1, "rgba(200,20,0,0)");
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(cx, cy - 2, 46, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.6 * pu;
      ctx.strokeStyle = "rgba(255,240,160,0.9)";
      ctx.lineWidth = 2.8;
      ctx.beginPath();
      ctx.arc(cx, cy - 2, 32 + pu * 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    this._drawEquipmentAura(ctx, cx, cy, vis);
    this._drawEquippedItemEffects(ctx, cx, cy, inv);
    if (vis.showFantasyBack) {
      this._drawFantasyWings(ctx, cx, cy, d, bounce);
      this._drawBackFairyOrb(ctx, cx, cy, d, bounce);
    }

    if (showBow && !bowInFront) this._drawBowAndArms(ctx, cx, cy, bounce, pull, bowId, armBob, shootT);

    // Oyuncu gölgesi (dinamik)
    const shAlpha = 0.16 + Math.sin(performance.now() * 0.003 + this.x * 0.05) * 0.04;
    ctx.fillStyle = "rgba(0,0,0," + shAlpha + ")";
    ctx.beginPath();
    ctx.ellipse(cx, cy + 10, 7 + Math.abs(lStride) * 0.3, 2.8 + Math.abs(rStride) * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(cx, cy);

    const greave = vis.greaveColor || "#c4a035";
    ctx.fillStyle = S.pants;
    if (d === DIR.LEFT || d === DIR.RIGHT) {
      ctx.save();
      ctx.translate(-2.5 + lStride * 0.08, 4 - bounce);
      ctx.rotate(lStride * 0.045);
      ctx.fillRect(0, 0, 3.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1, 3.2, 2.2);
        ctx.fillRect(0, 4.5, 3.2, 1.4);
      }
      ctx.restore();
      ctx.fillStyle = S.pants;
      ctx.save();
      ctx.translate(0.5 - lStride * 0.08, 4 - bounce);
      ctx.rotate(-lStride * 0.045);
      ctx.fillRect(0, 0, 3.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1, 3.2, 2.2);
        ctx.fillRect(0, 4.5, 3.2, 1.4);
      }
      ctx.restore();
    } else {
      if (d === DIR.DOWN && vis.hasChest) {
        ctx.fillStyle = "rgba(90, 40, 120, 0.85)";
        ctx.beginPath();
        ctx.moveTo(-3, 3 - bounce);
        ctx.lineTo(0, 9 - bounce);
        ctx.lineTo(3, 3 - bounce);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillStyle = S.pants;
      ctx.save();
      ctx.translate(-5.5 + lStride, 4 - bounce);
      ctx.rotate(lStride * 0.055);
      ctx.fillRect(0, 0, 4.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1.2, 4.2, 2.2);
        ctx.fillRect(0, 5, 4.2, 1.4);
      }
      ctx.restore();
      ctx.fillStyle = S.pants;
      ctx.save();
      ctx.translate(1.5 + rStride, 4 - bounce);
      ctx.rotate(rStride * 0.055);
      ctx.fillRect(0, 0, 4.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1.2, 4.2, 2.2);
        ctx.fillRect(0, 5, 4.2, 1.4);
      }
      ctx.restore();
    }

    if (d === DIR.LEFT || d === DIR.RIGHT) {
      ctx.fillStyle = S.main;
      ctx.fillRect(-6, -7 - bounce, 12, 11);
      ctx.fillStyle = S.dark;
      ctx.fillRect(-6, -7 - bounce, 12, 3);
      ctx.fillStyle = S.dark;
      ctx.fillRect(-5, 2 - bounce, 10, 5);

      const qSide = d === DIR.LEFT ? 1 : -1;
      const ab = armBob * 0.35;
      if (vis.hasChest) {
        ctx.fillStyle = "#b8942a";
        ctx.fillRect(-7 + qSide * 5, -10 - bounce + ab, 4, 5);
        ctx.fillStyle = "#f0d878";
        ctx.fillRect(-6.5 + qSide * 5, -9 - bounce + ab, 3, 1.5);
      }
      if (hasBowEquipped) {
        ctx.fillStyle = "#6b4226";
        ctx.fillRect(qSide * 2, -5 - bounce + ab, 3, 7);
        ctx.fillStyle = S.trim;
        ctx.fillRect(qSide * 2 + 1, -7 - bounce + ab, 2, 3);
        ctx.fillRect(qSide * 2 + 1, 2 - bounce + ab, 2, 2);
      }
      if (vis.handsId) {
        ctx.fillStyle = vis.handsColor || "#d0dce8";
        ctx.fillRect(qSide * 2 - 1, -6 - bounce + ab, 5, 3);
        ctx.fillRect(qSide * 2 - 1, 0 - bounce + ab, 5, 3);
      }
    } else {
      ctx.fillStyle = S.dark;
      ctx.fillRect(-7, 2 - bounce, 6, 5);
      ctx.fillRect(1, 2 - bounce, 6, 5);
      ctx.fillStyle = S.main;
      ctx.fillRect(-8, -7 - bounce, 16, 11);
      ctx.fillStyle = S.dark;
      ctx.fillRect(-8, -7 - bounce, 16, 3);
      if (vis.hasChest) {
        ctx.fillStyle = "#b8942a";
        ctx.fillRect(-12, -9 - bounce, 4, 5);
        ctx.fillRect(8, -9 - bounce, 4, 5);
        ctx.fillStyle = "#f0d878";
        ctx.fillRect(-11.5, -8 - bounce, 3, 1.5);
        ctx.fillRect(8.5, -8 - bounce, 3, 1.5);
      }

      if (d === DIR.DOWN && hasBowEquipped) {
        const ab = armBob * 0.4;
        ctx.fillStyle = "#6b4226";
        ctx.fillRect(-8, -6 - bounce + ab, 3, 8);
        ctx.fillStyle = S.trim;
        ctx.fillRect(-8, -8 - bounce + ab, 2, 3);
        ctx.fillRect(-8, 2 - bounce + ab, 2, 3);
        if (vis.handsId) {
          ctx.fillStyle = vis.handsColor || "#d0dce8";
          ctx.fillRect(-10, -5 - bounce + ab, 3, 4);
          ctx.fillRect(-10, 1 - bounce + ab, 3, 4);
        }
      }
    }

    ctx.fillStyle = S.skin;
    ctx.beginPath(); ctx.arc(0, -8 - bounce, 6, 0, Math.PI * 2); ctx.fill();
    if (d === DIR.DOWN) {
      ctx.fillStyle = "#222";
      ctx.fillRect(-2, -9 - bounce, 2, 2);
      ctx.fillRect(1, -9 - bounce, 2, 2);
    } else if (d === DIR.LEFT) {
      ctx.fillStyle = "#222";
      ctx.fillRect(-3, -9 - bounce, 2, 2);
    } else if (d === DIR.RIGHT) {
      ctx.fillStyle = "#222";
      ctx.fillRect(1, -9 - bounce, 2, 2);
    }
    if (vis.helmId) {
      this._drawHelmDecoration(ctx, vis.helmId, d, bounce);
    } else {
      this._drawBareHair(ctx, d, bounce);
    }

    if (inv && inv.equipped && inv.equipped.amulet) {
      const am = ITEMS[inv.equipped.amulet.id];
      const pwAm = itemStatPowerScore(am || {});
      ctx.fillStyle = (vis.mx >= 3 || pwAm > 22) ? "#ffd0e8" : "#b89870";
      ctx.beginPath();
      ctx.arc(0, -2 - bounce, 2.2 + Math.min(1.2, pwAm / 40), 0, Math.PI * 2);
      ctx.fill();
      if (vis.mx >= 4 || pwAm > 35) {
        ctx.strokeStyle = "rgba(255,220,180,0.75)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    ctx.restore();

    // Hasar alınca sprite parlama efekti
    if (this.dmgFlashTimer > 0) {
      const flashA = Math.min(0.45, this.dmgFlashTimer * 1.5);
      ctx.fillStyle = "rgba(255,60,60," + flashA + ")";
      ctx.fillRect(this.x - 1, this.y - 1, this.w + 2, this.h + 2);
    }

    if (showBow && bowInFront) this._drawBowAndArms(ctx, cx, cy, bounce, pull, bowId, armBob, shootT);
    if (showBladeVisual) {
      this._drawEquippedBlade(ctx, cx, cy, bounce, a, bladeId);
    }
    if (this.swingAnim > 0) this._drawMeleeSwing(ctx, cx, cy, bounce);
    drawEntityNameLabel(ctx, this.centerX, this.y - 14, getPlayerWorldLabelName(), {
      color: "#e8f4ff",
      border: "rgba(120, 170, 220, 0.5)",
      bg: "rgba(10, 18, 36, 0.82)",
    });
  }

  _drawEquippedBlade(ctx, cx, cy, bounce, aimAngle, bladeId) {
    ctx.save();
    ctx.translate(cx, cy + bounce * 0.35);
    ctx.rotate(aimAngle + Math.PI * 0.12);
    const bd = bladeId && ITEMS[bladeId];
    const rk = bd && bd.rarity ? rarityRank(bd.rarity) : 1;
    const pwBl = itemStatPowerScore(bd || {});
    const pulseBl = 0.55 + 0.45 * Math.sin(performance.now() / 280);
    const ringR = 20 + Math.min(8, pwBl / 8);
    if (rk >= 2 || pwBl > 5) {
      ctx.globalAlpha = (0.12 + rk * 0.055 + Math.min(0.22, pwBl / 100)) * pulseBl;
      ctx.strokeStyle = rk >= 4 ? "#ffe8a0" : rk >= 3 ? "#e8c0ff" : "#b8e8ff";
      ctx.lineWidth = rk >= 4 ? 2.2 : rk >= 3 ? 1.8 : 1.4;
      ctx.beginPath(); ctx.arc(0, -8, ringR, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, -8, ringR + 4 + rk, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    const sh = Math.min(24, 5 + rk * 3.2 + Math.min(11, pwBl / 6)) * pulseBl;
    if (rk >= 4) { ctx.shadowColor = "#ffd060"; ctx.shadowBlur = sh; }
    else if (rk >= 3) { ctx.shadowColor = "#c080ff"; ctx.shadowBlur = sh * 0.92; }
    else if (rk >= 2) { ctx.shadowColor = "#80c0ff"; ctx.shadowBlur = sh * 0.85; }
    else if (pwBl > 4) { ctx.shadowColor = "#a0a8c0"; ctx.shadowBlur = sh * 0.5; }
    const bid = bladeId || "";
    const tint = bid.includes("elven") ? "#b0e8ff" : bid.includes("steel") ? "#d0dce8" : bid.includes("rusty") ? "#8a7a6a" : "#c8c8d8";
    ctx.fillStyle = tint;
    ctx.fillRect(-2, -20, 4, 24);
    ctx.fillStyle = "rgba(255,255,255,0.45)"; ctx.fillRect(-1.5, -19, 1.2, 20);
    ctx.fillStyle = "#e8e8f0";
    ctx.fillRect(-2.5, -21, 5, 5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#6B4226";
    ctx.fillRect(-4, 6, 8, 3);
    ctx.fillRect(-1.5, 4, 3, 5);
    ctx.restore();
  }

  _isBowInFront(d, a) {
    if (d === DIR.DOWN) return true;
    if (d === DIR.UP) return false;
    if (d === DIR.RIGHT) return a > -Math.PI * 0.5 && a < Math.PI * 0.5;
    return a > Math.PI * 0.5 || a < -Math.PI * 0.5;
  }

  _drawBowAndArms(ctx, cx, cy, bounce, pull, bowId, armBob, shootT) {
    const a = this.angle;
    const bob = (armBob || 0) * 0.22;
    const shoulderX = cx;
    const shoulderY = cy - 2 - bounce + bob;
    let wood = "#8a7028", stringCol = "#e8e8e8", limb = "#8B6B3D";
    if (bowId === "bow_hunter") { wood = "#5a6048"; stringCol = "#a0c890"; limb = "#4a5038"; }
    if (bowId === "bow_long") { wood = "#504060"; stringCol = "#d0b0ff"; limb = "#403050"; }
    if (bowId === "bow_storm_legendary") { wood = "#2b5d90"; stringCol = "#95f0ff"; limb = "#224978"; }
    if (bowId === "bow_dragon_legendary") { wood = "#8a3a24"; stringCol = "#ffd2aa"; limb = "#6e2416"; }

    ctx.save();
    ctx.translate(shoulderX, shoulderY);
    ctx.rotate(a);
    const bdef = bowId && ITEMS[bowId];
    const rkB = bdef && bdef.rarity ? rarityRank(bdef.rarity) : 0;
