    const pwB = itemStatPowerScore(bdef || {});
    const pulseB = 0.6 + 0.4 * Math.sin(performance.now() / 310);
    const tMs = performance.now();
    const drawFx = true;
    if (rkB >= 2 || pwB > 4) {
      ctx.shadowColor = rkB >= 4 ? "rgba(255,215,130,0.95)" : rkB >= 3 ? "rgba(210,175,255,0.9)" : "rgba(150,205,255,0.88)";
      ctx.shadowBlur = Math.min(22, 4 + rkB * 3 + Math.min(11, pwB / 5.5)) * pulseB;
    }

    const drawStr = Math.max(0.4, 1 - (shootT || 0)) * 0.35;
    if (drawFx) {
      ctx.save();
      ctx.globalAlpha = 0.55 + (shootT || 0) * 0.35;
      const g0 = ctx.createRadialGradient(19, 5, 0, 19, 5, 14);
      g0.addColorStop(0, "rgba(60, 255, 120, 0.9)");
      g0.addColorStop(0.5, "rgba(40, 180, 90, 0.35)");
      g0.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g0;
      ctx.beginPath();
      ctx.arc(19, 5, 12 + Math.sin(tMs * 0.008) * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = 0.5 + pulseB * 0.35;
      const g1 = ctx.createRadialGradient(11, 0, 0, 11, 0, 11);
      g1.addColorStop(0, "rgba(160, 220, 255, 0.95)");
      g1.addColorStop(0.45, "rgba(100, 140, 255, 0.4)");
      g1.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g1;
      ctx.beginPath();
      ctx.arc(11, 0, 9 + (shootT || 0) * 4, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 5; i++) {
        const j = (tMs * 0.012 + i * 1.7) % 3;
        ctx.strokeStyle = "rgba(220, 240, 255, " + (0.35 + j * 0.15) + ")";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(6 + i * 2.2, -4 + (i % 2) * 8);
        ctx.lineTo(14 + j * 3, 3 - j * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.fillStyle = "#e0c060";
    ctx.fillRect(2, -1.5, 9, 3);
    ctx.fillStyle = "#d4b050";
    ctx.beginPath(); ctx.arc(11, 0, 2, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = wood; ctx.lineWidth = 2.8;
    ctx.beginPath(); ctx.arc(13, 0, 8, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();

    ctx.strokeStyle = stringCol; ctx.lineWidth = 1.1;
    const topX = 13 + Math.cos(-Math.PI * 0.6) * 8;
    const topY = Math.sin(-Math.PI * 0.6) * 8;
    const botX = 13 + Math.cos(Math.PI * 0.6) * 8;
    const botY = Math.sin(Math.PI * 0.6) * 8;
    const nockX = 13 - pull;
    ctx.beginPath();
    ctx.moveTo(topX, topY);
    ctx.quadraticCurveTo(nockX - 2, drawStr * 4, nockX, 0);
    ctx.quadraticCurveTo(nockX - 2, -drawStr * 4, botX, botY);
    ctx.stroke();

    ctx.fillStyle = "#c9a227";
    ctx.fillRect(0.5, -2.2, 4, 4.4);
    ctx.fillRect(-0.5 + pull * 0.08, 1.6, 3.2, 2.8);

    ctx.fillStyle = "#e0c060";
    ctx.fillRect(1, -1.5 + 3, 6 - pull * 0.65, 3);
    ctx.fillStyle = "#d4b050";
    ctx.beginPath(); ctx.arc(7 - pull * 0.65, 1.5, 2, 0, Math.PI * 2); ctx.fill();

    if (pull > 0.2) {
      ctx.fillStyle = limb;
      ctx.fillRect(9 - pull, -1, 14, 2);
      ctx.fillStyle = "#c0c0c0";
      ctx.beginPath();
      ctx.moveTo(23 - pull, 0);
      ctx.lineTo(20 - pull, -3);
      ctx.lineTo(20 - pull, 3);
      ctx.fill();
      ctx.fillStyle = "#d04040";
      ctx.fillRect(8 - pull, -2.5, 2, 5);
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  _drawMeleeSwing(ctx, cx, cy, bounce) {
    if (this.swingAnim <= 0) return;
    const dur = 0.28;
    const t = 1 - this.swingAnim / dur;
    const arcSpan = Math.PI * 0.55 * (0.35 + t * 0.65);
    ctx.save();
    ctx.translate(cx, cy + bounce * 0.5);
    ctx.rotate(this.angle);
    ctx.strokeStyle = "rgba(240, 245, 255, 0.9)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(8, 0, 26, -arcSpan * 0.5, arcSpan * 0.5);
    ctx.stroke();
    ctx.strokeStyle = "rgba(180, 200, 255, 0.45)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(8, 0, 24, -arcSpan * 0.45, arcSpan * 0.45);
    ctx.stroke();
    ctx.restore();
  }

  renderBoat(ctx) {
    const cx = Math.round(this.x + this.w / 2);
    const cy = Math.round(this.y + this.h / 2);
    const wave = Math.sin(this.boatWaveTimer * 2.5) * 2;
    const rock = Math.sin(this.boatWaveTimer * 1.8) * 0.04;

    ctx.save();
    ctx.translate(cx, cy + wave);
    ctx.rotate(this.angle + Math.PI / 2 + rock);

    ctx.fillStyle = "#6B4226";
    ctx.beginPath();
    ctx.moveTo(-12, 8);
    ctx.lineTo(-10, -12);
    ctx.lineTo(0, -18);
    ctx.lineTo(10, -12);
    ctx.lineTo(12, 8);
    ctx.quadraticCurveTo(0, 14, -12, 8);
    ctx.fill();
    ctx.strokeStyle = "#4a2e16"; ctx.lineWidth = 1; ctx.stroke();

    ctx.fillStyle = "#8B5E3C";
    ctx.fillRect(-9, -4, 18, 3);
    ctx.fillRect(-7, 2, 14, 3);

    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(-1, -16, 2, 22);

    ctx.fillStyle = "#e0d0b0";
    ctx.beginPath();
    ctx.moveTo(1, -16);
    ctx.lineTo(10, -10);
    ctx.lineTo(1, -6);
    ctx.fill();
    ctx.strokeStyle = "#c0b090"; ctx.lineWidth = 0.5; ctx.stroke();

    ctx.restore();

    ctx.save();
    ctx.translate(cx, cy + wave);
    ctx.rotate(this.angle + Math.PI / 2 + rock);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) * 1 : 0;

    ctx.fillStyle = "#e0c060";
    ctx.beginPath(); ctx.arc(0, -2 - bounce, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2a6030";
    ctx.beginPath();
    ctx.moveTo(-3, -4 - bounce);
    ctx.lineTo(0, -9 - bounce);
    ctx.lineTo(3, -4 - bounce);
    ctx.fill();
    ctx.fillStyle = "#222";
    ctx.fillRect(-1.5, -3 - bounce, 1.5, 1.5);
    ctx.fillRect(0.5, -3 - bounce, 1.5, 1.5);

    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#80c0ff";
    const wt = this.boatWaveTimer;
    for (let i = 0; i < 3; i++) {
      const wx = cx - 14 + Math.sin(wt * 2 + i * 2.5) * 6;
      const wy = cy + 10 + i * 4 + Math.cos(wt * 1.5 + i) * 2;
      ctx.beginPath();
      ctx.arc(wx, wy, 5, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(wx + 14, wy + 2, 4, 0, Math.PI);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    drawEntityNameLabel(ctx, cx, Math.round(cy + wave - 34), getPlayerWorldLabelName(), {
      color: "#e8f4ff",
      border: "rgba(120, 170, 220, 0.4)",
    });
  }

  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }
  /** Tekne binme / zemin kontrol\u00fc i\u00e7in ayaklar\u0131n yakla\u015f\u0131k pikseli. */
  get feetX() { return this.centerX; }
  get feetY() { return this.y + this.h - 4; }
}

/* ── Arrow Projectile ────────────────────────────────────── */

class Arrow {
  constructor(x, y, angle) {
    this.x = x; this.y = y;
    this.angle = angle;
    this.speed = 300;
    this.alive = true;
    this.life = 2.5;
    this.w = 4; this.h = 4;
    this.dx = Math.cos(angle);
    this.dy = Math.sin(angle);
    this.damage = 10;
    this.power = false;
    this.trail = [];
    /** "fire" | "ice" | null \u2014 beceri c\u00f6mle\u011fi g\u00f6r\u00fcn\u00fcm\u00fc */
    this.element = null;
    /** G\u00fc\u00e7 patlamas\u0131nda at\u0131lan b\u00fcy\u00fck ok g\u00f6r\u00fcn\u00fcm\u00fc */
    this.furyShot = false;
  }

  update(dt, map) {
    if (!this.alive) return;
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }
    if (this.power) {
      this.trail.push({ x: this.x, y: this.y, t: 0.2 });
      for (let i = this.trail.length - 1; i >= 0; i--) {
        this.trail[i].t -= dt;
        if (this.trail[i].t <= 0) this.trail.splice(i, 1);
      }
    }
    this.x += this.dx * this.speed * dt;
    this.y += this.dy * this.speed * dt;
    if (map.isSolidPx(this.x, this.y)) {
      const col = Math.floor(this.x / TILE_SIZE);
      const row = Math.floor(this.y / TILE_SIZE);
      const detail = map.getDetail(col, row);
      const tile = map.getTile(col, row);
      if (detail === TileType.TREE || tile === TileType.TREE) {
        const destroyed = damageTree(col, row, this.damage);
        if (destroyed) {
          if (detail === TileType.TREE) map.setDetail(col, row, -1);
          else { map.setTile(col, row, TileType.GRASS); map.setDetail(col, row, -1); }
          const woodAmt = 2 + Math.floor(Math.random() * 3);
          inventory.addItem("wood", woodAmt);
          player.gainXP(1);
          pickupMsgText = "+" + woodAmt + " Odun";
          pickupMsgTimer = 1.5;
          gameAudio.playChop();
        } else {
          spawnDamageFloater(this.x, this.y, this.damage, false, "#8B4513");
        }
      }
      this.alive = false;
    }
  }

  render(ctx) {
    if (!this.alive) return;

    if (this.power) {
      for (const p of this.trail) {
        ctx.globalAlpha = p.t / 0.2 * 0.4;
        ctx.fillStyle = "#d080ff";
        ctx.beginPath();
        ctx.arc(Math.round(p.x), Math.round(p.y), 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    const fs = this.furyShot ? 1.75 : 1;
    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    ctx.scale(fs, fs);
    ctx.rotate(this.angle);

    if (this.power) {
      ctx.shadowColor = "#d080ff";
      ctx.shadowBlur = 8;
    }

    let shaft = "#8B6B3D", tip = "#c0c0c0", feather = "#d04040";
    if (this.element === "fire") {
      shaft = "#c86018"; tip = "#ffe0a0"; feather = "#ff4010";
      ctx.shadowColor = "#ff8040"; ctx.shadowBlur = 6;
    } else if (this.element === "ice") {
      shaft = "#5090b8"; tip = "#e8f8ff"; feather = "#4080c0";
      ctx.shadowColor = "#a0d8ff"; ctx.shadowBlur = 5;
    }
    if (this.furyShot && !this.element) {
      shaft = "#5a3018"; tip = "#fff0c0"; feather = "#ff3018";
    }
    if (this.furyShot) {
      ctx.shadowColor = "#ff5020";
      ctx.shadowBlur = 16 + Math.sin(performance.now() * 0.02) * 4;
    }
    ctx.fillStyle = this.power ? "#b060e0" : shaft;
    ctx.fillRect(-8, -1, 16, 2);
    ctx.fillStyle = this.power ? "#f0c0ff" : tip;
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(5, -3); ctx.lineTo(5, 3); ctx.fill();
    ctx.fillStyle = this.power ? "#a040d0" : feather;
    ctx.fillRect(-8, -2, 1.5, 4);
    ctx.fillRect(-6.5, -1.5, 1, 3);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

class MonSpell {
  constructor(x, y, tx, ty, damage, kind) {
    this.x = x;
    this.y = y;
    const d0 = Math.hypot(tx - x, ty - y) || 1;
    this.dx = (tx - x) / d0;
    this.dy = (ty - y) / d0;
    this.ang = Math.atan2(this.dy, this.dx);
    this.kind = kind;
    this.damage = damage;
    this.alive = true;
    this.life = kind === "meteor" ? 4.2 : 3.2;
    this.t = 0;
    this.spin = 0;
    this.trail = [];
    this.trailT = 0;
    this.lightJag = 0.6 + Math.random() * 0.7;
    if (kind === "meteor") {
      this.x -= this.dx * 100;
      this.y -= 150 + Math.random() * 50;
      const d2 = Math.hypot(tx - this.x, ty - this.y) || 1;
      this.dx = (tx - this.x) / d2;
      this.dy = (ty - this.y) / d2;
      this.ang = Math.atan2(this.dy, this.dx);
      this.speed = 280;
    } else if (kind === "ice") {
      this.speed = 220;
    } else if (kind === "poison") {
      this.speed = 185;
    } else if (kind === "lightning") {
      this.speed = 450;
    } else {
      this.speed = 255;
    }
  }

  _pushTrail() {
    this.trailT += 0.04;
    this.trail.push({ x: this.x, y: this.y, a: 1, s: this.trailT });
    if (this.trail.length > 9) this.trail.shift();
    for (const p of this.trail) p.a *= 0.88;
  }

  update(dt, map, player) {
    if (!this.alive) return;
    this.life -= dt;
    this.t += dt;
    this.spin += dt * (this.kind === "ice" ? 6 : 3);
    if (this.life <= 0) {
      this.alive = false;
      return;
    }
    this.x += this.dx * this.speed * dt;
    this.y += this.dy * this.speed * dt;
    this.ang = Math.atan2(this.dy, this.dx);
    if (this.kind === "fire" || this.kind === "meteor" || this.kind === "poison") {
      this._pushTrail();
    }
    if (map.isSolidPx(this.x, this.y)) {
      this.alive = false;
      return;
    }
    const pcx = player.centerX, pcy = player.centerY;
    const hitR = this.kind === "meteor" ? 16 : 12;
    if (Math.hypot(this.x - pcx, this.y - pcy) < hitR) {
      let dm = this.damage;
      if (this.kind === "ice") dm = Math.floor(dm * 0.92);
      if (this.kind === "meteor") dm = Math.floor(dm * 1.15);
      if (this.kind === "poison") {
        dm = Math.floor(dm * 0.45);
        player.poisonTimer = Math.max(player.poisonTimer || 0, 2.8);
      }
      const dk = this.kind === "meteor" ? "fire" : this.kind;
      player.takeDamage(dm, { kind: dk });
      this.alive = false;
    }
  }

  render(ctx) {
    if (!this.alive) return;
    const x = this.x, y = this.y;
    ctx.save();
    const tr = this.trail;
    if (tr && tr.length) {
      for (let i = 0; i < tr.length; i++) {
        const p = tr[i], k = p.a;
        if (k < 0.05) continue;
        if (this.kind === "meteor" || this.kind === "fire") {
          const rr = 5 + (1 - k) * 10;
          ctx.fillStyle = `rgba(255,${(100 + 80 * k) | 0},50,${k * 0.4})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
          ctx.fill();
        } else if (this.kind === "poison") {
          ctx.fillStyle = `rgba(80,200,60,${k * 0.35})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 6 * k, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    if (this.kind === "fire" || this.kind === "meteor") {
      const ang = this.ang;
      ctx.translate(x, y);
      ctx.rotate(ang);
      const m = this.kind === "meteor" ? 1.15 : 1;
      const coreG = ctx.createLinearGradient(12, 0, -10, 0);
      if (this.kind === "meteor") {
        coreG.addColorStop(0, "#1a0a0a");
        coreG.addColorStop(0.3, "#4a3020");
        coreG.addColorStop(0.55, "#8a4a1a");
        coreG.addColorStop(0.8, "#ff6a1a");
        coreG.addColorStop(1, "rgba(255,200,100,0.2)");
      } else {
        coreG.addColorStop(0, "#3a0a0a");
        coreG.addColorStop(0.4, "#ff5a0a");
        coreG.addColorStop(0.7, "#ffc040");
        coreG.addColorStop(1, "rgba(255,220,120,0.15)");
      }
      ctx.fillStyle = coreG;
      ctx.beginPath();
      ctx.ellipse(0, 0, 14 * m, 6 * m, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,200,100,0.5)";
      for (let j = 0; j < 3; j++) {
        const ph = (this.t * 8 + j * 2) % 6;
        const ox = -6 - ph;
        const oy = (j - 1) * 2.5;
        ctx.beginPath();
        ctx.ellipse(ox, oy, 2 + j, 3 + j * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (this.kind === "meteor") {
        ctx.fillStyle = "rgba(255,100,0,0.4)";
        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.lineTo(-4, 3);
        ctx.lineTo(-4, -3);
        ctx.closePath();
        ctx.fill();
      }
    } else if (this.kind === "ice") {
      const ang = this.ang, sp = this.spin;
      ctx.translate(x, y);
      ctx.rotate(ang);
      ctx.rotate(sp * 0.25);
      ctx.fillStyle = "rgba(200,240,255,0.9)";
      ctx.beginPath();
      ctx.moveTo(9, 0);
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 + sp;
        const rr = 4 + (i % 2) * 4;
        ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath();
      ctx.fill();
      const ic = ctx.createLinearGradient(4, -6, -2, 6);
      ic.addColorStop(0, "#b8e0ff");
      ic.addColorStop(1, "#5090c8");
      ctx.fillStyle = ic;
      ctx.beginPath();
      ctx.moveTo(7, 0);
      for (let i = 0; i < 5; i++) {
        const a2 = (i / 5) * Math.PI * 2;
        const rr2 = 3.5;
        ctx.lineTo(Math.cos(a2 + sp) * rr2, Math.sin(a2 + sp) * rr2);
      }
      ctx.closePath();
      ctx.fill();
    } else if (this.kind === "poison") {
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.beginPath();
      ctx.arc(x + 1, y + 2, 8, 0, Math.PI * 2);
      ctx.fill();
      for (let k = 0; k < 2; k++) {
        const ox = Math.sin(this.t * 10 + k * 1.2) * 2;
        const g = ctx.createRadialGradient(x + ox, y, 0, x + ox, y, 9);
        g.addColorStop(0, "#a8ff6a");
        g.addColorStop(0.45, "#3a8a1a");
        g.addColorStop(1, "rgba(0,30,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x + ox, y, 5 + k * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (this.kind === "lightning") {
      const ang = this.ang, lj = this.lightJag, tt = this.t;
      ctx.translate(x, y);
      ctx.rotate(ang);
      const jx = (i) => Math.sin(tt * 22 + i * 1.4) * 1.4 * lj + Math.sin(tt * 41 + i) * 0.6;
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = "#a0b8ff";
      for (let b = 0; b < 2; b++) {
        const off = b * 3;
        ctx.beginPath();
        ctx.ellipse(0, off, 2.5, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(240,245,255,0.95)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(10, jx(0));
      let px2 = 10, py2 = 0;
      for (let s = 0; s < 5; s++) {
        px2 -= 4.5;
        py2 = (s % 2 ? 1 : -1) * 5 + jx(s + 1) * 0.5;
        ctx.lineTo(px2, py2);
      }
      ctx.lineTo(-12, 1 + jx(7) * 0.3);
      ctx.stroke();
      ctx.strokeStyle = "rgba(180,200,255,0.65)";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(8, jx(8) * 0.2);
      for (let s2 = 0; s2 < 4; s2++) {
        const xx = 8 - (s2 + 1) * 3.2;
        const yy = (s2 % 2 ? 0.4 : -0.4) * 6 + jx(9 + s2) * 0.3;
        ctx.lineTo(xx, yy);
      }
      ctx.lineTo(-10, jx(20) * 0.2);
      ctx.stroke();
    } else {
      ctx.translate(x, y);
      ctx.rotate(this.ang);
      const f = ctx.createLinearGradient(6, 0, -4, 0);
      f.addColorStop(0, "#ff9040");
      f.addColorStop(1, "#a03010");
      ctx.fillStyle = f;
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawMonsterSprite(ctx, type, x, y, dir, frame, hitFlash, atkAnim, bw, bh, mstate) {
  const bww = bw != null ? bw : 20, bhh = bh != null ? bh : 20;
  const cx = x + bww / 2, cy = y + bhh / 2;
  if (hitFlash > 0) { ctx.globalAlpha = 0.5 + Math.sin(hitFlash * 30) * 0.5; }
  const st = mstate || "idle";
  const locomotion = st === "chase" || st === "attack" ? 1 : 0.45;
  const swayX = Math.sin(frame * Math.PI * 0.9) * 0.9 * locomotion;
  const bobY = Math.cos(frame * Math.PI * 1.1) * 0.8 * locomotion;
  ctx.save();
  ctx.translate(swayX, bobY);

  switch (type) {
    case "island_treasure_chest": {
      const lid = Math.sin(frame * Math.PI * 0.5) * 0.6 + (atkAnim > 0 ? -2 : 0);
      const pulse = 0.65 + 0.35 * Math.sin(frame * Math.PI * 0.45);
      ctx.fillStyle = "rgba(0,0,0,0.22)";
      ctx.beginPath(); ctx.ellipse(cx, cy + 12, 10, 3.4, 0, 0, Math.PI * 2); ctx.fill();
      const g = ctx.createLinearGradient(cx - 10, cy - 8, cx + 10, cy + 10);
      g.addColorStop(0, hitFlash > 0 ? "#ffae70" : "#8c4f22");
      g.addColorStop(1, hitFlash > 0 ? "#ff7a50" : "#5a2e12");
      ctx.fillStyle = g;
      ctx.fillRect(cx - 10, cy - 2, 20, 12);
      ctx.fillStyle = hitFlash > 0 ? "#ffd9a0" : "#a8642e";
      ctx.fillRect(cx - 10, cy - 10 + lid, 20, 8);
      ctx.fillStyle = "#d8b060";
      ctx.fillRect(cx - 2, cy - 3, 4, 4);
      ctx.fillStyle = "#f8e8a0";
      ctx.globalAlpha = 0.28 + pulse * 0.35;
      ctx.beginPath(); ctx.arc(cx, cy - 2, 10 + pulse * 5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      break;
    }
    case "slime": {
      const sq = 1 + Math.sin(frame * Math.PI) * 0.18;
      const h = (bhh * 0.6) * sq, w = (bww * 0.78) / sq;
      const mst = mstate || "idle";
      const stride = mst === "chase" || mst === "attack" ? 1 : 0.5;
      const blob = Math.sin(frame * Math.PI * 1.3) * 1.5 * stride;
      const bubble = 0.7 + Math.sin(frame * 2.2) * 0.3;
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath(); ctx.ellipse(cx, cy + bhh * 0.43, w * 0.42, 3.2, 0, 0, Math.PI * 2); ctx.fill();
      const g = ctx.createRadialGradient(cx - 3, cy - 2, 0, cx, cy + 5, Math.max(w, h) * 0.7);
      g.addColorStop(0, hitFlash > 0 ? "#ffaaaa" : "#b7ffc1");
      g.addColorStop(0.52, hitFlash > 0 ? "#ff6666" : "#53bc63");
      g.addColorStop(1, hitFlash > 0 ? "#9a2424" : "#246938");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(cx, cy + 4, w * 0.5, h * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "rgba(255,160,160,0.35)" : "rgba(255,255,255,0.35)";
      ctx.beginPath(); ctx.ellipse(cx - 2, cy + 1, w * 0.24, h * 0.15, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "rgba(255,120,120,0.25)" : "rgba(200,255,210,0.3)";
      ctx.beginPath(); ctx.ellipse(cx + 3, cy + 5, w * 0.12, h * 0.08, 0.3, 0, Math.PI * 2); ctx.fill();
      for (let i = 0; i < 3; i++) {
        const bx = cx + Math.sin(frame * 0.7 + i * 2.1) * (w * 0.28);
        const by = cy + 3 + Math.cos(frame * 0.5 + i * 1.4) * (h * 0.2);
        ctx.fillStyle = hitFlash > 0 ? `rgba(255,100,100,${0.2 * bubble})` : `rgba(255,255,255,${0.25 * bubble})`;
        ctx.beginPath(); ctx.arc(bx, by, 1.2 + i * 0.3, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = hitFlash > 0 ? "#ffe0e0" : "#f2fff2";
      ctx.beginPath(); ctx.arc(cx - 3, cy - 1, 1.8, 0, Math.PI * 2); ctx.arc(cx + 2, cy - 1, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "#600" : "#122018";
      ctx.beginPath(); ctx.arc(cx - 3, cy - 0.5, 1.1, 0, Math.PI * 2); ctx.arc(cx + 2, cy - 0.5, 1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#e8ffe8";
      ctx.beginPath(); ctx.arc(cx - 3.2, cy - 0.7, 0.45, 0, Math.PI * 2); ctx.arc(cx + 1.8, cy - 0.7, 0.4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "rgba(120,20,20,0.45)" : "rgba(18,40,24,0.4)";
      ctx.beginPath(); ctx.arc(cx, cy + 3.5, 2.5 + blob * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "rgba(255,100,100,0.15)" : "rgba(100,255,140,0.15)";
      ctx.beginPath(); ctx.arc(cx, cy + 2, w * 0.55, h * 0.55, 0, Math.PI * 2); ctx.fill();
      if (atkAnim > 0) {
        ctx.fillStyle = hitFlash > 0 ? "rgba(255,100,100,0.25)" : "rgba(100,255,140,0.25)";
        ctx.beginPath(); ctx.arc(cx, cy + 2, w * 0.65, h * 0.65, 0, Math.PI * 2); ctx.fill();
      }
      break;
    }
    case "wolf": {
      const run = Math.sin(frame * Math.PI) * 2.8;
      const face = dir === DIR.LEFT ? -1 : dir === DIR.RIGHT ? 1 : 1;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(face, 1);
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.beginPath(); ctx.ellipse(0, 10, 10, 3.4, 0, 0, Math.PI * 2); ctx.fill();

      this.state = "dying";
      this.deathTimer = 0.6;
    } else if (this.state === "idle") {
      this.state = "chase";
    }
    if (this.state !== "dying") this.alertAlliesTimer = 1.2;
  }

  update(dt, map, player) {
    if (!this.alive) {
      this.respawnTimer += dt;
      if (this.respawnTimer >= this.respawnTime) {
        this.alive = true;
        this.hp = this.maxHp;
        this.x = this.col * TILE_SIZE;
        this.y = this.row * TILE_SIZE;
        this.state = "idle";
        this.respawnTimer = 0;
        this.respawnTime = this._rollRespawnTime();
      }
      return;
    }

    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.atkAnim > 0) this.atkAnim -= dt;
    if (this.alertAlliesTimer > 0) this.alertAlliesTimer -= dt;
    this.animTimer += dt;
    if (this.animTimer >= 0.18) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

    if (this.state === "dying") {
      this.deathTimer -= dt;
      if (this.deathTimer <= 0) {
        this.alive = false;
        return "dead";
      }
      return;
    }

    const dist = this.distTo(player.centerX, player.centerY);

    if (this.state === "idle") {
      if (dist < this.aggroRange) {
        this.state = "chase";
      } else {
        this._wander(dt, map);
      }
    }

    if (this.state === "chase") {
      if (dist > this.aggroRange * 2) {
        this.state = "idle";
        return;
      }
      const rMax = this.rangedMax != null ? this.rangedMax : TILE_SIZE * 9;
      const rMaxBossNear = this.boss ? Math.min(rMax, TILE_SIZE * 4.6) : rMax;
      const rMin = this.rangedMin != null ? this.rangedMin : 16;
      const inRangedBand = this.rangedKind && dist > rMin && dist < rMaxBossNear && dist > this.atkRange;
      if (inRangedBand) {
        this.state = "attack";
        this.atkTimer = 0;
      } else if (dist <= this.atkRange) {
        this.state = "attack";
        this.atkTimer = 0;
      } else {
        this._moveToward(player.centerX, player.centerY, dt, map);
      }
    }

    if (this.state === "attack") {
      if (dist > this.aggroRange * 2) {
        this.state = "idle";
        return;
      }
      if (this.rangedKind) {
        const rMax2 = this.rangedMax != null ? this.rangedMax : TILE_SIZE * 9;
        const rMax2BossNear = this.boss ? Math.min(rMax2, TILE_SIZE * 5.2) : rMax2;
        if (dist > rMax2BossNear) {
          this.state = "chase";
          return;
        }
      } else {
        if (dist > this.atkRange * 1.8) {
          this.state = "chase";
          return;
        }
      }
      this.atkTimer += dt;
      if (this.atkTimer >= this.atkCd) {
        this.atkTimer = 0;
        this.atkAnim = 0.25;
        if (!(player.inBoat && playerBoatFullyOnWater(map, player))) {
          const rMax3 = this.rangedMax != null ? this.rangedMax : TILE_SIZE * 9;
          const rMax3BossNear = this.boss ? Math.min(rMax3, TILE_SIZE * 4.8) : rMax3;
          const inMelee = dist <= this.atkRange;
          const canRanged = this.rangedKind && !inMelee && dist < rMax3BossNear && dist > (this.rangedMin != null ? this.rangedMin : 0);
          if (canRanged) {
            monsterSpells.push(new MonSpell(this.cx, this.cy, player.centerX, player.centerY, this.dmg, this.rangedKind));
            const isAncientDragon = this.type === "skywing_dragon" || this.type === "ancient_flame_dragon" || this.type === "frost_ancient_wyrm" || this.type === "storm_sovereign_dragon" || this.type === "void_ancient_dragon";
            if (this.boss) addScreenShake(isAncientDragon ? 6.5 : 3.5);
          } else {
            player.takeDamage(this.dmg, { kind: "physical" });
            const isAncientDragon = this.type === "skywing_dragon" || this.type === "ancient_flame_dragon" || this.type === "frost_ancient_wyrm" || this.type === "storm_sovereign_dragon" || this.type === "void_ancient_dragon";
            if (this.boss) addScreenShake(isAncientDragon ? 2.8 : 1.1);
          }
        }
        return "hit";
      }
      this._faceTarget(player.centerX, player.centerY);
    }
  }

  _wander(dt, map) {
    this.wanderTimer -= dt;
    if (this.wanderTimer <= 0 && this.moveTime <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.5 + Math.random() * 1.5;
      this._faceDir(this.moveDir.dx, this.moveDir.dy);
    }
    if (this.moveTime > 0) {
      this.moveTime -= dt;
      const nx = this.x + this.moveDir.dx * this.speed * 0.4 * dt;
      const ny = this.y + this.moveDir.dy * this.speed * 0.4 * dt;
      const ddx = nx - this.homeX, ddy = ny - this.homeY;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < TILE_SIZE * 4 && !this._collides(nx, ny, map)) {
        this.x = nx; this.y = ny;
      }
      if (this.moveTime <= 0) this.wanderTimer = 2 + Math.random() * 3;
    }
  }

  _moveToward(tx, ty, dt, map) {
    const dx = tx - this.cx, dy = ty - this.cy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) return;
    const nx = this.x + (dx / d) * this.speed * dt;
    const ny = this.y + (dy / d) * this.speed * dt;
    if (!this._collides(nx, this.y, map)) this.x = nx;
    if (!this._collides(this.x, ny, map)) this.y = ny;
    this._faceDir(dx, dy);
    if (this.boss && typeof addScreenShake === "function")
      addScreenShake(0.1 + 0.12 * (this.w / 20));
  }

  _faceTarget(tx, ty) { this._faceDir(tx - this.cx, ty - this.cy); }

  _faceDir(dx, dy) {
    if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    else this.direction = dy > 0 ? DIR.DOWN : DIR.UP;
  }

  _collides(px, py, map) {
    const m = 3;
    return map.isSolidPx(px + m, py + m) || map.isSolidPx(px + this.w - m, py + m) ||
           map.isSolidPx(px + m, py + this.h - m) || map.isSolidPx(px + this.w - m, py + this.h - m);
  }

  render(ctx) {
    if (!this.alive) return;
    const living = this.state !== "dying";
    const t = performance.now() * 0.001;
    const moveMul = (this.state === "chase" || this.state === "attack" || this.moving) ? 1 : 0.35;
    const bob = Math.sin(t * (2.8 + this.speed * 0.004) + this.x * 0.01) * (living ? 1.4 * moveMul : 0);
    const tilt = Math.sin(t * (2.2 + this.speed * 0.003) + this.y * 0.01) * (living ? 0.03 * moveMul : 0);
    const breath = 1 + Math.sin(t * 2 + this.x * 0.02) * (living ? 0.02 : 0);
    ctx.save();
    ctx.translate(this.cx, this.cy + bob * 0.22);
    ctx.rotate(tilt);
    ctx.scale(1, breath);
    ctx.translate(-this.cx, -this.cy);
    if (this.state === "dying") {
      ctx.globalAlpha = this.deathTimer / 0.6;
      const sc = 0.5 + this.deathTimer / 0.6 * 0.5;
      ctx.save();
      ctx.translate(this.cx, this.cy);
      ctx.scale(sc, sc);
      ctx.translate(-this.cx, -this.cy);
    }

    // Boss / elemental aura
    if (this.boss && living) {
      const pulse = 0.6 + Math.sin(t * 3) * 0.15;
      const auraColor = this.rangedKind === "fire" ? "rgba(255,80,20," + (pulse * 0.25) + ")" :
                        this.rangedKind === "ice" ? "rgba(80,180,255," + (pulse * 0.25) + ")" :
                        this.rangedKind === "poison" ? "rgba(120,255,60," + (pulse * 0.22) + ")" :
                        "rgba(255,200,60," + (pulse * 0.18) + ")";
      const rg = ctx.createRadialGradient(this.cx, this.cy + 4, 4, this.cx, this.cy + 4, Math.max(this.w, this.h) * 0.9);
      rg.addColorStop(0, "rgba(0,0,0,0)");
      rg.addColorStop(0.5, auraColor);
      rg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = rg;
      ctx.fillRect(this.cx - this.w, this.cy - this.h, this.w * 2, this.h * 2);
    }

    drawMonsterSprite(ctx, this.type, this.x, this.y, this.direction, this.animFrame, this.hitFlash, this.atkAnim, this.w, this.h, this.state);

    // Universal hit flash overlay
    if (this.hitFlash > 0 && living) {
      const flashAlpha = Math.min(0.5, this.hitFlash * 1.2);
      ctx.fillStyle = "rgba(255,240,240," + flashAlpha + ")";
      ctx.fillRect(this.x - 2, this.y - 2, this.w + 4, this.h + 4);
    }

    if (this.state !== "dying") {
      const barW = this.boss ? 34 : 24;
      const barH = this.boss ? 5 : 4;
      const bx = this.cx - barW / 2;
      const by = this.y - (this.boss ? 10 : 7);
      ctx.fillStyle = "rgba(10,10,18,0.85)";
      roundRect(ctx, bx - 1, by - 1, barW + 2, barH + 2, 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(140,140,160,0.45)";
      ctx.lineWidth = 0.5;
      roundRect(ctx, bx - 1, by - 1, barW + 2, barH + 2, 2);
      ctx.stroke();
      const hpRatio = Math.max(0, this.hp / this.maxHp);
      const hpGrad = ctx.createLinearGradient(bx, by, bx, by + barH);
      if (hpRatio > 0.5) { hpGrad.addColorStop(0, "#55e065"); hpGrad.addColorStop(1, "#30a040"); }
      else if (hpRatio > 0.25) { hpGrad.addColorStop(0, "#f0c840"); hpGrad.addColorStop(1, "#c08020"); }
      else { hpGrad.addColorStop(0, "#ff5050"); hpGrad.addColorStop(1, "#a02020"); }
      roundRect(ctx, bx, by, barW * hpRatio, barH, 1.5);
      ctx.fillStyle = hpGrad;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.lineWidth = 0.5;
      const segCount = this.boss ? 4 : 3;
      for (let si = 1; si < segCount; si++) {
        const sx = bx + (barW * si / segCount);
        ctx.beginPath(); ctx.moveTo(sx, by); ctx.lineTo(sx, by + barH); ctx.stroke();
      }
    }

    // Aggro indicator for non-boss enemies
    if (living && (this.state === "chase" || this.state === "attack") && !this.boss) {
      const agPulse = 0.5 + Math.sin(t * 7) * 0.5;
      ctx.fillStyle = "rgba(255,60,60," + (agPulse * 0.35) + ")";
      ctx.beginPath();
      ctx.arc(this.cx, this.y - 2, 3 + agPulse * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    if (this.state === "dying") {
      ctx.restore();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    const mt = MONSTER_TYPES[this.type];
    const nm = (mt && mt.name) ? mt.name : this.type;
    const lvName = (this.ultraBoss ? "ULTRA " : "") + "Lv." + this.level + " " + nm;
    const danger = typeof player !== "undefined" && player && isMonsterDangerousForPlayerLevel(this, player.level);
    const showLabel = !touchState.mobileUI || this.boss ||
      (typeof player !== "undefined" && player && this.distTo(player.centerX, player.centerY) <= TILE_SIZE * 7);
    if (showLabel) {
      const labelColor = danger ? "#ff4a4a" : (this.boss ? "#ffd060" : "#ffffff");
      const labelBorder = danger ? "rgba(90, 20, 20, 0.7)" : (this.boss ? "rgba(180, 140, 40, 0.6)" : "rgba(200, 200, 210, 0.35)");
      const labelBg = danger ? "rgba(26, 8, 8, 0.82)" : (this.boss ? "rgba(36, 24, 4, 0.88)" : "rgba(8, 10, 22, 0.78)");
      drawEntityNameLabel(ctx, this.cx, this.y - 20, lvName, {
        color: labelColor,
        border: labelBorder,
        bg: labelBg,
      });
      if (this.boss) {
        ctx.fillStyle = "#ffd060";
        ctx.font = "bold 10px monospace";
        ctx.fillText("\u2605", this.cx - ctx.measureText(lvName).width / 2 - 12, this.y - 20);
      }
    }
    // İstek doğrultusunda etiket sadece "Lv + isim".
  }
}

/* ── NPC ─────────────────────────────────────────────────── */

class NPC {
  constructor({ col, row, name, color, dialog, wanderRadius = 0, merchant = false, stock = null, shopPool = null, buildsBoat = false }) {
    this.x = col * TILE_SIZE; this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.name = name; this.color = color || "#c06030";
    this.dialog = dialog || ["..."];
    this.merchant = merchant;
    this.stock = stock;
    this.shopPool = shopPool;
    this.buildsBoat = !!buildsBoat;
    this.direction = DIR.DOWN;
    this.homeX = this.x; this.homeY = this.y;
    this.wanderRadius = wanderRadius * TILE_SIZE;
    this.wanderTimer = 2 + Math.random() * 3;
    this.moving = false; this.moveDir = { dx: 0, dy: 0 }; this.moveTime = 0;
    this.speed = 40; this.animTimer = 0; this.animFrame = 0;
  }

  update(dt, map) {
    if (this.wanderRadius <= 0) return;
    this.wanderTimer -= dt;

    if (!this.moving && this.wanderTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.5 + Math.random() * 1.5;
      this.moving = true;
      if (Math.abs(this.moveDir.dx) > Math.abs(this.moveDir.dy))
        this.direction = this.moveDir.dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else
        this.direction = this.moveDir.dy > 0 ? DIR.DOWN : DIR.UP;
    }

    if (this.moving) {
      this.moveTime -= dt;
      this.animTimer += dt;
      if (this.animTimer >= 0.2) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      const newX = this.x + this.moveDir.dx * this.speed * dt;
      const newY = this.y + this.moveDir.dy * this.speed * dt;
      const distX = newX - this.homeX, distY = newY - this.homeY;
      const dist = Math.sqrt(distX * distX + distY * distY);

      if (dist < this.wanderRadius && !this._collides(newX, newY, map)) {
        this.x = newX; this.y = newY;
      }
      if (this.moveTime <= 0) {
        this.moving = false; this.animFrame = 0;
        this.wanderTimer = 2 + Math.random() * 4;
      }
    }
  }

  _collides(px, py, map) {
    const m = 3;
    return map.isSolidPx(px + m, py + m) ||
           map.isSolidPx(px + this.w - m, py + m) ||
           map.isSolidPx(px + m, py + this.h - m) ||
           map.isSolidPx(px + this.w - m, py + this.h - m);
  }

  isNearPlayer(player, range = TILE_SIZE * 1.5) {
    const dx = (this.x + this.w / 2) - player.centerX;
    const dy = (this.y + this.h / 2) - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  render(ctx) {
    const x = Math.round(this.x), y = Math.round(this.y);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) : 0;

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(x + 10, y + 19, 7, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#3a3a5a";
    ctx.fillRect(x + 4, y + 16 - bounce, 4, 4);
    ctx.fillRect(x + 12, y + 16 - bounce, 4, 4);
    ctx.fillStyle = this.color;
    ctx.fillRect(x + 3, y + 6 - bounce, 14, 12);
    ctx.fillStyle = "#e8c870";
    ctx.fillRect(x + 5, y - 2 - bounce, 10, 10);

    ctx.fillStyle = "#222";
    switch (this.direction) {
      case DIR.DOWN:
        ctx.fillRect(x + 7, y + 3 - bounce, 2, 2);
        ctx.fillRect(x + 11, y + 3 - bounce, 2, 2);
        break;
      case DIR.LEFT:  ctx.fillRect(x + 5, y + 3 - bounce, 2, 2); break;
      case DIR.RIGHT: ctx.fillRect(x + 13, y + 3 - bounce, 2, 2); break;
    }
  }
}

/* ── Pet System ──────────────────────────────────────────── */

const PET_TYPES = {
  cat:    { name: "Kedi",    speed: 110, bodyColor: "#d4a040", earColor: "#b88030", tameFood: "fish" },
  dog:    { name: "K\u00f6pek",   speed: 130, bodyColor: "#b08050", earColor: "#8a6030", tameFood: "apple" },
  bunny:  { name: "Tav\u015fan",  speed: 140, bodyColor: "#d0d0d0", earColor: "#e8b0b0", tameFood: "flower" },
  bird:   { name: "Ku\u015f",     speed: 100, bodyColor: "#50a0e0", earColor: "#3080c0", tameFood: "seed" },
  fox:    { name: "Tilki",   speed: 120, bodyColor: "#d06020", earColor: "#a04010", tameFood: "apple" },
};

function drawPetSprite(ctx, type, x, y, dir, animFrame, moving) {
  const pt = PET_TYPES[type];
  const bounce = moving ? Math.sin(animFrame * Math.PI / 2) * 1.5 : 0;
  const legOff = moving ? Math.sin(animFrame * Math.PI) * 2 : 0;

  if (type === "bird") {
    const wingFlap = moving ? Math.sin(animFrame * Math.PI) * 4 : 0;
    ctx.fillStyle = pt.bodyColor;
    ctx.beginPath(); ctx.ellipse(x + 8, y + 8 - bounce, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = pt.earColor;
    ctx.beginPath(); ctx.moveTo(x + 2, y + 6 - bounce - wingFlap); ctx.lineTo(x + 6, y + 8 - bounce); ctx.lineTo(x + 2, y + 10 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y + 6 - bounce + wingFlap); ctx.lineTo(x + 10, y + 8 - bounce); ctx.lineTo(x + 14, y + 10 - bounce); ctx.fill();
    ctx.fillStyle = "#e8a020";
    ctx.beginPath(); ctx.moveTo(x + 12, y + 8 - bounce);
    if (dir === DIR.RIGHT) { ctx.lineTo(x + 17, y + 7 - bounce); ctx.lineTo(x + 12, y + 9 - bounce); }
    else if (dir === DIR.LEFT) { ctx.lineTo(x - 1, y + 7 - bounce); ctx.lineTo(x + 4, y + 9 - bounce); }
    else { ctx.lineTo(x + 9, y + 6 - bounce); ctx.lineTo(x + 7, y + 9 - bounce); }
    ctx.fill();
    ctx.fillStyle = "#111";
    if (dir !== DIR.UP) {
      ctx.fillRect(x + (dir === DIR.LEFT ? 5 : 9), y + 6 - bounce, 2, 2);
    }
    return;
  }

  ctx.fillStyle = pt.bodyColor;
  ctx.fillRect(x + 2, y + 6 - bounce, 12, 8);

  ctx.fillStyle = pt.earColor;
  if (type === "bunny") {
    ctx.fillRect(x + 3, y - 4 - bounce, 3, 8);
    ctx.fillRect(x + 10, y - 4 - bounce, 3, 8);
  } else if (type === "cat") {
    ctx.beginPath(); ctx.moveTo(x + 2, y + 2 - bounce); ctx.lineTo(x + 5, y + 6 - bounce); ctx.lineTo(x - 1, y + 6 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y + 2 - bounce); ctx.lineTo(x + 11, y + 6 - bounce); ctx.lineTo(x + 17, y + 6 - bounce); ctx.fill();
  } else if (type === "fox") {
    ctx.beginPath(); ctx.moveTo(x + 1, y + 1 - bounce); ctx.lineTo(x + 5, y + 6 - bounce); ctx.lineTo(x - 2, y + 6 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 15, y + 1 - bounce); ctx.lineTo(x + 11, y + 6 - bounce); ctx.lineTo(x + 18, y + 6 - bounce); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.fillRect(x + 4, y + 10 - bounce, 8, 4);
  } else {
    ctx.fillRect(x + 1, y + 2 - bounce, 4, 6);
    ctx.fillRect(x + 11, y + 2 - bounce, 4, 6);
  }

  ctx.fillStyle = pt.bodyColor;
  ctx.fillRect(x + 2, y + 2 - bounce, 12, 6);

  ctx.fillStyle = pt.earColor;
  ctx.fillRect(x + 3 + legOff, y + 14 - bounce, 3, 3);
  ctx.fillRect(x + 10 - legOff, y + 14 - bounce, 3, 3);

  if (type === "cat" || type === "fox") {
    ctx.fillStyle = pt.earColor;
    const tailWag = Math.sin(Date.now() / 200) * 3;
    if (dir === DIR.LEFT) ctx.fillRect(x + 14, y + 8 - bounce + tailWag, 5, 2);
    else if (dir === DIR.RIGHT) ctx.fillRect(x - 3, y + 8 - bounce + tailWag, 5, 2);
    else ctx.fillRect(x + 14, y + 6 - bounce + tailWag, 5, 2);
  }
  if (type === "dog") {
    ctx.fillStyle = pt.earColor;
    const tailWag = Math.sin(Date.now() / 150) * 4;
    ctx.fillRect(x + 13, y + 6 - bounce + tailWag, 3, 2);
    ctx.fillRect(x + 15, y + 5 - bounce + tailWag, 2, 2);
  }

  ctx.fillStyle = "#111";
  if (dir !== DIR.UP) {
    ctx.fillRect(x + (dir === DIR.LEFT ? 3 : 5), y + 5 - bounce, 2, 2);
    ctx.fillRect(x + (dir === DIR.LEFT ? 8 : 10), y + 5 - bounce, 2, 2);
  }

  ctx.fillStyle = "#222";
  if (dir === DIR.DOWN || dir === DIR.LEFT || dir === DIR.RIGHT) {
    ctx.fillRect(x + 6, y + 8 - bounce, 4, 1);
  }
}

/** Evcil hayvan loot üzerindeyken toplama mesafesi (px). */
const PET_LOOT_PICKUP_RANGE = TILE_SIZE * 1.35;
/** Pet bu yarıçap içinde bir loot görür ve yürüyerek gider. */
const PET_LOOT_SENSE_RANGE = TILE_SIZE * 11;
/** Oyuncudan daha uzaktaki lootlar için pet hedef almaz (tüm haritaya koşmasın). */
const PET_LOOT_MAX_CHASE_FROM_PLAYER = TILE_SIZE * 13;

class Pet {
  constructor(type, name) {
    this.type = type;
    this.name = name;
    this.x = 0; this.y = 0;
    this.w = 16; this.h = 16;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0; this.moving = false;
    this.happiness = 80;
    this.lastFedTimer = 0;
    this.heartTimer = 0;
    this.posHistory = [];
    this.followDist = 28;
    /** @type {WorldItem | null} */
    this.lootTarget = null;
    /** G\u00fc\u00e7 [G] ile verilen canavar hedefi */
    this.combatTarget = null;
    this.petAttackCd = 0;
  }

  feed(itemId) {
    const pt = PET_TYPES[this.type];
    let gain = 5;
    if (itemId === pt.tameFood) gain = 20;
    else if (itemId === "apple" || itemId === "fish") gain = 10;
    this.happiness = Math.min(100, this.happiness + gain);
    this.lastFedTimer = 0;
    this.heartTimer = 1.5;
    return gain;
  }

  update(dt, player, map, worldItems, inventory, monsters) {
    this.lastFedTimer += dt;
    if (this.lastFedTimer > 60) this.happiness = Math.max(0, this.happiness - dt * 0.5);
    if (this.heartTimer > 0) this.heartTimer -= dt;

    this.posHistory.push({ x: player.centerX, y: player.centerY });
    if (this.posHistory.length > 30) this.posHistory.shift();

    if (!player.rageBurstTimer || player.rageBurstTimer <= 0) {
      this.combatTarget = null;
    } else if (this.combatTarget && (!this.combatTarget.alive || this.combatTarget.state === "dying")) {
      this.combatTarget = null;
    }

    const rageFight = player.rageBurstTimer > 0 && this.combatTarget && this.combatTarget.alive &&
      this.combatTarget.state !== "dying" && monsters && !player.inBoat;
    if (rageFight) {
      const m = this.combatTarget;
      let mdx = m.cx - this.centerX, mdy = m.cy - this.centerY;
      let md = Math.hypot(mdx, mdy) || 1;
      if (md < 40) {
        this.petAttackCd -= dt;
        if (this.petAttackCd <= 0) {
          const raw = player.getMeleeDamage() * 0.5;
          m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
          this.petAttackCd = 0.55;
        }
        this.moving = md > 3;
        if (Math.abs(mdx) > Math.abs(mdy)) this.direction = mdx > 0 ? DIR.RIGHT : DIR.LEFT;
        else this.direction = mdy > 0 ? DIR.DOWN : DIR.UP;
        this.animTimer += dt;
        if (this.animTimer >= 0.12) {
          this.animTimer = 0;
          this.animFrame = (this.animFrame + 1) % 4;
        }
      } else {
        const speed = PET_TYPES[this.type].speed * 1.7;
        const nx = mdx / md, ny = mdy / md;
        const newX = this.x + nx * speed * dt;
        const newY = this.y + ny * speed * dt;
        const mm = 2;
        if (!map.isSolidPx(newX + mm, this.y + mm) && !map.isSolidPx(newX + this.w - mm, this.y + mm)) this.x = newX;
        if (!map.isSolidPx(this.x + mm, newY + mm) && !map.isSolidPx(this.x + this.w - mm, newY + mm)) this.y = newY;
        this.moving = true;
        if (Math.abs(mdx) > Math.abs(mdy)) this.direction = mdx > 0 ? DIR.RIGHT : DIR.LEFT;
        else this.direction = mdy > 0 ? DIR.DOWN : DIR.UP;
        this.animTimer += dt;
        if (this.animTimer >= 0.12) {
          this.animTimer = 0;
          this.animFrame = (this.animFrame + 1) % 4;
        }
      }
      return;
    }

    if (player.inBoat) this.lootTarget = null;

    const maxCh2 = PET_LOOT_MAX_CHASE_FROM_PLAYER * PET_LOOT_MAX_CHASE_FROM_PLAYER;
    if (this.lootTarget) {
      if (!this.lootTarget.alive) {
        this.lootTarget = null;
      } else {
        const qdx = this.lootTarget.x - player.centerX, qdy = this.lootTarget.y - player.centerY;
        if (qdx * qdx + qdy * qdy > maxCh2) this.lootTarget = null;
      }
    }

    const canHunt = !player.inBoat && worldItems && inventory;
    if (canHunt && !this.lootTarget) {
      let best = null, bestD2 = Infinity;
      const sense2 = PET_LOOT_SENSE_RANGE * PET_LOOT_SENSE_RANGE;
      for (const wi of worldItems) {
        if (!wi.alive) continue;
        const wpx = wi.x - player.centerX, wpy = wi.y - player.centerY;
        if (wpx * wpx + wpy * wpy > maxCh2) continue;
        const vx = wi.x - this.centerX, vy = wi.y - this.centerY;
        const d2 = vx * vx + vy * vy;
        if (d2 > sense2) continue;
        if (d2 < bestD2) {
          bestD2 = d2;
          best = wi;
        }
      }
      this.lootTarget = best;
    }

    let didLootChase = false;
    if (canHunt && this.lootTarget && this.lootTarget.alive) {
      const lx = this.lootTarget.x, ly = this.lootTarget.y;
      let ldx = lx - this.centerX, ldy = ly - this.centerY;
      let ld = Math.sqrt(ldx * ldx + ldy * ldy);
      if (ld <= PET_LOOT_PICKUP_RANGE) {
        const wi = this.lootTarget;
        const itemId = wi.itemId;
        const before = wi.count;
        const ok = wi.tryPickup(inventory);
        if (ok) {
          inventory._consolidateItemStacks();
          const picked = before - (wi.alive ? wi.count : 0);
          const def = ITEMS[itemId];
          if (def && picked > 0) {
            pickupMsgText = this.name + " toplad\u0131: +" + picked + " " + def.name;
            pickupMsgTimer = 1.2;
          }
        } else {
          this.lootTarget = null;
        }
        if (this.lootTarget && !this.lootTarget.alive) this.lootTarget = null;
      } else {
        didLootChase = true;
        const speed = PET_TYPES[this.type].speed;
        const ldSafe = Math.max(ld, 4);
        const moveSpeed = ldSafe > 110 ? speed * 2 : speed * 1.2;
        const nx = ldx / ldSafe, ny = ldy / ldSafe;
        const newX = this.x + nx * moveSpeed * dt;
        const newY = this.y + ny * moveSpeed * dt;
        const m = 2;
        if (!map.isSolidPx(newX + m, this.y + m) && !map.isSolidPx(newX + this.w - m, this.y + this.h - m))
          this.x = newX;
        if (!map.isSolidPx(this.x + m, newY + m) && !map.isSolidPx(this.x + this.w - m, newY + this.h - m))
          this.y = newY;
        this.moving = true;
        if (Math.abs(ldx) > Math.abs(ldy)) this.direction = ldx > 0 ? DIR.RIGHT : DIR.LEFT;
        else this.direction = ldy > 0 ? DIR.DOWN : DIR.UP;
        this.animTimer += dt;
        if (this.animTimer >= 0.12) {
          this.animTimer = 0;
          this.animFrame = (this.animFrame + 1) % 4;
        }
      }
    }

    const targetIdx = Math.max(0, this.posHistory.length - 15);
    const target = this.posHistory[targetIdx];
    const tdx = target.x - (this.x + this.w / 2);
    const tdy = target.y - (this.y + this.h / 2);
    const tdist = Math.sqrt(tdx * tdx + tdy * tdy);

    if (!didLootChase) {
      if (tdist > this.followDist) {
        const speed = PET_TYPES[this.type].speed;
        const moveSpeed = tdist > 120 ? speed * 2 : speed;
        const nx = tdx / tdist, ny = tdy / tdist;

        const newX = this.x + nx * moveSpeed * dt;
        const newY = this.y + ny * moveSpeed * dt;

        const m = 2;
        if (!map.isSolidPx(newX + m, this.y + m) && !map.isSolidPx(newX + this.w - m, this.y + this.h - m))
          this.x = newX;
        if (!map.isSolidPx(this.x + m, newY + m) && !map.isSolidPx(this.x + this.w - m, newY + this.h - m))
          this.y = newY;

        this.moving = true;
        if (Math.abs(tdx) > Math.abs(tdy)) this.direction = tdx > 0 ? DIR.RIGHT : DIR.LEFT;
        else this.direction = tdy > 0 ? DIR.DOWN : DIR.UP;

        this.animTimer += dt;
        if (this.animTimer >= 0.12) {
          this.animTimer = 0;
          this.animFrame = (this.animFrame + 1) % 4;
        }
      } else {
        this.moving = false;
        this.animFrame = 0;
        this.direction = player.direction;
      }
    }

    if (tdist > 300) {
      this.x = player.x - 20;
      this.y = player.y + 10;
      this.posHistory = [];
      this.lootTarget = null;
    }
  }

  render(ctx) {
    const furyPet = typeof player !== "undefined" && player && player.rageBurstTimer > 0;
    if (furyPet) {
      ctx.save();
      const pcx = this.x + this.w / 2, pcy = this.y + this.h / 2;
      ctx.translate(pcx, pcy);
      ctx.scale(1.14, 1.14);
      ctx.translate(-pcx, -pcy);
      ctx.shadowColor = "rgba(255,120,40,0.95)";
      ctx.shadowBlur = 16;
    }
    drawPetSprite(ctx, this.type, Math.round(this.x), Math.round(this.y), this.direction, this.animFrame, this.moving);
    if (furyPet) {
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    if (this.heartTimer > 0) {
      const hAlpha = Math.min(1, this.heartTimer / 0.3);
      const hOff = (1.5 - this.heartTimer) * 10;
      ctx.globalAlpha = hAlpha;
      ctx.fillStyle = "#ff4060"; ctx.font = "12px serif";
      ctx.fillText("\u2764", this.x + 4, this.y - 6 - hOff);
      ctx.globalAlpha = 1;
    }
  }

  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }
}

class WildPet {
  constructor(col, row, type) {
    this.x = col * TILE_SIZE; this.y = row * TILE_SIZE;
    this.w = 16; this.h = 16;
    this.type = type;
    this.alive = true;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0;
    this.moving = false;
    this.wanderTimer = 1 + Math.random() * 3;
    this.moveDir = { dx: 0, dy: 0 }; this.moveTime = 0;
    this.homeX = this.x; this.homeY = this.y;
    this.tameProgress = 0;
    this.exclamTimer = 0;
  }

  update(dt, map) {
    if (!this.alive) return;
    if (this.exclamTimer > 0) this.exclamTimer -= dt;

    this.wanderTimer -= dt;
    if (!this.moving && this.wanderTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.4 + Math.random();
      this.moving = true;
      if (Math.abs(this.moveDir.dx) > Math.abs(this.moveDir.dy))
        this.direction = this.moveDir.dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else
        this.direction = this.moveDir.dy > 0 ? DIR.DOWN : DIR.UP;
    }

    if (this.moving) {
      this.moveTime -= dt;
      this.animTimer += dt;
      if (this.animTimer >= 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      const spd = 30;
      const newX = this.x + this.moveDir.dx * spd * dt;
      const newY = this.y + this.moveDir.dy * spd * dt;
      const ddx = newX - this.homeX, ddy = newY - this.homeY;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < TILE_SIZE * 3) {
        const m = 2;
        if (!map.isSolidPx(newX + m, newY + m) && !map.isSolidPx(newX + this.w - m, newY + this.h - m)) {
          this.x = newX; this.y = newY;
        }
      }
      if (this.moveTime <= 0) {
        this.moving = false; this.animFrame = 0;
        this.wanderTimer = 2 + Math.random() * 4;
      }
    }
  }

  isNear(player, range = TILE_SIZE * 1.5) {
    const dx = (this.x + this.w / 2) - player.centerX;
    const dy = (this.y + this.h / 2) - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  tryTame(inventory) {
    const pt = PET_TYPES[this.type];
    const foodId = pt.tameFood;

    for (const container of [inventory.hotbar, inventory.slots]) {
      for (let i = 0; i < container.length; i++) {
        if (container[i] && container[i].id === foodId) {
          container[i].count--;
          if (container[i].count <= 0) container[i] = null;
          this.tameProgress += 34;
          this.exclamTimer = 1;
          if (this.tameProgress >= 100) {
            this.alive = false;
            return new Pet(this.type, pt.name);
          }
          return null;
        }
      }
    }
    return false;
  }

  render(ctx) {
    if (!this.alive) return;
    drawPetSprite(ctx, this.type, Math.round(this.x), Math.round(this.y), this.direction, this.animFrame, this.moving);

    if (this.tameProgress > 0) {
      const bw = 20, bh = 3;
      const bx = this.x + this.w / 2 - bw / 2, by = this.y - 8;
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = "#f06080"; ctx.fillRect(bx, by, bw * this.tameProgress / 100, bh);
    }

    if (this.exclamTimer > 0) {
      ctx.fillStyle = "#ff4060"; ctx.font = "12px serif";
      ctx.fillText("\u2764", this.x + 4, this.y - 10);
    }
  }
}

class PetPanel {
  constructor() { this.open = false; }
  toggle() { this.open = !this.open; }
  close() { this.open = false; }

  getPanelBounds(cw, ch) {
    const b = uiModalBounds(cw, ch);
    let pw = Math.min(260, b.maxW);
    let ph = Math.min(200, b.maxH);
    pw = Math.max(200, pw);
    ph = Math.max(148, ph);
    const px = Math.floor((cw - pw) / 2);
    const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
    return { px, py, pw, ph };
  }

  render(ctx, canvasW, canvasH, pet) {
    if (!this.open || !pet) return;

    const { px, py, pw, ph } = this.getPanelBounds(canvasW, canvasH);

    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvasW, canvasH);

    ctx.fillStyle = "rgba(15, 15, 40, 0.95)";
    ctx.strokeStyle = "#c08060"; ctx.lineWidth = 2;
    roundRect(ctx, px, py, pw, ph, 10); ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#f0d050"; ctx.font = "bold 16px monospace";
    ctx.fillText("Evcil Hayvan", px + 16, py + 26);
    ctx.fillStyle = "#888"; ctx.font = "11px monospace";
    ctx.fillText("[P] Kapat", px + pw - 80, py + 26);

    const previewX = px + 20, previewY = py + 48, prevS = Math.min(48, ph - 72);
    ctx.fillStyle = "rgba(40,40,60,0.6)"; ctx.strokeStyle = "#505070"; ctx.lineWidth = 1;
    roundRect(ctx, previewX, previewY, prevS, prevS, 6); ctx.fill(); ctx.stroke();
    drawPetSprite(ctx, pet.type, previewX + Math.floor(prevS / 2) - 8, previewY + Math.floor(prevS / 2) - 10, DIR.DOWN, 0, false);

    const textX = px + 20 + prevS + 12;
    ctx.fillStyle = "#e8e8f0"; ctx.font = "bold 14px monospace";
    ctx.fillText(pet.name, textX, py + 62);

    ctx.fillStyle = "#a0a0c0"; ctx.font = "12px monospace";
    ctx.fillText("T\u00fcr: " + PET_TYPES[pet.type].name, textX, py + 80);

    const barX = px + 20, barY = py + ph - 62, barW = pw - 40, barH = 12;
    ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
    ctx.fillText("Mutluluk", barX, barY - 4);
    ctx.fillStyle = "rgba(40,40,60,0.8)";
    roundRect(ctx, barX, barY, barW, barH, 4); ctx.fill();
    const hpColor = pet.happiness > 60 ? "#50c060" : pet.happiness > 30 ? "#d0a030" : "#d04040";
    ctx.fillStyle = hpColor;
    roundRect(ctx, barX, barY, barW * pet.happiness / 100, barH, 4); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace";
    ctx.fillText(Math.round(pet.happiness) + "%", barX + barW / 2 - 10, barY + 10);

    const favFood = PET_TYPES[pet.type].tameFood;
    const favName = ITEMS[favFood] ? ITEMS[favFood].name : favFood;
    ctx.fillStyle = "#a0a0c0"; ctx.font = touchState.mobileUI ? "10px monospace" : "11px monospace";
    ctx.fillText("Favori: " + favName, barX, barY + 22);
    ctx.fillText("Beslemek: [F]", barX, barY + 38);
  }
}

/* ── Bank Panel ─────────────────────────────────────────── */
class BankPanel {
  constructor() {
    this.open = false;
    this.slots = Array(160).fill(null);
    this.gold = 0;
  }
  toggle() { this.open = !this.open; }
  close() { this.open = false; }
  _stackKey(s) { return (s && s.id ? s.id : "") + "|" + getStackUpgradeLv(s || {}); }
  _copyStack(s, countOverride) {
    if (!s) return null;
    const t = { id: s.id, count: Math.max(1, countOverride != null ? countOverride : (s.count | 0)) };
    if (s.upgrade != null) t.upgrade = s.upgrade | 0;
    if (s.durability != null) t.durability = s.durability | 0;
    return t;
  }
  addStack(stack) {
    if (!stack || !stack.id || stack.count <= 0) return stack ? stack.count : 0;
    const def = ITEMS[stack.id];
    if (!def) return stack.count | 0;
    let left = stack.count | 0;
    if (def.stackable) {
      for (let i = 0; i < this.slots.length && left > 0; i++) {
        const s = this.slots[i];
        if (!s || s.id !== stack.id || !stackUpgradesMatch(s, stack)) continue;
        const room = def.maxStack - (s.count | 0);
        if (room <= 0) continue;
        const take = Math.min(room, left);
        s.count += take;
        left -= take;
      }
    }
    for (let i = 0; i < this.slots.length && left > 0; i++) {
      if (this.slots[i]) continue;
      const take = Math.min(def.maxStack || 1, left);
      this.slots[i] = this._copyStack(stack, take);
      left -= take;
    }
    return left;
  }
  depositAllFromInventory(inv) {
    let moved = 0;
    for (const container of [inv.hotbar, inv.slots]) {
      for (let i = 0; i < container.length; i++) {
        const s = container[i];
        if (!s || s.id === "coin") continue;
        const left = this.addStack(s);
        const movedNow = (s.count | 0) - left;
        if (movedNow > 0) moved += movedNow;
        if (left <= 0) container[i] = null;
        else s.count = left;
      }
    }
    return moved;
  }
  withdrawAllToInventory(inv) {
    let moved = 0;
    for (let i = 0; i < this.slots.length; i++) {
      const s = this.slots[i];
      if (!s) continue;
      const left = inv.addItem(s.id, s.count, getStackUpgradeLv(s), s);
      const movedNow = (s.count | 0) - left;
      if (movedNow > 0) moved += movedNow;
      if (left <= 0) this.slots[i] = null;
      else s.count = left;
    }
    return moved;
  }
  depositAllGoldFromInventory(inv) {
    const g = Math.max(0, inv.gold | 0);
    if (g <= 0) return 0;
    this.gold += g;
    inv.gold = 0;
    return g;
  }
  withdrawAllGoldToInventory(inv) {
    const g = Math.max(0, this.gold | 0);
    if (g <= 0) return 0;
    inv.gold += g;
    this.gold = 0;
    return g;
  }
  usedSlots() {
    let n = 0;
    for (const s of this.slots) if (s) n++;
    return n;
  }
  render(ctx, cw, ch) {
    if (!this.open) return;
    const w = Math.min(560, cw - 40);
    const h = Math.min(280, ch - 40);
    const x = Math.floor((cw - w) / 2);
    const y = Math.floor((ch - h) / 2);
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, cw, ch);
    ctx.fillStyle = "rgba(16,20,44,0.96)";
    ctx.strokeStyle = "#6f84c0";
    ctx.lineWidth = 2;
    roundRect(ctx, x, y, w, h, 12); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#e8f0ff";
    ctx.font = "bold 16px monospace";
    ctx.fillText("Banka", x + 16, y + 30);
    ctx.font = "11px monospace";
    ctx.fillStyle = "#a8c0f0";
    ctx.fillText("Slot: " + this.usedSlots() + "/" + this.slots.length, x + 16, y + 50);
    ctx.fillText("Banka Altin: " + formatGold(this.gold), x + 220, y + 50);
    ctx.fillStyle = "#9ca8c8";
    ctx.fillText("[N] Kapat  [J] Envanteri Yatir  [K] Envantere Cek", x + 16, y + h - 34);
    ctx.fillText("[H] Altin Yatir  [G] Altin Cek", x + 16, y + h - 16);
  }
}

const SHOP_SLOT = 44, SHOP_GAP = 4;
