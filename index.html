            const def = ITEMS[es.id];
            const rr = def && def.rarity ? rarityRank(def.rarity) : 1;
            const pw = itemStatPowerScore(def || {});
            if (rr >= 4) {
              const pulse = 0.65 + 0.35 * Math.sin(tGlow + r + c * 0.7);
              ctx.strokeStyle = "rgba(255,210,90," + (0.45 + pulse * 0.35) + ")";
              ctx.lineWidth = 2.5 + pulse * 0.8;
              roundRect(ctx, sx - 1, sy - 1, cell + 2, cell + 2, 5);
              ctx.stroke();
            } else if (rr >= 3 || pw > 28) {
              ctx.strokeStyle = rr >= 3 ? "rgba(200,130,255,0.55)" : "rgba(140,190,255,0.45)";
              ctx.lineWidth = 2;
              roundRect(ctx, sx - 0.5, sy - 0.5, cell + 1, cell + 1, 4);
              ctx.stroke();
            }
            drawItemIconFancy(ctx, es.id, sx + padI, sy + padI, cell - padI * 2, { equipped: true });
            const ul = getStackUpgradeLv(es);
            if (ul > 0) {
              ctx.font = "bold " + Math.max(8, Math.floor(cell * 0.22)) + "px monospace";
              ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.fillStyle = "#ffd0a0";
              const ut = "+" + ul;
              ctx.strokeText(ut, sx + padI, sy + cell - padI - 1);
              ctx.fillText(ut, sx + padI, sy + cell - padI - 1);
            }
          } else {
            ctx.strokeStyle = "rgba(100,120,160,0.35)";
            ctx.setLineDash([3, 3]);
            ctx.strokeRect(sx + cell * 0.2, sy + cell * 0.2, cell * 0.6, cell * 0.55);
            ctx.setLineDash([]);
          }
        } else {
          ctx.fillStyle = "rgba(80,90,120,0.45)";
          ctx.font = (Math.max(9, cell * 0.26)) + "px monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(g.label || "\u00b7", sx + cell / 2, sy + cell * 0.38);
          if (g.sub) {
            ctx.fillStyle = "rgba(100,110,140,0.75)";
            ctx.font = (Math.max(6, cell * 0.16)) + "px monospace";
            ctx.fillText(g.sub, sx + cell / 2, sy + cell * 0.72);
          }
          ctx.textAlign = "start";
          ctx.textBaseline = "alphabetic";
        }

        if (g && g.label && active && !this.equipped[g.key]) {
          ctx.fillStyle = "rgba(140,155,190,0.95)";
          ctx.font = (Math.max(6, cell * 0.16)) + "px monospace";
          ctx.textAlign = "center";
          ctx.fillText(g.label, sx + cell / 2, sy + cell - 3);
          ctx.textAlign = "start";
        }
      }
    }

    for (let i = 0; i < INV_SLOTS; i++) {
      const col = i % INV_COLS, row = Math.floor(i / INV_COLS);
      const sx = layout.slotsX + col * (ss + sg);
      const sy = layout.slotsY + row * (ss + sg);
      ctx.fillStyle = "rgba(40,40,60,0.6)"; ctx.strokeStyle = "#505070"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, ss, ss, 4); ctx.fill(); ctx.stroke();
      if (this.slots[i]) this._renderSlotContent(ctx, this.slots[i], sx, sy, ss);
    }

    ctx.fillStyle = "#a0a0c0"; ctx.font = "11px monospace";
    ctx.fillText("H\u0131zl\u0131 Eri\u015fim", layout.hbX, layout.hbY - 4);
    for (let i = 0; i < HOTBAR_SLOTS; i++) {
      const sx = layout.hbX + i * (ss + sg);
      const selected = i === this.selectedHotbar;
      ctx.fillStyle = selected ? "rgba(255,255,200,0.25)" : "rgba(40,40,60,0.6)";
      ctx.strokeStyle = selected ? "#f0d050" : "#505070";
      ctx.lineWidth = selected ? 2 : 1;
      roundRect(ctx, sx, layout.hbY, ss, ss, 4); ctx.fill(); ctx.stroke();
      if (this.hotbar[i]) this._renderSlotContent(ctx, this.hotbar[i], sx, layout.hbY, ss);
      ctx.fillStyle = "#888"; ctx.font = "10px monospace";
      ctx.fillText(String(i + 1), sx + 3, layout.hbY + Math.min(12, ss * 0.28));
    }

    if (this.tooltipSlot) {
      const def = ITEMS[this.tooltipSlot.id];
      if (def) {
        const mob = touchState.mobileUI;
        ctx.save();
        const layoutTt = buildItemTooltipLayout(ctx, def, this.tooltipSlot.id, canvasW, mob, { stackRef: this.tooltipSlot });
        const pos = placeTooltipPosition(mouseX, mouseY, layoutTt.tw, layoutTt.th, canvasW, canvasH);
        drawItemTooltipFromLayout(ctx, pos.tx, pos.ty, layoutTt, mob);
        ctx.restore();
      }
    }

    if (this.heldItem) {
      const ix = mouseX - ss / 2, iy = mouseY - ss / 2;
      ctx.globalAlpha = 0.88;
      drawItemIconFancy(ctx, this.heldItem.id, ix + 6, iy + 6, ss - 12, { drag: true });
      ctx.globalAlpha = 1;
      if (this.heldItem.count > 1) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 11px monospace";
        ctx.fillText(String(this.heldItem.count), ix + ss - 16, iy + ss - 4);
      }
    }
  }

  _renderSlotContent(ctx, slot, sx, sy, slotSz = SLOT_SIZE) {
    drawItemIconFancy(ctx, slot.id, sx, sy, slotSz, {});
    const ul = getStackUpgradeLv(slot);
    if (ul > 0) {
      ctx.font = "bold " + Math.max(9, Math.floor(slotSz * 0.2)) + "px monospace";
      ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.fillStyle = "#ffd0a0";
      const ut = "+" + ul;
      ctx.strokeText(ut, sx + 3, sy + slotSz - 4);
      ctx.fillText(ut, sx + 3, sy + slotSz - 4);
    }
    if (slot.count > 1) {
      ctx.fillStyle = "#000"; ctx.font = "bold 11px monospace";
      ctx.fillText(String(slot.count), sx + slotSz - 15, sy + slotSz - 5);
      ctx.fillStyle = "#fff";
      ctx.fillText(String(slot.count), sx + slotSz - 16, sy + slotSz - 6);
    }
  }
}

/* ── WorldItem (toplanabilir e\u015fyalar) ────────────────────── */

class WorldItem {
  constructor(col, row, itemId, count = 1, respawnable = true) {
    this.col = col;
    this.row = row;
    this.x = col * TILE_SIZE + TILE_SIZE / 2;
    this.y = row * TILE_SIZE + TILE_SIZE / 2;
    this.itemId = itemId;
    this.count = count;
    this.maxCount = count;
    this.upgrade = 0;
    this.alive = true;
    this.respawnable = respawnable;
    this.bobTimer = Math.random() * Math.PI * 2;
    this.respawnTime = 15 + Math.random() * 15;
    this.respawnTimer = 0;
  }

  update(dt) {
    if (this.alive) {
      this.bobTimer += dt * 3;
    } else if (this.respawnable) {
      this.respawnTimer += dt;
      if (this.respawnTimer >= this.respawnTime) {
        this.alive = true;
        this.count = this.maxCount;
        this.respawnTimer = 0;
        this.respawnTime = 15 + Math.random() * 15;
      }
    }
  }

  isNear(player, range = TILE_SIZE * 1.2) {
    const dx = this.x - player.centerX, dy = this.y - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  tryPickup(inventory) {
    if (!this.alive) return false;
    const before = Math.max(0, Math.floor(Number(this.count)) || 0);
    if (before <= 0) return false;
    const u = this.upgrade | 0;
    const left = inventory.addItem(this.itemId, before, u);
    const moved = before - left;
    if (moved <= 0) return false;
    this.count = left;
    if (this.count <= 0) this.alive = false;
    return true;
  }

  render(ctx) {
    if (!this.alive) return;
    const bob = Math.sin(this.bobTimer) * 3;
    const sz = 22;
    const dx = this.x - sz / 2, dy = this.y - sz / 2 + bob - 4;

    ctx.fillStyle = "rgba(255,255,200,0.12)";
    ctx.beginPath(); ctx.arc(this.x, this.y + bob - 2, 14, 0, Math.PI * 2); ctx.fill();

    drawItemIconFancy(ctx, this.itemId, dx, dy, sz, { floorDrop: true, timeMs: performance.now() });
  }
}

/* ── TileMap ─────────────────────────────────────────────── */

class TileMap {
  constructor(cols, rows, layers) {
    this.cols = cols;
    this.rows = rows;
    this.ground = layers.ground;
    this.detail = layers.detail || null;
    this.widthPx = cols * TILE_SIZE;
    this.heightPx = rows * TILE_SIZE;
  }

  getTile(col, row) {
    if (col < 0 || col >= this.cols || row < 0 || row >= this.rows) return TileType.WALL;
    return this.ground[row * this.cols + col];
  }

  getDetail(col, row) {
    if (!this.detail || col < 0 || col >= this.cols || row < 0 || row >= this.rows) return -1;
    return this.detail[row * this.cols + col];
  }

  setDetail(col, row, value) {
    if (!this.detail || col < 0 || col >= this.cols || row < 0 || row >= this.rows) return;
    this.detail[row * this.cols + col] = value;
  }

  setTile(col, row, value) {
    if (col < 0 || col >= this.cols || row < 0 || row >= this.rows) return;
    this.ground[row * this.cols + col] = value;
  }

  isSolid(col, row, boatMode) {
    const tile = this.getTile(col, row);
    const detail = this.getDetail(col, row);
    if (boatMode) {
      /** K\u0131y\u0131da kum-\u00e7imen s\u0131n\u0131r\u0131nda tekne hitbox'u \u00e7imene de\u011fince tak\u0131lmamas\u0131 i\u00e7in k\u0131y\u0131 zeminleri ge\u00e7ilebilir. */
      if (tile === TileType.WALL || tile === TileType.TREE) return true;
      /** A\u011fa\u00e7lar \u00e7o\u011funlukla \u00e7imen \u00fczerinde detail olarak; tekne modunda da engel olmal\u0131. */
      if (detail >= 0 && (detail === TileType.WALL || detail === TileType.TREE)) return true;
      return false;
    }
    if (SOLID_TILES.has(tile)) return true;
    if (detail >= 0 && SOLID_TILES.has(detail)) return true;
    return false;
  }

  isSolidPx(px, py, boatMode) {
    return this.isSolid(Math.floor(px / TILE_SIZE), Math.floor(py / TILE_SIZE), boatMode);
  }

  isWaterPx(px, py) {
    const col = Math.floor(px / TILE_SIZE), row = Math.floor(py / TILE_SIZE);
    return this.getTile(col, row) === TileType.WATER;
  }

  isNearWater(px, py, radius) {
    const col = Math.floor(px / TILE_SIZE), row = Math.floor(py / TILE_SIZE);
    for (let dr = -radius; dr <= radius; dr++) {
      for (let dc = -radius; dc <= radius; dc++) {
        if (this.getTile(col + dc, row + dr) === TileType.WATER) return true;
      }
    }
    return false;
  }

  /** Oyuncu ayaklar\u0131n\u0131n alt\u0131ndaki ana zemin karesini d\u00f6nd\u00fcr\u00fcr. */
  getGroundTileAtPx(px, py) {
    return this.getTile(Math.floor(px / TILE_SIZE), Math.floor(py / TILE_SIZE));
  }

  /**
   * Tekneye binme (B veya otomatik): ayaklar kum / su / k\u00f6pr\u00fcde olmal\u0131 ve yak\u0131nda su olmal\u0131.
   * \u00c7imen \u00fczerindeyken sadece suya yak\u0131n olmak yetmez; k\u0131y\u0131ya \u00e7\u0131k\u0131nca yanl\u0131\u015f tetiklenmez.
   */
  canBoardBoatAtPx(px, py) {
    const t = this.getGroundTileAtPx(px, py);
    if (t !== TileType.WATER && t !== TileType.SAND && t !== TileType.BRIDGE) return false;
    return this.isNearWater(px, py, 2);
  }

  render(ctx, camX, camY, camW, camH) {
    const startCol = Math.max(0, Math.floor(camX / TILE_SIZE));
    const startRow = Math.max(0, Math.floor(camY / TILE_SIZE));
    const endCol   = Math.min(this.cols, Math.ceil((camX + camW) / TILE_SIZE));
    const endRow   = Math.min(this.rows, Math.ceil((camY + camH) / TILE_SIZE));

    for (let row = startRow; row < endRow; row++) {
      for (let col = startCol; col < endCol; col++) {
        const tile = this.getTile(col, row);
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;

        ctx.fillStyle = TILE_COLORS[tile] || "#ff00ff";
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        this._drawTileDecoration(ctx, tile, x, y);

        const detail = this.getDetail(col, row);
        if (detail >= 0) this._drawDetailTile(ctx, detail, x, y);
      }
    }
  }

  _drawTileDecoration(ctx, tile, x, y) {
    switch (tile) {
      case TileType.GRASS:
        ctx.fillStyle = "#57994a";
        ctx.fillRect(x + 6, y + 8, 2, 6);
        ctx.fillRect(x + 20, y + 4, 2, 5);
        ctx.fillRect(x + 14, y + 20, 2, 5);
        break;
      case TileType.WATER:
        ctx.fillStyle = "#4a8ed4";
        ctx.fillRect(x + 4, y + 10, 8, 2);
        ctx.fillRect(x + 18, y + 18, 8, 2);
        break;
      case TileType.SAND:
        ctx.fillStyle = "#c4ac5a";
        ctx.fillRect(x + 10, y + 14, 3, 2);
        ctx.fillRect(x + 22, y + 6, 2, 2);
        break;
      case TileType.WALL:
        ctx.fillStyle = "#4a4a4a";
        ctx.strokeStyle = "#6a6a6a";
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
        ctx.fillRect(x + 2, y + 2, 12, 12);
        ctx.fillRect(x + 18, y + 18, 12, 12);
        break;
      case TileType.TALL_GRASS:
        ctx.fillStyle = "#308526";
        for (let i = 0; i < 5; i++) {
          const gx = x + 3 + i * 6;
          ctx.fillRect(gx, y + 4, 2, 10);
          ctx.fillRect(gx - 1, y + 3, 4, 2);
        }
        break;
      case TileType.BRIDGE:
        ctx.fillStyle = "#6a4c28";
        ctx.fillRect(x, y + 7, TILE_SIZE, 2);
        ctx.fillRect(x, y + 22, TILE_SIZE, 2);
        ctx.fillStyle = "#8a6c3a";
        ctx.fillRect(x, y, 2, TILE_SIZE);
        ctx.fillRect(x + TILE_SIZE - 2, y, 2, TILE_SIZE);
        break;
      case TileType.SNOW:
        ctx.fillStyle = "#b8d0e0";
        ctx.fillRect(x + 4, y + 6, 3, 2);
        ctx.fillRect(x + 18, y + 20, 4, 2);
        ctx.fillRect(x + 12, y + 14, 2, 3);
        break;
    }
  }

  _drawDetailTile(ctx, detail, x, y) {
    switch (detail) {
      case TileType.TREE:
        ctx.fillStyle = "#5a3a1a";
        ctx.fillRect(x + 13, y + 18, 6, 14);
        ctx.fillStyle = "#1f5e10";
        ctx.beginPath();
        ctx.arc(x + 16, y + 14, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#2a7a18";
        ctx.beginPath();
        ctx.arc(x + 14, y + 12, 6, 0, Math.PI * 2);
        ctx.fill();
        break;
      case TileType.FLOWER:
        ctx.fillStyle = "#2d6e1e";
        ctx.fillRect(x + 15, y + 18, 2, 8);
        ctx.fillStyle = "#e84040";
        ctx.beginPath();
        ctx.arc(x + 16, y + 16, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f0d040";
        ctx.beginPath();
        ctx.arc(x + 16, y + 16, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case TileType.BRIDGE:
        ctx.fillStyle = "#7a5c30";
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = "#6a4c20";
        ctx.fillRect(x, y, TILE_SIZE, 3);
        ctx.fillRect(x, y + TILE_SIZE - 3, TILE_SIZE, 3);
        ctx.fillRect(x + 14, y, 4, TILE_SIZE);
        break;
    }
  }
}

/* ── Camera ──────────────────────────────────────────────── */

class Camera {
  constructor(viewW, viewH) {
    this.x = 0; this.y = 0;
    this.shakeX = 0;
    this.shakeY = 0;
    this.viewW = viewW; this.viewH = viewH;
    this.smoothing = 0.08;
  }

  follow(target, worldW, worldH) {
    const targetX = target.x + target.w / 2 - this.viewW / 2;
    const targetY = target.y + target.h / 2 - this.viewH / 2;
    this.x += (targetX - this.x) * this.smoothing;
    this.y += (targetY - this.y) * this.smoothing;
    this.x = Math.max(0, Math.min(this.x, worldW - this.viewW));
    this.y = Math.max(0, Math.min(this.y, worldH - this.viewH));
  }

  resize(viewW, viewH) { this.viewW = viewW; this.viewH = viewH; }

  addShake(amt) {
    const a = Math.max(0, amt);
    this.shakeX = (this.shakeX || 0) + (Math.random() - 0.5) * 2 * a;
    this.shakeY = (this.shakeY || 0) + (Math.random() - 0.5) * 2 * a;
  }

  updateShake(dt) {
    if (!this.shakeX && !this.shakeY) return;
    const k = Math.pow(0.02, Math.min(1, dt * 9));
    this.shakeX *= k;
    this.shakeY *= k;
    if (Math.abs(this.shakeX) < 0.2) this.shakeX = 0;
    if (Math.abs(this.shakeY) < 0.2) this.shakeY = 0;
  }

  applyTransform(ctx) {
    const ox = (this.shakeX || 0), oy = (this.shakeY || 0);
    ctx.setTransform(1, 0, 0, 1, -Math.round(this.x + ox), -Math.round(this.y + oy));
  }

  resetTransform(ctx) { ctx.setTransform(1, 0, 0, 1, 0, 0); }
}

const monsterSpells = [];
function addScreenShake(amt) {
  if (typeof camera !== "undefined" && camera && camera.addShake) camera.addShake(amt);
}

/* ── Player ──────────────────────────────────────────────── */

const DIR = { DOWN: 0, LEFT: 1, RIGHT: 2, UP: 3 };

class Player {
  constructor(col, row) {
    this.x = col * TILE_SIZE;
    this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.speed = 130;
    this.angle = Math.PI / 2;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0; this.moving = false;
    /** Sürekli yürüyüş / kanat çırpma fazı (dt ile büyür). */
    this.walkPhase = 0;
    this.shootCooldown = 0;
    this.shootAnim = 0;
    this.meleeCooldown = 0;
    this.swingAnim = 0;
    this.inBoat = false;
    this.hasBoat = false;
    this.boatWaveTimer = 0;
    /** Karadan B ile indikten sonra hemen yeniden otomatik binmeyi engeller (sn). */
    this.boatAutoBoardCooldown = 0;

    this.level = 1;
    this.xp = 0;
    this.xpToNext = 30;

    this.baseMaxHp = 100;
    this.baseMaxMana = 60;
    this.maxHp = 100;
    this.hp = 100;
    this.hpRegen = 0.5;

    this.maxMana = 60;
    this.mana = 60;
    this.manaRegen = 2.5;

    this.str = 5;
    this.agi = 5;
    this.wis = 3;
    this._eqStr = 0;
    this._eqAgi = 0;
    this._eqWis = 0;
    this._eqMeleeDmg = 0;
    this._eqRangedDmg = 0;
    this._eqDefense = 0;
    this._eqResFire = 0;
    this._eqResGlacier = 0;
    this._eqResLightning = 0;
    this._eqResMagic = 0;
    this._eqResPoison = 0;
    this._eqResCurse = 0;
    this._pendingFullHeal = false;

    this.manaCostShoot = 3;
    this.manaCostPower = 12;

    this.dmgFlashTimer = 0;
    this.levelUpTimer = 0;
    this.powerCharging = false;
    this.powerCharge = 0;

    this.statPoints = 0;
    this.skills = Object.create(null);
    this.poisonTimer = 0;
    this.activeSkillCd = [0, 0, 0, 0, 0, 0, 0, 0];
    this.skillAuraT = 0;
  }

  gainXP(amount) {
    this.xp += amount;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.xpToNext = Math.floor(30 * Math.pow(1.4, this.level - 1));
      this.baseMaxHp += 8;
      this.baseMaxMana += 5;
      this.manaRegen += 0.12;
      this.hpRegen += 0.08;
      this.statPoints += 3;
      this.levelUpTimer = 2.5;
      this._pendingFullHeal = true;
    }
  }

  applyEquipmentBonus(inv) {
    const sum = sumEquipmentEffective(inv);
    const st = sum.stats;
    const adv = sum.advanced;
    this._eqStr = st.str || 0;
    this._eqAgi = st.agi || 0;
    this._eqWis = st.wis || 0;
    this._eqMeleeDmg = st.meleeDmg || 0;
    this._eqRangedDmg = st.rangedDmg || 0;
    this._eqDefense = adv.defense || 0;
    this._eqResFire = adv.resFire || 0;
    this._eqResGlacier = adv.resGlacier || 0;
    this._eqResLightning = adv.resLightning || 0;
    this._eqResMagic = adv.resMagic || 0;
    this._eqResPoison = adv.resPoison || 0;
    this._eqResCurse = adv.resCurse || 0;
    const eqHp = st.maxHp || 0;
    const eqMana = st.maxMana || 0;
    let skHp = 0, skMana = 0;
    if (this.skills.vitality) skHp += 25;
    if (this.skills.arcane) skMana += 22;
    this.maxHp = this.baseMaxHp + eqHp + skHp;
    this.maxMana = this.baseMaxMana + eqMana + skMana;
    if (this._pendingFullHeal) {
      this.hp = this.maxHp;
      this.mana = this.maxMana;
      this._pendingFullHeal = false;
    } else {
      this.hp = Math.min(this.maxHp, this.hp);
      this.mana = Math.min(this.maxMana, this.mana);
    }
  }

  takeDamage(amount, opts) {
    opts = opts || {};
    let a = amount;
    if (this.skills.ward) a *= 0.92;
    const kind = opts.kind || "physical";
    if (kind === "physical") {
      const defn = this._eqDefense || 0;
      a *= 1 - Math.min(0.72, defn / (defn + 95));
    } else if (kind === "fire" || kind === "meteor") {
      a *= 1 - Math.min(0.82, (this._eqResFire || 0) / 130);
    } else if (kind === "ice") {
      a *= 1 - Math.min(0.82, (this._eqResGlacier || 0) / 130);
    } else if (kind === "lightning") {
      a *= 1 - Math.min(0.82, (this._eqResLightning || 0) / 130);
    } else if (kind === "poison") {
      a *= 1 - Math.min(0.82, (this._eqResPoison || 0) / 130);
    } else if (kind === "magic") {
      a *= 1 - Math.min(0.82, (this._eqResMagic || 0) / 130);
    } else if (kind === "curse") {
      a *= 1 - Math.min(0.82, (this._eqResCurse || 0) / 130);
    }
    a = Math.max(0.35, a);
    this.hp = Math.max(0, this.hp - a);
    this.dmgFlashTimer = 0.3;
  }

  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
  }

  useMana(amount) {
    if (this.mana < amount) return false;
    this.mana -= amount;
    return true;
  }

  getDamage() {
    return 8 + (this.str + this._eqStr) * 1.5 + Math.floor(this.level * 0.8);
  }

  getRangedDamage() {
    let d = this.getDamage() + this._eqRangedDmg;
    if (this.skills.marksman) d *= 1.1;
    return d;
  }

  getPowerDamage() {
    const charge = Math.min(this.powerCharge, 1);
    return this.getRangedDamage() * (2 + charge * 2);
  }

  getMeleeDamage() {
    let d = Math.floor(this.getDamage() * 1.2) + this._eqMeleeDmg;
    if (this.skills.brawler) d += 4;
    return d;
  }

  aimAt(worldX, worldY) {
    this.angle = Math.atan2(worldY - this.centerY, worldX - this.centerX);
  }

  update(dt, map) {
    const { dx, dy } = getMovementVector();
    this.moving = dx !== 0 || dy !== 0;
    if (this.shootCooldown > 0) this.shootCooldown -= dt;
    if (this.shootAnim > 0) this.shootAnim -= dt;
    if (this.meleeCooldown > 0) this.meleeCooldown -= dt;
    if (this.swingAnim > 0) this.swingAnim -= dt;
    if (this.skillAuraT > 0) this.skillAuraT -= dt;
    for (let si = 0; si < this.activeSkillCd.length; si++) {
      if (this.activeSkillCd[si] > 0) this.activeSkillCd[si] -= dt;
    }
    if (this.dmgFlashTimer > 0) this.dmgFlashTimer -= dt;
    if (this.levelUpTimer > 0) this.levelUpTimer -= dt;
    if (this.inBoat) this.boatWaveTimer += dt;

    this.hp = Math.min(this.maxHp, this.hp + this.hpRegen * dt);
    this.mana = Math.min(this.maxMana, this.mana + this.manaRegen * dt);

    if (this.poisonTimer > 0) {
      this.poisonTimer -= dt;
      this.takeDamage(4.5 * dt, { kind: "poison" });
    }

    if (this.powerCharging) {
      this.powerCharge = Math.min(1, this.powerCharge + dt * 0.8);
    }

    if (!this.inBoat && this.boatAutoBoardCooldown > 0) {
      this.boatAutoBoardCooldown -= dt;
    }

    const agiBonus = 1 + (this.agi + this._eqAgi) * 0.008;
    const spd = (this.inBoat ? 160 : this.speed) * agiBonus;

    if (this.moving) {
      if (dy > 0) this.direction = DIR.DOWN;
      else if (dy < 0) this.direction = DIR.UP;
      if (dx < 0) this.direction = DIR.LEFT;
      else if (dx > 0) this.direction = DIR.RIGHT;

      this.animTimer += dt;
      if (this.animTimer >= 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }
      this.walkPhase += dt * 9.2;

      const newX = this.x + dx * spd * dt;
      const newY = this.y + dy * spd * dt;
      const margin = 3;
      if (!this._collides(newX, this.y, map, margin)) this.x = newX;
      if (!this._collides(this.x, newY, map, margin)) this.y = newY;
    } else {
      this.animFrame = 0; this.animTimer = 0;
      this.walkPhase += dt * 1.35;
    }
  }

  _collides(px, py, map, m) {
    return map.isSolidPx(px + m, py + m, this.inBoat) ||
           map.isSolidPx(px + this.w - m, py + m, this.inBoat) ||
           map.isSolidPx(px + m, py + this.h - m, this.inBoat) ||
           map.isSolidPx(px + this.w - m, py + this.h - m, this.inBoat);
  }

  getFacingTile() {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const tx = cx + Math.cos(this.angle) * TILE_SIZE;
    const ty = cy + Math.sin(this.angle) * TILE_SIZE;
    return { col: Math.floor(tx / TILE_SIZE), row: Math.floor(ty / TILE_SIZE) };
  }

  /** tryPlayerMeleeAttack ile aynı mesafe / ön konu (MELEE_RANGE / MELEE_CONE_HALF). */
  _anyMonsterInMeleeReach(monsters) {
    if (!monsters || !monsters.length) return false;
    const RANGE = 46;
    const CONE_HALF = Math.PI * 0.42;
    const px = this.centerX, py = this.centerY, pa = this.angle;
    for (const m of monsters) {
      if (!m.alive || m.state === "dying") continue;
      const dx = m.cx - px, dy = m.cy - py;
      const dist = Math.hypot(dx, dy);
      if (dist > RANGE) continue;
      const ta = Math.atan2(dy, dx);
      let ad = pa - ta;
      while (ad > Math.PI) ad -= Math.PI * 2;
      while (ad < -Math.PI) ad += Math.PI * 2;
      if (Math.abs(ad) <= CONE_HALF) return true;
    }
    return false;
  }

  _appearanceFromEquipment(inv) {
    const shirt = { main: "#ebe4dc", dark: "#d4c8bc", trim: "#c8b8a8", pants: "#b0a090", skin: "#e8d0a8" };
    let mx = 0;
    let armorMx = 0;
    let powerSum = 0;
    let armorPowerSum = 0;
    const ARMOR_SLOTS = ["head", "chest", "hands", "feet"];
    const bump = (d) => {
      if (d && d.rarity) mx = Math.max(mx, rarityRank(d.rarity));
    };
    if (inv && inv.equipped) {
      for (const sk of EQ_SLOTS) {
        const es = inv.equipped[sk];
        if (es && ITEMS[es.id]) {
          const d = ITEMS[es.id];
          bump(d);
          const ps = itemStatPowerScore(d);
          powerSum += ps;
          if (ARMOR_SLOTS.includes(sk)) {
            if (d.rarity) armorMx = Math.max(armorMx, rarityRank(d.rarity));
            armorPowerSum += ps;
          }
        }
      }
    }
    const hasChest = !!(inv?.equipped?.chest && ITEMS[inv.equipped.chest.id]);
    const hasHead = !!(inv?.equipped?.head && ITEMS[inv.equipped.head.id]);
    const hasFeet = !!(inv?.equipped?.feet && ITEMS[inv.equipped.feet.id]);
    const helmId = hasHead ? inv.equipped.head.id : null;
    const handsId = inv?.equipped?.hands ? inv.equipped.hands.id : null;
    const hasJewelry = !!(inv?.equipped?.ring || inv?.equipped?.amulet);
    const showFantasyBack = hasChest || hasHead;

    let aura = null;
    if (hasChest) {
      if (armorMx >= 4) {
        Object.assign(shirt, { main: "#2a2838", dark: "#14101c", trim: "#ffd080", pants: shirt.pants, skin: "#f0d8a8" });
        aura = "gold";
      } else if (armorMx >= 3) {
        Object.assign(shirt, { main: "#4a2068", dark: "#280838", trim: "#e8a8ff", pants: shirt.pants, skin: "#e8c8e8" });
        aura = "violet";
      } else if (armorMx >= 2) {
        Object.assign(shirt, { main: "#2e5880", dark: "#183858", trim: "#a0d8ff", pants: shirt.pants, skin: "#d8e8f0" });
        aura = "blue";
      }
    }
    const chest = hasChest ? ITEMS[inv.equipped.chest.id] : null;
    if (chest) {
      if (chest.id === "chest_leather") Object.assign(shirt, { main: "#5a5038", dark: "#3a3828", trim: "#c8a878" });
      else if (chest.id === "chest_steel") Object.assign(shirt, { main: "#3a4a60", dark: "#283040", trim: "#c0d0e8" });
      else if (chest.id === "chest_epic") Object.assign(shirt, { main: "#1a5028", dark: "#0e3018", trim: "#70ffa8" });
      else if (chest.id === "chest_legendary") Object.assign(shirt, { main: "#1a1830", dark: "#0a0818", trim: "#b8a0ff" });
    }
    const feet = hasFeet ? ITEMS[inv.equipped.feet.id] : null;
    if (feet) {
      if (feet.id === "boots_swift") shirt.pants = "#284858";
      else if (feet.id === "boots_epic") shirt.pants = "#203848";
    }
    return {
      shirt, mx, armorMx, aura, helmId, handsId, hasJewelry, powerSum, armorPowerSum,
      hasChest, hasFeet, showFantasyBack,
    };
  }

  _drawHelmDecoration(ctx, helmId, d, bounce) {
    if (!helmId) return;
    if (helmId === "helm_leather") {
      ctx.fillStyle = "#6a4830";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-7, -15 - bounce, 14, 5);
      } else {
        ctx.fillRect(-9, -16 - bounce, 18, 5);
      }
      return;
    }
    if (helmId === "helm_iron") {
      ctx.fillStyle = "#8898a8";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-8, -16 - bounce, 16, 9);
        ctx.fillStyle = "#586878";
        ctx.fillRect(-6, -14 - bounce, 12, 3);
      } else {
        ctx.fillRect(-9, -17 - bounce, 18, 10);
        ctx.fillStyle = "#586878";
        ctx.fillRect(-7, -15 - bounce, 14, 4);
      }
      return;
    }
    if (helmId === "helm_epic") {
      ctx.fillStyle = "#6040a0";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-8, -16 - bounce, 16, 8);
      } else {
        ctx.fillRect(-9, -17 - bounce, 18, 9);
      }
      ctx.strokeStyle = "#ffd060";
      ctx.lineWidth = 1;
      ctx.strokeRect(-8, -16 - bounce, d === DIR.LEFT || d === DIR.RIGHT ? 16 : 18, d === DIR.LEFT || d === DIR.RIGHT ? 8 : 9);
      return;
    }
    if (helmId === "helm_legendary") {
      ctx.fillStyle = "#2a2010";
      if (d === DIR.LEFT || d === DIR.RIGHT) {
        ctx.fillRect(-8, -17 - bounce, 16, 10);
      } else {
        ctx.fillRect(-9, -18 - bounce, 18, 11);
      }
      ctx.fillStyle = "#ffd060";
      ctx.fillRect(-3, -20 - bounce, 2, 5);
      ctx.fillRect(1, -20 - bounce, 2, 5);
      ctx.strokeStyle = "#ffd080";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, -12 - bounce, 7, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
  }

  /**
   * MMORPG tarzı yarasaları kanatlar: pembe-turuncu zar, mor kemik, turkuaz damar.
   * Bakış yönüne göre "sırt" ekseninde açılır; yürüyünce çırpma genişler.
   */
  _drawFantasyWings(ctx, cx, cy, d, bounce) {
    const t = performance.now() * 0.0011;
    const flap = Math.sin(t) * 0.08;

    const drawOneWing = (side) => {
      ctx.save();
      ctx.rotate(side * 0.52 + flap);
      const gx = ctx.createLinearGradient(0, 0, side * 28, -18);
      gx.addColorStop(0, "rgba(255, 80, 150, 0.95)");
      gx.addColorStop(0.45, "rgba(255, 120, 72, 0.92)");
      gx.addColorStop(1, "rgba(255, 200, 96, 0.88)");
      ctx.fillStyle = gx;
      ctx.beginPath();
      ctx.moveTo(0, -3);
      ctx.quadraticCurveTo(side * 14, -12, side * 26, -20);
      ctx.lineTo(side * 29, 0);
      ctx.quadraticCurveTo(side * 16, 6, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "rgba(72, 220, 200, 0.5)";
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(0, -2);
      ctx.quadraticCurveTo(side * 13, -9, side * 22, -16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(side * 8, 0);
      ctx.quadraticCurveTo(side * 18, -6, side * 24, -12);
      ctx.stroke();
      ctx.strokeStyle = "#3d2060";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(side * 12, -10, side * 24, -18);
      ctx.stroke();
      ctx.fillStyle = "#f2ebe4";
      ctx.beginPath();
      ctx.moveTo(side * 26, -20);
      ctx.lineTo(side * 30, -24);
      ctx.lineTo(side * 27, -14);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    };

    ctx.save();
    ctx.translate(cx, cy - bounce * 0.35);
    if (d === DIR.UP) ctx.rotate(Math.PI);
    else if (d === DIR.LEFT) ctx.rotate(-Math.PI / 2);
    else if (d === DIR.RIGHT) ctx.rotate(Math.PI / 2);
    drawOneWing(-1);
    drawOneWing(1);
    ctx.restore();
  }

  /** Arkadaki pembe hale içinde minik peri silüeti. */
  _drawBackFairyOrb(ctx, cx, cy, d, bounce) {
    let ox = 0, oy = -6;
    if (d === DIR.DOWN) { ox = 0; oy = -14; }
    else if (d === DIR.UP) { ox = 0; oy = 6; }
    else if (d === DIR.LEFT) { ox = 10; oy = -6; }
    else if (d === DIR.RIGHT) { ox = -10; oy = -6; }
    const fx = cx + ox;
    const fy = cy + oy - bounce * 0.4;
    const pulse = 0.65 + 0.35 * Math.sin(performance.now() * 0.0035);
    const bob = Math.sin(performance.now() * 0.0019) * 0.65;
    ctx.save();
    ctx.globalAlpha = 0.42 * pulse;
    const rg = ctx.createRadialGradient(fx, fy + bob, 2, fx, fy + bob, 14);
    rg.addColorStop(0, "rgba(255, 140, 220, 0.9)");
    rg.addColorStop(0.55, "rgba(180, 80, 255, 0.35)");
    rg.addColorStop(1, "rgba(80, 40, 120, 0)");
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(fx, fy + bob, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.55 * pulse;
    ctx.fillStyle = "rgba(255, 200, 255, 0.75)";
    ctx.beginPath();
    ctx.ellipse(fx, fy + bob - 1, 2.2, 3.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(200, 160, 255, 0.9)";
    ctx.beginPath();
    ctx.moveTo(fx - 3, fy + bob);
    ctx.lineTo(fx - 7, fy + bob - 2);
    ctx.lineTo(fx - 5, fy + bob + 1);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(fx + 3, fy + bob);
    ctx.lineTo(fx + 7, fy + bob - 2);
    ctx.lineTo(fx + 5, fy + bob + 1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  _drawBareHair(ctx, d, bounce) {
    ctx.fillStyle = "#4a3220";
    if (d === DIR.DOWN || d === DIR.UP) {
      ctx.beginPath();
      ctx.arc(0, -11 - bounce, 8, Math.PI * 1.08, Math.PI * 1.92);
      ctx.fill();
      ctx.fillRect(-7, -14 - bounce, 14, 4);
    } else if (d === DIR.LEFT) {
      ctx.beginPath();
      ctx.ellipse(-5, -10 - bounce, 6, 8, -0.2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.ellipse(5, -10 - bounce, 6, 8, 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  _drawEquipmentAura(ctx, cx, cy, vis) {
    const pw = vis.armorPowerSum != null ? vis.armorPowerSum : 0;
    const tier = Math.min(1, pw / 130);
    const amx = vis.armorMx != null ? vis.armorMx : vis.mx;
    const showJewelGlow = vis.hasJewelry && amx < 2;
    if (!vis.aura && amx < 2 && !showJewelGlow && tier < 0.06) return;
    const tMs = performance.now();
    const t = tMs / 700;
    let col = "#90b8e0";
    if (vis.aura === "gold") col = "#ffd060";
    else if (vis.aura === "violet") col = "#c080ff";
    else if (vis.aura === "blue") col = "#80c0ff";
    else if (vis.hasJewelry) col = "#a8c8f0";
    const pulse = 0.72 + 0.28 * Math.sin(t);
    const rings = amx >= 4 ? 5 : amx >= 3 ? 4 : amx >= 2 ? 3 : (showJewelGlow ? 2 : 1 + Math.floor(tier * 3));
    const baseR = 13 + tier * 12 + (amx >= 4 ? 8 : amx >= 3 ? 5 : amx >= 2 ? 3 : 0);
    ctx.save();
    for (let i = 0; i < rings; i++) {
      const r = baseR + i * 6.5 + Math.sin(t * 1.35 + i * 0.55) * 2.2;
      const a = Math.min(0.52, (0.1 + tier * 0.22 + amx * 0.045) * pulse / (i * 0.32 + 1));
      ctx.globalAlpha = a;
      ctx.strokeStyle = col;
      ctx.lineWidth = amx >= 4 ? 2.4 : amx >= 3 ? 2 : 1.5;
      ctx.setLineDash(i === 0 && amx >= 3 ? [5, 5] : []);
      ctx.beginPath();
      ctx.arc(cx, cy - 4, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    const rg = ctx.createRadialGradient(cx, cy - 8, 0, cx, cy - 4, baseR + 24);
    rg.addColorStop(0, hexToRgba(col, 0.22 * pulse * (0.85 + tier * 0.35)));
    rg.addColorStop(0.45, hexToRgba(col, 0.08));
    rg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.globalAlpha = 1;
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(cx, cy - 4, baseR + 26, 0, Math.PI * 2);
    ctx.fill();
    if (amx >= 4 || tier > 0.5) {
      const sparkN = amx >= 4 ? 7 : 5;
      for (let k = 0; k < sparkN; k++) {
        const ang = tMs * 0.0019 + k * (Math.PI * 2 / sparkN);
        const pr = baseR + 6 + Math.sin(tMs * 0.0028 + k * 1.1) * 4;
        ctx.globalAlpha = 0.2 + tier * 0.35;
        ctx.fillStyle = amx >= 4 ? "#fff8c8" : "#e8e0ff";
        ctx.beginPath();
        ctx.arc(cx + Math.cos(ang) * pr, cy - 4 + Math.sin(ang) * pr, 1.2 + tier * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  render(ctx, inventory, monsters) {
    const inv = inventory || null;
    const vis = this._appearanceFromEquipment(inv);
    const bladeId = inv && inv.equipped && inv.equipped.blade ? inv.equipped.blade.id : null;
    const bowId = inv && inv.equipped && inv.equipped.bow ? inv.equipped.bow.id : null;
    const hasBladeEquipped = !!(bladeId && ITEMS[bladeId] && ITEMS[bladeId].equipSlot === "blade");
    const hasBowEquipped = !!(bowId && ITEMS[bowId] && ITEMS[bowId].equipSlot === "bow");
    const meleeThreat = !this.inBoat && hasBladeEquipped && hasBowEquipped && this._anyMonsterInMeleeReach(monsters);
    const showBow = hasBowEquipped && this.swingAnim <= 0 && (!meleeThreat || this.shootAnim > 0);
    const showBladeVisual = hasBladeEquipped && this.swingAnim <= 0 && (!hasBowEquipped || meleeThreat) && this.shootAnim <= 0;

    const cx = Math.round(this.x + this.w / 2);
    const cy = Math.round(this.y + this.h / 2);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) * 2.2 : 0;
    const legDrive = this.moving ? 1 : 0;
    const walkCycle = this.walkPhase * 2;
    const lStride = Math.sin(walkCycle) * 3.4 * legDrive;
    const rStride = Math.sin(walkCycle + Math.PI) * 3.4 * legDrive;
    const armBob = Math.sin(walkCycle + Math.PI / 2) * 1.5 * legDrive;
    const shootT = this.shootAnim > 0 ? Math.min(1, this.shootAnim / 0.3) : 0;
    const pull = shootT > 0 ? Math.sin(shootT * Math.PI / 2) * 7.5 : 0;
    const d = this.direction;
    const a = this.angle;
    const bowInFront = this._isBowInFront(d, a);
    const S = vis.shirt;

    this._drawEquipmentAura(ctx, cx, cy, vis);
    if (vis.showFantasyBack) {
      this._drawFantasyWings(ctx, cx, cy, d, bounce);
      this._drawBackFairyOrb(ctx, cx, cy, d, bounce);
    }

    if (showBow && !bowInFront) this._drawBowAndArms(ctx, cx, cy, bounce, pull, bowId, armBob, shootT);

    ctx.save();
    ctx.translate(cx, cy);

    const greave = "#c4a035";
    ctx.fillStyle = S.pants;
    if (d === DIR.LEFT || d === DIR.RIGHT) {
      ctx.save();
      ctx.translate(-2.5 + lStride * 0.08, 4 - bounce);
      ctx.rotate(lStride * 0.045);
      ctx.fillRect(0, 0, 3.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1, 3.2, 2.2);
        ctx.fillRect(0, 4.5, 3.2, 1.4);
      }
      ctx.restore();
      ctx.fillStyle = S.pants;
      ctx.save();
      ctx.translate(0.5 - lStride * 0.08, 4 - bounce);
      ctx.rotate(-lStride * 0.045);
      ctx.fillRect(0, 0, 3.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1, 3.2, 2.2);
        ctx.fillRect(0, 4.5, 3.2, 1.4);
      }
      ctx.restore();
    } else {
      if (d === DIR.DOWN && vis.hasChest) {
        ctx.fillStyle = "rgba(90, 40, 120, 0.85)";
        ctx.beginPath();
        ctx.moveTo(-3, 3 - bounce);
        ctx.lineTo(0, 9 - bounce);
        ctx.lineTo(3, 3 - bounce);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillStyle = S.pants;
      ctx.save();
      ctx.translate(-5.5 + lStride, 4 - bounce);
      ctx.rotate(lStride * 0.055);
      ctx.fillRect(0, 0, 4.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1.2, 4.2, 2.2);
        ctx.fillRect(0, 5, 4.2, 1.4);
      }
      ctx.restore();
      ctx.fillStyle = S.pants;
      ctx.save();
      ctx.translate(1.5 + rStride, 4 - bounce);
      ctx.rotate(rStride * 0.055);
      ctx.fillRect(0, 0, 4.2, 6.5);
      if (vis.hasFeet) {
        ctx.fillStyle = greave;
        ctx.fillRect(0, 1.2, 4.2, 2.2);
        ctx.fillRect(0, 5, 4.2, 1.4);
      }
      ctx.restore();
    }

    if (d === DIR.LEFT || d === DIR.RIGHT) {
      ctx.fillStyle = S.main;
      ctx.fillRect(-6, -7 - bounce, 12, 11);
      ctx.fillStyle = S.dark;
      ctx.fillRect(-6, -7 - bounce, 12, 3);
      ctx.fillStyle = S.dark;
      ctx.fillRect(-5, 2 - bounce, 10, 5);

      const qSide = d === DIR.LEFT ? 1 : -1;
      const ab = armBob * 0.35;
      if (vis.hasChest) {
        ctx.fillStyle = "#b8942a";
        ctx.fillRect(-7 + qSide * 5, -10 - bounce + ab, 4, 5);
        ctx.fillStyle = "#f0d878";
        ctx.fillRect(-6.5 + qSide * 5, -9 - bounce + ab, 3, 1.5);
      }
      if (hasBowEquipped) {
        ctx.fillStyle = "#6b4226";
        ctx.fillRect(qSide * 2, -5 - bounce + ab, 3, 7);
        ctx.fillStyle = S.trim;
        ctx.fillRect(qSide * 2 + 1, -7 - bounce + ab, 2, 3);
        ctx.fillRect(qSide * 2 + 1, 2 - bounce + ab, 2, 2);
      }
      if (vis.handsId) {
        ctx.fillStyle = "#d0dce8";
        ctx.fillRect(qSide * 2 - 1, -6 - bounce + ab, 5, 3);
        ctx.fillRect(qSide * 2 - 1, 0 - bounce + ab, 5, 3);
      }
    } else {
      ctx.fillStyle = S.dark;
      ctx.fillRect(-7, 2 - bounce, 6, 5);
      ctx.fillRect(1, 2 - bounce, 6, 5);
      ctx.fillStyle = S.main;
      ctx.fillRect(-8, -7 - bounce, 16, 11);
      ctx.fillStyle = S.dark;
      ctx.fillRect(-8, -7 - bounce, 16, 3);
      if (vis.hasChest) {
        ctx.fillStyle = "#b8942a";
        ctx.fillRect(-12, -9 - bounce, 4, 5);
        ctx.fillRect(8, -9 - bounce, 4, 5);
        ctx.fillStyle = "#f0d878";
        ctx.fillRect(-11.5, -8 - bounce, 3, 1.5);
        ctx.fillRect(8.5, -8 - bounce, 3, 1.5);
      }

      if (d === DIR.DOWN && hasBowEquipped) {
        const ab = armBob * 0.4;
        ctx.fillStyle = "#6b4226";
        ctx.fillRect(-8, -6 - bounce + ab, 3, 8);
        ctx.fillStyle = S.trim;
        ctx.fillRect(-8, -8 - bounce + ab, 2, 3);
        ctx.fillRect(-8, 2 - bounce + ab, 2, 3);
        if (vis.handsId) {
          ctx.fillStyle = "#d0dce8";
          ctx.fillRect(-10, -5 - bounce + ab, 3, 4);
          ctx.fillRect(-10, 1 - bounce + ab, 3, 4);
        }
      }
    }

    ctx.fillStyle = S.skin;
    ctx.beginPath(); ctx.arc(0, -8 - bounce, 6, 0, Math.PI * 2); ctx.fill();
    if (d === DIR.DOWN) {
      ctx.fillStyle = "#222";
      ctx.fillRect(-2, -9 - bounce, 2, 2);
      ctx.fillRect(1, -9 - bounce, 2, 2);
    } else if (d === DIR.LEFT) {
      ctx.fillStyle = "#222";
      ctx.fillRect(-3, -9 - bounce, 2, 2);
    } else if (d === DIR.RIGHT) {
      ctx.fillStyle = "#222";
      ctx.fillRect(1, -9 - bounce, 2, 2);
    }
    if (vis.helmId) {
      this._drawHelmDecoration(ctx, vis.helmId, d, bounce);
    } else {
      this._drawBareHair(ctx, d, bounce);
    }

    if (inv && inv.equipped && inv.equipped.amulet) {
      const am = ITEMS[inv.equipped.amulet.id];
      const pwAm = itemStatPowerScore(am || {});
      ctx.fillStyle = (vis.mx >= 3 || pwAm > 22) ? "#ffd0e8" : "#b89870";
      ctx.beginPath();
      ctx.arc(0, -2 - bounce, 2.2 + Math.min(1.2, pwAm / 40), 0, Math.PI * 2);
      ctx.fill();
      if (vis.mx >= 4 || pwAm > 35) {
        ctx.strokeStyle = "rgba(255,220,180,0.75)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    ctx.restore();

    if (showBow && bowInFront) this._drawBowAndArms(ctx, cx, cy, bounce, pull, bowId, armBob, shootT);
    if (showBladeVisual) {
      this._drawEquippedBlade(ctx, cx, cy, bounce, a, bladeId);
    }
    if (this.swingAnim > 0) this._drawMeleeSwing(ctx, cx, cy, bounce);
  }

  _drawEquippedBlade(ctx, cx, cy, bounce, aimAngle, bladeId) {
    ctx.save();
    ctx.translate(cx, cy + bounce * 0.35);
    ctx.rotate(aimAngle + Math.PI * 0.12);
    const bd = bladeId && ITEMS[bladeId];
    const rk = bd && bd.rarity ? rarityRank(bd.rarity) : 1;
    const pwBl = itemStatPowerScore(bd || {});
    const pulseBl = 0.55 + 0.45 * Math.sin(performance.now() / 280);
    const ringR = 20 + Math.min(8, pwBl / 8);
    if (rk >= 2 || pwBl > 5) {
      ctx.globalAlpha = (0.12 + rk * 0.055 + Math.min(0.22, pwBl / 100)) * pulseBl;
      ctx.strokeStyle = rk >= 4 ? "#ffe8a0" : rk >= 3 ? "#e8c0ff" : "#b8e8ff";
      ctx.lineWidth = rk >= 4 ? 2.2 : rk >= 3 ? 1.8 : 1.4;
      ctx.beginPath(); ctx.arc(0, -8, ringR, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, -8, ringR + 4 + rk, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    const sh = Math.min(24, 5 + rk * 3.2 + Math.min(11, pwBl / 6)) * pulseBl;
    if (rk >= 4) { ctx.shadowColor = "#ffd060"; ctx.shadowBlur = sh; }
    else if (rk >= 3) { ctx.shadowColor = "#c080ff"; ctx.shadowBlur = sh * 0.92; }
    else if (rk >= 2) { ctx.shadowColor = "#80c0ff"; ctx.shadowBlur = sh * 0.85; }
    else if (pwBl > 4) { ctx.shadowColor = "#a0a8c0"; ctx.shadowBlur = sh * 0.5; }
    const bid = bladeId || "";
    const tint = bid.includes("elven") ? "#b0e8ff" : bid.includes("steel") ? "#d0dce8" : bid.includes("rusty") ? "#8a7a6a" : "#c8c8d8";
    ctx.fillStyle = tint;
    ctx.fillRect(-2, -20, 4, 24);
    ctx.fillStyle = "rgba(255,255,255,0.45)"; ctx.fillRect(-1.5, -19, 1.2, 20);
    ctx.fillStyle = "#e8e8f0";
    ctx.fillRect(-2.5, -21, 5, 5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#6B4226";
    ctx.fillRect(-4, 6, 8, 3);
    ctx.fillRect(-1.5, 4, 3, 5);
    ctx.restore();
  }

  _isBowInFront(d, a) {
    if (d === DIR.DOWN) return true;
    if (d === DIR.UP) return false;
    if (d === DIR.RIGHT) return a > -Math.PI * 0.5 && a < Math.PI * 0.5;
    return a > Math.PI * 0.5 || a < -Math.PI * 0.5;
  }

  _drawBowAndArms(ctx, cx, cy, bounce, pull, bowId, armBob, shootT) {
    const a = this.angle;
    const bob = (armBob || 0) * 0.22;
    const shoulderX = cx;
    const shoulderY = cy - 2 - bounce + bob;
    let wood = "#8a7028", stringCol = "#e8e8e8", limb = "#8B6B3D";
    if (bowId === "bow_hunter") { wood = "#5a6048"; stringCol = "#a0c890"; limb = "#4a5038"; }
    if (bowId === "bow_long") { wood = "#504060"; stringCol = "#d0b0ff"; limb = "#403050"; }

    ctx.save();
    ctx.translate(shoulderX, shoulderY);
    ctx.rotate(a);
    const bdef = bowId && ITEMS[bowId];
    const rkB = bdef && bdef.rarity ? rarityRank(bdef.rarity) : 0;
    const pwB = itemStatPowerScore(bdef || {});
    const pulseB = 0.6 + 0.4 * Math.sin(performance.now() / 310);
    const tMs = performance.now();
    const drawFx = true;
    if (rkB >= 2 || pwB > 4) {
      ctx.shadowColor = rkB >= 4 ? "rgba(255,215,130,0.95)" : rkB >= 3 ? "rgba(210,175,255,0.9)" : "rgba(150,205,255,0.88)";
      ctx.shadowBlur = Math.min(22, 4 + rkB * 3 + Math.min(11, pwB / 5.5)) * pulseB;
    }

    const drawStr = Math.max(0.4, 1 - (shootT || 0)) * 0.35;
    if (drawFx) {
      ctx.save();
      ctx.globalAlpha = 0.55 + (shootT || 0) * 0.35;
      const g0 = ctx.createRadialGradient(19, 5, 0, 19, 5, 14);
      g0.addColorStop(0, "rgba(60, 255, 120, 0.9)");
      g0.addColorStop(0.5, "rgba(40, 180, 90, 0.35)");
      g0.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g0;
      ctx.beginPath();
      ctx.arc(19, 5, 12 + Math.sin(tMs * 0.008) * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = 0.5 + pulseB * 0.35;
      const g1 = ctx.createRadialGradient(11, 0, 0, 11, 0, 11);
      g1.addColorStop(0, "rgba(160, 220, 255, 0.95)");
      g1.addColorStop(0.45, "rgba(100, 140, 255, 0.4)");
      g1.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g1;
      ctx.beginPath();
      ctx.arc(11, 0, 9 + (shootT || 0) * 4, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 5; i++) {
        const j = (tMs * 0.012 + i * 1.7) % 3;
        ctx.strokeStyle = "rgba(220, 240, 255, " + (0.35 + j * 0.15) + ")";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(6 + i * 2.2, -4 + (i % 2) * 8);
        ctx.lineTo(14 + j * 3, 3 - j * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.fillStyle = "#e0c060";
    ctx.fillRect(2, -1.5, 9, 3);
    ctx.fillStyle = "#d4b050";
    ctx.beginPath(); ctx.arc(11, 0, 2, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = wood; ctx.lineWidth = 2.8;
    ctx.beginPath(); ctx.arc(13, 0, 8, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();

    ctx.strokeStyle = stringCol; ctx.lineWidth = 1.1;
    const topX = 13 + Math.cos(-Math.PI * 0.6) * 8;
    const topY = Math.sin(-Math.PI * 0.6) * 8;
    const botX = 13 + Math.cos(Math.PI * 0.6) * 8;
    const botY = Math.sin(Math.PI * 0.6) * 8;
    const nockX = 13 - pull;
    ctx.beginPath();
    ctx.moveTo(topX, topY);
    ctx.quadraticCurveTo(nockX - 2, drawStr * 4, nockX, 0);
    ctx.quadraticCurveTo(nockX - 2, -drawStr * 4, botX, botY);
    ctx.stroke();

    ctx.fillStyle = "#c9a227";
    ctx.fillRect(0.5, -2.2, 4, 4.4);
    ctx.fillRect(-0.5 + pull * 0.08, 1.6, 3.2, 2.8);

    ctx.fillStyle = "#e0c060";
    ctx.fillRect(1, -1.5 + 3, 6 - pull * 0.65, 3);
    ctx.fillStyle = "#d4b050";
    ctx.beginPath(); ctx.arc(7 - pull * 0.65, 1.5, 2, 0, Math.PI * 2); ctx.fill();

    if (pull > 0.2) {
      ctx.fillStyle = limb;
      ctx.fillRect(9 - pull, -1, 14, 2);
      ctx.fillStyle = "#c0c0c0";
      ctx.beginPath();
      ctx.moveTo(23 - pull, 0);
      ctx.lineTo(20 - pull, -3);
      ctx.lineTo(20 - pull, 3);
      ctx.fill();
      ctx.fillStyle = "#d04040";
      ctx.fillRect(8 - pull, -2.5, 2, 5);
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  _drawMeleeSwing(ctx, cx, cy, bounce) {
    if (this.swingAnim <= 0) return;
    const dur = 0.28;
    const t = 1 - this.swingAnim / dur;
    const arcSpan = Math.PI * 0.55 * (0.35 + t * 0.65);
    ctx.save();
    ctx.translate(cx, cy + bounce * 0.5);
    ctx.rotate(this.angle);
    ctx.strokeStyle = "rgba(240, 245, 255, 0.9)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(8, 0, 26, -arcSpan * 0.5, arcSpan * 0.5);
    ctx.stroke();
    ctx.strokeStyle = "rgba(180, 200, 255, 0.45)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(8, 0, 24, -arcSpan * 0.45, arcSpan * 0.45);
    ctx.stroke();
    ctx.restore();
  }

  renderBoat(ctx) {
    const cx = Math.round(this.x + this.w / 2);
    const cy = Math.round(this.y + this.h / 2);
    const wave = Math.sin(this.boatWaveTimer * 2.5) * 2;
    const rock = Math.sin(this.boatWaveTimer * 1.8) * 0.04;

    ctx.save();
    ctx.translate(cx, cy + wave);
    ctx.rotate(this.angle + Math.PI / 2 + rock);

    ctx.fillStyle = "#6B4226";
    ctx.beginPath();
    ctx.moveTo(-12, 8);
    ctx.lineTo(-10, -12);
    ctx.lineTo(0, -18);
    ctx.lineTo(10, -12);
    ctx.lineTo(12, 8);
    ctx.quadraticCurveTo(0, 14, -12, 8);
    ctx.fill();
    ctx.strokeStyle = "#4a2e16"; ctx.lineWidth = 1; ctx.stroke();

    ctx.fillStyle = "#8B5E3C";
    ctx.fillRect(-9, -4, 18, 3);
    ctx.fillRect(-7, 2, 14, 3);

    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(-1, -16, 2, 22);

    ctx.fillStyle = "#e0d0b0";
    ctx.beginPath();
    ctx.moveTo(1, -16);
    ctx.lineTo(10, -10);
    ctx.lineTo(1, -6);
    ctx.fill();
    ctx.strokeStyle = "#c0b090"; ctx.lineWidth = 0.5; ctx.stroke();

    ctx.restore();

    ctx.save();
    ctx.translate(cx, cy + wave);
    ctx.rotate(this.angle + Math.PI / 2 + rock);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) * 1 : 0;

    ctx.fillStyle = "#e0c060";
    ctx.beginPath(); ctx.arc(0, -2 - bounce, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2a6030";
    ctx.beginPath();
    ctx.moveTo(-3, -4 - bounce);
    ctx.lineTo(0, -9 - bounce);
    ctx.lineTo(3, -4 - bounce);
    ctx.fill();
    ctx.fillStyle = "#222";
    ctx.fillRect(-1.5, -3 - bounce, 1.5, 1.5);
    ctx.fillRect(0.5, -3 - bounce, 1.5, 1.5);

    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#80c0ff";
    const wt = this.boatWaveTimer;
    for (let i = 0; i < 3; i++) {
      const wx = cx - 14 + Math.sin(wt * 2 + i * 2.5) * 6;
      const wy = cy + 10 + i * 4 + Math.cos(wt * 1.5 + i) * 2;
      ctx.beginPath();
      ctx.arc(wx, wy, 5, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(wx + 14, wy + 2, 4, 0, Math.PI);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  get centerX() { return this.x + this.w / 2; }
  get centerY() { return this.y + this.h / 2; }
  /** Tekne binme / zemin kontrol\u00fc i\u00e7in ayaklar\u0131n yakla\u015f\u0131k pikseli. */
  get feetX() { return this.centerX; }
  get feetY() { return this.y + this.h - 4; }
}

class Arrow {
  constructor(x, y, angle) {
    this.x = x; this.y = y;
    this.angle = angle;
    this.speed = 300;
    this.alive = true;
    this.life = 2.5;
    this.w = 4; this.h = 4;
    this.dx = Math.cos(angle);
    this.dy = Math.sin(angle);
    this.damage = 10;
    this.power = false;
    this.trail = [];
    /** "fire" | "ice" | null \u2014 beceri c\u00f6mle\u011fi g\u00f6r\u00fcn\u00fcm\u00fc */
    this.element = null;
  }

  update(dt, map) {
    if (!this.alive) return;
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }
    if (this.power) {
      this.trail.push({ x: this.x, y: this.y, t: 0.2 });
      for (let i = this.trail.length - 1; i >= 0; i--) {
        this.trail[i].t -= dt;
        if (this.trail[i].t <= 0) this.trail.splice(i, 1);
      }
    }
    this.x += this.dx * this.speed * dt;
    this.y += this.dy * this.speed * dt;
    if (map.isSolidPx(this.x, this.y)) {
      this.alive = false;
    }
  }

  render(ctx) {
    if (!this.alive) return;

    if (this.power) {
      for (const p of this.trail) {
        ctx.globalAlpha = p.t / 0.2 * 0.4;
        ctx.fillStyle = "#d080ff";
        ctx.beginPath();
        ctx.arc(Math.round(p.x), Math.round(p.y), 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    ctx.rotate(this.angle);

    if (this.power) {
      ctx.shadowColor = "#d080ff";
      ctx.shadowBlur = 8;
    }

    let shaft = "#8B6B3D", tip = "#c0c0c0", feather = "#d04040";
    if (this.element === "fire") {
      shaft = "#c86018"; tip = "#ffe0a0"; feather = "#ff4010";
      ctx.shadowColor = "#ff8040"; ctx.shadowBlur = 6;
    } else if (this.element === "ice") {
      shaft = "#5090b8"; tip = "#e8f8ff"; feather = "#4080c0";
      ctx.shadowColor = "#a0d8ff"; ctx.shadowBlur = 5;
    }
    ctx.fillStyle = this.power ? "#b060e0" : shaft;
    ctx.fillRect(-8, -1, 16, 2);
    ctx.fillStyle = this.power ? "#f0c0ff" : tip;
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(5, -3); ctx.lineTo(5, 3); ctx.fill();
    ctx.fillStyle = this.power ? "#a040d0" : feather;
    ctx.fillRect(-8, -2, 1.5, 4);
    ctx.fillRect(-6.5, -1.5, 1, 3);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

class MonSpell {
  constructor(x, y, tx, ty, damage, kind) {
    this.x = x;
    this.y = y;
    const d0 = Math.hypot(tx - x, ty - y) || 1;
    this.dx = (tx - x) / d0;
    this.dy = (ty - y) / d0;
    this.ang = Math.atan2(this.dy, this.dx);
    this.kind = kind;
    this.damage = damage;
    this.alive = true;
    this.life = kind === "meteor" ? 4.2 : 3.2;
    this.t = 0;
    this.spin = 0;
    this.trail = [];
    this.trailT = 0;
    this.lightJag = 0.6 + Math.random() * 0.7;
    if (kind === "meteor") {
      this.x -= this.dx * 100;
      this.y -= 150 + Math.random() * 50;
      const d2 = Math.hypot(tx - this.x, ty - this.y) || 1;
      this.dx = (tx - this.x) / d2;
      this.dy = (ty - this.y) / d2;
      this.ang = Math.atan2(this.dy, this.dx);
      this.speed = 280;
    } else if (kind === "ice") {
      this.speed = 220;
    } else if (kind === "poison") {
      this.speed = 185;
    } else if (kind === "lightning") {
      this.speed = 450;
    } else {
      this.speed = 255;
    }
  }

  _pushTrail() {
    this.trailT += 0.04;
    this.trail.push({ x: this.x, y: this.y, a: 1, s: this.trailT });
    if (this.trail.length > 9) this.trail.shift();
    for (const p of this.trail) p.a *= 0.88;
  }

  update(dt, map, player) {
    if (!this.alive) return;
    this.life -= dt;
    this.t += dt;
    this.spin += dt * (this.kind === "ice" ? 6 : 3);
    if (this.life <= 0) {
      this.alive = false;
      return;
    }
    this.x += this.dx * this.speed * dt;
    this.y += this.dy * this.speed * dt;
    this.ang = Math.atan2(this.dy, this.dx);
    if (this.kind === "fire" || this.kind === "meteor" || this.kind === "poison") {
      this._pushTrail();
    }
    if (map.isSolidPx(this.x, this.y)) {
      this.alive = false;
      return;
    }
    const pcx = player.centerX, pcy = player.centerY;
    const hitR = this.kind === "meteor" ? 16 : 12;
    if (Math.hypot(this.x - pcx, this.y - pcy) < hitR) {
      let dm = this.damage;
      if (this.kind === "ice") dm = Math.floor(dm * 0.92);
      if (this.kind === "meteor") dm = Math.floor(dm * 1.15);
      if (this.kind === "poison") {
        dm = Math.floor(dm * 0.45);
        player.poisonTimer = Math.max(player.poisonTimer || 0, 2.8);
      }
      const dk = this.kind === "meteor" ? "fire" : this.kind;
      player.takeDamage(dm, { kind: dk });
      this.alive = false;
    }
  }

  render(ctx) {
    if (!this.alive) return;
    const x = this.x, y = this.y;
    ctx.save();
    const tr = this.trail;
    if (tr && tr.length) {
      for (let i = 0; i < tr.length; i++) {
        const p = tr[i], k = p.a;
        if (k < 0.05) continue;
        if (this.kind === "meteor" || this.kind === "fire") {
          const rr = 5 + (1 - k) * 10;
          ctx.fillStyle = `rgba(255,${(100 + 80 * k) | 0},50,${k * 0.4})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
          ctx.fill();
        } else if (this.kind === "poison") {
          ctx.fillStyle = `rgba(80,200,60,${k * 0.35})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 6 * k, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    if (this.kind === "fire" || this.kind === "meteor") {
      const ang = this.ang;
      ctx.translate(x, y);
      ctx.rotate(ang);
      const m = this.kind === "meteor" ? 1.15 : 1;
      const coreG = ctx.createLinearGradient(12, 0, -10, 0);
      if (this.kind === "meteor") {
        coreG.addColorStop(0, "#1a0a0a");
        coreG.addColorStop(0.3, "#4a3020");
        coreG.addColorStop(0.55, "#8a4a1a");
        coreG.addColorStop(0.8, "#ff6a1a");
        coreG.addColorStop(1, "rgba(255,200,100,0.2)");
      } else {
        coreG.addColorStop(0, "#3a0a0a");
        coreG.addColorStop(0.4, "#ff5a0a");
        coreG.addColorStop(0.7, "#ffc040");
        coreG.addColorStop(1, "rgba(255,220,120,0.15)");
      }
      ctx.fillStyle = coreG;
      ctx.beginPath();
      ctx.ellipse(0, 0, 14 * m, 6 * m, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,200,100,0.5)";
      for (let j = 0; j < 3; j++) {
        const ph = (this.t * 8 + j * 2) % 6;
        const ox = -6 - ph;
        const oy = (j - 1) * 2.5;
        ctx.beginPath();
        ctx.ellipse(ox, oy, 2 + j, 3 + j * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (this.kind === "meteor") {
        ctx.fillStyle = "rgba(255,100,0,0.4)";
        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.lineTo(-4, 3);
        ctx.lineTo(-4, -3);
        ctx.closePath();
        ctx.fill();
      }
    } else if (this.kind === "ice") {
      const ang = this.ang, sp = this.spin;
      ctx.translate(x, y);
      ctx.rotate(ang);
      ctx.rotate(sp * 0.25);
      ctx.fillStyle = "rgba(200,240,255,0.9)";
      ctx.beginPath();
      ctx.moveTo(9, 0);
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 + sp;
        const rr = 4 + (i % 2) * 4;
        ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath();
      ctx.fill();
      const ic = ctx.createLinearGradient(4, -6, -2, 6);
      ic.addColorStop(0, "#b8e0ff");
      ic.addColorStop(1, "#5090c8");
      ctx.fillStyle = ic;
      ctx.beginPath();
      ctx.moveTo(7, 0);
      for (let i = 0; i < 5; i++) {
        const a2 = (i / 5) * Math.PI * 2;
        const rr2 = 3.5;
        ctx.lineTo(Math.cos(a2 + sp) * rr2, Math.sin(a2 + sp) * rr2);
      }
      ctx.closePath();
      ctx.fill();
    } else if (this.kind === "poison") {
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.beginPath();
      ctx.arc(x + 1, y + 2, 8, 0, Math.PI * 2);
      ctx.fill();
      for (let k = 0; k < 2; k++) {
        const ox = Math.sin(this.t * 10 + k * 1.2) * 2;
        const g = ctx.createRadialGradient(x + ox, y, 0, x + ox, y, 9);
        g.addColorStop(0, "#a8ff6a");
        g.addColorStop(0.45, "#3a8a1a");
        g.addColorStop(1, "rgba(0,30,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x + ox, y, 5 + k * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (this.kind === "lightning") {
      const ang = this.ang, lj = this.lightJag, tt = this.t;
      ctx.translate(x, y);
      ctx.rotate(ang);
      const jx = (i) => Math.sin(tt * 22 + i * 1.4) * 1.4 * lj + Math.sin(tt * 41 + i) * 0.6;
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = "#a0b8ff";
      for (let b = 0; b < 2; b++) {
        const off = b * 3;
        ctx.beginPath();
        ctx.ellipse(0, off, 2.5, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(240,245,255,0.95)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(10, jx(0));
      let px2 = 10, py2 = 0;
      for (let s = 0; s < 5; s++) {
        px2 -= 4.5;
        py2 = (s % 2 ? 1 : -1) * 5 + jx(s + 1) * 0.5;
        ctx.lineTo(px2, py2);
      }
      ctx.lineTo(-12, 1 + jx(7) * 0.3);
      ctx.stroke();
      ctx.strokeStyle = "rgba(180,200,255,0.65)";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(8, jx(8) * 0.2);
      for (let s2 = 0; s2 < 4; s2++) {
        const xx = 8 - (s2 + 1) * 3.2;
        const yy = (s2 % 2 ? 0.4 : -0.4) * 6 + jx(9 + s2) * 0.3;
        ctx.lineTo(xx, yy);
      }
      ctx.lineTo(-10, jx(20) * 0.2);
      ctx.stroke();
    } else {
      ctx.translate(x, y);
      ctx.rotate(this.ang);
      const f = ctx.createLinearGradient(6, 0, -4, 0);
      f.addColorStop(0, "#ff9040");
      f.addColorStop(1, "#a03010");
      ctx.fillStyle = f;
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawMonsterSprite(ctx, type, x, y, dir, frame, hitFlash, atkAnim, bw, bh, mstate) {
  const bww = bw != null ? bw : 20, bhh = bh != null ? bh : 20;
  const cx = x + bww / 2, cy = y + bhh / 2;
  if (hitFlash > 0) { ctx.globalAlpha = 0.5 + Math.sin(hitFlash * 30) * 0.5; }

  switch (type) {
    case "slime": {
      const squish = 1 + Math.sin(frame * Math.PI) * 0.15;
      const h = (bhh * 0.55) * squish, w = (bww * 0.7) / squish;
      const g = ctx.createRadialGradient(cx - 2, cy, 0, cx, cy + 4, Math.max(w, h));
      g.addColorStop(0, hitFlash > 0 ? "#ff9090" : "#90f090");
      g.addColorStop(0.6, hitFlash > 0 ? "#ff5050" : "#38a838");
      g.addColorStop(1, hitFlash > 0 ? "#a02020" : "#206020");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 4, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      const g2 = ctx.createRadialGradient(cx, cy + 1, 0, cx, cy + 1, 5);
      g2.addColorStop(0, "#a8ffa8");
      g2.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.ellipse(cx, cy + 2, w / 3, h / 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(cx - 4, cy - 1, 3, 3);
      ctx.fillRect(cx + 1, cy - 1, 3, 3);
      ctx.fillStyle = "#111";
      ctx.fillRect(cx - 3, cy, 2, 2);
      ctx.fillRect(cx + 2, cy, 2, 2);
      break;
    }
    case "wolf": {
      const run = Math.sin(frame * Math.PI) * 3;
      const g = ctx.createLinearGradient(cx - 10, cy, cx + 10, cy + 8);
      g.addColorStop(0, hitFlash > 0 ? "#a0a0a0" : "#4a4a4a");
      g.addColorStop(1, hitFlash > 0 ? "#c8c8c8" : "#8a8a8a");
      ctx.fillStyle = g;
      ctx.fillRect(cx - 8, cy - 3, 16, 10);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#6a5a4a";
      ctx.fillRect(cx - 10, cy - 6, 7, 6);
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 8, cy - 4, 2, 2);
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#2a2a2a";
      ctx.fillRect(cx - 6 + run, cy + 6, 3, 5);
      ctx.fillRect(cx + 3 - run, cy + 6, 3, 5);
      ctx.fillStyle = "#606060";
      ctx.fillRect(cx + 6, cy - 2, 6, 3);
      if (atkAnim > 0) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(cx - 11, cy - 3, 3, 2);
      }
      break;
    }
    case "skeleton": {
      const sway = Math.sin(frame * Math.PI * 0.5) * 1;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#d0d0b0";
      ctx.fillRect(cx - 5 + sway, cy - 4, 10, 12);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#e0e0c0";
      ctx.beginPath(); ctx.arc(cx + sway, cy - 7, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3 + sway, cy - 9, 2, 3);
      ctx.fillRect(cx + 1 + sway, cy - 9, 2, 3);
      ctx.fillRect(cx - 2 + sway, cy - 5, 4, 2);
      ctx.fillStyle = "#b0b090";
      ctx.fillRect(cx - 7 + sway, cy, 4, 3);
      ctx.fillRect(cx + 3 + sway, cy, 4, 3);
      ctx.fillRect(cx - 4, cy + 7, 3, 5);
      ctx.fillRect(cx + 1, cy + 7, 3, 5);
      break;
    }
    case "orc": {
      const bounce = Math.sin(frame * Math.PI) * 2;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#406030";
      ctx.fillRect(cx - 7, cy - 5 - bounce, 14, 14);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#508030";
      ctx.beginPath(); ctx.arc(cx, cy - 8 - bounce, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3, cy - 10 - bounce, 2, 3);
      ctx.fillRect(cx + 1, cy - 10 - bounce, 2, 3);
      ctx.fillStyle = "#c0c0c0";
      const atkOff = atkAnim > 0 ? -6 : 0;
      ctx.fillRect(cx + 7, cy - 6 - bounce + atkOff, 3, 12);
      ctx.fillRect(cx + 6, cy - 8 - bounce + atkOff, 5, 3);
      ctx.fillStyle = "#3a3a2a";
      ctx.fillRect(cx - 5, cy + 8, 4, 5);
      ctx.fillRect(cx + 1, cy + 8, 4, 5);
      break;
    }
    case "golem": {
      const shake = atkAnim > 0 ? Math.sin(atkAnim * 40) * 2 : 0;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#6a6a6a";
      ctx.fillRect(cx - 9 + shake, cy - 8, 18, 18);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#8a8a8a";
      ctx.fillRect(cx - 7 + shake, cy - 6, 14, 5);
      ctx.fillStyle = "#f08030";
      ctx.fillRect(cx - 4 + shake, cy - 4, 3, 3);
      ctx.fillRect(cx + 1 + shake, cy - 4, 3, 3);
      ctx.fillStyle = "#5a5a5a";
      ctx.fillRect(cx - 10 + shake, cy - 2, 5, 10);
      ctx.fillRect(cx + 5 + shake, cy - 2, 5, 10);
      ctx.fillRect(cx - 7, cy + 9, 6, 6);
      ctx.fillRect(cx + 1, cy + 9, 6, 6);
      break;
    }
    case "ancient_root":
    case "forest_treant": {
      const mst = mstate || "idle";
      const stride = mst === "chase" || mst === "attack" ? 1 : 0.4;
      const leg = Math.sin(frame * Math.PI / 2) * 4.2 * stride;
      const sway = Math.sin(frame * Math.PI * 0.35) * 2.5;
      const armS = Math.cos(frame * Math.PI / 2) * 3 * stride;
      const isBoss = type === "forest_treant";
      const sc = isBoss ? 1.12 : 1;
      ctx.save();
      ctx.translate(cx + sway, cy);

      const bark = hitFlash > 0 ? "#6a3020" : "#2a4018";

      ctx.beginPath();
      ctx.ellipse(cx + sway, cy + 14, 14 * sc, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = bark;
      ctx.fillRect(cx - 9 + sway + leg * 0.08, cy + 4, 5, 10 + leg * 0.12);
      ctx.fillRect(cx + 4 + sway - leg * 0.08, cy + 4, 5, 10 - leg * 0.12);
      const gT = ctx.createLinearGradient(cx - 12 + sway, cy - 18, cx + 12 + sway, cy + 12);
      gT.addColorStop(0, barkL);
      gT.addColorStop(0.5, bark);
      gT.addColorStop(1, "#1a3010");
      ctx.fillStyle = gT;
      ctx.fillRect(cx - 11 + sway, cy - 10, 22, 22);
      ctx.fillStyle = "#1a2808";
      for (let i = -2; i <= 2; i++) {
        const bob = Math.sin(frame * 0.8 + i * 0.7) * 2 * stride;
        ctx.fillRect(cx + i * 5.5 + sway - 1.5, cy - 24 + bob, 3, 12 + (isBoss ? 4 : 0));
      }
      ctx.strokeStyle = "#3a5020";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(cx - 14 + sway + armS, cy - 2);
      ctx.quadraticCurveTo(cx - 22 + sway + armS * 1.2, cy + 2, cx - 18 + sway + armS, cy + 10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 14 + sway - armS, cy - 2);
      ctx.quadraticCurveTo(cx + 22 + sway - armS * 1.2, cy + 2, cx + 18 + sway - armS, cy + 10);
      ctx.stroke();
      ctx.fillStyle = hitFlash > 0 ? "#ff4040" : "#60a030";
      ctx.beginPath();
      ctx.arc(cx + sway, cy - 14, isBoss ? 11 : 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#f8e888";
      ctx.fillRect(cx - 5 + sway, cy - 16, 3, 3);
      ctx.fillRect(cx + 2 + sway, cy - 16, 3, 3);
      ctx.fillStyle = "#102008";
      ctx.fillRect(cx - 4 + sway, cy - 15, 1.5, 2);
      ctx.fillRect(cx + 3 + sway, cy - 15, 1.5, 2);
      if (atkAnim > 0) {
        ctx.strokeStyle = "rgba(120,200,80,0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx + sway, cy, 22, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
      break;
    }
    case "desert_titan": {
      const mst = mstate || "idle";
      const stride = mst === "chase" || mst === "attack" ? 1 : 0.38;
      const stomp = Math.sin(frame * Math.PI / 2) * 3.5 * stride;
      const club = atkAnim > 0 ? 14 : 0;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath();
      ctx.ellipse(0, 12, 16, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#8a7048";
      ctx.fillRect(-11, -8 + stomp * 0.08, 22, 20);
      ctx.fillStyle = hitFlash > 0 ? "#ffd0a0" : "#d8c090";
      ctx.beginPath();
      ctx.arc(0, -12 + stomp * 0.06, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#504018";
      ctx.fillRect(-12, 6 + stomp, 5, 5);
      ctx.fillRect(7, 6 - stomp, 5, 5);
      ctx.fillStyle = "#3a3020";
      ctx.fillRect(-4, -16, 3, 3);
      ctx.fillRect(1, -16, 3, 3);
      ctx.fillStyle = "#6a5040";
      ctx.fillRect(10 - club * 0.3, -10, 4, 18 + club);
      ctx.fillRect(8 - club * 0.3, -12 - club * 0.2, 8, 5);
      ctx.restore();
      break;
    }
    case "rock_warden": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#6a6a72";
      ctx.beginPath(); ctx.moveTo(cx, cy - 16); ctx.lineTo(cx + 12, cy + 10); ctx.lineTo(cx - 12, cy + 10); ctx.fill();
      ctx.fillStyle = "#909098";
      ctx.fillRect(cx - 8, cy - 2, 16, 12);
      ctx.fillStyle = "#303038";
      ctx.fillRect(cx - 3, cy - 10, 2, 2); ctx.fillRect(cx + 1, cy - 10, 2, 2);

    }
    case "flower_queen": {
      const spin = frame * 0.42;
      const pulse = 0.85 + Math.sin(frame * Math.PI / 2) * 0.12;
      ctx.fillStyle = hitFlash > 0 ? "#5a2040" : "#1a5020";
      ctx.fillRect(cx - 4, cy + 4, 8, 14);
      for (let a = 0; a < 8; a++) {
        const ang = a * Math.PI / 4 + spin;
        const px = cx + Math.cos(ang) * 11 * pulse;
        const py = cy + Math.sin(ang) * 8 * pulse;
        const gP = ctx.createRadialGradient(px, py, 0, px, py, 7);
        gP.addColorStop(0, hitFlash > 0 ? "#ff9090" : "#f070c0");
        gP.addColorStop(1, hitFlash > 0 ? "#ff4040" : "#903070");
        ctx.fillStyle = gP;
        ctx.beginPath();
        ctx.ellipse(px, py, 6.5, 9, ang, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = "#f0e080";
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 2, cy - 1, 2, 2);
      ctx.fillRect(cx + 0, cy - 1, 2, 2);
      break;
    }
    case "north_frost": {
      const mst = mstate || "idle";
      const stride = mst === "chase" || mst === "attack" ? 1 : 0.35;
      const stomp = Math.sin(frame * Math.PI / 2) * 3.2 * stride;
      const shiver = Math.sin(frame * Math.PI * 1.8) * 0.8 * stride;
      ctx.save();
      ctx.translate(cx + shiver, cy);
      ctx.fillStyle = "rgba(0,0,0,0.12)";

      ctx.ellipse(0, 14, 14, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#80b8d8";

      ctx.arc(0, -14 + stomp * 0.05, 9, 0, Math.PI * 2);

      ctx.fillRect(1, -18, 2, 2);
      ctx.fillStyle = "rgba(200,240,255,0.5)";
      ctx.fillRect(-8, 4, 4, 3);
      ctx.fillRect(4, 4, 4, 3);
      ctx.restore();
      break;
    }
    case "south_shadow": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#403060";
      ctx.fillRect(cx - 10, cy - 12, 20, 24);
      ctx.fillStyle = "#7050a0";
      ctx.beginPath(); ctx.ellipse(cx, cy - 10, 9, 8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff4080";
      ctx.fillRect(cx - 4, cy - 12, 2, 2); ctx.fillRect(cx + 2, cy - 12, 2, 2);

    case "dark_knight": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#303040";

      ctx.fillRect(cx - 11, cy - 14, 22, 8);
      ctx.fillStyle = "#c04040";
      ctx.fillRect(cx - 2, cy - 6, 4, 10);

    }
    case "dune_raider": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#c09050";

      ctx.fillRect(cx - 6, cy - 12, 12, 8);
      ctx.fillStyle = "#222";

    }
    case "bog_troll": {
      const mst = mstate || "idle";
