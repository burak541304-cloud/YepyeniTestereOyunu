/* ── helpers ─────────────────────────────────────────────── */

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ── input ───────────────────────────────────────────────── */

const keys = {};
const justPressed = {};
let mouseX = 0, mouseY = 0;
let canvasMouse0Down = false;

window.addEventListener("keydown", (e) => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener("keyup", (e) => { keys[e.code] = false; });
window.addEventListener("mousemove", (e) => { mouseX = e.clientX; mouseY = e.clientY; });

function isDown(code) { return !!keys[code]; }
function wasJustPressed(code) { const v = !!justPressed[code]; justPressed[code] = false; return v; }
function clearJustPressed() { for (const k in justPressed) justPressed[k] = false; }

const touchState = {
  mobileUI: false,
  joyId: -1,
  joyOx: 0,
  joyOy: 0,
  joyDx: 0,
  joyDy: 0,
  joyR: 64,
  /** Aktif s\u00fcr\u00fckleme merkezi (sol dokunu\u015fla olu\u015fur). */
  joyCx: 80,
  joyCy: 200,
  /** Potions vb. yerle\u015fim i\u00e7in referans (joystick gizliyken). */
  joyIdleCx: 80,
  joyIdleCy: 200,
  aimId: -1,
  aimX: 0,
  aimY: 0,
  attackId: -1,
  attackT0: 0,
  btnDown: new Map(),
  invSlotPressId: -1,
};

function refreshMobileUI() {
  const narrow = Math.min(window.innerWidth, window.innerHeight) <= 1080;
  touchState.mobileUI = window.matchMedia("(pointer: coarse)").matches ||
    (navigator.maxTouchPoints > 0 && narrow);
}

function updateTouchLayout() {
  const ch = window.innerHeight, cw = window.innerWidth;
  const m = Math.min(cw, ch);
  touchState.joyR = Math.min(70, m * 0.1);
  touchState.joyIdleCx = touchState.joyR + 22;
  touchState.joyIdleCy = ch - touchState.joyR - 22;
  if (touchState.joyId < 0) {
    touchState.joyCx = touchState.joyIdleCx;
    touchState.joyCy = touchState.joyIdleCy;
  }
}

/** iksir yerle\u015fimi: joystick bas\u0131l\u0131 de\u011filse sol alt referans. */
function joyAnchorForLayout() {
  if (touchState.joyId >= 0) {
    return { cx: touchState.joyCx, cy: touchState.joyCy, r: touchState.joyR };
  }
  return { cx: touchState.joyIdleCx, cy: touchState.joyIdleCy, r: touchState.joyR };
}

/** Mobil modal pencereler i\u00e7in g\u00fcvenli alan (\u00fcstte \u00d7 \u00e7ipi i\u00e7in bo\u015fluk). */
function uiModalBounds(cw, ch) {
  const mob = touchState.mobileUI;
  const top = mob ? 56 : 28;
  const bottom = mob ? 16 : 22;
  const side = mob ? 8 : 20;
  return {
    top,
    bottom,
    side,
    maxW: Math.max(160, cw - side * 2),
    maxH: Math.max(160, ch - top - bottom),
  };
}

/** Sa\u011f alttaki sald\u0131r\u0131 butonu dikd\u00f6rtgeni (mobil iksir yerle\u015fimi ile payla\u015f\u0131l\u0131r). */
function mobileAttackButtonRect(cw, ch) {
  const pad = 8, w = 52, h = 44;
  return { x: cw - w - pad, y: ch - pad - 46, w, h };
}

function mobileButtonsLayout(cw, ch) {
  const atk = mobileAttackButtonRect(cw, ch);
  const gap = 5;
  const x = atk.x, w = atk.w;
  const out = [];
  let y = atk.y;
  out.push({ key: "attack", label: "\u2694", x, y, w, h: atk.h });
  y -= gap + 34;
  const row = [
    { key: "KeyE", label: "E" },
    { key: "KeyC", label: "C" },
    { key: "KeyI", label: "I" },
    { key: "KeyP", label: "P" },
    { key: "KeyM", label: "M" },
    { key: "KeyB", label: "B" },
    { key: "KeyF", label: "F" },
  ];
  for (const b of row) {
    out.push({ key: b.key, label: b.label, x, y, w, h: 32 });
    y -= gap + 32;
  }
  return out;
}

function hitMobileButton(mx, my, cw, ch) {
  if (!touchState.mobileUI) return null;
  for (const b of mobileButtonsLayout(cw, ch)) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return b;
  }
  return null;
}

function hitMobileCloseChip(mx, my, cw) {
  return mx >= cw - 52 && mx <= cw - 4 && my >= 6 && my <= 50;
}

function pulseJust(code) {
  justPressed[code] = true;
}

function getMovementVector() {
  let dx = 0, dy = 0;
  if (isDown("ArrowUp")    || isDown("KeyW")) dy -= 1;
  if (isDown("ArrowDown")  || isDown("KeyS")) dy += 1;
  if (isDown("ArrowLeft")  || isDown("KeyA")) dx -= 1;
  if (isDown("ArrowRight") || isDown("KeyD")) dx += 1;
  if (touchState.mobileUI && touchState.joyId >= 0) {
    dx += touchState.joyDx;
    dy += touchState.joyDy;
  }
  const len = Math.hypot(dx, dy);
  if (len > 1.0001) { dx /= len; dy /= len; }
  return { dx, dy };
}

function isActionPressed() { return isDown("KeyE") || isDown("Space"); }

const RARITY_COLOR = {
  common: "#9aa0b0",
  rare: "#4a9fff",
  epic: "#c060ff",
  legendary: "#ffc040",
};

function getItemRarityColor(itemId) {
  const d = ITEMS[itemId];
  return d && d.rarity ? RARITY_COLOR[d.rarity] || "#ccc" : "#ccc";
}

const RARITY_LABEL_TR = {
  common: "S\u0131radan",
  rare: "Nadir",
  epic: "Epik",
  legendary: "Efsanevi",
};

function rarityRank(r) {
  if (r === "legendary") return 4;
  if (r === "epic") return 3;
  if (r === "rare") return 2;
  if (r === "common") return 1;
  return 0;
}

function itemStatPowerScore(def) {
  if (!def || !def.stats) return 0;
  const st = def.stats;
  return (st.str || 0) * 1.1 + (st.agi || 0) * 1.1 + (st.wis || 0) * 1.1 +
    (st.maxHp || 0) / 5 + (st.maxMana || 0) / 4 +
    (st.meleeDmg || 0) * 2.2 + (st.rangedDmg || 0) * 2.2;
}

function hexToRgba(hex, a) {
  const m = /^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i.exec(hex);
  if (!m) return "rgba(200,200,220," + a + ")";
  return "rgba(" + parseInt(m[1], 16) + "," + parseInt(m[2], 16) + "," + parseInt(m[3], 16) + "," + a + ")";
}

function drawItemSlotInnerDepth(ctx, x, y, size) {
  const r = Math.min(6, size * 0.18);
  const g = ctx.createLinearGradient(x, y, x + size, y + size);
  g.addColorStop(0, "rgba(255,255,255,0.1)");
  g.addColorStop(0.42, "rgba(0,0,0,0.05)");
  g.addColorStop(1, "rgba(0,0,0,0.18)");
  ctx.fillStyle = g;
  roundRect(ctx, x + 0.5, y + 0.5, size - 1, size - 1, r);
  ctx.fill();
}

function drawItemRarityUnderGlow(ctx, x, y, size, itemId, timeMs, boost) {
  const def = ITEMS[itemId];
  if (!def || !def.rarity || def.rarity === "common") return;
  const col = getItemRarityColor(itemId);
  const rr = rarityRank(def.rarity);
  const pw = itemStatPowerScore(def);
  const b = (boost || 1) * (0.88 + Math.min(0.4, pw / 85));
  const cx = x + size / 2, cy = y + size / 2;
  const pulse = 0.72 + 0.28 * Math.sin(timeMs * (0.0026 + rr * 0.001));
  const layers = rr >= 4 ? 4 : rr >= 3 ? 3 : rr >= 2 ? 2 : 1;
  ctx.save();
  for (let i = 0; i < layers; i++) {
    const radius = size * (0.34 + i * 0.1) + Math.sin(timeMs * 0.0028 + i * 0.8) * (rr >= 3 ? 2.5 : 0);
    const alpha = b * pulse * (0.26 / (i + 1)) * (1 + Math.min(0.45, pw / 95));
    const grad = ctx.createRadialGradient(cx, cy, size * 0.06, cx, cy, radius);
    grad.addColorStop(0, hexToRgba(col, alpha * 0.95));
    grad.addColorStop(0.52, hexToRgba(col, alpha * 0.38));
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawItemRarityBorderShine(ctx, x, y, size, itemId, timeMs, boost) {
  const def = ITEMS[itemId];
  if (!def || !def.rarity || def.rarity === "common") return;
  const col = getItemRarityColor(itemId);
  const rr = rarityRank(def.rarity);
  const pw = itemStatPowerScore(def);
  const pulse = 0.82 + 0.18 * Math.sin(timeMs * (0.0038 + rr * 0.0011));
  const pwBoost = Math.min(6, pw / 8);
  ctx.save();
  ctx.strokeStyle = col;
  ctx.globalAlpha = Math.min(0.95, (0.5 + rr * 0.11 + pw / 100) * pulse * (boost || 1));
  ctx.lineWidth = Math.min(3.5, 1.2 + (rr - 1) * 0.55 + pwBoost * 0.12);
  roundRect(ctx, x + 0.5, y + 0.5, size - 1, size - 1, Math.min(6, size * 0.2));
  ctx.stroke();
  if (rr >= 3) {
    ctx.globalAlpha *= 0.55;
    ctx.lineWidth = 1.1;
    const off = 2.2 + Math.sin(timeMs * 0.0048) * 1.1;
    ctx.strokeStyle = rr >= 4 ? "rgba(255,248,200,0.95)" : "rgba(232,208,255,0.9)";
    roundRect(ctx, x + off, y + off, size - off * 2, size - off * 2, Math.min(5, size * 0.16));
    ctx.stroke();
  }
  if (rr >= 4) {
    const sparkR = 1 + Math.min(2, pw / 35);
    for (let k = 0; k < 5; k++) {
      const ang = timeMs * 0.0016 + k * (Math.PI * 2 / 5);
      const px = x + size / 2 + Math.cos(ang) * size * 0.41;
      const py = y + size / 2 + Math.sin(ang) * size * 0.41;
      ctx.globalAlpha = 0.5 * pulse * (boost || 1);
      ctx.fillStyle = "#fff8c8";
      ctx.beginPath(); ctx.arc(px, py, sparkR, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

/**
 * @param {object} opts equipped: ekipman slotu; loot: yerdeki d\u00fc\u015f\u00fck; timeMs: animasyon faz\u0131
 */
function drawItemIconFancy(ctx, itemId, x, y, size, opts) {
  opts = opts || {};
  const t = opts.timeMs != null ? opts.timeMs : performance.now();
  let boost = 1;
  if (opts.equipped) boost = 1.45;
  else if (opts.drag) boost = 1.22;
  else if (opts.loot) boost = 0.82;
  drawItemSlotInnerDepth(ctx, x, y, size);
  drawItemRarityUnderGlow(ctx, x, y, size, itemId, t, boost);
  const pad = Math.max(1, Math.floor(size * 0.07));
  const isz = Math.max(4, size - pad * 2);
  drawItemIcon(ctx, itemId, x + pad, y + pad, isz);
  drawItemRarityBorderShine(ctx, x, y, size, itemId, t, boost);
}

function collectItemStatParts(def) {
  const st = def && def.stats;
  if (!st) return [];
  const parts = [];
  if (st.str) parts.push("G\u00fc\u00e7 +" + st.str);
  if (st.agi) parts.push("\u00c7ev +" + st.agi);
  if (st.wis) parts.push("Bil +" + st.wis);
  if (st.maxHp) parts.push("Max HP +" + st.maxHp);
  if (st.maxMana) parts.push("Max MP +" + st.maxMana);
  if (st.meleeDmg) parts.push("Yak\u0131n hasar +" + st.meleeDmg);
  if (st.rangedDmg) parts.push("Uzak hasar +" + st.rangedDmg);
  return parts;
}

/** Tek sat\u0131rda ta\u015fmadan kelime kayd\u0131r\u0131r (ctx.font \u00f6nceden atanmal\u0131). */
function wrapTextToLinesWithFont(ctx, text, maxWidth, font) {
  if (!text) return [];
  ctx.font = font;
  const words = String(text).split(/\s+/).filter(Boolean);
  if (words.length === 0) return [];
  const lines = [];
  let line = "";
  const pushLine = (s) => { if (s) lines.push(s); };
  for (const w of words) {
    const tryLine = line ? line + " " + w : w;
    if (ctx.measureText(tryLine).width <= maxWidth) {
      line = tryLine;
    } else {
      if (line) pushLine(line);
      if (ctx.measureText(w).width <= maxWidth) {
        line = w;
      } else {
        let chunk = "";
        for (let i = 0; i < w.length; i++) {
          const c = w[i];
          const t2 = chunk + c;
          if (ctx.measureText(t2).width <= maxWidth) chunk = t2;
          else {
            if (chunk) { pushLine(chunk); chunk = c; }
            else { pushLine(c); chunk = ""; }
          }
        }
        line = chunk;
      }
    }
  }
  pushLine(line);
  return lines;
}

function getItemPowerScoreLine(def) {
  if (!def || !def.stats) return null;
  const s = itemStatPowerScore(def);
  if (s < 0.5) return null;
  return "Bonus g\u00fcc\u00fc: " + (Math.round(s * 10) / 10);
}

/**
 * E\u015fya t\u00fcr\u00fcne g\u00f6re ek bilgi sat\u0131rlar\u0131 (her biri ayr\u0131 sat\u0131r).

 */
function collectItemMetaLines(def, itemId, opts) {

  }
  if (!opts.omitPrices) {
    if (def.buyPrice > 0) lines.push("Market fiyat\u0131: " + def.buyPrice + " alt\u0131n");
    if (def.sellPrice > 0) lines.push("Sat\u0131\u015f: " + def.sellPrice + " alt\u0131n");
  }
  switch (itemId) {
    case "potion":
      lines.push("T\u00fcr: Can iksiri");
      lines.push("Kullan\u0131m: Q veya HUD (Bilgi\u00e7ilik + ekipman can\u0131 art\u0131r\u0131r)");
      break;
    case "potion_mana":
      lines.push("T\u00fcr: Mana iksiri");
      lines.push("Kullan\u0131m: R veya HUD");
      break;
    case "arrow":
      lines.push("Cephane: yay ile uzaktan sald\u0131r\u0131");
      lines.push("Her at\u0131\u015fta mana harcan\u0131r");
      break;
    case "axe":
      lines.push("A\u011fa\u00e7 kesmek i\u00e7in [E] ile kullan\u0131m");

      break;

/**
 * Tooltip i\u00e7in sat\u0131r listesi + boyut (mobil: daha b\u00fcy\u00fck font, geni\u015f kutu).
 * @param {{ omitPrices?: boolean, innerMax?: number, omitIdentity?: boolean }} metaOpts
 */
function buildItemTooltipLayout(ctx, def, itemId, canvasW, mobile, metaOpts, trailingLines) {
  metaOpts = metaOpts || {};
  const padX = mobile ? 14 : 11;
  const padY = mobile ? 12 : 9;
  const innerMaxDefault = mobile ? Math.min(canvasW - 16, 300) : Math.min(248, canvasW - 36);
  const innerMax = metaOpts.innerMax != null ? metaOpts.innerMax : innerMaxDefault;
  const lh = mobile ? 20 : 16;
  const fonts = {
    title: mobile ? "bold 16px monospace" : "bold 13px monospace",
    rare: mobile ? "bold 14px monospace" : "bold 11px monospace",
    stat: mobile ? "14px monospace" : "12px monospace",
    meta: mobile ? "13px monospace" : "10px monospace",
    desc: mobile ? "13px monospace" : "11px monospace",
  };
  const lines = [];
  let maxInnerMeasured = 0;
  const measurePush = (font, color, text) => {
    ctx.font = font;
    const w = ctx.measureText(text).width;
    maxInnerMeasured = Math.max(maxInnerMeasured, w);
    lines.push({ font, color, text });
  };
  const pushWrapped = (text, font, color) => {
    ctx.font = font;
    const parts = wrapTextToLinesWithFont(ctx, text, innerMax, font);
    for (const t of parts) measurePush(font, color, t);
  };

  if (!metaOpts.omitIdentity) {
    pushWrapped(def.name || "?", fonts.title, "#f0d050");
    if (def.rarity) {
      const rlab = RARITY_LABEL_TR[def.rarity] || String(def.rarity).toUpperCase();
      measurePush(fonts.rare, getItemRarityColor(itemId), rlab);
    }
    const pw = getItemPowerScoreLine(def);
    if (pw) measurePush(fonts.meta, "#c8c0e8", pw);
    if (def.equipSlot) {
      measurePush(fonts.meta, "#a8c0f0", "Giyim: " + (EQ_LABELS[def.equipSlot] || def.equipSlot));
    }
  }
  for (const s of collectItemStatParts(def)) {
    measurePush(fonts.stat, "#8ae0a8", s);
  }
  const meta = collectItemMetaLines(def, itemId, metaOpts);
  for (const m of meta) measurePush(fonts.meta, "#c0d0f0", m);
  pushWrapped(def.desc || "", fonts.desc, "#b4c0dc");
  if (trailingLines) {
    for (const Ln of trailingLines) {
      measurePush(Ln.font || fonts.meta, Ln.color || "#d0e0ff", Ln.text);
    }
  }

  const tw = Math.min(canvasW - 12, Math.max(innerMax + padX * 2, maxInnerMeasured + padX * 2 + 8));
  const th = padY * 2 + lines.length * lh;
  return { lines, tw, th, lh, padX, padY, innerMax };
}

function placeTooltipPosition(anchorX, anchorY, tw, th, canvasW, canvasH) {
  let tx = anchorX + (touchState.mobileUI ? 8 : 14);
  let ty = anchorY - th - (touchState.mobileUI ? 8 : 6);
  if (tx + tw > canvasW - 8) tx = Math.max(8, canvasW - tw - 8);
  if (tx < 8) tx = 8;
  if (ty < 8) ty = anchorY + (touchState.mobileUI ? 12 : 14);
  if (ty + th > canvasH - 8) ty = Math.max(8, canvasH - th - 8);
  return { tx, ty };
}

function drawItemTooltipFromLayout(ctx, tx, ty, layout, mobile, strokeOpts) {
  const { lines, tw, th, lh, padX, padY } = layout;
  strokeOpts = strokeOpts || {};
  ctx.fillStyle = "rgba(6,8,24,0.97)";
  ctx.strokeStyle = strokeOpts.strokeStyle || (mobile ? "#8098d0" : "#6070a0");
  ctx.lineWidth = strokeOpts.lineWidth != null ? strokeOpts.lineWidth : (mobile ? 2 : 1);
  roundRect(ctx, tx, ty, tw, th, 8);
  ctx.fill();
  ctx.stroke();
  let ly = ty + padY + (mobile ? 14 : 12);
  for (const Ln of lines) {
    ctx.font = Ln.font;
    ctx.fillStyle = Ln.color;
    ctx.fillText(Ln.text, tx + padX, ly);
    ly += lh;
  }
}

/** Arka plan kutusu olmadan tooltip sat\u0131rlar\u0131 (sat\u0131n al diyalo\u011fu vb.). */
function drawItemTooltipTextOnly(ctx, tx, ty, layout, mobile) {
  const { lines, lh, padX, padY } = layout;
  let ly = ty + padY + (mobile ? 14 : 12);
  for (const Ln of lines) {
    ctx.font = Ln.font;
    ctx.fillStyle = Ln.color;
    ctx.fillText(Ln.text, tx + padX, ly);
    ly += lh;
  }
}

function splitDescLinesShop(desc, maxLen, maxLines) {
  if (!desc) return [];
  const lines = [];
  for (let i = 0; i < desc.length && lines.length < maxLines; i += maxLen) {
    lines.push(desc.slice(i, i + maxLen));
  }
  return lines;
}

    case "chest_steel":
    case "chest_epic":

      ctx.fillRect(x + s*0.55, y + s*0.38, s*0.06, s*0.25);
      break;
    }
    case "ring_power": {
      const rg = ctx.createRadialGradient(cx - s*0.06, cy - s*0.06, 0, cx, cy, s*0.26);
      rg.addColorStop(0, "#f8e0ff"); rg.addColorStop(0.45, "#a060e0"); rg.addColorStop(1, "#402060");
      ctx.strokeStyle = "#e8b0ff"; ctx.lineWidth = 2.2;
      ctx.beginPath(); ctx.arc(cx, cy, s*0.23, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(cx, cy, s*0.11, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(cx - s*0.05, cy - s*0.05, s*0.04, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case "amulet_wisdom": {
      const ag = ctx.createLinearGradient(cx - 2, cy - s*0.25, cx + 2, cy + s*0.2);
      ag.addColorStop(0, "#fff8a0"); ag.addColorStop(1, "#c09020");
      ctx.fillStyle = ag; ctx.fillRect(cx - 2, cy - s*0.25, 4, s*0.35);
      const og = ctx.createRadialGradient(cx, cy + s*0.15, 0, cx, cy + s*0.15, s*0.2);
      og.addColorStop(0, "#ffe8a0"); og.addColorStop(0.5, "#e8b030"); og.addColorStop(1, "#604010");
      ctx.fillStyle = og; ctx.beginPath(); ctx.arc(cx, cy + s*0.15, s*0.2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,220,0.6)"; ctx.lineWidth = 1; ctx.stroke();
      break;
    }
    case "gloves_archer":
    case "explorer_band":
      ctx.fillStyle = itemId === "explorer_band" ? "#508878" : "#8B5E3C";
      ctx.fillRect(x + s*0.2, y + s*0.3, s*0.25, s*0.35);
      ctx.fillRect(x + s*0.55, y + s*0.3, s*0.25, s*0.35);
      if (itemId === "explorer_band") {
        ctx.fillStyle = "#c0e8e0"; ctx.font = (s*0.22)+"px monospace";
        ctx.fillText("\u273f", cx - s*0.08, cy + s*0.08);
      }
      break;
    case "lucky_charm":
      ctx.fillStyle = "#4080a0"; ctx.beginPath(); ctx.arc(cx, cy + s*0.05, s*0.22, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#f0e8a0"; ctx.beginPath(); ctx.arc(cx - s*0.06, cy - s*0.02, s*0.08, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#ffd060"; ctx.lineWidth = 1; ctx.stroke();
      break;
    case "merchants_ring":
      ctx.strokeStyle = "#ffd080"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, s*0.24, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "#d0a040"; ctx.beginPath(); ctx.arc(cx, cy, s*0.1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = "bold " + (s*0.28) + "px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("\u2726", cx, cy + 1); ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
      break;
    case "boss_chest": {
      const bx = x + s*0.15, by = y + s*0.35, bw = s*0.7, bh = s*0.45;
      const bxg = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
      bxg.addColorStop(0, "#c89830"); bxg.addColorStop(0.5, "#705010"); bxg.addColorStop(1, "#302008");
      ctx.fillStyle = bxg; ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = "#ffe090"; ctx.lineWidth = 2.2;
      ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      ctx.fillStyle = "rgba(255,240,160,0.35)"; ctx.fillRect(bx + bw * 0.15, by + bh * 0.15, bw * 0.25, bh * 0.25);
      ctx.fillStyle = "#ffd700"; ctx.font = "bold " + (s*0.36) + "px monospace"; ctx.textAlign = "center";
      ctx.fillText("\u2605", cx, cy + s * 0.08); ctx.textAlign = "start";
      break;
    }
    default: {
      const g = ctx.createLinearGradient(x, y, x + s, y + s);
      g.addColorStop(0, "#5a5e78"); g.addColorStop(1, "#2a2e40");
      ctx.fillStyle = g;
      roundRect(ctx, x + s * 0.1, y + s * 0.12, s * 0.8, s * 0.76, s * 0.1);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.22)"; ctx.lineWidth = 1;
      roundRect(ctx, x + s * 0.1, y + s * 0.12, s * 0.8, s * 0.76, s * 0.1);
      ctx.stroke();
      ctx.fillStyle = "#a8b0d0";
      ctx.font = (s * 0.32) + "px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("?", cx, cy); ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
      break;
    }
  }
}

function getShopBuyPriceForItem(itemId) {
  const d = ITEMS[itemId];
  if (!d) return 0;
  if (d.buyPrice > 0) return d.buyPrice;
  const sp = d.sellPrice || 12;
  let mult = 3.2;
  if (d.rarity === "legendary") mult = 5.2;
  else if (d.rarity === "epic") mult = 4.3;
  else if (d.rarity === "rare") mult = 3.6;
  return Math.max(35, Math.floor(sp * mult));
}

/** Seviye + alt\u0131n ile a\u00e7\u0131lan kal\u0131c\u0131 yetenekler */
const PLAYER_SKILL_DEFS = [
  { id: "vitality", name: "Can Ustal\u0131\u011f\u0131", minLevel: 3, gold: 45, desc: "Kal\u0131c\u0131 +25 Max HP." },
  { id: "arcane", name: "Mana Ustal\u0131\u011f\u0131", minLevel: 4, gold: 55, desc: "Kal\u0131c\u0131 +22 Max MP." },

];

const charPanel = {
  open: false,
  _layout(cw, ch) {
    const b = uiModalBounds(cw, ch);
    const land = cw > ch * 1.02;
    const n = PLAYER_SKILL_DEFS.length;
    let rowStep = land ? 40 : 54;
    const titleH = land ? 20 : 26;
    const statBlockH = land ? 52 : 78;
    const gapBeforeSkills = land ? 10 : 18;
    let needH = (land ? 10 : 14) + titleH + statBlockH + gapBeforeSkills + 16 + n * rowStep + (land ? 14 : 20);
    while (needH > b.maxH && rowStep > 30) {
      rowStep -= 2;
      needH = (land ? 10 : 14) + titleH + statBlockH + gapBeforeSkills + 16 + n * rowStep + (land ? 14 : 20);
    }
    let pw = Math.min(land ? Math.min(560, b.maxW) : 420, b.maxW);
    pw = Math.max(280, pw);
    let ph = Math.min(Math.max(needH, land ? 200 : 240), b.maxH);
    const px = Math.floor((cw - pw) / 2);
    const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
    const boxH = Math.max(land ? 30 : 40, rowStep - (land ? 8 : 6));
    const titleY = py + (land ? 16 : 24);
    const statBtnY = py + (land ? 36 : 52);
    const skillHdrY = statBtnY + (land ? 34 : 42);
    const skillStartY = skillHdrY + (land ? 12 : 18);
    const closeR = { x: px + pw - 30, y: py + 8, w: 24, h: 24 };
    return {
      px, py, pw, ph, rowStep, boxH, land, titleY, statBtnY, skillHdrY, skillStartY, closeR,
    };
  },
  _in(mx, my, r) {
    return mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
  },
  toggle() {
    this.open = !this.open;
    if (this.open) {
      if (typeof inventory !== "undefined") inventory.close();
      if (typeof petPanel !== "undefined") petPanel.open = false;
      if (typeof shop !== "undefined") shop.close();
      if (typeof craftPanel !== "undefined") craftPanel.close();
    }
  },
  close() { this.open = false; },
  tryAllocStat(player, stat) {
    if (player.statPoints <= 0) return "Stat puan\u0131n yok.";
    if (stat === "str") player.str++;
    else if (stat === "agi") player.agi++;
    else if (stat === "wis") player.wis++;
    else return "";
    player.statPoints--;
    return null;
  },
  tryUnlockSkill(player, inventory, sid) {
    const def = PLAYER_SKILL_DEFS.find((d) => d.id === sid);
    if (!def) return "Ge\u00e7ersiz.";
    if (player.skills[sid]) return "Zaten a\u00e7\u0131k.";
    if (player.level < def.minLevel) return "Seviye " + def.minLevel + "+ gerekli.";
    if (inventory.countItem("coin") < def.gold) return def.gold + " alt\u0131n gerekli.";
    inventory.removeItem("coin", def.gold);
    player.skills[sid] = true;
    player._pendingFullHeal = true;
    return null;
  },
  handleClick(mx, my, cw, ch, player, inventory) {
    if (!this.open) return false;
    const L = this._layout(cw, ch);
    if (mx < L.px || mx >= L.px + L.pw || my < L.py || my >= L.py + L.ph) {
      this.close();
      return true;
    }
    if (this._in(mx, my, L.closeR)) {
      this.close();
      return true;
    }

    const btnY = L.statBtnY;
    const btnH = L.land ? 26 : 30;
    const bw = Math.min(104, Math.floor((L.pw - 50) / 3)), gap = Math.min(10, Math.max(4, Math.floor(L.pw * 0.02))), x0 = L.px + 20;
    if (player.statPoints > 0) {
      if (this._in(mx, my, { x: x0, y: btnY, w: bw, h: btnH })) {
        const err = this.tryAllocStat(player, "str");
        if (err) { pickupMsgText = err; pickupMsgTimer = 1.4; }
        return true;
      }
      if (this._in(mx, my, { x: x0 + bw + gap, y: btnY, w: bw, h: btnH })) {
        const err = this.tryAllocStat(player, "agi");
        if (err) { pickupMsgText = err; pickupMsgTimer = 1.4; }
        return true;
      }
      if (this._in(mx, my, { x: x0 + 2 * (bw + gap), y: btnY, w: bw, h: btnH })) {
        const err = this.tryAllocStat(player, "wis");
        if (err) { pickupMsgText = err; pickupMsgTimer = 1.4; }
        return true;
      }
    }

    let sy = L.skillStartY;
    const unlockW = Math.min(108, L.pw - 130);
    const unlockH = L.land ? 26 : 28;
    for (const sk of PLAYER_SKILL_DEFS) {
      const unlockR = { x: L.px + L.pw - unlockW - 10, y: sy + 2, w: unlockW, h: unlockH };
      if (!player.skills[sk.id] && this._in(mx, my, unlockR)) {
        const err = this.tryUnlockSkill(player, inventory, sk.id);
        if (err) {
          pickupMsgText = err;
          pickupMsgTimer = 1.6;
        } else {
          pickupMsgText = sk.name + " a\u00e7\u0131ld\u0131! (-" + sk.gold + " alt\u0131n)";
          pickupMsgTimer = 2;
        }
        return true;
      }
      sy += L.rowStep;
    }
    return true;
  },
  render(ctx, cw, ch, player, inventory) {
    if (!this.open) return;
    const L = this._layout(cw, ch);
    ctx.fillStyle = "rgba(8,8,24,0.92)";
    roundRect(ctx, L.px, L.py, L.pw, L.ph, 10);
    ctx.fill();
    ctx.strokeStyle = "#7080b0";
    ctx.lineWidth = 1.5;
    roundRect(ctx, L.px, L.py, L.pw, L.ph, 10);
    ctx.stroke();

    ctx.fillStyle = "#e8e8f0";
    ctx.font = L.land ? "bold 12px monospace" : "bold 14px monospace";
    ctx.fillText("Karakter  [C] kapat", L.px + 14, L.titleY);
    ctx.fillStyle = "#f0d050";
    ctx.font = L.land ? "bold 11px monospace" : "bold 12px monospace";
    ctx.fillText("Stat puan\u0131: " + player.statPoints + "   (Lv." + player.level + ")", L.px + 14, L.titleY + (L.land ? 18 : 24));
    ctx.fillStyle = "#a0a0c0";
    ctx.font = L.land ? "9px monospace" : "10px monospace";
    ctx.fillText("STR:" + player.str + "  AGI:" + player.agi + "  WIS:" + player.wis, L.px + 14, L.titleY + (L.land ? 32 : 44));

    const btnY = L.statBtnY;
    const btnH = L.land ? 26 : 30;
    const bw = Math.min(104, Math.floor((L.pw - 50) / 3)), gap = Math.min(10, Math.max(4, Math.floor(L.pw * 0.02))), x0 = L.px + 20;
    const drawMiniBtn = (x, y, label, active) => {
      ctx.fillStyle = active ? "#2a5080" : "#303048";
      roundRect(ctx, x, y, bw, btnH, 5);
      ctx.fill();
      ctx.strokeStyle = active ? "#80b0ff" : "#505070";
      ctx.stroke();
      ctx.fillStyle = active ? "#fff" : "#707090";
      ctx.font = L.land ? "bold 10px monospace" : "bold 11px monospace";
      ctx.fillText(label, x + (bw - ctx.measureText(label).width) / 2, y + (L.land ? 17 : 20));
    };
    drawMiniBtn(x0, btnY, "+ STR", player.statPoints > 0);
    drawMiniBtn(x0 + bw + gap, btnY, "+ AGI", player.statPoints > 0);
    drawMiniBtn(x0 + 2 * (bw + gap), btnY, "+ WIS", player.statPoints > 0);

    ctx.fillStyle = "#c0c8e0";
    ctx.font = L.land ? "bold 10px monospace" : "bold 11px monospace";
    ctx.fillText("Yetenekler (seviye + alt\u0131n)", L.px + 14, L.skillHdrY);

    let sy = L.skillStartY;
    const gold = inventory.countItem("coin");
    const unlockW = Math.min(108, L.pw - 130);
    const unlockH = L.land ? 26 : 28;
    for (const sk of PLAYER_SKILL_DEFS) {
      ctx.fillStyle = "#2a2840";
      roundRect(ctx, L.px + 14, sy, L.pw - 28, L.boxH, 6);
      ctx.fill();
      ctx.strokeStyle = "#505070";
      roundRect(ctx, L.px + 14, sy, L.pw - 28, L.boxH, 6);
      ctx.stroke();
      ctx.fillStyle = player.skills[sk.id] ? "#70ffa0" : "#e0e0f0";
      ctx.font = L.land ? "bold 10px monospace" : "bold 11px monospace";
      ctx.fillText(sk.name + (player.skills[sk.id] ? "  \u2713" : ""), L.px + 22, sy + (L.land ? 14 : 16));
      ctx.fillStyle = "#9090b0";
      ctx.font = L.land ? "8px monospace" : "9px monospace";
      ctx.fillText(sk.desc + "  |  Lv" + sk.minLevel + "  |  " + sk.gold + " alt\u0131n", L.px + 22, sy + (L.land ? 26 : 32));

      const unlockR = { x: L.px + L.pw - unlockW - 10, y: sy + 2, w: unlockW, h: unlockH };
      if (!player.skills[sk.id]) {
        const can = player.level >= sk.minLevel && gold >= sk.gold;
        ctx.fillStyle = can ? "#2a6040" : "#303030";
        roundRect(ctx, unlockR.x, unlockR.y, unlockR.w, unlockR.h, 5);
        ctx.fill();
        ctx.strokeStyle = can ? "#60c080" : "#505050";
        ctx.stroke();
        ctx.fillStyle = can ? "#fff" : "#606060";
        ctx.font = L.land ? "bold 9px monospace" : "bold 10px monospace";
        const t = "A\u00e7 " + sk.gold + "G";
        ctx.fillText(t, unlockR.x + (unlockR.w - ctx.measureText(t).width) / 2, unlockR.y + (L.land ? 17 : 19));
      }
      sy += L.rowStep;
    }

    ctx.fillStyle = "#707890";
    ctx.font = "9px monospace";
    ctx.fillText("ESC ile kapat", L.px + 14, L.py + L.ph - 12);
  },
};
