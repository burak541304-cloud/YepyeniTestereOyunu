let rangedFocusMonster = null;
let rangedFocusTimer = 0;
const RANGED_FOCUS_HOLD_SEC = 3.8;

function registerRangedAimTarget(mon) {
  if (mon && mon.alive && mon.state !== "dying") {
    rangedFocusMonster = mon;
    rangedFocusTimer = RANGED_FOCUS_HOLD_SEC;
  }
}

function alertCampAllies(monsters, source, player) {
  if (!source || !source.campId || !source.alive || source.state === "dying") return;
  const maxD = source.socialAggroRange || TILE_SIZE * 6;
  const maxD2 = maxD * maxD;
  for (const m of monsters) {
    if (!m || m === source || !m.alive || m.state === "dying") continue;
    if (m.campId !== source.campId) continue;
    const dx = m.cx - source.cx;
    const dy = m.cy - source.cy;
    if (dx * dx + dy * dy > maxD2) continue;
    const pDist = m.distTo(player.centerX, player.centerY);
    if (pDist <= (m.aggroRange * 1.4)) {
      m.state = "chase";
      m.wanderTimer = Math.max(0.6, m.wanderTimer || 0);
    }
  }
}

function processCampSupport(monsters, dt) {
  for (const h of monsters) {
    if (!h || !h.alive || h.state === "dying") continue;
    if (!h.campId || h.campRole !== "healer") continue;
    h.supportHealCd = (h.supportHealCd || 0) - dt;
    if (h.supportHealCd > 0) continue;
    h.supportHealCd = 2.4 + Math.random() * 1.4;
    let target = null;
    let bestMissing = 0;
    for (const m of monsters) {
      if (!m || !m.alive || m.state === "dying" || m.campId !== h.campId) continue;
      if (m.hp >= m.maxHp) continue;
      const missing = m.maxHp - m.hp;
      const d = Math.hypot(m.cx - h.cx, m.cy - h.cy);
      if (d > TILE_SIZE * 8) continue;
      if (!target || missing > bestMissing) {
        target = m;
        bestMissing = missing;
      }
    }
    if (target) {
      const heal = Math.max(4, Math.floor(target.maxHp * 0.06));
      target.hp = Math.min(target.maxHp, target.hp + heal);
      spawnDamageFloater(target.cx, target.y - 10, "+" + heal, false, "#72ff88");
    }
  }
}

function updateRangedFocusState(dt) {
  if (rangedFocusTimer > 0) rangedFocusTimer -= dt;
  if (rangedFocusMonster && (!rangedFocusMonster.alive || rangedFocusMonster.state === "dying")) {
    rangedFocusMonster = null;
    rangedFocusTimer = 0;
    return;
  }
  if (rangedFocusTimer <= 0) rangedFocusMonster = null;
}

/** Yakla\u015f\u0131k g\u00fc\u00e7: oyuncu seviyesine g\u00f6re isim rengi. */
function monsterRelativePowerScore(m) {
  if (!m) return 0;
  const s = m.levelScale || 1;
  return (m.maxHp * 0.12 + m.dmg * 4 + m.xpReward * 0.55) * (0.75 + s * 0.25);
}

function isMonsterDangerousForPlayerLevel(m, plv) {
  if (!m) return false;
  const mt = MONSTER_TYPES[m.type];
  if (mt && mt.boss) return true;
  const pl = 20 + plv * 21;
  return monsterRelativePowerScore(m) >= pl * 0.9;
}

function tryActivateRageBurst() {
  if (player.inBoat) {
    pickupMsgText = "Teknede g\u00fc\u00e7 patlamas\u0131 kullan\u0131lamaz";
    pickupMsgTimer = 1;
    return false;
  }
  if (player.rageMeter < RAGE_ACTIVATE_MIN) {
    pickupMsgText = "G\u00fc\u00e7 \u00e7ubu\u011fu: canavarlara vurarak doldur, sonra [G]";
    pickupMsgTimer = 1.2;
    return false;
  }
  if (player.rageBurstTimer > 0) return false;
  const hr = player.hp / Math.max(1, player.maxHp);
  const mr = player.mana / Math.max(1, player.maxMana);
  player.rageBurstTimer = RAGE_BURST_DURATION;
  player.rageMeter = 0;
  player.applyEquipmentBonus(inventory);
  player.hp = Math.max(1, Math.floor(player.maxHp * hr));
  player.mana = Math.min(player.maxMana, Math.floor(player.maxMana * mr));
  if (activePet && rangedFocusMonster && rangedFocusMonster.alive && rangedFocusMonster.state !== "dying") {
    activePet.combatTarget = rangedFocusMonster;
  }
  pickupMsgText = "G\u00dc\u00c7 PATLAMASI! 3x hasar & can (6 sn) [G]";
  pickupMsgTimer = 1.35;
  gameAudio.playSkill();
  return true;
}

function dropMonsterLoot(m, worldItems) {
  const preset = getLootPreset();
  const lo = m.loot || [];
  const mLevel = Math.max(1, m.level | 0);
  const tc = Math.floor(m.cx / TILE_SIZE), tr = Math.floor(m.cy / TILE_SIZE);
  const dropped = [];
  const estimateGenericDropLevel = (def) => {
    if (!def) return 1;
    if (def.equipSlot) return estimateEquipRequiredLevel(def);
    if (def.rarity === "legendary") return 42;
    if (def.rarity === "epic") return 28;
    if (def.rarity === "rare") return 14;
    const eco = Math.max(0, (def.buyPrice || 0) + (def.sellPrice || 0));
    return Math.max(1, Math.min(55, 1 + Math.floor(eco / 60)));
  };
  const canDropForMonsterLevel = (itemId) => {
    const d = ITEMS[itemId];
    if (!d) return false;
    if (!d.equipSlot) return false;
    const reqLv = estimateGenericDropLevel(d);
    if (reqLv > mLevel + 6) return false;
    if (d.rarity === "legendary" && !m.boss) return false;
    return true;
  };
  const allEquipForLevelSorted = () =>
    Object.keys(ITEMS)
      .filter((id) => ITEMS[id] && ITEMS[id].equipSlot && (m.boss || ITEMS[id].rarity !== "legendary"))
      .sort((a, b) => estimateGenericDropLevel(ITEMS[a]) - estimateGenericDropLevel(ITEMS[b]));
  const pushDrop = (itemId, count, upgradeLevel) => {
    if (!canDropForMonsterLevel(itemId)) return false;
    const cnt = Math.max(1, count | 0);
    const wi = new WorldItem(tc, tr, itemId, cnt, false);
    const up = upgradeLevel | 0;
    if (up > 0) wi.upgrade = up;
    worldItems.push(wi);
    dropped.push({ id: itemId, c: cnt });
    return true;
  };
  if (m.type === "island_treasure_chest") {
    const chestPool = [
      { id: "coin", min: 35, max: 90, chance: 1 },
      { id: "potion", min: 1, max: 3, chance: 0.78 },
      { id: "potion_mana", min: 1, max: 3, chance: 0.68 },
      { id: "chest_steel", min: 1, max: 1, chance: 0.45 },
      { id: "helm_epic", min: 1, max: 1, chance: 0.28 },
      { id: "chest_epic", min: 1, max: 1, chance: 0.24 },
      { id: "wings_epic", min: 1, max: 1, chance: 0.22 },
      { id: "ring_power", min: 1, max: 1, chance: 0.18 },
      { id: "amulet_wisdom", min: 1, max: 1, chance: 0.11 },
      { id: "helm_legendary", min: 1, max: 1, chance: 0.09 },
      { id: "chest_legendary", min: 1, max: 1, chance: 0.08 },
      { id: "wings_legendary", min: 1, max: 1, chance: 0.07 },
      { id: "boss_chest", min: 1, max: 1, chance: 0.15 },
    ];
    const rollCnt = 4 + Math.floor(Math.random() * 3);
    for (let i = 0; i < rollCnt; i++) {
      const pick = chestPool[Math.floor(Math.random() * chestPool.length)];
      if (Math.random() <= pick.chance) {
        const n = pick.min + Math.floor(Math.random() * (pick.max - pick.min + 1));
        pushDrop(pick.id, n);
      }
    }
    if (!dropped.some((x) => x.id !== "coin")) pushDrop("chest_epic", 1);
    return;
  }
  for (const entry of lo) {
    const defL = ITEMS[entry.id];
    if (defL && defL.rarity === "legendary" && !m.boss) continue;
    if (Math.random() < (entry.ch !== undefined ? entry.ch : 1)) {
      const cnt = entry.c || 1;
      pushDrop(entry.id, cnt);
    }
  }

  const EQUIP_POOLS_BY_RARITY = { common: [], rare: [], epic: [], legendary: [] };
  for (const itemId of Object.keys(ITEMS)) {
    const d = ITEMS[itemId];
    if (!d || !d.equipSlot) continue;
    const rr = d.rarity || "common";
    if (!EQUIP_POOLS_BY_RARITY[rr]) EQUIP_POOLS_BY_RARITY[rr] = [];
    EQUIP_POOLS_BY_RARITY[rr].push(itemId);
  }
  const STRONG_BOSS_EPIC_LEGENDARY = [
    "helm_epic", "helm_legendary", "chest_epic", "chest_legendary", "boots_epic",
    "waist_epic", "waist_legendary", "arms_epic", "arms_legendary", "wings_epic", "wings_legendary",
    "sword_elven", "spear_epic", "bow_long", "bow_moon_epic", "bow_sun_epic", "bow_storm_legendary", "bow_void_legendary", "bow_dragon_legendary", "ring_power", "merchants_ring", "amulet_wisdom",
    "earring_focus", "bracelet_titan", "talisman_void", "artifact_dragon_eye",
  ];
  const ANY_BOSS_LEGENDARY = [
    "helm_legendary", "chest_legendary", "waist_legendary", "arms_legendary", "wings_legendary", "amulet_wisdom", "bow_storm_legendary", "bow_void_legendary", "bow_dragon_legendary", "talisman_void", "artifact_dragon_eye",
  ];
  const DRAGON_GUARANTEE_LEGENDARY = ["helm_legendary", "chest_legendary", "waist_legendary", "arms_legendary", "wings_legendary", "amulet_wisdom", "bow_storm_legendary", "bow_dragon_legendary", "talisman_void", "artifact_dragon_eye", "flame_dragon_scale", "frost_wyrm_fang", "storm_dragon_claw", "void_dragon_eye", "ancient_dragon_heart"];

  const ultraBoss = !!m.ultraBoss;
  const strongBoss = !!(m.boss && (ultraBoss || STRONG_BOSS_TYPES.has(m.type)));
  const bRate = LOOT_BALANCE_PANEL.bossRateTable[m.type] || { legendMul: 1, hiTierMul: 1 };
  const levelRollCount = m.boss ? 2 + (strongBoss ? 1 : 0) + (ultraBoss ? 1 : 0) : 1;
  const rollLevelBasedRarity = () => {
    const t = Math.random();
    const legendaryChance = m.boss ? (ultraBoss ? 0.12 : (strongBoss ? 0.03 : 0.016)) : Math.min(0.008, 0.0004 + mLevel * 0.00018);
    const epicChance = Math.min(0.65, 0.05 + mLevel * 0.012 + (m.boss ? (ultraBoss ? 0.26 : 0.15) : 0));
    const rareChance = Math.min(0.75, 0.26 + mLevel * 0.014 + (m.boss ? 0.1 : 0));
    if (t < legendaryChance) return "legendary";
    if (t < legendaryChance + epicChance) return "epic";
    if (t < legendaryChance + epicChance + rareChance) return "rare";
    return "common";
  };
  const pickFromRarity = (rarity) => {
    const pool = (EQUIP_POOLS_BY_RARITY[rarity] || EQUIP_POOLS_BY_RARITY.common).filter((id) => canDropForMonsterLevel(id));
    if (!pool.length) {
      const fallback = EQUIP_POOLS_BY_RARITY.common.filter((id) => canDropForMonsterLevel(id));
      if (fallback.length) return fallback[Math.floor(Math.random() * fallback.length)];
      const all = allEquipForLevelSorted();
      if (!all.length) return null;
      const cap = Math.max(0, Math.min(all.length - 1, Math.floor((mLevel / 55) * all.length)));
      return all[Math.floor(Math.random() * (cap + 1))];
    }
    const idx = Math.floor(Math.random() * pool.length);
    return pool[idx];
  };
  if (Math.random() < (m.boss ? Math.min(0.92, preset.allMobEquipChance + 0.25) : preset.allMobEquipChance)) {
    for (let i = 0; i < levelRollCount; i++) {
      const rarity = rollLevelBasedRarity();
      const pick = pickFromRarity(rarity);
      const d = ITEMS[pick];
      let up = 0;
      if (pick && d && d.equipSlot) {
        const upBase = Math.max(0, Math.floor((mLevel - 6) / 8));
        const rarityBonus = rarity === "legendary" ? 2 : rarity === "epic" ? 1 : 0;
        const upCap = Math.min(MAX_ITEM_UPGRADE, upBase + rarityBonus + (m.boss ? 2 : 0));
        if (upCap > 0) {
          const upChance = Math.min(0.8, 0.08 + mLevel * 0.01 + (m.boss ? 0.18 : 0));
          if (Math.random() < upChance) up = 1 + Math.floor(Math.random() * upCap);
        }
      }
      if (pick && d) pushDrop(pick, 1, up);
    }
  }
  const extraEquipDropChance = m.boss ? (ultraBoss ? 1 : 0.95) : Math.min(0.88, 0.38 + mLevel * 0.014);
  if (Math.random() < extraEquipDropChance) {
    const extraPool = Object.keys(ITEMS).filter((id) => canDropForMonsterLevel(id));
    if (extraPool.length > 0) {
      const pick = extraPool[Math.floor(Math.random() * extraPool.length)];
      pushDrop(pick, 1, 0);
    } else {
      const all = allEquipForLevelSorted();
      if (all.length) {
        const cap = Math.max(0, Math.min(all.length - 1, Math.floor((mLevel / 55) * all.length)));
        const pick = all[Math.floor(Math.random() * (cap + 1))];
        pushDrop(pick, 1, 0);
      }
    }
  }

  if (m.boss && Math.random() < Math.min(0.995, preset.bossAnyLegendaryChance * bRate.legendMul * (ultraBoss ? 1.7 : 1))) {
    const lg = ANY_BOSS_LEGENDARY[Math.floor(Math.random() * ANY_BOSS_LEGENDARY.length)];
    pushDrop(lg, 1);
  }

  if (strongBoss && Math.random() < Math.min(0.98, preset.strongBossHiTierChance * bRate.hiTierMul)) {
    const hi = STRONG_BOSS_EPIC_LEGENDARY[Math.floor(Math.random() * STRONG_BOSS_EPIC_LEGENDARY.length)];
    pushDrop(hi, 1);
  }
  if (ultraBoss && Math.random() < 0.8) pushDrop("boss_chest", 1);

  const isAncientDragonType = m.type === "skywing_dragon" || m.type === "ancient_flame_dragon" || m.type === "frost_ancient_wyrm" || m.type === "storm_sovereign_dragon" || m.type === "void_ancient_dragon";
  if (isAncientDragonType) {
    const hasLegendary = dropped.some((x) => {
      const d = ITEMS[x.id];
      return !!(d && d.rarity === "legendary");
    });
    if (!hasLegendary) {
      const forced = DRAGON_GUARANTEE_LEGENDARY[Math.floor(Math.random() * DRAGON_GUARANTEE_LEGENDARY.length)];
      pushDrop(forced, 1);
    }
    if (dropped.length < 2) {
      const extra = STRONG_BOSS_EPIC_LEGENDARY[Math.floor(Math.random() * STRONG_BOSS_EPIC_LEGENDARY.length)];
      pushDrop(extra, 1);
    }
  }
}

function getBossLootRateSummary(type) {
  const mt = MONSTER_TYPES[type];
  if (!mt || !mt.boss) return "";
  const preset = getLootPreset();
  const bRate = LOOT_BALANCE_PANEL.bossRateTable[type] || { legendMul: 1, hiTierMul: 1 };
  const legend = Math.round(Math.min(0.95, preset.bossAnyLegendaryChance * bRate.legendMul) * 100);
  const hiTier = Math.round(Math.min(0.98, preset.strongBossHiTierChance * bRate.hiTierMul) * 100);
  return " L%" + legend + " H%" + hiTier;
}

const MELEE_RANGE = 46;
const MELEE_CONE_HALF = Math.PI * 0.42;
/** Ok fırlatılırken bu yarıçap içindeki en yakın canavara doğrudan nişan (uçuşta takip yok). */
const ARROW_AIM_ASSIST_RANGE = TILE_SIZE * 13;

function angleAbsDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return Math.abs(d);
}

function playerHasBladeWeapon(inv) {
  const e = inv.equipped && inv.equipped.blade;
  return !!(e && ITEMS[e.id] && ITEMS[e.id].equipSlot === "blade");
}

function playerHasBowEquipped(inv) {
  const e = inv.equipped && inv.equipped.bow;
  return !!(e && ITEMS[e.id] && ITEMS[e.id].equipSlot === "bow");
}

function arrowAimAssist(fromX, fromY, fallbackAngle, monsters) {
  let best = null;
  let bestD = Infinity;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const d = m.distTo(fromX, fromY);
    if (d < 6 || d > ARROW_AIM_ASSIST_RANGE) continue;
    if (d < bestD) { bestD = d; best = m; }
  }
  if (!best) return { angle: fallbackAngle, target: null };
  return { angle: Math.atan2(best.cy - fromY, best.cx - fromX), target: best };
}

function arrowLaunchAngleTowardNearestInRange(fromX, fromY, fallbackAngle, monsters) {
  return arrowAimAssist(fromX, fromY, fallbackAngle, monsters).angle;
}

function tryPlayerMeleeAttack(player, inventory, monsters) {
  if (!playerHasBladeWeapon(inventory)) return false;
  if (player.meleeCooldown > 0 || player.inBoat) return false;
  const px = player.centerX, py = player.centerY;
  const pa = player.angle;
  let best = null;
  let bestD = Infinity;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const dx = m.cx - px, dy = m.cy - py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > MELEE_RANGE) continue;
    const ta = Math.atan2(dy, dx);
    if (angleAbsDiff(pa, ta) > MELEE_CONE_HALF) continue;
    if (dist < bestD) { bestD = dist; best = m; }
  }
  if (!best) return false;
  const rawMelee = player.getMeleeDamage();
  best.takeDamage(applyOutgoingPlayerDamage(rawMelee, player, inventory, { monster: best }));
  player.meleeCooldown = 0.48;
  player.swingAnim = 0.28;
  player.gainXP(2);
  gameAudio.playMelee();
  return true;
}

function tryReleasePowerShotClick() {
  if (!player.powerCharging || player.powerCharge <= 0.1) return false;
  if (!playerHasBowEquipped(inventory)) {
    pickupMsgText = "G\u00fc\u00e7l\u00fc ok i\u00e7in yay ku\u015fan!";
    pickupMsgTimer = 1.2;
  } else if (inventory.countItem("arrow") > 0 && player.mana >= player.manaCostPower) {
    inventory.removeItem("arrow", 1);
    player.useMana(player.manaCostPower);
    player.shootCooldown = 0.5;
    player.shootAnim = 0.3;
    const sx = player.centerX + Math.cos(player.angle) * 14;
    const sy = player.centerY + Math.sin(player.angle) * 14;
    const aim = arrowAimAssist(sx, sy, player.angle, monsters);
    const pa = new Arrow(sx, sy, aim.angle);
    pa.power = true;
    pa.furyShot = player.rageBurstTimer > 0;
    pa.damage = applyOutgoingPlayerDamage(player.getPowerDamage(), player, inventory, {});
    pa.speed *= 1.5;
    arrows.push(pa);
    registerRangedAimTarget(aim.target);
    player.gainXP(3);
    gameAudio.playPowerShoot();
  }
  player.powerCharging = false;
  player.powerCharge = 0;
  return true;
}

function tryMeleeOrRangedClick() {
  if (tryPlayerMeleeAttack(player, inventory, monsters)) return true;
  if (player.shootCooldown <= 0 && inventory.countItem("arrow") > 0) {
    if (!playerHasBowEquipped(inventory)) {
      if (pickupMsgTimer <= 0) {
        pickupMsgText = "Ok atmak i\u00e7in yay ku\u015fan!";
        pickupMsgTimer = 1.2;
      }
      return false;
    } else if (player.useMana(player.manaCostShoot)) {
      inventory.removeItem("arrow", 1);
      const rapid = player.archerRapidFireTimer > 0;
      player.shootCooldown = rapid ? 0.2 : 0.35;
      player.shootAnim = 0.25;
      const sx = player.centerX + Math.cos(player.angle) * 14;
      const sy = player.centerY + Math.sin(player.angle) * 14;
      const aim = arrowAimAssist(sx, sy, player.angle, monsters);
      const na = new Arrow(sx, sy, aim.angle);
      na.furyShot = player.rageBurstTimer > 0;
      player.archerComboCount = Math.min(5, (player.archerComboCount | 0) + 1);
      player.archerComboTimer = 2.2;
      const comboBurst = player.archerComboCount === 3;
      const comboUlt = player.archerComboCount >= 5;
      const comboMul = comboUlt ? 2.05 : comboBurst ? 1.65 : 1;
      na.damage = applyOutgoingPlayerDamage(player.getRangedDamage() * comboMul, player, inventory, {});
      if (comboBurst) {
        const off = 0.13;
        const a2 = new Arrow(sx, sy, aim.angle - off);
        const a3 = new Arrow(sx, sy, aim.angle + off);
        a2.furyShot = na.furyShot; a3.furyShot = na.furyShot;
        a2.damage = Math.max(1, Math.floor(na.damage * 0.62));
        a3.damage = Math.max(1, Math.floor(na.damage * 0.62));
        arrows.push(a2, a3);
        pickupMsgText = "Combo Patlama!";
        pickupMsgTimer = 0.5;
        player.comboBlastTimer = Math.max(player.comboBlastTimer, 0.22);
      }
      if (comboUlt) {
        const fan = [-0.3, -0.16, 0.16, 0.3];
        for (const off of fan) {
          const ax = new Arrow(sx, sy, aim.angle + off);
          ax.furyShot = na.furyShot;
          ax.damage = Math.max(1, Math.floor(na.damage * 0.58));
          ax.speed *= 1.12;
          arrows.push(ax);
        }
        const chainTargets = monsters
          .filter((m) => m.alive && m.state !== "dying")
          .map((m) => ({ m, d: m.distTo(player.centerX, player.centerY) }))
          .filter((x) => x.d > 8 && x.d < 180)
          .sort((a, b) => a.d - b.d)
          .slice(0, 3);
        for (const x of chainTargets) {
          const rawChain = player.getRangedDamage() * 0.95;
          x.m.takeDamage(applyOutgoingPlayerDamage(rawChain, player, inventory, { monster: x.m, armorPiercePct: 28 }));
        }
        addScreenShake(4.2);
        pickupMsgText = "MINI ULTI! Zincir + Delici + Hızlı Atış";
        pickupMsgTimer = 0.8;
        player.comboBlastTimer = Math.max(player.comboBlastTimer, 0.45);
        player.archerRapidFireTimer = Math.max(player.archerRapidFireTimer, 3.2);
        player.archerComboCount = 0;
        player.archerComboTimer = 0;
      }
      arrows.push(na);
      registerRangedAimTarget(aim.target);
      player.gainXP(1);
      gameAudio.playShoot();
      return true;
    } else {
      if (pickupMsgTimer <= 0) {
        pickupMsgText = "Yeterli mana yok!";
        pickupMsgTimer = 1;
      }
      return false;
    }
  }
  return false;
}

function combatPanelsBlockAutoAttack() {
  return inventory.open || petPanel.open || dialog.active || shop.open || craftPanel.open || charPanel.open || !!worldItemInspect || !!inventorySlotInspect;
}

/** Mobil ana sald\u0131r\u0131 d\u00fc\u011fmesinin Etkile\u015fim (E) olarak davranabilece\u011fi durumlar (canavar g\u00f6stergesi hari\u00e7). */
function mobileInteractEligible() {
  if (player.inBoat || combatPanelsBlockAutoAttack()) return false;
  for (const wi of worldItems) {
    if (wi.alive && wi.isNear(player)) return true;
  }
  if (canChopFacingTree(player, map, inventory)) return true;
  for (const wp of wildPets) {
    if (wp.alive && wp.isNear(player)) return true;
  }
  for (const npc of npcs) {
    if (npc.isNearPlayer(player)) return true;
  }
  return false;
}

function interactPromptActionHint() {
  return touchState.mobileUI ? "\u2694" : "[E]";
}

function snapAimToNearestMonster() {
  const px = player.centerX, py = player.centerY;
  let best = null, bestD = Infinity;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const d = m.distTo(px, py);
    if (d < 10 || d > ARROW_AIM_ASSIST_RANGE) continue;
    if (d < bestD) { bestD = d; best = m; }
  }
  if (!best) {
    pickupMsgText = "Yak\u0131nda hedef yok";
    pickupMsgTimer = 0.75;
    return;
  }
  player.aimAt(best.cx, best.cy);
}

function skillCastWhirl() {
  const px = player.centerX, py = player.centerY, R = 78;
  let n = 0;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    if (m.distTo(px, py) > R) continue;
    const raw = player.getMeleeDamage() * 0.62;
    m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
    n++;
  }
  player.swingAnim = Math.max(player.swingAnim, 0.38);
  if (n) addScreenShake(2.2);
  player.gainXP(Math.min(3, n));
  return true;
}

function skillCastNova() {
  const px = player.centerX, py = player.centerY, R = 132;
  let n = 0;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    if (m.distTo(px, py) > R) continue;
    const raw = player.getRangedDamage() * 0.95;
    m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
    n++;
  }
  player.skillAuraT = Math.max(player.skillAuraT || 0, 0.48);
  addScreenShake(n ? 3 : 1);
  player.gainXP(Math.min(4, n));
  return true;
}

function spawnSkillBolt(element) {
  const sx = player.centerX + Math.cos(player.angle) * 14;
  const sy = player.centerY + Math.sin(player.angle) * 14;
  const aim = arrowAimAssist(sx, sy, player.angle, monsters);
  const a = new Arrow(sx, sy, aim.angle);
  a.furyShot = player.rageBurstTimer > 0;
  a.damage = applyOutgoingPlayerDamage(
    player.getRangedDamage() * (element === "fire" ? 1.15 : 1.05),
    player, inventory, {}
  );
  a.element = element;
  if (element === "ice") a.speed = 245;
  arrows.push(a);
  registerRangedAimTarget(aim.target);
  player.shootAnim = 0.22;
  return true;
}

function skillCastDash() {
  const step = 52;
  const dx = Math.cos(player.angle), dy = Math.sin(player.angle);
  let moved = false;
  const margin = 3;
  const newX = player.x + dx * step;
  const newY = player.y + dy * step;
  if (!player._collides(newX, player.y, map, margin)) { player.x = newX; moved = true; }
  if (!player._collides(player.x, newY, map, margin)) { player.y = newY; moved = true; }
  if (moved) {
    addScreenShake(1.2);
    return true;
  }
  pickupMsgText = "\u0130leri \u00e7\u0131kam\u0131yorsun";
  pickupMsgTimer = 0.55;
  return false;
}

function skillCastThunder() {
  const px = player.centerX, py = player.centerY;
  const list = [];
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const d = m.distTo(px, py);
    if (d < 10 || d > 142) continue;
    list.push({ m, d });
  }
  list.sort((a, b) => a.d - b.d);
  const hits = list.slice(0, 2);
  if (!hits.length) {
    pickupMsgText = "Yak\u0131nda hedef yok";
    pickupMsgTimer = 0.65;
    return false;
  }
  const raw = player.getRangedDamage() * 1.25;
  for (const { m } of hits) {
    m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
  }
  addScreenShake(3.5);
  player.gainXP(2 * hits.length);
  return true;
}

function skillCastMend() {
  const h = Math.max(8, Math.floor(player.maxHp * 0.14));
  player.heal(h);
  player.skillAuraT = Math.max(player.skillAuraT || 0, 0.35);
  return true;
}

function skillCastPowerBurst() {
  if (!playerHasBowEquipped(inventory)) {
    pickupMsgText = "Power Burst için yay gerekli!";
    pickupMsgTimer = 0.9;
    return false;
  }
  if (inventory.countItem("arrow") < 1) {
    pickupMsgText = "Power Burst için ok gerekli!";
    pickupMsgTimer = 0.9;
    return false;
  }
  if (player.mana < player.manaCostPower) {
    pickupMsgText = "Power Burst için mana yetersiz!";
    pickupMsgTimer = 0.9;
    return false;
  }
  player.powerCharging = true;
  player.powerCharge = 1;
  return tryReleasePowerShotClick();
}

function skillCastVolley() {
  if (!playerHasBowEquipped(inventory)) {
    pickupMsgText = "Salvo i\u00e7in yay gerekli!";
    pickupMsgTimer = 1;
    return false;
  }
  if (inventory.countItem("arrow") < 3) {
    pickupMsgText = "En az 3 ok gerekli!";
    pickupMsgTimer = 0.9;
    return false;
  }
  const base = player.angle;
  const spread = 0.24;
  const sx = player.centerX + Math.cos(base) * 14;
  const sy = player.centerY + Math.sin(base) * 14;
  for (let k = -1; k <= 1; k++) {
    inventory.removeItem("arrow", 1);
    let ang = base + k * spread;
    if (k === 0) {
      const aim = arrowAimAssist(sx, sy, base, monsters);
      ang = aim.angle;
      registerRangedAimTarget(aim.target);
    }
    const a = new Arrow(sx, sy, ang);
    a.furyShot = player.rageBurstTimer > 0;
    a.damage = applyOutgoingPlayerDamage(player.getRangedDamage() * 0.72, player, inventory, {});
    arrows.push(a);
  }
  player.shootAnim = 0.32;
  player.gainXP(2);
  return true;
}

function tryCastActiveSkill(slotIndex) {
  if (player.inBoat) {
    pickupMsgText = "Teknede beceri kullan\u0131lamaz";
    pickupMsgTimer = 0.8;
    return false;
  }
  if (combatPanelsBlockAutoAttack()) return false;
  const def = ACTIVE_SKILL_DEFS[slotIndex];
  if (!def) return false;
  if ((player.activeSkillCd[slotIndex] || 0) > 0) {
    pickupMsgText = "Beceri \u015farj oluyor (" + player.activeSkillCd[slotIndex].toFixed(1) + "sn)";
    pickupMsgTimer = 0.45;
    return false;
  }
  if (player.mana < def.mana) {
    pickupMsgText = "Yeterli mana yok";
    pickupMsgTimer = 0.9;
    return false;
  }
  let ok = false;
  switch (def.id) {
    case "powerburst": ok = skillCastPowerBurst(); break;
    case "mend": ok = skillCastMend(); break;
    case "volley": ok = skillCastVolley(); break;
    default: ok = false;
  }
  if (ok) {
    player.mana -= def.mana;
    player.activeSkillCd[slotIndex] = def.cooldown;
    gameAudio.playSkill();
  }
  return ok;
}

/** Sol t\u0131k veya mobil sald\u0131r\u0131 bas\u0131l\u0131 tutuldu\u011funda cooldown/mana izin verdik\u00e7e otomatik vuru\u015f/ok. */
function tryAutoAttackWhileHeld() {
  if (player.inBoat || combatPanelsBlockAutoAttack()) return;
  const shiftHeld = isDown("ShiftLeft") || isDown("ShiftRight");
  const mouseHeld = canvasMouse0Down && !touchState.mobileUI;
  const mobileAttackHeld = touchState.mobileUI && touchState.attackId >= 0;
  if (!mouseHeld && !mobileAttackHeld) return;
  // Güçlü ok (power shot) yalnızca Shift basılı tutulurken şarj olur;
  // normal sol tık basılı tutma = sürekli otomatik ateş.
  if (mouseHeld && !player.inBoat && playerHasBowEquipped(inventory) && shiftHeld) {
    const holdMs = performance.now() - mouseAttackT0;
    if (holdMs >= DESKTOP_POWER_HOLD_MS && inventory.countItem("arrow") > 0 && player.mana >= player.manaCostPower) {
      if (!player.powerCharging) {
        player.powerCharging = true;
        player.powerCharge = 0;
      }
      return;
    }
  }
  if (mobileAttackHeld) {
    const dur = performance.now() - touchState.attackT0;
    if (dur < MOBILE_ATTACK_INTERACT_MS && mobileInteractEligible()) return;
  }
  if (shiftHeld && player.powerCharging) return;
  tryMeleeOrRangedClick();
}

canvas.addEventListener("mousedown", (e) => {
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
  gameAudio.resume();
  if (e.button === 0) { canvasMouse0Down = true; mouseAttackT0 = performance.now(); }
  if (charPanel.open) {
    charPanel.handleClick(e.clientX, e.clientY, canvasW, canvasH, player, inventory);
    e.preventDefault();
    return;
  }
  if (craftPanel.open) {
    craftPanel.handleClick(e.clientX, e.clientY, canvasW, canvasH, inventory, player);
    e.preventDefault(); return;
  }
  if (bankPanel.open) {
    e.preventDefault(); return;
  }
  if (shop.open) {
    shop.handleClick(e.clientX, e.clientY, canvasW, canvasH, inventory, e.shiftKey, e.button);
    e.preventDefault(); return;
  }
  if (inventory.open && inventorySlotInspect && e.button === 0) {
    if (handleInventorySlotInspectClick(e.clientX, e.clientY, canvasW, canvasH)) {
      canvasMouse0Down = false;
      e.preventDefault();
      return;
    }
  }
  if (inventory.open && e.button === 0) {
    if (inventory.tryBeginEquipLongPress(e.clientX, e.clientY, canvasW, canvasH)) {
      e.preventDefault(); return;
    }
  }
  const handled = inventory.handleClick(e.clientX, e.clientY, canvasW, canvasH, e.button === 2);
  if (handled) { e.preventDefault(); return; }

  if (e.button === 0 && worldItemInspect) {
    handleWorldItemInspectClick(e.clientX, e.clientY, canvasW, canvasH);
    canvasMouse0Down = false;
    e.preventDefault();
    return;
  }

  if (e.button === 0 && !inventory.open && !bankPanel.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open && !player.inBoat) {
    if (tryOpenWorldItemInspect(e.clientX, e.clientY)) {
      canvasMouse0Down = false;
      e.preventDefault();
      return;
    }
  }

  if (e.button === 0 && !inventory.open && !bankPanel.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open) {
    if (tryCombatPotionClick(e.clientX, e.clientY)) {
      e.preventDefault();
      return;
    }
    if (tryCloseZoomOnBlankTap(e.clientX, e.clientY)) {
      e.preventDefault();
      return;
    }
  }

  if (e.button === 0 && !inventory.open && !bankPanel.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open && !player.inBoat) {
    if (player.powerCharging && player.powerCharge > 0.1) {
      tryReleasePowerShotClick();
    }
  }
});
canvas.addEventListener("contextmenu", (e) => { if (inventory.open || shop.open) e.preventDefault(); });
canvas.addEventListener("mousemove", (e) => {
  inventory.handleMouseMove(e.clientX, e.clientY, canvasW, canvasH);
  if (inventory.open) inventory.cancelSlotPressIfMovedOff(e.clientX, e.clientY, canvasW, canvasH);
  shop.handleMouseMove(e.clientX, e.clientY, canvasW, canvasH, inventory);
});
window.addEventListener("mouseup", (e) => {
  if (e.button === 0) {
    canvasMouse0Down = false;
    if (player.powerCharging && (performance.now() - mouseAttackT0) >= DESKTOP_POWER_HOLD_MS) {
      tryReleasePowerShotClick();
    } else if (!(isDown("ShiftLeft") || isDown("ShiftRight"))) {
      player.powerCharging = false;
      player.powerCharge = 0;
    }
    if (inventory.open) inventory.finishSlotPress(e.clientX, e.clientY, canvasW, canvasH, false);
  }
});
canvas.addEventListener("wheel", (e) => {
  if (inventory.open && inventorySlotInspect && inventoryInspectScrollRect && inventoryInspectScrollMax > 0) {
    const r = inventoryInspectScrollRect;
    const inside = e.clientX >= r.x && e.clientX < r.x + r.w && e.clientY >= r.y && e.clientY < r.y + r.h;
    if (inside) {
      inventoryInspectScrollY = Math.max(0, Math.min(inventoryInspectScrollMax, inventoryInspectScrollY + e.deltaY));
      e.preventDefault();
      return;
    }
  }
  if (shop.open) {
    const land = canvasW > canvasH * 1.02;
    const dy = e.deltaY > 0 ? (land ? 2.2 : 1) : (land ? -2.2 : -1);
    shop.handleScroll(dy, e.clientX, e.clientY, canvasW, canvasH);
    e.preventDefault();
  }
}, { passive: false });

function tryMobileClosePanels(mx, my) {
  if (!touchState.mobileUI || !hitMobileCloseChip(mx, my, canvasW)) return false;
  if (dialog.active) { dialog.close(true); return true; }
  if (shop.open) { shop.close(); return true; }
  if (craftPanel.open) { craftPanel.close(); return true; }
  if (bankPanel.open) { bankPanel.close(); return true; }
  if (inventory.open) {
    if (inventorySlotInspect) { closeInventorySlotInspect(); return true; }
    inventory.close();
    return true;
  }
  if (petPanel.open) { petPanel.close(); return true; }
  if (charPanel.open) { charPanel.close(); return true; }
  if (worldItemInspect) { closeWorldItemInspect(); return true; }
  if (inventorySlotInspect) { closeInventorySlotInspect(); return true; }
  return false;
}

function handleCanvasTouchStart(e) {
  gameAudio.resume();
  refreshMobileUI();
  updateTouchLayout();

  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const mx = t.clientX, my = t.clientY, id = t.identifier;
    mouseX = mx;
    mouseY = my;

    if (tryMobileClosePanels(mx, my)) continue;

    if (craftPanel.open) {
      craftPanel.handleClick(mx, my, canvasW, canvasH, inventory, player);
      continue;
    }
    if (shop.open) {
      if (shop.tryBeginGridScroll(id, mx, my, canvasW, canvasH, inventory)) continue;
      shop.handleClick(mx, my, canvasW, canvasH, inventory, false, 0);
      continue;
    }
    if (bankPanel.open) {
      continue;
    }
    if (inventory.open) {
      if (inventorySlotInspect) {
        if (inventoryInspectScrollRect && inventoryInspectScrollMax > 0) {
          const r = inventoryInspectScrollRect;
          if (mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h) {
            inventoryInspectScrollTouchId = id;
            inventoryInspectScrollLastY = my;
            continue;
          }
        }
        if (handleInventorySlotInspectClick(mx, my, canvasW, canvasH)) continue;
      }
      inventory.handleClick(mx, my, canvasW, canvasH, false);
      continue;
    }

    if (charPanel.open) {
      charPanel.handleClick(mx, my, canvasW, canvasH, player, inventory);
      continue;
    }

    if (petPanel.open && activePet) {
      const { px, py, pw, ph } = petPanel.getPanelBounds(canvasW, canvasH);
      if (mx < px || mx > px + pw || my < py || my > py + ph) petPanel.close();
      continue;
    }

    if (dialog.active) {
      dialog.advance();
      continue;
    }

    if (worldItemInspect) {
      handleWorldItemInspectClick(mx, my, canvasW, canvasH);
      continue;
    }

    if (!inventory.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open && !player.inBoat) {
      if (tryOpenWorldItemInspect(mx, my)) continue;
    }

    if (!touchState.mobileUI) continue;

    if (!shop.open && !craftPanel.open && tryCombatPotionClick(mx, my)) continue;
    if (!shop.open && !craftPanel.open && !inventory.open && !petPanel.open && !dialog.active && !charPanel.open &&
        !worldItemInspect && !inventorySlotInspect && tryCloseZoomOnBlankTap(mx, my)) continue;

    const br = hitMobileButton(mx, my, canvasW, canvasH);
    if (br) {
      if (br.kind === "attack") {
        touchState.attackId = id;
        touchState.attackT0 = performance.now();
      } else {
        touchState.btnDown.set(id, {
          key: br.key,
          kind: br.kind,
          skillSlot: br.skillSlot,
          ox: mx, oy: my,
        });
      }
      continue;
    }

    const joyLeftMaxX = canvasW * 0.48;
    if (touchState.joyId < 0 && mx < joyLeftMaxX) {
      touchState.joyId = id;
      touchState.joyCx = mx;
      touchState.joyCy = my;
      touchState.joyOx = mx;
      touchState.joyOy = my;
      touchState.joyDx = 0;
      touchState.joyDy = 0;
      continue;
    }

    if (touchState.aimId < 0) {
      touchState.aimId = id;
      touchState.aimX = mx;
      touchState.aimY = my;
    }
  }
  e.preventDefault();
}

function handleCanvasTouchMove(e) {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const mx = t.clientX, my = t.clientY, id = t.identifier;
    mouseX = mx;
    mouseY = my;

    if (shop.open && shop.gridScrollTouchId === id) {
      const dy = my - shop.gridScrollLastY;
      shop.gridScrollLastY = my;
      shop.applyTouchGridScroll(-dy, canvasW, canvasH, inventory);
    }
    if (inventory.open && inventorySlotInspect && id === inventoryInspectScrollTouchId && inventoryInspectScrollMax > 0) {
      const dy = my - inventoryInspectScrollLastY;
      inventoryInspectScrollLastY = my;
      inventoryInspectScrollY = Math.max(0, Math.min(inventoryInspectScrollMax, inventoryInspectScrollY - dy));
    }
    if (id === touchState.joyId) {
      let dx = mx - touchState.joyOx, dy = my - touchState.joyOy;
      const max = touchState.joyR * 0.88;
      const len = Math.hypot(dx, dy) || 1;
      if (len > max) { dx = (dx / len) * max; dy = (dy / len) * max; }
      touchState.joyDx = dx / max;
      touchState.joyDy = dy / max;
    }
    if (id === touchState.aimId) {
      touchState.aimX = mx;
      touchState.aimY = my;
    }

    if (inventory.open) {
      inventory.handleMouseMove(mx, my, canvasW, canvasH);
      inventory.cancelSlotPressIfMovedOff(mx, my, canvasW, canvasH);
    }
    if (shop.open) shop.handleMouseMove(mx, my, canvasW, canvasH, inventory);
  }
  e.preventDefault();
}

function pulseMobileButtonKey(key) {
  if (key === MOBILE_POWER_BUTTON_KEY) {
    tryActivateRageBurst();
    return;
  }
  if (key === "KeyQ") pulseJust("KeyQ");
  else if (key === "KeyR") pulseJust("KeyR");
  else if (key === "KeyC") pulseJust("KeyC");
  else if (key === "KeyI") pulseJust("KeyI");
  else if (key === "KeyM") pulseJust("KeyM");
  else if (key === "KeyL") pulseJust("KeyL");
  else if (key === "KeyT") pulseJust("KeyT");
  else if (key === "KeyB") pulseJust("KeyB");
}

function handleCanvasTouchEnd(e) {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const mx = t.clientX, my = t.clientY, id = t.identifier;

    if (inventory.open && id === touchState.invSlotPressId) {
      touchState.invSlotPressId = -1;
      inventory.finishSlotPress(mx, my, canvasW, canvasH, false);
    }

    if (shop.open && id === shop.gridScrollTouchId) {
      shop.gridScrollTouchId = -1;
    }
    if (id === inventoryInspectScrollTouchId) {
      inventoryInspectScrollTouchId = -1;
    }
    if (id === touchState.joyId) {
      touchState.joyId = -1;
      touchState.joyDx = 0;
      touchState.joyDy = 0;
    }
    if (id === touchState.aimId) touchState.aimId = -1;

    if (id === touchState.attackId) {
      const tAttack0 = touchState.attackT0;
      touchState.attackId = -1;
      const attackDur = performance.now() - tAttack0;
      if (touchState.mobileUI && attackDur < MOBILE_ATTACK_INTERACT_MS &&
          !combatPanelsBlockAutoAttack() && !player.inBoat && mobileInteractEligible() && actionCooldown <= 0) {
        handleInteraction();
      }
      if (!(isDown("ShiftLeft") || isDown("ShiftRight"))) {
        player.powerCharging = false;
        player.powerCharge = 0;
      }
    }

    const bd = touchState.btnDown.get(id);
    if (bd) {
      touchState.btnDown.delete(id);
      const moved = Math.hypot(mx - bd.ox, my - bd.oy);
      if (moved < 22) {
        if (bd.skillSlot != null && bd.skillSlot !== undefined) tryCastActiveSkill(bd.skillSlot);
        else pulseMobileButtonKey(bd.key);
      }
    }
  }
  e.preventDefault();
}

function handleCanvasTouchCancel(e) {
  handleCanvasTouchEnd(e);
}

canvas.addEventListener("touchstart", handleCanvasTouchStart, { passive: false });
canvas.addEventListener("touchmove", handleCanvasTouchMove, { passive: false });
canvas.addEventListener("touchend", handleCanvasTouchEnd, { passive: false });
canvas.addEventListener("touchcancel", handleCanvasTouchCancel, { passive: false });

function renderTouchOverlay(ctx) {
  if (!touchState.mobileUI) return;
  const cw = canvasW, ch = canvasH;
  const modal = dialog.active || inventory.open || petPanel.open || shop.open || craftPanel.open || charPanel.open || !!worldItemInspect || !!inventorySlotInspect;
  if (modal) {
    ctx.fillStyle = "rgba(30,30,50,0.85)";
    roundRect(ctx, cw - 50, 8, 42, 40, 8);
    ctx.fill();
    ctx.strokeStyle = "#c08080";
    ctx.lineWidth = 2;
    roundRect(ctx, cw - 50, 8, 42, 40, 8);
    ctx.stroke();
    ctx.fillStyle = "#f0e0e0";
    ctx.font = "bold 22px monospace";
    ctx.fillText("\u00D7", cw - 33, 37);
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.font = "9px monospace";
    ctx.fillText("Kapat", cw - 44, 52);
    return;
  }

  if (touchState.joyId >= 0) {
    const J = touchState;
    ctx.globalAlpha = 0.42;
    ctx.fillStyle = "rgba(255,255,255,0.28)";
    ctx.beginPath();
    ctx.arc(J.joyCx, J.joyCy, J.joyR, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.72;
    ctx.strokeStyle = "rgba(120,130,170,0.85)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(J.joyCx, J.joyCy, J.joyR, 0, Math.PI * 2);
    ctx.stroke();
    const kx = J.joyOx + J.joyDx * J.joyR * 0.88, ky = J.joyOy + J.joyDy * J.joyR * 0.88;
    ctx.fillStyle = "rgba(255,255,255,0.82)";
    ctx.beginPath();
    ctx.arc(kx, ky, J.joyR * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  const btns = mobileButtonsLayout(cw, ch);
  for (const b of btns) {
    if (b.kind === "attack") {
      const onAttack = touchState.attackId >= 0;
      ctx.fillStyle = onAttack ? "rgba(110,80,145,0.96)" : "rgba(248,248,252,0.94)";
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = onAttack ? "#d8b0ff" : "#a0a0c0";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = onAttack ? "#f8f0ff" : "#383850";
      ctx.font = "bold 17px monospace";
      ctx.fillText(b.label, b.cx - ctx.measureText(b.label).width / 2, b.cy + 5);
      continue;
    }
    if (b.kind === "skill") {
      const cd = player.activeSkillCd[b.skillSlot] || 0;
      const def = ACTIVE_SKILL_DEFS[b.skillSlot];
      const maxCd = def ? def.cooldown : 1;
      ctx.fillStyle = "rgba(248,248,255,0.93)";
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#9898b8";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if (cd > 0 && maxCd > 0) {
        const frac = Math.min(1, cd / maxCd);
        ctx.fillStyle = "rgba(18,18,36,0.5)";
        ctx.beginPath();
        ctx.moveTo(b.cx, b.cy);
        ctx.arc(b.cx, b.cy, b.r, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillStyle = "#303048";
      ctx.font = "bold 13px monospace";
      ctx.fillText(b.label, b.cx - ctx.measureText(b.label).width / 2, b.cy + 4);
      continue;
    }
    if (b.kind === "power") {
      const onAux = touchState.btnDown.size && [...touchState.btnDown.values()].some((v) => v.key === b.key);
      const isPower = true;
      ctx.fillStyle = onAux ? "rgba(120,95,155,0.96)" : (isPower ? "rgba(255,244,252,0.96)" : "rgba(248,248,255,0.94)");
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = onAux ? "#e8c8ff" : (isPower ? "#d088ff" : "#9090b0");
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = onAux ? "#fff8ff" : (isPower ? "#7a2cb0" : "#383850");
      ctx.font = (b.label && String(b.label).length > 1) ? "bold 10px monospace" : "bold 12px monospace";
      ctx.fillText(b.label, b.cx - ctx.measureText(b.label).width / 2, b.cy + 4);
      continue;
    }
    const onRect = touchState.btnDown.size && [...touchState.btnDown.values()].some((v) => v.key === b.key);
    ctx.fillStyle = onRect ? "rgba(90,70,120,0.92)" : "rgba(36,36,56,0.9)";
    roundRect(ctx, b.x, b.y, b.w, b.h, 6);
    ctx.fill();
    ctx.strokeStyle = onRect ? "#d0a0ff" : "#7070a0";
    ctx.lineWidth = 1.5;
    roundRect(ctx, b.x, b.y, b.w, b.h, 6);
    ctx.stroke();
    ctx.fillStyle = "#e8e8f0";
    ctx.font = b.kind === "menu" ? "bold 12px monospace" : "bold 11px monospace";
    const ly = b.y + b.h / 2 + (b.kind === "menu" ? 4 : 4);
    ctx.fillText(b.label, b.x + b.w / 2 - ctx.measureText(b.label).width / 2, ly);
  }
}

let actionCooldown = 0;
let pickupMsgTimer = 0;
let pickupMsgText = "";

const CHOP_TREE_RANGE = TILE_SIZE * 1.7;
const TREE_MAX_HP = 50;
const treeHealths = new Map();

function treeHealthKey(col, row) { return col + ',' + row; }

function getTreeHp(col, row) {
  const k = treeHealthKey(col, row);
  if (!treeHealths.has(k)) treeHealths.set(k, TREE_MAX_HP);
  return treeHealths.get(k);
}

function damageTree(col, row, dmg) {
  const k = treeHealthKey(col, row);
  if (!treeHealths.has(k)) treeHealths.set(k, TREE_MAX_HP);
  const hp = treeHealths.get(k) - dmg;
  if (hp <= 0) {
    treeHealths.delete(k);
    return true;
  }
  treeHealths.set(k, hp);
  return false;
}

/** Teknede iken ayak ve g\u00f6vde merkezi su karosunda m\u0131? K\u0131y\u0131da biri karada kal\u0131nca inme / \u00e7arp\u0131\u015fma i\u00e7in kullan\u0131l\u0131r. */
function playerBoatFullyOnWater(map, player) {
  const feetW = map.getGroundTileAtPx(player.feetX, player.feetY) === TileType.WATER;
  const ctrW = map.isWaterPx(player.centerX, player.centerY);
  return feetW && ctrW;
}

function canChopFacingTree(player, map, inventory) {
  if (player.inBoat) return false;
  if (!getUsableAxeStack(inventory)) return false;
  const ft = player.getFacingTile();
  const col = ft.col, row = ft.row;
  const tcx = (col + 0.5) * TILE_SIZE, tcy = (row + 0.5) * TILE_SIZE;
  const dx = tcx - player.centerX, dy = tcy - player.centerY;
  if (dx * dx + dy * dy > CHOP_TREE_RANGE * CHOP_TREE_RANGE) return false;
  if (map.getDetail(col, row) === TileType.TREE) return true;
  return map.getTile(col, row) === TileType.TREE;
}

function tryChopTree(player, map, inventory) {
  if (!canChopFacingTree(player, map, inventory)) return false;
  const axeStack = getUsableAxeStack(inventory);
  if (!axeStack) return false;
  const ft = player.getFacingTile();
  const col = ft.col, row = ft.row;
  const isDetailTree = map.getDetail(col, row) === TileType.TREE;
  const isGroundTree = map.getTile(col, row) === TileType.TREE;
  if (!isDetailTree && !isGroundTree) return false;
  const destroyed = damageTree(col, row, 15);
  if (!destroyed) {
    spawnDamageFloater((col + 0.5) * TILE_SIZE, (row + 0.5) * TILE_SIZE, 15, false, "#8B4513");
    actionCooldown = 0.28;
    gameAudio.playChop();
    return true;
  }
  if (isDetailTree) map.setDetail(col, row, -1);
  else { map.setTile(col, row, TileType.GRASS); map.setDetail(col, row, -1); }
  const woodAmt = 3 + Math.floor(Math.random() * 3);
  inventory.addItem("wood", woodAmt);
  player.gainXP(1);
  pickupMsgText = "+" + woodAmt + " Odun";
  pickupMsgTimer = 1.5;
  if (axeStack.id === "axe") {
    ensureStackAxeDurability(axeStack);
    if (axeStack.durability > 0) axeStack.durability -= 1;
    if (axeStack.durability <= 0) {
      const eqAxe = inventory.equipped && inventory.equipped.axe === axeStack;
      if (eqAxe) inventory.equipped.axe = null;
      else axeStack.count = 0;
      pickupMsgText = "Balta kirildi! (tamir cani sifir)";
    } else if (axeStack.durability <= Math.max(8, Math.floor(getAxeDurabilityMax(axeStack) * 0.2))) {
      pickupMsgText = "+" + woodAmt + " Odun  |  Balta: " + axeStack.durability + "/" + getAxeDurabilityMax(axeStack);
    }
  }
  actionCooldown = 0.28;
  gameAudio.playChop();
  return true;
}

function getUsableAxeStack(inv) {
  if (!inv) return null;
  const eq = inv.equipped && inv.equipped.axe;
  if (eq && eq.id === "axe") {
    ensureStackAxeDurability(eq);
    if (eq.durability > 0) return eq;
  }
  const probe = (container) => {
    for (let i = 0; i < container.length; i++) {
      const s = container[i];
      if (!s) continue;
      if (s.id !== "axe") continue;
      if (s.count <= 0) { container[i] = null; continue; }
      ensureStackAxeDurability(s);
      if (s.durability > 0) return s;
    }
    return null;
  };
  return probe(inv.hotbar) || probe(inv.slots) || null;
}

function tryAutoChopNearbyTree(dt) {
  if (actionCooldown > 0 || !dt) return false;
  if (player.inBoat || inventory.open || petPanel.open || shop.open || craftPanel.open || charPanel.open || dialog.active || !!worldItemInspect || !!inventorySlotInspect) return false;
  return tryChopTree(player, map, inventory);
}

function handleInteraction() {
  if (actionCooldown > 0) return;

  if (inventory.open || petPanel.open || shop.open || craftPanel.open || charPanel.open || worldItemInspect || !!inventorySlotInspect) return;

  if (dialog.active) { dialog.advance(); actionCooldown = 0.2; return; }

  for (const wi of worldItems) {
    if (wi.alive && wi.isNear(player)) {
      const before = wi.count;
      if (wi.tryPickup(inventory)) {
        const picked = before - wi.count;
        const def = ITEMS[wi.itemId];
        if (picked > 0) gameAudio.playPickup();
        pickupMsgText = "+" + picked + " " + def.name;
        pickupMsgTimer = 1.5;
        actionCooldown = 0.15;
        return;
      }
    }
  }

  if (tryChopTree(player, map, inventory)) return;

  for (const wp of wildPets) {
    if (wp.alive && wp.isNear(player)) {
      const result = wp.tryTame(inventory);
      if (result instanceof Pet) {
        activePet = result;
        activePet.x = wp.x; activePet.y = wp.y;
        pickupMsgText = activePet.name + " evcille\u015ftirildi!";
        pickupMsgTimer = 2;
        actionCooldown = 0.3;
      } else if (result === null) {
        const pt = PET_TYPES[wp.type];
        pickupMsgText = pt.name + " g\u00fcvenmeye ba\u015fl\u0131yor...";
        pickupMsgTimer = 1.5;
        actionCooldown = 0.3;
      } else {
        const pt = PET_TYPES[wp.type];
        const foodName = ITEMS[pt.tameFood] ? ITEMS[pt.tameFood].name : pt.tameFood;
        pickupMsgText = foodName + " gerekli!";
        pickupMsgTimer = 1.5;
        actionCooldown = 0.3;
      }
      return;
    }
  }

  for (const npc of npcs) {
    if (npc.isNearPlayer(player)) {
      if (npc.merchant && npc.stock) {
        shop.openShop(npc.name, npc.stock, npc.shopPool);
      } else {
        const bNpc = npc.buildsBoat;
        dialog.show(npc.name, npc.dialog, () => {
          if (bNpc && !player.hasBoat) {
            if (typeof charPanel !== "undefined") charPanel.close();
            if (typeof petPanel !== "undefined") petPanel.open = false;
            if (typeof shop !== "undefined") shop.close();
            if (typeof inventory !== "undefined") inventory.close();
            craftPanel.open = true;
          }
        });
      }
      actionCooldown = 0.3;
      return;
    }
  }
}

function saveKeyForSlot(slot) {

}

function saveMetaKeyForSlot(slot) {
  return SAVE_META_PREFIX + slot;
}

function readSlotDisplayName(slot) {
  try {
    const raw = localStorage.getItem(saveMetaKeyForSlot(slot));
    if (!raw) return "";
    const o = JSON.parse(raw);
    return (o && typeof o.name === "string") ? o.name : "";
  } catch (e) { return ""; }
}

function writeSlotDisplayName(slot, name) {
  try {
    localStorage.setItem(saveMetaKeyForSlot(slot), JSON.stringify({ name: String(name || "").slice(0, 32) }));
  } catch (e) { /* quota */ }
}

function getPlayerWorldLabelName() {
  if (typeof currentSaveSlot === "number" && currentSaveSlot >= 0) {
    const n = readSlotDisplayName(currentSaveSlot);
    if (n) return n;
  }
  return "Ok\u00e7u";
}

function hasSaveInSlot(slot) {
  try {
    const s = localStorage.getItem(saveKeyForSlot(slot));
    return !!(s && s.length > 10);
  } catch (e) { return false; }
}

function applyInventorySave(inv, d) {
  if (!d) return;
  inv.gold = d.gold | 0;
  for (let i = 0; i < inv.slots.length; i++) {
    const s = d.slots && d.slots[i];
    if (s && s.id) {
      const st = { id: s.id, count: Math.max(1, s.count | 0) };
      const u = s.upgrade | 0;
      if (u > 0) st.upgrade = u;
      if (st.id === "axe") st.durability = Math.max(0, s.durability | 0);
      ensureStackAxeDurability(st);
      inv.slots[i] = st;
    } else inv.slots[i] = null;
  }
  for (let i = 0; i < inv.hotbar.length; i++) {
    const s = d.hotbar && d.hotbar[i];
    if (s && s.id) {
      const st = { id: s.id, count: Math.max(1, s.count | 0) };
      const u = s.upgrade | 0;
      if (u > 0) st.upgrade = u;
      if (st.id === "axe") st.durability = Math.max(0, s.durability | 0);
      ensureStackAxeDurability(st);
      inv.hotbar[i] = st;
    } else inv.hotbar[i] = null;
  }
  for (const sk of EQ_SLOTS) {
    const e = d.equipped && d.equipped[sk];
    if (e && e.id) {
      const st = { id: e.id, count: Math.max(1, e.count | 0) };
      const u = e.upgrade | 0;
      if (u > 0) st.upgrade = u;
      if (st.id === "axe") st.durability = Math.max(0, e.durability | 0);
      ensureStackAxeDurability(st);
      inv.equipped[sk] = st;
    } else inv.equipped[sk] = null;
  }
  /* Geri uyumluluk: eski kayıtlardaki ring/hands slotlarını yeni yerlere taşır. */
  if (d.equipped && d.equipped.ring && !inv.equipped.ring1 && !inv.equipped.ring2) {
    const r = d.equipped.ring;
    inv.equipped.ring1 = { id: r.id, count: Math.max(1, r.count | 0) };
    const ur = r.upgrade | 0;
    if (ur > 0) inv.equipped.ring1.upgrade = ur;
  }
  if (d.equipped && d.equipped.hands && !inv.equipped.arms) {
    const h = d.equipped.hands;
    inv.equipped.arms = { id: h.id, count: Math.max(1, h.count | 0) };
    const uh = h.upgrade | 0;
    if (uh > 0) inv.equipped.arms.upgrade = uh;
  }
  inv.selectedHotbar = Math.max(0, Math.min(inv.hotbar.length - 1, d.selectedHotbar | 0));
  inv.heldItem = null;
  inv.open = false;
  inv._clearSlotPress();
}

    inventory: inventoryToSave(inventory),
