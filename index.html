    const btnWidth = isMobile ? 60 : 75;
    const btnHeight = isMobile ? 22 : 28;
    if(G.questTab === 'available'){
      ctx.fillStyle = '#4a4';
      drawRoundRect(ctx, px + pw - btnWidth - 10, qy + (isMobile ? 26 : 27), btnWidth, btnHeight, 4, '#4a4', '#2a2');
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${isMobile ? 10 : 12}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('Accept', px + pw - btnWidth/2 - 10, qy + (isMobile ? 40 : 44));
    } else if(G.questTab === 'active'){
      ctx.fillStyle = '#833';
      drawRoundRect(ctx, px + pw - btnWidth - 10, qy + (isMobile ? 26 : 27), btnWidth, btnHeight, 4, '#833', '#622');
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${isMobile ? 10 : 12}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('Abandon', px + pw - btnWidth/2 - 10, qy + (isMobile ? 40 : 44));
    } else {
      ctx.fillStyle = '#353';
      drawRoundRect(ctx, px + pw - btnWidth - 10, qy + (isMobile ? 26 : 27), btnWidth, btnHeight, 4, '#353', '#242');
      ctx.fillStyle = '#4f4';
      ctx.font = `bold ${isMobile ? 10 : 12}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('DONE', px + pw - btnWidth/2 - 10, qy + (isMobile ? 40 : 44));
    }
  }
}

function handleStatPanelClick(mx, my){
  const pw = isMobile ? W - 16 : 400;
  const ph = isMobile ? H - 30 : 380;
  const px = (W - pw) / 2;
  const py = (H - ph) / 2;
  const p = G.player;
  if(!G.statPanelStats) G.statPanelStats = {str: p.str, dex: p.dex, int: p.int, extraHp: 0, extraMp: 0, points: p.statPoints};
  const sp = G.statPanelStats;
  const statKeys = ['str', 'dex', 'int', 'extraHp', 'extraMp'];

  const rowHeight = isMobile ? 46 : 52;
  const startY = py + (isMobile ? 60 : 70);
  const btnSize = isMobile ? 32 : 24;
  
  for(let i = 0; i < statKeys.length; i++){
    const key = statKeys[i];
    const ry = startY + i * rowHeight;
    const minusX = px + (isMobile ? 240 : 270);
    const plusX = px + (isMobile ? 280 : 310);
    
    if(mx >= minusX && mx <= minusX + btnSize && my >= ry + (rowHeight - btnSize)/2 && my <= ry + (rowHeight - btnSize)/2 + btnSize){
      const base = {str: p.str, dex: p.dex, int: p.int, extraHp: 0, extraMp: 0};
      if(sp[key] > base[key]){
        if(key === 'str') sp.str--;
        else if(key === 'dex') sp.dex--;
        else if(key === 'int') sp.int--;
        else if(key === 'extraHp') sp.extraHp--;
        else if(key === 'extraMp') sp.extraMp--;
        sp.points++;
      }
      return;
    }
    if(mx >= plusX && mx <= plusX + btnSize && my >= ry + (rowHeight - btnSize)/2 && my <= ry + (rowHeight - btnSize)/2 + btnSize){
      if(sp.points > 0){
        if(key === 'str') sp.str++;
        else if(key === 'dex') sp.dex++;
        else if(key === 'int') sp.int++;
        else if(key === 'extraHp') sp.extraHp++;
        else if(key === 'extraMp') sp.extraMp++;
        sp.points--;
      }
      return;
    }
  }
  const btnWidth = isMobile ? 160 : 140;
  const btnHeight = isMobile ? 44 : 36;
  if(mx >= px + pw/2 - btnWidth/2 && mx <= px + pw/2 + btnWidth/2 && my >= py + ph - btnHeight - 10 && my <= py + ph - 10){
    applyStatPanel();
    G.state = 'playing';
    G.pendingStatScreen = false;
  }
}

function applyStatPanel(){
  if(!G.statPanelStats) return;
  const sp = G.statPanelStats;
  const p = G.player;
  p.str = sp.str; p.dex = sp.dex; p.int = sp.int;
  p.bonusHp = sp.extraHp * 30;
  p.bonusMp = sp.extraMp * 20;
  p.statPoints = sp.points;
  p.recalcStats();
  G.statPanelStats = null;
}

function handleAnvilClick(mx, my){
  const pw = isMobile ? W - 10 : 580;
  const ph = isMobile ? H - 20 : 480;
  const px = (W - pw) / 2;
  const py = (H - ph) / 2;
  const p = G.player;
  const inv = p.inventory;
  const equipTypes = ['weapon', 'head', 'chest', 'legs', 'boots'];
  const enhanceable = [];
  for(let i = 0; i < 42; i++){
    const it = inv.slots[i];
    if(it && equipTypes.includes(it.type)) enhanceable.push({item: it, src: 'inv', idx: i});
  }
  for(const slot of equipTypes){
    const it = inv.equipment[slot];
    if(it) enhanceable.push({item: it, src: 'equip', slot});
  }

  const listX = px + 6;
  const listY = py + (isMobile ? 48 : 58);
  const itemH = isMobile ? 34 : 40;
  const listWidth = isMobile ? 160 : 240;
  const maxListItems = Math.min(enhanceable.length, Math.floor((ph - listY - 20) / itemH));
  
  for(let i = 0; i < maxListItems; i++){
    const iy = listY + i * itemH;
    if(mx >= listX && mx <= listX + listWidth && my >= iy && my <= iy + itemH - 3){
      G.anvilSelected = enhanceable[i];
      return;
    }
  }

  if(G.anvilSelected){
    const selX = px + listWidth + 8;
    const selY = py + (isMobile ? 44 : 55);
    const selWidth = pw - listWidth - 14;
    const selHeight = isMobile ? Math.min(ph - selY - 10, 300) : 380;
    const btnW = selWidth - 16;
    const btnH = isMobile ? 36 : 44;
    const btnX = selX + (selWidth - btnW)/2;
    const btnY = selY + selHeight - btnH - 8;
    if(mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH){
      const it = G.anvilSelected.item;
      const en = it.enhance;
      if(en >= 10) return;
      const cost = en >= 6 ? (en + 1) * 300 : (en + 1) * 100;
      if(inv.noah < cost) return;
      inv.noah -= cost;
      let successChance = en < 6 ? 0.60 : (en === 6 ? 0.60 : en === 7 ? 0.70 : en === 8 ? 0.50 : en === 9 ? 0.30 : 0.10);
      if(Math.random() < successChance){
        it.enhance++;
        G.anvilMsg = 'SUCCESS! +' + it.enhance;
        G.anvilMsgTimer = 2;
        G.particles.spawn('spark', G.player.x, G.player.y, '');
      } else if(en >= 6 && Math.random() < (en === 7 ? 0.30 : en === 8 ? 0.50 : en === 9 ? 0.70 : 0.90)){
        G.anvilMsg = 'DESTROYED!';
        G.anvilMsgTimer = 3;
        G.anvilFlash = 1;
        G.particles.spawn('burn', G.player.x, G.player.y, '');
        if(G.anvilSelected.src === 'inv') inv.slots[G.anvilSelected.idx] = null;
        else { inv.equipment[G.anvilSelected.slot] = null; G.player.recalcStats(); }
        G.anvilSelected = null;
      } else {
        G.anvilMsg = 'FAILED!';
        G.anvilMsgTimer = 2;
      }
    }
  }
}

function updateMenuParticles(dt){
  G.menuTimer += dt;
  if(G.menuParticles.length < 60){
    G.menuParticles.push({
      x: rnd(0, W), y: H + 10,
      vx: rnd(-20, 20), vy: rnd(-50, -150),
      color: `hsl(${rnd(30, 60)},100%,${rnd(50, 80)}%)`,
      life: rnd(3, 7), maxLife: rnd(3, 7), r: rnd(2, 5)
    });
  }
  for(let i = G.menuParticles.length - 1; i >= 0; i--){
    const p = G.menuParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if(p.life <= 0 || p.y < -20) G.menuParticles.splice(i, 1);
  }
}

// === MOBILE BUTTON LAYOUT ===
function getMobileBtns(){
  const btnR   = Math.min(28, H * 0.07);
  const atkR   = Math.min(42, H * 0.105);
  const panR   = Math.min(20, H * 0.05);
  const zoomR  = Math.min(20, H * 0.05);
  const pad    = 6;

  const atkX   = W - atkR - pad;
  const atkY   = H - atkR - pad;

  const skillCols = 4;
  const skillRows = 2;
  const cellW  = btnR * 2 + 5;
  const cellH  = btnR * 2 + 5;
  const gridW  = skillCols * cellW;
  const gridH  = skillRows * cellH;
  const gridX  = atkX - atkR - pad - gridW;
  const gridY  = H - gridH - pad;

  const skills = SKILL_ORDER.map((id, i) => {
    const col = i % skillCols;
    const row = Math.floor(i / skillCols);
    return {
      id,
      x: gridX + col * cellW + btnR,
      y: gridY + row * cellH + btnR,
      r: btnR,
    };
  });

  const potion = {
    x: gridX - btnR - pad,
    y: H - btnR - pad,
    r: btnR,
  };

  const zoomMinus = {
    x: zoomR + pad + 10,
    y: H - zoomR * 2 - pad - 10,
    r: zoomR,
    delta: -0.2
  };
  
  const zoomPlus = {
    x: zoomMinus.x + zoomR * 2 + 15,
    y: zoomMinus.y,
    r: zoomR,
    delta: 0.2
  };

  const panelDefs = [
    { panel:'inventory', label:'INV', color:'#c80' },
    { panel:'skills',    label:'SKL', color:'#80f' },
    { panel:'quests',    label:'QST', color:'#0a0' },
    { panel:'anvil',     label:'ANV', color:'#f60' },
    { panel:'market',    label:'MKT', color:'#2a8' },
  ];
  const panels = panelDefs.map((pd, i) => ({
    ...pd,
    x: W - (panelDefs.length - i) * (panR * 2 + 5) + panR + 3,
    y: panR + pad,
    r: panR,
  }));

  return { atk:{ x: atkX, y: atkY, r: atkR }, skills, panels, potion, zoomMinus, zoomPlus };
}

  if(!isMobile) return;

  for(const pb of btns.panels){
    const active = G.state === pb.panel;
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = active ? pb.color : 'rgba(20,15,5,0.85)';
    ctx.beginPath();
    ctx.arc(pb.x, pb.y, pb.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = pb.color;
    ctx.lineWidth = active ? 2 : 1.5;
    ctx.stroke();
    ctx.fillStyle = active ? '#000' : pb.color;
    ctx.font = `bold 9px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(pb.label, pb.x, pb.y + 3);
  }

  const atk = btns.atk;
  const atkPulse = Math.sin(Date.now() * 0.006) * 0.12 + 0.88;
  ctx.globalAlpha = 0.9 * atkPulse;
  ctx.shadowColor = '#f22';
  ctx.shadowBlur = 18;
  ctx.fillStyle = 'rgba(160,20,20,0.85)';
  ctx.beginPath();
  ctx.arc(atk.x, atk.y, atk.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold 16px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('⚔', atk.x, atk.y - 4);
  ctx.font = `bold 10px Arial`;
  ctx.fillText('ATK', atk.x, atk.y + 12);
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  for(const sb of btns.skills){
    const def = SKILL_DEFS[sb.id];
    const lv  = G.skills.skills[sb.id];
    const cd  = G.skills.cooldowns[sb.id];
    const unlocked = lv > 0 && p.level >= def.unlockLv;
    const hasMP = p.mp >= def.mp;

    ctx.globalAlpha = unlocked ? 0.92 : 0.45;

    if(unlocked){
      ctx.fillStyle = hasMP ? 'rgba(15,10,25,0.88)' : 'rgba(30,10,10,0.88)';
    } else {
      ctx.fillStyle = 'rgba(15,15,15,0.75)';
    }
    ctx.beginPath();
    ctx.arc(sb.x, sb.y, sb.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = unlocked ? (cd > 0 ? '#555' : def.color) : '#333';
    ctx.lineWidth = unlocked ? 2 : 1;
    ctx.stroke();

    if(unlocked){
      ctx.fillStyle = def.color;
      ctx.globalAlpha = cd > 0 ? 0.25 : 0.55;
      ctx.beginPath();
      ctx.arc(sb.x, sb.y, sb.r, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = cd > 0 ? '#888' : '#fff';
      ctx.font = `bold 10px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(def.name.slice(0, 3), sb.x, sb.y - 2);
      ctx.fillStyle = '#fd0';
      ctx.font = `8px Arial`;
      ctx.fillText('Lv' + lv, sb.x, sb.y + 11);
      if(cd > 0){
        const cdRatio = Math.min(cd / def.cd, 1);
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.beginPath();
        ctx.moveTo(sb.x, sb.y);
        ctx.arc(sb.x, sb.y, sb.r, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * cdRatio);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `bold 11px Arial`;
        ctx.fillText(Math.ceil(cd), sb.x, sb.y + 5);
      }
    } else {
      ctx.fillStyle = '#555';
      ctx.font = `8px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('Lv' + def.unlockLv, sb.x, sb.y - 2);
      ctx.fillStyle = '#333';
      ctx.font = `7px Arial`;
      ctx.fillText(def.name.slice(0, 4), sb.x, sb.y + 10);
    }
    ctx.globalAlpha = 1;
  }

  const potBtn = btns.potion;
  const potSlot = p.inventory.slots.findIndex(s => s && s.type === 'potion' && s.heal);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = potSlot >= 0 ? 'rgba(100,0,0,0.85)' : 'rgba(30,30,30,0.7)';
  ctx.beginPath();
  ctx.arc(potBtn.x, potBtn.y, potBtn.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = potSlot >= 0 ? '#f44' : '#444';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = potSlot >= 0 ? '#fff' : '#555';
  ctx.font = `bold 9px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('🧪', potBtn.x, potBtn.y + 2);
  ctx.font = `7px Arial`;
  ctx.fillText('POT', potBtn.x, potBtn.y + 12);
  ctx.globalAlpha = 1;

  // Zoom butonları
  const zoomBtns = [btns.zoomMinus, btns.zoomPlus];
  const zoomLabels = ['−', '+'];
  zoomBtns.forEach((btn, i) => {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = 'rgba(40,40,50,0.9)';
    ctx.beginPath();
    ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.floor(btn.r * 0.8)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(zoomLabels[i], btn.x, btn.y + btn.r/3);
  });
  ctx.globalAlpha = 1;
}

// === INPUT HANDLERS (düzeltilmiş koordinat dönüşümü ile) ===
function toCanvasCoords(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function handleMenuInteraction(clientX, clientY){
  if(G.state !== 'menu') return false;
  const { x: mx, y: my } = toCanvasCoords(clientX, clientY);
  const btnW = isMobile ? Math.min(220, W * 0.55) : 240;
  const btnH = isMobile ? 46 : 50;
  const btnGap = isMobile ? 58 : 64;
  for(let i = 0; i < 3; i++){
    const by = H/2 - 20 + i * btnGap;
    const bx = W/2 - btnW/2;
    if(mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH){
      if(i === 0){ initGame(true); G.state = 'playing'; }
      else if(i === 1 && hasSave()){ initGame(false); G.state = 'playing'; }
      return true;
    }
  }
  return false;
}

function setupInput(){
  document.addEventListener('keydown', e => {
    G.keys[e.code] = true;
    if(G.state === 'playing' || G.state === 'inventory' || G.state === 'skills' || G.state === 'quests' || G.state === 'anvil' || G.state === 'stat' || G.state === 'market'){
      if(G.state === 'playing'){
        const skillKeys = ['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5', 'Digit6', 'Digit7'];
        const si = skillKeys.indexOf(e.code);
        if(si >= 0 && si < SKILL_ORDER.length) G.skills.use(SKILL_ORDER[si], G.player, G.mobs);
      }
      if(e.code === 'KeyI'){ G.state = G.state === 'inventory' ? 'playing' : 'inventory'; e.preventDefault(); }
      if(e.code === 'KeyK'){ G.state = G.state === 'skills' ? 'playing' : 'skills'; e.preventDefault(); }
      if(e.code === 'KeyJ'){ G.state = G.state === 'quests' ? 'playing' : 'quests'; e.preventDefault(); }
      if(e.code === 'KeyU'){ G.state = G.state === 'anvil' ? 'playing' : 'anvil'; e.preventDefault(); }
      if(e.code === 'KeyM'){ G.state = G.state === 'market' ? 'playing' : 'market'; e.preventDefault(); }
      if(e.code === 'KeyP'){
        if(G.state === 'stat'){ applyStatPanel(); G.state = 'playing'; }
        else { G.statPanelStats = null; G.state = 'stat'; }
        e.preventDefault();
      }
      if(e.code === 'Escape'){
        if(G.state !== 'playing') G.state = 'playing';
        else G.state = 'menu';
        e.preventDefault();
      }
      if(e.code === 'F5'){ e.preventDefault(); saveGame(); G.particles.spawn('heal', G.player.x, G.player.y, 'Saved!'); }
      if(e.code === 'F9'){ e.preventDefault(); loadGame(); G.particles.spawn('heal', G.player.x, G.player.y, 'Loaded!'); }
    }
  });
  document.addEventListener('keyup', e => { G.keys[e.code] = false; });

  canvas.addEventListener('mousemove', e => {
    const { x: mx, y: my } = toCanvasCoords(e.clientX, e.clientY);
    G.mouseX = mx; G.mouseY = my;
    if(G.state === 'inventory'){
      const p = G.player;
      const pw = Math.min(isMobile ? W - 16 : 640, W - 20);
      const ph = Math.min(isMobile ? H - 20 : 460, H - 20);
      const px2 = (W - pw) / 2;
      const py2 = (H - ph) / 2;
      const slotSize = isMobile ? Math.min(45, Math.floor((pw - 50) / 6)) : 48;
      const slotPad = isMobile ? 2 : 4;
      const gridX = px2 + (isMobile ? 6 : 15);
      const gridY = py2 + (isMobile ? 44 : 55);
      G.hoveredSlot = -1;
      G.hoveredEquip = null;
      for(let i = 0; i < 42; i++){
        const col = i % 6;
        const row = Math.floor(i / 6);
        const sx = gridX + col * (slotSize + slotPad);
        const sy = gridY + row * (slotSize + slotPad);
        if(G.mouseX >= sx && G.mouseX <= sx + slotSize && G.mouseY >= sy && G.mouseY <= sy + slotSize) G.hoveredSlot = i;
      }
      const eqX = px2 + (6 * (slotSize + slotPad)) + (isMobile ? 4 : 15);
      const equipSlotHeight = isMobile ? 36 : 50;
      const equipSlotDefs = [
        {key:'weapon', y: gridY + 26},
        {key:'head',   y: gridY + 26 + equipSlotHeight + (isMobile ? 2 : 4)},
        {key:'chest',  y: gridY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 2},
        {key:'legs',   y: gridY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 3},
        {key:'boots',  y: gridY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 4}
      ];
      const eqWidth = isMobile ? Math.min(130, pw - (eqX - px2) - 8) : 270;
      for(const es of equipSlotDefs){
        if(G.mouseX >= eqX && G.mouseX <= eqX + eqWidth && G.mouseY >= es.y && G.mouseY <= es.y + equipSlotHeight){
          G.hoveredEquip = es.key;
        }
      }
    }
  });

  canvas.addEventListener('click', e => {
    const { x: mx, y: my } = toCanvasCoords(e.clientX, e.clientY);
    if(G.state === 'menu'){
      handleMenuInteraction(e.clientX, e.clientY);
      e.preventDefault();
      return;
    }
    if(G.state === 'dead'){
      const btnW = isMobile ? 110 : 120;
      const btnH = isMobile ? 40 : 44;
      if(mx >= W/2 - btnW - 8 && mx <= W/2 - 8 && my >= H/2 + (isMobile ? 20 : 20) && my <= H/2 + (isMobile ? 20 : 20) + btnH){
        G.player.x = 500; G.player.y = 500;
        G.player.hp = Math.floor(G.player.maxHp * 0.5);
        G.player.mp = G.player.maxMp;
        G.camera.x = 500; G.camera.y = 500;
        G.state = 'playing';
      }
      if(mx >= W/2 + 8 && mx <= W/2 + btnW + 8 && my >= H/2 + (isMobile ? 20 : 20) && my <= H/2 + (isMobile ? 20 : 20) + btnH){
        loadGame();
        G.player.hp = Math.floor(G.player.maxHp * 0.5);
        G.camera.x = G.player.x;
        G.camera.y = G.player.y;
        G.state = 'playing';
      }
      return;
    }
    if(G.state === 'inventory'){
      const p = G.player;
      const pw = Math.min(isMobile ? W - 16 : 640, W - 20);
      const ph = Math.min(isMobile ? H - 20 : 460, H - 20);
      const px2 = (W - pw) / 2;
      const py2 = (H - ph) / 2;
      const slotSize = isMobile ? Math.min(45, Math.floor((pw - 50) / 6)) : 48;
      const slotPad = isMobile ? 2 : 4;
      const gridX = px2 + (isMobile ? 6 : 15);
      const gridY = py2 + (isMobile ? 44 : 55);
      for(let i = 0; i < 42; i++){
        const col = i % 6;
        const row = Math.floor(i / 6);
        const sx = gridX + col * (slotSize + slotPad);
        const sy = gridY + row * (slotSize + slotPad);
        if(mx >= sx && mx <= sx + slotSize && my >= sy && my <= sy + slotSize){
          const item = p.inventory.slots[i];
          if(item){
            if(e.shiftKey){
              G.groundItems.push({x: p.x + rnd(-30, 30), y: p.y + rnd(-30, 30), item, glowTimer: 0});
              p.inventory.slots[i] = null;
            } else {
              const equipTypes = ['weapon', 'head', 'chest', 'legs', 'boots'];
              if(equipTypes.includes(item.type)) p.inventory.equip(i, p);
              else p.inventory.usePotion(i, p);
            }
          }
          return;
        }
      }
      const eqX = px2 + (6 * (slotSize + slotPad)) + (isMobile ? 4 : 15);
      const equipSlotHeight = isMobile ? 36 : 50;
      const equipSlotDefs = [
        {key:'weapon', y: gridY + 26},
        {key:'head',   y: gridY + 26 + equipSlotHeight + (isMobile ? 2 : 4)},
        {key:'chest',  y: gridY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 2},
        {key:'legs',   y: gridY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 3},
        {key:'boots',  y: gridY + 26 + (equipSlotHeight + (isMobile ? 2 : 4)) * 4}
      ];
      const eqWidth = isMobile ? Math.min(130, pw - (eqX - px2) - 8) : 270;
      for(const es of equipSlotDefs){
        if(mx >= eqX && mx <= eqX + eqWidth && my >= es.y && my <= es.y + equipSlotHeight){
          p.inventory.unequip(es.key, p);
          return;
        }
      }
      const autoSellX = eqX;
      const autoSellY = isMobile ? py2 + ph - 36 : gridY + (equipSlotHeight + 4) * 5 + 120;
      const autoSellW = eqWidth;
      const autoSellH = isMobile ? 28 : 38;
      if(mx >= autoSellX && mx <= autoSellX + autoSellW && my >= autoSellY && my <= autoSellY + autoSellH){
        p.inventory.autoSellMaterials = !p.inventory.autoSellMaterials;
        return;
      }
      return;
    }
    if(G.state === 'skills'){
      const pw = isMobile ? W - 10 : 560;
      const ph = isMobile ? H - 20 : 500;
      const px2 = (W - pw) / 2;
      const py2 = (H - ph) / 2;
      const skillItemHeight = isMobile ? 52 : 58;
      const startY = py2 + (isMobile ? 56 : 65);
      const maxItems = Math.min(SKILL_ORDER.length, Math.floor((ph - startY - 15) / skillItemHeight));
      for(let i = 0; i < maxItems; i++){
        const id = SKILL_ORDER[i];
        const def = SKILL_DEFS[id];
        const lv = G.skills.skills[id];
        const sy = startY + i * skillItemHeight;
        const btnWidth = isMobile ? 45 : 50;
        const btnHeight = isMobile ? 24 : 28;
        if(mx >= px2 + pw - btnWidth - 8 && mx <= px2 + pw - 8 && my >= sy + (skillItemHeight - btnHeight)/2 && my <= sy + (skillItemHeight - btnHeight)/2 + btnHeight){
          if(G.player.level >= def.unlockLv && lv < def.maxLv && G.player.skillPoints > 0){
            G.skills.upgrade(id, G.player);
          }
          return;
        }
      }
      return;
    }
    if(G.state === 'quests'){
      const pw = isMobile ? W - 10 : 560;
      const ph = isMobile ? H - 20 : 480;
      const px2 = (W - pw) / 2;
      const py2 = (H - ph) / 2;
      const tabWidth = isMobile ? (pw - 24) / 3 : 170;
      const tabs = ['active', 'available', 'completed'];
      for(let i = 0; i < tabs.length; i++){
        const tx = px2 + 6 + i * (tabWidth + 3);
        const ty = py2 + (isMobile ? 36 : 38);
        if(mx >= tx && mx <= tx + tabWidth && my >= ty && my <= ty + (isMobile ? 22 : 24)){
          G.questTab = tabs[i];
          return;
        }
      }
      let quests;
      if(G.questTab === 'active') quests = G.quests.getActive();
      else if(G.questTab === 'available') quests = G.quests.getAvailable();
      else quests = G.quests.getCompleted();
      const listY = py2 + (isMobile ? 62 : 72);
      const maxItems = Math.floor((ph - listY - 15) / (isMobile ? 80 : 90));
      for(let i = 0; i < Math.min(quests.length, maxItems); i++){
        const q = quests[i];
        const qy = listY + i * (isMobile ? 80 : 90);
        const btnWidth = isMobile ? 60 : 75;
        const btnHeight = isMobile ? 22 : 28;
        if(G.questTab === 'available'){
          if(mx >= px2 + pw - btnWidth - 10 && mx <= px2 + pw - 10 && my >= qy + (isMobile ? 26 : 27) && my <= qy + (isMobile ? 26 : 27) + btnHeight){
            G.quests.accept(q.id);
            return;
          }
        } else if(G.questTab === 'active'){
          if(mx >= px2 + pw - btnWidth - 10 && mx <= px2 + pw - 10 && my >= qy + (isMobile ? 26 : 27) && my <= qy + (isMobile ? 26 : 27) + btnHeight){
            G.quests.abandon(q.id);
            return;
          }
        }
      }
      return;
    }
    if(G.state === 'stat'){
      handleStatPanelClick(mx, my);
      return;
    }
    if(G.state === 'anvil'){
      handleAnvilClick(mx, my);
      return;
    }
    if(G.state === 'market'){
      handleMarketClick(mx, my);
      return;
    }
  });

  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    if(G.state === 'playing'){
      const cam = G.camera;
      const { x: canvasX, y: canvasY } = toCanvasCoords(e.clientX, e.clientY);
      G.player.moveTarget = {
        x: canvasX - W/2 + cam.x,
        y: canvasY - H/2 + cam.y
      };
    }
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const touches = e.changedTouches;
    if(G.state === 'menu' && touches.length > 0){
      handleMenuInteraction(touches[0].clientX, touches[0].clientY);
      return;
    }
    for(const t of touches){
      const { x: tx, y: ty } = toCanvasCoords(t.clientX, t.clientY);
      if(tx < W * 0.45 && G.joystick.touchId === null){
        G.joystick.onTouchStart(t);
        continue;
      }
      if(G.state === 'playing'){
        const btns = getMobileBtns();
        
        // Zoom butonları
        if(Math.hypot(tx - btns.zoomMinus.x, ty - btns.zoomMinus.y) < btns.zoomMinus.r + 8){
          G.camera.adjustZoom(btns.zoomMinus.delta);
          continue;
        }
        if(Math.hypot(tx - btns.zoomPlus.x, ty - btns.zoomPlus.y) < btns.zoomPlus.r + 8){
          G.camera.adjustZoom(btns.zoomPlus.delta);
          continue;
        }
        
        if(Math.hypot(tx - btns.atk.x, ty - btns.atk.y) < btns.atk.r + 8){
          G.forceAttack = true;
          continue;
        }
        let hitSkill = false;
        for(const sb of btns.skills){
          if(Math.hypot(tx - sb.x, ty - sb.y) < sb.r + 6){
            G.skills.use(sb.id, G.player, G.mobs);
            hitSkill = true;
            break;
          }
        }
        if(hitSkill) continue;
        if(Math.hypot(tx - btns.potion.x, ty - btns.potion.y) < btns.potion.r + 6){
          const potSlot = G.player.inventory.slots.findIndex(s => s && s.type === 'potion' && (s.heal || s.mp));
          if(potSlot >= 0) G.player.inventory.usePotion(potSlot, G.player);
          continue;
        }
        for(const pb of btns.panels){
          if(Math.hypot(tx - pb.x, ty - pb.y) < pb.r + 6){
            G.state = G.state === pb.panel ? 'playing' : pb.panel;
            break;
          }
        }
      } else {
        const btns = getMobileBtns();
        for(const pb of btns.panels){
          if(Math.hypot(tx - pb.x, ty - pb.y) < pb.r + 6){
            G.state = G.state === pb.panel ? 'playing' : pb.panel;
            break;
          }
        }
      }
    }
  }, {passive: false});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for(const t of e.changedTouches) G.joystick.onTouchMove(t);
  }, {passive: false});

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for(const t of e.changedTouches){
      G.joystick.onTouchEnd(t);
      G.forceAttack = false;
    }
  }, {passive: false});

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    if(G.joystick){ G.joystick.resetBase(); }
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(() => {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      if(G.joystick){ G.joystick.resetBase(); }
    }, 300);
  });
}

// === MAIN GAME LOOP ===
let lastTime = 0;
function gameLoop(ts){
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);

  if(G.state === 'menu'){
    updateMenuParticles(dt);
    drawMenuScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  if(G.state === 'dead'){
    if(G.world) G.world.draw(G.camera);
    drawDeathScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  if(G.state === 'playing'){
    G.player.update(dt, G.keys, G.mobs);
    G.camera.follow(G.player, dt);
    G.skills.update(dt);
    G.quests.update(G.player);
    G.quests.checkNoah(G.player.inventory.noah);

    for(const mob of G.mobs){
      if(mob.dead){
        if(mob.respawnTimer > 0){
          mob.respawnTimer -= dt;
          if(mob.respawnTimer <= 0) mob.respawn();
        }
      } else {
        mob.update(dt, G.player);
      }
    }

    G.particles.update(dt);

    if(G.pendingStatScreen){
      G.pendingStatScreen = false;
      G.statPanelStats = null;
      G.state = 'stat';
    }
  } else {
    G.particles.update(dt);
    G.camera.follow(G.player, dt);
    G.skills.update(dt);
    G.quests.update(G.player);
    G.quests.checkNoah(G.player.inventory.noah);
  }

  G.world.draw(G.camera);
  drawGroundItems(G.camera);

  for(const mob of G.mobs){
    if(!mob.dead || mob.deadTimer > 0) mob.draw(G.camera);
  }

  G.player.draw(G.camera);
  G.particles.draw(G.camera);
  drawHUD();
  drawMobileUI();

  if(G.state === 'inventory') drawInventoryPanel();
  else if(G.state === 'skills') drawSkillPanel();
  else if(G.state === 'quests') drawQuestPanel();
  else if(G.state === 'stat') drawStatPanel();
  else if(G.state === 'anvil') drawAnvilPanel();
  else if(G.state === 'market') drawMarketPanel();

  requestAnimationFrame(gameLoop);
}

// === STARTUP ===
setupInput();

G.menuParticles = [];
G.menuTimer = 0;
G.rainbowAngle = 0;

requestAnimationFrame(gameLoop);
}; // end window.onload
</script>
</body>
</html>
