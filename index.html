const SHOP_SLOT = 44, SHOP_GAP = 4;
/** Dikey d\u00fczen: varsay\u0131lan s\u00fctun say\u0131s\u0131; yatayda _layout i\u00e7inde art\u0131r\u0131l\u0131r. */
const SHOP_COLS_DEFAULT = 4;

class Shop {
  constructor() {
    this.open = false;
    this.shopName = "";
    this.stock = [];
    this._template = null;
    this.shopPoolKey = "village";
    this.specialPhase = 0;
    this.specialT = 0;
    this.tab = 0;
    this.scrollBuy = 0;
    this.scrollSell = 0;
    this.tooltipItem = null;
    this.tooltipBuyPrice = null;
    this.tooltipSpecial = false;
    this.tooltipX = 0;
    this.tooltipY = 0;
    this.feedbackText = "";
    this.feedbackTimer = 0;
    this.feedbackColor = "#50e050";
    this.sellPicker = null;
    /** Sat\u0131n al onay diyalo\u011fu: { stockIndex, itemId } */
    this.buyPicker = null;
    /** Son \u00e7izilen sat\u0131n al diyalo\u011fu i\u00e7in boyut (\u0131mle\u00e7a t\u0131klamas\u0131 ile ayn\u0131 hizada). */
    this._buyPickerMetrics = null;
    /** Ma\u011faza ızgaras\u0131 dikey kayd\u0131rma (dokunmatik). */
    this.gridScrollTouchId = -1;
    this.gridScrollLastY = 0;
  }

  openShop(name, template, poolKey) {
    charPanel.close();
    this.shopName = name;
    this._template = template;
    this.shopPoolKey = poolKey || "village";
    this.rebuildStockFromTemplate();
    this.open = true;
    this.tab = 0;
    this.scrollBuy = 0;
    this.scrollSell = 0;
    this.tooltipItem = null;
    this.tooltipBuyPrice = null;
    this.tooltipSpecial = false;
    this.sellPicker = null;
    this.buyPicker = null;
    this._buyPickerMetrics = null;
    this.gridScrollTouchId = -1;
  }

  rebuildStockFromTemplate() {
    if (!this._template) return;
    const pool = SHOP_SPECIAL_POOLS[this.shopPoolKey] || SHOP_SPECIAL_POOLS.village;
    const n = pool.length;
    let specialIdx = 0;
    this.stock = this._template.map((entry) => {
      if (entry.special) {
        const id = pool[(this.specialPhase + specialIdx++) % n];
        return {
          id,
          qty: 1,
          unlimited: false,
          specialOffer: true,
          price: getShopBuyPriceForItem(id),
        };
      }
      const id = entry.id;
      const unlimited = entry.unlimited === true || SHOP_UNLIMITED_IDS.has(id);
      const qty = unlimited ? 999999 : (entry.qty != null ? entry.qty : 0);
      const price = entry.price != null && entry.price > 0 ? entry.price : getShopBuyPriceForItem(id);
      return {
        id,
        qty,
        unlimited,
        specialOffer: false,
        price,
      };
    });
  }

  close() {
    this.open = false;
    this.tooltipItem = null;
    this.tooltipBuyPrice = null;
    this.tooltipSpecial = false;
    this.sellPicker = null;
    this.buyPicker = null;
    this.gridScrollTouchId = -1;
  }
  toggle() { if (this.open) this.close(); }

  update(dt) {
    if (this.feedbackTimer > 0) this.feedbackTimer -= dt;
    this.specialT += dt;
    while (this.specialT >= SHOP_SPECIAL_ROTATE_SEC) {
      this.specialT -= SHOP_SPECIAL_ROTATE_SEC;
      this.specialPhase++;
      if (this.open) this.rebuildStockFromTemplate();
    }
  }

  _showFeedback(text, color) {
    this.feedbackText = text;
    this.feedbackTimer = 1.5;
    this.feedbackColor = color || "#50e050";
  }

  _layout(cw, ch) {
    const b = uiModalBounds(cw, ch);
    const land = cw > ch * 1.02;
    let pw = land
      ? Math.min(b.maxW, Math.max(320, Math.floor(cw * 0.92)))
      : Math.min(448, b.maxW);
    pw = Math.max(260, pw);
    let ph = land
      ? Math.min(Math.max(168, Math.floor(b.maxH * 0.97)), b.maxH)
      : Math.min(400, b.maxH);
    ph = Math.max(land ? 160 : 200, ph);
    const innerGridW = pw - 32;
    let shopSlot = SHOP_SLOT;
    let shopGap = SHOP_GAP;
    let shopCols = land ? 6 : SHOP_COLS_DEFAULT;
    while (shopCols * (shopSlot + shopGap) - shopGap > innerGridW) {
      if (shopSlot > 26) shopSlot -= 2;
      else if (shopCols > 3) shopCols--;
      else break;
    }
    const shopPriceBand = ph < 260 ? 10 : ph < 280 ? 11 : 14;
    const px = Math.floor((cw - pw) / 2);
    const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
    const tabBuyX = px + 12;
    const tabSellX = px + 12 + (land ? 78 : 100);
    const tabY = land ? py + 14 : py + 38;
    const tabW = land ? 72 : 90;
    const tabH = land ? 18 : 24;
    const gridYStart = land ? py + 44 : py + 96;
    return {
      px, py, pw, ph, shopSlot, shopGap, shopPriceBand, shopCols, shopLand: land,
      tabBuyX, tabSellX, tabY, tabW, tabH, gridYStart,
      canvasW: cw, canvasH: ch,
    };
  }

  _shopRowStride(L) {
    return L.shopSlot + L.shopGap + L.shopPriceBand;
  }

  _buyGridY(L) {
    return L.gridYStart;
  }

  _shopGridClip(L) {
    const gridY = this._buyGridY(L);
    const clipBottom = this.tab === 1 && !this.sellPicker ? L.py + L.ph - 28 : L.py + L.ph - 10;
    return { x: L.px, y: gridY - 2, w: L.pw, h: clipBottom - gridY + 2, gridY, clipBottom };
  }

  _maxScrollBuy(L) {
    const rowStride = this._shopRowStride(L);
    const n = this.stock.length;
    const cols = L.shopCols;
    const rows = Math.ceil(Math.max(1, n) / cols);
    const totalH = rows * rowStride;
    const vis = this._shopGridClip(L).h;
    return Math.max(0, totalH - vis + 6);
  }

  _maxScrollSell(L, inventory) {
    const rowStride = this._shopRowStride(L);
    const n = this._getSellableEntries(inventory).length;
    const cols = L.shopCols;
    const rows = Math.ceil(Math.max(1, n) / cols);
    const totalH = rows * rowStride;
    const vis = this._shopGridClip(L).h;
    return Math.max(0, totalH - vis + 6);
  }

  _shopScrollBtnUp(L) {
    const c = this._shopGridClip(L);
    const bw = 36, bh = 28;
    return { x: L.px + L.pw - bw - 6, y: c.gridY + 2, w: bw, h: bh };
  }

  _shopScrollBtnDown(L) {
    const c = this._shopGridClip(L);
    const bw = 36, bh = 28;
    return { x: L.px + L.pw - bw - 6, y: c.clipBottom - bh - 4, w: bw, h: bh };
  }

  applyTouchGridScroll(pixelDy, cw, ch, inventory) {
    const L = this._layout(cw, ch);
    const maxS = this.tab === 0 ? this._maxScrollBuy(L) : this._maxScrollSell(L, inventory);
    if (maxS <= 0) return;
    if (this.tab === 0) this.scrollBuy = Math.max(0, Math.min(maxS, this.scrollBuy + pixelDy));
    else this.scrollSell = Math.max(0, Math.min(maxS, this.scrollSell + pixelDy));
  }

  tryBeginGridScroll(touchId, mx, my, cw, ch, inventory) {
    if (!this.open || this.buyPicker || (this.tab === 1 && this.sellPicker)) return false;
    const L = this._layout(cw, ch);
    const maxS = this.tab === 0 ? this._maxScrollBuy(L) : this._maxScrollSell(L, inventory);
    if (maxS < 8) return false;
    const clip = this._shopGridClip(L);
    const stripX0 = clip.x + clip.w - 48;
    if (mx < stripX0 || mx > clip.x + clip.w - 2) return false;
    if (my < clip.y || my > clip.y + clip.h) return false;
    const upR = this._shopScrollBtnUp(L), dnR = this._shopScrollBtnDown(L);
    if (this._pointInRect(mx, my, upR) || this._pointInRect(mx, my, dnR)) return false;
    this.gridScrollTouchId = touchId;
    this.gridScrollLastY = my;
    return true;
  }

  _getSellableEntries(inventory) {
    const sellable = [];
    for (const container of [inventory.hotbar, inventory.slots]) {
      for (let i = 0; i < container.length; i++) {
        const slot = container[i];
        if (slot && slot.id !== "coin" && ITEMS[slot.id] && ITEMS[slot.id].sellPrice > 0) {
          sellable.push({ containerRef: container, slotIdx: i, slot });
        }
      }
    }
    return sellable;
  }

  _sellPickerLiveSlot(picker, inventory) {
    if (!picker) return null;
    const slot = picker.containerRef[picker.slotIdx];
    if (!slot || slot.id !== picker.itemId) return null;
    const def = ITEMS[slot.id];
    if (!def || def.sellPrice <= 0) return null;
    return slot;
  }

  _buyDialogWidth(L) {
    const mob = touchState.mobileUI;
    return Math.max(228, Math.min(mob ? 340 : 308, L.pw - 16));
  }

  _buyPickerStatsFallbackH() {
    return touchState.mobileUI ? 168 : 138;
  }

  _buyPickerLayout(L) {
    const mob = touchState.mobileUI;
    const dw = this._buyDialogWidth(L);
    const si = this.buyPicker ? this._getBuyPickerStockEntry(this.buyPicker) : null;
    const metricsOk = this._buyPickerMetrics && this.buyPicker && si &&
      this._buyPickerMetrics.itemId === this.buyPicker.itemId &&
      this._buyPickerMetrics.statsH > 0;
    const sb = metricsOk ? this._buyPickerMetrics.statsH : this._buyPickerStatsFallbackH();
    const headerExtra = metricsOk && this._buyPickerMetrics.headerExtra != null
      ? Math.max(0, this._buyPickerMetrics.headerExtra)
      : 0;
    const btnH = mob ? 34 : 32;
    const bottomPad = 14;
    const titleH = mob ? 30 : 28;
    const isz = mob ? 42 : 40;
    const statsGap = 10;
    const goldBlock = mob ? 58 : 50;
    const adetH = 22;
    const trackGap = mob ? 12 : 10;
    const belowTrack = mob ? 34 : 32;
    const trackH = 12;
    const relIy = titleH;
    const relStatsY = relIy + isz + statsGap + headerExtra;
    const relGoldY = relStatsY + sb + 10;
    const relAdetY = relGoldY + goldBlock;
    const relTrackY = relAdetY + adetH + trackGap;
    const relBtnY = relTrackY + belowTrack;
    const minH = relBtnY + btnH + bottomPad;
    const ch0 = (L.canvasH != null && L.canvasH > 0) ? L.canvasH : 600;
    // Yatay modda market paneli d\u00fc\u015f\u00fck: maks. y\u00fckseklik t\u00fcm ekran (L.ph de\u011fil) — yoksa h < minH olup butonlar pencerenin d\u0131\u015f\u0131na d\u00fc\u015f\u00fcyor
    const dhCap = Math.min(600, ch0 - 12);
    let h = Math.max(200, Math.min(dhCap, minH));
    const dX = Math.floor(L.px + (L.pw - dw) / 2);
    const needsBottomLayout = h + 0.5 < minH;
    let dY = Math.max(4, Math.min((ch0 - h) * 0.5, ch0 - h - 4));
    let statsY, trackY, btnY, iy, goldY, adetY;
    if (needsBottomLayout) {
      h = Math.max(200, Math.min(dhCap, minH, ch0 - 8));
      dY = Math.max(4, Math.min((ch0 - h) * 0.5, ch0 - h - 4));
      btnY = dY + h - bottomPad - btnH;
      trackY = btnY - belowTrack;
      adetY = trackY - trackGap - adetH;
      goldY = adetY - goldBlock;
      statsY = goldY - 10 - sb;
      iy = dY + relIy;
      const minStatsY = iy + isz + statsGap + headerExtra;
      if (statsY < minStatsY) {
        statsY = minStatsY;
        const maxGoldY = statsY + sb + 10;
        if (goldY < maxGoldY) goldY = maxGoldY;
        adetY = goldY + goldBlock;
        trackY = adetY + adetH + trackGap;
        btnY = trackY + belowTrack;
        if (btnY + btnH + bottomPad > dY + h + 0.5) {
          btnY = dY + h - bottomPad - btnH;
          trackY = btnY - belowTrack;
          adetY = trackY - trackGap - adetH;
        }
      }
    } else {
      iy = dY + relIy;
      statsY = dY + relStatsY;
      trackY = dY + relTrackY;
      btnY = dY + relBtnY;
      goldY = dY + relGoldY;
      adetY = dY + relAdetY;
    }
    const d = { x: dX, y: dY, w: dw, h };
    const track = { x: d.x + (mob ? 44 : 42), y: trackY, w: d.w - (mob ? 128 : 126), h: trackH };
    const btnMinus = { x: track.x - (mob ? 38 : 36), y: track.y - 5, w: mob ? 32 : 30, h: mob ? 24 : 22 };
    const btnPlus = { x: track.x + track.w + 6, y: track.y - 5, w: mob ? 32 : 30, h: mob ? 24 : 22 };
    const btnMax = { x: d.x + d.w - (mob ? 78 : 76), y: track.y - 8, w: mob ? 68 : 66, h: mob ? 30 : 28 };
    const gapB = 10;
    const btnW = Math.floor((d.w - 40 - gapB) / 2);
    const btnBuy = { x: d.x + 20, y: btnY, w: btnW, h: btnH };
    const btnCancel = { x: d.x + 20 + btnW + gapB, y: btnY, w: btnW, h: btnH };
    return { dialog: d, track, btnMinus, btnPlus, btnMax, btnBuy, btnCancel, statsY, ix: d.x + 18, iy, isz, statsBlockH: sb, goldY, adetY };
  }

  _getBuyPickerStockEntry(picker) {
    if (!picker || picker.stockIndex == null) return null;
    const si = this.stock[picker.stockIndex];
    if (!si || si.id !== picker.itemId) return null;
    return si;
  }

  _shopUnitPrice(si) {
    const def = ITEMS[si.id];
    if (!def) return 0;
    return si.price != null && si.price > 0 ? si.price : (def.buyPrice > 0 ? def.buyPrice : getShopBuyPriceForItem(si.id));
  }

  /** Ayn\u0131 anda al\u0131nabilecek \u00fcst s\u0131n\u0131r: stok, alt\u0131n, envanter bo\u015flu\u011fu. */
  _shopMaxBuyable(inventory, si) {
    const def = ITEMS[si.id];
    if (!def) return 0;
    const price = this._shopUnitPrice(si);
    const byInv = inventory.countAddable(si.id, 9999);
    const byStock = si.unlimited ? 999 : si.qty;
    if (price <= 0) return Math.max(0, Math.min(byStock, byInv));
    const gold = inventory.countItem("coin");
    const byGold = Math.floor(gold / price);
    return Math.max(0, Math.min(byStock, byGold, byInv));
  }

  _executeBuyOne(inventory, picker) {
    const si = this._getBuyPickerStockEntry(picker);
    if (!si) return false;
    const def = ITEMS[si.id];
    if (!def) return false;
    const price = this._shopUnitPrice(si);
    const maxB = this._shopMaxBuyable(inventory, si);
    if (maxB <= 0) {
      this._showFeedback(!si.unlimited && si.qty <= 0 ? "Stok t\u00fckendi!" : "Envantere s\u0131\u011fm\u0131yor!", "#d04040");
      return false;
    }
    const n = Math.max(1, Math.min(picker.amount != null ? picker.amount : 1, maxB));
    const total = price * n;
    const gold = inventory.countItem("coin");
    if (gold < total) {
      this._showFeedback("Yeterli alt\u0131n yok!", "#d04040");
      return false;
    }
    if (!si.unlimited && si.qty < n) {
      this._showFeedback("Stok yetersiz!", "#d04040");
      return false;
    }
    inventory.removeItem("coin", total);
    const left = inventory.addItem(si.id, n);
    const added = n - left;
    if (left > 0) inventory.addItem("coin", price * left);
    if (!si.unlimited) si.qty -= added;
    if (added <= 0) {
      this._showFeedback("Envantere s\u0131\u011fm\u0131yor!", "#d04040");
      return false;
    }
    if (left > 0) {
      this._showFeedback(added + "x " + def.name + " al\u0131nd\u0131 (-" + (price * added) + "g). " + left + " adet i\u00e7in yer yoktu.", "#d0a030");
    } else if (added > 1) {
      this._showFeedback(added + "x " + def.name + " sat\u0131n al\u0131nd\u0131! -" + total + " alt\u0131n");
    } else {
      this._showFeedback(def.name + " sat\u0131n al\u0131nd\u0131! -" + total + " alt\u0131n");
    }
    return true;
  }

  _renderBuyPicker(ctx, L, inventory) {
    const picker = this.buyPicker;
    if (!picker) return;
    const si = this._getBuyPickerStockEntry(picker);
    if (!si) {
      this.buyPicker = null;
      return;
    }
    const def = ITEMS[si.id];
    if (!def) {
      this.buyPicker = null;
      return;
    }
    const gold = inventory.countItem("coin");
    const price = this._shopUnitPrice(si);
    const maxB = this._shopMaxBuyable(inventory, si);
    let amt = picker.amount != null ? picker.amount : 1;
    amt = Math.max(1, Math.min(amt, maxB));
    picker.amount = amt;
    const total = price * amt;
    const canBuy = maxB > 0 && gold >= total;
    const mob = touchState.mobileUI;
    const dw = this._buyDialogWidth(L);
    const iszPre = mob ? 42 : 40;
    const statsGapPre = 10;
    const nameFont = mob ? "bold 14px monospace" : "bold 13px monospace";
    const nameStart = mob ? 14 : 12;
    const nameLineH = mob ? 18 : 16;
    const maxNameLines = mob ? 3 : 2;
    const nameMaxW = Math.max(60, dw - 46 - iszPre);
    const nameLinesAll = wrapTextToLinesWithFont(ctx, def.name || "?", nameMaxW, nameFont);
    const nameLines = nameLinesAll.slice(0, maxNameLines);
    const tailH = nameLinesAll.length > nameLines.length ? (mob ? 12 : 11) : 0;
    const headerExtra = Math.max(0, nameStart + nameLines.length * nameLineH + tailH - iszPre - statsGapPre);

    const innerMax = Math.max(72, dw - 40);
    const statsLayout = buildItemTooltipLayout(ctx, def, si.id, L.pw, mob, { omitPrices: true, omitIdentity: true, innerMax });
    this._buyPickerMetrics = { itemId: si.id, statsH: statsLayout.th, headerExtra };
    const B = this._buyPickerLayout(L);
    const d = B.dialog;

    ctx.fillStyle = "rgba(0,0,0,0.5)";
    const cww = (L.canvasW > 0 ? L.canvasW : L.px + L.pw + 40);
    const cwh = (L.canvasH > 0 ? L.canvasH : L.py + L.ph + 40);
    ctx.fillRect(0, 0, cww, cwh);

    ctx.fillStyle = "rgba(18,22,42,0.98)";
    ctx.strokeStyle = "#60a070";
    ctx.lineWidth = 2;
    roundRect(ctx, d.x, d.y, d.w, d.h, 10);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#f0d050";
    ctx.font = mob ? "bold 16px monospace" : "bold 14px monospace";
    ctx.fillText("Sat\u0131n al", d.x + 16, d.y + (mob ? 24 : 22));

    const ix = B.ix, iy = B.iy, isz = B.isz;
    ctx.fillStyle = "rgba(40,45,65,0.95)";
    roundRect(ctx, ix, iy, isz, isz, 6);
    ctx.strokeStyle = "#606080";
    ctx.stroke();
    drawItemIconFancy(ctx, si.id, ix + 5, iy + 4, isz - 10, {});

    ctx.font = nameFont;
    let ny = iy + nameStart;
    ctx.fillStyle = "#e8e8f0";
    for (let ni = 0; ni < nameLines.length; ni++) {
      ctx.fillText(nameLines[ni], ix + isz + 12, ny);
      ny += nameLineH;
    }
    if (nameLinesAll.length > nameLines.length) {
      ctx.fillStyle = "#9898b0";
      ctx.font = mob ? "11px monospace" : "10px monospace";
      ctx.fillText("...", ix + isz + 12, ny);
    }

    const statsBoxH = B.statsBlockH + 6;
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    roundRect(ctx, d.x + 10, B.statsY - 4, d.w - 20, Math.max(statsBoxH, statsLayout.th + 4), 6);
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, d.x + 8, B.statsY - 6, d.w - 16, Math.max(statsBoxH, statsLayout.th + 6) + 2, 6);
    ctx.clip();
    drawItemTooltipTextOnly(ctx, d.x + 14 - statsLayout.padX, B.statsY, statsLayout, mob);
    ctx.restore();

    const gFont = mob ? "13px monospace" : "11px monospace";
    const gY = B.goldY;
    ctx.fillStyle = "#c8d8f0";
    ctx.font = gFont;
    ctx.fillText("Birim fiyat: " + price + " alt\u0131n", d.x + 16, gY + (mob ? 14 : 12));
    ctx.fillText("En fazla al\u0131nabilir: " + maxB + " adet", d.x + 16, gY + (mob ? 34 : 30));
    ctx.fillStyle = gold >= total ? "#d8e8b0" : "#e8b0a0";
    ctx.fillText("Paran: " + gold + " alt\u0131n", d.x + 16, gY + (mob ? 54 : 48));

    ctx.fillStyle = "#d8e0f8";
    ctx.font = mob ? "13px monospace" : "11px monospace";
    ctx.fillText("Adet: " + amt + "  \u2192  Toplam: " + total + " alt\u0131n", d.x + 16, B.adetY + (mob ? 14 : 12));

    const tr = B.track;
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(ctx, tr.x, tr.y, tr.w, tr.h, 4);
    ctx.fill();
    ctx.strokeStyle = "#606080";
    ctx.lineWidth = 1;
    ctx.strokeRect(tr.x, tr.y, tr.w, tr.h);
    const tThumb = maxB <= 1 ? 0.5 : (amt - 1) / (maxB - 1);
    const cx = tr.x + tThumb * tr.w;
    ctx.fillStyle = "#f0e8c0";
    ctx.beginPath();
    ctx.arc(cx, tr.y + tr.h / 2, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#c0a050";
    ctx.stroke();

    ctx.fillStyle = "#c8c8e8";
    ctx.font = "bold 14px monospace";
    ctx.fillText("\u2212", B.btnMinus.x + 9, B.btnMinus.y + 16);
    ctx.fillText("+", B.btnPlus.x + 10, B.btnPlus.y + 16);
    ctx.strokeStyle = "#707090";
    roundRect(ctx, B.btnMinus.x, B.btnMinus.y, B.btnMinus.w, B.btnMinus.h, 3);
    ctx.stroke();
    roundRect(ctx, B.btnPlus.x, B.btnPlus.y, B.btnPlus.w, B.btnPlus.h, 3);
    ctx.stroke();

    ctx.fillStyle = "rgba(70,90,130,0.9)";
    ctx.strokeStyle = "#8090c0";
    roundRect(ctx, B.btnMax.x, B.btnMax.y, B.btnMax.w, B.btnMax.h, 5);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#e8ecff";
    ctx.font = "bold 9px monospace";
    const mxL = "En fazla";
    ctx.fillText(mxL, B.btnMax.x + (B.btnMax.w - ctx.measureText(mxL).width) / 2, B.btnMax.y + 18);

    if (!canBuy && maxB > 0) {
      ctx.fillStyle = "#c07070";
      ctx.font = "10px monospace";
      const warn = gold < total ? "Yeterli alt\u0131n yok." : "";
      if (warn) ctx.fillText(warn, d.x + 16, d.y + d.h - 58);
    }

    ctx.fillStyle = canBuy ? "rgba(40,110,55,0.95)" : "rgba(45,45,55,0.85)";
    ctx.strokeStyle = canBuy ? "#70d080" : "#505058";
    roundRect(ctx, B.btnBuy.x, B.btnBuy.y, B.btnBuy.w, B.btnBuy.h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = canBuy ? "#f0fff0" : "#707070";
    ctx.font = "bold 12px monospace";
    const buyLabel = "Sat\u0131n Al";
    ctx.fillText(buyLabel, B.btnBuy.x + (B.btnBuy.w - ctx.measureText(buyLabel).width) / 2, B.btnBuy.y + 21);

    ctx.fillStyle = "rgba(55,55,75,0.95)";
    ctx.strokeStyle = "#707090";
    roundRect(ctx, B.btnCancel.x, B.btnCancel.y, B.btnCancel.w, B.btnCancel.h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#d0d0e8";
    ctx.font = "bold 12px monospace";
    const canLabel = "\u0130ptal";
    ctx.fillText(canLabel, B.btnCancel.x + (B.btnCancel.w - ctx.measureText(canLabel).width) / 2, B.btnCancel.y + 21);
  }

  _sellPickerLayout(L) {
    const dw = Math.min(300, L.pw - 20);
    const dh = Math.min(188, L.ph - 88);
    const d = { x: Math.floor(L.px + (L.pw - dw) / 2), y: L.py + Math.min(102, Math.max(72, Math.floor(L.ph * 0.22))), w: Math.max(220, dw), h: Math.max(158, dh) };
    const track = { x: d.x + 48, y: d.y + Math.min(102, d.h - 86), w: d.w - 96, h: 12 };
    const btnY = d.y + Math.min(132, d.h - 56);
    const btnSell = { x: d.x + 18, y: btnY, w: Math.min(108, Math.floor((d.w - 48) * 0.42)), h: 30 };
    const btnAll = { x: d.x + 18 + btnSell.w + 6, y: btnY, w: Math.min(150, d.w - 36 - btnSell.w), h: 30 };
    const btnCancel = { x: Math.floor(d.x + (d.w - 104) / 2), y: d.y + d.h - 38, w: 104, h: 26 };
    const btnMinus = { x: track.x - 38, y: track.y - 5, w: 32, h: 22 };
    const btnPlus = { x: track.x + track.w + 6, y: track.y - 5, w: 32, h: 22 };
    return { dialog: d, track, btnSell, btnAll, btnCancel, btnMinus, btnPlus };
  }

  _sellAmountFromTrackMx(mx, track, maxCount) {
    if (maxCount <= 1) return 1;
    const t = Math.max(0, Math.min(1, (mx - track.x) / track.w));
    return Math.max(1, Math.min(maxCount, Math.round(t * (maxCount - 1)) + 1));
  }

  _pointInRect(mx, my, r) {
    return mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
  }

  _executeSellSlot(inventory, picker, count) {
    const slot = this._sellPickerLiveSlot(picker, inventory);
    if (!slot || count <= 0) return;
    const def = ITEMS[slot.id];
    const sellN = Math.min(count, slot.count);
    if (sellN <= 0) return;
    const goldGain = def.sellPrice * sellN;
    inventory.addItem("coin", goldGain);
    slot.count -= sellN;
    if (slot.count <= 0) picker.containerRef[picker.slotIdx] = null;
    if (sellN > 1) {
      this._showFeedback(sellN + "x " + def.name + " sat\u0131ld\u0131! +" + goldGain + " alt\u0131n", "#f0d050");
    } else {
      this._showFeedback(def.name + " sat\u0131ld\u0131! +" + goldGain + " alt\u0131n", "#f0d050");
    }
    const still = this._sellPickerLiveSlot(picker, inventory);
    if (!still) this.sellPicker = null;
    else picker.amount = Math.min(picker.amount, still.count);
  }

  handleClick(mx, my, cw, ch, inventory, shiftKey, button) {
    if (shiftKey === undefined) shiftKey = false;
    if (button === undefined) button = 0;
    if (!this.open) return false;
    const L = this._layout(cw, ch);

    const tabBuyX = L.tabBuyX, tabSellX = L.tabSellX, tabY = L.tabY, tabW = L.tabW, tabH = L.tabH;
    if (mx >= tabBuyX && mx < tabBuyX + tabW && my >= tabY && my < tabY + tabH) {
      this.tab = 0;
      this.sellPicker = null;
      this.buyPicker = null;
      return true;
    }
    if (mx >= tabSellX && mx < tabSellX + tabW && my >= tabY && my < tabY + tabH) {
      this.tab = 1;
      this.buyPicker = null;
      return true;
    }

    const gridX = L.px + 16, gridY = this._buyGridY(L);
    const gold = inventory.countItem("coin");
    const rowStride = this._shopRowStride(L);
    const sSlot = L.shopSlot;

    const maxSB = this.tab === 0 ? this._maxScrollBuy(L) : this._maxScrollSell(L, inventory);
    if (maxSB >= 8) {
      const upR = this._shopScrollBtnUp(L), dnR = this._shopScrollBtnDown(L);
      const step = this._shopRowStride(L);
      if (this._pointInRect(mx, my, upR)) {
        if (this.tab === 0) this.scrollBuy = Math.max(0, this.scrollBuy - step);
        else this.scrollSell = Math.max(0, this.scrollSell - step);
        return true;
      }
      if (this._pointInRect(mx, my, dnR)) {
        if (this.tab === 0) this.scrollBuy = Math.min(maxSB, this.scrollBuy + step);
        else this.scrollSell = Math.min(maxSB, this.scrollSell + step);
        return true;
      }
    }

    if (this.tab === 0) {
      if (button !== 0) return true;
      if (this.buyPicker) {
        const B = this._buyPickerLayout(L);
        const si0 = this._getBuyPickerStockEntry(this.buyPicker);
        if (!si0) {
          this.buyPicker = null;
          return true;
        }
        if (this._pointInRect(mx, my, B.dialog)) {
          const siD = this._getBuyPickerStockEntry(this.buyPicker);
          if (!siD) {
            this.buyPicker = null;
            return true;
          }
          const maxB = this._shopMaxBuyable(inventory, siD);
          if (maxB <= 0) {
            this.buyPicker = null;
            return true;
          }
          const a0 = this.buyPicker.amount != null ? this.buyPicker.amount : 1;
          if (this._pointInRect(mx, my, B.btnMinus)) {
            this.buyPicker.amount = Math.max(1, a0 - 1);
            return true;
          }
          if (this._pointInRect(mx, my, B.btnPlus)) {
            this.buyPicker.amount = Math.min(maxB, a0 + 1);
            return true;
          }
          if (this._pointInRect(mx, my, B.btnMax)) {
            this.buyPicker.amount = maxB;
            return true;
          }
          const trackHit = { x: B.track.x - 2, y: B.track.y - 8, w: B.track.w + 4, h: B.track.h + 16 };
          if (this._pointInRect(mx, my, trackHit)) {
            this.buyPicker.amount = this._sellAmountFromTrackMx(mx, B.track, maxB);
            return true;
          }
          if (this._pointInRect(mx, my, B.btnBuy)) {
            if (this._executeBuyOne(inventory, this.buyPicker)) this.buyPicker = null;
            return true;
          }
          if (this._pointInRect(mx, my, B.btnCancel)) {
            this.buyPicker = null;
            return true;
          }
          return true;
        }
        this.buyPicker = null;
      }
      for (let i = 0; i < this.stock.length; i++) {
        const row = Math.floor(i / L.shopCols), col = i % L.shopCols;
        const sx = gridX + col * (L.shopSlot + L.shopGap);
        const sy = gridY + row * rowStride - this.scrollBuy;
        if (sy < gridY - sSlot || sy > L.py + L.ph) continue;
        if (mx >= sx && mx < sx + sSlot && my >= sy && my < sy + sSlot + L.shopPriceBand) {
          const si = this.stock[i];
          const def = ITEMS[si.id];
          if (!def) return true;
          if (!si.unlimited && si.qty <= 0) {
            this._showFeedback("Stok t\u00fckendi!", "#d04040");
            return true;
          }
          const maxB = this._shopMaxBuyable(inventory, si);
          if (maxB <= 0) {
            this._showFeedback("Envantere s\u0131\u011fm\u0131yor!", "#d04040");
            return true;
          }
          this.buyPicker = { stockIndex: i, itemId: si.id, amount: 1 };
          return true;
        }
      }
    } else {
      if (button !== 0) return true;
      const U0 = this._sellPickerLayout(L);
      if (this.sellPicker) {
        const live0 = this._sellPickerLiveSlot(this.sellPicker, inventory);
        if (!live0) {
          this.sellPicker = null;
        } else if (this._pointInRect(mx, my, U0.dialog)) {
          const live = live0;
          const maxCount = live.count;
          const U = this._sellPickerLayout(L);
          if (this._pointInRect(mx, my, U.btnMinus)) {
            this.sellPicker.amount = Math.max(1, this.sellPicker.amount - 1);
            return true;
          }
          if (this._pointInRect(mx, my, U.btnPlus)) {
            this.sellPicker.amount = Math.min(maxCount, this.sellPicker.amount + 1);
            return true;
          }
          const trackHit = { x: U.track.x - 2, y: U.track.y - 8, w: U.track.w + 4, h: U.track.h + 16 };
          if (this._pointInRect(mx, my, trackHit)) {
            this.sellPicker.amount = this._sellAmountFromTrackMx(mx, U.track, maxCount);
            return true;
          }
          if (this._pointInRect(mx, my, U.btnSell)) {
            const n = Math.min(this.sellPicker.amount, maxCount);
            if (n > 0) this._executeSellSlot(inventory, this.sellPicker, n);
            return true;
          }
          if (this._pointInRect(mx, my, U.btnAll)) {
            this._executeSellSlot(inventory, this.sellPicker, maxCount);
            return true;
          }
          if (this._pointInRect(mx, my, U.btnCancel)) {
            this.sellPicker = null;
            return true;
          }
          return true;
        } else {
          this.sellPicker = null;
        }
      }
      const sellable = this._getSellableEntries(inventory);
      for (let i = 0; i < sellable.length; i++) {
        const row = Math.floor(i / L.shopCols), col = i % L.shopCols;
        const sx = gridX + col * (L.shopSlot + L.shopGap);
        const sy = gridY + row * rowStride - this.scrollSell;
        if (sy < gridY - sSlot || sy > L.py + L.ph) continue;
        if (mx >= sx && mx < sx + sSlot && my >= sy && my < sy + sSlot + L.shopPriceBand) {
          const s = sellable[i];
          this.sellPicker = {
            containerRef: s.containerRef,
            slotIdx: s.slotIdx,
            itemId: s.slot.id,
            amount: 1,
          };
          return true;
        }
      }
    }
    return true;
  }

  handleScroll(dy, mx, my, cw, ch) {
    if (!this.open) return;
    const L = this._layout(cw, ch);
    if (mx >= L.px && mx < L.px + L.pw && my >= L.py && my < L.py + L.ph) {
      if (this.tab === 1 && this.sellPicker) this.sellPicker = null;
      if (this.tab === 0 && this.buyPicker) this.buyPicker = null;
      const land = cw > ch * 1.02;
      const step = dy * (land ? 34 : 20);
      if (this.tab === 0) {
        const maxS = this._maxScrollBuy(L);
        this.scrollBuy = Math.max(0, Math.min(maxS, this.scrollBuy + step));
      } else {
        const maxS = this._maxScrollSell(L, inventory);
        this.scrollSell = Math.max(0, Math.min(maxS, this.scrollSell + step));
      }
    }
  }

  handleMouseMove(mx, my, cw, ch, inventory) {
    this.tooltipItem = null;
    this.tooltipBuyPrice = null;
    this.tooltipSpecial = false;
    if (!this.open) return;
    const L = this._layout(cw, ch);
    const gridX = L.px + 16, gridY = this._buyGridY(L);

    if (this.tab === 1 && this.sellPicker && canvasMouse0Down) {
      const live = this._sellPickerLiveSlot(this.sellPicker, inventory);
      if (live) {
        const U = this._sellPickerLayout(L);
        const trackHit = { x: U.track.x - 2, y: U.track.y - 8, w: U.track.w + 4, h: U.track.h + 16 };
        if (this._pointInRect(mx, my, trackHit)) {
          this.sellPicker.amount = this._sellAmountFromTrackMx(mx, U.track, live.count);
        }
      }
    }

    if (this.tab === 0 && this.buyPicker && canvasMouse0Down) {
      const si = this._getBuyPickerStockEntry(this.buyPicker);
      if (si) {
        const maxB = this._shopMaxBuyable(inventory, si);
        if (maxB > 0) {
          const B = this._buyPickerLayout(L);
          const trackHit = { x: B.track.x - 2, y: B.track.y - 8, w: B.track.w + 4, h: B.track.h + 16 };
          if (this._pointInRect(mx, my, trackHit)) {
            this.buyPicker.amount = this._sellAmountFromTrackMx(mx, B.track, maxB);
          }
        }
      }
    }

    const rowStride = this._shopRowStride(L);
    const sSlot = L.shopSlot;
    if (this.tab === 0) {
      if (this.buyPicker) {
        const B = this._buyPickerLayout(L);
        if (this._pointInRect(mx, my, B.dialog)) return;
      }
      for (let i = 0; i < this.stock.length; i++) {
        const row = Math.floor(i / L.shopCols), col = i % L.shopCols;
        const sx = gridX + col * (L.shopSlot + L.shopGap);
        const sy = gridY + row * rowStride - this.scrollBuy;
        if (mx >= sx && mx < sx + sSlot && my >= sy && my < sy + sSlot) {
          const si = this.stock[i];
          this.tooltipItem = si.id;
          this.tooltipBuyPrice = si.price != null && si.price > 0 ? si.price : null;
          this.tooltipSpecial = !!si.specialOffer;
          this.tooltipX = mx; this.tooltipY = my;
          return;
        }
      }
    } else {
      if (this.sellPicker) {
        const U = this._sellPickerLayout(L);
        if (this._pointInRect(mx, my, U.dialog)) return;
      }
      const sellable = this._getSellableEntries(inventory);
      for (let i = 0; i < sellable.length; i++) {
        const row = Math.floor(i / L.shopCols), col = i % L.shopCols;
        const sx = gridX + col * (L.shopSlot + L.shopGap);
        const sy = gridY + row * rowStride - this.scrollSell;
        if (mx >= sx && mx < sx + sSlot && my >= sy && my < sy + sSlot) {
          this.tooltipItem = sellable[i].slot.id;
          this.tooltipX = mx; this.tooltipY = my;
          return;
        }
      }
    }
  }

  render(ctx, cw, ch, inventory) {
    if (!this.open) return;
    const L = this._layout(cw, ch);
    const gold = inventory.countItem("coin");

    ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = "rgba(15,15,40,0.95)";
    ctx.strokeStyle = "#c0a050"; ctx.lineWidth = 2;
    roundRect(ctx, L.px, L.py, L.pw, L.ph, 10); ctx.fill(); ctx.stroke();

    const land = L.shopLand;
    const titleY = L.py + (land ? 18 : 24);
    ctx.fillStyle = "#f0d050"; ctx.font = land ? "bold 14px monospace" : "bold 16px monospace";
    ctx.fillText(this.shopName, L.px + 12, titleY);

    ctx.fillStyle = "#888"; ctx.font = land ? "10px monospace" : "11px monospace";
    ctx.fillText("[Esc] Kapat", L.px + L.pw - 86, titleY);

    drawItemIcon(ctx, "coin", L.px + L.pw - 152, L.py + (land ? 6 : 12), land ? 12 : 14);
    ctx.fillStyle = "#f0d050"; ctx.font = land ? "bold 11px monospace" : "bold 12px monospace";
    ctx.fillText(String(gold), L.px + L.pw - 136, titleY);

    const tabBuyX = L.tabBuyX, tabSellX = L.tabSellX, tabY = L.tabY, tabW = L.tabW, tabH = L.tabH;
    ctx.fillStyle = this.tab === 0 ? "rgba(80,180,80,0.3)" : "rgba(40,40,60,0.5)";
    ctx.strokeStyle = this.tab === 0 ? "#60c060" : "#505070"; ctx.lineWidth = 1;
    roundRect(ctx, tabBuyX, tabY, tabW, tabH, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = this.tab === 0 ? "#90ff90" : "#888"; ctx.font = land ? "bold 10px monospace" : "bold 12px monospace";
    const buyLab = "Sat\u0131n Al";
    ctx.fillText(buyLab, tabBuyX + (tabW - ctx.measureText(buyLab).width) / 2, tabY + (land ? 14 : 16));

    ctx.fillStyle = this.tab === 1 ? "rgba(200,160,50,0.3)" : "rgba(40,40,60,0.5)";
    ctx.strokeStyle = this.tab === 1 ? "#c0a030" : "#505070"; ctx.lineWidth = 1;
    roundRect(ctx, tabSellX, tabY, tabW, tabH, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = this.tab === 1 ? "#f0d050" : "#888"; ctx.font = land ? "bold 10px monospace" : "bold 12px monospace";
    const sellLab = "Sat";
    ctx.fillText(sellLab, tabSellX + (tabW - ctx.measureText(sellLab).width) / 2, tabY + (land ? 14 : 16));

    const rotLeft = Math.max(0, SHOP_SPECIAL_ROTATE_SEC - this.specialT);
    const mm = Math.floor(rotLeft / 60);
    const ss = Math.floor(rotLeft % 60);
    const ssPad = ss < 10 ? "0" + ss : String(ss);
    if (land) {
      ctx.fillStyle = "#e8c070"; ctx.font = "bold 9px monospace";
      const maxGHint = this.tab === 0 ? this._maxScrollBuy(L) : this._maxScrollSell(L, inventory);
      const scrHint = maxGHint >= 8 ? "  |  Sa\u011f \u25B2\u25BC veya parmak kayd\u0131r" : "";
      const line1 = "\u2605 \u00d6zel: " + mm + ":" + ssPad + scrHint;
      ctx.fillText(line1, L.px + 12, L.py + 36);
    } else {
      ctx.fillStyle = "#e8c070"; ctx.font = "bold 10px monospace";
      ctx.fillText("\u2605 \u00d6zel teklif yenileme: " + mm + ":" + ssPad, L.px + 16, L.py + 56);
      ctx.fillStyle = "#7a7a98"; ctx.font = "9px monospace";
      ctx.fillText("Ok, iksir, yiyecek ve temel malzemeler s\u0131n\u0131rs\u0131z stok.", L.px + 16, L.py + 72);
    }

    const gridX = L.px + 16, gridY = this._buyGridY(L);
    const clipBottom = this.tab === 1 && !this.sellPicker ? L.py + L.ph - 28 : L.py + L.ph - 10;

    ctx.save();
    ctx.beginPath();
    ctx.rect(L.px, gridY - 2, L.pw, clipBottom - gridY + 2);
    ctx.clip();

    if (this.tab === 0) {
      this._renderBuyTab(ctx, gridX, gridY, gold, L);
    } else {
      this._renderSellTab(ctx, gridX, gridY, inventory, L);
    }

    ctx.restore();

    const maxGridScroll = this.tab === 0 ? this._maxScrollBuy(L) : this._maxScrollSell(L, inventory);
    if (maxGridScroll >= 8) {
      const upR = this._shopScrollBtnUp(L), dnR = this._shopScrollBtnDown(L);
      ctx.fillStyle = "rgba(42,38,62,0.96)";
      roundRect(ctx, upR.x, upR.y, upR.w, upR.h, 5);
      ctx.fill();
      roundRect(ctx, dnR.x, dnR.y, dnR.w, dnR.h, 5);
      ctx.fill();
      ctx.strokeStyle = "#a090d0";
      ctx.lineWidth = 1.2;
      roundRect(ctx, upR.x, upR.y, upR.w, upR.h, 5);
      ctx.stroke();
      roundRect(ctx, dnR.x, dnR.y, dnR.w, dnR.h, 5);
      ctx.stroke();
      ctx.fillStyle = "#f0f0ff";
      ctx.font = "bold 15px monospace";
      ctx.fillText("\u25B2", upR.x + upR.w / 2 - 7, upR.y + 20);
      ctx.fillText("\u25BC", dnR.x + dnR.w / 2 - 7, dnR.y + 20);
    }

    if (this.tab === 1 && !this.sellPicker) {
      ctx.fillStyle = "#6a6a88"; ctx.font = "9px monospace";
      ctx.fillText("Sat\u0131lacak y\u0131\u011f\u0131na t\u0131kla; miktar\u0131 kayd\u0131r\u0131c\u0131dan se\u00e7, Sat veya T\u00fcm\u00fcn\u00fc sat.", L.px + 16, L.py + L.ph - 14);
    }

    if (this.tab === 1 && this.sellPicker) this._renderSellPicker(ctx, L, inventory);
    if (this.tab === 0 && this.buyPicker) this._renderBuyPicker(ctx, L, inventory);

    if (this.tooltipItem) {
      const def = ITEMS[this.tooltipItem];
      if (def) {
        const buyP = this.tooltipBuyPrice != null
          ? this.tooltipBuyPrice
          : (def.buyPrice > 0 ? def.buyPrice : getShopBuyPriceForItem(this.tooltipItem));
        const mob = touchState.mobileUI;
        const fh = mob ? "bold 15px monospace" : "bold 12px monospace";
        const fh2 = mob ? "bold 14px monospace" : "bold 11px monospace";
        const fs = mob ? "13px monospace" : "10px monospace";
        const trail = [];
        if (this.tooltipSpecial && this.tab === 0) {
          trail.push({ font: fs, color: "#ffd8a0", text: "\u2605 \u00d6zel teklif; s\u00fcre dolunca yenilenir." });
        }
        if (this.tab === 0) {
          trail.push({ font: fh, color: "#90f0a0", text: "Sat\u0131n alma: " + buyP + " alt\u0131n" });
          trail.push({ font: fh2, color: "#f0d080", text: "Tekil sat\u0131\u015f: " + def.sellPrice + " alt\u0131n" });
        } else {
          trail.push({ font: fh, color: "#f0e0a0", text: "Sat\u0131\u015f: " + def.sellPrice + " alt\u0131n / adet" });
        }
        ctx.save();
        const layoutTt = buildItemTooltipLayout(ctx, def, this.tooltipItem, cw, mob, { omitPrices: true }, trail);
        const pos = placeTooltipPosition(this.tooltipX, this.tooltipY, layoutTt.tw, layoutTt.th, cw, ch);
        const stk = (this.tooltipSpecial && this.tab === 0) ? { strokeStyle: "#e8a030", lineWidth: mob ? 3 : 2 } : {};
        drawItemTooltipFromLayout(ctx, pos.tx, pos.ty, layoutTt, mob, stk);
        ctx.restore();
      }
    }

    if (this.feedbackTimer > 0) {
      const alpha = Math.min(1, this.feedbackTimer / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.feedbackColor; ctx.font = "bold 13px monospace";
      const fw = ctx.measureText(this.feedbackText).width;
      ctx.fillText(this.feedbackText, L.px + (L.pw - fw) / 2, L.py + L.ph - 16);
      ctx.globalAlpha = 1;
    }
  }

  _renderBuyTab(ctx, gridX, gridY, gold, L) {
    const rowStride = this._shopRowStride(L);
    const s = L.shopSlot;
    for (let i = 0; i < this.stock.length; i++) {
      const si = this.stock[i];
      const def = ITEMS[si.id];
      if (!def) continue;
      const row = Math.floor(i / L.shopCols), col = i % L.shopCols;
      const sx = gridX + col * (L.shopSlot + L.shopGap);
      const sy = gridY + row * rowStride - this.scrollBuy;

      const price = si.price != null && si.price > 0 ? si.price : (def.buyPrice > 0 ? def.buyPrice : getShopBuyPriceForItem(si.id));
      const canBuy = gold >= price && (si.unlimited || si.qty > 0);

      ctx.fillStyle = canBuy ? "rgba(50,70,50,0.6)" : "rgba(40,40,60,0.4)";
      ctx.strokeStyle = canBuy ? "#60a060" : "#404060"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, s, s, 4); ctx.fill(); ctx.stroke();
      if (si.specialOffer) {
        ctx.strokeStyle = "rgba(255,200,80,0.85)"; ctx.lineWidth = 2;
        roundRect(ctx, sx + 1, sy + 1, s - 2, s - 2, 4); ctx.stroke();
      }

      drawItemIconFancy(ctx, si.id, sx + 6, sy + 4, s - 12, {});

      if (si.specialOffer) {
        ctx.fillStyle = "#ffd090"; ctx.font = "bold 8px monospace";
        ctx.fillText("\u00d6ZEL", sx + 3, sy + 12);
      }

      if (si.unlimited) {
        ctx.fillStyle = "#9cf"; ctx.font = "bold 11px monospace";
        ctx.fillText("\u221e", sx + s - 16, sy + s - 3);
      } else if (si.qty > 0) {
        ctx.fillStyle = "#aaa"; ctx.font = "9px monospace";
        ctx.fillText("x" + si.qty, sx + s - 18, sy + s - 3);
      } else {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(sx, sy, s, s);
        ctx.fillStyle = "#d04040"; ctx.font = "bold 8px monospace";
        ctx.fillText("T\u00dcKEND\u0130", sx + 2, sy + s / 2 + 3);
      }

      ctx.fillStyle = canBuy ? "#80d080" : "#806060"; ctx.font = "bold 10px monospace";
      const priceText = price + "g";
      ctx.fillText(priceText, sx + (s - ctx.measureText(priceText).width) / 2, sy + s + Math.min(11, L.shopPriceBand + 1));
    }
  }

  _renderSellPicker(ctx, L, inventory) {
    const picker = this.sellPicker;
    if (!picker) return;
    const slot = this._sellPickerLiveSlot(picker, inventory);
    if (!slot) {
      this.sellPicker = null;
      return;
    }
    const def = ITEMS[slot.id];
    if (!def) {
      this.sellPicker = null;
      return;
    }
    const maxCount = slot.count;
    picker.amount = Math.max(1, Math.min(maxCount, picker.amount));
    const amt = picker.amount;
    const U = this._sellPickerLayout(L);
    const d = U.dialog;

    ctx.fillStyle = "rgba(0,0,0,0.42)";
    ctx.fillRect(L.px, L.py, L.pw, L.ph);

    ctx.fillStyle = "rgba(22,22,48,0.98)";
    ctx.strokeStyle = "#d8a040";
    ctx.lineWidth = 2;
    roundRect(ctx, d.x, d.y, d.w, d.h, 8);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#f0d050";
    ctx.font = "bold 13px monospace";
    ctx.fillText(def.name, d.x + 14, d.y + 26);
    ctx.fillStyle = "#a8a8c8";
    ctx.font = "11px monospace";
    ctx.fillText("Bu y\u0131\u011f\u0131nda: " + maxCount + " adet", d.x + 14, d.y + 46);
    ctx.fillText("Birim sat\u0131\u015f: " + def.sellPrice + "g", d.x + 14, d.y + 60);
    ctx.fillText("Se\u00e7ilen: " + amt + " adet  \u2192  +" + (def.sellPrice * amt) + "g", d.x + 14, d.y + 74);

    const tr = U.track;
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(ctx, tr.x, tr.y, tr.w, tr.h, 4);
    ctx.fill();
    ctx.strokeStyle = "#606080";
    ctx.lineWidth = 1;
    ctx.strokeRect(tr.x, tr.y, tr.w, tr.h);

    const tThumb = maxCount <= 1 ? 0.5 : (amt - 1) / (maxCount - 1);
    const cx = tr.x + tThumb * tr.w;
    ctx.fillStyle = "#f0e8c0";
    ctx.beginPath();
    ctx.arc(cx, tr.y + tr.h / 2, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#c0a050";
    ctx.stroke();

    ctx.fillStyle = "#c8c8e8";
    ctx.font = "bold 14px monospace";
    ctx.fillText("\u2212", U.btnMinus.x + 10, U.btnMinus.y + 16);
    ctx.fillText("+", U.btnPlus.x + 11, U.btnPlus.y + 16);
    ctx.strokeStyle = "#707090";
    roundRect(ctx, U.btnMinus.x, U.btnMinus.y, U.btnMinus.w, U.btnMinus.h, 3);
    ctx.stroke();
    roundRect(ctx, U.btnPlus.x, U.btnPlus.y, U.btnPlus.w, U.btnPlus.h, 3);
    ctx.stroke();

    ctx.fillStyle = "rgba(60,120,60,0.85)";
    ctx.strokeStyle = "#70d070";
    roundRect(ctx, U.btnSell.x, U.btnSell.y, U.btnSell.w, U.btnSell.h, 5);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#e8ffe8";
    ctx.font = "bold 11px monospace";
    ctx.fillText("Sat", U.btnSell.x + 38, U.btnSell.y + 20);

    ctx.fillStyle = "rgba(120,80,40,0.85)";
    ctx.strokeStyle = "#d8a060";
    roundRect(ctx, U.btnAll.x, U.btnAll.y, U.btnAll.w, U.btnAll.h, 5);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#fff0e0";
    ctx.font = "bold 11px monospace";
    ctx.fillText("T\u00fcm\u00fcn\u00fc sat", U.btnAll.x + 28, U.btnAll.y + 20);

    ctx.fillStyle = "rgba(50,50,70,0.9)";
    ctx.strokeStyle = "#606080";
    roundRect(ctx, U.btnCancel.x, U.btnCancel.y, U.btnCancel.w, U.btnCancel.h, 4);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#aaa";
    ctx.font = "10px monospace";
    ctx.fillText("\u0130ptal", U.btnCancel.x + 36, U.btnCancel.y + 17);

    const ix = d.x + d.w - 52, iy = d.y + 10;
    ctx.fillStyle = "rgba(40,40,55,0.95)";
    ctx.strokeStyle = "#8080a0";
    ctx.lineWidth = 1;
    roundRect(ctx, ix, iy, 40, 40, 4);
    ctx.fill();
    ctx.stroke();
    drawItemIconFancy(ctx, slot.id, ix + 5, iy + 4, 30, {});
  }

  _renderSellTab(ctx, gridX, gridY, inventory, L) {
    const sellable = this._getSellableEntries(inventory);
    const rowStride = this._shopRowStride(L);
    const s = L.shopSlot;

    if (sellable.length === 0) {
      ctx.fillStyle = "#666"; ctx.font = "12px monospace";
      ctx.fillText("Satılacak eşya yok.", gridX, gridY + 30);
      return;
    }

    for (let i = 0; i < sellable.length; i++) {
      const slot = sellable[i].slot;
      const def = ITEMS[slot.id];
      const row = Math.floor(i / L.shopCols), col = i % L.shopCols;
      const sx = gridX + col * (L.shopSlot + L.shopGap);
      const sy = gridY + row * rowStride - this.scrollSell;

      ctx.fillStyle = "rgba(60,50,30,0.6)";
      ctx.strokeStyle = "#a08040"; ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, s, s, 4); ctx.fill(); ctx.stroke();

      drawItemIconFancy(ctx, slot.id, sx + 6, sy + 4, s - 12, {});

      if (slot.count > 1) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace";
        ctx.fillText(String(slot.count), sx + s - 14, sy + s - 3);
      }

      ctx.fillStyle = "#f0d050"; ctx.font = "bold 10px monospace";
      const priceText = "+" + def.sellPrice + "g";
      ctx.fillText(priceText, sx + (s - ctx.measureText(priceText).width) / 2, sy + s + Math.min(11, L.shopPriceBand + 1));
    }
  }
}

/* ── DialogBox ───────────────────────────────────────────── */

class DialogBox {
  constructor() {
    this.active = false; this.lines = []; this.currentLine = 0;
    this.displayedText = ""; this.charIndex = 0;
    this.charTimer = 0; this.charSpeed = 0.03;
    this.speaker = ""; this.onComplete = null;
  }

  show(speaker, lines, onComplete) {
    this.active = true; this.speaker = speaker; this.lines = lines;
    this.currentLine = 0; this.displayedText = "";
    this.charIndex = 0; this.charTimer = 0;
    this.onComplete = onComplete || null;
  }

  advance() {
    if (!this.active) return;
    if (this.charIndex < this.lines[this.currentLine].length) {
      this.displayedText = this.lines[this.currentLine];
      this.charIndex = this.displayedText.length;
      return;
    }
    this.currentLine++;
    if (this.currentLine >= this.lines.length) { this.close(); return; }
    this.displayedText = ""; this.charIndex = 0; this.charTimer = 0;
  }

  close() { this.active = false; if (this.onComplete) this.onComplete(); }

  update(dt) {
    if (!this.active) return;
    if (this.charIndex >= this.lines[this.currentLine].length) return;
    this.charTimer += dt;
    while (this.charTimer >= this.charSpeed && this.charIndex < this.lines[this.currentLine].length) {
      this.charTimer -= this.charSpeed;
      this.charIndex++;
      this.displayedText = this.lines[this.currentLine].substring(0, this.charIndex);
    }
  }

  render(ctx, canvasW, canvasH) {
    if (!this.active) return;
    const boxH = 90, boxW = canvasW - 40, boxX = 20, boxY = canvasH - boxH - 20;

    ctx.fillStyle = "rgba(10, 10, 30, 0.92)";
    ctx.strokeStyle = "#8080c0"; ctx.lineWidth = 2;
    roundRect(ctx, boxX, boxY, boxW, boxH, 8);
    ctx.fill(); ctx.stroke();

    if (this.speaker) {
      ctx.fillStyle = "#f0d050"; ctx.font = "bold 14px monospace";
      ctx.fillText(this.speaker, boxX + 14, boxY + 22);
    }
    ctx.fillStyle = "#e8e8f0"; ctx.font = "13px monospace";
    ctx.fillText(this.displayedText, boxX + 14, boxY + 48);

    if (this.charIndex >= this.lines[this.currentLine].length) {
      if (Math.sin(Date.now() / 200) > 0) {
        ctx.fillStyle = "#8080c0";
        ctx.fillText("\u25bc", boxX + boxW - 30, boxY + boxH - 14);
      }
    }
  }
}

/* ── HUD ─────────────────────────────────────────────────── */

class HUD {
  constructor() { this.interactPrompt = null; }

  showInteractPrompt(text) { this.interactPrompt = text; }
  clearInteractPrompt()    { this.interactPrompt = null; }

  render(ctx, canvasW, canvasH) {
    if (this.interactPrompt) {
      ctx.fillStyle = "rgba(10, 10, 30, 0.8)";

      ctx.fillStyle = "#e8e8f0";
      ctx.fillText(this.interactPrompt, tx + 12, ty + 18);
    }
    ctx.fillStyle = "#f0f0f0"; ctx.font = "11px monospace";

    }
  }
}

/** T\u0131klanabilir can/mana iksiri d\u00fc\u011fmeleri (son kare hit-test i\u00e7in) */
let combatPotionRects = null;

function layoutCombatPotions(cw, ch) {
  const w = 46, h = 46, gap = 6;
  const bottomPad = touchState.mobileUI ? 38 : 24;
  let x1, x2;
  let y = ch - h - bottomPad;

  if (touchState.mobileUI) {
    const pots = mobilePotionOrbitCenters(cw, ch);
    const potW = pots.potHalf * 2;
    const potH = potW;
    const hpX = Math.round(pots.hp.cx - pots.potHalf);
    const hpY = Math.round(pots.hp.cy - pots.potHalf);
    const manaX = Math.round(pots.mana.cx - pots.potHalf);
    const manaY = Math.round(pots.mana.cy - pots.potHalf);
    combatPotionRects = [
      { kind: "hp", x: hpX, y: hpY, w: potW, h: potH, key: "Q" },
      { kind: "mana", x: manaX, y: manaY, w: potW, h: potH, key: "R" },
    ];
    return combatPotionRects;
  } else {
    const pad = 12;
    x2 = cw - pad - w;
    x1 = x2 - w - gap;
    y = ch - h - bottomPad;
  }

  combatPotionRects = [
    { kind: "hp", x: x1, y, w, h, key: "Q" },
    { kind: "mana", x: x2, y, w, h, key: "R" },
  ];
  return combatPotionRects;
}

function drawCombatPotions(ctx, cw, ch, inventory) {
  const rects = layoutCombatPotions(cw, ch);
  for (const r of rects) {
    const id = r.kind === "hp" ? "potion" : "potion_mana";
    const n = inventory.countItem(id);
    ctx.fillStyle = "rgba(12,12,28,0.88)";
    roundRect(ctx, r.x - 2, r.y - 14, r.w + 4, r.h + 18, 6);
    ctx.fill();
    ctx.strokeStyle = n > 0 ? "#7080a8" : "#504050";
    ctx.lineWidth = 1;
    roundRect(ctx, r.x - 2, r.y - 14, r.w + 4, r.h + 18, 6);
    ctx.stroke();
    drawItemIconFancy(ctx, id, r.x + 6, r.y + 4, r.w - 12, {});
    ctx.fillStyle = n > 0 ? "#e0e8ff" : "#806060";
    ctx.font = "bold 10px monospace";
    ctx.fillText(String(n), r.x + r.w - 14, r.y + r.h - 4);
    ctx.fillStyle = "#a0a8c0";
    ctx.font = "9px monospace";
    ctx.fillText("[" + r.key + "]", r.x + 4, r.y - 4);
  }
}

function tryUseHpPotion() {
  if (inventory.countItem("potion") <= 0) {
    pickupMsgText = "Can iksirin yok!";
    pickupMsgTimer = 1;
    return false;
  }
  inventory.removeItem("potion", 1);
  const healAmt = 32 + (player.wis + player._eqWis) * 3;
  player.heal(healAmt);
  pickupMsgText = "+" + Math.floor(healAmt) + " HP";
  pickupMsgTimer = 1.2;
  return true;
}

function tryUseManaPotion() {
  if (inventory.countItem("potion_mana") <= 0) {
    pickupMsgText = "Mana iksirin yok!";
    pickupMsgTimer = 1;
    return false;
  }
  inventory.removeItem("potion_mana", 1);
  const amt = 28 + (player.wis + player._eqWis) * 2;
  player.mana = Math.min(player.maxMana, player.mana + amt);
  pickupMsgText = "+" + Math.floor(amt) + " MP";
  pickupMsgTimer = 1.2;
  return true;
}

function tryCombatPotionClick(mx, my) {
  if (!combatPotionRects) return false;
  for (const r of combatPotionRects) {
    if (mx >= r.x - 2 && mx < r.x + r.w + 2 && my >= r.y - 14 && my < r.y + r.h + 6) {
      if (r.kind === "hp") tryUseHpPotion();
      else tryUseManaPotion();
      return true;
    }
  }
  return false;
}

const WORLD_ITEM_AUTO_PICKUP_RANGE = TILE_SIZE * 1.2;

function tryAutoPickupNearbyWorldItems() {
  if (worldItemInspect) return;
  if (inventorySlotInspect) return;
  if (player.inBoat) return;
  let best = null;
  let bestD2 = 1e15;
  const r2 = WORLD_ITEM_AUTO_PICKUP_RANGE * WORLD_ITEM_AUTO_PICKUP_RANGE;
  for (const wi of worldItems) {
    if (!wi.alive || wi.count <= 0) continue;
    const dx = wi.x - player.centerX;
    const dy = wi.y - player.centerY;
    const d2 = dx * dx + dy * dy;
    if (d2 > r2) continue;
    if (d2 < bestD2) {
      bestD2 = d2;
      best = wi;
    }
  }
  if (!best) return;
  const before = best.count;
  if (!best.tryPickup(inventory)) return;
  const picked = before - best.count;
  const def = ITEMS[best.itemId];
  if (picked > 0 && def) {
    pickupMsgText = "+" + picked + " " + def.name;
    pickupMsgTimer = 1.1;
    actionCooldown = Math.max(actionCooldown, 0.06);
  }
}

/** Yerdeki e\u015fya inceleme: t\u0131kla \u2192 statlar + Al / Giy / B\u0131rak */
let worldItemInspect = null;

function closeWorldItemInspect() {
  worldItemInspect = null;
}

function pickWorldItemAtScreen(smx, smy) {
  if (player.inBoat) return null;
  const wx = smx + camera.x, wy = smy + camera.y;
  const hitR = 28;
  const maxPl = TILE_SIZE * 2.4;
  let best = null;
  let bestD = 1e15;
  for (const wi of worldItems) {
    if (!wi.alive || wi.count <= 0) continue;
    const dx = wi.x - player.centerX, dy = wi.y - player.centerY;
    if (dx * dx + dy * dy > maxPl * maxPl) continue;
    const d2 = (wi.x - wx) * (wi.x - wx) + (wi.y - wy) * (wi.y - wy);
    if (d2 > hitR * hitR || d2 >= bestD) continue;
    bestD = d2;
    best = wi;
  }
  return best;
}

function tryOpenWorldItemInspect(smx, smy) {
  if (player.inBoat) return false;
  const wi = pickWorldItemAtScreen(smx, smy);
  if (!wi) return false;
  closeInventorySlotInspect();
  worldItemInspect = wi;
  return true;
}

function worldItemInspectLayout(cw, ch) {
  const b = uiModalBounds(cw, ch);
  const pw = Math.min(340, b.maxW);
  const ph = Math.min(420, b.maxH);
  const px = Math.floor((cw - pw) / 2);
  const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
  const btnH = 34;
  const btnY = py + ph - btnH - 14;
  const gap = 8;
  const nBtn = 3;
  const bw = Math.floor((pw - 32 - gap * (nBtn - 1)) / nBtn);
  const btnEquip = { x: px + 16, y: btnY, w: bw, h: btnH };
  const btnTake = { x: px + 16 + bw + gap, y: btnY, w: bw, h: btnH };
  const btnLeave = { x: px + 16 + (bw + gap) * 2, y: btnY, w: bw, h: btnH };
  return { px, py, pw, ph, btnEquip, btnTake, btnLeave };
}

function handleWorldItemInspectClick(mx, my, cw, ch) {
  if (!worldItemInspect) return false;
  const wi = worldItemInspect;
  if (!wi.alive || wi.count <= 0) {
    closeWorldItemInspect();
    return true;
  }
  const L = worldItemInspectLayout(cw, ch);
  if (mx < L.px || mx >= L.px + L.pw || my < L.py || my >= L.py + L.ph) {
    closeWorldItemInspect();
    return true;
  }
  const inR = (r) => mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
  const def0 = ITEMS[wi.itemId];
  if (inR(L.btnLeave)) {
    closeWorldItemInspect();
    return true;
  }
  if (inR(L.btnTake)) {
    const before = wi.count;
    if (wi.tryPickup(inventory)) {
      const picked = before - wi.count;
      const def = ITEMS[wi.itemId];
      if (picked > 0 && def) {
        pickupMsgText = "+" + picked + " " + def.name;
        pickupMsgTimer = 1.3;
      }
      player.applyEquipmentBonus(inventory);
      if (!wi.alive || wi.count <= 0) closeWorldItemInspect();
    } else {
      pickupMsgText = "Envanter dolu!";
      pickupMsgTimer = 1.2;
    }
    return true;
  }
  if (inR(L.btnEquip)) {
    const hadEq = !!(def0 && def0.equipSlot && inventory.equipped[def0.equipSlot]);
    const err = inventory.tryEquipOneFromId(wi.itemId, wi.upgrade | 0);
    if (err) {
      pickupMsgText = err;
      pickupMsgTimer = 1.6;
    } else {
      wi.count--;
      if (wi.count <= 0) wi.alive = false;
      player.applyEquipmentBonus(inventory);
      pickupMsgText = hadEq ? "E\u015fya de\u011fi\u015ftirildi!" : "Giyildi!";
      pickupMsgTimer = 1.2;
      closeWorldItemInspect();
    }
    return true;
  }
  return true;
}

function renderWorldItemInspect(ctx, cw, ch) {
  if (!worldItemInspect) return;
  const wi = worldItemInspect;
  if (!wi.alive || wi.count <= 0) {
    closeWorldItemInspect();
    return;
  }
  const def = ITEMS[wi.itemId];
  if (!def) {
    closeWorldItemInspect();
    return;
  }
  const L = worldItemInspectLayout(cw, ch);
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, cw, ch);

  ctx.fillStyle = "rgba(14,16,36,0.97)";
  ctx.strokeStyle = "#7080b0";
  ctx.lineWidth = 2;
  roundRect(ctx, L.px, L.py, L.pw, L.ph, 12);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "#e8e8f0";
  ctx.font = "bold 15px monospace";
  ctx.fillText("Yerdeki e\u015fya", L.px + 16, L.py + 28);

  const iconS = 52;
  const ix = L.px + 16, iy = L.py + 44;
  drawItemIconFancy(ctx, wi.itemId, ix, iy, iconS, { floorDrop: true, timeMs: performance.now() });
  ctx.fillStyle = "#f0d050";
  ctx.font = "bold 14px monospace";
  const uWiPre = wi.upgrade | 0;
  ctx.fillText(def.name + (uWiPre > 0 ? "(+" + uWiPre + ")" : "") + (wi.count > 1 ? "  x" + wi.count : ""), ix + iconS + 14, iy + 18);
  if (def.rarity && def.rarity !== "common") {
    ctx.fillStyle = getItemRarityColor(wi.itemId);
    ctx.font = "bold 11px monospace";
    ctx.fillText(RARITY_LABEL_TR[def.rarity] || def.rarity, ix + iconS + 14, iy + 38);
  }

  const layoutTt = buildItemTooltipLayout(ctx, def, wi.itemId, cw, touchState.mobileUI, { omitPrices: true, omitIdentity: true, upgradeLv: uWiPre }, []);
  let ty = iy + iconS + 12;
  const maxY = L.btnEquip.y - 8;
  for (const ln of layoutTt.lines) {
    if (ty > maxY) break;
    ctx.font = ln.font;
    ctx.fillStyle = ln.color;
    ctx.fillText(ln.text, L.px + 16, ty);
    ty += touchState.mobileUI ? 19 : 15;
  }

  const curW0 = def.equipSlot ? inventory.equipped[def.equipSlot] : null;
  const canEq = !!(def.equipSlot && (!curW0 || curW0.id !== wi.itemId || getStackUpgradeLv(curW0) !== uWiPre));
  ctx.fillStyle = canEq ? "rgba(45,90,55,0.92)" : "rgba(45,45,58,0.75)";
  ctx.strokeStyle = canEq ? "#70c080" : "#505060";
  roundRect(ctx, L.btnEquip.x, L.btnEquip.y, L.btnEquip.w, L.btnEquip.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = canEq ? "#f0fff0" : "#707080";
  ctx.font = "bold 11px monospace";
  const tEq = "Giy";
  ctx.fillText(tEq, L.btnEquip.x + (L.btnEquip.w - ctx.measureText(tEq).width) / 2, L.btnEquip.y + 22);

  ctx.fillStyle = "rgba(50,70,120,0.92)";
  ctx.strokeStyle = "#7090d0";
  roundRect(ctx, L.btnTake.x, L.btnTake.y, L.btnTake.w, L.btnTake.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#f0f4ff";
  ctx.font = "bold 11px monospace";
  const tTk = "Al";
  ctx.fillText(tTk, L.btnTake.x + (L.btnTake.w - ctx.measureText(tTk).width) / 2, L.btnTake.y + 22);

  ctx.fillStyle = "rgba(60,55,70,0.92)";
  ctx.strokeStyle = "#807090";
  roundRect(ctx, L.btnLeave.x, L.btnLeave.y, L.btnLeave.w, L.btnLeave.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#ddd";
  ctx.font = "bold 11px monospace";
  const tLv = "B\u0131rak";
  ctx.fillText(tLv, L.btnLeave.x + (L.btnLeave.w - ctx.measureText(tLv).width) / 2, L.btnLeave.y + 22);

  ctx.fillStyle = "#707890";
  ctx.font = "9px monospace";
  ctx.fillText("B\u0131rak: yerde b\u0131rak\u0131r. Giy: varsa eski e\u015fya envantere, yenisini ku\u015fan\u0131r.", L.px + 16, L.py + L.ph - 6);
}

/* ── Procedural World Generation ─────────────────────────── */

const T = TileType;

function hashXY(x, y) {
  let h = (x * 374761393 + y * 668265263) | 0;
  h = ((h ^ (h >> 13)) * 1274126177) | 0;
  return ((h ^ (h >> 16)) >>> 0) / 4294967296;
}

function noise2D(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hashXY(ix, iy), b = hashXY(ix + 1, iy);
  const c = hashXY(ix, iy + 1), d = hashXY(ix + 1, iy + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}

function fbm(x, y, oct) {
  let v = 0, amp = 1, freq = 1, tot = 0;
  for (let i = 0; i < oct; i++) { v += noise2D(x * freq, y * freq) * amp; tot += amp; amp *= 0.5; freq *= 2; }
  return v / tot;
}

function islandInfluence(c, r) {
  let best = 9999;
  for (const isl of ISLANDS) {
    const dx = c - isl.cx, dy = r - isl.cy;
    const rx = isl.rx != null ? isl.rx : isl.r;
    const ry = isl.ry != null ? isl.ry : isl.r;
    const e = Math.sqrt((dx * dx) / (rx * rx) + (dy * dy) / (ry * ry));
    const d = (e - 1) * Math.min(rx, ry);
    if (d < best) best = d;
  }
  return best;
}

function islandCellOwner(c, r) {
  let best = null, bestE = 999;
  for (const isl of ISLANDS) {
    const dx = c - isl.cx, dy = r - isl.cy;
    const rx = isl.rx != null ? isl.rx : isl.r;
    const ry = isl.ry != null ? isl.ry : isl.r;
    const e = Math.sqrt((dx * dx) / (rx * rx) + (dy * dy) / (ry * ry));
    if (e < 1 && e < bestE) {
      bestE = e;
      best = isl;
    }
  }
  return best;
}

        } else if (elevation > 0.65) {
          tile = T.STONE_FLOOR;
          if (h < 0.12) det = T.TREE;
        } else if (moisture > 0.55) {
          tile = T.TALL_GRASS;
          if (h < 0.15) det = T.TREE;
          else if (h < 0.18) det = T.FLOWER;
        } else if (moisture < 0.35) {
          tile = T.DIRT;
          if (h < 0.04) det = T.FLOWER;
        } else {
          tile = T.GRASS;
          if (h < 0.08) det = T.TREE;
          else if (h < 0.11) det = T.FLOWER;
        }
      }

      ground[idx] = tile;
      detail[idx] = det;
    }
  }

  const dockCol = VOX + 20;
  const gateVC = dockCol - VOX;
  for (let dc = -2; dc <= 2; dc++) {
    const c = dockCol + dc;
    for (let vr = VROWS - 1; vr >= VROWS - 2; vr--) {
      const idx = (VOY + vr) * WORLD_COLS + c;
      if (ground[idx] === T.WALL) { ground[idx] = T.DIRT; detail[idx] = -1; }
    }
  }
  for (let r = VOY + VROWS; r <= VOY + VROWS + 3; r++) {
    for (let dc = -2; dc <= 2; dc++) {
      const c = dockCol + dc;
      const idx = r * WORLD_COLS + c;
      ground[idx] = T.DIRT; detail[idx] = -1;
    }
  }

  const dockStartRow = VOY + VROWS + 2;

  for (let r = dockStartRow - 2; r <= dockStartRow + 1; r++) {
    for (let c = dockCol - 3; c <= dockCol + 3; c++) {
      const idx = r * WORLD_COLS + c;
      if (ground[idx] !== T.BRIDGE) { ground[idx] = T.SAND; detail[idx] = -1; }
    }
  }

  let dockEnd = dockStartRow;
  for (let r = dockStartRow; r < WORLD_ROWS - 1; r++) {
    const idx = r * WORLD_COLS + dockCol;
    if (r > dockStartRow + 3 && ground[idx] === T.WATER) {
      const ahead1 = (r + 2 < WORLD_ROWS) ? ground[(r + 2) * WORLD_COLS + dockCol] : T.WATER;
      const ahead2 = (r + 4 < WORLD_ROWS) ? ground[(r + 4) * WORLD_COLS + dockCol] : T.WATER;
      if (ahead1 === T.WATER && ahead2 === T.WATER) { dockEnd = r + 4; break; }
    }
    dockEnd = r + 1;
  }
  dockEnd = Math.min(dockEnd, WORLD_ROWS - 3);

  for (let r = dockStartRow; r <= dockEnd; r++) {
    for (let dc = -1; dc <= 1; dc++) {
      const c = dockCol + dc;
      const idx = r * WORLD_COLS + c;
      ground[idx] = T.BRIDGE;
      detail[idx] = -1;
    }
  }

  for (let dc = -3; dc <= 3; dc++) {
    const idx1 = dockEnd * WORLD_COLS + (dockCol + dc);
    const idx2 = (dockEnd - 1) * WORLD_COLS + (dockCol + dc);
    ground[idx1] = T.BRIDGE; detail[idx1] = -1;
    ground[idx2] = T.BRIDGE; detail[idx2] = -1;
  }

  return { ground, detail, dockEnd, dockCol };
}

const BOAT_RECIPE = { wood: 15, stone: 5, rope: 3 };

class CraftPanel {
  constructor() {
    this.open = false;
    this.feedbackText = "";
    this.feedbackTimer = 0;
    this.feedbackColor = "#50e050";
  }

  toggle() { this.open = !this.open; }
  close()  { this.open = false; }

  update(dt) {
    if (this.feedbackTimer > 0) this.feedbackTimer -= dt;
  }

  _showFeedback(text, color) {
    this.feedbackText = text;
    this.feedbackTimer = 2;
    this.feedbackColor = color || "#50e050";
  }

  canCraft(inv) {
    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      if (inv.countItem(item) < need) return false;
    }
    return true;
  }

  craft(inv, player) {
    if (player.hasBoat) {
      this._showFeedback("Zaten bir teknen var!", "#d0a030");
      return;
    }
    if (!this.canCraft(inv)) {
      this._showFeedback("Yeterli malzemen yok!", "#d04040");
      return;
    }
    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      inv.removeItem(item, need);
    }
    player.hasBoat = true;
    this._showFeedback("Tekne in\u015fa edildi!", "#50e050");
  }

  _panelLayout(cw, ch) {
    const b = uiModalBounds(cw, ch);
    const panW = Math.min(280, b.maxW);
    const panH = Math.min(220, b.maxH);
    const px = Math.floor((cw - panW) / 2);
    const py = Math.max(b.top, Math.min(ch - panH - b.bottom, Math.floor((ch - panH) / 2)));
    return { panW, panH, px, py };
  }

  handleClick(mx, my, canvasW, canvasH, inv, player) {
    if (!this.open) return;
    const { panW, panH, px, py } = this._panelLayout(canvasW, canvasH);

    const btnW = 120, btnH = 30;
    const btnX = px + (panW - btnW) / 2, btnY = py + panH - 50;
    if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
      this.craft(inv, player);
    }
  }

  render(ctx, canvasW, canvasH, inv, player) {
    if (!this.open) return;
    const { panW, panH, px, py } = this._panelLayout(canvasW, canvasH);

    ctx.fillStyle = "rgba(10,10,30,0.92)";
    ctx.strokeStyle = "#6080c0"; ctx.lineWidth = 2;
    roundRect(ctx, px, py, panW, panH, 10);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#80c0ff"; ctx.font = "bold 16px monospace";
    const title = "\u2693 Tekne Yap\u0131m\u0131";
    ctx.fillText(title, px + (panW - ctx.measureText(title).width) / 2, py + 28);

    let iy = py + 50;
    ctx.font = "13px monospace";
    ctx.fillStyle = "#c0c0d0";
    ctx.fillText("Gerekli malzemeler:", px + 20, iy); iy += 22;

    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      const have = inv.countItem(item);
      const enough = have >= need;
      drawItemIconFancy(ctx, item, px + 22, iy - 10, 18, {});
      ctx.fillStyle = enough ? "#50e050" : "#d04040";
      ctx.font = "13px monospace";
      ctx.fillText(ITEMS[item].name + ": " + have + " / " + need, px + 46, iy + 2);
      ctx.fillStyle = enough ? "#50e050" : "#d04040";
      ctx.fillText(enough ? " \u2714" : " \u2718", px + panW - 28, iy + 2);
      iy += 26;
    }

    if (player.hasBoat) {
      ctx.fillStyle = "#50e050"; ctx.font = "bold 13px monospace";
      ctx.fillText("\u2713 Teknen haz\u0131r! Su k\u0131y\u0131s\u0131nda B bas.", px + 30, iy + 14);
    } else {
      const btnW = Math.min(120, panW - 24), btnH = 30;
      const btnX = px + (panW - btnW) / 2, btnY = py + panH - 50;
      const canBuild = this.canCraft(inv);
      ctx.fillStyle = canBuild ? "rgba(50,120,50,0.9)" : "rgba(60,60,60,0.8)";
      roundRect(ctx, btnX, btnY, btnW, btnH, 6);
      ctx.fill();
      ctx.strokeStyle = canBuild ? "#60d060" : "#606060"; ctx.lineWidth = 1;
      roundRect(ctx, btnX, btnY, btnW, btnH, 6);
      ctx.stroke();
      ctx.fillStyle = canBuild ? "#f0f0f0" : "#808080";
      ctx.font = "bold 14px monospace";
      ctx.fillText("\u{1F6E0} \u0130n\u015fa Et", btnX + 16, btnY + 20);
    }

    if (this.feedbackTimer > 0) {
      const alpha = Math.min(1, this.feedbackTimer / 0.5);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.feedbackColor; ctx.font = "bold 14px monospace";
      ctx.fillText(this.feedbackText, px + panW / 2 - ctx.measureText(this.feedbackText).width / 2, py + panH + 20);
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = "#707090"; ctx.font = "10px monospace";
    ctx.fillText("[B] kapat", px + panW - 70, py + panH - 8);
  }
}

class Minimap {
  constructor(map) {
    this.visible = true;
    this.scale = 1;
    this.mapW = map.cols;
    this.mapH = map.rows;
    const maxDim = Math.max(this.mapW, this.mapH);
    if (maxDim > 200) this.scale = 200 / maxDim;
    this.w = Math.ceil(this.mapW * this.scale);
    this.h = Math.ceil(this.mapH * this.scale);
    this.offscreen = document.createElement("canvas");
    this.offscreen.width = this.w;
    this.offscreen.height = this.h;
    this._bakeMap(map);
  }

  _bakeMap(map) {
    const oc = this.offscreen.getContext("2d");
    const imgData = oc.createImageData(this.w, this.h);
    const d = imgData.data;

    const MINI_COLORS = {
      [T.GRASS]: [74,140,63], [T.DIRT]: [139,107,61], [T.WATER]: [49,114,184],
      [T.SAND]: [212,188,106], [T.STONE_FLOOR]: [138,138,138], [T.WALL]: [60,60,60],
      [T.TREE]: [30,90,20], [T.FLOWER]: [74,140,63], [T.BRIDGE]: [122,92,48],
      [T.TALL_GRASS]: [55,120,45],
      [T.SNOW]: [200,220,235],
    };

    for (let py = 0; py < this.h; py++) {
      for (let px = 0; px < this.w; px++) {
        const mc = Math.floor(px / this.scale);
        const mr = Math.floor(py / this.scale);
        let tile = map.getTile(mc, mr);
        const det = map.getDetail(mc, mr);
        if (det === T.TREE) tile = T.TREE;
        const rgb = MINI_COLORS[tile] || [255, 0, 255];
        const i = (py * this.w + px) * 4;
        d[i] = rgb[0]; d[i+1] = rgb[1]; d[i+2] = rgb[2]; d[i+3] = 255;
      }
    }
    oc.putImageData(imgData, 0, 0);
  }

  toggle() { this.visible = !this.visible; }

  render(ctx, canvasW, canvasH, cam, player, npcs, wildPets, activePet) {
    if (!this.visible) return;
    const pad = 10;
    const sideReserve = touchState.mobileUI ? MOBILE_MINIMAP_RIGHT_RESERVE_PX : 0;
    const dx = canvasW - this.w - pad - 4 - sideReserve;
    const dy = pad;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    roundRect(ctx, dx - 4, dy - 4, this.w + 8, this.h + 8, 6);
    ctx.fill();
    ctx.strokeStyle = "#606080"; ctx.lineWidth = 1;
    roundRect(ctx, dx - 4, dy - 4, this.w + 8, this.h + 8, 6);
    ctx.stroke();

    ctx.drawImage(this.offscreen, dx, dy);

    const vpx = dx + cam.x / TILE_SIZE * this.scale;
    const vpy = dy + cam.y / TILE_SIZE * this.scale;
    const vpw = cam.viewW / TILE_SIZE * this.scale;
    const vph = cam.viewH / TILE_SIZE * this.scale;
    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
    ctx.strokeRect(vpx, vpy, vpw, vph);

    for (const npc of npcs) {
      ctx.fillStyle = npc.color;
      ctx.fillRect(dx + npc.x / TILE_SIZE * this.scale - 1, dy + npc.y / TILE_SIZE * this.scale - 1, 3, 3);
    }
    for (const wp of wildPets) {
      if (!wp.alive) continue;
      ctx.fillStyle = "#ff80a0";
      ctx.fillRect(dx + wp.x / TILE_SIZE * this.scale - 1, dy + wp.y / TILE_SIZE * this.scale - 1, 2, 2);
    }
    if (activePet) {
      ctx.fillStyle = "#f0d050";
      ctx.fillRect(dx + activePet.x / TILE_SIZE * this.scale - 1, dy + activePet.y / TILE_SIZE * this.scale - 1, 3, 3);
    }

    const blink = Math.sin(Date.now() / 250) > 0;
    ctx.fillStyle = blink ? "#fff" : "#ff4040";
    const px = dx + player.centerX / TILE_SIZE * this.scale;
    const py2 = dy + player.centerY / TILE_SIZE * this.scale;
    ctx.fillRect(px - 2, py2 - 2, 4, 4);

    for (const isl of ISLANDS) {
      const ix = dx + isl.cx * this.scale;
      const iy = dy + isl.cy * this.scale;
      ctx.fillStyle = "rgba(255,200,80,0.6)";
      ctx.font = "7px monospace";
      ctx.fillText("\u25C6", ix - 3, iy + 3);
    }

    if (worldData.dockCol && worldData.dockEnd) {
      const dkx = dx + worldData.dockCol * this.scale;
      const dky = dy + (VOY + VROWS + 2) * this.scale;
      const dkh = (worldData.dockEnd - VOY - VROWS - 2) * this.scale;
      ctx.fillStyle = "#a08040";
      ctx.fillRect(dkx - 1, dky, 3, dkh);
      ctx.fillStyle = "#80c0ff";
      ctx.font = "7px monospace";
      ctx.fillText("\u2693", dkx - 4, dky - 2);
    }

    ctx.fillStyle = "#888"; ctx.font = "9px monospace";
    ctx.fillText("[M]", dx, dy + this.h + 12);
  }
}

function isSafeSpawn(col, row) { return !map.isSolid(col, row); }

function findBossSpawn(isl) {
  const rx = isl.rx != null ? isl.rx : isl.r;
  const tries = [
    [0, 0], [2, 0], [-2, 0], [0, 2], [0, -2], [3, 2], [-2, 3], [4, 0], [0, 4], [-3, -2],
    [Math.floor(rx * 0.35), 0], [0, Math.floor((isl.ry || isl.r) * 0.3)], [-Math.floor(rx * 0.3), 1],
    [1, 3], [-4, 0], [0, -4], [5, -2], [-5, 2],
  ];
  for (const [ox, oy] of tries) {
    const mc = Math.floor(isl.cx + ox), mr = Math.floor(isl.cy + oy);
    if (mc >= 0 && mc < WORLD_COLS && mr >= 0 && mr < WORLD_ROWS && isSafeSpawn(mc, mr))
      return { col: mc, row: mr };
  }
  return null;
}

function tryAttemptInventoryUpgrade(slot, def) {
  if (!slot || !def) return { ok: false, msg: "Ge\u00e7ersiz." };
  const lv = getStackUpgradeLv(slot);
  if (!itemCanUpgrade(def)) return { ok: false, msg: "Bu e\u015fya y\u00fckseltilemez." };
  if (lv >= MAX_ITEM_UPGRADE) return { ok: false, msg: "Maksimum g\u00fc\u00e7lendirme (+" + MAX_ITEM_UPGRADE + ")." };
  const cost = upgradeGoldCost(def, lv);
  if (inventory.gold < cost) {
    return { ok: false, msg: formatGold(cost) + " alt\u0131n gerekli." };
  }
  inventory.gold -= cost;
  const pct = upgradeSuccessPct(lv);
  if (Math.random() >= pct) {
    return {
      ok: false,
      fail: true,
      msg: "Ba\u015far\u0131s\u0131z! (bir sonraki: %" + Math.round(pct * 100) + " \u015fans)",
    };
  }
  slot.upgrade = lv + 1;
  return { ok: true, msg: "Y\u00fckseltme ba\u015far\u0131l\u0131! (+" + (lv + 1) + ")" };
}

function openInventorySlotInspect(kind, idx) {
  const container = kind === "slots" ? inventory.slots : inventory.hotbar;
  const slot = container[idx];
  if (!slot || slot.count <= 0) return;
  if (worldItemInspect) closeWorldItemInspect();
  inventorySlotInspect = { kind, idx };
}

function dropInventorySlotStackToWorld(kind, idx) {
  const container = kind === "slots" ? inventory.slots : inventory.hotbar;
  const slot = container[idx];
  if (!slot || slot.count <= 0) return false;
  const baseCol = Math.floor(player.centerX / TILE_SIZE);
  const baseRow = Math.floor(player.centerY / TILE_SIZE);
  const offs = [[0, 0], [1, 0], [-1, 0], [0, 1], [0, -1], [2, 0], [-2, 0], [0, 2], [0, -2], [1, 1], [-1, -1], [1, -1], [-1, 1]];
  for (const [dx, dy] of offs) {
    const c = baseCol + dx, r = baseRow + dy;
    if (c < 0 || r < 0 || c >= map.cols || r >= map.rows) continue;
    if (map.isSolid(c, r, player.inBoat)) continue;
    const wi = new WorldItem(c, r, slot.id, slot.count, false);
    const u = getStackUpgradeLv(slot);
    if (u > 0) wi.upgrade = u;
    worldItems.push(wi);
    container[idx] = null;
    return true;
  }
  pickupMsgText = "Buraya b\u0131rak\u0131lam\u0131yor!";
  pickupMsgTimer = 1.4;
  return false;
}

function inventorySlotInspectLayout(cw, ch) {
  const b = uiModalBounds(cw, ch);
  const pw = Math.min(320, b.maxW);
  const ph = Math.min(430, b.maxH);
  const px = Math.floor((cw - pw) / 2);
  const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
  const btnH = 34;
  const btnY = py + ph - btnH - 14;
  const gap = 8;
  const nBtn = 3;
  const bw = Math.floor((pw - 32 - gap * (nBtn - 1)) / nBtn);
  const btnEquip = { x: px + 16, y: btnY, w: bw, h: btnH };
  const btnDrop = { x: px + 16 + bw + gap, y: btnY, w: bw, h: btnH };
  const btnClose = { x: px + 16 + (bw + gap) * 2, y: btnY, w: bw, h: btnH };
  const btnUpgrade = { x: px + 16, y: btnY - btnH - 10, w: pw - 32, h: btnH };
  return { px, py, pw, ph, btnEquip, btnDrop, btnClose, btnUpgrade };
}

function handleInventorySlotInspectClick(mx, my, cw, ch) {
  if (!inventorySlotInspect) return false;
  const { kind, idx } = inventorySlotInspect;
  const container = kind === "slots" ? inventory.slots : inventory.hotbar;
  const slot = container[idx];
  if (!slot || slot.count <= 0) {
    closeInventorySlotInspect();
    return true;
  }
  const L = inventorySlotInspectLayout(cw, ch);
  const inR = (r) => mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
  if (inR(L.btnClose)) {
    closeInventorySlotInspect();
    return true;
  }
  if (mx < L.px || mx >= L.px + L.pw || my < L.py || my >= L.py + L.ph) {
    closeInventorySlotInspect();
    return false;
  }
  if (inR(L.btnUpgrade)) {
    const defU = ITEMS[slot.id];
    const res = tryAttemptInventoryUpgrade(slot, defU);
    pickupMsgText = res.msg;
    pickupMsgTimer = 1.85;
    if (res.ok) player.applyEquipmentBonus(inventory);
    if (!res.ok && res.fail) { /* gold already spent */ }
    return true;
  }
  if (inR(L.btnDrop)) {
    if (dropInventorySlotStackToWorld(kind, idx)) {
      closeInventorySlotInspect();
      player.applyEquipmentBonus(inventory);
    }
    return true;
  }
  if (inR(L.btnEquip)) {
    const defE = ITEMS[slot.id];
    if (!defE || !defE.equipSlot) {
      pickupMsgText = "Bu e\u015fya giyilmez.";
      pickupMsgTimer = 1.2;
      return true;
    }
    const hadEq = !!(defE.equipSlot && inventory.equipped[defE.equipSlot]);
    const err = inventory.tryEquipFromContainerSlotReplace(container, idx);
    if (err) {
      pickupMsgText = err;
      pickupMsgTimer = 1.4;
      return true;
    }
    player.applyEquipmentBonus(inventory);
    pickupMsgText = hadEq ? "E\u015fya de\u011fi\u015ftirildi!" : "Giyildi!";
    pickupMsgTimer = 1.2;
    closeInventorySlotInspect();
    return true;
  }
  return true;
}

function spawnMonsters() {
  const list = [];
  for (const md of MAINLAND_MONSTERS) {
    if (isSafeSpawn(md.col, md.row)) list.push(new Monster(md.col, md.row, md.type, 1));
  }
  for (const isl of ISLANDS) {
    if (!isl.monsters) continue;
    const mList = isl.monsters;
    for (let i = 0; i < mList.length; i++) {
      const angle = (i / mList.length) * Math.PI * 2;
      const rx = isl.rx != null ? isl.rx : isl.r;
      const ry = isl.ry != null ? isl.ry : isl.r;
      const mc = Math.floor(isl.cx + Math.cos(angle) * rx * 0.45);
      const mr = Math.floor(isl.cy + Math.sin(angle) * ry * 0.45);
      if (isSafeSpawn(mc, mr)) list.push(new Monster(mc, mr, mList[i], isl.scale || 1));
    }
    if (isl.boss && MONSTER_TYPES[isl.boss]) {
      const sp = findBossSpawn(isl);
      if (sp) list.push(new Monster(sp.col, sp.row, isl.boss, (isl.scale || 1) * 1.65));
    }
  }
  return list;
}
