const MELEE_RANGE = 46;
const MELEE_CONE_HALF = Math.PI * 0.42;
/** Ok fırlatılırken bu yarıçap içindeki en yakın canavara doğrudan nişan (uçuşta takip yok). */
const ARROW_AIM_ASSIST_RANGE = TILE_SIZE * 13;

function angleAbsDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return Math.abs(d);
}

function playerHasBladeWeapon(inv) {
  const e = inv.equipped && inv.equipped.blade;
  return !!(e && ITEMS[e.id] && ITEMS[e.id].equipSlot === "blade");
}

function playerHasBowEquipped(inv) {
  const e = inv.equipped && inv.equipped.bow;
  return !!(e && ITEMS[e.id] && ITEMS[e.id].equipSlot === "bow");
}

function arrowLaunchAngleTowardNearestInRange(fromX, fromY, fallbackAngle, monsters) {
  let best = null;
  let bestD = Infinity;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const d = m.distTo(fromX, fromY);
    if (d < 6 || d > ARROW_AIM_ASSIST_RANGE) continue;
    if (d < bestD) { bestD = d; best = m; }
  }
  if (!best) return fallbackAngle;
  return Math.atan2(best.cy - fromY, best.cx - fromX);
}

function tryPlayerMeleeAttack(player, inventory, monsters) {
  if (!playerHasBladeWeapon(inventory)) return false;
  if (player.meleeCooldown > 0 || player.inBoat) return false;
  const px = player.centerX, py = player.centerY;
  const pa = player.angle;
  let best = null;
  let bestD = Infinity;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const dx = m.cx - px, dy = m.cy - py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > MELEE_RANGE) continue;
    const ta = Math.atan2(dy, dx);
    if (angleAbsDiff(pa, ta) > MELEE_CONE_HALF) continue;
    if (dist < bestD) { bestD = dist; best = m; }
  }
  if (!best) return false;
  const rawMelee = player.getMeleeDamage();
  best.takeDamage(applyOutgoingPlayerDamage(rawMelee, player, inventory, { monster: best }));
  player.meleeCooldown = 0.48;
  player.swingAnim = 0.28;
  player.gainXP(2);
  return true;
}

function tryReleasePowerShotClick() {
  if (!player.powerCharging || player.powerCharge <= 0.1) return false;
  if (!playerHasBowEquipped(inventory)) {

    pickupMsgTimer = 1.2;
  } else if (inventory.countItem("arrow") > 0 && player.mana >= player.manaCostPower) {
    inventory.removeItem("arrow", 1);
    player.useMana(player.manaCostPower);
    player.shootCooldown = 0.5;
    player.shootAnim = 0.3;
    const sx = player.centerX + Math.cos(player.angle) * 14;
    const sy = player.centerY + Math.sin(player.angle) * 14;
    const aimAng = arrowLaunchAngleTowardNearestInRange(sx, sy, player.angle, monsters);
    const pa = new Arrow(sx, sy, aimAng);
    pa.power = true;
    pa.damage = applyOutgoingPlayerDamage(player.getPowerDamage(), player, inventory, {});
    pa.speed *= 1.5;
    arrows.push(pa);
    player.gainXP(3);
  }
  player.powerCharging = false;
  player.powerCharge = 0;
  return true;
}

function tryMeleeOrRangedClick() {
  if (tryPlayerMeleeAttack(player, inventory, monsters)) return true;
  if (player.shootCooldown <= 0 && inventory.countItem("arrow") > 0) {
    if (!playerHasBowEquipped(inventory)) {
      if (pickupMsgTimer <= 0) {
        pickupMsgText = "Ok atmak i\u00e7in yay ku\u015fan!";
        pickupMsgTimer = 1.2;
      }
      return false;
    } else if (player.useMana(player.manaCostShoot)) {
      inventory.removeItem("arrow", 1);
      player.shootCooldown = 0.35;
      player.shootAnim = 0.25;
      const sx = player.centerX + Math.cos(player.angle) * 14;
      const sy = player.centerY + Math.sin(player.angle) * 14;
      const aimAng = arrowLaunchAngleTowardNearestInRange(sx, sy, player.angle, monsters);
      const na = new Arrow(sx, sy, aimAng);
      na.damage = applyOutgoingPlayerDamage(player.getRangedDamage(), player, inventory, {});
      arrows.push(na);
      player.gainXP(1);
      return true;
    } else {
      if (pickupMsgTimer <= 0) {
        pickupMsgText = "Yeterli mana yok!";
        pickupMsgTimer = 1;
      }
      return false;
    }
  }
  return false;
}

function combatPanelsBlockAutoAttack() {
  return inventory.open || petPanel.open || dialog.active || shop.open || craftPanel.open || charPanel.open || !!worldItemInspect || !!inventorySlotInspect;
}

function snapAimToNearestMonster() {
  const px = player.centerX, py = player.centerY;
  let best = null, bestD = Infinity;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const d = m.distTo(px, py);
    if (d < 10 || d > ARROW_AIM_ASSIST_RANGE) continue;
    if (d < bestD) { bestD = d; best = m; }
  }
  if (!best) {
    pickupMsgText = "Yak\u0131nda hedef yok";
    pickupMsgTimer = 0.75;
    return;
  }
  player.aimAt(best.cx, best.cy);
}

function skillCastWhirl() {
  const px = player.centerX, py = player.centerY, R = 78;
  let n = 0;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    if (m.distTo(px, py) > R) continue;
    const raw = player.getMeleeDamage() * 0.62;
    m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
    n++;
  }
  player.swingAnim = Math.max(player.swingAnim, 0.38);
  if (n) addScreenShake(2.2);
  player.gainXP(Math.min(3, n));
  return true;
}

function skillCastNova() {
  const px = player.centerX, py = player.centerY, R = 132;
  let n = 0;
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    if (m.distTo(px, py) > R) continue;
    const raw = player.getRangedDamage() * 0.95;
    m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
    n++;
  }
  player.skillAuraT = Math.max(player.skillAuraT || 0, 0.48);
  addScreenShake(n ? 3 : 1);
  player.gainXP(Math.min(4, n));
  return true;
}

function spawnSkillBolt(element) {
  const sx = player.centerX + Math.cos(player.angle) * 14;
  const sy = player.centerY + Math.sin(player.angle) * 14;
  const aimAng = arrowLaunchAngleTowardNearestInRange(sx, sy, player.angle, monsters);
  const a = new Arrow(sx, sy, aimAng);
  a.damage = applyOutgoingPlayerDamage(
    player.getRangedDamage() * (element === "fire" ? 1.15 : 1.05),
    player, inventory, {}
  );
  a.element = element;
  if (element === "ice") a.speed = 245;
  arrows.push(a);
  player.shootAnim = 0.22;
  return true;
}

function skillCastDash() {
  const step = 52;
  const dx = Math.cos(player.angle), dy = Math.sin(player.angle);
  let moved = false;
  const margin = 3;
  const newX = player.x + dx * step;
  const newY = player.y + dy * step;
  if (!player._collides(newX, player.y, map, margin)) { player.x = newX; moved = true; }
  if (!player._collides(player.x, newY, map, margin)) { player.y = newY; moved = true; }
  if (moved) {
    addScreenShake(1.2);
    return true;
  }
  pickupMsgText = "\u0130leri \u00e7\u0131kam\u0131yorsun";
  pickupMsgTimer = 0.55;
  return false;
}

function skillCastThunder() {
  const px = player.centerX, py = player.centerY;
  const list = [];
  for (const m of monsters) {
    if (!m.alive || m.state === "dying") continue;
    const d = m.distTo(px, py);
    if (d < 10 || d > 142) continue;
    list.push({ m, d });
  }
  list.sort((a, b) => a.d - b.d);
  const hits = list.slice(0, 2);
  if (!hits.length) {
    pickupMsgText = "Yak\u0131nda hedef yok";
    pickupMsgTimer = 0.65;
    return false;
  }
  const raw = player.getRangedDamage() * 1.25;
  for (const { m } of hits) {
    m.takeDamage(applyOutgoingPlayerDamage(raw, player, inventory, { monster: m }));
  }
  addScreenShake(3.5);
  player.gainXP(2 * hits.length);
  return true;
}

function skillCastMend() {
  const h = Math.max(8, Math.floor(player.maxHp * 0.14));
  player.heal(h);
  player.skillAuraT = Math.max(player.skillAuraT || 0, 0.35);
  return true;
}

function skillCastVolley() {
  if (!playerHasBowEquipped(inventory)) {
    pickupMsgText = "Salvo i\u00e7in yay gerekli!";
    pickupMsgTimer = 1;
    return false;
  }
  if (inventory.countItem("arrow") < 3) {
    pickupMsgText = "En az 3 ok gerekli!";
    pickupMsgTimer = 0.9;
    return false;
  }
  const base = player.angle;
  const spread = 0.24;
  for (let k = -1; k <= 1; k++) {
    inventory.removeItem("arrow", 1);
    const ang = base + k * spread;
    const sx = player.centerX + Math.cos(base) * 14;
    const sy = player.centerY + Math.sin(base) * 14;
    const a = new Arrow(sx, sy, ang);
    a.damage = applyOutgoingPlayerDamage(player.getRangedDamage() * 0.72, player, inventory, {});
    arrows.push(a);
  }
  player.shootAnim = 0.32;
  player.gainXP(2);
  return true;
}

function tryCastActiveSkill(slotIndex) {
  if (player.inBoat) {
    pickupMsgText = "Teknede beceri kullan\u0131lamaz";
    pickupMsgTimer = 0.8;
    return false;
  }
  if (combatPanelsBlockAutoAttack()) return false;
  const def = ACTIVE_SKILL_DEFS[slotIndex];
  if (!def) return false;
  if ((player.activeSkillCd[slotIndex] || 0) > 0) {
    pickupMsgText = "Beceri \u015farj oluyor (" + player.activeSkillCd[slotIndex].toFixed(1) + "sn)";
    pickupMsgTimer = 0.45;
    return false;
  }
  if (player.mana < def.mana) {
    pickupMsgText = "Yeterli mana yok";
    pickupMsgTimer = 0.9;
    return false;
  }
  let ok = false;
  switch (def.id) {
    case "whirl": ok = skillCastWhirl(); break;
    case "nova": ok = skillCastNova(); break;
    case "fire": ok = spawnSkillBolt("fire"); break;
    case "frost": ok = spawnSkillBolt("ice"); break;
    case "dash": ok = skillCastDash(); break;
    case "thunder": ok = skillCastThunder(); break;
    case "mend": ok = skillCastMend(); break;
    case "volley": ok = skillCastVolley(); break;
    default: ok = false;
  }
  if (ok) {
    player.mana -= def.mana;
    player.activeSkillCd[slotIndex] = def.cooldown;
  }
  return ok;
}

/** Sol t\u0131k veya mobil sald\u0131r\u0131 bas\u0131l\u0131 tutuldu\u011funda cooldown/mana izin verdik\u00e7e otomatik vuru\u015f/ok. */
function tryAutoAttackWhileHeld() {
  if (player.inBoat || combatPanelsBlockAutoAttack()) return;
  const shiftHeld = isDown("ShiftLeft") || isDown("ShiftRight");
  if (shiftHeld && player.powerCharging) return;
  const mouseHeld = canvasMouse0Down && !touchState.mobileUI;
  const mobileAttackHeld = touchState.mobileUI && touchState.attackId >= 0;
  if (!mouseHeld && !mobileAttackHeld) return;
  tryMeleeOrRangedClick();
}

canvas.addEventListener("mousedown", (e) => {
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
  if (e.button === 0) canvasMouse0Down = true;
  if (charPanel.open) {
    charPanel.handleClick(e.clientX, e.clientY, canvasW, canvasH, player, inventory);
    e.preventDefault();
    return;
  }
  if (craftPanel.open) {
    craftPanel.handleClick(e.clientX, e.clientY, canvasW, canvasH, inventory, player);
    e.preventDefault(); return;
  }
  if (shop.open) {
    shop.handleClick(e.clientX, e.clientY, canvasW, canvasH, inventory, e.shiftKey, e.button);
    e.preventDefault(); return;
  }
  if (inventory.open && inventorySlotInspect && e.button === 0) {
    if (handleInventorySlotInspectClick(e.clientX, e.clientY, canvasW, canvasH)) {
      canvasMouse0Down = false;
      e.preventDefault();
      return;
    }
  }
  if (inventory.open && e.button === 0) {
    if (inventory.tryBeginEquipLongPress(e.clientX, e.clientY, canvasW, canvasH)) {
      e.preventDefault(); return;
    }
  }
  const handled = inventory.handleClick(e.clientX, e.clientY, canvasW, canvasH, e.button === 2);
  if (handled) { e.preventDefault(); return; }

  if (e.button === 0 && worldItemInspect) {
    handleWorldItemInspectClick(e.clientX, e.clientY, canvasW, canvasH);
    canvasMouse0Down = false;
    e.preventDefault();
    return;
  }

  if (e.button === 0 && !inventory.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open && !player.inBoat) {
    if (tryOpenWorldItemInspect(e.clientX, e.clientY)) {
      canvasMouse0Down = false;
      e.preventDefault();
      return;
    }
  }

  if (e.button === 0 && !inventory.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open) {
    if (tryCombatPotionClick(e.clientX, e.clientY)) {
      e.preventDefault();
      return;
    }
  }

  if (e.button === 0 && !inventory.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open && !player.inBoat) {
    if (player.powerCharging && player.powerCharge > 0.1) {
      tryReleasePowerShotClick();
    }
  }
});
canvas.addEventListener("contextmenu", (e) => { if (inventory.open || shop.open) e.preventDefault(); });
canvas.addEventListener("mousemove", (e) => {
  inventory.handleMouseMove(e.clientX, e.clientY, canvasW, canvasH);
  if (inventory.open) inventory.cancelSlotPressIfMovedOff(e.clientX, e.clientY, canvasW, canvasH);
  shop.handleMouseMove(e.clientX, e.clientY, canvasW, canvasH, inventory);
});
window.addEventListener("mouseup", (e) => {
  if (e.button === 0) {
    canvasMouse0Down = false;
    if (inventory.open) inventory.finishSlotPress(e.clientX, e.clientY, canvasW, canvasH, false);
  }
});
canvas.addEventListener("wheel", (e) => {
  if (shop.open) {
    const land = canvasW > canvasH * 1.02;
    const dy = e.deltaY > 0 ? (land ? 2.2 : 1) : (land ? -2.2 : -1);
    shop.handleScroll(dy, e.clientX, e.clientY, canvasW, canvasH);
    e.preventDefault();
  }
}, { passive: false });

function tryMobileClosePanels(mx, my) {
  if (!touchState.mobileUI || !hitMobileCloseChip(mx, my, canvasW)) return false;
  if (dialog.active) { dialog.close(); return true; }
  if (shop.open) { shop.close(); return true; }
  if (craftPanel.open) { craftPanel.close(); return true; }
  if (inventory.open) {
    if (inventorySlotInspect) { closeInventorySlotInspect(); return true; }
    inventory.close();
    return true;
  }
  if (petPanel.open) { petPanel.close(); return true; }
  if (charPanel.open) { charPanel.close(); return true; }
  if (worldItemInspect) { closeWorldItemInspect(); return true; }
  if (inventorySlotInspect) { closeInventorySlotInspect(); return true; }
  return false;
}

function handleCanvasTouchStart(e) {
  refreshMobileUI();
  updateTouchLayout();

  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const mx = t.clientX, my = t.clientY, id = t.identifier;
    mouseX = mx;
    mouseY = my;

    if (tryMobileClosePanels(mx, my)) continue;

    if (craftPanel.open) {
      craftPanel.handleClick(mx, my, canvasW, canvasH, inventory, player);
      continue;
    }
    if (shop.open) {
      if (shop.tryBeginGridScroll(id, mx, my, canvasW, canvasH, inventory)) continue;
      shop.handleClick(mx, my, canvasW, canvasH, inventory, false, 0);
      continue;
    }
    if (inventory.open) {
      if (inventorySlotInspect) {
        if (handleInventorySlotInspectClick(mx, my, canvasW, canvasH)) continue;
      }
      inventory.handleClick(mx, my, canvasW, canvasH, false);
      continue;
    }

    if (charPanel.open) {
      charPanel.handleClick(mx, my, canvasW, canvasH, player, inventory);
      continue;
    }

    if (petPanel.open && activePet) {
      const { px, py, pw, ph } = petPanel.getPanelBounds(canvasW, canvasH);
      if (mx < px || mx > px + pw || my < py || my > py + ph) petPanel.close();
      continue;
    }

    if (dialog.active) {
      dialog.advance();
      continue;
    }

    if (worldItemInspect) {
      handleWorldItemInspectClick(mx, my, canvasW, canvasH);
      continue;
    }

    if (!inventory.open && !petPanel.open && !dialog.active && !shop.open && !craftPanel.open && !charPanel.open && !player.inBoat) {
      if (tryOpenWorldItemInspect(mx, my)) continue;
    }

    if (!touchState.mobileUI) continue;

    if (!shop.open && !craftPanel.open && tryCombatPotionClick(mx, my)) continue;

    const br = hitMobileButton(mx, my, canvasW, canvasH);
    if (br) {
      if (br.kind === "attack") {
        touchState.attackId = id;
        touchState.attackT0 = performance.now();
      } else {
        touchState.btnDown.set(id, {
          key: br.key,
          kind: br.kind,
          skillSlot: br.skillSlot,
          ox: mx, oy: my,
        });
      }
      continue;
    }

    const joyLeftMaxX = canvasW * 0.48;
    if (touchState.joyId < 0 && mx < joyLeftMaxX) {
      touchState.joyId = id;
      touchState.joyCx = mx;
      touchState.joyCy = my;
      touchState.joyOx = mx;
      touchState.joyOy = my;
      touchState.joyDx = 0;
      touchState.joyDy = 0;
      continue;
    }

    if (touchState.aimId < 0) {
      touchState.aimId = id;
      touchState.aimX = mx;
      touchState.aimY = my;
    }
  }
  e.preventDefault();
}

function handleCanvasTouchMove(e) {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const mx = t.clientX, my = t.clientY, id = t.identifier;
    mouseX = mx;
    mouseY = my;

    if (shop.open && shop.gridScrollTouchId === id) {
      const dy = my - shop.gridScrollLastY;
      shop.gridScrollLastY = my;
      shop.applyTouchGridScroll(-dy, canvasW, canvasH, inventory);
    }
    if (id === touchState.joyId) {
      let dx = mx - touchState.joyOx, dy = my - touchState.joyOy;
      const max = touchState.joyR * 0.88;
      const len = Math.hypot(dx, dy) || 1;
      if (len > max) { dx = (dx / len) * max; dy = (dy / len) * max; }
      touchState.joyDx = dx / max;
      touchState.joyDy = dy / max;
    }
    if (id === touchState.aimId) {
      touchState.aimX = mx;
      touchState.aimY = my;
    }

    if (inventory.open) {
      inventory.handleMouseMove(mx, my, canvasW, canvasH);
      inventory.cancelSlotPressIfMovedOff(mx, my, canvasW, canvasH);
    }
    if (shop.open) shop.handleMouseMove(mx, my, canvasW, canvasH, inventory);
  }
  e.preventDefault();
}

function pulseMobileButtonKey(key) {
  if (key === "swap") {
    touchState.skillBarPage = 1 - (touchState.skillBarPage | 0);
    pickupMsgText = (touchState.skillBarPage ? "Beceri \u00e7ubu\u011fu B" : "Beceri \u00e7ubu\u011fu A");
    pickupMsgTimer = 0.65;
    return;
  }
  if (key === "target") {
    snapAimToNearestMonster();
    return;
  }
  if (key === "KeyE") {
    if (actionCooldown <= 0) handleInteraction();
    return;
  }
  if (key === "KeyQ") pulseJust("KeyQ");
  else if (key === "KeyR") pulseJust("KeyR");
  else if (key === "KeyC") pulseJust("KeyC");
  else if (key === "KeyI") pulseJust("KeyI");
  else if (key === "KeyM") pulseJust("KeyM");
  else if (key === "KeyB") pulseJust("KeyB");
}

function handleCanvasTouchEnd(e) {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const mx = t.clientX, my = t.clientY, id = t.identifier;

    if (inventory.open && id === touchState.invSlotPressId) {
      touchState.invSlotPressId = -1;
      inventory.finishSlotPress(mx, my, canvasW, canvasH, false);
    }

    if (shop.open && id === shop.gridScrollTouchId) {
      shop.gridScrollTouchId = -1;
    }
    if (id === touchState.joyId) {
      touchState.joyId = -1;
      touchState.joyDx = 0;
      touchState.joyDy = 0;
    }
    if (id === touchState.aimId) touchState.aimId = -1;

    if (id === touchState.attackId) {
      touchState.attackId = -1;
      if (!(isDown("ShiftLeft") || isDown("ShiftRight"))) {
        player.powerCharging = false;
        player.powerCharge = 0;
      }
    }

    const bd = touchState.btnDown.get(id);
    if (bd) {
      touchState.btnDown.delete(id);
      const moved = Math.hypot(mx - bd.ox, my - bd.oy);
      if (moved < 22) {
        if (bd.skillSlot != null && bd.skillSlot !== undefined) tryCastActiveSkill(bd.skillSlot);
        else pulseMobileButtonKey(bd.key);
      }
    }
  }
  e.preventDefault();
}

function handleCanvasTouchCancel(e) {
  handleCanvasTouchEnd(e);
}

canvas.addEventListener("touchstart", handleCanvasTouchStart, { passive: false });
canvas.addEventListener("touchmove", handleCanvasTouchMove, { passive: false });
canvas.addEventListener("touchend", handleCanvasTouchEnd, { passive: false });
canvas.addEventListener("touchcancel", handleCanvasTouchCancel, { passive: false });

function renderTouchOverlay(ctx) {
  if (!touchState.mobileUI) return;
  const cw = canvasW, ch = canvasH;
  const modal = dialog.active || inventory.open || petPanel.open || shop.open || craftPanel.open || charPanel.open || !!worldItemInspect || !!inventorySlotInspect;
  if (modal) {
    ctx.fillStyle = "rgba(30,30,50,0.85)";
    roundRect(ctx, cw - 50, 8, 42, 40, 8);
    ctx.fill();
    ctx.strokeStyle = "#c08080";
    ctx.lineWidth = 2;
    roundRect(ctx, cw - 50, 8, 42, 40, 8);
    ctx.stroke();
    ctx.fillStyle = "#f0e0e0";
    ctx.font = "bold 22px monospace";
    ctx.fillText("\u00D7", cw - 33, 37);
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.font = "9px monospace";
    ctx.fillText("Kapat", cw - 44, 52);
    return;
  }

  if (touchState.joyId >= 0) {
    const J = touchState;
    ctx.globalAlpha = 0.42;
    ctx.fillStyle = "rgba(255,255,255,0.28)";
    ctx.beginPath();
    ctx.arc(J.joyCx, J.joyCy, J.joyR, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.72;
    ctx.strokeStyle = "rgba(120,130,170,0.85)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(J.joyCx, J.joyCy, J.joyR, 0, Math.PI * 2);
    ctx.stroke();
    const kx = J.joyOx + J.joyDx * J.joyR * 0.88, ky = J.joyOy + J.joyDy * J.joyR * 0.88;
    ctx.fillStyle = "rgba(255,255,255,0.82)";
    ctx.beginPath();
    ctx.arc(kx, ky, J.joyR * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  const btns = mobileButtonsLayout(cw, ch);
  for (const b of btns) {
    if (b.kind === "attack") {
      const onAttack = touchState.attackId >= 0;
      ctx.fillStyle = onAttack ? "rgba(110,80,145,0.96)" : "rgba(248,248,252,0.94)";
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = onAttack ? "#d8b0ff" : "#a0a0c0";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = onAttack ? "#f8f0ff" : "#383850";
      ctx.font = "bold 19px monospace";
      ctx.fillText(b.label, b.cx - ctx.measureText(b.label).width / 2, b.cy + 6);
      continue;
    }
    if (b.kind === "skill") {
      const cd = player.activeSkillCd[b.skillSlot] || 0;
      const def = ACTIVE_SKILL_DEFS[b.skillSlot];
      const maxCd = def ? def.cooldown : 1;
      ctx.fillStyle = "rgba(248,248,255,0.93)";
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#9898b8";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if (cd > 0 && maxCd > 0) {
        const frac = Math.min(1, cd / maxCd);
        ctx.fillStyle = "rgba(18,18,36,0.5)";
        ctx.beginPath();
        ctx.moveTo(b.cx, b.cy);
        ctx.arc(b.cx, b.cy, b.r, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillStyle = "#303048";
      ctx.font = "bold 15px monospace";
      ctx.fillText(b.label, b.cx - ctx.measureText(b.label).width / 2, b.cy + 5);
      continue;
    }
    if (b.kind === "swap" || b.kind === "target") {
      const onAux = touchState.btnDown.size && [...touchState.btnDown.values()].some((v) => v.key === b.key);
      ctx.fillStyle = onAux ? "rgba(120,95,155,0.96)" : "rgba(248,248,255,0.94)";
      ctx.beginPath();
      ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = onAux ? "#e8c8ff" : "#9090b0";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = onAux ? "#fff8ff" : "#383850";
      ctx.font = "bold 14px monospace";
      ctx.fillText(b.label, b.cx - ctx.measureText(b.label).width / 2, b.cy + 5);
      ctx.fillStyle = "rgba(210,210,230,0.95)";
      ctx.font = "7px monospace";
      const sub = b.kind === "swap" ? "SWAP" : "HEDEF";
      ctx.fillText(sub, b.cx - ctx.measureText(sub).width / 2, b.cy + b.r + 10);
      continue;
    }
    const onRect = touchState.btnDown.size && [...touchState.btnDown.values()].some((v) => v.key === b.key);
    ctx.fillStyle = onRect ? "rgba(90,70,120,0.92)" : "rgba(36,36,56,0.9)";
    roundRect(ctx, b.x, b.y, b.w, b.h, 6);
    ctx.fill();
    ctx.strokeStyle = onRect ? "#d0a0ff" : "#7070a0";
    ctx.lineWidth = 1.5;
    roundRect(ctx, b.x, b.y, b.w, b.h, 6);
    ctx.stroke();
    ctx.fillStyle = "#e8e8f0";
    ctx.font = b.kind === "menu" ? "bold 12px monospace" : "bold 11px monospace";
    const ly = b.y + b.h / 2 + (b.kind === "menu" ? 4 : 4);
    ctx.fillText(b.label, b.x + b.w / 2 - ctx.measureText(b.label).width / 2, ly);
  }
}

const CHOP_TREE_RANGE = TILE_SIZE * 1.7;

/** Teknede iken ayak ve g\u00f6vde merkezi su karosunda m\u0131? K\u0131y\u0131da biri karada kal\u0131nca inme / \u00e7arp\u0131\u015fma i\u00e7in kullan\u0131l\u0131r. */
function playerBoatFullyOnWater(map, player) {
  const feetW = map.getGroundTileAtPx(player.feetX, player.feetY) === TileType.WATER;
  const ctrW = map.isWaterPx(player.centerX, player.centerY);
  return feetW && ctrW;
}

function canChopFacingTree(player, map, inventory) {
  if (player.inBoat) return false;
  if (inventory.countItem("axe") < 1) return false;
  const ft = player.getFacingTile();
  const col = ft.col, row = ft.row;
  const tcx = (col + 0.5) * TILE_SIZE, tcy = (row + 0.5) * TILE_SIZE;
  const dx = tcx - player.centerX, dy = tcy - player.centerY;
  if (dx * dx + dy * dy > CHOP_TREE_RANGE * CHOP_TREE_RANGE) return false;
  if (map.getDetail(col, row) === TileType.TREE) return true;
  return map.getTile(col, row) === TileType.TREE;
}

function tryChopTree(player, map, inventory) {
  if (!canChopFacingTree(player, map, inventory)) return false;
  const ft = player.getFacingTile();
  const col = ft.col, row = ft.row;
  if (map.getDetail(col, row) === TileType.TREE) {
    map.setDetail(col, row, -1);
  } else if (map.getTile(col, row) === TileType.TREE) {
    map.setTile(col, row, TileType.GRASS);
    map.setDetail(col, row, -1);
  } else {
    return false;
  }
  const woodAmt = 3 + Math.floor(Math.random() * 3);
  inventory.addItem("wood", woodAmt);
  player.gainXP(1);
  pickupMsgText = "+" + woodAmt + " Odun";
  pickupMsgTimer = 1.5;
  actionCooldown = 0.28;
  return true;
}

function handleInteraction() {
  if (actionCooldown > 0) return;

  if (inventory.open || petPanel.open || shop.open || craftPanel.open || charPanel.open || worldItemInspect || !!inventorySlotInspect) return;

  if (dialog.active) { dialog.advance(); actionCooldown = 0.2; return; }

  for (const wi of worldItems) {
    if (wi.alive && wi.isNear(player)) {
      const before = wi.count;
      if (wi.tryPickup(inventory)) {
        const picked = before - wi.count;
        const def = ITEMS[wi.itemId];
        pickupMsgText = "+" + picked + " " + def.name;
        pickupMsgTimer = 1.5;
        actionCooldown = 0.15;
        return;
      }
    }
  }

  if (tryChopTree(player, map, inventory)) return;

  for (const wp of wildPets) {
    if (wp.alive && wp.isNear(player)) {
      const result = wp.tryTame(inventory);
      if (result instanceof Pet) {
        activePet = result;
        activePet.x = wp.x; activePet.y = wp.y;
        pickupMsgText = activePet.name + " evcille\u015ftirildi!";
        pickupMsgTimer = 2;
        actionCooldown = 0.3;
      } else if (result === null) {
        const pt = PET_TYPES[wp.type];
        pickupMsgText = pt.name + " g\u00fcvenmeye ba\u015fl\u0131yor...";
        pickupMsgTimer = 1.5;
        actionCooldown = 0.3;
      } else {
        const pt = PET_TYPES[wp.type];
        const foodName = ITEMS[pt.tameFood] ? ITEMS[pt.tameFood].name : pt.tameFood;
        pickupMsgText = foodName + " gerekli!";
        pickupMsgTimer = 1.5;
        actionCooldown = 0.3;
      }
      return;
    }
  }

  for (const npc of npcs) {
    if (npc.isNearPlayer(player)) {
      if (npc.merchant && npc.stock) {
        shop.openShop(npc.name, npc.stock, npc.shopPool);
      } else {
        dialog.show(npc.name, npc.dialog);
      }
      actionCooldown = 0.3;
      return;
    }
  }
}

function applyInventorySave(inv, d) {
  if (!d) return;
  inv.gold = d.gold | 0;
  for (let i = 0; i < inv.slots.length; i++) {
    const s = d.slots && d.slots[i];
    if (s && s.id) {
      const st = { id: s.id, count: Math.max(1, s.count | 0) };
      const u = s.upgrade | 0;
      if (u > 0) st.upgrade = u;
      inv.slots[i] = st;
    } else inv.slots[i] = null;
  }
  for (let i = 0; i < inv.hotbar.length; i++) {
    const s = d.hotbar && d.hotbar[i];
    if (s && s.id) {
      const st = { id: s.id, count: Math.max(1, s.count | 0) };
      const u = s.upgrade | 0;
      if (u > 0) st.upgrade = u;
      inv.hotbar[i] = st;
    } else inv.hotbar[i] = null;
  }
  for (const sk of EQ_SLOTS) {
    const e = d.equipped && d.equipped[sk];
    if (e && e.id) {
      const st = { id: e.id, count: Math.max(1, e.count | 0) };
      const u = e.upgrade | 0;
      if (u > 0) st.upgrade = u;
      inv.equipped[sk] = st;
    } else inv.equipped[sk] = null;

  inv.selectedHotbar = Math.max(0, Math.min(inv.hotbar.length - 1, d.selectedHotbar | 0));

function buildSavePayload(displayName) {
  return {
    v: 3,
    name: String(displayName || "").slice(0, 32),
    t: Date.now(),
    player: playerToSave(player),
    inventory: inventoryToSave(inventory),
    camera: { x: camera.x, y: camera.y },
    minimapVisible: minimap.visible,
    worldItems: worldItems.map(worldItemToSave),
    monsters: monsters.map(monsterToSave),
    wildPets: wildPets.map(wildPetToSave),
    npcs: npcs.map(npcToSave),
    activePet: petToSave(activePet),
  };
}

function applySavePayload(data) {
  if (!data || data.v !== 3) return false;
  if (data.name) writeSlotDisplayName(currentSaveSlot, data.name);
  applyPlayerSave(player, data.player);
  applyInventorySave(inventory, data.inventory);
  if (data.camera) {
    camera.x = data.camera.x;
    camera.y = data.camera.y;
  }
  if (data.minimapVisible != null) minimap.visible = data.minimapVisible;

  loadWorldItemsFromSave(data.worldItems);
  monsters.length = 0;
  if (data.monsters && data.monsters.length) {
    for (const mo of data.monsters) monsters.push(loadMonsterFromSave(mo));
  } else {
    const freshM = spawnMonsters();
    for (const m of freshM) monsters.push(m);
  }
  wildPets.length = 0;
  if (data.wildPets && data.wildPets.length) {
    for (const wo of data.wildPets) wildPets.push(loadWildPetFromSave(wo));
  } else {
    for (const d of WILD_PETS_DATA) {
      if (isSafeSpawn(d.col, d.row)) wildPets.push(new WildPet(d.col, d.row, d.type));
    }
  }
  if (data.npcs && data.npcs.length === npcs.length) {
    for (let i = 0; i < npcs.length; i++) applyNpcSave(npcs[i], data.npcs[i]);
  }
  activePet = loadActivePetFromSave(data.activePet);
  arrows.length = 0;
  monsterSpells.length = 0;
  dialog.active = false;
  if (shop.close) shop.close();
  if (craftPanel.close) craftPanel.close();
  petPanel.open = false;
  if (typeof charPanel.close === "function") charPanel.close();
  closeWorldItemInspect();
  closeInventorySlotInspect();
  player.applyEquipmentBonus(inventory);
  return true;
}

function saveGameToSlot(slot) {
  if (slot < 0 || slot >= NUM_SAVE_SLOTS) return;
  const name = readSlotDisplayName(slot) || ("Kayıt " + (slot + 1));
  try {
    const json = JSON.stringify(buildSavePayload(name));
    localStorage.setItem(saveKeyForSlot(slot), json);
  } catch (e) { /* quota */ }
}

function loadGameFromSlot(slot) {
  try {
    const raw = localStorage.getItem(saveKeyForSlot(slot));
    if (!raw) return false;
    return applySavePayload(JSON.parse(raw));
  } catch (e) {
    return false;
  }
}

function clearSaveSlot(slot) {
  try {
    localStorage.removeItem(saveKeyForSlot(slot));
    localStorage.removeItem(saveMetaKeyForSlot(slot));
  } catch (e) {}
}

function showSaveMenu() {
  const ov = document.getElementById("save-menu-overlay");
  if (ov) {
    ov.style.display = "block";
    ov.setAttribute("aria-hidden", "false");
  }
  currentSaveSlot = -1;
  refreshSaveMenuDom();
}

function hideSaveMenu() {
  const ov = document.getElementById("save-menu-overlay");
  if (ov) {
    ov.style.display = "none";
    ov.setAttribute("aria-hidden", "true");
  }
}

function refreshSaveMenuDom() {
  const root = document.getElementById("save-slots-root");
  if (!root) return;
  root.innerHTML = "";
  for (let s = 0; s < NUM_SAVE_SLOTS; s++) {
    const card = document.createElement("div");
    card.className = "save-slot-card";
    const has = hasSaveInSlot(s);
    const disp = readSlotDisplayName(s);
    const h = document.createElement("h2");
    h.textContent = "Slot " + (s + 1) + (has ? " — kayıt var" : " — boş");
    const inp = document.createElement("input");
    inp.type = "text";
    inp.maxLength = 32;
    inp.placeholder = "Kayıt adı (ör. Kahraman)";
    inp.value = disp;
    inp.id = "save-slot-name-" + s;
    const row = document.createElement("div");
    row.className = "row";
    const btnSaveName = document.createElement("button");
    btnSaveName.type = "button";
    btnSaveName.textContent = "İsmi kaydet";
    btnSaveName.className = "btn-new";
    btnSaveName.onclick = () => {
      writeSlotDisplayName(s, inp.value);
      refreshSaveMenuDom();
    };
    const btnContinue = document.createElement("button");
    btnContinue.type = "button";
    btnContinue.textContent = "Devam et";
    btnContinue.className = "btn-go";
    btnContinue.disabled = !has;
    btnContinue.onclick = () => {
      writeSlotDisplayName(s, inp.value);
      currentSaveSlot = s;
      if (!loadGameFromSlot(s)) {
        currentSaveSlot = -1;
        alert("Kayıt okunamadı.");
        refreshSaveMenuDom();
        return;
      }
      hideSaveMenu();
      nextAutoSaveAt = performance.now() + 8000;
      lastTime = performance.now();
    };
    const btnNew = document.createElement("button");
    btnNew.type = "button";
    btnNew.textContent = "Yeni oyun";
    btnNew.className = "btn-new";
    btnNew.onclick = () => {
      if (has && !confirm("Bu slottaki kaydı silip sıfırdan başlamak istiyor musun?")) return;
      writeSlotDisplayName(s, inp.value);
      currentSaveSlot = s;
      resetWorldToNewGameState();
      saveGameToSlot(s);
      hideSaveMenu();
      nextAutoSaveAt = performance.now() + 8000;
      lastTime = performance.now();
    };
    const btnDel = document.createElement("button");
    btnDel.type = "button";
    btnDel.textContent = "Kaydı sil";
    btnDel.className = "btn-del";
    btnDel.disabled = !has;
    btnDel.onclick = () => {
      if (!confirm("Bu slottaki kayıt silinsin mi?")) return;
      clearSaveSlot(s);
      inp.value = "";
      refreshSaveMenuDom();
    };
    row.appendChild(btnSaveName);
    row.appendChild(btnContinue);
    row.appendChild(btnNew);
    row.appendChild(btnDel);
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = has ? "Son kayıt: yerel tarayıcıda saklanıyor." : "Henüz kayıt yok — Yeni oyun ile başlat.";
    card.appendChild(h);
    card.appendChild(inp);
    card.appendChild(row);
    card.appendChild(meta);
    root.appendChild(card);
  }
}

window.addEventListener("beforeunload", () => {
  if (currentSaveSlot >= 0) saveGameToSlot(currentSaveSlot);
});

function gameLoop(now) {
  if (currentSaveSlot < 0) {
    lastTime = now;
    clearJustPressed();
    requestAnimationFrame(gameLoop);
    return;
  }

  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  if (now >= nextAutoSaveAt && currentSaveSlot >= 0) {
    saveGameToSlot(currentSaveSlot);
    nextAutoSaveAt = now + 12000;
  }

  if (inventory.open) {
    inventory.updateSlotLongPress(dt, mouseX, mouseY, canvasW, canvasH);
  }

  if (wasJustPressed("Escape")) {
    if (dialog.active) dialog.close();
    else if (shop.open) shop.close();
    else if (craftPanel.open) craftPanel.close();
    else if (inventory.open) {
      if (inventorySlotInspect) closeInventorySlotInspect();
      else inventory.close();
    }
    else if (petPanel.open) petPanel.close();
    else if (charPanel.open) charPanel.close();
    else if (worldItemInspect) closeWorldItemInspect();
  } else if (wasJustPressed("KeyI") || wasJustPressed("Tab")) {
    inventory.toggle();
    if (inventory.open) {
      charPanel.close();
      petPanel.open = false;
      shop.close();
      craftPanel.close();
    }
  }
  if (wasJustPressed("KeyC") && !dialog.active) {
    charPanel.toggle();
  }
  if (wasJustPressed("KeyP")) {
    petPanel.toggle();
    if (petPanel.open) {
      charPanel.close();
      inventory.open = false;
      shop.close();
      craftPanel.close();
    }
  }
  if (wasJustPressed("KeyM")) minimap.toggle();

  if (wasJustPressed("KeyB")) {
    if (craftPanel.open) {
      craftPanel.close();
    } else if (!inventory.open && !petPanel.open && !shop.open && !dialog.active && !charPanel.open) {
      if (player.inBoat) {
        if (!playerBoatFullyOnWater(map, player)) {
          player.inBoat = false;
          const ft = map.getGroundTileAtPx(player.feetX, player.feetY);
          if (ft === TileType.SAND || ft === TileType.BRIDGE) {
            player.boatAutoBoardCooldown = 0.4;
          } else {
            player.boatAutoBoardCooldown = 0;
          }
          pickupMsgText = "Tekneden indin!";
          pickupMsgTimer = 1.5;
        } else {
          pickupMsgText = "Kar\u0131ya veya k\u0131y\u0131ya yakla\u015f!";
          pickupMsgTimer = 1.5;
        }
      } else if (player.hasBoat && map.canBoardBoatAtPx(player.feetX, player.feetY)) {
        player.inBoat = true;
        pickupMsgText = "Tekneye bindin! \u2693";
        pickupMsgTimer = 1.5;
      } else if (!player.hasBoat) {
        charPanel.close();
        craftPanel.toggle();
      } else {
        pickupMsgText = "Su k\u0131y\u0131s\u0131na yakla\u015f!";
        pickupMsgTimer = 1.5;
      }
    }
  }
  for (let n = 1; n <= 5; n++) {
    if (wasJustPressed("Digit" + n) && !charPanel.open) inventory.selectedHotbar = n - 1;
  }

  if (wasJustPressed("KeyF") && activePet && !inventory.open && !petPanel.open && !shop.open && !dialog.active && !charPanel.open) {
    const selSlot = inventory.hotbar[inventory.selectedHotbar];
    if (selSlot) {
      const foodItems = ["apple", "fish", "flower", "seed"];
      if (foodItems.includes(selSlot.id)) {
        const gain = activePet.feed(selSlot.id);
        selSlot.count--;
        if (selSlot.count <= 0) inventory.hotbar[inventory.selectedHotbar] = null;
        pickupMsgText = activePet.name + " beslendi! +" + gain + " mutluluk";
        pickupMsgTimer = 1.5;
      }
    }
  }

  if (actionCooldown > 0) actionCooldown -= dt;
  if (pickupMsgTimer > 0) pickupMsgTimer -= dt;

  if (isActionPressed() && actionCooldown <= 0) handleInteraction();

  shop.update(dt);
  craftPanel.update(dt);
  const uiOpen = dialog.active || inventory.open || petPanel.open || shop.open || craftPanel.open || charPanel.open || !!worldItemInspect || !!inventorySlotInspect;

  if ((isDown("ShiftLeft") || isDown("ShiftRight")) && !uiOpen && !player.inBoat) {
    if (!player.powerCharging) { player.powerCharging = true; player.powerCharge = 0; }
  } else if (player.powerCharging && player.powerCharge < 0.1 &&
    !isDown("ShiftLeft") && !isDown("ShiftRight")) {
    player.powerCharging = false; player.powerCharge = 0;
  }

  if (wasJustPressed("KeyQ") && !uiOpen) tryUseHpPotion();
  if (wasJustPressed("KeyR") && !uiOpen) tryUseManaPotion();

  if (!uiOpen && !charPanel.open) {
    if (wasJustPressed("Tab")) {
      touchState.skillBarPage = 1 - (touchState.skillBarPage | 0);
      pickupMsgText = touchState.skillBarPage ? "Beceri \u00e7ubu\u011fu B" : "Beceri \u00e7ubu\u011fu A";
      pickupMsgTimer = 0.55;
    }
    const skKeys = ["KeyZ", "KeyX", "KeyV", "KeyN"];
    for (let si = 0; si < 4; si++) {
      if (wasJustPressed(skKeys[si])) tryCastActiveSkill((touchState.skillBarPage | 0) * 4 + si);
    }
  }

  if (!uiOpen) {
    if (touchState.mobileUI && touchState.aimId >= 0) {
      player.aimAt(touchState.aimX + camera.x, touchState.aimY + camera.y);
    } else if (touchState.mobileUI && touchState.joyId >= 0 &&
      (Math.abs(touchState.joyDx) > 0.04 || Math.abs(touchState.joyDy) > 0.04)) {
      player.aimAt(
        player.centerX + touchState.joyDx * 200,
        player.centerY + touchState.joyDy * 200
      );
    } else {
      player.aimAt(mouseX + camera.x, mouseY + camera.y);
    }
    player.update(dt, map);
    tryAutoAttackWhileHeld();
    if (player.inBoat && !playerBoatFullyOnWater(map, player)) {
      player.inBoat = false;
      const ft = map.getGroundTileAtPx(player.feetX, player.feetY);
      if (ft === TileType.SAND || ft === TileType.BRIDGE) {
        player.boatAutoBoardCooldown = 0.4;
      } else {
        player.boatAutoBoardCooldown = 0;
      }
      pickupMsgText = "K\u0131y\u0131ya \u00e7\u0131kt\u0131n!";
      pickupMsgTimer = 1.2;
    }
    if (player.hasBoat && !player.inBoat && player.boatAutoBoardCooldown <= 0 &&
        map.canBoardBoatAtPx(player.feetX, player.feetY)) {
      player.inBoat = true;
      pickupMsgText = "Tekneye bindin! \u2693";
      pickupMsgTimer = 1.2;
    }
    for (const npc of npcs) npc.update(dt, map);
  }

  for (const wi of worldItems) wi.update(dt);
  if (!uiOpen && !player.inBoat) tryAutoPickupNearbyWorldItems();
  for (const wp of wildPets) if (wp.alive) wp.update(dt, map);
  if (activePet) activePet.update(dt, player, map, worldItems, inventory);

  if (!uiOpen) {
    for (const m of monsters) {
      const r = m.update(dt, map, player);
      if (r === "dead") {
        player.gainXP(m.xpReward);
        dropMonsterLoot(m, worldItems);
        const mt = MONSTER_TYPES[m.type];
        const btag = mt && mt.boss ? "[BOSS] " : "";
        pickupMsgText = "+" + m.xpReward + " XP — " + btag + (mt ? mt.name : m.type) + " yendi!";
        pickupMsgTimer = 1.8;
      }
    }
    if (player.hp <= 0) {
      player.hp = Math.max(1, Math.floor(player.maxHp * 0.4));
      player.x = PLAYER_START.col * TILE_SIZE;
      player.y = PLAYER_START.row * TILE_SIZE;
      pickupMsgText = "Bayıldın! Köyde uyandın.";
      pickupMsgTimer = 2.5;
    }
  }

  player.applyEquipmentBonus(inventory);

  for (let i = arrows.length - 1; i >= 0; i--) {
    const a = arrows[i];
    a.update(dt, map);
    if (a.alive) {
      for (const m of monsters) {
        if (!m.alive || m.state === "dying") continue;
        if (a.x >= m.x - 2 && a.x <= m.x + m.w + 2 && a.y >= m.y - 2 && a.y <= m.y + m.h + 2) {
          m.takeDamage(a.damage);
          a.alive = false;
          break;
        }
      }
    }
    if (!a.alive) arrows.splice(i, 1);
  }

  for (let i = monsterSpells.length - 1; i >= 0; i--) {
    const sp = monsterSpells[i];
    sp.update(dt, map, player);
    if (!sp.alive) monsterSpells.splice(i, 1);
  }

  dialog.update(dt);
  camera.follow(player, map.widthPx, map.heightPx);
  camera.updateShake(dt);

  let nearNPC = false, nearItem = false, nearWild = false, nearMonster = false, nearTreeChop = false;
  if (!uiOpen) {
    for (const wi of worldItems) {
      if (wi.alive && wi.isNear(player)) {
        const def = ITEMS[wi.itemId];
        hud.showInteractPrompt(def.name + " x" + wi.count + " (yak\u0131n: otomatik)");
        nearItem = true; break;
      }
    }
    if (!nearItem && canChopFacingTree(player, map, inventory)) {
      hud.showInteractPrompt("[E] A\u011fac\u0131 kes (balta)");
      nearTreeChop = true;
    }
    if (!nearItem && !nearTreeChop) {
      for (const wp of wildPets) {
        if (wp.alive && wp.isNear(player)) {
          const pt = PET_TYPES[wp.type];
          const foodName = ITEMS[pt.tameFood] ? ITEMS[pt.tameFood].name : pt.tameFood;
          hud.showInteractPrompt("[E] " + pt.name + " evcille\u015ftir (" + foodName + " gerekli)");
          nearWild = true; break;
        }
      }
    }
    if (!nearItem && !nearWild && !nearTreeChop) {
      for (const m of monsters) {
        if (!m.alive || m.state === "dying") continue;
        if (m.distTo(player.centerX, player.centerY) < TILE_SIZE * 5) {
          const mt = MONSTER_TYPES[m.type];
          const bpre = mt && mt.boss ? "\u2605 BOSS " : "";
          hud.showInteractPrompt("\u2694 " + bpre + (mt ? mt.name : m.type) + "  " + Math.ceil(m.hp) + "/" + m.maxHp + " HP");
          nearMonster = true; break;
        }
      }
    }
    if (!nearItem && !nearWild && !nearMonster && !nearTreeChop) {
      for (const npc of npcs) {
        if (npc.isNearPlayer(player)) {
          if (npc.merchant) hud.showInteractPrompt("[E] " + npc.name + " - Market");
          else hud.showInteractPrompt("[E] " + npc.name + " ile konu\u015f");
          nearNPC = true; break;
        }
      }
    }
  }
  if (!nearNPC && !nearItem && !nearWild && !nearMonster && !nearTreeChop) {
    if (!uiOpen && player.hasBoat && !player.inBoat &&
        map.isNearWater(player.feetX, player.feetY, 2) &&
        !map.canBoardBoatAtPx(player.feetX, player.feetY)) {
      hud.showInteractPrompt("Kum veya su kenar\u0131na yakla\u015f: tekne otomatik");
    } else if (!uiOpen && player.inBoat) {
      if (!playerBoatFullyOnWater(map, player)) {
        hud.showInteractPrompt("[B] Tekneden in (veya k\u0131y\u0131da otomatik)");
      } else {
        hud.showInteractPrompt("[B] Karaya veya k\u0131y\u0131ya yakla\u015f");
      }
    } else if (!uiOpen && !player.hasBoat) {
      hud.clearInteractPrompt();
    } else {
      hud.clearInteractPrompt();
    }
  }

  ctx.clearRect(0, 0, canvasW, canvasH);
  camera.applyTransform(ctx);
  map.render(ctx, camera.x, camera.y, canvasW, canvasH);

  if (worldData.dockCol && worldData.dockEnd) {
    const dc = worldData.dockCol, de = worldData.dockEnd;
    const ds = VOY + VROWS + 2;
    const T_S = TILE_SIZE;

    const posts = [
      { c: dc - 1, r: ds },
      { c: dc + 1, r: ds },
      { c: dc - 1, r: Math.floor((ds + de) / 2) },
      { c: dc + 1, r: Math.floor((ds + de) / 2) },
      { c: dc - 3, r: de },
      { c: dc + 3, r: de },
      { c: dc - 3, r: de - 1 },
      { c: dc + 3, r: de - 1 },
    ];
    for (const p of posts) {
      const px = p.c * T_S + T_S / 2, py = p.r * T_S + T_S / 2;
      ctx.fillStyle = "#5a3a1a";
      ctx.fillRect(px - 3, py - 10, 6, 14);
      ctx.fillStyle = "#7a5a30";
      ctx.fillRect(px - 4, py - 12, 8, 4);
    }

    const lx = dc * T_S + T_S / 2, ly = de * T_S + 8;
    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(lx - 2, ly - 20, 4, 20);
    ctx.fillStyle = "#f0c030";
    ctx.beginPath(); ctx.arc(lx, ly - 22, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffe080";
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 300) * 0.2;
    ctx.beginPath(); ctx.arc(lx, ly - 22, 9, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = "#a08040"; ctx.lineWidth = 1.5;
    for (let i = 0; i < posts.length; i += 2) {
      const p1 = posts[i], p2 = posts[i + 1];
      const x1 = p1.c * T_S + T_S / 2, y1 = p1.r * T_S + T_S / 2 - 8;
      const x2 = p2.c * T_S + T_S / 2, y2 = p2.r * T_S + T_S / 2 - 8;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo((x1 + x2) / 2, (y1 + y2) / 2 + 6, x2, y2);
      ctx.stroke();
    }

    ctx.fillStyle = "#e8e0d0"; ctx.font = "bold 9px monospace";
    const signX = (dc - 2) * T_S, signY = ds * T_S - 8;
    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(signX, signY, T_S * 1.2, 16);
    ctx.fillStyle = "#7a5a30";
    ctx.fillRect(signX, signY, T_S * 1.2, 3);
    ctx.fillStyle = "#f0e8d0"; ctx.font = "bold 8px monospace";
    ctx.fillText("\u2693 \u0130SKELE", signX + 3, signY + 12);
  }

  for (const wi of worldItems) if (wi.alive) wi.render(ctx);

  const renderables = [...npcs];
  if (!player.inBoat) renderables.push(player);
  for (const wp of wildPets) if (wp.alive) renderables.push(wp);
  for (const m of monsters) if (m.alive) renderables.push(m);
  if (activePet && !player.inBoat) renderables.push(activePet);
  renderables.sort((a, b) => (a.y + (a.h || 16)) - (b.y + (b.h || 16)));
  for (const e of renderables) {
    if (e === player) player.render(ctx, inventory, monsters);
    else e.render(ctx);
  }
  if (player.inBoat) player.renderBoat(ctx);

  for (const a of arrows) a.render(ctx);
  for (const s of monsterSpells) s.render(ctx);

  camera.resetTransform(ctx);

  if (!inventory.open && !petPanel.open && !shop.open && !craftPanel.open) {
    const hx = 10, hy = 10, hw = 170, barH = 10, gap = 4, pad = 6;
    const panelH = pad * 2 + barH * 4 + gap * 3 + 22;

    ctx.fillStyle = "rgba(10,10,30,0.8)";
    roundRect(ctx, hx, hy, hw, panelH, 8); ctx.fill();
    ctx.strokeStyle = "rgba(100,100,140,0.4)"; ctx.lineWidth = 1;
    roundRect(ctx, hx, hy, hw, panelH, 8); ctx.stroke();

    ctx.fillStyle = "#f0d050"; ctx.font = "bold 11px monospace";
    ctx.fillText("Lv." + player.level + "  Okçu", hx + pad, hy + 14);
    ctx.fillStyle = player.statPoints > 0 ? "#ffd080" : "#a0a0b0";
    ctx.font = "9px monospace";
    ctx.fillText("STR:" + player.str + " AGI:" + player.agi + " WIS:" + player.wis + (player.statPoints > 0 ? "  [C] +" + player.statPoints : ""), hx + pad, hy + 24);

    let by = hy + 28;

    const drawBar = (label, cur, max, color1, color2, lx, ly) => {
      ctx.fillStyle = "rgba(30,30,50,0.9)";
      ctx.fillRect(lx, ly, hw - pad * 2, barH);
      const ratio = Math.max(0, Math.min(1, cur / max));
      const grd = ctx.createLinearGradient(lx, ly, lx + (hw - pad * 2) * ratio, ly);
      grd.addColorStop(0, color1); grd.addColorStop(1, color2);
      ctx.fillStyle = grd;
      ctx.fillRect(lx, ly, (hw - pad * 2) * ratio, barH);
      ctx.strokeStyle = "rgba(80,80,120,0.5)"; ctx.lineWidth = 0.5;
      ctx.strokeRect(lx, ly, hw - pad * 2, barH);
      ctx.fillStyle = "#f0f0f0"; ctx.font = "bold 8px monospace";
      ctx.fillText(label + " " + Math.ceil(cur) + "/" + max, lx + 3, ly + 8);
    };

    drawBar("HP", player.hp, player.maxHp, "#d04040", "#ff6060", hx + pad, by);
    by += barH + gap;
    drawBar("MP", player.mana, player.maxMana, "#3060d0", "#60a0ff", hx + pad, by);
    by += barH + gap;
    drawBar("XP", player.xp, player.xpToNext, "#d0a020", "#f0d060", hx + pad, by);
    by += barH + gap;

    const arrowCount = inventory.countItem("arrow");
    const dmg = Math.floor(player.getRangedDamage());
    ctx.font = "9px monospace";
    ctx.fillStyle = "#c0c0d0";
    drawItemIcon(ctx, "arrow", hx + pad, by - 2, 14);
    ctx.fillStyle = arrowCount > 0 ? "#e0e0e0" : "#d04040";
    ctx.fillText(arrowCount + " Ok", hx + pad + 17, by + 8);
    ctx.fillStyle = "#c0c0d0";
    ctx.fillText("Uzak:" + dmg, hx + pad + 70, by + 8);

    if (player.powerCharging && player.powerCharge > 0) {
      by += 16;
      drawBar("PWR", player.powerCharge * 100, 100, "#a040d0", "#d080ff", hx + pad, by);
    }

    let extraY = hy + panelH + 6;

    if (activePet) {
      const pt = PET_TYPES[activePet.type];
      ctx.fillStyle = "rgba(10,10,30,0.7)";
      roundRect(ctx, hx, extraY, 130, 34, 6); ctx.fill();
      drawPetSprite(ctx, activePet.type, hx + 6, extraY + 8, DIR.DOWN, 0, false);
      ctx.fillStyle = "#f0d050"; ctx.font = "bold 11px monospace";
      ctx.fillText(activePet.name, hx + 28, extraY + 14);
      const bx2 = hx + 28, by2 = extraY + 19, bw2 = 90, bh2 = 6;
      ctx.fillStyle = "rgba(40,40,60,0.8)"; ctx.fillRect(bx2, by2, bw2, bh2);
      const hc2 = activePet.happiness > 60 ? "#50c060" : activePet.happiness > 30 ? "#d0a030" : "#d04040";
      ctx.fillStyle = hc2; ctx.fillRect(bx2, by2, bw2 * activePet.happiness / 100, bh2);
      extraY += 40;
    }

    if (player.inBoat) {
      ctx.fillStyle = "rgba(10,10,30,0.7)";
      roundRect(ctx, hx, extraY, 100, 28, 6); ctx.fill();
      ctx.fillStyle = "#80c0ff"; ctx.font = "bold 12px monospace";
      ctx.fillText("\u2693 Teknede", hx + 14, extraY + 18);
    }

    drawCombatPotions(ctx, canvasW, canvasH, inventory);
  }

  inventory.render(ctx, canvasW, canvasH, mouseX, mouseY);
  petPanel.render(ctx, canvasW, canvasH, activePet);
  shop.render(ctx, canvasW, canvasH, inventory);
  craftPanel.render(ctx, canvasW, canvasH, inventory, player);

  if (!inventory.open && !petPanel.open && !shop.open && !craftPanel.open) {
    hud.render(ctx, canvasW, canvasH);
    dialog.render(ctx, canvasW, canvasH);
    minimap.render(ctx, canvasW, canvasH, camera, player, npcs, wildPets, activePet);
  }

  charPanel.render(ctx, canvasW, canvasH, player, inventory);

  if (worldItemInspect) renderWorldItemInspect(ctx, canvasW, canvasH);
  if (inventorySlotInspect) renderInventorySlotInspect(ctx, canvasW, canvasH);

  renderTouchOverlay(ctx);

  if (player.levelUpTimer > 0) {
    const t = player.levelUpTimer;
    const alpha = Math.min(1, t / 0.5);
    const scale = 1 + (2.5 - t) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#f0d050"; ctx.font = "bold 20px monospace";
    const lvText = "\u2B50 Seviye " + player.level + "!";
    ctx.fillText(lvText, canvasW / 2 - ctx.measureText(lvText).width / 2, canvasH / 2 - 80 - (2.5 - t) * 20);
    ctx.fillStyle = "#c0c0d0"; ctx.font = "13px monospace";
    const statHint = touchState.mobileUI
      ? "+3 stat  |  HP+8 MP+5  |  Sa\u011fda C: Karakter"
      : "+3 stat puan\u0131  |  Taban HP+8  MP+5  |  [C] da\u011f\u0131t";
    ctx.fillText(statHint, canvasW / 2 - ctx.measureText(statHint).width / 2, canvasH / 2 - 55 - (2.5 - t) * 20);
    ctx.globalAlpha = 1;
  }

  if (player.dmgFlashTimer > 0) {
    ctx.globalAlpha = player.dmgFlashTimer / 0.3 * 0.25;
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.globalAlpha = 1;
  }

  if (pickupMsgTimer > 0) {
    const alpha = Math.min(1, pickupMsgTimer / 0.3);
    const offsetY = (1.5 - pickupMsgTimer) * 30;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#50e050"; ctx.font = "bold 14px monospace";
    ctx.fillText(pickupMsgText, canvasW / 2 - ctx.measureText(pickupMsgText).width / 2, canvasH / 2 - 40 - offsetY);
    ctx.globalAlpha = 1;
  }

  clearJustPressed();
  requestAnimationFrame(gameLoop);
}

showSaveMenu();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
