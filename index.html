function drawMonsterSprite(ctx, type, x, y, dir, frame, hitFlash, atkAnim) {
  const cx = x + 10, cy = y + 10;
  if (hitFlash > 0) { ctx.globalAlpha = 0.5 + Math.sin(hitFlash * 30) * 0.5; }

  switch (type) {
    case "slime": {
      const squish = 1 + Math.sin(frame * Math.PI) * 0.15;
      const h = 12 * squish, w = 14 / squish;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#40c040";
      ctx.beginPath();
      ctx.ellipse(cx, cy + 4, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#60e060";
      ctx.beginPath(); ctx.ellipse(cx, cy + 2, w / 3, h / 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(cx - 4, cy - 1, 3, 3);
      ctx.fillRect(cx + 1, cy - 1, 3, 3);
      ctx.fillStyle = "#111";
      ctx.fillRect(cx - 3, cy, 2, 2);
      ctx.fillRect(cx + 2, cy, 2, 2);
      break;
    }
    case "wolf": {
      const run = Math.sin(frame * Math.PI) * 3;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#707070";
      ctx.fillRect(cx - 8, cy - 3, 16, 10);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#909090";
      ctx.fillRect(cx - 10, cy - 6, 7, 6);
      ctx.fillStyle = "#333";
      ctx.fillRect(cx - 8, cy - 4, 2, 2);
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#606060";
      ctx.fillRect(cx - 6 + run, cy + 6, 3, 5);
      ctx.fillRect(cx + 3 - run, cy + 6, 3, 5);
      ctx.fillStyle = "#808080";
      ctx.fillRect(cx + 6, cy - 2, 6, 3);
      if (atkAnim > 0) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(cx - 11, cy - 3, 3, 2);
      }
      break;
    }
    case "skeleton": {
      const sway = Math.sin(frame * Math.PI * 0.5) * 1;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#d0d0b0";
      ctx.fillRect(cx - 5 + sway, cy - 4, 10, 12);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#e0e0c0";
      ctx.beginPath(); ctx.arc(cx + sway, cy - 7, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3 + sway, cy - 9, 2, 3);
      ctx.fillRect(cx + 1 + sway, cy - 9, 2, 3);
      ctx.fillRect(cx - 2 + sway, cy - 5, 4, 2);
      ctx.fillStyle = "#b0b090";
      ctx.fillRect(cx - 7 + sway, cy, 4, 3);
      ctx.fillRect(cx + 3 + sway, cy, 4, 3);
      ctx.fillRect(cx - 4, cy + 7, 3, 5);
      ctx.fillRect(cx + 1, cy + 7, 3, 5);
      break;
    }
    case "orc": {
      const bounce = Math.sin(frame * Math.PI) * 2;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#406030";
      ctx.fillRect(cx - 7, cy - 5 - bounce, 14, 14);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#508030";
      ctx.beginPath(); ctx.arc(cx, cy - 8 - bounce, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3, cy - 10 - bounce, 2, 3);
      ctx.fillRect(cx + 1, cy - 10 - bounce, 2, 3);
      ctx.fillStyle = "#c0c0c0";
      const atkOff = atkAnim > 0 ? -6 : 0;
      ctx.fillRect(cx + 7, cy - 6 - bounce + atkOff, 3, 12);
      ctx.fillRect(cx + 6, cy - 8 - bounce + atkOff, 5, 3);
      ctx.fillStyle = "#3a3a2a";
      ctx.fillRect(cx - 5, cy + 8, 4, 5);
      ctx.fillRect(cx + 1, cy + 8, 4, 5);
      break;
    }
    case "golem": {
      const shake = atkAnim > 0 ? Math.sin(atkAnim * 40) * 2 : 0;
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#6a6a6a";
      ctx.fillRect(cx - 9 + shake, cy - 8, 18, 18);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#8a8a8a";
      ctx.fillRect(cx - 7 + shake, cy - 6, 14, 5);
      ctx.fillStyle = "#f08030";
      ctx.fillRect(cx - 4 + shake, cy - 4, 3, 3);
      ctx.fillRect(cx + 1 + shake, cy - 4, 3, 3);
      ctx.fillStyle = "#5a5a5a";
      ctx.fillRect(cx - 10 + shake, cy - 2, 5, 10);
      ctx.fillRect(cx + 5 + shake, cy - 2, 5, 10);
      ctx.fillRect(cx - 7, cy + 9, 6, 6);
      ctx.fillRect(cx + 1, cy + 9, 6, 6);
      break;
    }
    case "forest_treant": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#3a5020";
      ctx.fillRect(cx - 11, cy - 14, 22, 26);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#5a7030";
      ctx.beginPath(); ctx.arc(cx, cy - 16, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#2a4018";
      for (let i = -1; i <= 1; i++) ctx.fillRect(cx + i * 6 - 2, cy - 22, 4, 10);
      ctx.fillStyle = "#f0d040";
      ctx.fillRect(cx - 3, cy - 4, 2, 2); ctx.fillRect(cx + 1, cy - 4, 2, 2);
      break;
    }
    case "desert_titan": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#c0a060";
      ctx.fillRect(cx - 12, cy - 12, 24, 24);
      ctx.fillStyle = hitFlash > 0 ? "#ff8080" : "#e8d090";
      ctx.beginPath(); ctx.arc(cx, cy - 14, 9, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#705020";
      ctx.fillRect(cx - 10, cy + 10, 6, 5); ctx.fillRect(cx + 4, cy + 10, 6, 5);
      ctx.fillStyle = "#a02020";
      ctx.fillRect(cx - 4, cy - 8, 2, 2); ctx.fillRect(cx + 2, cy - 8, 2, 2);
      break;
    }
    case "rock_warden": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#6a6a72";
      ctx.beginPath(); ctx.moveTo(cx, cy - 16); ctx.lineTo(cx + 12, cy + 10); ctx.lineTo(cx - 12, cy + 10); ctx.fill();
      ctx.fillStyle = "#909098";
      ctx.fillRect(cx - 8, cy - 2, 16, 12);
      ctx.fillStyle = "#303038";
      ctx.fillRect(cx - 3, cy - 10, 2, 2); ctx.fillRect(cx + 1, cy - 10, 2, 2);
      break;
    }
    case "flower_queen": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#d060a0";
      for (let a = 0; a < 6; a++) {
        const ang = a * Math.PI / 3;
        ctx.beginPath(); ctx.arc(cx + Math.cos(ang) * 8, cy + Math.sin(ang) * 6, 6, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = "#f0e080";
      ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 2, cy - 1, 2, 2); ctx.fillRect(cx + 0, cy - 1, 2, 2);
      break;
    }
    case "north_frost": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#a0d8f0";
      ctx.fillRect(cx - 10, cy - 14, 20, 26);
      ctx.fillStyle = "#e8f8ff";
      ctx.beginPath(); ctx.arc(cx, cy - 16, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4080c0";
      ctx.fillRect(cx - 12, cy + 2, 24, 8);
      ctx.fillStyle = "#102030";
      ctx.fillRect(cx - 3, cy - 18, 2, 2); ctx.fillRect(cx + 1, cy - 18, 2, 2);
      break;
    }
    case "south_shadow": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#403060";
      ctx.fillRect(cx - 10, cy - 12, 20, 24);
      ctx.fillStyle = "#7050a0";
      ctx.beginPath(); ctx.ellipse(cx, cy - 10, 9, 8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff4080";
      ctx.fillRect(cx - 4, cy - 12, 2, 2); ctx.fillRect(cx + 2, cy - 12, 2, 2);
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "#000";
      ctx.fillRect(cx - 12, cy - 14, 24, 28);
      ctx.globalAlpha = 1;
      break;
    }
    case "dark_knight": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#303040";
      ctx.fillRect(cx - 9, cy - 10, 18, 22);
      ctx.fillStyle = "#606070";
      ctx.fillRect(cx - 11, cy - 14, 22, 8);
      ctx.fillStyle = "#c04040";
      ctx.fillRect(cx - 2, cy - 6, 4, 10);
      ctx.fillStyle = "#ffd040";
      ctx.fillRect(cx - 4, cy - 12, 3, 2); ctx.fillRect(cx + 1, cy - 12, 3, 2);
      break;
    }
    case "frost_spirit": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#a0d8ff";
      ctx.beginPath(); ctx.arc(cx, cy + 2, 11, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e8f8ff";
      ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4080c0";
      ctx.fillRect(cx - 2, cy - 2, 2, 2); ctx.fillRect(cx + 0, cy - 2, 2, 2);
      break;
    }
    case "dune_raider": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#c09050";
      ctx.fillRect(cx - 10, cy - 6, 20, 16);
      ctx.fillStyle = "#705020";
      ctx.fillRect(cx - 6, cy - 12, 12, 8);
      ctx.fillStyle = "#222";
      ctx.fillRect(cx - 3, cy - 10, 2, 2); ctx.fillRect(cx + 1, cy - 10, 2, 2);
      break;
    }
    case "vine_horror": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#2a5020";
      ctx.fillRect(cx - 8, cy - 4, 16, 18);
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = "#408030";
        ctx.fillRect(cx - 10 + i * 4, cy - 12 - i, 3, 12 + i * 2);
      }
      ctx.fillStyle = "#d04060";
      ctx.fillRect(cx - 2, cy + 2, 4, 3);
      break;
    }
    case "crystalline": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#80a0e0";
      ctx.beginPath(); ctx.moveTo(cx, cy - 14); ctx.lineTo(cx + 10, cy + 8); ctx.lineTo(cx - 10, cy + 8); ctx.fill();
      ctx.fillStyle = "#c0e0ff";
      ctx.beginPath(); ctx.moveTo(cx, cy - 8); ctx.lineTo(cx + 6, cy + 4); ctx.lineTo(cx - 6, cy + 4); ctx.fill();
      break;
    }
    case "void_hound": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#402060";
      ctx.fillRect(cx - 12, cy - 4, 22, 12);
      ctx.fillRect(cx + 8, cy - 2, 8, 6);
      ctx.fillStyle = "#ff3080";
      ctx.fillRect(cx - 6, cy - 6, 3, 3); ctx.fillRect(cx + 2, cy - 6, 3, 3);
      break;
    }
    case "iron_behemoth": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#5a5a62";
      ctx.fillRect(cx - 12, cy - 10, 24, 24);
      ctx.fillStyle = "#909098";
      ctx.fillRect(cx - 8, cy - 6, 16, 10);
      ctx.fillStyle = "#f06030";
      ctx.fillRect(cx - 4, cy - 2, 8, 4);
      break;
    }
    case "storm_wraith": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#5060a0";
      ctx.beginPath(); ctx.ellipse(cx, cy + 2, 14, 10, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ffd040";
      for (let i = 0; i < 4; i++) {
        const ang = i * Math.PI / 2 + frame * 0.5;
        ctx.fillRect(cx + Math.cos(ang) * 12 - 1, cy + Math.sin(ang) * 8 - 1, 3, 3);
      }
      break;
    }
    case "ice_queen": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#c0e8ff";
      ctx.fillRect(cx - 14, cy - 18, 28, 32);
      ctx.fillStyle = "#80c0f0";
      ctx.beginPath(); ctx.arc(cx, cy - 16, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(cx - 8, cy - 4, 16, 14);
      ctx.fillStyle = "#4080c0";
      ctx.fillRect(cx - 4, cy - 20, 8, 6);
      break;
    }
    case "dune_king": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#d8b060";
      ctx.fillRect(cx - 14, cy - 14, 28, 28);
      ctx.fillStyle = "#705010";
      ctx.beginPath(); ctx.arc(cx, cy - 16, 11, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ffd000";
      ctx.fillRect(cx - 6, cy - 8, 12, 4);
      ctx.fillStyle = "#a02020";
      ctx.fillRect(cx - 4, cy - 18, 3, 3); ctx.fillRect(cx + 1, cy - 18, 3, 3);
      break;
    }
    case "jungle_behemoth": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#1a5020";
      ctx.fillRect(cx - 13, cy - 12, 26, 26);
      ctx.fillStyle = "#3a8040";
      ctx.beginPath(); ctx.arc(cx, cy - 14, 11, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#60c070";
      for (let i = -2; i <= 2; i++) ctx.fillRect(cx + i * 5 - 2, cy - 22, 4, 10);
      break;
    }
    case "thunder_lord": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#5040a0";
      ctx.fillRect(cx - 12, cy - 16, 24, 30);
      ctx.fillStyle = "#ffd040";
      ctx.beginPath(); ctx.moveTo(cx - 4, cy - 20); ctx.lineTo(cx, cy - 28); ctx.lineTo(cx + 4, cy - 20); ctx.fill();
      ctx.fillStyle = "#e0e0ff";
      ctx.fillRect(cx - 6, cy - 8, 12, 8);
      break;
    }
    case "abyss_crab": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#403850";
      ctx.fillRect(cx - 14, cy - 6, 28, 14);
      ctx.fillStyle = "#602040";
      ctx.fillRect(cx - 16, cy + 2, 6, 4); ctx.fillRect(cx + 10, cy + 2, 6, 4);
      ctx.fillStyle = "#ff4060";
      ctx.fillRect(cx - 4, cy - 4, 3, 3); ctx.fillRect(cx + 1, cy - 4, 3, 3);
      break;
    }
    case "volcanic_titan": {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#4a3020";
      ctx.fillRect(cx - 13, cy - 12, 26, 28);
      ctx.fillStyle = "#ff6020";
      ctx.beginPath(); ctx.arc(cx, cy + 6, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff9040";
      ctx.fillRect(cx - 4, cy - 14, 8, 6);
      break;
    }
    default: {
      ctx.fillStyle = hitFlash > 0 ? "#ff6060" : "#804080";
      ctx.beginPath(); ctx.arc(cx, cy + 2, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(cx - 2, cy, 2, 2); ctx.fillRect(cx + 0, cy, 2, 2);
      break;
    }
  }
  ctx.globalAlpha = 1;
}

class Monster {
  constructor(col, row, type, levelScale) {
    this.x = col * TILE_SIZE;
    this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.type = type;
    const mt = MONSTER_TYPES[type];
    const s = levelScale || 1;
    this.maxHp = Math.floor(mt.hp * s);
    this.hp = this.maxHp;
    this.dmg = Math.floor(mt.dmg * s);
    this.speed = mt.speed;
    this.xpReward = Math.floor(mt.xp * s);
    this.aggroRange = mt.aggroRange;
    this.atkRange = mt.atkRange;
    this.atkCd = mt.atkCd;
    this.loot = mt.loot;
    this.boss = !!mt.boss;
    this.alive = true;
    this.state = "idle";
    this.homeX = this.x; this.homeY = this.y;
    this.direction = DIR.DOWN;
    this.animTimer = 0; this.animFrame = 0;
    this.wanderTimer = 1 + Math.random() * 3;
    this.moveDir = { dx: 0, dy: 0 };
    this.moveTime = 0;
    this.atkTimer = 0;
    this.atkAnim = 0;
    this.hitFlash = 0;
    this.deathTimer = 0;
    this.respawnTime = 30 + Math.random() * 30;
    this.respawnTimer = 0;
    this.col = col; this.row = row;
    this.levelScale = s;
  }

  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }

  distTo(px, py) {
    const dx = this.cx - px, dy = this.cy - py;
    return Math.sqrt(dx * dx + dy * dy);
  }

  takeDamage(amount) {
    if (this.state === "dying") return;
    this.hp -= amount;
    this.hitFlash = 0.15;
    if (this.hp <= 0) {
      this.hp = 0;
      this.state = "dying";
      this.deathTimer = 0.6;
    } else if (this.state === "idle") {
      this.state = "chase";
    }
  }

  update(dt, map, player) {
    if (!this.alive) {
      this.respawnTimer += dt;
      if (this.respawnTimer >= this.respawnTime) {
        this.alive = true;
        this.hp = this.maxHp;
        this.x = this.col * TILE_SIZE;
        this.y = this.row * TILE_SIZE;
        this.state = "idle";
        this.respawnTimer = 0;
        this.respawnTime = 30 + Math.random() * 30;
      }
      return;
    }

    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.atkAnim > 0) this.atkAnim -= dt;
    this.animTimer += dt;
    if (this.animTimer >= 0.18) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

    if (this.state === "dying") {
      this.deathTimer -= dt;
      if (this.deathTimer <= 0) {
        this.alive = false;
        return "dead";
      }
      return;
    }

    const dist = this.distTo(player.centerX, player.centerY);

    if (this.state === "idle") {
      if (dist < this.aggroRange) {
        this.state = "chase";
      } else {
        this._wander(dt, map);
      }
    }

    if (this.state === "chase") {
      if (dist > this.aggroRange * 2) {
        this.state = "idle";
        return;
      }
      if (dist <= this.atkRange) {
        this.state = "attack";
        this.atkTimer = 0;
      } else {
        this._moveToward(player.centerX, player.centerY, dt, map);
      }
    }

    if (this.state === "attack") {
      if (dist > this.atkRange * 1.8) {
        this.state = "chase";
        return;
      }
      this.atkTimer += dt;
      if (this.atkTimer >= this.atkCd) {
        this.atkTimer = 0;
        this.atkAnim = 0.25;
        if (!(player.inBoat && playerBoatFullyOnWater(map, player))) {
          player.takeDamage(this.dmg);
        }
        return "hit";
      }
      this._faceTarget(player.centerX, player.centerY);
    }
  }

  _wander(dt, map) {
    this.wanderTimer -= dt;
    if (this.wanderTimer <= 0 && this.moveTime <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.5 + Math.random() * 1.5;
      this._faceDir(this.moveDir.dx, this.moveDir.dy);
    }
    if (this.moveTime > 0) {
      this.moveTime -= dt;
      const nx = this.x + this.moveDir.dx * this.speed * 0.4 * dt;
      const ny = this.y + this.moveDir.dy * this.speed * 0.4 * dt;
      const ddx = nx - this.homeX, ddy = ny - this.homeY;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < TILE_SIZE * 4 && !this._collides(nx, ny, map)) {
        this.x = nx; this.y = ny;
      }
      if (this.moveTime <= 0) this.wanderTimer = 2 + Math.random() * 3;
    }
  }

  _moveToward(tx, ty, dt, map) {
    const dx = tx - this.cx, dy = ty - this.cy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) return;
    const nx = this.x + (dx / d) * this.speed * dt;
    const ny = this.y + (dy / d) * this.speed * dt;
    if (!this._collides(nx, this.y, map)) this.x = nx;
    if (!this._collides(this.x, ny, map)) this.y = ny;
    this._faceDir(dx, dy);
  }

  _faceTarget(tx, ty) { this._faceDir(tx - this.cx, ty - this.cy); }

  _faceDir(dx, dy) {
    if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    else this.direction = dy > 0 ? DIR.DOWN : DIR.UP;
  }

  _collides(px, py, map) {
    const m = 3;
    return map.isSolidPx(px + m, py + m) || map.isSolidPx(px + this.w - m, py + m) ||
           map.isSolidPx(px + m, py + this.h - m) || map.isSolidPx(px + this.w - m, py + this.h - m);
  }

  render(ctx) {
    if (!this.alive) return;
    if (this.state === "dying") {
      ctx.globalAlpha = this.deathTimer / 0.6;
      const sc = 0.5 + this.deathTimer / 0.6 * 0.5;
      ctx.save();
      ctx.translate(this.cx, this.cy);
      ctx.scale(sc, sc);
      ctx.translate(-this.cx, -this.cy);
    }

    drawMonsterSprite(ctx, this.type, this.x, this.y, this.direction, this.animFrame, this.hitFlash, this.atkAnim);

    if (this.state !== "dying") {
      const barW = 22, barH = 3;
      const bx = this.cx - barW / 2, by = this.y - 6;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
      ctx.fillStyle = this.hp > this.maxHp * 0.5 ? "#40c040" : this.hp > this.maxHp * 0.25 ? "#d0a030" : "#d04040";
      ctx.fillRect(bx, by, barW * (this.hp / this.maxHp), barH);
    }

    if (this.state === "dying") {
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }
}

/* ── NPC ─────────────────────────────────────────────────── */

class NPC {
  constructor({ col, row, name, color, dialog, wanderRadius = 0, merchant = false, stock = null, shopPool = null }) {
    this.x = col * TILE_SIZE; this.y = row * TILE_SIZE;
    this.w = 20; this.h = 20;
    this.name = name; this.color = color || "#c06030";
    this.dialog = dialog || ["..."];
    this.merchant = merchant;
    this.stock = stock;
    this.shopPool = shopPool;
    this.direction = DIR.DOWN;
    this.homeX = this.x; this.homeY = this.y;
    this.wanderRadius = wanderRadius * TILE_SIZE;
    this.wanderTimer = 2 + Math.random() * 3;
    this.moving = false; this.moveDir = { dx: 0, dy: 0 }; this.moveTime = 0;
    this.speed = 40; this.animTimer = 0; this.animFrame = 0;
  }

  update(dt, map) {
    if (this.wanderRadius <= 0) return;
    this.wanderTimer -= dt;

    if (!this.moving && this.wanderTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      this.moveDir = { dx: Math.cos(angle), dy: Math.sin(angle) };
      this.moveTime = 0.5 + Math.random() * 1.5;
      this.moving = true;
      if (Math.abs(this.moveDir.dx) > Math.abs(this.moveDir.dy))
        this.direction = this.moveDir.dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else
        this.direction = this.moveDir.dy > 0 ? DIR.DOWN : DIR.UP;
    }

    if (this.moving) {
      this.moveTime -= dt;
      this.animTimer += dt;
      if (this.animTimer >= 0.2) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      const newX = this.x + this.moveDir.dx * this.speed * dt;
      const newY = this.y + this.moveDir.dy * this.speed * dt;
      const distX = newX - this.homeX, distY = newY - this.homeY;
      const dist = Math.sqrt(distX * distX + distY * distY);

      if (dist < this.wanderRadius && !this._collides(newX, newY, map)) {
        this.x = newX; this.y = newY;
      }
      if (this.moveTime <= 0) {
        this.moving = false; this.animFrame = 0;
        this.wanderTimer = 2 + Math.random() * 4;
      }
    }
  }

  _collides(px, py, map) {
    const m = 3;
    return map.isSolidPx(px + m, py + m) ||
           map.isSolidPx(px + this.w - m, py + m) ||
           map.isSolidPx(px + m, py + this.h - m) ||
           map.isSolidPx(px + this.w - m, py + this.h - m);
  }

  isNearPlayer(player, range = TILE_SIZE * 1.5) {
    const dx = (this.x + this.w / 2) - player.centerX;
    const dy = (this.y + this.h / 2) - player.centerY;
    return Math.sqrt(dx * dx + dy * dy) < range;
  }

  render(ctx) {
    const x = Math.round(this.x), y = Math.round(this.y);
    const bounce = this.moving ? Math.sin(this.animFrame * Math.PI / 2) : 0;

    ctx.fillStyle = "#3a3a5a";
    ctx.fillRect(x + 4, y + 16 - bounce, 4, 4);
    ctx.fillRect(x + 12, y + 16 - bounce, 4, 4);
    ctx.fillStyle = this.color;
    ctx.fillRect(x + 3, y + 6 - bounce, 14, 12);
    ctx.fillStyle = "#e8c870";
    ctx.fillRect(x + 5, y - 2 - bounce, 10, 10);

    ctx.fillStyle = "#222";
    switch (this.direction) {
      case DIR.DOWN:
        ctx.fillRect(x + 7, y + 3 - bounce, 2, 2);
        ctx.fillRect(x + 11, y + 3 - bounce, 2, 2);
        break;
      case DIR.LEFT:  ctx.fillRect(x + 5, y + 3 - bounce, 2, 2); break;
      case DIR.RIGHT: ctx.fillRect(x + 13, y + 3 - bounce, 2, 2); break;
    }
  }
}

/* ── Pet System ──────────────────────────────────────────── */

const PET_TYPES = {
  cat:    { name: "Kedi",    speed: 110, bodyColor: "#d4a040", earColor: "#b88030", tameFood: "fish" },
  dog:    { name: "K\u00f6pek",   speed: 130, bodyColor: "#b08050", earColor: "#8a6030", tameFood: "apple" },
  bunny:  { name: "Tav\u015fan",  speed: 140, bodyColor: "#d0d0d0", earColor: "#e8b0b0", tameFood: "flower" },
  bird:   { name: "Ku\u015f",     speed: 100, bodyColor: "#50a0e0", earColor: "#3080c0", tameFood: "seed" },
  fox:    { name: "Tilki",   speed: 120, bodyColor: "#d06020", earColor: "#a04010", tameFood: "apple" },
};

function drawPetSprite(ctx, type, x, y, dir, animFrame, moving) {
  const pt = PET_TYPES[type];
  const bounce = moving ? Math.sin(animFrame * Math.PI / 2) * 1.5 : 0;
  const legOff = moving ? Math.sin(animFrame * Math.PI) * 2 : 0;

  if (type === "bird") {
    const wingFlap = moving ? Math.sin(animFrame * Math.PI) * 4 : 0;
    ctx.fillStyle = pt.bodyColor;
    ctx.beginPath(); ctx.ellipse(x + 8, y + 8 - bounce, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = pt.earColor;
    ctx.beginPath(); ctx.moveTo(x + 2, y + 6 - bounce - wingFlap); ctx.lineTo(x + 6, y + 8 - bounce); ctx.lineTo(x + 2, y + 10 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y + 6 - bounce + wingFlap); ctx.lineTo(x + 10, y + 8 - bounce); ctx.lineTo(x + 14, y + 10 - bounce); ctx.fill();
    ctx.fillStyle = "#e8a020";
    ctx.beginPath(); ctx.moveTo(x + 12, y + 8 - bounce);
    if (dir === DIR.RIGHT) { ctx.lineTo(x + 17, y + 7 - bounce); ctx.lineTo(x + 12, y + 9 - bounce); }
    else if (dir === DIR.LEFT) { ctx.lineTo(x - 1, y + 7 - bounce); ctx.lineTo(x + 4, y + 9 - bounce); }
    else { ctx.lineTo(x + 9, y + 6 - bounce); ctx.lineTo(x + 7, y + 9 - bounce); }
    ctx.fill();
    ctx.fillStyle = "#111";
    if (dir !== DIR.UP) {
      ctx.fillRect(x + (dir === DIR.LEFT ? 5 : 9), y + 6 - bounce, 2, 2);
    }
    return;
  }

  ctx.fillStyle = pt.bodyColor;
  ctx.fillRect(x + 2, y + 6 - bounce, 12, 8);

  ctx.fillStyle = pt.earColor;
  if (type === "bunny") {
    ctx.fillRect(x + 3, y - 4 - bounce, 3, 8);
    ctx.fillRect(x + 10, y - 4 - bounce, 3, 8);
  } else if (type === "cat") {
    ctx.beginPath(); ctx.moveTo(x + 2, y + 2 - bounce); ctx.lineTo(x + 5, y + 6 - bounce); ctx.lineTo(x - 1, y + 6 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y + 2 - bounce); ctx.lineTo(x + 11, y + 6 - bounce); ctx.lineTo(x + 17, y + 6 - bounce); ctx.fill();
  } else if (type === "fox") {
    ctx.beginPath(); ctx.moveTo(x + 1, y + 1 - bounce); ctx.lineTo(x + 5, y + 6 - bounce); ctx.lineTo(x - 2, y + 6 - bounce); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 15, y + 1 - bounce); ctx.lineTo(x + 11, y + 6 - bounce); ctx.lineTo(x + 18, y + 6 - bounce); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.fillRect(x + 4, y + 10 - bounce, 8, 4);
  } else {
    ctx.fillRect(x + 1, y + 2 - bounce, 4, 6);
    ctx.fillRect(x + 11, y + 2 - bounce, 4, 6);
  }

  ctx.fillStyle = pt.bodyColor;
  ctx.fillRect(x + 2, y + 2 - bounce, 12, 6);

  ctx.fillStyle = pt.earColor;
  ctx.fillRect(x + 3 + legOff, y + 14 - bounce, 3, 3);
  ctx.fillRect(x + 10 - legOff, y + 14 - bounce, 3, 3);

  if (type === "cat" || type === "fox") {
    ctx.fillStyle = pt.earColor;
    const tailWag = Math.sin(Date.now() / 200) * 3;
    if (dir === DIR.LEFT) ctx.fillRect(x + 14, y + 8 - bounce + tailWag, 5, 2);
    else if (dir === DIR.RIGHT) ctx.fillRect(x - 3, y + 8 - bounce + tailWag, 5, 2);
    else ctx.fillRect(x + 14, y + 6 - bounce + tailWag, 5, 2);
  }
  if (type === "dog") {
    ctx.fillStyle = pt.earColor;
    const tailWag = Math.sin(Date.now() / 150) * 4;
    ctx.fillRect(x + 13, y + 6 - bounce + tailWag, 3, 2);
    ctx.fillRect(x + 15, y + 5 - bounce + tailWag, 2, 2);
  }

  ctx.fillStyle = "#111";
  if (dir !== DIR.UP) {
    ctx.fillRect(x + (dir === DIR.LEFT ? 3 : 5), y + 5 - bounce, 2, 2);
    ctx.fillRect(x + (dir === DIR.LEFT ? 8 : 10), y + 5 - bounce, 2, 2);
  }

  ctx.fillStyle = "#222";
  if (dir === DIR.DOWN || dir === DIR.LEFT || dir === DIR.RIGHT) {
    ctx.fillRect(x + 6, y + 8 - bounce, 4, 1);
  }
}

/** Evcil hayvan loot üzerindeyken toplama mesafesi (px). */
const PET_LOOT_PICKUP_RANGE = TILE_SIZE * 1.35;
/** Pet bu yarıçap içinde bir loot görür ve yürüyerek gider. */

/** Oyuncudan daha uzaktaki lootlar için pet hedef almaz (tüm haritaya koşmasın). */
const PET_LOOT_MAX_CHASE_FROM_PLAYER = TILE_SIZE * 13;

class Pet {
