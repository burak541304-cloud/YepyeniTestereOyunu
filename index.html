<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚔ Knight Online RPG</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #000;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  touch-action: none;
}
canvas {
  display: block;
  touch-action: none;
}
#rot-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a0005, #050015);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fd0;
  text-align: center;
  gap: 16px;
}
@media (orientation: portrait) {
  #rot-overlay { display: flex; }
}
#rot-arrow {
  font-size: 72px;
  animation: rotpulse 1.2s ease-in-out infinite alternate;
}
@keyframes rotpulse {
  from { transform: rotate(-15deg) scale(0.9); opacity: 0.6; }
  to   { transform: rotate(15deg) scale(1.1); opacity: 1; }
}
#rot-text1 { font-size: 20px; font-weight: bold; }
#rot-text2 { font-size: 13px; color: #aaa; }
</style>
</head>
<body>
<div id="rot-overlay">
  <div id="rot-arrow">⟳</div>
  <div id="rot-text1">Cihazı Yatay Çevirin</div>
  <div id="rot-text2">Please rotate to landscape mode</div>
</div>
<canvas id="c"></canvas>
<script>
(function(){
  // ========== POLYFILL: roundRect ==========
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };
  }

  // Güvenli çizim
  function drawRoundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
  }

  canvas.width = W;
  canvas.height = H;
  const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  if (isMobile && screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }

  // ----- ITEM DEFS (fiyatlar eklendi) -----

  const SKILL_ORDER = ['slash','shield_bash','charge','whirlwind','war_cry','earthquake','blade_storm'];

  const QUEST_DEFS = [
    { id:'pest_control', name:'Pest Control', desc:'Kill 10 Worms', unlockLv:1, killType:'worm', killCount:10, rewards:{ exp:200, noah:150, items:['hp_potion_s','hp_potion_s'] } },
    { id:'wolf_hunt',    name:'Wolf Hunt',    desc:'Kill 10 Wolves', unlockLv:5, killType:'wolf', killCount:10, rewards:{ exp:600, noah:400, items:['leather_vest'] } },
    { id:'undead_purge', name:'Undead Purge', desc:'Kill 15 Skeletons', unlockLv:15, killType:'skeleton', killCount:15, rewards:{ exp:1500, noah:800, items:['iron_sword'] } },
    { id:'stone_giants', name:'Stone Giants', desc:'Kill 8 Golems', unlockLv:25, killType:'golem', killCount:8, rewards:{ exp:3000, noah:2000, items:['iron_plate'] } },
    { id:'sky_terror',   name:'Sky Terror',   desc:'Kill 12 Harpies', unlockLv:22, killType:'harpy', killCount:12, rewards:{ exp:4000, noah:2500, items:['steel_sword'] } },
    { id:'troll_slayer', name:'Troll Slayer', desc:'Kill 5 Trolls', unlockLv:40, killType:'troll', killCount:5, rewards:{ exp:10000, noah:6000, items:['war_axe','elixir'] } },
    { id:'merchants_req', name:"Merchant's Request", desc:'Collect 500 Noah', unlockLv:1, collectNoah:500, rewards:{ exp:800, noah:200, items:['hp_potion_m'] } },
  ];

  const MOB_DEFS = {
    worm:     { name:'Worm', level:1, hp:60, atk:6, def:2, speed:60, aggroRange:150, attackRange:30, attackSpeed:1.2, exp:15, noah:5, color:'#4a4', loot:[{id:'worm_slime',chance:0.7},{id:'hp_potion_s',chance:0.15}] },
    wolf:     { name:'Wolf', level:8, hp:180, atk:18, def:5, speed:120, aggroRange:250, attackRange:40, attackSpeed:1.0, exp:45, noah:15, color:'#876', loot:[{id:'wolf_fang',chance:0.6},{id:'hp_potion_s',chance:0.25}] },
    skeleton: { name:'Skeleton', level:18, hp:350, atk:32, def:12, speed:80, aggroRange:200, attackRange:45, attackSpeed:1.4, exp:100, noah:25, color:'#ddd', loot:[{id:'bone_shard',chance:0.75},{id:'hp_potion_m',chance:0.2}] },
    golem:    { name:'Golem', level:32, hp:1200, atk:65, def:35, speed:50, aggroRange:180, attackRange:55, attackSpeed:2.0, exp:280, noah:50, color:'#a86', loot:[{id:'stone_heart',chance:0.5},{id:'hp_potion_m',chance:0.3}] },
    harpy:    { name:'Harpy', level:28, hp:500, atk:55, def:18, speed:160, aggroRange:350, attackRange:45, attackSpeed:0.9, exp:200, noah:40, color:'#68a', loot:[{id:'harpy_feather',chance:0.65},{id:'mp_potion_m',chance:0.25}] },
    troll:    { name:'Troll', level:48, hp:3500, atk:120, def:55, speed:70, aggroRange:220, attackRange:65, attackSpeed:2.2, exp:600, noah:80, color:'#4a2', loot:[{id:'troll_blood',chance:0.6},{id:'hp_potion_l',chance:0.35},{id:'war_axe',chance:0.08}] },
  };

  // Yardımcı fonksiyonlar
  function rnd(a,b) { return a + Math.random()*(b-a); }
  function rndInt(a,b) { return Math.floor(rnd(a,b+1)); }
  function clamp(v,mn,mx) { return Math.max(mn,Math.min(mx,v)); }
  function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
  function angle(a,b) { return Math.atan2(b.y-a.y, b.x-a.x); }
  function worldToScreen(wx,wy,cam) { return { x: wx - cam.x + W/2, y: wy - cam.y + H/2 }; }

  // --- Sınıflar (kısa ama çalışır) ---
  class Camera { constructor(){ this.x=500; this.y=500; } follow(t,dt){ let spd=8; this.x+=(t.x-this.x)*spd*dt; this.y+=(t.y-this.y)*spd*dt; this.x=clamp(this.x,W/2,WORLD_W-W/2); this.y=clamp(this.y,H/2,WORLD_H-H/2); } }
  
  class Item { constructor(id,enhance=0){ let def=ITEM_DEFS[id]; if(!def){this.valid=false;return;} this.valid=true; Object.assign(this,def); this.id=id; this.enhance=enhance; this.name=def.name; } getDisplayName(){ return this.enhance>0?this.name+' +'+this.enhance:this.name; } getEnhancedAtk(){ return (this.atk||0)+this.enhance*3; } getEnhancedDef(){ return (this.def||0)+this.enhance*2; } getEnhancedHp(){ return (this.hp||0)+this.enhance*5; } getGlowColor(){ if(this.enhance>=10)return null; if(this.enhance>=9)return '#f80'; if(this.enhance>=8)return '#a0f'; if(this.enhance>=7)return '#44f'; return null; } serialize(){ return {id:this.id, enhance:this.enhance}; } static deserialize(d){ return d?new Item(d.id,d.enhance||0):null; } }
  
  class Inventory { constructor(){ this.slots=new Array(24).fill(null); this.equipment={weapon:null,head:null,chest:null,legs:null,boots:null}; this.noah=0; } addItem(item){ for(let i=0;i<24;i++) if(!this.slots[i]){ this.slots[i]=item; return true; } return false; } removeItem(idx){ this.slots[idx]=null; } equip(idx,player){ let it=this.slots[idx]; if(!it) return; let slot=it.type; let old=this.equipment[slot]; this.equipment[slot]=it; this.slots[idx]=old; player.recalcStats(); } unequip(slot,player){ let it=this.equipment[slot]; if(!it) return; if(this.addItem(it)){ this.equipment[slot]=null; player.recalcStats(); } } usePotion(idx,player){ let it=this.slots[idx]; if(!it) return false; if(it.type==='potion'){ if(it.heal){ player.hp=Math.min(player.maxHp,player.hp+it.heal); G.particles.spawn('heal',player.x,player.y,'+'+it.heal); } if(it.mp){ player.mp=Math.min(player.maxMp,player.mp+it.mp); G.particles.spawn('heal',player.x,player.y,'+'+it.mp+' MP'); } if(it.atk_buff){ player.atkBuff=it.atk_buff; player.atkBuffTimer=30; } this.slots[idx]=null; return true; } if(it.type==='currency'){ this.noah+=it.value; this.slots[idx]=null; return true; } return false; } getEquipBonus(){ let atk=0,def=0,hp=0; for(let s in this.equipment){ let it=this.equipment[s]; if(it){ atk+=it.getEnhancedAtk(); def+=it.getEnhancedDef(); hp+=it.getEnhancedHp(); } } return {atk,def,hp}; } serialize(){ return { slots:this.slots.map(s=>s?s.serialize():null), equipment:Object.fromEntries(Object.entries(this.equipment).map(([k,v])=>[k,v?v.serialize():null])), noah:this.noah }; } static deserialize(d){ let inv=new Inventory(); if(!d) return inv; if(d.slots) inv.slots=d.slots.map(s=>s?Item.deserialize(s):null); if(d.equipment) for(let k in d.equipment) inv.equipment[k]=d.equipment[k]?Item.deserialize(d.equipment[k]):null; inv.noah=d.noah||0; return inv; } }
  
  class Player { constructor(){ this.x=500; this.y=500; this.level=1; this.exp=0; this.expNext=100; this.str=10; this.dex=10; this.int=5; this.statPoints=0; this.skillPoints=0; this.atkBuff=0; this.atkBuffTimer=0; this.inventory=new Inventory(); this.inventory.addItem(new Item('rusty_sword')); this.inventory.addItem(new Item('hp_potion_s')); this.inventory.addItem(new Item('hp_potion_s')); this.recalcStats(); this.hp=this.maxHp; this.mp=this.maxMp; this.moveTarget=null; this.attackTimer=0; this.attackSpeed=1.5; this.facingAngle=0; this.stunTimer=0; this.chargeTimer=0; this.chargeVx=0; this.chargeVy=0; this.warCryTimer=0; this.warCryAtk=0; this.warCryDef=0; this.animFrame=0; this.swingAnim=0; } recalcStats(){ let bonus=this.inventory.getEquipBonus(); this.maxHp=200+this.str*10+bonus.hp; this.maxMp=100+this.int*8; this.baseAtk=10+this.str*2+bonus.atk; this.baseDef=5+this.str*0.5+bonus.def; this.critChance=0.05+this.dex*0.002; this.speed=180; if(this.hp) this.hp=Math.min(this.hp,this.maxHp); if(this.mp) this.mp=Math.min(this.mp,this.maxMp); } getAtk(){ let a=this.baseAtk; if(this.atkBuff>0) a*=(1+this.atkBuff); return a; } getDef(){ return this.baseDef+(this.warCryDef||0); } expNeeded(lv){ return Math.floor(100*Math.pow(1.4,lv-1)); } gainExp(amt){ this.exp+=amt; G.particles.spawn('exp',this.x,this.y-30,'+'+amt+' EXP'); while(this.exp>=this.expNext){ this.exp-=this.expNext; this.level++; this.expNext=this.expNeeded(this.level); this.statPoints+=5; this.skillPoints+=1; this.recalcStats(); this.hp=Math.min(this.hp+50,this.maxHp); this.mp=Math.min(this.mp+30,this.maxMp); G.particles.spawn('levelup',this.x,this.y,'LEVEL UP!'); if(G.state==='playing') G.pendingStatScreen=true; } } update(dt,keys,mobs){ this.animFrame+=dt; if(this.stunTimer>0){ this.stunTimer-=dt; return; } if(this.atkBuffTimer>0){ this.atkBuffTimer-=dt; if(this.atkBuffTimer<=0) this.atkBuff=0; } if(this.warCryTimer>0){ this.warCryTimer-=dt; if(this.warCryTimer<=0){ this.warCryAtk=0; this.warCryDef=0; } } if(this.chargeTimer>0){ this.chargeTimer-=dt; this.x=clamp(this.x+this.chargeVx*dt,0,WORLD_W); this.y=clamp(this.y+this.chargeVy*dt,0,WORLD_H); return; } let vx=0,vy=0; if(G.joystick && G.joystick.active){ vx=G.joystick.nx; vy=G.joystick.ny; } if(keys['KeyW']||keys['ArrowUp']) vy=-1; if(keys['KeyS']||keys['ArrowDown']) vy=1; if(keys['KeyA']||keys['ArrowLeft']) vx=-1; if(keys['KeyD']||keys['ArrowRight']) vx=1; if(vx!==0||vy!==0){ let len=Math.hypot(vx,vy); vx/=len; vy/=len; this.moveTarget=null; } if(this.moveTarget){ let d=dist(this,this.moveTarget); if(d<8) this.moveTarget=null; else { let ang=angle(this,this.moveTarget); vx=Math.cos(ang); vy=Math.sin(ang); } } if(vx!==0||vy!==0){ this.facingAngle=Math.atan2(vy,vx); this.x=clamp(this.x+vx*this.speed*dt,0,WORLD_W); this.y=clamp(this.y+vy*this.speed*dt,0,WORLD_H); } this.attackTimer-=dt; if(this.attackTimer<=0 || G.forceAttack){ if(G.forceAttack){ G.forceAttack=false; this.attackTimer=Math.max(0,this.attackTimer); } let nearest=null, nd=Infinity; for(let m of mobs){ if(m.dead) continue; let d=dist(this,m); if(d<200 && d<nd){ nd=d; nearest=m; } } if(nearest){ this.attackTimer=this.attackSpeed; this.swingAnim=0.3; this.facingAngle=angle(this,nearest); let dmg=this.calcDamage(nearest); nearest.takeDamage(dmg.dmg,dmg.crit); } } if(this.swingAnim>0) this.swingAnim-=dt*3; } calcDamage(t){ let atk=this.getAtk(); let crit=Math.random()<this.critChance; if(crit) atk*=2; let dmg=Math.max(1,Math.floor(atk-(t.def||0)*0.4+rnd(-3,3))); return {dmg,crit}; } takeDamage(amt){ let def=this.getDef(); let red=Math.max(1,Math.floor(amt-def*0.5)); this.hp-=red; G.particles.spawn('damage',this.x,this.y-20,'-'+red); G.particles.spawn('hit',this.x,this.y,''); if(this.hp<=0){ this.hp=0; G.changeState('dead'); } return red; } draw(cam){ let s=worldToScreen(this.x,this.y,cam); if(s.x<-50||s.x>W+50||s.y<-50||s.y>H+50) return; ctx.save(); ctx.translate(s.x,s.y); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,16,12,5,0,0,Math.PI*2); ctx.fill(); let legAnim=Math.sin(this.animFrame*8)*4; ctx.fillStyle='#335'; ctx.fillRect(-6,8,5,14+legAnim); ctx.fillRect(1,8,5,14-legAnim); ctx.fillStyle='#357'; ctx.fillRect(-8,-10,16,22); ctx.fillStyle='rgba(100,150,255,0.3)'; ctx.fillRect(-6,-8,12,10); ctx.save(); ctx.rotate(this.facingAngle+this.swingAnim*60); ctx.fillStyle='#ccc'; ctx.fillRect(8,-2,22,4); ctx.fillStyle='#a84'; ctx.fillRect(8,-5,4,10); ctx.restore(); ctx.fillStyle='#d4a'; ctx.beginPath(); ctx.arc(0,-18,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#46a'; ctx.beginPath(); ctx.arc(0,-20,11,Math.PI,0); ctx.fill(); ctx.fillRect(-11,-20,22,5); ctx.fillStyle='#0ff'; ctx.fillRect(-4,-19,3,2); ctx.fillRect(1,-19,3,2); ctx.restore(); } }
  
  // Mob (kısaltılmış)
  class Mob { constructor(type,x,y){ let def=MOB_DEFS[type]; Object.assign(this,def); this.type=type; this.x=x; this.y=y; this.spawnX=x; this.spawnY=y; this.hp=def.hp; this.maxHp=def.hp; this.state='idle'; this.wanderTimer=rnd(1,4); this.wanderX=x; this.wanderY=y; this.attackTimer=0; this.dead=false; this.deadTimer=0; this.respawnTimer=0; this.damaged=false; this.stunTimer=0; this.knockbackTimer=0; this.knockbackVx=0; this.knockbackVy=0; this.animTimer=0; this.lootDropped=false; } update(dt,player){ this.animTimer+=dt; if(this.knockbackTimer>0){ this.knockbackTimer-=dt; this.x=clamp(this.x+this.knockbackVx*dt,0,WORLD_W); this.y=clamp(this.y+this.knockbackVy*dt,0,WORLD_H); } if(this.stunTimer>0){ this.stunTimer-=dt; return; } if(this.dead) return; let dp=dist(this,player); let dSpawn=dist(this,{x:this.spawnX,y:this.spawnY}); if(this.state==='idle'){ this.wanderTimer-=dt; if(this.wanderTimer<=0){ this.wanderTimer=rnd(2,5); this.wanderX=this.spawnX+rnd(-150,150); this.wanderY=this.spawnY+rnd(-150,150); } let dw=dist(this,{x:this.wanderX,y:this.wanderY}); if(dw>10){ let ang=Math.atan2(this.wanderY-this.y,this.wanderX-this.x); this.x=clamp(this.x+Math.cos(ang)*this.speed*0.4*dt,0,WORLD_W); this.y=clamp(this.y+Math.sin(ang)*this.speed*0.4*dt,0,WORLD_H); } if(dp<this.aggroRange) this.state='aggro'; } else if(this.state==='aggro'){ if(dp<this.attackRange) this.state='attack'; else if(dSpawn>600) this.state='return'; else{ let ang=Math.atan2(player.y-this.y,player.x-this.x); this.x=clamp(this.x+Math.cos(ang)*this.speed*dt,0,WORLD_W); this.y=clamp(this.y+Math.sin(ang)*this.speed*dt,0,WORLD_H); } } else if(this.state==='attack'){ if(dp>this.attackRange*1.3) this.state='aggro'; else{ this.attackTimer-=dt; if(this.attackTimer<=0){ this.attackTimer=this.attackSpeed; let dmg=Math.max(1,Math.floor(this.atk+rnd(-3,3))); player.takeDamage(dmg); } } if(dSpawn>600) this.state='return'; } else if(this.state==='return'){ let ang=Math.atan2(this.spawnY-this.y,this.spawnX-this.x); this.x=clamp(this.x+Math.cos(ang)*this.speed*1.2*dt,0,WORLD_W); this.y=clamp(this.y+Math.sin(ang)*this.speed*1.2*dt,0,WORLD_H); if(dSpawn<20){ this.state='idle'; this.hp=this.maxHp; } if(dp<this.aggroRange) this.state='aggro'; } } takeDamage(amt,crit){ if(this.dead) return; let red=Math.max(1,Math.floor(amt-this.def*0.4)); this.hp-=red; this.damaged=true; this.state='aggro'; G.particles.spawn('damage',this.x,this.y-30,'-'+red); if(crit) G.particles.spawn('crit',this.x,this.y-30,'CRIT!'); if(this.hp<=0) this.die(); } die(){ this.dead=true; this.deadTimer=1.5; if(!this.lootDropped){ this.lootDropped=true; for(let l of this.loot) if(Math.random()<l.chance) G.groundItems.push({x:this.x+rnd(-20,20),y:this.y+rnd(-20,20),item:new Item(l.id),glowTimer:0}); let noahAmt=rndInt(Math.floor(this.noah*0.7),Math.floor(this.noah*1.3)); G.player.inventory.noah+=noahAmt; G.player.gainExp(this.exp); G.quests.onKill(this.type); } this.respawnTimer=30; } respawn(){ this.x=this.spawnX; this.y=this.spawnY; this.hp=this.maxHp; this.dead=false; this.deadTimer=0; this.lootDropped=false; this.state='idle'; this.wanderTimer=rnd(1,3); this.damaged=false; } draw(cam){ let s=worldToScreen(this.x,this.y,cam); if(s.x<-80||s.x>W+80||s.y<-80||s.y>H+80) return; ctx.save(); if(this.dead) ctx.globalAlpha=Math.max(0,this.deadTimer/1.5); ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(s.x,s.y,15,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center'; ctx.fillText(this.name[0],s.x,s.y+5); if(!this.dead && this.damaged){ let bw=40,bh=5,bx=s.x-20,by=s.y-25; ctx.fillStyle='#300'; ctx.fillRect(bx,by,bw,bh); ctx.fillStyle='#f22'; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh); } ctx.restore(); if(this.dead) this.deadTimer-=1/60; } }
  
  // ParticleSystem kısa
  class ParticleSystem { constructor(){ this.particles=[]; } spawn(type,x,y,text){ for(let i=0;i<5;i++) this.particles.push({type, x, y, vx:rnd(-100,100), vy:rnd(-100,0), life:0.8, maxLife:0.8, color:'#f80', text }); } update(dt){ for(let i=0;i<this.particles.length;i++){ let p=this.particles[i]; p.life-=dt; if(p.life<=0){ this.particles.splice(i,1); i--; continue; } p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt; } } draw(cam){ for(let p of this.particles){ let s=worldToScreen(p.x,p.y,cam); ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,Math.PI*2); ctx.fill(); if(p.text){ ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.fillText(p.text,s.x,s.y-10); } } ctx.globalAlpha=1; } }
  
  // SkillTree, QuestLog, VirtualJoystick (kısa)
  class SkillTree { constructor(){ this.skills={}; this.cooldowns={}; for(let id of SKILL_ORDER){ this.skills[id]=0; this.cooldowns[id]=0; } } upgrade(id,p){ let def=SKILL_DEFS[id]; if(p.level<def.unlockLv) return; if(this.skills[id]>=def.maxLv) return; if(p.skillPoints<=0) return; p.skillPoints--; this.skills[id]++; } canUse(id,p){ let def=SKILL_DEFS[id]; if(this.skills[id]<=0) return false; if(p.level<def.unlockLv) return false; if(this.cooldowns[id]>0) return false; if(p.mp<def.mp) return false; return true; } use(id,p,mobs){ if(!this.canUse(id,p)) return false; let def=SKILL_DEFS[id]; let lv=this.skills[id]; p.mp-=def.mp; this.cooldowns[id]=def.cd; for(let m of mobs){ if(m.dead) continue; if(dist(p,m)<100) m.takeDamage(Math.floor(p.getAtk()*(1+lv*0.3)),false); } G.particles.spawn('spark',p.x,p.y,''); return true; } update(dt){ for(let id of SKILL_ORDER) if(this.cooldowns[id]>0) this.cooldowns[id]-=dt; } serialize(){ let o={}; for(let id of SKILL_ORDER) o[id]=this.skills[id]; return o; } static deserialize(d){ let st=new SkillTree(); if(d) for(let id of SKILL_ORDER) if(d[id]!==undefined) st.skills[id]=d[id]; return st; } }
  
  class QuestLog { constructor(){ this.quests={}; for(let q of QUEST_DEFS) this.quests[q.id]={status:'locked',progress:0}; } update(p){ for(let qd of QUEST_DEFS){ let qs=this.quests[qd.id]; if(qs.status==='locked' && p.level>=qd.unlockLv) qs.status='available'; if(qs.status==='active' && qd.collectNoah && p.inventory.noah>=qd.collectNoah) qs.progress=p.inventory.noah; } } accept(id){ let qs=this.quests[id]; if(qs && qs.status==='available') qs.status='active'; } abandon(id){ let qs=this.quests[id]; if(qs && qs.status==='active'){ qs.status='available'; qs.progress=0; } } onKill(type){ for(let qd of QUEST_DEFS){ if(!qd.killType) continue; let qs=this.quests[qd.id]; if(qs.status!=='active') continue; if(qd.killType===type){ qs.progress++; if(qs.progress>=qd.killCount) this.complete(qd.id); } } } checkNoah(noah){ for(let qd of QUEST_DEFS){ if(!qd.collectNoah) continue; let qs=this.quests[qd.id]; if(qs.status!=='active') continue; qs.progress=noah; if(noah>=qd.collectNoah) this.complete(qd.id); } } complete(id){ let qs=this.quests[id]; let qd=QUEST_DEFS.find(q=>q.id===id); if(!qs||!qd||qs.status==='completed') return; qs.status='completed'; G.player.gainExp(qd.rewards.exp); G.player.inventory.noah+=qd.rewards.noah; for(let iid of (qd.rewards.items||[])) G.player.inventory.addItem(new Item(iid)); } getActive(){ return QUEST_DEFS.filter(q=>this.quests[q.id].status==='active'); } serialize(){ let o={}; for(let id in this.quests) o[id]={status:this.quests[id].status,progress:this.quests[id].progress}; return o; } static deserialize(d){ let ql=new QuestLog(); if(d) for(let id in d) if(ql.quests[id]) Object.assign(ql.quests[id],d[id]); return ql; } }
  
  class VirtualJoystick { constructor(){ this.active=false; this.baseX=120; this.baseY=H-120; this.stickX=this.baseX; this.stickY=this.baseY; this.nx=0; this.ny=0; this.touchId=null; } resetBase(){ if(!this.active){ this.baseX=120; this.baseY=H-120; this.stickX=this.baseX; this.stickY=this.baseY; } } onTouchStart(t){ if(t.clientX<W/2 && this.touchId===null){ this.active=true; this.touchId=t.identifier; this.baseX=t.clientX; this.baseY=t.clientY; this.stickX=this.baseX; this.stickY=this.baseY; } } onTouchMove(t){ if(t.identifier!==this.touchId) return; let dx=t.clientX-this.baseX, dy=t.clientY-this.baseY; let d=Math.hypot(dx,dy); let maxR=60; let r=Math.min(d,maxR); let ang=Math.atan2(dy,dx); this.stickX=this.baseX+Math.cos(ang)*r; this.stickY=this.baseY+Math.sin(ang)*r; this.nx=Math.cos(ang)*(r/maxR); this.ny=Math.sin(ang)*(r/maxR); } onTouchEnd(t){ if(t.identifier===this.touchId){ this.active=false; this.touchId=null; this.nx=0; this.ny=0; this.baseX=120; this.baseY=H-120; this.stickX=this.baseX; this.stickY=this.baseY; } } draw(){ if(!this.active) return; ctx.globalAlpha=0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(this.baseX,this.baseY,60,0,Math.PI*2); ctx.stroke(); ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(this.baseX,this.baseY,60,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=0.7; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(this.stickX,this.stickY,25,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; } }
  
  // Merchant
  class Merchant { constructor(x,y){ this.x=x; this.y=y; this.name="Tüccar Garth"; this.stock=['hp_potion_s','hp_potion_m','mp_potion_s','rusty_sword','leather_helm','leather_vest','iron_sword','iron_helm']; this.interactRange=80; } draw(cam){ let s=worldToScreen(this.x,this.y,cam); if(s.x<-80||s.x>W+80||s.y<-80||s.y>H+80) return; ctx.save(); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(s.x+5,s.y+12,18,7,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#3579a8'; ctx.beginPath(); ctx.ellipse(s.x,s.y,18,28,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#2a5f8a'; ctx.fillRect(s.x-14,s.y-8,28,20); ctx.fillStyle='#c96'; ctx.beginPath(); ctx.arc(s.x,s.y-22,14,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#b85'; ctx.fillRect(s.x-15,s.y-30,30,8); ctx.fillStyle='#e8a040'; ctx.beginPath(); ctx.arc(s.x,s.y-28,8,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#f4d0a0'; ctx.beginPath(); ctx.arc(s.x,s.y-22,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(s.x-4,s.y-24,2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(s.x+4,s.y-24,2,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#333'; ctx.beginPath(); ctx.moveTo(s.x-6,s.y-18); ctx.lineTo(s.x,s.y-16); ctx.lineTo(s.x+6,s.y-18); ctx.stroke(); ctx.fillStyle='#a67c52'; ctx.fillRect(s.x+12,s.y-8,10,14); ctx.fillStyle='#d4a373'; ctx.fillRect(s.x+14,s.y-10,6,6); if(dist({x:this.x,y:this.y}, G.player)<this.interactRange+20){ ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(s.x-35,s.y-45,70,18); ctx.fillStyle='#fd0'; ctx.font='bold 11px Arial'; ctx.textAlign='center'; ctx.fillText(this.name,s.x,s.y-33); ctx.fillStyle='#fff'; ctx.font='10px Arial'; ctx.fillText('[Tıkla] Alışveriş',s.x,s.y-42); } ctx.restore(); } }
  
  // WorldGenerator basit
  class WorldGenerator { constructor(){ this.decorations=[]; this.generate(); } generate(){ for(let i=0;i<300;i++){ this.decorations.push({x:rnd(0,WORLD_W),y:rnd(0,WORLD_H),type:'tree'}); } } draw(cam){ ctx.fillStyle='#2a4a2a'; ctx.fillRect(0,0,W,H); for(let d of this.decorations){ let s=worldToScreen(d.x,d.y,cam); if(s.x<0||s.x>W||s.y<0||s.y>H) continue; ctx.fillStyle='#3a6a3a'; ctx.beginPath(); ctx.rect(s.x-5,s.y-10,10,20); ctx.fill(); ctx.fillStyle='#5a9a5a'; ctx.beginPath(); ctx.arc(s.x,s.y-15,8,0,Math.PI*2); ctx.fill(); } } }
  
  // GLOBAL STATE
  let G = {
    state: 'menu',
    player: null, camera: null, mobs: [], npcs: [], groundItems: [], particles: null,
    world: null, skills: null, quests: null, joystick: null, keys: {},
    mouseX:0,mouseY:0, screenShake:0, pendingStatScreen:false, menuParticles:[], menuTimer:0,
    rainbowAngle:0, invTab:'inv', questTab:'active', anvilSelected:null, forceAttack:false,
    anvilMsg:'', anvilMsgTimer:0, anvilFlash:0, statPanelStats:null, hoveredSlot:-1, hoveredEquip:null,
    shopTab:'buy', shopMessage:'', shopMsgTimer:0,
    changeState:function(s){ G.state=s; },
    save:function(){ saveGame(); },
    load:function(){ loadGame(); }
  };
  
  function initGame(fresh){
    G.player = new Player();
    G.camera = new Camera();
    G.particles = new ParticleSystem();
    G.world = new WorldGenerator();
    G.joystick = new VirtualJoystick();
    G.skills = new SkillTree();
    G.quests = new QuestLog();
    G.mobs = [];
    G.npcs = [];
    G.groundItems = [];
    G.screenShake = 0;
    G.pendingStatScreen = false;
    G.npcs.push(new Merchant(450,520));
    // spawn mobs
    for(let i=0;i<30;i++) G.mobs.push(new Mob('worm', rnd(200,800), rnd(200,800)));
    for(let i=0;i<20;i++) G.mobs.push(new Mob('wolf', rnd(1000,1800), rnd(600,1400)));
    for(let i=0;i<20;i++) G.mobs.push(new Mob('skeleton', rnd(2000,3000), rnd(1200,2200)));
    if(!fresh) loadGame();
    G.camera.x = G.player.x;
    G.camera.y = G.player.y;
  }
  
  function saveGame(){ let data={ level:G.player.level, exp:G.player.exp, noah:G.player.inventory.noah, str:G.player.str, dex:G.player.dex, int:G.player.int, hp:G.player.hp, mp:G.player.mp, statPoints:G.player.statPoints, skillPoints:G.player.skillPoints, inventory:G.player.inventory.serialize(), skills:G.skills.serialize(), quests:G.quests.serialize(), pos:{x:G.player.x,y:G.player.y} }; localStorage.setItem('knight_rpg_save',JSON.stringify(data)); }
  function loadGame(){ let raw=localStorage.getItem('knight_rpg_save'); if(!raw) return; try{ let d=JSON.parse(raw); let p=G.player; p.level=d.level||1; p.exp=d.exp||0; p.expNext=p.expNeeded(p.level); p.str=d.str||10; p.dex=d.dex||10; p.int=d.int||5; p.statPoints=d.statPoints||0; p.skillPoints=d.skillPoints||0; p.recalcStats(); p.hp=Math.min(d.hp||p.maxHp,p.maxHp); p.mp=Math.min(d.mp||p.maxMp,p.maxMp); if(d.inventory) p.inventory=Inventory.deserialize(d.inventory); else p.inventory=new Inventory(); p.inventory.noah=d.noah||0; if(d.skills) G.skills=SkillTree.deserialize(d.skills); if(d.quests) G.quests=QuestLog.deserialize(d.quests); if(d.pos){ p.x=d.pos.x||500; p.y=d.pos.y||500; } }catch(e){} }
  function hasSave(){ return !!localStorage.getItem('knight_rpg_save'); }
  
  // Menü çizimi
  function drawMenuScreen(){
    let grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,'#040112'); grad.addColorStop(1,'#180a35');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fd0'; ctx.font='bold 36px Arial'; ctx.textAlign='center';
    ctx.fillText('⚔ KNIGHT ONLINE RPG ⚔',W/2,H/2-80);
    ctx.fillStyle='#fff'; ctx.font='18px Arial';
    ctx.fillText('Sonsuz Macera',W/2,H/2-30);
    let btnW=200, btnH=50, startX=W/2-btnW/2;
    let btnY=H/2+20;
    drawRoundRect(ctx,startX,btnY,btnW,btnH,10,'#2a4a2a','#4f4');
    ctx.fillStyle='#fff'; ctx.font='bold 20px Arial';
    ctx.fillText('Yeni Oyun',W/2,btnY+34);
    if(hasSave()){
      drawRoundRect(ctx,startX,btnY+70,btnW,btnH,10,'#2a2a5a','#44f');
      ctx.fillText('Devam Et',W/2,btnY+104);
    }
  }
  
  // Oyun döngüsü
  let lastTime=0;
  function gameLoop(ts){
    let dt=Math.min((ts-lastTime)/1000,0.05);
    lastTime=ts;
    ctx.clearRect(0,0,W,H);
    if(G.state==='menu'){
      drawMenuScreen();
      requestAnimationFrame(gameLoop);
      return;
    }
    if(G.state==='playing'){
      G.player.update(dt, G.keys, G.mobs);
      G.camera.follow(G.player, dt);
      G.skills.update(dt);
      G.quests.update(G.player);
      G.quests.checkNoah(G.player.inventory.noah);
      for(let m of G.mobs){
        if(m.dead && m.respawnTimer>0){ m.respawnTimer-=dt; if(m.respawnTimer<=0) m.respawn(); }
        else if(!m.dead) m.update(dt, G.player);
      }
      G.particles.update(dt);
      G.world.draw(G.camera);
      for(let gi of G.groundItems){ let s=worldToScreen(gi.x,gi.y,G.camera); ctx.fillStyle=gi.item.color; ctx.beginPath(); ctx.arc(s.x,s.y,8,0,Math.PI*2); ctx.fill(); if(dist(G.player,gi)<30){ G.player.inventory.addItem(gi.item); G.groundItems.splice(G.groundItems.indexOf(gi),1); } }
      for(let m of G.mobs) m.draw(G.camera);
      for(let n of G.npcs) n.draw(G.camera);
      G.player.draw(G.camera);
      G.particles.draw(G.camera);
      // HUD
      let p=G.player;
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(10,10,200,80);
      ctx.fillStyle='#f00'; ctx.fillRect(12,12,196*(p.hp/p.maxHp),12);
      ctx.fillStyle='#00f'; ctx.fillRect(12,28,196*(p.mp/p.maxMp),12);
      ctx.fillStyle='#ff0'; ctx.fillText(`Lv ${p.level}  Noah:${p.inventory.noah}`,15,55);
      if(G.joystick) G.joystick.draw();
      // mobil butonları basit
      if(isMobile){
        ctx.fillStyle='rgba(200,0,0,0.7)'; ctx.beginPath(); ctx.arc(W-50,H-50,40,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 20px Arial'; ctx.fillText('ATK',W-50,H-40);
      }
    } else if(G.state==='dead'){
      ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#f00'; ctx.font='bold 36px Arial'; ctx.fillText('ÖLDÜNÜZ',W/2,H/2-50);
      drawRoundRect(ctx,W/2-100,H/2+20,200,50,10,'#484','#6f6');
      ctx.fillStyle='#fff'; ctx.fillText('Yeniden Doğ',W/2,H/2+55);
      requestAnimationFrame(gameLoop);
      return;
    }
    requestAnimationFrame(gameLoop);
  }
  
  // Olay yönetimi (mobil için touch düzeltmeleri)
  function setupEvents(){
    document.addEventListener('keydown',e=>{ G.keys[e.code]=true; if(e.code==='Escape' && G.state!=='menu') G.state='menu'; if(e.code==='F5'){ e.preventDefault(); saveGame(); } if(e.code==='F9'){ e.preventDefault(); loadGame(); } });
    document.addEventListener('keyup',e=>{ G.keys[e.code]=false; });
    canvas.addEventListener('click',e=>{
      let mx=e.clientX, my=e.clientY;
      if(G.state==='menu'){
        let btnW=200, btnH=50, startX=W/2-btnW/2;
        let btnY=H/2+20;
        if(mx>=startX && mx<=startX+btnW && my>=btnY && my<=btnY+btnH){
          initGame(true);
          G.state='playing';
        } else if(hasSave() && mx>=startX && mx<=startX+btnW && my>=btnY+70 && my<=btnY+120){
          initGame(false);
          G.state='playing';
        }
      } else if(G.state==='playing'){
        // NPC etkileşim
        for(let n of G.npcs){
          let s=worldToScreen(n.x,n.y,G.camera);
          if(Math.hypot(mx-s.x, my-s.y)<50){
            alert('Satıcı: Hoş geldin! (Demo)');
            break;
          }
        }
        // sağ tık yürüme
        if(e.button===2){
          let cam=G.camera;
          G.player.moveTarget={ x: mx - W/2 + cam.x, y: my - H/2 + cam.y };
        }
      }
    });
    canvas.addEventListener('contextmenu',e=>e.preventDefault());
    // Mobil dokunmatik
    canvas.addEventListener('touchstart',e=>{
      e.preventDefault();
      let rect=canvas.getBoundingClientRect();
      let touch=e.touches[0];
      let mx=touch.clientX, my=touch.clientY;
      if(G.state==='menu'){
        let btnW=200, btnH=50, startX=W/2-btnW/2;
        let btnY=H/2+20;
        if(mx>=startX && mx<=startX+btnW && my>=btnY && my<=btnY+btnH){
          initGame(true);
          G.state='playing';
        } else if(hasSave() && mx>=startX && mx<=startX+btnW && my>=btnY+70 && my<=btnY+120){
          initGame(false);
          G.state='playing';
        }
      } else if(G.state==='playing'){
        if(mx < W/2){
          G.joystick.onTouchStart(touch);
        } else {
          // ATK butonu
          if(Math.hypot(mx-(W-50), my-(H-50))<50){
            G.forceAttack=true;
          }
        }
      }
    });
    canvas.addEventListener('touchmove',e=>{ e.preventDefault(); for(let t of e.changedTouches) G.joystick.onTouchMove(t); });
    canvas.addEventListener('touchend',e=>{ e.preventDefault(); for(let t of e.changedTouches) G.joystick.onTouchEnd(t); G.forceAttack=false; });
    window.addEventListener('resize',()=>{ W=window.innerWidth; H=window.innerHeight; canvas.width=W; canvas.height=H; if(G.joystick) G.joystick.resetBase(); });
  }
  
  setupEvents();
  initGame(false); // başlangıçta boş, menü gösterilecek
  G.state='menu';
  requestAnimationFrame(gameLoop);
})();
</script>

</html>
