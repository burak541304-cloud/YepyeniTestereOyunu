/* ── helpers ─────────────────────────────────────────────── */

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/** Varl\u0131k \u00fczerinde ortalanm\u0131\u015f isim etiketi (d\u00fcnya koordinat\u0131nda). */
function drawEntityNameLabel(ctx, cx, topY, text, opts) {
  opts = opts || {};
  const t = String(text || "").trim() || "?";
  ctx.save();
  ctx.font = opts.font || "bold 8px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  const w = Math.max(ctx.measureText(t).width, 10);
  const h = 11;
  const pad = 3;
  const x = Math.round(cx - w / 2 - pad);
  const y = Math.round(topY);
  ctx.fillStyle = opts.bg || "rgba(8, 10, 22, 0.78)";
  roundRect(ctx, x, y, w + pad * 2, h, 4);
  ctx.fill();
  if (opts.border) {
    ctx.strokeStyle = opts.border;
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w + pad * 2, h, 4);
    ctx.stroke();
  }
  ctx.fillStyle = opts.color || "#e8ecf8";
  ctx.fillText(t, cx, y + 2);
  ctx.restore();
}

const RAGE_BURST_DURATION = 6;
const RAGE_ACTIVATE_MIN = 0.22;
let damageFloaters = [];

function spawnDamageFloater(wx, wy, value, furyHit, colorOverride) {
  damageFloaters.push({
    x: wx,
    y: wy,
    text: String(value),
    life: 0.95,
    vy: -48,
    color: colorOverride || (furyHit ? "#ff4545" : "#ffe078"),
  });
}

function updateDamageFloaters(dt) {
  for (let i = damageFloaters.length - 1; i >= 0; i--) {
    const f = damageFloaters[i];
    f.life -= dt;
    f.y += f.vy * dt;
    f.vy *= Math.pow(0.18, dt);
    if (f.life <= 0) damageFloaters.splice(i, 1);
  }
}

function renderDamageFloaters(ctx) {
  for (const f of damageFloaters) {
    const a = Math.min(1, f.life * 2.2);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = "bold 12px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(0,0,0,0.92)";
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color || "#ffe078";
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

/** Web Audio ile k\u0131sa prosed\u00fcrel SFX; harici dosya yok. U: sessize al, [ ]: g\u00fc\u00e7. */
const gameAudio = (function () {
  const LS = "chopgrow_audio_v1";
  let ctx = null;
  let lastHurt = 0;
  const S = { master: 0.45, muted: false };

  function load() {
    try {
      const raw = localStorage.getItem(LS);
      if (raw) {
        const o = JSON.parse(raw);
        if (typeof o.muted === "boolean") S.muted = o.muted;
        if (typeof o.master === "number") S.master = Math.max(0, Math.min(1, o.master));
      }
    } catch (e) {}
  }

  function save() {
    try { localStorage.setItem(LS, JSON.stringify({ muted: S.muted, master: S.master })); } catch (e) {}
  }

  function amp() { return S.muted ? 0 : S.master; }

  function ensureCtx() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    }
    return ctx;
  }

  function resume() {
    const c = ensureCtx();
    if (c && c.state === "suspended") void c.resume();
  }

  function noiseBurst(duration, volMul) {
    const c = ensureCtx();
    if (!c || amp() <= 0) return;
    const n = Math.max(1, Math.floor(c.sampleRate * duration));
    const buf = c.createBuffer(1, n, c.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < n; i++) ch[i] = (Math.random() * 2 - 1) * 0.4;
    const src = c.createBufferSource();
    src.buffer = buf;
    const g = c.createGain();
    const t = c.currentTime;
    const v = volMul * amp();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(v, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0008, t + duration);
    src.connect(g);
    g.connect(c.destination);
    src.start(t);
    src.stop(t + duration + 0.03);
  }

  function tone(freq, dur, wave, volMul, freqEnd) {
    const c = ensureCtx();
    if (!c || amp() <= 0) return;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = wave || "sine";
    const t = c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (freqEnd != null && freqEnd > 0)
      o.frequency.exponentialRampToValueAtTime(Math.max(30, freqEnd), t + dur);
    const v = volMul * amp();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(v, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.connect(g);
    g.connect(c.destination);
    o.start(t);
    o.stop(t + dur + 0.03);
  }

  return {
    load,
    save,
    resume,
    toggleMute() {
      S.muted = !S.muted;
      save();
      return S.muted;
    },
    nudgeMaster(delta) {
      S.master = Math.max(0, Math.min(1, S.master + delta));
      save();
      return S.master;
    },
    playMelee() {
      noiseBurst(0.08, 0.32);
      tone(150, 0.055, "triangle", 0.18, 85);
    },
    playShoot() {
      tone(1100, 0.045, "square", 0.11, 420);
    },
    playPowerShoot() {
      tone(180, 0.1, "sawtooth", 0.16, 48);
      tone(720, 0.065, "square", 0.075, 220);
    },
    playHurt() {
      const now = performance.now();
      if (now - lastHurt < 140) return;
      lastHurt = now;
      tone(200, 0.085, "sawtooth", 0.2, 65);
    },
    playPickup() {
      tone(620, 0.055, "sine", 0.18);
      tone(880, 0.07, "sine", 0.14);
    },
    playPotion() {
      tone(392, 0.06, "sine", 0.18);
      tone(587, 0.08, "sine", 0.15);
    },
    playLevelUp() {
      const c = ensureCtx();
      if (!c || amp() <= 0) return;
      const notes = [523, 659, 784, 988];
      const t0 = c.currentTime;
      for (let i = 0; i < notes.length; i++) {
        const o = c.createOscillator();
        const g = c.createGain();
        o.type = "sine";
        const start = t0 + i * 0.095;
        const d = 0.095;
        o.frequency.setValueAtTime(notes[i], start);
        const v = 0.13 * amp();
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(v, start + 0.008);
        g.gain.exponentialRampToValueAtTime(0.0008, start + d);
        o.connect(g);
        g.connect(c.destination);
        o.start(start);
        o.stop(start + d + 0.02);
      }
    },
    playKill() {
      tone(95, 0.12, "triangle", 0.19, 38);
      noiseBurst(0.06, 0.15);
    },
    playSkill() {
      tone(320, 0.07, "sine", 0.16, 620);
      tone(480, 0.055, "sine", 0.1, 240);
    },
    playChop() {
      noiseBurst(0.07, 0.28);
      tone(90, 0.04, "triangle", 0.12, 55);
    },
  };
})();

  keys[e.code] = true;
  e.preventDefault();
});

  keys[e.code] = false;
});

function refreshMobileUI() {
  const narrow = Math.min(window.innerWidth, window.innerHeight) <= 1080;
  touchState.mobileUI = window.matchMedia("(pointer: coarse)").matches ||
    (navigator.maxTouchPoints > 0 && narrow);
}

function updateTouchLayout() {
  const ch = window.innerHeight, cw = window.innerWidth;
  const m = Math.min(cw, ch);
  touchState.joyR = Math.min(70, m * 0.1);
  touchState.joyIdleCx = touchState.joyR + 22;
  touchState.joyIdleCy = ch - touchState.joyR - 22;
  if (touchState.joyId < 0) {
    touchState.joyCx = touchState.joyIdleCx;
    touchState.joyCy = touchState.joyIdleCy;
  }
}

/** iksir yerle\u015fimi: joystick bas\u0131l\u0131 de\u011filse sol alt referans. */
function joyAnchorForLayout() {
  if (touchState.joyId >= 0) {
    return { cx: touchState.joyCx, cy: touchState.joyCy, r: touchState.joyR };
  }
  return { cx: touchState.joyIdleCx, cy: touchState.joyIdleCy, r: touchState.joyR };
}

/** Mobil modal pencereler i\u00e7in g\u00fcvenli alan (\u00fcstte \u00d7 \u00e7ipi i\u00e7in bo\u015fluk). */
function uiModalBounds(cw, ch) {
  const mob = touchState.mobileUI;
  const top = mob ? 42 : 28;
  const bottom = mob ? 16 : 22;
  const side = mob ? 8 : 20;
  return {
    top,
    bottom,
    side,
    maxW: Math.max(160, cw - side * 2),
    maxH: Math.max(160, ch - top - bottom),
  };
}

/** Sa\u011f alt MMORPG k\u00fcmeyi: merkez sald\u0131r\u0131 + y\u00f6r\u00fcnge (beceri, HEDEF, POWER). */
function mobileCombatClusterGeom(cw, ch) {
  const isLandscape = cw > ch * 1.05;
  const pad = 6;
  const margin = 5;
  const atkR = isLandscape ? 36 : 32;
  const skillR = isLandscape ? 18 : 16;
  let orbitR = isLandscape ? 66 : 60;
  const auxR = isLandscape ? 16 : 14;
  const swapAng = 0.12;
  if (touchState.mobileUI && cw < 520) {
    orbitR = Math.max(52, Math.round(60 - (520 - cw) * 0.11));
  }
  const rightExtent = Math.cos(swapAng) * orbitR + auxR;
  let centerX = cw - pad - (isLandscape ? 46 : 42);
  const maxCx = cw - margin - rightExtent;
  if (centerX > maxCx) centerX = maxCx;
  const centerY = ch - pad - (isLandscape ? 52 : 48);
  return { centerX, centerY, atkR, skillR, orbitR, auxR, pad };
}

/**
 * Beceri yay\u0131: sol yar\u0131m halka (iksir / HEDEF / POWER alanlar\u0131ndan ayr\u0131).
 * ~158\u00b0 \u2013 256\u00b0
 */
function mobileSkillSlotAngles(count) {
  const n = Math.max(1, count | 0);
  const start = Math.PI * 0.92;
  const end = Math.PI * 1.38;
  if (n === 1) return [(start + end) / 2];
  return Array.from({ length: n }, (_, i) => start + ((end - start) * i) / (n - 1));
}

/** Eski iksir yerle\u015fimi i\u00e7in sald\u0131r\u0131 alan\u0131 (dikd\u00f6rtgen yakla\u015f\u0131m\u0131). */
function mobileAttackButtonRect(cw, ch) {
  const G = mobileCombatClusterGeom(cw, ch);
  const side = G.atkR * 2 + 4;
  return { x: G.centerX - G.atkR - 2, y: G.centerY - G.atkR - 2, w: side, h: side };
}

function mobileButtonsLayout(cw, ch) {
  const G = mobileCombatClusterGeom(cw, ch);
  const isLandscape = cw > ch * 1.05;
  const out = [];
  const side = G.atkR * 2 + 4;
  out.push({ key: "attack", kind: "attack", label: "\u2694", x: G.centerX - G.atkR - 2, y: G.centerY - G.atkR - 2, w: side, h: side, cx: G.centerX, cy: G.centerY, r: G.atkR });
  const skillCount = ACTIVE_SKILL_DEFS.length;
  const ang = mobileSkillSlotAngles(skillCount);
  for (let i = 0; i < skillCount; i++) {
    const slot = i;
    const a = ang[i];
    const cx = G.centerX + Math.cos(a) * G.orbitR;
    const cy = G.centerY + Math.sin(a) * G.orbitR;
    out.push({
      key: "skill" + slot,
      kind: "skill",
      skillSlot: slot,
      label: ACTIVE_SKILL_DEFS[slot] ? ACTIVE_SKILL_DEFS[slot].icon : "?",
      x: cx - G.skillR,
      y: cy - G.skillR,
      w: G.skillR * 2,
      h: G.skillR * 2,
      cx, cy, r: G.skillR,
    });
  }
  const auxR = G.auxR;
  let pcx, pcy;
  if (isLandscape) {
    pcx = G.centerX - G.atkR - auxR - 14;
    pcy = G.centerY - G.atkR - auxR - 6;
  } else {
    pcx = G.centerX;
    pcy = G.centerY - G.atkR - auxR - 14;
  }
  out.push({
    key: MOBILE_POWER_BUTTON_KEY,
    kind: "power",
    label: "PW",
    cx: pcx, cy: pcy, r: auxR,
    x: pcx - auxR, y: pcy - auxR, w: auxR * 2, h: auxR * 2,
  });
  const topY = 4;
  const topH = 30;
  const menuItems = [
    { key: "KeyI", label: "\u00c7anta" },
    { key: "KeyC", label: "K" },
    { key: "KeyM", label: "H" },
    { key: "KeyT", label: "\u015eehir" },
  ];
  if (touchState.mobileUI) {
    const menuH = isLandscape ? 30 : 28;
    const menuW = isLandscape ? 54 : 50;
    const menuGap = 6;
    const rowW = menuItems.length * menuW + (menuItems.length - 1) * menuGap;
    let gx = Math.round(G.centerX - G.atkR - 16 - rowW);
    let gy = Math.round(ch - menuH - 10);
    if (gx < 8) gx = 8;
    if (gy < 8) gy = 8;
    if (gy + menuH > ch - 4) gy = ch - 4 - menuH;
    for (let i = 0; i < menuItems.length; i++) {
      const m = menuItems[i];
      const x = gx + i * (menuW + menuGap);
      out.push({ key: m.key, kind: "menu", label: m.label, x, y: gy, w: menuW, h: menuH });
    }
  } else {
    const tw = 44;
    const totalW = menuItems.length * tw + (menuItems.length - 1) * 4;
    let tx = Math.floor((cw - totalW) / 2);
    for (const m of menuItems) {
      out.push({ key: m.key, kind: "menu", label: m.label, x: tx, y: topY, w: tw, h: topH });
      tx += tw + 4;
    }
  }
  return out;
}

function hitMobileButton(mx, my, cw, ch) {
  if (!touchState.mobileUI) return null;
  const G = mobileCombatClusterGeom(cw, ch);
  for (const b of mobileButtonsLayout(cw, ch)) {
    if (b.kind === "attack") {
      const dx = mx - G.centerX, dy = my - G.centerY;
      if (dx * dx + dy * dy <= G.atkR * G.atkR) return b;
      continue;
    }
    if (b.kind === "skill" || b.kind === "power") {
      const dx = mx - b.cx, dy = my - b.cy;
      if (dx * dx + dy * dy <= b.r * b.r) return b;
      continue;
    }
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return b;
  }
  return null;
}

function hitMobileCloseChip(mx, my, cw) {
  return mx >= cw - 52 && mx <= cw - 4 && my >= 6 && my <= 50;
}

function pulseJust(code) {
  justPressed[code] = true;
}

function getMovementVector() {
  let dx = 0, dy = 0;
  if (isDown("ArrowUp")    || isDown("KeyW")) dy -= 1;
  if (isDown("ArrowDown")  || isDown("KeyS")) dy += 1;
  if (isDown("ArrowLeft")  || isDown("KeyA")) dx -= 1;
  if (isDown("ArrowRight") || isDown("KeyD")) dx += 1;
  if (touchState.mobileUI && touchState.joyId >= 0) {
    dx += touchState.joyDx;
    dy += touchState.joyDy;
  }
  const len = Math.hypot(dx, dy);
  if (len > 1.0001) { dx /= len; dy /= len; }
  return { dx, dy };
}

function isActionPressed() { return isDown("KeyE") || isDown("Space"); }

const WORLD_ZOOM_STEPS = [0.86, 1.0, 1.2, 1.34];
const WORLD_ZOOM_MIN = WORLD_ZOOM_STEPS[0];
const WORLD_ZOOM_MAX = WORLD_ZOOM_STEPS[WORLD_ZOOM_STEPS.length - 1];
const WORLD_ZOOM_NEAR = WORLD_ZOOM_STEPS[2];
let worldZoom = WORLD_ZOOM_MIN;

function clampWorldZoom(z) {
  return Math.max(WORLD_ZOOM_MIN, Math.min(WORLD_ZOOM_MAX, z));
}

function setWorldZoom(z) {
  worldZoom = clampWorldZoom(z);
  if (typeof camera !== "undefined" && camera && typeof canvasW !== "undefined" && typeof canvasH !== "undefined") {
    camera.resize(canvasW / worldZoom, canvasH / worldZoom);
  }
}

function toggleWorldZoom() {
  let bestI = 0;
  let bestD = 1e9;
  for (let i = 0; i < WORLD_ZOOM_STEPS.length; i++) {
    const d = Math.abs(worldZoom - WORLD_ZOOM_STEPS[i]);
    if (d < bestD) { bestD = d; bestI = i; }
  }
  const nextI = (bestI + 1) % WORLD_ZOOM_STEPS.length;
  setWorldZoom(WORLD_ZOOM_STEPS[nextI]);
  pickupMsgText = "Zoom " + (nextI + 1) + "/" + WORLD_ZOOM_STEPS.length;
  pickupMsgTimer = 0.9;
}

function screenToWorld(sx, sy) {
  return {
    x: camera.x + sx / Math.max(0.01, worldZoom),
    y: camera.y + sy / Math.max(0.01, worldZoom),
  };
}

function cloneScaledNumericMap(src, mul) {
  if (!src || typeof src !== "object") return src || {};
  const out = {};
  for (const k of Object.keys(src)) {
    const v = src[k];
    out[k] = (typeof v === "number") ? Math.max(1, Math.round(v * mul)) : v;
  }
  return out;
}

function ensureLegendaryForAllEquipments() {
  const ids = Object.keys(ITEMS);
  for (const id of ids) {
    const def = ITEMS[id];
    if (!def || !def.equipSlot) continue;
    if (def.rarity === "legendary") continue;
    const lid = id + "_legendary";
    if (ITEMS[lid]) continue;

    const niceName = /efsane/i.test(def.name || "") ? def.name : ("Efsanevi " + (def.name || id));
    ITEMS[lid] = {
      ...def,
      id: lid,
      name: niceName,
      rarity: "legendary",
      minLevel: Math.max(1, estimateEquipRequiredLevel(def) + 10),
      stats: cloneScaledNumericMap(def.stats || {}, 1.45),
      advanced: cloneScaledNumericMap(def.advanced || {}, 1.35),
      sellPrice: Math.max((def.sellPrice | 0), Math.round((def.sellPrice | 0) * 3.2), 120),
      buyPrice: 0,
      desc: (def.desc ? (def.desc + " ") : "") + "Efsanevi gucle guclendirilmis versiyon.",
    };
  }
}

ensureLegendaryForAllEquipments();

const RARITY_COLOR = {
  common: "#9aa0b0",
  rare: "#4a9fff",
  epic: "#c060ff",
  legendary: "#ffc040",
};

function getItemRarityColor(itemId) {
  const d = ITEMS[itemId];
  return d && d.rarity ? RARITY_COLOR[d.rarity] || "#ccc" : "#ccc";
}

const RARITY_LABEL_TR = {
  common: "S\u0131radan",
  rare: "Nadir",
  epic: "Epik",
  legendary: "Efsanevi",
};

function rarityRank(r) {
  if (r === "legendary") return 4;
  if (r === "epic") return 3;
  if (r === "rare") return 2;
  if (r === "common") return 1;
  return 0;
}

function estimateEquipRequiredLevel(def) {
  if (!def || !def.equipSlot) return 1;
  if (def.minLevel != null) return Math.max(1, def.minLevel | 0);
  const rr = rarityRank(def.rarity || "common");
  const score = itemStatPowerScore(def);
  const slotBase = (def.equipSlot === "blade" || def.equipSlot === "bow") ? 2 : 1;
  let lv = slotBase + rr * 4 + Math.floor(score / 14);
  if (rr >= 4) lv += 6;
  else if (rr >= 3) lv += 2;
  return Math.max(1, Math.min(70, lv));
}

function canPlayerEquipItem(def, playerRef) {
  if (!def || !def.equipSlot) return { ok: true, needLevel: 1 };
  const needLevel = estimateEquipRequiredLevel(def);
  const pLv = playerRef && playerRef.level ? (playerRef.level | 0) : 1;
  return { ok: pLv >= needLevel, needLevel };
}

function normalizeBonusPct(v) {
  if (v == null) return 0;
  if (Array.isArray(v)) return v.reduce((a, b) => a + (b | 0), 0);
  return v | 0;
}

function aggregateEquipmentExtras(inv) {
  const out = {
    bonusPctDmg: 0, firePct: 0, icePct: 0, poisonPct: 0,
    critChance: 0, critDamagePct: 0,
    backstabCrit: false,
    lowHpRules: [],
  };
  if (!inv || !inv.equipped) return out;
  const eqKeys = EQ_SLOTS;
  for (const sk of eqKeys) {
    const es = inv.equipped[sk];
    if (!es || !ITEMS[es.id]) continue;
    const ex = ITEMS[es.id].extras;
    if (!ex) continue;
    const uv = getStackUpgradeLv(es);
    const ux = 1 + uv * 0.038;
    out.bonusPctDmg += Math.round(normalizeBonusPct(ex.bonusPctDmg) * ux);
    out.firePct += Math.round((ex.firePct | 0) * ux);
    out.icePct += Math.round((ex.icePct | 0) * ux);
    out.poisonPct += Math.round((ex.poisonPct | 0) * ux);
    out.critChance += Math.round((ex.critChance | 0) * (1 + uv * 0.04));
    out.critDamagePct += Math.round((ex.critDamagePct | 0) * (1 + uv * 0.035));
    if (ex.backstabCrit) out.backstabCrit = true;
    if (ex.passives) {
      for (const p of ex.passives) {
        const t = typeof p === "string" ? p : p.text;
        if (t && /arkad|arkadan|behind|backstab/i.test(t)) out.backstabCrit = true;
      }
    }
    if (ex.special && ex.special.hpBelow > 0 && ex.special.dmgBonus != null) {
      out.lowHpRules.push({ below: ex.special.hpBelow, bonus: ex.special.dmgBonus });
    }
  }
  return out;
}

function isPlayerBehindMonster(player, monster) {
  if (!player || !monster) return false;
  const dx = player.centerX - monster.cx;
  const dy = player.centerY - monster.cy;
  const len = Math.hypot(dx, dy);
  if (len < 6) return false;
  const nx = dx / len, ny = dy / len;
  let fx = 0, fy = 0;
  const md = monster.direction;
  if (md === 0) { fx = 0; fy = 1; }
  else if (md === 3) { fx = 0; fy = -1; }
  else if (md === 2) { fx = 1; fy = 0; }
  else { fx = -1; fy = 0; }
  return nx * fx + ny * fy < -0.38;
}

function applyOutgoingPlayerDamage(baseDmg, player, inventory, opts) {
  opts = opts || {};
  const agg = aggregateEquipmentExtras(inventory);
  const atkPowerFloor = getEquipmentAttackPowerTotal(inventory);
  let d = baseDmg * (1 + agg.bonusPctDmg / 100) * (1 + (agg.firePct + agg.icePct + agg.poisonPct) / 100);
  if (atkPowerFloor > 0) d = Math.max(d, atkPowerFloor);
  const hpRat = player.maxHp > 0 ? player.hp / player.maxHp : 1;
  let lowExtra = 0;
  for (const r of agg.lowHpRules) {
    if (hpRat < r.below) lowExtra = Math.max(lowExtra, r.bonus);
  }
  if (lowExtra > 0) d *= 1 + lowExtra;
  const backstab = !!(opts.monster && agg.backstabCrit && isPlayerBehindMonster(player, opts.monster));
  const critRoll = Math.random() * 100 < Math.min(85, agg.critChance);
  const crit = critRoll || backstab;
  if (crit) {
    const mult = 1.5 + (agg.critDamagePct / 100);
    d *= mult;
  }
  if (opts.armorPiercePct > 0) {
    const p = Math.min(90, opts.armorPiercePct | 0);
    d *= 1 + (p / 100) * 0.42;
  }
  if (player.rageBurstTimer > 0) d *= 3;
  return Math.max(1, Math.floor(d));
}

function itemStatPowerScore(def) {
  if (!def) return 0;
  let s = 0;
  if (def.stats) {
    const st = def.stats;
    s += (st.str || 0) * 1.1 + (st.agi || 0) * 1.1 + (st.wis || 0) * 1.1 +
      (st.maxHp || 0) / 5 + (st.maxMana || 0) / 4 +
      (st.meleeDmg || 0) * 2.2 + (st.rangedDmg || 0) * 2.2;
  }
  if (def.extras) {
    const ex = def.extras;
    s += normalizeBonusPct(ex.bonusPctDmg) * 0.32;
    s += (ex.critChance || 0) * 0.07;
    s += (ex.critDamagePct || 0) * 0.06;
    s += (ex.firePct || 0) * 0.05 + (ex.icePct || 0) * 0.05 + (ex.poisonPct || 0) * 0.05;
    if (ex.special && ex.special.dmgBonus > 0) s += ex.special.dmgBonus * 20;
    if (ex.backstabCrit) s += 12;
    s += (ex.displayBaseDmg || 0) * 0.04;
  }
  return s;
}

function getStackUpgradeLv(s) {
  if (!s || s.upgrade == null) return 0;
  const u = s.upgrade | 0;
  return u > 0 ? u : 0;
}

function getAxeDurabilityMax(stackOrId) {
  const itemId = typeof stackOrId === "string" ? stackOrId : (stackOrId && stackOrId.id);
  const def = ITEMS[itemId];
  if (!def) return 0;
  const fromAdvanced = def.advanced && (def.advanced.durabilityMax | 0);
  const fromStats = def.stats && (def.stats.repairHp | 0);
  const v = Math.max(fromAdvanced || 0, fromStats || 0);
  return v > 0 ? v : 0;
}

function ensureStackAxeDurability(s) {
  if (!s || s.id !== "axe") return s;
  const mx = getAxeDurabilityMax(s);
  if (mx <= 0) return s;
  if (!(s.durability > 0)) s.durability = mx;
  if (s.durability > mx) s.durability = mx;
  return s;
}

function copyStackMetaTo(target, src) {
  if (!target) return target;
  if (!src) return ensureStackAxeDurability(target);
  const u = getStackUpgradeLv(src);
  if (u > 0) target.upgrade = u;
  if (target.id === "axe") {
    const mx = getAxeDurabilityMax(target);
    const d = src.durability | 0;
    target.durability = d > 0 ? Math.min(d, mx || d) : (mx > 0 ? mx : 0);
  }
  return ensureStackAxeDurability(target);
}

function itemCanUpgrade(def) {
  return !!(def && def.equipSlot && def.rarity && def.rarity !== "common");
}

function upgradeGoldCost(def, currentLv) {
  const rr = rarityRank(def.rarity || "common");
  return Math.max(8, Math.floor(20 * Math.pow(1.82, currentLv) * (0.65 + rr * 0.38)));
}

const MAX_ITEM_UPGRADE = 10;

function upgradeSuccessPct(currentLv) {
  if (currentLv >= MAX_ITEM_UPGRADE) return 0;
  return Math.max(0.07, 0.9 - currentLv * 0.062);
}

function formatGold(n) {
  try {
    return (n | 0).toLocaleString("tr-TR");
  } catch (e) {
    return String(n | 0);
  }
}

function stackUpgradesMatch(a, b) {
  return (getStackUpgradeLv(a || {}) | 0) === (getStackUpgradeLv(b || {}) | 0);
}

function getEffectiveItemStatsMerged(def, upgradeLv) {
  const deriveDefaultPercentBonuses = () => {
    if (!def || !def.equipSlot) return {};
    const rr = rarityRank(def.rarity || "common");
    const out = {};
    const slot = def.equipSlot;
    const base = Math.max(0, rr - 1);
    if (base <= 0) return out;

    /* Slot odaklı daha keskin RPG dağılımı */
    const add = (k, v) => { out[k] = Math.max(out[k] || 0, Math.round(v)); };
    const main = 2 + base * 3.4;
    const side = 1 + base * 1.75;
    const rareLift = rr >= 4 ? 1.18 : rr >= 3 ? 1.08 : 1;

    if (slot === "blade") {
      add("pctStr", main * 1.2 * rareLift);
      add("pctHp", side * 0.9);
    } else if (slot === "bow") {
      add("pctAgi", main * 1.2 * rareLift);
      add("pctStr", side * 0.45);
    } else if (slot === "feet") {
      add("pctAgi", main * 1.02 * rareLift);
      add("pctHp", side * 0.55);
    } else if (slot === "wings") {
      add("pctAgi", main * 1.08 * rareLift);
      add("pctMana", side * 1.0);
    } else if (slot === "amulet") {
      add("pctWis", main * 1.22 * rareLift);
      add("pctMana", main * 1.06);
      add("pctStr", side * 0.35);
    } else if (slot === "ring") {
      add("pctWis", main * 0.95 * rareLift);
      add("pctMana", side * 0.95);
      add("pctStr", side * 0.55);
      add("pctAgi", side * 0.55);
    } else if (slot === "chest") {
      add("pctHp", main * 1.25 * rareLift);
      add("pctStr", side * 0.6);
    } else if (slot === "waist") {
      add("pctHp", main * 1.06 * rareLift);
      add("pctStr", side * 0.72);
    } else if (slot === "arms") {
      add("pctStr", main * 0.88 * rareLift);
      add("pctAgi", side * 0.88);
    } else if (slot === "head") {
      add("pctWis", main * 0.78 * rareLift);
      add("pctHp", side * 0.82);
    }

    /* Eşyanın kendi stat profiline göre küçük dengeleme */
    const st = def.stats || {};
    if (st.maxHp) add("pctHp", out.pctHp ? out.pctHp + Math.max(1, base * 0.5) : base * 1.2);
    if (st.maxMana) add("pctMana", out.pctMana ? out.pctMana + Math.max(1, base * 0.5) : base * 1.2);
    if (st.str) add("pctStr", out.pctStr ? out.pctStr + Math.max(1, base * 0.35) : base);
    if (st.agi) add("pctAgi", out.pctAgi ? out.pctAgi + Math.max(1, base * 0.35) : base);
    if (st.wis) add("pctWis", out.pctWis ? out.pctWis + Math.max(1, base * 0.35) : base);

    return out;
  };

  const stats = {};
  if (def.stats) {
    for (const k of Object.keys(def.stats)) stats[k] = def.stats[k];
  }
  if (def.equipSlot) {
    const rr = rarityRank(def.rarity || "common");
    const dmgMul = rr >= 4 ? 2.2 : rr >= 3 ? 1.7 : rr >= 2 ? 1.35 : 1;
    const hpMul = rr >= 4 ? 1.35 : rr >= 3 ? 1.2 : rr >= 2 ? 1.08 : 1;
    if (typeof stats.meleeDmg === "number" && stats.meleeDmg > 0) stats.meleeDmg = Math.max(1, Math.round(stats.meleeDmg * dmgMul));
    if (typeof stats.rangedDmg === "number" && stats.rangedDmg > 0) stats.rangedDmg = Math.max(1, Math.round(stats.rangedDmg * dmgMul));
    if (typeof stats.maxHp === "number" && stats.maxHp > 0) stats.maxHp = Math.max(1, Math.round(stats.maxHp * hpMul));
    if (def.equipSlot === "bow" && typeof stats.rangedDmg === "number") stats.rangedDmg = Math.min(500, stats.rangedDmg);
  }
  const advanced = {};
  if (def.advanced) {
    for (const k of Object.keys(def.advanced)) advanced[k] = def.advanced[k];
  }
  const autoPct = deriveDefaultPercentBonuses();
  for (const k of Object.keys(autoPct)) {
    if (advanced[k] == null) advanced[k] = autoPct[k];
  }
  const u = upgradeLv | 0;
  if (u > 0) {
    const sc = 1 + u * 0.072;
    for (const k of Object.keys(stats)) {
      const v = stats[k];
      if (typeof v === "number" && v) {
        stats[k] = v > 0
          ? Math.round(v * sc + u * (k.indexOf("Dmg") >= 0 ? 0.85 : 0.28))
          : Math.round(v * (1 + u * 0.018));
      }
    }
    for (const k of Object.keys(advanced)) {
      const v = advanced[k];
      if (typeof v === "number" && v > 0) advanced[k] = Math.round(v * sc + u * 0.55);
      else if (typeof v === "number" && v < 0) advanced[k] = Math.round(v * (1 + u * 0.014));
    }
  }
  if (def.equipSlot && (advanced.attackPower == null || advanced.attackPower <= 0)) {
    const melee = Math.max(0, stats.meleeDmg || 0);
    const ranged = Math.max(0, stats.rangedDmg || 0);
    const str = Math.max(0, stats.str || 0);
    const agi = Math.max(0, stats.agi || 0);
    const wis = Math.max(0, stats.wis || 0);
    const hp = Math.max(0, stats.maxHp || 0);
    const mp = Math.max(0, stats.maxMana || 0);
    let ap = melee * 6 + ranged * 6 + str * 2.1 + agi * 1.7 + wis * 1.35 + hp / 14 + mp / 8;
    if (def.equipSlot === "blade" || def.equipSlot === "bow") ap *= 1.22;
    else ap *= 0.7;
    advanced.attackPower = Math.max(1, Math.round(ap));
  }
  return { stats, advanced };
}

function sumEquipmentEffective(inv) {
  const st = { str: 0, agi: 0, wis: 0, maxHp: 0, maxMana: 0, meleeDmg: 0, rangedDmg: 0 };
  const adv = {};
  if (!inv || !inv.equipped) return { stats: st, advanced: adv };
  const eqKeys = EQ_SLOTS;
  for (let i = 0; i < eqKeys.length; i++) {
    const sk = eqKeys[i];
    const es = inv.equipped[sk];
    if (!es) continue;
    const d = ITEMS[es.id];
    if (!d) continue;
    const m = getEffectiveItemStatsMerged(d, getStackUpgradeLv(es));
    for (const k of Object.keys(m.stats)) st[k] = (st[k] || 0) + (m.stats[k] || 0);
    for (const k of Object.keys(m.advanced)) adv[k] = (adv[k] || 0) + (m.advanced[k] || 0);
  }
  return { stats: st, advanced: adv };
}

function getEquipmentAttackPowerTotal(inv) {
  const s = sumEquipmentEffective(inv);
  return Math.max(0, Math.floor((s.advanced && s.advanced.attackPower) || 0));
}

function getItemWeightDef(def) {
  if (!def) return 0;
  if (def.weight != null) return def.weight;
  if (def.equipSlot) return def.equipSlot === "blade" || def.equipSlot === "bow" ? 10 : 6;
  return def.stackable ? 0.4 : 2;
}

function inventoryTotalWeight(inv) {
  if (!inv) return 0;
  let w = 0;
  const addSlot = (s) => {
    if (!s) return;
    const d = ITEMS[s.id];
    w += getItemWeightDef(d) * Math.max(1, s.count | 0);
  };
  for (const s of inv.slots) addSlot(s);
  for (const s of inv.hotbar) addSlot(s);
  for (const sk of EQ_SLOTS) addSlot(inv.equipped[sk]);
  return Math.round(w * 10) / 10;
}

function collectEffectiveStatLines(def, upgradeLv) {
  const m = getEffectiveItemStatsMerged(def, upgradeLv | 0);
  const lines = [];
  const st = m.stats;
  if (st.str) lines.push({ text: "G\u00fc\u00e7 +" + st.str, neg: false });
  if (st.agi) lines.push({ text: "\u00c7eviklik +" + st.agi, neg: false });
  if (st.wis) lines.push({ text: "Bilgelik +" + st.wis, neg: false });
  if (st.maxHp != null && st.maxHp !== 0) lines.push({ text: "Max Can " + (st.maxHp > 0 ? "+" : "") + st.maxHp, neg: st.maxHp < 0 });
  if (st.maxMana != null && st.maxMana !== 0) lines.push({ text: "Max Mana " + (st.maxMana > 0 ? "+" : "") + st.maxMana, neg: st.maxMana < 0 });
  if (st.meleeDmg) lines.push({ text: "Yak\u0131n g\u00fc\u00e7 +" + st.meleeDmg, neg: false });
  if (st.rangedDmg) lines.push({ text: "Uzak g\u00fc\u00e7 +" + st.rangedDmg, neg: false });
  const adv = m.advanced;
  const advLabels = {
    defense: "Savunma",
    resFire: "Ate\u015f direnci",
    resGlacier: "Buz direnci",
    resLightning: "\u015eim\u015fek direnci",
    resMagic: "B\u00fcy\u00fc direnci",
    resPoison: "Zehir direnci",
    resCurse: "Lanet direnci",
    defDagger: "Han\u00e7er savunmas\u0131",
    defSword: "K\u0131l\u0131\u00e7 savunmas\u0131",
    defClub: "G\u00fc\u00e7l\u00fc darbe sav.",
    defSpear: "M\u0131zrak savunmas\u0131",
    defArrow: "Ok savunmas\u0131",
    attackPower: "Attack Power",
    durabilityMax: "Max dayan\u0131kl\u0131l\u0131k",
  };
  const advColor = {
    attackPower: "#f4f4ff",
    defense: "#7cc8ff",
    resFire: "#ff9d5c",
    resGlacier: "#8ed8ff",
    resLightning: "#e8b0ff",
    resMagic: "#b8b8ff",
    resPoison: "#93e07e",
    resCurse: "#b58cff",
    defDagger: "#a0d0ff",
    defSword: "#a0d0ff",
    defClub: "#a0d0ff",
    defSpear: "#a0d0ff",
    defArrow: "#a0d0ff",
    durabilityMax: "#d8d8e8",
  };
  for (const k of Object.keys(advLabels)) {
    const v = adv[k];
    if (v != null && v !== 0) {
      lines.push({
        text: advLabels[k] + ": " + (v > 0 ? "+" : "") + v,
        neg: v < 0,
        color: advColor[k] || (v < 0 ? "#ff7070" : "#8ae0a8"),
      });
    }
  }
  const pctRows = [
    ["pctStr", "G\u00fc\u00e7 %"],
    ["pctAgi", "\u00c7eviklik %"],
    ["pctWis", "Bilgelik %"],
    ["pctHp", "Max Can %"],
    ["pctMana", "Max Mana %"],
  ];
  for (const [k, lbl] of pctRows) {
    const v = adv[k];
    if (v != null && v !== 0) {
      lines.push({
        text: lbl + ": " + (v > 0 ? "+" : "") + v,
        neg: v < 0,
        color: v > 0 ? "#ffd480" : "#ff8080",
      });
    }
  }
  const elemLabels = {
    elemPoison: "Zehir hasar\u0131",
    elemFlame: "Ate\u015f hasar\u0131",
    elemGlacier: "Buz hasar\u0131",
    elemLightning: "\u015eim\u015fek hasar\u0131",
  };
  for (const k of Object.keys(elemLabels)) {
    const v = adv[k];
    if (v != null && v !== 0) {
      const col = k === "elemFlame" ? "#ff9d5c" : k === "elemGlacier" ? "#7fd8ff" : k === "elemLightning" ? "#d39cff" : "#8be27a";
      lines.push({ text: elemLabels[k] + ": " + v, neg: false, color: col });
    }
  }
  return lines;
}

/** Envanter sol s\u00fctun: KO tarz\u0131 basit karakter \u00f6nizlemesi (2D ka\u011f\u0131t bebek). */
function drawInventoryCharacterPreview(ctx, inv, x, y, w, h) {
  if (!player || typeof player._appearanceFromEquipment !== "function") return;
  const vis = player._appearanceFromEquipment(inv);
  const S = vis.shirt;
  const cx = x + w / 2;
  const cy = y + h / 2;
  ctx.save();
  const g = ctx.createLinearGradient(x, y, x + w, y + h);
  g.addColorStop(0, "rgba(12,14,28,0.92)");
  g.addColorStop(1, "rgba(6,8,18,0.96)");
  ctx.fillStyle = g;
  roundRect(ctx, x, y, w, h, 7);
  ctx.fill();
  ctx.strokeStyle = "rgba(120,100,70,0.85)";
  ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 7);
  ctx.stroke();

  ctx.fillStyle = S.pants;
  ctx.fillRect(cx - w * 0.17, cy + h * 0.12, w * 0.15, h * 0.24);
  ctx.fillRect(cx + w * 0.02, cy + h * 0.12, w * 0.15, h * 0.24);

  ctx.fillStyle = S.main;
  ctx.fillRect(cx - w * 0.19, cy - h * 0.1, w * 0.38, h * 0.26);
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.strokeRect(cx - w * 0.19, cy - h * 0.1, w * 0.38, h * 0.26);

  ctx.fillStyle = S.skin;
  ctx.beginPath();
  ctx.arc(cx, cy - h * 0.24, w * 0.13, 0, Math.PI * 2);
  ctx.fill();

  if (vis.helmId) {
    ctx.fillStyle = vis.helmId === "helm_legendary" ? "#3a2818" : "#707888";
    ctx.fillRect(cx - w * 0.16, cy - h * 0.36, w * 0.32, h * 0.1);
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.strokeRect(cx - w * 0.16, cy - h * 0.36, w * 0.32, h * 0.1);
  } else {
    ctx.save();
    ctx.translate(cx, cy);
    player._drawBareHair(ctx, DIR.DOWN, 0);
    ctx.restore();
  }

  if (vis.showFantasyBack) {
    ctx.fillStyle = "rgba(255,100,160,0.22)";
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.38, cy - h * 0.02, w * 0.14, h * 0.22, -0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.38, cy - h * 0.02, w * 0.14, h * 0.22, 0.35, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function hexToRgba(hex, a) {
  const m = /^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i.exec(hex);
  if (!m) return "rgba(200,200,220," + a + ")";
  return "rgba(" + parseInt(m[1], 16) + "," + parseInt(m[2], 16) + "," + parseInt(m[3], 16) + "," + a + ")";
}

function drawItemSlotInnerDepth(ctx, x, y, size) {
  const r = Math.min(6, size * 0.18);
  const g = ctx.createLinearGradient(x, y, x + size, y + size);
  g.addColorStop(0, "rgba(255,255,255,0.1)");
  g.addColorStop(0.42, "rgba(0,0,0,0.05)");
  g.addColorStop(1, "rgba(0,0,0,0.18)");
  ctx.fillStyle = g;
  roundRect(ctx, x + 0.5, y + 0.5, size - 1, size - 1, r);
  ctx.fill();
}

function drawItemRarityUnderGlow(ctx, x, y, size, itemId, timeMs, boost) {
  const def = ITEMS[itemId];
  if (!def || !def.rarity || def.rarity === "common") return;
  const col = getItemRarityColor(itemId);
  const rr = rarityRank(def.rarity);
  const pw = itemStatPowerScore(def);
  const b = (boost || 1) * (0.88 + Math.min(0.4, pw / 85));
  const cx = x + size / 2, cy = y + size / 2;
  const pulse = 0.72 + 0.28 * Math.sin(timeMs * (0.0026 + rr * 0.001));
  const layers = rr >= 4 ? 4 : rr >= 3 ? 3 : rr >= 2 ? 2 : 1;
  ctx.save();
  for (let i = 0; i < layers; i++) {
    const radius = size * (0.34 + i * 0.1) + Math.sin(timeMs * 0.0028 + i * 0.8) * (rr >= 3 ? 2.5 : 0);
    const alpha = b * pulse * (0.26 / (i + 1)) * (1 + Math.min(0.45, pw / 95));
    const grad = ctx.createRadialGradient(cx, cy, size * 0.06, cx, cy, radius);
    grad.addColorStop(0, hexToRgba(col, alpha * 0.95));
    grad.addColorStop(0.52, hexToRgba(col, alpha * 0.38));
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawItemRarityBorderShine(ctx, x, y, size, itemId, timeMs, boost) {
  const def = ITEMS[itemId];
  if (!def || !def.rarity || def.rarity === "common") return;
  const col = getItemRarityColor(itemId);
  const rr = rarityRank(def.rarity);
  const pw = itemStatPowerScore(def);
  const pulse = 0.82 + 0.18 * Math.sin(timeMs * (0.0038 + rr * 0.0011));
  const pwBoost = Math.min(6, pw / 8);
  ctx.save();
  ctx.strokeStyle = col;
  ctx.globalAlpha = Math.min(0.95, (0.5 + rr * 0.11 + pw / 100) * pulse * (boost || 1));
  ctx.lineWidth = Math.min(3.5, 1.2 + (rr - 1) * 0.55 + pwBoost * 0.12);
  roundRect(ctx, x + 0.5, y + 0.5, size - 1, size - 1, Math.min(6, size * 0.2));
  ctx.stroke();
  if (rr >= 3) {
    ctx.globalAlpha *= 0.55;
    ctx.lineWidth = 1.1;
    const off = 2.2 + Math.sin(timeMs * 0.0048) * 1.1;
    ctx.strokeStyle = rr >= 4 ? "rgba(255,248,200,0.95)" : "rgba(232,208,255,0.9)";
    roundRect(ctx, x + off, y + off, size - off * 2, size - off * 2, Math.min(5, size * 0.16));
    ctx.stroke();
  }
  if (rr >= 4) {
    const sparkR = 1 + Math.min(2, pw / 35);
    for (let k = 0; k < 5; k++) {
      const ang = timeMs * 0.0016 + k * (Math.PI * 2 / 5);
      const px = x + size / 2 + Math.cos(ang) * size * 0.41;
      const py = y + size / 2 + Math.sin(ang) * size * 0.41;
      ctx.globalAlpha = 0.5 * pulse * (boost || 1);
      ctx.fillStyle = "#fff8c8";
      ctx.beginPath(); ctx.arc(px, py, sparkR, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

/**
 * @param {object} opts equipped: ekipman slotu; loot: yerdeki d\u00fc\u015f\u00fck; timeMs: animasyon faz\u0131
 */
function drawItemIconFancy(ctx, itemId, x, y, size, opts) {
  opts = opts || {};
  const t = opts.timeMs != null ? opts.timeMs : performance.now();
  let boost = 1;
  if (opts.equipped) boost = 1.45;
  else if (opts.drag) boost = 1.22;
  else if (opts.loot) boost = 0.82;
  else if (opts.floorDrop) boost = 1.05;
  if (!opts.floorDrop) drawItemSlotInnerDepth(ctx, x, y, size);
  drawItemRarityUnderGlow(ctx, x, y, size, itemId, t, boost);
  const pad = Math.max(1, Math.floor(size * 0.07));
  const isz = Math.max(4, size - pad * 2);
  drawItemIcon(ctx, itemId, x + pad, y + pad, isz);
  drawItemRarityBorderShine(ctx, x, y, size, itemId, t, boost);
}

function collectItemStatParts(def) {
  const st = def && def.stats;
  if (!st) return [];
  const parts = [];
  if (st.str) parts.push("G\u00fc\u00e7 +" + st.str);
  if (st.agi) parts.push("\u00c7ev +" + st.agi);
  if (st.wis) parts.push("Bil +" + st.wis);
  if (st.maxHp) parts.push("Max HP +" + st.maxHp);
  if (st.maxMana) parts.push("Max MP +" + st.maxMana);
  if (st.meleeDmg) parts.push("Yak\u0131n hasar +" + st.meleeDmg);
  if (st.rangedDmg) parts.push("Uzak hasar +" + st.rangedDmg);
  return parts;
}

/** Tooltip: seviye, temel hasar, kritik, zay\u0131fl\u0131k, pasif, y\u00fczde bonuslar, \u00f6zel kutu. */
function appendItemExtraTooltipLines(def, fonts, measurePush, pushWrapped, upgradeLv) {
  const ex = def && def.extras;
  if (!ex) return;
  const up = Math.max(0, upgradeLv | 0);
  if (ex.itemLevel) {
    const baseCur = Math.max(1, (ex.itemLevel.cur | 0) || 1);
    const lvlMax = Math.max(baseCur, (ex.itemLevel.max | 0) || 40);
    const shownCur = Math.min(lvlMax, up > 0 ? Math.max(baseCur, up) : baseCur);
    measurePush(fonts.meta, "#e8ecf8", "Seviye " + shownCur + "/" + lvlMax);
  }
  if (ex.displayBaseDmg != null) {
    const baseDmg = Math.max(0, ex.displayBaseDmg | 0);
    const baseCur = ex.itemLevel ? Math.max(1, (ex.itemLevel.cur | 0) || 1) : 1;
    const gainLv = Math.max(0, up - baseCur);
    const scaledBaseDmg = baseDmg + gainLv * 6;
    measurePush(fonts.stat, "#f4f4ff", "\u2694 Temel hasar: " + scaledBaseDmg);
  }
  if (ex.critChance != null) {
    measurePush(fonts.stat, "#ffd080", "Kritik \u015fans: %" + ex.critChance);
  }
  if (ex.critDamagePct != null) {
    measurePush(fonts.stat, "#ffd080", "Kritik hasar: +" + ex.critDamagePct + "%");
  }
  if (ex.weakTo && ex.weakTo.length) {
    const parts = ex.weakTo.map((w) => w.label || w.kind || "").filter(Boolean).join(", ");
    if (parts) measurePush(fonts.meta, "#ff7a7a", "Zay\u0131f oldu\u011fu: " + parts);
  }
  if (ex.passives) {
    for (const p of ex.passives) {
      const txt = typeof p === "string" ? p : p.text;
      if (txt) pushWrapped(txt, fonts.desc, "#d8e4f8");
    }
  }
  if (Array.isArray(ex.bonusPctDmg)) {
    for (const b of ex.bonusPctDmg) measurePush(fonts.stat, "#7ae890", "+%" + b + " Ek hasar");
  } else if (ex.bonusPctDmg) {
    measurePush(fonts.stat, "#7ae890", "+%" + ex.bonusPctDmg + " Ek hasar");
  }
  if (ex.firePct) measurePush(fonts.stat, "#ff9040", "+%" + ex.firePct + " Ate\u015f hasar\u0131");
  if (ex.icePct) measurePush(fonts.stat, "#70d0ff", "+%" + ex.icePct + " Buz hasar\u0131");
  if (ex.poisonPct) measurePush(fonts.stat, "#86e070", "+%" + ex.poisonPct + " Zehir hasar\u0131");
  if (ex.special && ex.special.text) {
    const mech = ex.special.hpBelow > 0 && ex.special.dmgBonus != null;
    measurePush(fonts.meta, mech ? "#64f0a0" : "#a8e8c8", "\u25c8 " + ex.special.text);
  }
}

/** Tek sat\u0131rda ta\u015fmadan kelime kayd\u0131r\u0131r (ctx.font \u00f6nceden atanmal\u0131). */
function wrapTextToLinesWithFont(ctx, text, maxWidth, font) {
  if (!text) return [];
  ctx.font = font;
  const words = String(text).split(/\s+/).filter(Boolean);
  if (words.length === 0) return [];
  const lines = [];
  let line = "";
  const pushLine = (s) => { if (s) lines.push(s); };
  for (const w of words) {
    const tryLine = line ? line + " " + w : w;
    if (ctx.measureText(tryLine).width <= maxWidth) {
      line = tryLine;
    } else {
      if (line) pushLine(line);
      if (ctx.measureText(w).width <= maxWidth) {
        line = w;
      } else {
        let chunk = "";
        for (let i = 0; i < w.length; i++) {
          const c = w[i];
          const t2 = chunk + c;
          if (ctx.measureText(t2).width <= maxWidth) chunk = t2;
          else {
            if (chunk) { pushLine(chunk); chunk = c; }
            else { pushLine(c); chunk = ""; }
          }
        }
        line = chunk;
      }
    }
  }
  pushLine(line);
  return lines;
}

function getItemPowerScoreLine(def) {
  if (!def || !def.stats) return null;
  const s = itemStatPowerScore(def);
  if (s < 0.5) return null;
  return "Bonus g\u00fcc\u00fc: " + (Math.round(s * 10) / 10);
}

/**
 * E\u015fya t\u00fcr\u00fcne g\u00f6re ek bilgi sat\u0131rlar\u0131 (her biri ayr\u0131 sat\u0131r).
 * @param {{ omitPrices?: boolean }} opts
 */
function collectItemMetaLines(def, itemId, opts) {
  opts = opts || {};
  const lines = [];
  if (!def) return lines;
  if (def.stackable && def.maxStack) {
    lines.push("Maks. y\u0131\u011f\u0131n: " + def.maxStack + " adet");
  }
  if (!opts.omitPrices) {
    if (def.buyPrice > 0) lines.push("Market fiyat\u0131: " + def.buyPrice + " alt\u0131n");
    if (def.sellPrice > 0) lines.push("Sat\u0131\u015f: " + def.sellPrice + " alt\u0131n");
  }
  switch (itemId) {
    case "potion":
      lines.push("T\u00fcr: Can iksiri");
      lines.push("Kullan\u0131m: Q veya HUD (Bilgi\u00e7ilik + ekipman can\u0131 art\u0131r\u0131r)");
      break;
    case "potion_mana":
      lines.push("T\u00fcr: Mana iksiri");
      lines.push("Kullan\u0131m: R veya HUD");
      break;
    case "arrow":
      lines.push("Cephane: yay ile uzaktan sald\u0131r\u0131");
      lines.push("Her at\u0131\u015fta mana harcan\u0131r");
      break;
    case "axe":
      lines.push("A\u011fa\u00e7a yakla\u015f\u0131nca otomatik keser");
      if (opts && opts.stackRef) {
        ensureStackAxeDurability(opts.stackRef);
        const mx = getAxeDurabilityMax(opts.stackRef);
        if (mx > 0) lines.push("Tamir Can\u0131: " + (opts.stackRef.durability | 0) + "/" + mx);
      }
      break;
    case "coin":
      lines.push("Evrensel para birimi");
      break;
    case "boss_chest":
      lines.push("Sa\u011f t\u0131k: rastgele nadir ganimet");
      break;
    case "seed":
      lines.push("Ekip / ticaret malzemesi");
      break;
    default:
      break;
  }
  return lines;
}

/**
 * Tooltip i\u00e7in sat\u0131r listesi + boyut (mobil: daha b\u00fcy\u00fck font, geni\u015f kutu).
 * @param {{ omitPrices?: boolean, innerMax?: number, omitIdentity?: boolean, stackRef?: object, upgradeLv?: number }} metaOpts
 */
function buildItemTooltipLayout(ctx, def, itemId, canvasW, mobile, metaOpts, trailingLines) {
  metaOpts = metaOpts || {};
  const padX = mobile ? 14 : 11;
  const padY = mobile ? 12 : 9;
  const colGap = 10;
  const innerMaxDefault = mobile ? Math.min(canvasW - 16, 300) : Math.min(248, canvasW - 36);
  const innerMax = metaOpts.innerMax != null ? metaOpts.innerMax : innerMaxDefault;
  /** Sütun basina sarma genisligi: iki sutun (market / envanter tooltip). */
  const innerCol = Math.max(72, Math.floor((innerMax - colGap) / 2));
  const lh = mobile ? 20 : 16;
  const fonts = {
    title: mobile ? "bold 16px monospace" : "bold 13px monospace",
    rare: mobile ? "bold 14px monospace" : "bold 11px monospace",
    stat: mobile ? "14px monospace" : "12px monospace",
    meta: mobile ? "13px monospace" : "10px monospace",
    desc: mobile ? "13px monospace" : "11px monospace",
  };
  const lines = [];
  const measurePush = (font, color, text) => {
    ctx.font = font;
    lines.push({ font, color, text });
  };
  const pushWrapped = (text, font, color) => {
    ctx.font = font;
    const parts = wrapTextToLinesWithFont(ctx, text, innerCol, font);
    for (const t of parts) measurePush(font, color, t);
  };

  const upLv = metaOpts.upgradeLv != null ? metaOpts.upgradeLv | 0
    : (metaOpts.stackRef ? getStackUpgradeLv(metaOpts.stackRef) : 0);

  if (!metaOpts.omitIdentity) {
    let title = def.name || "?";
    if (upLv > 0) title += "(+" + upLv + ")";
    pushWrapped(title, fonts.title, "#f0d050");
    const apTop = getEffectiveItemStatsMerged(def, upLv).advanced || {};
    if (apTop.attackPower != null && apTop.attackPower > 0) {
      measurePush(fonts.stat, "#ffffff", "Attack Power : " + apTop.attackPower);
    }
    if (def.rarity) {
      const rlab = RARITY_LABEL_TR[def.rarity] || String(def.rarity).toUpperCase();
      measurePush(fonts.rare, getItemRarityColor(itemId), rlab);
    }
    const pw = getItemPowerScoreLine(def);
    if (pw) measurePush(fonts.meta, "#c8c0e8", pw);
    if (def.equipSlot) {
      measurePush(fonts.meta, "#a8c0f0", "Giyim: " + (EQ_LABELS[def.equipSlot] || def.equipSlot));
    }
    if (def.weight != null) {
      measurePush(fonts.meta, "#c0c8d8", "A\u011f\u0131rl\u0131k: " + def.weight);
    }
  }
  for (const row of collectEffectiveStatLines(def, upLv)) {
    if (/^Attack Power\s*:/.test(row.text)) continue;
    measurePush(fonts.stat, row.color || (row.neg ? "#ff7070" : "#8ae0a8"), row.text);
  }
  appendItemExtraTooltipLines(def, fonts, measurePush, pushWrapped, upLv);
  const meta = collectItemMetaLines(def, itemId, metaOpts);
  for (const m of meta) measurePush(fonts.meta, "#c0d0f0", m);
  pushWrapped(def.desc || "", fonts.desc, "#b4c0dc");
  if (trailingLines) {
    for (const Ln of trailingLines) {
      measurePush(Ln.font || fonts.meta, Ln.color || "#d0e0ff", Ln.text);
    }
  }

  const splitN = Math.ceil(lines.length / 2);
  const leftLines = lines.slice(0, splitN);
  const rightLines = lines.slice(splitN);
  let maxL = 0, maxR = 0;
  for (const Ln of leftLines) {
    ctx.font = Ln.font;
    maxL = Math.max(maxL, ctx.measureText(Ln.text).width);
  }
  for (const Ln of rightLines) {
    ctx.font = Ln.font;
    maxR = Math.max(maxR, ctx.measureText(Ln.text).width);
  }
  const colRows = Math.max(leftLines.length, rightLines.length);
  const contentW = maxL + colGap + maxR;
  const tw = Math.min(canvasW - 12, Math.max(160, contentW + padX * 2 + 4));
  const th = padY * 2 + colRows * lh + (mobile ? 2 : 0);
  return { lines, tw, th, lh, padX, padY, innerMax, twoColumn: true, colGap };
}

function placeTooltipPosition(anchorX, anchorY, tw, th, canvasW, canvasH) {
  let tx = anchorX + (touchState.mobileUI ? 8 : 14);
  let ty = anchorY - th - (touchState.mobileUI ? 8 : 6);
  if (tx + tw > canvasW - 8) tx = Math.max(8, canvasW - tw - 8);
  if (tx < 8) tx = 8;
  if (ty < 8) ty = anchorY + (touchState.mobileUI ? 12 : 14);
  if (ty + th > canvasH - 8) ty = Math.max(8, canvasH - th - 8);
  return { tx, ty };
}

function drawItemTooltipFromLayout(ctx, tx, ty, layout, mobile, strokeOpts) {
  const { lines, tw, th, lh, padX, padY, colGap: cgIn } = layout;
  strokeOpts = strokeOpts || {};
  ctx.fillStyle = "rgba(6,8,24,0.97)";
  ctx.strokeStyle = strokeOpts.strokeStyle || (mobile ? "#8098d0" : "#6070a0");
  ctx.lineWidth = strokeOpts.lineWidth != null ? strokeOpts.lineWidth : (mobile ? 2 : 1);
  roundRect(ctx, tx, ty, tw, th, 8);
  ctx.fill();
  ctx.stroke();
  const cGap = cgIn != null ? cgIn : 10;
  const innerW = tw - padX * 2;
  const colW = (innerW - cGap) / 2;
  const startY = ty + padY + (mobile ? 14 : 12);
  if (layout.twoColumn && lines && lines.length) {
    const splitN = Math.ceil(lines.length / 2);
    const leftLines = lines.slice(0, splitN);
    const rightLines = lines.slice(splitN);
    let ly = startY, ry = startY;
    const c1x = tx + padX;
    const c2x = c1x + colW + cGap;
    for (const Ln of leftLines) {
      ctx.font = Ln.font;
      ctx.fillStyle = Ln.color;
      ctx.fillText(Ln.text, c1x, ly);
      ly += lh;
    }
    for (const Ln of rightLines) {
      ctx.font = Ln.font;
      ctx.fillStyle = Ln.color;
      ctx.fillText(Ln.text, c2x, ry);
      ry += lh;
    }
  } else {
    let ly = startY;
    for (const Ln of lines) {
      ctx.font = Ln.font;
      ctx.fillStyle = Ln.color;
      ctx.fillText(Ln.text, tx + padX, ly);
      ly += lh;
    }
  }
}

/** Arka plan kutusu olmadan tooltip sat\u0131rlar\u0131 (sat\u0131n al diyalo\u011fu vb.). */
function drawItemTooltipTextOnly(ctx, tx, ty, layout, mobile, clipContentW) {
  const { lines, tw, lh, padX, padY, colGap: cgIn } = layout;
  const cGap = cgIn != null ? cgIn : 10;
  const innerW = clipContentW != null
    ? clipContentW
    : ((tw != null ? tw : 280) - padX * 2);
  const colW = Math.max(40, (innerW - cGap) / 2);
  const startY = ty + padY + (mobile ? 14 : 12);
  if (layout.twoColumn && lines && lines.length) {
    const splitN = Math.ceil(lines.length / 2);
    const leftLines = lines.slice(0, splitN);
    const rightLines = lines.slice(splitN);
    let ly = startY, ry = startY;
    const c1x = tx + padX;
    const c2x = c1x + colW + cGap;
    for (const Ln of leftLines) {
      ctx.font = Ln.font;
      ctx.fillStyle = Ln.color;
      ctx.fillText(Ln.text, c1x, ly);
      ly += lh;
    }
    for (const Ln of rightLines) {
      ctx.font = Ln.font;
      ctx.fillStyle = Ln.color;
      ctx.fillText(Ln.text, c2x, ry);
      ry += lh;
    }
  } else {
    let ly = startY;
    for (const Ln of lines) {
      ctx.font = Ln.font;
      ctx.fillStyle = Ln.color;
      ctx.fillText(Ln.text, tx + padX, ly);
      ly += lh;
    }
  }
}

function splitDescLinesShop(desc, maxLen, maxLines) {
  if (!desc) return [];
  const lines = [];
  for (let i = 0; i < desc.length && lines.length < maxLines; i += maxLen) {
    lines.push(desc.slice(i, i + maxLen));
  }
  return lines;
}


function drawItemIcon(ctx, itemId, x, y, size) {
  const s = size;
  const cx = x + s / 2, cy = y + s / 2;
  switch (itemId) {
    case "wood": {
      const wg = ctx.createLinearGradient(x, y, x + s, y + s);
      wg.addColorStop(0, "#9a6e48"); wg.addColorStop(0.5, "#7a4e30"); wg.addColorStop(1, "#5a3218");
      ctx.fillStyle = wg; ctx.fillRect(x + s*0.3, y + s*0.15, s*0.4, s*0.7);
      ctx.fillStyle = "rgba(255,220,180,0.25)"; ctx.fillRect(x + s*0.32, y + s*0.18, s*0.12, s*0.55);
      ctx.fillStyle = "#A0724D"; ctx.fillRect(x + s*0.35, y + s*0.2, s*0.3, s*0.12);
      ctx.fillStyle = "#5a3018"; ctx.fillRect(x + s*0.25, y + s*0.1, s*0.5, s*0.06);
      ctx.fillRect(x + s*0.25, y + s*0.84, s*0.5, s*0.06);
      break;
    }
    case "stone": {
      const sg = ctx.createRadialGradient(cx - s*0.1, cy - s*0.12, 0, cx, cy + s*0.05, s*0.4);
      sg.addColorStop(0, "#b8b8c8"); sg.addColorStop(0.55, "#707080"); sg.addColorStop(1, "#484858");
      ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(cx, cy+s*0.05, s*0.35, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.1, s*0.12, 0, Math.PI*2); ctx.fill();
      break;
    }
    case "flower":
      ctx.fillStyle = "#2d8e1e"; ctx.fillRect(cx-1, cy, 2, s*0.35);
      ctx.fillStyle = "#e84040";
      for (let a = 0; a < 5; a++) {
        const ang = a * Math.PI * 2 / 5 - Math.PI/2;
        ctx.beginPath(); ctx.arc(cx + Math.cos(ang)*s*0.15, cy - s*0.05 + Math.sin(ang)*s*0.15, s*0.1, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = "#f0d040"; ctx.beginPath(); ctx.arc(cx, cy-s*0.05, s*0.08, 0, Math.PI*2); ctx.fill();
      break;
    case "apple":
      ctx.fillStyle = "#d03030"; ctx.beginPath(); ctx.arc(cx, cy+s*0.05, s*0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#e05050"; ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.02, s*0.12, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#5a3a1a"; ctx.fillRect(cx-1, y+s*0.12, 2, s*0.2);
      ctx.fillStyle = "#3a8a2a"; ctx.fillRect(cx, y+s*0.1, s*0.15, s*0.1);
      break;
    case "fish":
      ctx.fillStyle = "#5090d0"; ctx.beginPath(); ctx.ellipse(cx, cy, s*0.35, s*0.18, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#3070b0";
      ctx.beginPath(); ctx.moveTo(x+s*0.8, cy); ctx.lineTo(x+s*0.95, cy-s*0.2); ctx.lineTo(x+s*0.95, cy+s*0.2); ctx.fill();
      ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(x+s*0.25, cy-s*0.03, s*0.05, 0, Math.PI*2); ctx.fill();
      break;
    case "axe":
      ctx.fillStyle = "#8B6B3D"; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.7);
      ctx.fillRect(-s*0.04, -s*0.35, s*0.08, s*0.7); ctx.restore();
      ctx.fillStyle = "#a0a0a0"; ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.7);
      ctx.fillRect(-s*0.22, -s*0.35, s*0.3, s*0.2); ctx.restore();
      break;
    case "spear_epic": {
      ctx.save();
      ctx.strokeStyle = "#4a3058";
      ctx.lineWidth = Math.max(1.5, s * 0.08);
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.38);
      ctx.lineTo(cx, cy + s * 0.36);
      ctx.stroke();
      ctx.fillStyle = "#6a6a78";
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.42);
      ctx.lineTo(cx - s * 0.07, cy - s * 0.26);
      ctx.lineTo(cx + s * 0.07, cy - s * 0.26);
      ctx.closePath();
      ctx.fill();
      const pg = ctx.createRadialGradient(cx, cy - s * 0.32, 0, cx, cy - s * 0.26, s * 0.22);
      pg.addColorStop(0, "rgba(220,120,255,0.95)");
      pg.addColorStop(0.45, "rgba(120,60,180,0.5)");
      pg.addColorStop(1, "rgba(40,20,80,0)");
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(cx, cy - s * 0.29, s * 0.16, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#a070d0";
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.restore();
      break;
    }
    case "sword":
    case "sword_rusty":
    case "sword_steel":
    case "sword_elven": {
      const blade = itemId === "sword_elven" ? "#b0e8ff" : itemId === "sword_steel" ? "#d8e4f0" : itemId === "sword_rusty" ? "#9a8a78" : "#c0c0c0";
      const hilt = itemId === "sword_elven" ? "#4a6a50" : "#8B6B3D";
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.5);
      const bg = ctx.createLinearGradient(-s * 0.06, -s * 0.4, s * 0.06, s * 0.2);
      bg.addColorStop(0, blade); bg.addColorStop(0.45, blade); bg.addColorStop(1, "rgba(0,0,0,0.35)");
      ctx.fillStyle = bg; ctx.fillRect(-s*0.04, -s*0.4, s*0.08, s*0.55);
      ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.fillRect(-s*0.02, -s*0.38, s*0.02, s*0.45);
      ctx.fillStyle = "#e8e8e8"; ctx.fillRect(-s*0.06, -s*0.42, s*0.12, s*0.1);
      ctx.fillStyle = hilt;
      ctx.fillRect(-s*0.14, s*0.12, s*0.28, s*0.06);
      ctx.fillRect(-s*0.04, s*0.15, s*0.08, s*0.22);
      if (itemId === "sword_elven") {
        ctx.fillStyle = "#60ffb0"; ctx.beginPath(); ctx.arc(0, -s * 0.28, s * 0.05, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 0.8; ctx.stroke();
      }
      ctx.restore();
      break;
    }

    default: {
      // Otomatik oluşturulan efsanevi versiyonlar için: temel eşyayı çizip altın parlama ekle
      if (itemId.endsWith("_legendary") && ITEMS[itemId]) {

          ctx.save();
          drawItemIcon(ctx, baseId, x, y, size);
          ctx.restore();
          ctx.strokeStyle = "rgba(255,200,60,0.65)"; ctx.lineWidth = 1.5;
          roundRect(ctx, x + s * 0.06, y + s * 0.08, s * 0.88, s * 0.84, s * 0.12);
          ctx.stroke();
          const lg = ctx.createRadialGradient(cx, cy, s*0.15, cx, cy, s*0.42);

      const g = ctx.createLinearGradient(x, y, x + s, y + s);
      g.addColorStop(0, "#5a5e78"); g.addColorStop(1, "#2a2e40");
      ctx.fillStyle = g;

function getShopBuyPriceForItem(itemId) {
  const d = ITEMS[itemId];
  if (!d) return 0;
  if (d.buyPrice > 0) return d.buyPrice;
  const sp = d.sellPrice || 12;
  let mult = 3.2;
  if (d.rarity === "legendary") mult = 5.2;
  else if (d.rarity === "epic") mult = 4.3;
  else if (d.rarity === "rare") mult = 3.6;
  return Math.max(35, Math.floor(sp * mult));
}

/** Seviye + alt\u0131n ile a\u00e7\u0131lan kal\u0131c\u0131 yetenekler */
const PLAYER_SKILL_DEFS = [
  { id: "vitality", name: "Can Ustal\u0131\u011f\u0131", minLevel: 3, gold: 45, desc: "Kal\u0131c\u0131 +25 Max HP." },
  { id: "arcane", name: "Mana Ustal\u0131\u011f\u0131", minLevel: 4, gold: 55, desc: "Kal\u0131c\u0131 +22 Max MP." },
  { id: "marksman", name: "Ni\u015fanc\u0131", minLevel: 6, gold: 100, desc: "Uzak menzil hasar\u0131 +%10." },
  { id: "brawler", name: "D\u00f6v\u00fc\u015f\u00e7\u00fc", minLevel: 8, gold: 140, desc: "Yak\u0131n d\u00f6v\u00fc\u015f hasar\u0131 +4." },
  { id: "ward", name: "Ta\u015f Ten", minLevel: 10, gold: 180, desc: "Gelen hasar %8 azal\u0131r." },
];

const charPanel = {
  open: false,
  _layout(cw, ch) {
    const b = uiModalBounds(cw, ch);
    const land = cw > ch * 1.02;
    const n = PLAYER_SKILL_DEFS.length;
    let rowStep = land ? 40 : 54;
    const titleH = land ? 20 : 26;
    const statBlockH = land ? 52 : 78;
    const gapBeforeSkills = land ? 10 : 18;
    const autoPotBlockH = touchState.mobileUI ? 58 : 0;
    let needH = (land ? 10 : 14) + titleH + statBlockH + gapBeforeSkills + autoPotBlockH + 16 + n * rowStep + (land ? 14 : 20);
    while (needH > b.maxH && rowStep > 30) {
      rowStep -= 2;
      needH = (land ? 10 : 14) + titleH + statBlockH + gapBeforeSkills + autoPotBlockH + 16 + n * rowStep + (land ? 14 : 20);
    }
    let pw = Math.min(land ? Math.min(560, b.maxW) : 420, b.maxW);
    pw = Math.max(280, pw);
    let ph = Math.min(Math.max(needH, land ? 200 : 240), b.maxH);
    const px = Math.floor((cw - pw) / 2);
    const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
    const boxH = Math.max(land ? 30 : 40, rowStep - (land ? 8 : 6));
    const titleY = py + (land ? 16 : 24);
    const statBtnY = py + (land ? 36 : 52);
    const statBtnH = land ? 26 : 30;
    const skillHdrY = statBtnY + (land ? 34 : 42) + autoPotBlockH;
    const skillStartY = skillHdrY + (land ? 12 : 18);
    const autoPotY = touchState.mobileUI ? statBtnY + statBtnH + 8 : -1;
    const closeR = { x: px + pw - 30, y: py + 8, w: 24, h: 24 };
    return {
      px, py, pw, ph, rowStep, boxH, land, titleY, statBtnY, statBtnH, skillHdrY, skillStartY, closeR,
      autoPotY, autoPotBlockH,
    };
  },
  _autopotStepRects(L) {
    if (!touchState.mobileUI || L.autoPotY < 0) return null;
    const btnW = 34, btnH = 24, pairGap = 6;
    const xR = L.px + L.pw - 14 - 2 * btnW - pairGap;
    const y0 = L.autoPotY;
    const y1 = y0 + 28;
    return {
      hpMinus: { x: xR, y: y0, w: btnW, h: btnH },
      hpPlus: { x: xR + btnW + pairGap, y: y0, w: btnW, h: btnH },
      mpMinus: { x: xR, y: y1, w: btnW, h: btnH },
      mpPlus: { x: xR + btnW + pairGap, y: y1, w: btnW, h: btnH },
    };
  },
  _in(mx, my, r) {
    return mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
  },
  toggle() {
    this.open = !this.open;
    if (this.open) {
      if (typeof inventory !== "undefined") inventory.close();
      if (typeof petPanel !== "undefined") petPanel.open = false;
      if (typeof shop !== "undefined") shop.close();
      if (typeof craftPanel !== "undefined") craftPanel.close();
    }
  },
  close() {
    this.open = false;
  },
  tryAllocStat(player, stat) {
    if (player.statPoints <= 0) return "Stat puan\u0131n yok.";
    if (stat === "str") player.str++;
    else if (stat === "agi") player.agi++;
    else if (stat === "wis") player.wis++;
    else return "";
    player.statPoints--;
    return null;
  },
  tryUnlockSkill(player, inventory, sid) {
    const def = PLAYER_SKILL_DEFS.find((d) => d.id === sid);
    if (!def) return "Ge\u00e7ersiz.";
    if (player.skills[sid]) return "Zaten a\u00e7\u0131k.";
    if (player.level < def.minLevel) return "Seviye " + def.minLevel + "+ gerekli.";
    if (inventory.countItem("coin") < def.gold) return def.gold + " alt\u0131n gerekli.";
    inventory.removeItem("coin", def.gold);
    player.skills[sid] = true;
    player._pendingFullHeal = true;
    return null;
  },
  handleClick(mx, my, cw, ch, player, inventory) {
    if (!this.open) return false;
    const L = this._layout(cw, ch);
    if (mx < L.px || mx >= L.px + L.pw || my < L.py || my >= L.py + L.ph) {
      this.close();
      return true;
    }
    if (this._in(mx, my, L.closeR)) {
      this.close();
      return true;
    }

    const btnY = L.statBtnY;
    const btnH = L.statBtnH;
    const bw = Math.min(104, Math.floor((L.pw - 50) / 3)), gap = Math.min(10, Math.max(4, Math.floor(L.pw * 0.02))), x0 = L.px + 20;
    if (player.statPoints > 0) {
      if (this._in(mx, my, { x: x0, y: btnY, w: bw, h: btnH })) {
        const err = this.tryAllocStat(player, "str");
        if (err) { pickupMsgText = err; pickupMsgTimer = 1.4; }
        return true;
      }
      if (this._in(mx, my, { x: x0 + bw + gap, y: btnY, w: bw, h: btnH })) {
        const err = this.tryAllocStat(player, "agi");
        if (err) { pickupMsgText = err; pickupMsgTimer = 1.4; }
        return true;
      }
      if (this._in(mx, my, { x: x0 + 2 * (bw + gap), y: btnY, w: bw, h: btnH })) {
        const err = this.tryAllocStat(player, "wis");
        if (err) { pickupMsgText = err; pickupMsgTimer = 1.4; }
        return true;
      }
    }

    const apR = this._autopotStepRects(L);
    if (apR) {
      if (this._in(mx, my, apR.hpMinus)) {
        autoPotSettings.hpPct = Math.max(5, autoPotSettings.hpPct - 5);
        saveAutoPotSettings();
        pickupMsgText = "Oto can iksiri: HP < %" + autoPotSettings.hpPct;
        pickupMsgTimer = 1.1;
        return true;
      }
      if (this._in(mx, my, apR.hpPlus)) {
        autoPotSettings.hpPct = Math.min(95, autoPotSettings.hpPct + 5);
        saveAutoPotSettings();
        pickupMsgText = "Oto can iksiri: HP < %" + autoPotSettings.hpPct;
        pickupMsgTimer = 1.1;
        return true;
      }
      if (this._in(mx, my, apR.mpMinus)) {
        autoPotSettings.mpPct = Math.max(5, autoPotSettings.mpPct - 5);
        saveAutoPotSettings();
        pickupMsgText = "Oto mana iksiri: MP < %" + autoPotSettings.mpPct;
        pickupMsgTimer = 1.1;
        return true;
      }
      if (this._in(mx, my, apR.mpPlus)) {
        autoPotSettings.mpPct = Math.min(95, autoPotSettings.mpPct + 5);
        saveAutoPotSettings();
        pickupMsgText = "Oto mana iksiri: MP < %" + autoPotSettings.mpPct;
        pickupMsgTimer = 1.1;
        return true;
      }
    }

    let sy = L.skillStartY;
    const unlockW = Math.min(108, L.pw - 130);
    const unlockH = L.land ? 26 : 28;
    for (const sk of PLAYER_SKILL_DEFS) {
      const unlockR = { x: L.px + L.pw - unlockW - 10, y: sy + 2, w: unlockW, h: unlockH };
      if (!player.skills[sk.id] && this._in(mx, my, unlockR)) {
        const err = this.tryUnlockSkill(player, inventory, sk.id);
        if (err) {
          pickupMsgText = err;
          pickupMsgTimer = 1.6;
        } else {
          pickupMsgText = sk.name + " a\u00e7\u0131ld\u0131! (-" + sk.gold + " alt\u0131n)";
          pickupMsgTimer = 2;
        }
        return true;
      }
      sy += L.rowStep;
    }
    return true;
  },
  render(ctx, cw, ch, player, inventory) {
    if (!this.open) return;
    const L = this._layout(cw, ch);
    ctx.fillStyle = "rgba(8,8,24,0.92)";
    roundRect(ctx, L.px, L.py, L.pw, L.ph, 10);
    ctx.fill();
    ctx.strokeStyle = "#7080b0";
    ctx.lineWidth = 1.5;
    roundRect(ctx, L.px, L.py, L.pw, L.ph, 10);
    ctx.stroke();

    ctx.fillStyle = "#e8e8f0";
    ctx.font = L.land ? "bold 12px monospace" : "bold 14px monospace";
    ctx.fillText("Karakter  [C] kapat", L.px + 14, L.titleY);
    ctx.fillStyle = "#f0d050";
    ctx.font = L.land ? "bold 11px monospace" : "bold 12px monospace";

      ctx.fillStyle = active ? "#2a5080" : "#303048";

      ctx.strokeStyle = active ? "#80b0ff" : "#505070";

    };

    drawMiniBtn(x0 + bw + gap, btnY, "+ AGI", player.statPoints > 0);

      ctx.font = L.land ? "bold 9px monospace" : "bold 10px monospace";

      const drawPotStepBtn = (r, sym) => {
        ctx.fillStyle = "#2a3858";
        roundRect(ctx, r.x, r.y, r.w, r.h, 4);
        ctx.fill();
        ctx.strokeStyle = "#6080a8";
        ctx.stroke();
        ctx.fillStyle = "#e0e8f8";
        ctx.font = "bold 14px monospace";
        ctx.fillText(sym, r.x + (r.w - ctx.measureText(sym).width) / 2, r.y + 18);
      };
      ctx.fillStyle = "#c8b8b8";
      ctx.font = L.land ? "9px monospace" : "10px monospace";
      ctx.fillText("Can < %" + autoPotSettings.hpPct, L.px + 14, ay + 17);
      ctx.fillStyle = "#a8b8e8";
      ctx.fillText("Mana < %" + autoPotSettings.mpPct, L.px + 14, ay + 45);
      if (apR) {
        drawPotStepBtn(apR.hpMinus, "\u2212");
        drawPotStepBtn(apR.hpPlus, "+");
        drawPotStepBtn(apR.mpMinus, "\u2212");
        drawPotStepBtn(apR.mpPlus, "+");

      ctx.fillStyle = "#5a6078";
      ctx.font = "8px monospace";
      ctx.fillText("\u00b15%  (5\u201395%)", L.px + 14, ay + 58);

    ctx.fillStyle = "#c0c8e0";
    ctx.font = L.land ? "bold 10px monospace" : "bold 11px monospace";
    ctx.fillText("Yetenekler (seviye + alt\u0131n)", L.px + 14, L.skillHdrY);

    let sy = L.skillStartY;
    const gold = inventory.countItem("coin");
    const unlockW = Math.min(108, L.pw - 130);
    const unlockH = L.land ? 26 : 28;
    for (const sk of PLAYER_SKILL_DEFS) {
      ctx.fillStyle = "#2a2840";
      roundRect(ctx, L.px + 14, sy, L.pw - 28, L.boxH, 6);
      ctx.fill();
      ctx.strokeStyle = "#505070";
      roundRect(ctx, L.px + 14, sy, L.pw - 28, L.boxH, 6);
      ctx.stroke();
      ctx.fillStyle = player.skills[sk.id] ? "#70ffa0" : "#e0e0f0";
      ctx.font = L.land ? "bold 10px monospace" : "bold 11px monospace";
      ctx.fillText(sk.name + (player.skills[sk.id] ? "  \u2713" : ""), L.px + 22, sy + (L.land ? 14 : 16));
      ctx.fillStyle = "#9090b0";
      ctx.font = L.land ? "8px monospace" : "9px monospace";
      ctx.fillText(sk.desc + "  |  Lv" + sk.minLevel + "  |  " + sk.gold + " alt\u0131n", L.px + 22, sy + (L.land ? 26 : 32));

      const unlockR = { x: L.px + L.pw - unlockW - 10, y: sy + 2, w: unlockW, h: unlockH };
      if (!player.skills[sk.id]) {
        const can = player.level >= sk.minLevel && gold >= sk.gold;
        ctx.fillStyle = can ? "#2a6040" : "#303030";
        roundRect(ctx, unlockR.x, unlockR.y, unlockR.w, unlockR.h, 5);
        ctx.fill();
        ctx.strokeStyle = can ? "#60c080" : "#505050";
        ctx.stroke();
        ctx.fillStyle = can ? "#fff" : "#606060";
        ctx.font = L.land ? "bold 9px monospace" : "bold 10px monospace";
        const t = "A\u00e7 " + sk.gold + "G";
        ctx.fillText(t, unlockR.x + (unlockR.w - ctx.measureText(t).width) / 2, unlockR.y + (L.land ? 17 : 19));
      }
      sy += L.rowStep;
    }

    ctx.fillStyle = "#707890";
    ctx.font = "9px monospace";
    ctx.fillText("ESC ile kapat", L.px + 14, L.py + L.ph - 12);
  },
};

function equipSlotsForItemDef(def) {
  if (!def || !def.equipSlot) return [];
  if (def.equipSlot === "ring") return ["ring1", "ring2"];
  return [def.equipSlot];
}

function itemFitsEquipSlot(def, slotKey) {
  return equipSlotsForItemDef(def).includes(slotKey);
}

function firstEquipSlotForItem(inv, def) {
  const cands = equipSlotsForItemDef(def);
  if (!cands.length) return null;
  for (const sk of cands) if (!inv.equipped[sk]) return sk;
  return cands[0];
}

const INV_COLS = 7, INV_ROWS = 5, INV_PAGE_SLOTS = INV_COLS * INV_ROWS;
const INV_PAGES_DEFAULT = 3;
const INV_TOTAL_SLOTS = INV_PAGE_SLOTS * INV_PAGES_DEFAULT;
const HOTBAR_SLOTS = 5;
const PLAYER_MAX_CARRY_WEIGHT = 1330;
const SLOT_SIZE = 48, SLOT_GAP = 4;
const INV_LONG_PRESS_EQUIP_MS = 450;
const INV_PRESS_MOVE_CANCEL = 16;

/** Envanterde sol t\u0131k: ta\u015f\u0131ma yerine Giy / Yere at paneli */
let inventorySlotInspect = null;
let inventoryInspectScrollY = 0;
let inventoryInspectScrollMax = 0;
let inventoryInspectScrollTouchId = -1;
let inventoryInspectScrollLastY = 0;
let inventoryInspectScrollRect = null;

class Inventory {
  constructor() {
    this.slots = new Array(INV_TOTAL_SLOTS).fill(null);
    this.hotbar = new Array(HOTBAR_SLOTS).fill(null);
    this.equipped = Object.fromEntries(EQ_SLOTS.map((sk) => [sk, null]));
    this.gold = 0;
    this.open = false;
    this.selectedHotbar = 0;
    this.heldItem = null;
    this.tooltipSlot = null;
    this.tooltipSource = null;
    this.tooltipEquipKey = null;
    this._slotPress = null;
    this.invPage = 0;
    this.sortStrongFirst = true;
    this.autoEquipOnPickup = false;
  }

  _invPageCount() {
    return Math.max(1, Math.ceil(this.slots.length / INV_PAGE_SLOTS));
  }

  _invPageStart() {
    return Math.max(0, Math.min(this._invPageCount() - 1, this.invPage)) * INV_PAGE_SLOTS;
  }

  cycleInvSortMode() {
    this.sortStrongFirst = !this.sortStrongFirst;
    this.sortInventoryByPower(this.sortStrongFirst);
  }

  sortInventoryByPower(desc) {
    const filled = [];
    for (const s of this.slots) if (s) filled.push(s);
    const powerOf = (s) => {
      const d = ITEMS[s.id];
      if (!d) return 0;
      const up = getStackUpgradeLv(s);
      const m = getEffectiveItemStatsMerged(d, up);
      const base = itemStatPowerScore(d);
      const ap = (m.advanced && m.advanced.attackPower) || 0;
      const rarity = rarityRank(d.rarity || "common");
      return base * 3 + ap * 0.35 + rarity * 8 + up * 10;
    };
    filled.sort((a, b) => (desc ? powerOf(b) - powerOf(a) : powerOf(a) - powerOf(b)));
    for (let i = 0; i < this.slots.length; i++) this.slots[i] = filled[i] || null;
  }

  _mergeSlotCoinsIntoGold() {
    for (const container of [this.hotbar, this.slots]) {
      for (let i = 0; i < container.length; i++) {
        if (container[i] && container[i].id === "coin") {
          this.gold += container[i].count;
          container[i] = null;
        }
      }
    }
  }

  /** Ayn\u0131 id\u2019li y\u0131\u011f\u0131nlanabilir e\u015fyalar\u0131 tek slotta birle\u015ftirir. */
  _consolidateItemStacks() {
    let changed = true;
    while (changed) {
      changed = false;
      for (const container of [this.hotbar, this.slots]) {
        for (let i = 0; i < container.length; i++) {
          const a = container[i];
          if (!a) continue;
          const def = ITEMS[a.id];
          if (!def || !def.stackable) continue;
          for (let j = i + 1; j < container.length; j++) {
            const b = container[j];
            if (!b || b.id !== a.id || !stackUpgradesMatch(a, b)) continue;
            const space = def.maxStack - a.count;
            if (space <= 0) break;
            const mv = Math.min(space, b.count);
            a.count += mv;
            b.count -= mv;
            if (b.count <= 0) container[j] = null;
            changed = true;
          }
        }
      }
    }
  }

  addItem(itemId, count = 1, upgradeLevel = 0, sourceMeta = null) {
    const def = ITEMS[itemId];
    if (!def) return count;
    const u = upgradeLevel | 0;

    if (itemId === "coin") {
      this.gold += count;
      if (this.autoEquipOnPickup) this._scanAutoEquipAllEmpty();
      return 0;
    }

    if (def.stackable) {
      for (const container of [this.slots, this.hotbar]) {
        for (let i = 0; i < container.length; i++) {
          const s = container[i];
          if (s && s.id === itemId && stackUpgradesMatch(s, { upgrade: u }) && s.count < def.maxStack) {
            const space = def.maxStack - s.count;
            const add = Math.min(count, space);
            s.count += add;
            count -= add;
            if (count <= 0) {
              if (this.autoEquipOnPickup) this._scanAutoEquipAllEmpty();
              return 0;
            }
          }
        }
      }
    }

    for (const container of [this.slots, this.hotbar]) {
      for (let i = 0; i < container.length; i++) {
        if (!container[i]) {
          const add = Math.min(count, def.maxStack);
          const stack = { id: itemId, count: add };
          if (u > 0) stack.upgrade = u;
          copyStackMetaTo(stack, sourceMeta);
          container[i] = stack;
          count -= add;
          if (count <= 0) {
            if (this.autoEquipOnPickup) this._scanAutoEquipAllEmpty();
            return 0;
          }
        }
      }
    }
    if (this.autoEquipOnPickup) this._scanAutoEquipAllEmpty();
    return count;
  }

  /**
   * Bu e\u015fya i\u00e7in en fazla ka\u00e7 adet daha eklenebilece\u011fini tahmin eder (bo\u015f / y\u0131\u011f\u0131n alan\u0131).
   * Marketten \u00e7oklu al\u0131m \u00fcst s\u0131n\u0131r\u0131 i\u00e7in kullan\u0131l\u0131r.
   */
  countAddable(itemId, maxWant = 99999) {
    const def = ITEMS[itemId];
    if (!def || maxWant <= 0) return 0;
    if (itemId === "coin") return maxWant;
    let room = 0;
    const cap = Math.min(maxWant, 99999);
    if (def.stackable) {
      for (const container of [this.hotbar, this.slots]) {
        for (let i = 0; i < container.length; i++) {
          const s = container[i];
          if (!s) room += def.maxStack;
          else if (s.id === itemId && s.count < def.maxStack) room += def.maxStack - s.count;
          if (room >= cap) return cap;
        }
      }
    } else {
      for (const container of [this.hotbar, this.slots]) {
        for (let i = 0; i < container.length; i++) {
          if (!container[i]) {
            room += 1;
            if (room >= cap) return cap;
          }
        }
      }
    }
    return Math.min(room, cap);
  }

  countItem(itemId) {
    if (itemId === "coin") {
      this._mergeSlotCoinsIntoGold();
      return this.gold;
    }
    let total = 0;
    for (const s of this.hotbar) if (s && s.id === itemId) total += s.count;
    for (const s of this.slots) if (s && s.id === itemId) total += s.count;
    return total;
  }

  removeItem(itemId, amount) {
    if (itemId === "coin") {
      this._mergeSlotCoinsIntoGold();
      const take = Math.min(amount, this.gold);
      this.gold -= take;
      return take;
    }
    let left = amount;
    for (const container of [this.hotbar, this.slots]) {
      for (let i = 0; i < container.length && left > 0; i++) {
        if (container[i] && container[i].id === itemId) {
          const take = Math.min(left, container[i].count);
          container[i].count -= take;
          left -= take;
          if (container[i].count <= 0) container[i] = null;
        }
      }
    }
    return amount - left;
  }

  toggle() {
    if (!this.open) this._mergeSlotCoinsIntoGold();
    this.open = !this.open;
    if (this.open) {
      this._consolidateItemStacks();
      this.invPage = Math.max(0, Math.min(this._invPageCount() - 1, this.invPage));
      closeWorldItemInspect();
      closeInventorySlotInspect();
    }
    if (!this.open && this.heldItem) this._dropHeld();
    if (!this.open) {
      this._clearSlotPress();
      closeInventorySlotInspect();
    }
  }

  close() {
    if (!this.open) return;
    this._mergeSlotCoinsIntoGold();
    this._consolidateItemStacks();
    this.invPage = Math.max(0, Math.min(this._invPageCount() - 1, this.invPage));
    this.open = false;
    if (this.heldItem) this._dropHeld();
    this._clearSlotPress();
    closeInventorySlotInspect();
  }

  _dropHeld() {
    if (!this.heldItem) return;
    const left = this.addItem(this.heldItem.id, this.heldItem.count, getStackUpgradeLv(this.heldItem));
    this.heldItem = null;
    return left;
  }

  _clearSlotPress() {
    this._slotPress = null;
    touchState.invSlotPressId = -1;
  }

  /**
   * Yerden tek par\u00e7a giy. Slotta eski e\u015fya varsa \u00f6nce onu envantere al\u0131r, sonra yenisini ku\u015fan\u0131r
   * (envelope doluysa hata; ayn\u0131 e\u015fya zaten giyiliyse hata).
   */
  tryEquipOneFromId(itemId, upgradeOpt) {
    const def = ITEMS[itemId];
    if (!def || !def.equipSlot) return "Giyilebilir bir e\u015fya de\u011fil.";
    const gate = canPlayerEquipItem(def, player);
    if (!gate.ok) return "Bu esya icin Seviye " + gate.needLevel + "+ gerekli.";
    const sk = firstEquipSlotForItem(this, def);
    if (!sk) return "Bu e\u015fya i\u00e7in uygun slot yok.";
    const uWant = upgradeOpt | 0;
    const prev = this.equipped[sk];
    if (prev && prev.id === itemId && getStackUpgradeLv(prev) === uWant) return "Zaten bu e\u015fya giyili.";
    if (prev) {
      const left = this.addItem(prev.id, 1, getStackUpgradeLv(prev), prev);
      if (left > 0) return "Eski e\u015fya i\u00e7in envanterde yer yok; \u00f6nce yer a\u00e7.";
    }
    const eq = { id: itemId, count: 1 };
    if (uWant > 0) eq.upgrade = uWant;
    ensureStackAxeDurability(eq);
    this.equipped[sk] = eq;
    this._scanAutoEquipAllEmpty();
    return null;
  }

  /**
   * Envanter / h\u0131zl\u0131 \u00e7ubuktan giy. Dolu slotta: eski e\u015fya envantere, 1 adet t\u00fcketilir.
   * Ayn\u0131 id bu slotta giyiliyse no-op. Ba\u015far\u0131: null, hata: T\u00fcrk\u00e7e mesaj.
   */
  tryEquipFromContainerSlotReplace(container, idx) {
    const slot = container[idx];
    if (!slot || slot.count < 1) return "B\u00f6yle bir e\u015fya yok.";
    const def = ITEMS[slot.id];
    if (!def || !def.equipSlot) return "Giyilebilir bir e\u015fya de\u011fil.";
    const gate = canPlayerEquipItem(def, player);
    if (!gate.ok) return "Bu esya icin Seviye " + gate.needLevel + "+ gerekli.";
    const sk = firstEquipSlotForItem(this, def);
    if (!sk) return "Bu e\u015fya i\u00e7in uygun slot yok.";
    const id = slot.id;
    const uNew = getStackUpgradeLv(slot);
    if (this.equipped[sk] && this.equipped[sk].id === id && stackUpgradesMatch(this.equipped[sk], slot)) return "Zaten bu e\u015fya giyili.";
    if (this.equipped[sk]) {
      const old = this.equipped[sk];
      const left = this.addItem(old.id, 1, getStackUpgradeLv(old), old);
      if (left > 0) return "Eski e\u015fya i\u00e7in envanterde yer yok; \u00f6nce yer a\u00e7.";
    }
    slot.count--;
    if (slot.count <= 0) container[idx] = null;
    const eq = { id, count: 1 };
    if (uNew > 0) eq.upgrade = uNew;
    copyStackMetaTo(eq, slot);
    this.equipped[sk] = eq;
    this._scanAutoEquipAllEmpty();
    return null;
  }

  _equipFromContainerSlot(container, idx) {
    this.tryEquipFromContainerSlotReplace(container, idx);
  }

  _scanAutoEquipAllEmpty() {
    for (const sk of EQ_SLOTS) {
      if (this.equipped[sk]) continue;
      for (const container of [this.hotbar, this.slots]) {
        for (let i = 0; i < container.length; i++) {
          const s = container[i];
          if (!s) continue;
          const d = ITEMS[s.id];
          if (d && itemFitsEquipSlot(d, sk) && canPlayerEquipItem(d, player).ok) {
