function islandWorldCenter(isl) {
  return { cx: isl.cx + ISLAND_OFFSET_X, cy: isl.cy + ISLAND_OFFSET_Y };
}

function islandNormalizedDistance(isl, c, r) {
  const ctr = islandWorldCenter(isl);
  const dx = c - ctr.cx, dy = r - ctr.cy;
  const rx = isl.rx != null ? isl.rx : isl.r;
  const ry = isl.ry != null ? isl.ry : isl.r;
  const ang = Math.atan2(dy / Math.max(1, ry), dx / Math.max(1, rx));
  const coastNoise = fbm((ctr.cx + Math.cos(ang) * 17) * 0.075, (ctr.cy + Math.sin(ang) * 17) * 0.075, 3);
  const rough = (coastNoise - 0.5) * 0.32;
  const wobble = Math.sin(ang * 3.2 + ctr.cx * 0.02) * 0.08 + Math.cos(ang * 5.1 + ctr.cy * 0.02) * 0.06;
  const edgeMul = Math.max(0.72, 1 + rough + wobble);
  const ex = dx / (rx * edgeMul);
  const ey = dy / (ry * edgeMul);
  return Math.sqrt(ex * ex + ey * ey);
}

function islandInfluence(c, r) {
  let best = 9999;
  for (const isl of ISLANDS) {
    const rx = isl.rx != null ? isl.rx : isl.r;
    const ry = isl.ry != null ? isl.ry : isl.r;
    const e = islandNormalizedDistance(isl, c, r);
    const d = (e - 1) * Math.min(rx, ry);
    if (d < best) best = d;
  }
  return best;
}

function islandCellOwner(c, r) {
  let best = null, bestE = 999;
  for (const isl of ISLANDS) {
    const e = islandNormalizedDistance(isl, c, r);
    if (e < 1 && e < bestE) {
      bestE = e;
      best = isl;
    }
  }
  return best;
}

function paintDisk(ground, detail, cx, cy, rad, tile, clearDetail) {
  const r2 = rad * rad;
  const minR = Math.max(0, Math.floor(cy - rad));
  const maxR = Math.min(WORLD_ROWS - 1, Math.ceil(cy + rad));
  const minC = Math.max(0, Math.floor(cx - rad));
  const maxC = Math.min(WORLD_COLS - 1, Math.ceil(cx + rad));
  for (let rr = minR; rr <= maxR; rr++) {
    for (let cc = minC; cc <= maxC; cc++) {
      const dx = cc - cx;
      const dy = rr - cy;
      if (dx * dx + dy * dy > r2) continue;
      const idx = rr * WORLD_COLS + cc;
      if (tile != null) ground[idx] = tile;
      if (clearDetail) detail[idx] = -1;
    }
  }
}

function carveSplinePath(ground, detail, pts, brush, tile, clearDetail) {
  if (!pts || pts.length < 2) return;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    const len = Math.max(Math.abs(b.x - a.x), Math.abs(b.y - a.y));
    const steps = Math.max(8, len * 2);
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const x = a.x + (b.x - a.x) * t;
      const y = a.y + (b.y - a.y) * t;
      const wob = (noise2D(x * 0.08 + i * 7.1, y * 0.08 + i * 9.3) - 0.5) * 2;
      const meanderX = Math.sin(y * 0.06 + i * 3.7) * 1.6 + Math.cos(t * 6.2 + i) * 1.0;
      const meanderY = Math.cos(x * 0.06 + i * 2.3) * 1.6 + Math.sin(t * 5.1 + i) * 1.0;
      const rr = brush + wob * 1.8;
      paintDisk(ground, detail, x + meanderX, y + meanderY, Math.max(1.2, rr), tile, clearDetail);
    }
  }
}

function applyWorldDesignPass(ground, detail) {
  const vx = VOX + Math.floor(VCOLS / 2);
  const vy = VOY + Math.floor(VROWS / 2);

  // Ana yollar: köyden kuzey, doğu ve güney iskele bağlantısı.
  carveSplinePath(ground, detail, [
    { x: vx, y: vy + 2 }, { x: vx + 10, y: vy + 10 }, { x: vx + 24, y: vy + 32 }, { x: vx + 42, y: vy + 56 },
  ], 2.2, T.DIRT, true);
  carveSplinePath(ground, detail, [
    { x: vx - 2, y: vy }, { x: vx - 18, y: vy - 8 }, { x: vx - 36, y: vy - 20 }, { x: vx - 54, y: vy - 32 },
  ], 2.4, T.DIRT, true);
  carveSplinePath(ground, detail, [
    { x: vx + 1, y: vy + 4 }, { x: vx + 3, y: vy + 20 }, { x: vx + 4, y: vy + 40 }, { x: vx + 5, y: vy + 58 },
  ], 1.9, T.STONE_FLOOR, true);

  // Daha organik nehirler: ek kontrol noktaları + kıvrım.
  carveSplinePath(ground, detail, [
    { x: ISLAND_OFFSET_X + 40, y: ISLAND_OFFSET_Y + 86 },
    { x: ISLAND_OFFSET_X + 90, y: ISLAND_OFFSET_Y + 104 },
    { x: ISLAND_OFFSET_X + 132, y: ISLAND_OFFSET_Y + 114 },
    { x: ISLAND_OFFSET_X + 180, y: ISLAND_OFFSET_Y + 96 },
    { x: ISLAND_OFFSET_X + 220, y: ISLAND_OFFSET_Y + 98 },
    { x: ISLAND_OFFSET_X + 270, y: ISLAND_OFFSET_Y + 118 },
    { x: ISLAND_OFFSET_X + 322, y: ISLAND_OFFSET_Y + 126 },
    { x: ISLAND_OFFSET_X + 380, y: ISLAND_OFFSET_Y + 108 },
    { x: ISLAND_OFFSET_X + 430, y: ISLAND_OFFSET_Y + 112 },
  ], 3.2, T.WATER, true);
  carveSplinePath(ground, detail, [
    { x: ISLAND_OFFSET_X + 66, y: ISLAND_OFFSET_Y + 226 },
    { x: ISLAND_OFFSET_X + 110, y: ISLAND_OFFSET_Y + 236 },
    { x: ISLAND_OFFSET_X + 156, y: ISLAND_OFFSET_Y + 212 },
    { x: ISLAND_OFFSET_X + 210, y: ISLAND_OFFSET_Y + 256 },
    { x: ISLAND_OFFSET_X + 272, y: ISLAND_OFFSET_Y + 244 },
    { x: ISLAND_OFFSET_X + 340, y: ISLAND_OFFSET_Y + 218 },
    { x: ISLAND_OFFSET_X + 404, y: ISLAND_OFFSET_Y + 228 },
  ], 3.6, T.WATER, true);

  // Kıyı parlatma + çiçek çayırları + dekoratif kayalar.
  for (let r = 1; r < WORLD_ROWS - 1; r++) {
    for (let c = 1; c < WORLD_COLS - 1; c++) {
      const idx = r * WORLD_COLS + c;
      const t = ground[idx];
      if (t !== T.GRASS && t !== T.TALL_GRASS && t !== T.DIRT) continue;
      let waterN = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const n = ground[(r + dr) * WORLD_COLS + (c + dc)];
          if (n === T.WATER) waterN++;
        }
      }
      const beachN = fbm(c * 0.18 + 5.5, r * 0.18 + 13.3, 2);
      const beachThresh = 0.52 + beachN * 0.38;
      if (waterN >= 2 && hashXY(c * 11 + 7, r * 13 + 17) < beachThresh) {
        ground[idx] = T.SAND;
        detail[idx] = -1;
      } else if (waterN === 0 && hashXY(c * 5 + 3, r * 9 + 1) < 0.008 && t === T.GRASS) {
        detail[idx] = T.FLOWER;
      } else if (waterN === 0 && hashXY(c * 7 + 2, r * 6 + 9) < 0.008 && t !== T.SNOW && t !== T.STONE_FLOOR) {
        detail[idx] = T.TREE;
      }
      // Dekoratif kaya parçaları (kıyı ve çorak alanlarda)
      if ((t === T.DIRT || t === T.SAND) && detail[idx] === -1 && hashXY(c * 19 + 41, r * 23 + 37) < 0.015) {
        detail[idx] = T.STONE_FLOOR;
      }
    }
  }
}

function enrichWorldDetails(ground, detail) {
  for (let r = 1; r < WORLD_ROWS - 1; r++) {
    for (let c = 1; c < WORLD_COLS - 1; c++) {
      const idx = r * WORLD_COLS + c;
      const t = ground[idx];
      if (t === T.WATER || t === T.WALL) continue;
      const h = hashXY(c, r);
      const fPatch = fbm(c * 0.14 + 31.7, r * 0.14 + 52.3, 3);
      const mPatch = fbm(c * 0.22 + 11.1, r * 0.22 + 77.7, 2);
      // Orman kümeleri: yalnız gibi duran ağaçları sil, toplu alanlara ekle
      if (detail[idx] === T.TREE) {
        if (fPatch < 0.24) detail[idx] = -1;
      } else if (detail[idx] === T.FLOWER) {
        if (mPatch < 0.45) detail[idx] = -1;
      } else if (detail[idx] === -1 && (t === T.GRASS || t === T.TALL_GRASS)) {
        if (fPatch > 0.52 && h < 0.18) detail[idx] = T.TREE;
        else if (mPatch > 0.62 && h < 0.26) detail[idx] = T.FLOWER;
      }
      // Çorak/kaya alanlara dekoratif taşlar
      if (detail[idx] === -1 && (t === T.DIRT || t === T.STONE_FLOOR || t === T.SAND)) {
        const rockPatch = fbm(c * 0.18 + 61.3, r * 0.18 + 29.1, 2);
        if (rockPatch > 0.68 && h < 0.12) detail[idx] = T.STONE_FLOOR;
      }
    }
  }
}

function buildWorldBridges(ground, detail) {
  // Yatay köprüler: 2-4 karo genişliğinde su kanalları
  for (let r = 2; r < WORLD_ROWS - 2; r++) {
    for (let c = 2; c < WORLD_COLS - 5; c++) {
      if (ground[r * WORLD_COLS + c] !== T.WATER) continue;
      let w = 0;
      while (c + w < WORLD_COLS - 1 && ground[r * WORLD_COLS + c + w] === T.WATER) w++;
      if (w >= 2 && w <= 4) {
        const left = ground[r * WORLD_COLS + c - 1];
        const right = ground[r * WORLD_COLS + c + w];
        if (left !== T.WATER && right !== T.WATER && left !== T.WALL && right !== T.WALL) {
          if (hashXY(c, r) < 0.06) {
            for (let i = 0; i < w; i++) {
              ground[r * WORLD_COLS + c + i] = T.BRIDGE;
              detail[r * WORLD_COLS + c + i] = -1;
            }
          }
        }
      }
      c += Math.max(1, w);
    }
  }

  // Dikey köprüler
  for (let c = 2; c < WORLD_COLS - 2; c++) {
    for (let r = 2; r < WORLD_ROWS - 5; r++) {
      if (ground[r * WORLD_COLS + c] !== T.WATER) continue;
      let h = 0;
      while (r + h < WORLD_ROWS - 1 && ground[(r + h) * WORLD_COLS + c] === T.WATER) h++;
      if (h >= 2 && h <= 4) {
        const top = ground[(r - 1) * WORLD_COLS + c];
        const bottom = ground[(r + h) * WORLD_COLS + c];
        if (top !== T.WATER && bottom !== T.WATER && top !== T.WALL && bottom !== T.WALL) {
          if (hashXY(c + 1000, r) < 0.06) {
            for (let i = 0; i < h; i++) {
              ground[(r + i) * WORLD_COLS + c] = T.BRIDGE;
              detail[(r + i) * WORLD_COLS + c] = -1;
            }
          }
        }
      }
      r += Math.max(1, h);
    }
  }

  // Yakın adaları birbirine bağla
  const centers = ISLANDS.map(isl => islandWorldCenter(isl));
  for (let i = 0; i < centers.length; i++) {
    for (let j = i + 1; j < centers.length; j++) {
      const dx = centers[j].cx - centers[i].cx;
      const dy = centers[j].cy - centers[i].cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 28 && dist > 6 && hashXY(i * 31 + j * 17, i * 13 + j * 29) < 0.35) {
        const steps = Math.max(1, Math.floor(dist));
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const bx = Math.round(centers[i].cx + dx * t);
          const by = Math.round(centers[i].cy + dy * t);
          if (bx >= 0 && bx < WORLD_COLS && by >= 0 && by < WORLD_ROWS) {
            const idx = by * WORLD_COLS + bx;
            if (ground[idx] === T.WATER) {
              ground[idx] = T.BRIDGE;
              detail[idx] = -1;
            }
          }
        }
      }
    }
  }
}

function generateWorld() {
  const ground = new Array(WORLD_COLS * WORLD_ROWS);
  const detail = new Array(WORLD_COLS * WORLD_ROWS);
  const centerX = WORLD_COLS / 2, centerY = WORLD_ROWS / 2;
  const mainR = Math.floor(Math.min(WORLD_COLS, WORLD_ROWS) * 0.42);
  const mainOuterR = mainR + 34;

  for (let r = 0; r < WORLD_ROWS; r++) {
    for (let c = 0; c < WORLD_COLS; c++) {
      const idx = r * WORLD_COLS + c;
      const vc = c - VOX, vr = r - VOY;

      if (vc >= 0 && vc < VCOLS && vr >= 0 && vr < VROWS) {
        ground[idx] = ORIG_GROUND[vr * VCOLS + vc];
        detail[idx] = ORIG_DETAIL[vr * VCOLS + vc];
        continue;
      }

      const dxC = (c - centerX) / (WORLD_COLS * 0.45);
      const dyC = (r - centerY) / (WORLD_ROWS * 0.45);
      const distEdge = Math.sqrt(dxC * dxC + dyC * dyC);

      const dxM = c - centerX, dyM = r - centerY;
      const distMain = Math.sqrt(dxM * dxM + dyM * dyM);

      const islDist = islandInfluence(c, r);
      const onIsland = islDist < 0;
      const islandCoast = islDist >= 0 && islDist < 4;

      const nx = c / 40, ny = r / 30;
      const elevation = fbm(nx + 0.3, ny + 0.7, 4);
      const moisture = fbm(nx * 1.3 + 50, ny * 1.3 + 50, 3);
      const ridge = fbm(nx * 0.55 + 20.1, ny * 0.55 + 73.6, 5);
      const heat = fbm(nx * 0.8 + 99.4, ny * 0.8 + 14.8, 3);
      const h = hashXY(c, r);

      let tile, det = -1;

      if (distMain < mainR && !onIsland) {
        const rim = mainR - distMain;
        if (rim < 7) {
          tile = T.SAND;
          if (h < 0.015) det = T.FLOWER;
        } else if (moisture > 0.5 || ridge > 0.48) {
          tile = T.TALL_GRASS;
          if (h < 0.06) det = T.TREE;
          else if (h < 0.12) det = T.FLOWER;
        } else {
          tile = T.GRASS;
          if (h < 0.05) det = T.TREE;
          else if (h < 0.1) det = T.FLOWER;
        }
      } else if (distMain < mainOuterR && !onIsland && !islandCoast) {
        if (elevation < 0.32 || moisture > 0.72) {
          tile = T.WATER;
        } else if (elevation < 0.37) {
          tile = T.SAND;
        } else {
          tile = moisture > 0.5 ? T.TALL_GRASS : T.GRASS;
          if (h < 0.035) det = T.TREE;
          else if (h < 0.07) det = T.FLOWER;
        }
      } else if (distEdge > 0.99 && !onIsland && !islandCoast) {
        tile = T.WATER;
      } else if (distMain > mainOuterR && !onIsland && !islandCoast) {
        const fade = (distMain - mainOuterR) / 15;
        if (fade > 1 + (elevation - 0.4) * 3) {
          tile = T.WATER;
        } else if (fade > 0.8 + (elevation - 0.4) * 2) {
          tile = T.SAND;
        } else {
          tile = elevation > 0.6 ? T.GRASS : T.SAND;
          if (h < 0.02 && tile === T.GRASS) det = T.TREE;
        }
      } else if (islandCoast) {
        tile = T.SAND;
      } else if (onIsland) {
        const isl = islandCellOwner(c, r);
        const biome = isl && isl.biome ? isl.biome : "forest";
        const iElev = elevation * 0.55 + 0.42;
        const h2 = hashXY(c * 3 + 17, r * 3 + 31);
        if (biome === "snow") {
          if (iElev > 0.78) {
            tile = T.STONE_FLOOR;
            if (h2 < 0.025) det = T.TREE;
          } else {
            tile = T.SNOW;
            if (h2 < 0.03) det = T.TREE;
            else if (h2 < 0.06) det = T.FLOWER;
          }
        } else if (biome === "desert" || biome === "mesa") {
          tile = h2 < 0.42 ? T.SAND : T.DIRT;
          if (h2 < 0.025 && tile === T.DIRT) det = T.FLOWER;
          if (biome === "mesa" && iElev > 0.72) {
            tile = T.STONE_FLOOR;
            if (h2 < 0.025) det = T.TREE;
          }
        } else if (biome === "rain" || biome === "jungle") {
          tile = moisture > 0.42 ? T.TALL_GRASS : T.GRASS;
          if (h2 < 0.07) det = T.TREE;
          else if (h2 < 0.14) det = T.FLOWER;
        } else if (biome === "storm") {
          tile = iElev > 0.7 ? T.STONE_FLOOR : T.DIRT;
          if (h2 < 0.04) det = T.TREE;
        } else if (biome === "volcanic") {
          tile = iElev > 0.65 ? T.STONE_FLOOR : T.DIRT;
          if (h2 < 0.03) det = T.TREE;
          else if (h2 < 0.06 && tile === T.DIRT) det = T.FLOWER;
        } else if (biome === "barren") {
          if (iElev > 0.74) {
            tile = T.STONE_FLOOR;
            if (h2 < 0.03) det = T.TREE;
          } else {
            tile = T.DIRT;
            if (h2 < 0.03) det = T.FLOWER;
          }
        } else {
          if (iElev > 0.75) { tile = T.STONE_FLOOR; if (h < 0.03) det = T.TREE; }
          else if (moisture > 0.5) { tile = T.TALL_GRASS; if (h < 0.06) det = T.TREE; else if (h < 0.12) det = T.FLOWER; }
          else { tile = T.GRASS; if (h < 0.04) det = T.TREE; else if (h < 0.08) det = T.FLOWER; }
        }
      } else {
        if (elevation < 0.24 || (ridge < 0.24 && moisture > 0.5)) {
          tile = T.WATER;
        } else if (elevation < 0.31) {
          tile = T.SAND;
        } else if (elevation > 0.77 || ridge > 0.84) {
          tile = T.WALL;
        } else if (elevation > 0.68) {
          tile = T.STONE_FLOOR;
          if (h < 0.035) det = T.TREE;
        } else if (moisture > 0.62) {
          tile = T.TALL_GRASS;
          if (h < 0.045) det = T.TREE;
          else if (h < 0.09) det = T.FLOWER;
        } else if (moisture < 0.34 || heat > 0.72) {
          tile = T.DIRT;
          if (h < 0.025) det = T.FLOWER;
        } else {
          tile = T.GRASS;
          if (h < 0.025) det = T.TREE;
          else if (h < 0.05) det = T.FLOWER;
        }
      }

      ground[idx] = tile;
      detail[idx] = det;
    }
  }

  applyWorldDesignPass(ground, detail);
  enrichWorldDetails(ground, detail);
  buildWorldBridges(ground, detail);

  const dockCol = VOX + 20;
  const gateVC = dockCol - VOX;
  for (let dc = -2; dc <= 2; dc++) {
    const c = dockCol + dc;
    for (let vr = VROWS - 1; vr >= VROWS - 2; vr--) {
      const idx = (VOY + vr) * WORLD_COLS + c;
      if (ground[idx] === T.WALL) { ground[idx] = T.DIRT; detail[idx] = -1; }
    }
  }
  for (let r = VOY + VROWS; r <= VOY + VROWS + 3; r++) {
    for (let dc = -2; dc <= 2; dc++) {
      const c = dockCol + dc;
      const idx = r * WORLD_COLS + c;
      ground[idx] = T.DIRT; detail[idx] = -1;
    }
  }

  const dockStartRow = VOY + VROWS + 2;

  for (let r = dockStartRow - 2; r <= dockStartRow + 1; r++) {
    for (let c = dockCol - 3; c <= dockCol + 3; c++) {
      const idx = r * WORLD_COLS + c;
      if (ground[idx] !== T.BRIDGE) { ground[idx] = T.SAND; detail[idx] = -1; }
    }
  }

  let dockEnd = dockStartRow;
  for (let r = dockStartRow; r < WORLD_ROWS - 1; r++) {
    const idx = r * WORLD_COLS + dockCol;
    if (r > dockStartRow + 3 && ground[idx] === T.WATER) {
      const ahead1 = (r + 2 < WORLD_ROWS) ? ground[(r + 2) * WORLD_COLS + dockCol] : T.WATER;
      const ahead2 = (r + 4 < WORLD_ROWS) ? ground[(r + 4) * WORLD_COLS + dockCol] : T.WATER;
      if (ahead1 === T.WATER && ahead2 === T.WATER) { dockEnd = r + 4; break; }
    }
    dockEnd = r + 1;
  }
  dockEnd = Math.min(dockEnd, WORLD_ROWS - 3);

  for (let r = dockStartRow; r <= dockEnd; r++) {
    for (let dc = -1; dc <= 1; dc++) {
      const c = dockCol + dc;
      const idx = r * WORLD_COLS + c;
      ground[idx] = T.BRIDGE;
      detail[idx] = -1;
    }
  }

  for (let dc = -3; dc <= 3; dc++) {
    const idx1 = dockEnd * WORLD_COLS + (dockCol + dc);
    const idx2 = (dockEnd - 1) * WORLD_COLS + (dockCol + dc);
    ground[idx1] = T.BRIDGE; detail[idx1] = -1;
    ground[idx2] = T.BRIDGE; detail[idx2] = -1;
  }

  return { ground, detail, dockEnd, dockCol };
}

/* ── Boat Craft Panel ───────────────────────────────────── */

const BOAT_RECIPE = { wood: 15, stone: 5, rope: 3 };

class CraftPanel {
  constructor() {
    this.open = false;
    this.feedbackText = "";
    this.feedbackTimer = 0;
    this.feedbackColor = "#50e050";
  }

  toggle() { this.open = !this.open; }
  close()  { this.open = false; }

  update(dt) {
    if (this.feedbackTimer > 0) this.feedbackTimer -= dt;
  }

  _showFeedback(text, color) {
    this.feedbackText = text;
    this.feedbackTimer = 2;
    this.feedbackColor = color || "#50e050";
  }

  canCraft(inv) {
    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      if (inv.countItem(item) < need) return false;
    }
    return true;
  }

  craft(inv, player) {
    if (player.hasBoat) {
      this._showFeedback("Zaten bir teknen var!", "#d0a030");
      return;
    }
    if (!this.canCraft(inv)) {
      this._showFeedback("Yeterli malzemen yok!", "#d04040");
      return;
    }
    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      inv.removeItem(item, need);
    }
    player.hasBoat = true;
    this._showFeedback("Tekne in\u015fa edildi!", "#50e050");
  }

  _panelLayout(cw, ch) {
    const b = uiModalBounds(cw, ch);
    const panW = Math.min(280, b.maxW);
    const panH = Math.min(220, b.maxH);
    const px = Math.floor((cw - panW) / 2);
    const py = Math.max(b.top, Math.min(ch - panH - b.bottom, Math.floor((ch - panH) / 2)));
    return { panW, panH, px, py };
  }

  handleClick(mx, my, canvasW, canvasH, inv, player) {
    if (!this.open) return;
    const { panW, panH, px, py } = this._panelLayout(canvasW, canvasH);

    const btnW = 120, btnH = 30;
    const btnX = px + (panW - btnW) / 2, btnY = py + panH - 50;
    if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
      this.craft(inv, player);
    }
  }

  render(ctx, canvasW, canvasH, inv, player) {
    if (!this.open) return;
    const { panW, panH, px, py } = this._panelLayout(canvasW, canvasH);

    ctx.fillStyle = "rgba(10,10,30,0.92)";
    ctx.strokeStyle = "#6080c0"; ctx.lineWidth = 2;
    roundRect(ctx, px, py, panW, panH, 10);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#80c0ff"; ctx.font = "bold 16px monospace";
    const title = "\u2693 Tekne Yap\u0131m\u0131";
    ctx.fillText(title, px + (panW - ctx.measureText(title).width) / 2, py + 28);

    let iy = py + 50;
    ctx.font = "13px monospace";
    ctx.fillStyle = "#c0c0d0";
    ctx.fillText("Gerekli malzemeler:", px + 20, iy); iy += 22;

    for (const [item, need] of Object.entries(BOAT_RECIPE)) {
      const have = inv.countItem(item);
      const enough = have >= need;
      drawItemIconFancy(ctx, item, px + 22, iy - 10, 18, {});
      ctx.fillStyle = enough ? "#50e050" : "#d04040";
      ctx.font = "13px monospace";
      ctx.fillText(ITEMS[item].name + ": " + have + " / " + need, px + 46, iy + 2);
      ctx.fillStyle = enough ? "#50e050" : "#d04040";
      ctx.fillText(enough ? " \u2714" : " \u2718", px + panW - 28, iy + 2);
      iy += 26;
    }

    if (player.hasBoat) {
      ctx.fillStyle = "#50e050"; ctx.font = "bold 13px monospace";
      ctx.fillText("\u2713 Teknen haz\u0131r! \u0130skelede k\u0131y\u0131ya gel, bindi\u011finde a\u00e7\u0131l\u0131rs\u0131n.", px + 22, iy + 14);
    } else {
      const btnW = Math.min(120, panW - 24), btnH = 30;
      const btnX = px + (panW - btnW) / 2, btnY = py + panH - 50;
      const canBuild = this.canCraft(inv);
      ctx.fillStyle = canBuild ? "rgba(50,120,50,0.9)" : "rgba(60,60,60,0.8)";
      roundRect(ctx, btnX, btnY, btnW, btnH, 6);
      ctx.fill();
      ctx.strokeStyle = canBuild ? "#60d060" : "#606060"; ctx.lineWidth = 1;
      roundRect(ctx, btnX, btnY, btnW, btnH, 6);
      ctx.stroke();
      ctx.fillStyle = canBuild ? "#f0f0f0" : "#808080";
      ctx.font = "bold 14px monospace";
      ctx.fillText("\u{1F6E0} \u0130n\u015fa Et", btnX + 16, btnY + 20);
    }

    if (this.feedbackTimer > 0) {
      const alpha = Math.min(1, this.feedbackTimer / 0.5);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.feedbackColor; ctx.font = "bold 14px monospace";
      ctx.fillText(this.feedbackText, px + panW / 2 - ctx.measureText(this.feedbackText).width / 2, py + panH + 20);
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = "#707090"; ctx.font = "10px monospace";
    ctx.fillText("Esc kapat", px + panW - 58, py + panH - 8);
  }
}

class Minimap {
  constructor(map) {
    this.visible = true;
    this.scale = 1;
    this.mapW = map.cols;
    this.mapH = map.rows;
    const maxDim = Math.max(this.mapW, this.mapH);
    if (maxDim > 200) this.scale = 200 / maxDim;
    this.w = Math.ceil(this.mapW * this.scale);
    this.h = Math.ceil(this.mapH * this.scale);
    this.offscreen = document.createElement("canvas");
    this.offscreen.width = this.w;
    this.offscreen.height = this.h;
    this._bakeMap(map);
  }

  _bakeMap(map) {
    const oc = this.offscreen.getContext("2d");
    const imgData = oc.createImageData(this.w, this.h);
    const d = imgData.data;

    const MINI_COLORS = {
      [T.GRASS]: [74,140,63], [T.DIRT]: [139,107,61], [T.WATER]: [49,114,184],
      [T.SAND]: [212,188,106], [T.STONE_FLOOR]: [138,138,138], [T.WALL]: [60,60,60],
      [T.TREE]: [30,90,20], [T.FLOWER]: [74,140,63], [T.BRIDGE]: [122,92,48],
      [T.TALL_GRASS]: [55,120,45],
      [T.SNOW]: [200,220,235],
    };

    for (let py = 0; py < this.h; py++) {
      for (let px = 0; px < this.w; px++) {
        const mc = Math.floor(px / this.scale);
        const mr = Math.floor(py / this.scale);
        let tile = map.getTile(mc, mr);
        const det = map.getDetail(mc, mr);
        if (det === T.TREE) tile = T.TREE;
        const rgb = MINI_COLORS[tile] || [255, 0, 255];
        const i = (py * this.w + px) * 4;
        d[i] = rgb[0]; d[i+1] = rgb[1]; d[i+2] = rgb[2]; d[i+3] = 255;
      }
    }
    oc.putImageData(imgData, 0, 0);
  }

  toggle() { this.visible = !this.visible; }

  render(ctx, canvasW, canvasH, cam, player, npcs, wildPets, activePet) {
    if (!this.visible) return;
    const mob = touchState.mobileUI;
    const corner = mob ? 2 : 10;
    const sideReserve = mob ? 0 : MOBILE_MINIMAP_RIGHT_RESERVE_PX;
    const dx = canvasW - this.w - corner - 4 - sideReserve;
    const dy = corner;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    roundRect(ctx, dx - 4, dy - 4, this.w + 8, this.h + 8, 6);
    ctx.fill();
    ctx.strokeStyle = "#606080"; ctx.lineWidth = 1;
    roundRect(ctx, dx - 4, dy - 4, this.w + 8, this.h + 8, 6);
    ctx.stroke();

    ctx.drawImage(this.offscreen, dx, dy);

    const vpx = dx + cam.x / TILE_SIZE * this.scale;
    const vpy = dy + cam.y / TILE_SIZE * this.scale;
    const vpw = cam.viewW / TILE_SIZE * this.scale;
    const vph = cam.viewH / TILE_SIZE * this.scale;
    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
    ctx.strokeRect(vpx, vpy, vpw, vph);

    for (const npc of npcs) {
      ctx.fillStyle = npc.color;
      ctx.fillRect(dx + npc.x / TILE_SIZE * this.scale - 1, dy + npc.y / TILE_SIZE * this.scale - 1, 3, 3);
    }
    for (const wp of wildPets) {
      if (!wp.alive) continue;
      ctx.fillStyle = "#ff80a0";
      ctx.fillRect(dx + wp.x / TILE_SIZE * this.scale - 1, dy + wp.y / TILE_SIZE * this.scale - 1, 2, 2);
    }
    if (activePet) {
      ctx.fillStyle = "#f0d050";
      ctx.fillRect(dx + activePet.x / TILE_SIZE * this.scale - 1, dy + activePet.y / TILE_SIZE * this.scale - 1, 3, 3);
    }

    const blink = Math.sin(Date.now() / 250) > 0;
    ctx.fillStyle = blink ? "#fff" : "#ff4040";
    const px = dx + player.centerX / TILE_SIZE * this.scale;
    const py2 = dy + player.centerY / TILE_SIZE * this.scale;
    ctx.fillRect(px - 2, py2 - 2, 4, 4);

    for (const isl of ISLANDS) {
      const ctr = islandWorldCenter(isl);
      const ix = dx + ctr.cx * this.scale;
      const iy = dy + ctr.cy * this.scale;
      ctx.fillStyle = "rgba(255,200,80,0.6)";
      ctx.font = "7px monospace";
      ctx.fillText("\u25C6", ix - 3, iy + 3);
    }

    if (worldData.dockCol && worldData.dockEnd) {
      const dkx = dx + worldData.dockCol * this.scale;
      const dky = dy + (VOY + VROWS + 2) * this.scale;
      const dkh = (worldData.dockEnd - VOY - VROWS - 2) * this.scale;
      ctx.fillStyle = "#a08040";
      ctx.fillRect(dkx - 1, dky, 3, dkh);
      ctx.fillStyle = "#80c0ff";
      ctx.font = "7px monospace";
      ctx.fillText("\u2693", dkx - 4, dky - 2);
    }

    ctx.fillStyle = "#888"; ctx.font = "9px monospace";
    ctx.fillText("[M]", dx, dy + this.h + 12);
  }
}

function findBossSpawn(isl) {
  const ctr = islandWorldCenter(isl);
  const rx = isl.rx != null ? isl.rx : isl.r;
  const tries = [
    [0, 0], [2, 0], [-2, 0], [0, 2], [0, -2], [3, 2], [-2, 3], [4, 0], [0, 4], [-3, -2],
    [Math.floor(rx * 0.35), 0], [0, Math.floor((isl.ry || isl.r) * 0.3)], [-Math.floor(rx * 0.3), 1],
    [1, 3], [-4, 0], [0, -4], [5, -2], [-5, 2],
  ];
  for (const [ox, oy] of tries) {
    const mc = Math.floor(ctr.cx + ox), mr = Math.floor(ctr.cy + oy);
    if (mc >= 0 && mc < WORLD_COLS && mr >= 0 && mr < WORLD_ROWS && isSafeSpawn(mc, mr))
      return { col: mc, row: mr };
  }
  return null;
}

function tryAttemptInventoryUpgrade(slot, def) {
  if (!slot || !def) return { ok: false, msg: "Ge\u00e7ersiz." };
  const lv = getStackUpgradeLv(slot);
  if (!itemCanUpgrade(def)) return { ok: false, msg: "Bu e\u015fya y\u00fckseltilemez." };
  if (lv >= MAX_ITEM_UPGRADE) return { ok: false, msg: "Maksimum g\u00fc\u00e7lendirme (+" + MAX_ITEM_UPGRADE + ")." };
  const cost = upgradeGoldCost(def, lv);
  if (inventory.gold < cost) {
    return { ok: false, msg: formatGold(cost) + " alt\u0131n gerekli." };
  }
  inventory.gold -= cost;
  const pct = upgradeSuccessPct(lv);
  if (Math.random() >= pct) {
    return {
      ok: false,
      fail: true,
      msg: "Ba\u015far\u0131s\u0131z! (bir sonraki: %" + Math.round(pct * 100) + " \u015fans)",
    };
  }
  slot.upgrade = lv + 1;
  return { ok: true, msg: "Y\u00fckseltme ba\u015far\u0131l\u0131! (+" + (lv + 1) + ")" };
}

function openInventorySlotInspect(kind, idx) {
  let slot = null;
  if (kind === "eq") slot = inventory.equipped[idx];
  else {
    const container = kind === "slots" ? inventory.slots : inventory.hotbar;
    slot = container[idx];
  }
  if (!slot || slot.count <= 0) return;
  if (worldItemInspect) closeWorldItemInspect();
  inventorySlotInspect = { kind, idx };
  inventoryInspectScrollY = 0;
  inventoryInspectScrollMax = 0;
  inventoryInspectScrollTouchId = -1;
  inventoryInspectScrollLastY = 0;
  inventoryInspectScrollRect = null;
}

function tryOpenBossChestInContainer(inv, container, idx) {
  const slot = container[idx];
  if (!slot || slot.id !== "boss_chest" || slot.count <= 0) return false;
  slot.count--;
  if (slot.count <= 0) container[idx] = null;
  const pool = [
    "helm_epic", "chest_epic", "boots_epic", "waist_epic", "arms_epic", "wings_epic",
    "helm_legendary", "chest_legendary", "waist_legendary", "arms_legendary", "wings_legendary",
        "ring_power", "merchants_ring", "amulet_wisdom", "gloves_archer", "explorer_band", "cloak_shadow", "shoulder_guard", "earring_focus", "bracelet_titan", "talisman_void", "artifact_dragon_eye",
    "sword_elven", "spear_epic", "bow_long", "bow_storm_legendary", "bow_dragon_legendary", "sword_steel", "bow_hunter", "potion_mana", "potion"
  ];
  inv.addItem(pool[Math.floor(Math.random() * pool.length)], 1);
  pickupMsgText = "Boss Sandigi acildi!";
  pickupMsgTimer = 1.1;
  gameAudio.playPickup();
  return true;
}

function dropInventorySlotStackToWorld(kind, idx) {
  const fromEquip = kind === "eq";
  const container = fromEquip ? inventory.equipped : (kind === "slots" ? inventory.slots : inventory.hotbar);
  const slot = container[idx];
  if (!slot || slot.count <= 0) return false;
  const baseCol = Math.floor(player.centerX / TILE_SIZE);
  const baseRow = Math.floor(player.centerY / TILE_SIZE);
  const offs = [[0, 0], [1, 0], [-1, 0], [0, 1], [0, -1], [2, 0], [-2, 0], [0, 2], [0, -2], [1, 1], [-1, -1], [1, -1], [-1, 1]];
  for (const [dx, dy] of offs) {
    const c = baseCol + dx, r = baseRow + dy;
    if (c < 0 || r < 0 || c >= map.cols || r >= map.rows) continue;
    if (map.isSolid(c, r, player.inBoat)) continue;
    const dropCount = fromEquip ? 1 : slot.count;
    const wi = new WorldItem(c, r, slot.id, dropCount, false);
    const u = getStackUpgradeLv(slot);
    if (u > 0) wi.upgrade = u;
    worldItems.push(wi);
    if (fromEquip || slot.count <= dropCount) container[idx] = null;
    else slot.count -= dropCount;
    return true;
  }
  pickupMsgText = "Buraya b\u0131rak\u0131lam\u0131yor!";
  pickupMsgTimer = 1.4;
  return false;
}

function inventorySlotInspectLayout(cw, ch) {
  const b = uiModalBounds(cw, ch);
  const land = cw > ch * 1.02;
  const pw = Math.min(land ? 430 : 320, b.maxW);
  const ph = Math.min(land ? 500 : 430, b.maxH);
  const px = Math.floor((cw - pw) / 2);
  const py = Math.max(b.top, Math.min(ch - ph - b.bottom, Math.floor((ch - ph) / 2)));
  const btnH = 34;
  const btnY = py + ph - btnH - 14;
  const gap = 8;
  const nBtn = 3;
  const bw = Math.floor((pw - 32 - gap * (nBtn - 1)) / nBtn);
  const btnEquip = { x: px + 16, y: btnY, w: bw, h: btnH };
  const btnDrop = { x: px + 16 + bw + gap, y: btnY, w: bw, h: btnH };
  const btnClose = { x: px + 16 + (bw + gap) * 2, y: btnY, w: bw, h: btnH };
  const btnUpgrade = { x: px + 16, y: btnY - btnH - 10, w: pw - 32, h: btnH };
  return { px, py, pw, ph, btnEquip, btnDrop, btnClose, btnUpgrade };
}

function handleInventorySlotInspectClick(mx, my, cw, ch) {
  if (!inventorySlotInspect) return false;
  const { kind, idx } = inventorySlotInspect;
  const fromEquip = kind === "eq";
  const container = fromEquip ? inventory.equipped : (kind === "slots" ? inventory.slots : inventory.hotbar);
  const slot = container[idx];
  if (!slot || slot.count <= 0) {
    closeInventorySlotInspect();
    return true;
  }
  const L = inventorySlotInspectLayout(cw, ch);
  const inR = (r) => mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h;
  if (inR(L.btnClose)) {
    closeInventorySlotInspect();
    return true;
  }
  if (mx < L.px || mx >= L.px + L.pw || my < L.py || my >= L.py + L.ph) {
    closeInventorySlotInspect();
    return false;
  }
  if (inR(L.btnUpgrade)) {
    const defU = ITEMS[slot.id];
    const res = tryAttemptInventoryUpgrade(slot, defU);
    pickupMsgText = res.msg;
    pickupMsgTimer = 1.85;
    if (res.ok) player.applyEquipmentBonus(inventory);
    if (!res.ok && res.fail) { /* gold already spent */ }
    return true;
  }
  if (inR(L.btnDrop)) {
    if (dropInventorySlotStackToWorld(kind, idx)) {
      closeInventorySlotInspect();
      player.applyEquipmentBonus(inventory);
    }
    return true;
  }
  if (inR(L.btnEquip)) {
    if (!fromEquip && slot.id === "boss_chest") {
      tryOpenBossChestInContainer(inventory, container, idx);
      if (!container[idx] || container[idx].count <= 0) closeInventorySlotInspect();
      return true;
    }
    if (fromEquip) {
      const left = inventory.addItem(slot.id, 1, getStackUpgradeLv(slot));
      if (left > 0) {
        pickupMsgText = "Envanter dolu!";
        pickupMsgTimer = 1.3;
        return true;
      }
      inventory.equipped[idx] = null;
      player.applyEquipmentBonus(inventory);
      pickupMsgText = "Eşya çıkarıldı.";
      pickupMsgTimer = 1.1;
      closeInventorySlotInspect();
      return true;
    }
    const defE = ITEMS[slot.id];
    if (!defE || !defE.equipSlot) {
      pickupMsgText = "Bu e\u015fya giyilmez.";
      pickupMsgTimer = 1.2;
      return true;
    }
    const hadEq = !!(defE.equipSlot && inventory.equipped[defE.equipSlot]);
    const err = inventory.tryEquipFromContainerSlotReplace(container, idx);
    if (err) {
      pickupMsgText = err;
      pickupMsgTimer = 1.4;
      return true;
    }
    player.applyEquipmentBonus(inventory);
    pickupMsgText = hadEq ? "E\u015fya de\u011fi\u015ftirildi!" : "Giyildi!";
    pickupMsgTimer = 1.2;
    closeInventorySlotInspect();
    return true;
  }
  return true;
}

  const cardY = L.py + 44;
  const cardW = Math.floor((L.pw - 40) / 2);
  const cardH = 74;
  const leftX = L.px + 16;
  const rightX = leftX + cardW + 8;
  const iconS = 34;

  const drawCompareCard = (x, title, stackRef, emptyText) => {
    ctx.fillStyle = "rgba(24,30,56,0.95)";
    ctx.strokeStyle = "#6f84c8";
    roundRect(ctx, x, cardY, cardW, cardH, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#d4e0ff";
    ctx.font = "bold 10px monospace";
    ctx.fillText(title, x + 8, cardY + 14);
    if (stackRef && stackRef.id && ITEMS[stackRef.id]) {
      const d0 = ITEMS[stackRef.id];
      const up0 = getStackUpgradeLv(stackRef);
      drawItemIconFancy(ctx, stackRef.id, x + 8, cardY + 22, iconS, { timeMs: performance.now(), equipped: title.indexOf("Takili") >= 0 });
      ctx.fillStyle = "#f3e8b0";
      ctx.font = "bold 11px monospace";
      const nm = d0.name + (up0 > 0 ? " (+" + up0 + ")" : "") + (stackRef.count > 1 ? " x" + stackRef.count : "");
      const shortNm = nm.length > 15 ? (nm.slice(0, 15) + "...") : nm;
      ctx.fillText(shortNm, x + 48, cardY + 38);
      if (d0.rarity) {
        ctx.fillStyle = getItemRarityColor(stackRef.id);
        ctx.font = "10px monospace";
        ctx.fillText(RARITY_LABEL_TR[d0.rarity] || d0.rarity, x + 48, cardY + 54);
      }
    } else {
      ctx.fillStyle = "#9aa8c8";
      ctx.font = "11px monospace";
      ctx.fillText(emptyText || "Bos slot", x + 8, cardY + 44);
    }
  };

  drawCompareCard(leftX, "Secili", slot, "Esya yok");

  let cmpSlotKey = null;
  let cmpEq = null;
  if (def.equipSlot) {
    const cands = equipSlotsForItemDef(def);
    for (const sk of cands) {
      if (inventory.equipped[sk]) { cmpSlotKey = sk; break; }
    }
    if (!cmpSlotKey && cands.length) cmpSlotKey = cands[0];
    cmpEq = cmpSlotKey ? inventory.equipped[cmpSlotKey] : null;
  }
  const rightTitle = cmpSlotKey ? ("Takili (" + (EQ_LABELS[cmpSlotKey] || cmpSlotKey) + ")") : "Takili";
  drawCompareCard(rightX, rightTitle, cmpEq, "Bos slot");

  if (def.equipSlot) {
    const eqGateColor = canPlayerEquipItem(def, player).ok ? "#ffffff" : "#ff5a5a";
    ctx.fillStyle = eqGateColor;
    ctx.font = "10px monospace";
    ctx.fillText("Gerekli Seviye: " + estimateEquipRequiredLevel(def), leftX + 2, cardY + cardH + 13);
  }

  const layoutTt = buildItemTooltipLayout(ctx, def, slot.id, cw, touchState.mobileUI, { omitPrices: true, omitIdentity: true, stackRef: slot, innerMax: Math.max(200, L.pw - 40) }, []);
  let ty = cardY + cardH + 22;
  const maxY = L.btnUpgrade.y - 6;
  const allLines = layoutTt.lines;
  const scrollRes = renderInspectStatLinesScrollable(ctx, allLines, L.px + 16, ty, maxY, touchState.mobileUI, inventoryInspectScrollY, L.pw - 32);
  inventoryInspectScrollMax = scrollRes.maxScroll;
  inventoryInspectScrollY = Math.max(0, Math.min(inventoryInspectScrollMax, inventoryInspectScrollY));
  const lineH0 = scrollRes.lineH || 12;
  inventoryInspectScrollRect = {
    x: L.px + 12,
    y: ty - lineH0,
    w: L.pw - 24,
    h: Math.max(24, maxY - ty + lineH0 + 8),
  };
  if (inventoryInspectScrollMax > 0) {
    const topA = inventoryInspectScrollY > 0 ? 0.55 : 0.2;
    const botA = inventoryInspectScrollY < inventoryInspectScrollMax ? 0.55 : 0.2;
    ctx.fillStyle = "rgba(180, 195, 230, " + topA + ")";
    ctx.font = "bold 10px monospace";
    ctx.fillText("\u25b2", L.px + L.pw - 24, ty - 2);
    ctx.fillStyle = "rgba(180, 195, 230, " + botA + ")";
    ctx.fillText("\u25bc", L.px + L.pw - 24, maxY + 2);
  }

  const eqCands1 = equipSlotsForItemDef(def);
  const canUse = !fromEquip && slot.id === "boss_chest";
  const gate = canPlayerEquipItem(def, player);
  const canEq = canUse || (fromEquip ? true : eqCands1.some((sk) => {
    const curI = inventory.equipped[sk];
    return gate.ok && (!curI || curI.id !== slot.id || getStackUpgradeLv(curI) !== getStackUpgradeLv(slot));
  }));
  ctx.fillStyle = canEq ? "rgba(45,90,55,0.92)" : "rgba(45,45,58,0.75)";
  ctx.strokeStyle = canEq ? "#70c080" : "#505060";
  roundRect(ctx, L.btnEquip.x, L.btnEquip.y, L.btnEquip.w, L.btnEquip.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = canEq ? "#f0fff0" : "#707080";
  ctx.font = "bold 11px monospace";
  const tEq = canUse ? "Aç" : (fromEquip ? "Çıkar" : "Giy");
  ctx.fillText(tEq, L.btnEquip.x + (L.btnEquip.w - ctx.measureText(tEq).width) / 2, L.btnEquip.y + 22);

  ctx.fillStyle = "rgba(90,55,45,0.92)";
  ctx.strokeStyle = "#c08060";
  roundRect(ctx, L.btnDrop.x, L.btnDrop.y, L.btnDrop.w, L.btnDrop.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#ffe8e0";
  ctx.font = "bold 11px monospace";
  const tDr = "Yere at";
  ctx.fillText(tDr, L.btnDrop.x + (L.btnDrop.w - ctx.measureText(tDr).width) / 2, L.btnDrop.y + 22);

  ctx.fillStyle = "rgba(60,55,70,0.92)";
  ctx.strokeStyle = "#807090";
  roundRect(ctx, L.btnClose.x, L.btnClose.y, L.btnClose.w, L.btnClose.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#ddd";
  ctx.font = "bold 11px monospace";
  const tCl = "Kapat";
  ctx.fillText(tCl, L.btnClose.x + (L.btnClose.w - ctx.measureText(tCl).width) / 2, L.btnClose.y + 22);

  const canUp = itemCanUpgrade(def) && getStackUpgradeLv(slot) < MAX_ITEM_UPGRADE;
  const lv = getStackUpgradeLv(slot);
  const cost = canUp ? upgradeGoldCost(def, lv) : 0;
  const pct = canUp ? upgradeSuccessPct(lv) : 0;
  if (canUp) {
    ctx.fillStyle = "#9ad8a8";
    ctx.font = "10px monospace";
    ctx.fillText("Maliyet: " + formatGold(cost) + "  |  Ba\u015far\u0131: %" + Math.round(pct * 100), L.px + 16, L.btnUpgrade.y - 4);
  }
  ctx.fillStyle = canUp ? "rgba(35,85,55,0.92)" : "rgba(40,40,52,0.55)";
  ctx.strokeStyle = canUp ? "#5ec080" : "#404050";
  roundRect(ctx, L.btnUpgrade.x, L.btnUpgrade.y, L.btnUpgrade.w, L.btnUpgrade.h, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = canUp ? "#e8fff0" : "#606068";
  ctx.font = "bold 11px monospace";
  const tUp = canUp ? "Y\u00fckselt (craft)" : "Y\u00fcksetilemez";
  ctx.fillText(tUp, L.btnUpgrade.x + (L.btnUpgrade.w - ctx.measureText(tUp).width) / 2, L.btnUpgrade.y + 22);

  ctx.fillStyle = "#707890";
  ctx.font = "9px monospace";
  const hintText = canUse
    ? "Ac: sandigi acip rastgele ganimet kazanirsin."
    : (!fromEquip && def.equipSlot && !gate.ok
      ? ("Bu esya icin Seviye " + gate.needLevel + "+ gerekiyor.")

  ctx.fillText(hintText, L.px + 16, L.py + L.ph - 6);
}

const VILLAGE_CENTER_COL = VOX + Math.floor(VCOLS / 2);
const VILLAGE_CENTER_ROW = VOY + Math.floor(VROWS / 2);

function mainlandDistanceNorm(col, row) {
  const dx = col - VILLAGE_CENTER_COL;
  const dy = row - VILLAGE_CENTER_ROW;
  const d = Math.sqrt(dx * dx + dy * dy);
  return Math.max(0, Math.min(1, d / 240));
}

function mainlandPackTemplateByDistance(norm) {
  if (norm < 0.22) {
    return { tier: "normal", scale: 0.78, members: ["slime", "slime", "wolf", "slime", "wolf"] };
  }
  if (norm < 0.4) {
    return { tier: "normal", scale: 0.96, members: ["wolf", "wolf", "skeleton", "wolf", "slime"] };
  }
  if (norm < 0.58) {
    return { tier: "elite", scale: 1.2, members: ["skeleton", "orc", "ancient_root", "wolf", "skeleton"] };
  }
  if (norm < 0.76) {
    return { tier: "heroic", scale: 1.55, members: ["orc", "dark_knight", "crystalline", "vine_horror", "orc"] };
  }
  return { tier: "apex", scale: 2.0, members: ["iron_behemoth", "golem", "storm_wraith", "void_hound", "crystalline"] };
}

  const arr = TIER_MEMBER_VARIANTS[tier] || TIER_MEMBER_VARIANTS.normal;

function spawnMainlandRegionalPack(list, anchor, idxSeed) {
  const dn = mainlandDistanceNorm(anchor.col, anchor.row);
  const tpl = mainlandPackTemplateByDistance(dn);
  const members = pickTierMembers(tpl.tier, anchor.col, anchor.row);
  const ring = [
    { dc: 0, dr: 0 }, { dc: 2, dr: 0 }, { dc: -2, dr: 0 }, { dc: 0, dr: 2 },
    { dc: 0, dr: -2 }, { dc: 2, dr: 2 }, { dc: -2, dr: -2 },
  ];
  const campId = "mainland_pack_" + idxSeed;
  for (let i = 0; i < members.length; i++) {
    const p = ring[i % ring.length];
    const mc = anchor.col + p.dc;
    const mr = anchor.row + p.dr;
    if (!isSafeSpawn(mc, mr)) continue;
    let type = members[i];
    if (tpl.tier === "apex" && i === 0) {
      const roll = hashXY(mc * 13 + 7, mr * 11 + 5);
      if (roll > 0.88) type = "thunder_lord";
      else if (roll > 0.74) type = "abyss_crab";
    }
    const jitter = 0.88 + hashXY(mc * 5 + 17, mr * 7 + 31) * 0.36;
    const scale = tpl.scale * jitter;
    const role = getCampRoleByIndex(i, tpl.members.length);
    list.push(new Monster(mc, mr, type, scale, {
      campId,
      campTier: tpl.tier,
      campScale: scale,
      campRole: role,
      socialAggroRange: TILE_SIZE * (tpl.tier === "apex" ? 10 : tpl.tier === "heroic" ? 8.5 : tpl.tier === "elite" ? 7.2 : 6.4),
    }));
  }
}

function worldDistanceNorm(col, row) {
  const dx = col - VILLAGE_CENTER_COL;
  const dy = row - VILLAGE_CENTER_ROW;
  const d = Math.sqrt(dx * dx + dy * dy);
  const maxD = Math.sqrt((WORLD_COLS * 0.5) ** 2 + (WORLD_ROWS * 0.5) ** 2);
  return Math.max(0, Math.min(1, d / Math.max(1, maxD * 0.82)));
}

function islandIsolationBoost(col, row) {
  const isl = islandCellOwner(col, row);
  if (!isl) return 0;
  const rx = isl.rx != null ? isl.rx : isl.r;
  const ry = isl.ry != null ? isl.ry : isl.r;
  const small = (rx + ry) * 0.5 <= 20 ? 0.2 : 0.08;
  const hostileBiome = (isl.biome === "storm" || isl.biome === "volcanic" || isl.biome === "barren") ? 0.16 : 0;
  return small + hostileBiome;
}

function chooseBandByDifficulty(diff) {
  if (diff < 0.18) return LEVEL_BAND_VARIANTS[0];
  if (diff < 0.3) return LEVEL_BAND_VARIANTS[1];
  if (diff < 0.45) return LEVEL_BAND_VARIANTS[2];
  if (diff < 0.62) return LEVEL_BAND_VARIANTS[3];
  if (diff < 0.78) return LEVEL_BAND_VARIANTS[4];
  return LEVEL_BAND_VARIANTS[5];
}

function buildVarietyRegionalCamps() {
  const camps = [];
  let id = 0;
  const stepX = 38, stepY = 30;
  for (let c = 26; c < WORLD_COLS - 26; c += stepX) {
    for (let r = 24; r < WORLD_ROWS - 24; r += stepY) {
      const jx = Math.round((hashXY(c * 5 + 7, r * 9 + 3) - 0.5) * 16);
      const jy = Math.round((hashXY(c * 13 + 19, r * 7 + 23) - 0.5) * 14);
      const cc = c + jx;
      const rr = r + jy;
      // Kasaba merkezini temiz bırak.
      if (cc >= VOX - 10 && cc <= VOX + VCOLS + 10 && rr >= VOY - 10 && rr <= VOY + VROWS + 12) continue;
      if (!isSafeSpawn(cc, rr)) continue;
      const diff = Math.max(0, Math.min(1, worldDistanceNorm(cc, rr) + islandIsolationBoost(cc, rr)));
      const band = chooseBandByDifficulty(diff);
      const groupIdx = Math.floor(hashXY(cc * 17 + 31, rr * 19 + 11) * band.groups.length) % band.groups.length;
      const group = band.groups[groupIdx];
      const sRoll = hashXY(cc * 29 + 2, rr * 23 + 5);
      const scale = band.scaleMin + (band.scaleMax - band.scaleMin) * sRoll;
      camps.push({
        id: "regional_variety_" + (id++),
        name: "Bölge Kampı",
        col: cc,
        row: rr,
        members: group.slice(),
        scale,
        tier: band.tier,
      });
      const extraRoll = hashXY(cc * 41 + 17, rr * 37 + 29);
      if (extraRoll > 0.34) {
        const cc2 = cc + Math.round((hashXY(cc * 7 + 13, rr * 5 + 19) - 0.5) * 10);
        const rr2 = rr + Math.round((hashXY(cc * 11 + 23, rr * 3 + 31) - 0.5) * 10);
        if (isSafeSpawn(cc2, rr2)) {
          const groupIdx2 = Math.floor(hashXY(cc2 * 17 + 7, rr2 * 19 + 5) * band.groups.length) % band.groups.length;
          const group2 = band.groups[groupIdx2];
          const sRoll2 = hashXY(cc2 * 43 + 3, rr2 * 31 + 11);
          const scale2 = band.scaleMin + (band.scaleMax - band.scaleMin) * sRoll2;
          camps.push({
            id: "regional_variety_" + (id++),
            name: "Bolge Kampi",
            col: cc2,
            row: rr2,
            members: group2.slice(),
            scale: scale2,
            tier: band.tier,
          });
        }
      }
    }
  }
  return camps;
}

function getCampLevelText(m) {
  const sc = m && m.campScale != null ? m.campScale : (m && m.levelScale != null ? m.levelScale : 1);
  const base = Math.max(1, Math.round(sc * 10));
  const spread = m && m.campTier === "heroic" ? 4 : (m && m.campTier === "elite" ? 3 : 2);
  const lo = Math.max(1, base - 1);
  const hi = lo + spread;
  return "Lv." + lo + "-" + hi;
}

function getCampRoleByIndex(idx, count) {
  if (count <= 1) return "dps";
  if (idx === 0) return "tank";
  if (idx === count - 1) return "healer";
  if (idx % 2 === 0) return "ranged";
  return "dps";
}

function spawnMonsterCamp(list, camp) {
  if (!camp || !camp.members || !camp.members.length) return;
  const ring = [
    { dc: 0, dr: 0 }, { dc: 2, dr: 0 }, { dc: -2, dr: 0 }, { dc: 0, dr: 2 },
    { dc: 0, dr: -2 }, { dc: 2, dr: 2 }, { dc: -2, dr: 2 }, { dc: 2, dr: -2 }, { dc: -2, dr: -2 },
  ];
  const scale = camp.scale || 1;
  const tier = camp.tier || "normal";
  for (let i = 0; i < camp.members.length; i++) {
    const p = ring[i % ring.length];
    const mc = camp.col + p.dc;
    const mr = camp.row + p.dr;
    if (!isSafeSpawn(mc, mr)) continue;
    const role = getCampRoleByIndex(i, camp.members.length);
    list.push(new Monster(mc, mr, camp.members[i], scale, {
      campId: camp.id || ("camp_" + camp.col + "_" + camp.row),
      campTier: tier,
      campScale: scale,
      campRole: role,
      socialAggroRange: TILE_SIZE * (tier === "heroic" ? 8.5 : tier === "elite" ? 7.2 : 6.2),
    }));
  }
}

function spawnMonsters() {
  const list = [];
  // Ana kara: rastgele dağınık yerine sabit grup kampları.
  for (const camp of FIXED_MAINLAND_GROUP_CAMPS) spawnMonsterCamp(list, camp);
  for (const camp of buildVarietyRegionalCamps()) spawnMonsterCamp(list, camp);
  for (const isl of ISLANDS) {
    if (!isl.monsters) continue;
    const mList = isl.monsters;
    const ctr = islandWorldCenter(isl);
    for (let i = 0; i < mList.length; i++) {
      const angle = (i / mList.length) * Math.PI * 2;
      const rx = isl.rx != null ? isl.rx : isl.r;
      const ry = isl.ry != null ? isl.ry : isl.r;
      const mc = Math.floor(ctr.cx + Math.cos(angle) * rx * 0.45);
      const mr = Math.floor(ctr.cy + Math.sin(angle) * ry * 0.45);
      if (isSafeSpawn(mc, mr)) list.push(new Monster(mc, mr, mList[i], isl.scale || 1));
    }
    if (isl.boss && MONSTER_TYPES[isl.boss]) {
      const sp = findBossSpawn(isl);
      if (sp) {
        const bossScale = (isl.scale || 1) * 1.65;
        list.push(new Monster(sp.col, sp.row, isl.boss, bossScale));
        const dist = worldDistanceNorm(sp.col, sp.row);
        const isDragonIsle = isl.boss && (
          isl.boss === "ancient_flame_dragon" || isl.boss === "frost_ancient_wyrm" ||
          isl.boss === "storm_sovereign_dragon" || isl.boss === "void_ancient_dragon"
        );
        const ultraChance = Math.max(0, Math.min(0.8, (dist - 0.58) * 1.15 + ((isl.scale || 1) - 1.2) * 0.22));
        if ((dist > 0.62 && Math.random() < ultraChance) || isDragonIsle) {
          const ox = (hashXY(sp.col * 71 + 11, sp.row * 67 + 23) > 0.5) ? 2 : -2;
          const oy = (hashXY(sp.col * 59 + 31, sp.row * 53 + 7) > 0.5) ? 2 : -2;
          const uc = sp.col + ox, ur = sp.row + oy;
          if (isSafeSpawn(uc, ur)) {
            list.push(new Monster(uc, ur, isl.boss, bossScale * (isDragonIsle ? 1.5 : 1.3), {
              campTier: "apex",
              ultraBoss: true,
            }));
          }
        }
      }
    }
    const chestTries = [[0, 0], [2, 1], [-2, 1], [1, -2], [-1, -2]];
    for (const [ox, oy] of chestTries) {
      const cc = Math.floor(ctr.cx + ox), cr = Math.floor(ctr.cy + oy);
      if (isSafeSpawn(cc, cr)) {
        list.push(new Monster(cc, cr, "island_treasure_chest", Math.max(1, (isl.scale || 1) * 0.95)));
        break;
      }
    }
  }
  for (const camp of MONSTER_CAMPS) spawnMonsterCamp(list, camp);
  return list;
}
